      cleanup();
      resolve(null);
    };
  });
}

// 撤退判定（連合/枢軸別、ラウンド終了時）
async function tryRetreat(side, seaKey){
  const candidates = SHIPS.filter(s => s.location === seaKey && !s.sunk && s.side === side && s.type !== 'UBOAT');
  if(!candidates.length) return null;
  const sideName = side === 'allies' ? '連合' : '枢軸';
  // AI 側は自動判断
  if(side === aiSide){
    if(!aiShouldRetreat(candidates, seaKey)){
      setPhaseLabel(`${sideName}: AI判断で残留`);
      await new Promise(r => setTimeout(r, 800));
      return null;
    }
    const groups = aiSplitGroups(candidates, seaKey);
    setPhaseLabel(`${sideName}: AI判断で撤退（${groups.length}グループ）`);
    await new Promise(r => setTimeout(r, 800));
    return groups;
  }
  setPhaseLabel(`${sideName}: 撤退しますか？`);
  const yes = confirm(`${sideName}は全艦撤退しますか？`);
  if(!yes) return null;
  const groups = await splitIntoGroups(candidates, sideName);
  return groups; // Array of Array of ships
}

function aiShouldRetreat(candidates, seaKey){
  // 戦闘可能艦のみ（atk>=1, CV等は除外）
  const myFighters = candidates.filter(s => s.atk >= 1);
  const enemy = SHIPS.filter(s => s.location === seaKey && !s.sunk && s.side === humanSide && s.type !== 'UBOAT');
  const enemyFighters = enemy.filter(s => s.atk >= 1);
  // 攻撃力合計で比較（損害艦も atk が落ちているので現状値で計算）
  const myStrength = myFighters.reduce((sum, s) => sum + (s.atk || 0), 0);
  const enemyStrength = enemyFighters.reduce((sum, s) => sum + (s.atk || 0), 0);
  // 自軍攻撃力 < 敵攻撃力 なら撤退
  return myStrength < enemyStrength;
}

function aiSplitGroups(candidates, seaKey){
  const enemy = SHIPS.filter(s => s.location === seaKey && !s.sunk && s.side === humanSide && s.type !== 'UBOAT');
  const enemyMaxSpd = enemy.length ? Math.max(...enemy.map(s => s.spd)) : 0;
  // コンボイは見捨てる（戦闘海域に取り残される）
  const targets = candidates.filter(s => s.type !== 'CONVOY');
  // 逃げ切れる組: 速力が敵最高速力以上 / 逃げ切れない組: それ未満
  const fast = targets.filter(s => s.spd >= enemyMaxSpd);
  const slow = targets.filter(s => s.spd < enemyMaxSpd);
  const groups = [];
  if(fast.length) groups.push(fast); // 逃げ切れる組をまとめて1グループ
  if(slow.length) groups.push(slow); // 逃げ切れない組をまとめて1グループ
  const result = groups.filter(g => g.length > 0);
  // 各艦にグループタグを割り当て、cs-row上に表示反映
  result.forEach((grp, i) => {
    const tag = String.fromCharCode(65 + i); // A, B, C...
    grp.forEach(s => {
      s.group = tag;
      const row = document.getElementById(`cs-${s.id}`);
      if(row){
        let grpEl = row.querySelector('.cs-group');
        if(!grpEl){
          grpEl = document.createElement('span');
          grpEl.className = 'cs-group';
          grpEl.style.cssText = 'color:#fc4;font-weight:bold;margin-left:8px;';
          const nameEl = row.querySelector('.cs-name');
          if(nameEl) nameEl.appendChild(grpEl);
        }
        grpEl.textContent = tag;
      }
    });
  });
  return result;
}

function splitIntoGroups(ships, sideName){
  return new Promise(resolve => {
    let activeGroup = 'A';
    const assignments = {};
    const groupNames = ['A','B','C'];
    const phaseEl = document.getElementById('phaseLabel');
    const grpBtnsHtml = groupNames.map(g =>
      `<button class="grpBtn" data-grp="${g}" style="padding:4px 10px;margin-right:4px;">${g}</button>`
    ).join('');
    phaseEl.innerHTML = `${sideName}: タグを選び艦をクリックでグループ分け ${grpBtnsHtml} <button id="_grpOk" style="background:#2266cc;color:#fff;padding:4px 10px;margin-left:8px;">確定</button>`;
    const updateBtns = () => {
      phaseEl.querySelectorAll('button[data-grp]').forEach(b => {
        b.style.background = (b.dataset.grp === activeGroup) ? '#fc4' : '#446';
        b.style.color = (b.dataset.grp === activeGroup) ? '#000' : '#fff';
      });
    };
    updateBtns();
    phaseEl.querySelectorAll('button[data-grp]').forEach(b => {
      b.onclick = () => { activeGroup = b.dataset.grp; updateBtns(); };
    });
    const handlers = {};
    const updateRowSort = () => {
      const lists = ['alliesShipList','axisShipList'];
      lists.forEach(lid => {
        const list = document.getElementById(lid);
        if(!list) return;
        const rows = Array.from(list.children);
        rows.sort((a,b) => {
          const sa = SHIPS.find(x => `cs-${x.id}` === a.id);
          const sb = SHIPS.find(x => `cs-${x.id}` === b.id);
          const ga = (sa && sa.group) || 'Z';
          const gb = (sb && sb.group) || 'Z';
          return ga.localeCompare(gb);
        });
        rows.forEach(r => list.appendChild(r));
      });
    };
    ships.forEach(s => {
      const row = document.getElementById(`cs-${s.id}`);
      if(!row) return;
      row.classList.add('selectable');
      const onClick = () => {
        assignments[s.id] = activeGroup;
        s.group = activeGroup;
        let grpEl = row.querySelector('.cs-group');
        if(!grpEl){
          grpEl = document.createElement('span');
          grpEl.className = 'cs-group';
          grpEl.style.cssText = 'color:#fc4;font-weight:bold;margin-left:8px;';
          row.appendChild(grpEl);
        }
        grpEl.textContent = activeGroup;
        updateRowSort();
      };
      handlers[s.id] = onClick;
      row.addEventListener('click', onClick);
    });
    document.getElementById('_grpOk').onclick = () => {
      ships.forEach(s => {
        const row = document.getElementById(`cs-${s.id}`);
        if(row){
          row.classList.remove('selectable');
          if(handlers[s.id]) row.removeEventListener('click', handlers[s.id]);
        }
      });
      const groups = [];
      groupNames.forEach(g => {
        const grpShips = ships.filter(s => assignments[s.id] === g);
        if(grpShips.length) groups.push(grpShips);
      });
      const unassigned = ships.filter(s => !assignments[s.id]);
      if(unassigned.length) groups.push(unassigned);
      resolve(groups.length ? groups : [ships]);
    };
  });
}

// 追跡判定（グループ別対応）
async function tryPursuit(pursuerSide, seaKey, retreatGroups){
  if(!retreatGroups || !retreatGroups.length) return null;
  const sideName = pursuerSide === 'allies' ? '連合' : '枢軸';
  const isAi = pursuerSide === aiSide;
  const pursuits = [];

  if(isAi){
    // AI: グループごとに自動判定
    for(let i = 0; i < retreatGroups.length; i++){
      const group = retreatGroups[i];
      if(!group.length) continue;
      const minSpd = Math.min(...group.map(s => s.spd));
      const eligible = SHIPS.filter(s => s.location === seaKey && !s.sunk && s.side === pursuerSide && s.type !== 'UBOAT' && s.type !== 'CV' && s.spd >= minSpd);
      if(!eligible.length) continue;
      const pursuers = aiSelectPursuers(eligible, group);
      if(!pursuers || !pursuers.length) continue;
      pursuits.push({ pursuers, retreaters: group });
    }
    if(pursuits.length){
      setPhaseLabel(`${sideName}: AI判断で追撃（${pursuits.length}グループ）`);
    } else {
      setPhaseLabel(`${sideName}: AI判断で追撃せず`);
    }
    await new Promise(r => setTimeout(r, 800));
  } else {
    // 人間側: 全グループを一覧表示してまとめて選択
    const result = await selectPursuitAssignments(retreatGroups, seaKey, pursuerSide, sideName);
    if(result){
      for(const [gidx, ships] of Object.entries(result)){
        if(ships && ships.length){
          pursuits.push({ pursuers: ships, retreaters: retreatGroups[Number(gidx)] });
        }
      }
    }
  }

  return pursuits.length ? pursuits : null;
}

// 人間側の追撃グループ一括選択UI
function selectPursuitAssignments(retreatGroups, seaKey, pursuerSide, sideName){
  return new Promise(resolve => {
    const groupsInfo = retreatGroups.map((group, i) => {
      const grpName = String.fromCharCode(65 + i);
      const minSpd = group.length ? Math.min(...group.map(s => s.spd)) : 0;
      const eligible = SHIPS.filter(s => s.location === seaKey && !s.sunk && s.side === pursuerSide && s.type !== 'UBOAT' && s.type !== 'CV' && s.spd >= minSpd);
      return { idx: i, grpName, group, minSpd, eligible };
    }).filter(g => g.group.length);

    if(!groupsInfo.length){ resolve(null); return; }

    // 追撃可能な枢軸艦の和集合
    const allEligibleIds = new Set();
    groupsInfo.forEach(g => g.eligible.forEach(s => allEligibleIds.add(s.id)));
    const allEligible = SHIPS.filter(s => allEligibleIds.has(s.id));

    // shipId → groupIdx の割り当て
    const assignments = {};

    const phaseEl = document.getElementById('phaseLabel');
    let html = `<div style="display:flex;flex-direction:column;gap:4px;font-size:0.9em;">`;
    html += `<div style="font-weight:bold;color:#fc4;">${sideName}追撃選択 — 各グループ別に追撃艦を割当</div>`;
    groupsInfo.forEach(g => {
      const shipsList = g.group.map(s => `${s.name}(spd${s.spd})`).join(', ');
      const elNames = g.eligible.map(s => s.name).join(', ') || '該当なし';
      const tagColor = g.eligible.length ? '#fc4' : '#888';
      html += `<div style="border:1px solid #456;padding:4px 6px;background:#1a2a3a;">`;
      html += `<span style="color:${tagColor};font-weight:bold;">グループ${g.grpName}</span> (最遅spd${g.minSpd}): ${shipsList}<br>`;
      html += `<span style="font-size:0.85em;color:#aac;">追撃可能枢軸: ${elNames}</span>`;
      html += `</div>`;
    });
    html += `<div style="font-size:0.85em;color:#aac;">枢軸艦の右にあるグループボタンをクリックで割当 (- は不参加)</div>`;
    html += `<div><button id="_purOk" style="background:#2266cc;color:#fff;padding:4px 14px;border:none;border-radius:3px;cursor:pointer;">確定</button> <button id="_purCancel" style="background:#666;color:#fff;padding:4px 14px;border:none;border-radius:3px;cursor:pointer;margin-left:6px;">追撃しない</button></div>`;
    html += `</div>`;
    phaseEl.innerHTML = html;

    // 各枢軸艦のcs-rowにグループ割当ボタン群を追加
    allEligible.forEach(s => {
      const row = document.getElementById(`cs-${s.id}`);
      if(!row) return;
      row.classList.add('selectable');
      const eligibleGroups = groupsInfo.filter(g => g.eligible.some(e => e.id === s.id));
      const btnContainer = document.createElement('span');
      btnContainer.className = 'pur-btns';
      btnContainer.style.cssText = 'margin-left:8px;display:inline-flex;gap:2px;';
      let btnHtml = '';
      eligibleGroups.forEach(g => {
        btnHtml += `<button data-shipid="${s.id}" data-gidx="${g.idx}" class="purBtn" style="background:#446;color:#fff;padding:1px 7px;border:1px solid #678;border-radius:3px;cursor:pointer;font-size:0.85em;">${g.grpName}</button>`;
      });
      btnHtml += `<button data-shipid="${s.id}" data-gidx="-1" class="purBtn" style="background:#642;color:#fff;padding:1px 7px;border:1px solid #864;border-radius:3px;cursor:pointer;font-size:0.85em;">-</button>`;
      btnContainer.innerHTML = btnHtml;
      const nameEl = row.querySelector('.cs-name');
      if(nameEl) nameEl.appendChild(btnContainer);

      // 初期状態: 最初の追撃可能グループに自動割当 (確定で即追撃が始まるよう)
      const defaultGidx = eligibleGroups.length ? eligibleGroups[0].idx : -1;
      assignments[s.id] = defaultGidx;
      const updateBtnStyle = (gidx) => {
        btnContainer.querySelectorAll('.purBtn').forEach(bb => {
          const isActive = Number(bb.dataset.gidx) === gidx;
          bb.style.background = isActive ? '#fc4' : (Number(bb.dataset.gidx) === -1 ? '#642' : '#446');
          bb.style.color = isActive ? '#000' : '#fff';
        });
      };
      updateBtnStyle(defaultGidx);

      btnContainer.querySelectorAll('.purBtn').forEach(b => {
        b.onclick = (e) => {
          e.stopPropagation();
          const gidx = Number(b.dataset.gidx);
          assignments[s.id] = gidx;
          updateBtnStyle(gidx);
        };
      });
    });

    const cleanup = () => {
      allEligible.forEach(s => {
        const row = document.getElementById(`cs-${s.id}`);
        if(row){
          row.classList.remove('selectable');
          const btnEl = row.querySelector('.pur-btns');
          if(btnEl) btnEl.remove();
        }
      });
    };

    document.getElementById('_purOk').onclick = () => {
      cleanup();
      const result = {};
      for(const [shipId, gidx] of Object.entries(assignments)){
        if(gidx < 0) continue;
        const ship = SHIPS.find(s => s.id === shipId);
        if(!ship) continue;
        if(!result[gidx]) result[gidx] = [];
        result[gidx].push(ship);
      }
      resolve(result);
    };
    document.getElementById('_purCancel').onclick = () => {
      cleanup();
      resolve(null);
    };
  });
}

function aiSelectPursuers(eligible, retreaters){
  // 1艦残して残り全艦で追撃（残すのは速い艦）
  if(eligible.length <= 1) return null;
  const sorted = [...eligible].sort((a, b) => b.spd - a.spd);
  const candidates = sorted.slice(1); // 最速1艦を残す
  if(!retreaters || !retreaters.length) return candidates;
  // 撤退側の戦力評価
  const retCV = retreaters.some(s => s.type === 'CV' && !s.sunk);
  const retAtk = retreaters.filter(s => !s.sunk).reduce((sum, s) => sum + (s.atk || 0), 0);
  const purAtk = candidates.filter(s => !s.sunk).reduce((sum, s) => sum + (s.atk || 0), 0);
  // 撤退側にCVがある場合: 追撃側攻撃力が撤退側の1.5倍未満なら追撃せず
  if(retCV && purAtk < retAtk * 1.5) return null;
  // CVなしでも追撃側攻撃力が撤退側未満なら追撃せず
  if(!retCV && purAtk < retAtk) return null;
  return candidates;
}

// プレイヤー目標選択
function waitForTargetClick(side, focusSea){
  return new Promise(resolve => {
    const candidates = SHIPS.filter(s =>
      s.side === side && !s.sunk && s.location === focusSea
    );
    if(!candidates.length){ resolve(null); return; }
    const handlers = [];
    candidates.forEach(s => {
      const row = document.getElementById(`cs-${s.id}`);
      if(!row) return;
      row.classList.add('selectable');
      const onClick = () => {
        candidates.forEach(c => {
          const r = document.getElementById(`cs-${c.id}`);
          if(r){ r.classList.remove('selectable'); r.removeEventListener('click', handlers[c.id]); }
        });
        resolve(s);
      };
      handlers[s.id] = onClick;
      row.addEventListener('click', onClick);
    });
  });
}

// 1ダイスを「ロール（シェイク）→ 結果表示」で演出
async function rollAnimDice(diceEl, finalRoll, finalCls, durationMs=550){
  // ロール中: shake + ランダム数字
  diceEl.classList.add('rolling');
  diceEl.textContent = '?';
  const startTime = Date.now();
  while(Date.now() - startTime < durationMs){
    diceEl.textContent = (1 + Math.floor(Math.random()*6));
    await wait(70);
  }
  diceEl.classList.remove('rolling');
  diceEl.classList.add(finalCls);
  diceEl.textContent = finalRoll;
}

function diceClassByRoll(r){ return r===6 ? 'hit' : (r===5 ? 'dis' : 'miss'); }

async function playOneEvent(e){
  const phaseEl = document.getElementById('phaseLabel');
  switch(e.type){
    case 'phase':
      phaseEl.textContent = `━ ${e.label} (${SEA_LABEL[e.sea] || e.sea}) ━`;
      await wait(700);
      break;
    case 'asw_ship': {
      // 各連合艦が個別にASWダイスを振る
      const diceEl = document.getElementById(`cs-dc-${e.ship}`);
      const tgtRow = document.getElementById(`cs-${e.ship}`);
      if(tgtRow) tgtRow.classList.add('firing');
      if(diceEl){
        diceEl.innerHTML = '';
        for(const r of e.dice){
          const d = document.createElement('span');
          d.className = 'dice';
          diceEl.appendChild(d);
          await rollAnimDice(d, r, diceClassByRoll(r));
        }
        const hit = e.dice.filter(r=>r===6).length;
        const dis = e.dice.filter(r=>r===5).length;
        const labelHtml = (hit||dis)
          ? `<span class="result-label hit">命中${hit}・不能${dis}</span>`
          : `<span class="result-label miss">外れ</span>`;
        diceEl.insertAdjacentHTML('beforeend', labelHtml);
      }
      await wait(300);
      if(tgtRow) tgtRow.classList.remove('firing');
      break;
    }
    case 'asw_summary':
      phaseEl.textContent = `ASW結果: Uボート撃沈${e.sunk}・即時帰還${e.disabled}`;
      await wait(700);
      break;
    case 'fire_volley': {
      const attRow = document.getElementById(`cs-${e.attacker}`);
      const tgtRow = document.getElementById(`cs-${e.target}`);
      const diceEl = document.getElementById(`cs-dc-${e.attacker}`);
      if(attRow) attRow.classList.add('firing');
      if(tgtRow) tgtRow.classList.add('target');
      if(diceEl){
        diceEl.innerHTML = `<span style="color:#aac;margin-right:4px;">→${e.targetName}</span>`;
        // 攻撃ダイスを順番にロール
        for(const x of e.dice){
          const d = document.createElement('span');
          d.className = 'dice';
          diceEl.appendChild(d);
          const cls = x.isHit ? 'hit' : (x.isDis ? 'dis' : 'miss');
          await rollAnimDice(d, x.r, cls);
        }
        // 6の回数分、損害ダイス
        if(e.damageRolls.length){
          diceEl.insertAdjacentHTML('beforeend', '<span style="color:#fa8;margin:0 6px;font-weight:bold;">損害:</span>');
          for(const dr of e.damageRolls){
            const dd = document.createElement('span');
            dd.className = 'dice';
            diceEl.appendChild(dd);
            await rollAnimDice(dd, dr, 'dmg');
            if(tgtRow){
              tgtRow.classList.add('flash');
              setTimeout(()=>tgtRow.classList.remove('flash'),400);
            }
          }
          if(e.dmgTotal !== undefined){
            diceEl.insertAdjacentHTML('beforeend', `<span style="color:#fa8;margin-left:6px;font-weight:bold;">合計${e.dmgTotal}</span>`);
          }
          // 目標艦に累積損害を逐次表示
          const tgtSt = document.getElementById(`cs-st-${e.target}`);
          const tgtShip = SHIPS.find(s => s.id === e.target);
          if(tgtSt && tgtShip){
            const accum = (e.accumDamage !== undefined) ? e.accumDamage : ((tgtShip.damage || 0) + e.dmgTotal);
            tgtSt.innerHTML = `<span style="color:#fa8;font-weight:bold;">損害${accum}/${tgtShip.def}</span>`;
          }
        } else {
          diceEl.insertAdjacentHTML('beforeend', '<span class="result-label miss">外れ</span>');
        }
        // 5(即時帰還)が出ていれば、損害有無に関わらず目標艦に即時帰還ラベルを表示
        if(e.hasDisabled){
          const tgtSt = document.getElementById(`cs-st-${e.target}`);
          if(tgtSt && !tgtSt.querySelector('.result-label.disabled')) tgtSt.insertAdjacentHTML('beforeend', ' <span class="result-label disabled">即時帰還</span>');
        }
      }
      await wait(400);
      if(attRow) attRow.classList.remove('firing');
      if(tgtRow) tgtRow.classList.remove('target');
      break;
    }
    case 'fire': {
      const attRow = document.getElementById(`cs-${e.attacker}`);
      const tgtRow = document.getElementById(`cs-${e.target}`);
      const diceEl = document.getElementById(`cs-dc-${e.attacker}`);
      if(attRow) attRow.classList.add('firing');
      if(tgtRow) tgtRow.classList.add('target');
      if(diceEl){
        diceEl.innerHTML = `<span style="color:#aac;margin-right:4px;">→${e.targetName}</span>`;
        for(const x of e.dice){
          const d = document.createElement('span');
          d.className = 'dice';
          diceEl.appendChild(d);
          await rollAnimDice(d, x.r, diceClassByRoll(x.r));
          if(x.dmgRoll){
            const dmg = document.createElement('span');
            dmg.className = 'dice';
            diceEl.appendChild(dmg);
            await rollAnimDice(dmg, x.dmgRoll, 'dmg', 450);
            if(tgtRow){
              tgtRow.classList.add('flash');
              setTimeout(()=> tgtRow.classList.remove('flash'), 400);
            }
          }
        }
        let label;
        if(e.dmgTotal>0)    label = `<span class="result-label hit">命中・損害${e.dmgTotal}</span>`;
        else if(e.disabled) label = `<span class="result-label disabled">即時帰還</span>`;
        else                label = `<span class="result-label miss">外れ</span>`;
        diceEl.insertAdjacentHTML('beforeend', label);
      }
      await wait(400);
      if(attRow) attRow.classList.remove('firing');
      if(tgtRow) tgtRow.classList.remove('target');
      break;
    }
    case 'damage': {
      const stEl = document.getElementById(`cs-st-${e.ship}`);
      if(stEl) stEl.innerHTML = `<span style="color:#fa8;">損害${e.damage}/${e.def}・速力${e.spd}</span>`;
      await wait(250);
      break;
    }
    case 'sunk': {
      const row = document.getElementById(`cs-${e.ship}`);
      const stEl = document.getElementById(`cs-st-${e.ship}`);
      if(row) row.classList.add('sunk');
      if(stEl) stEl.innerHTML = `<span class="result-label sunk">★撃沈</span>`;
      await wait(500);
      break;
    }
    case 'disabled': {
      const row = document.getElementById(`cs-${e.ship}`);
      const stEl = document.getElementById(`cs-st-${e.ship}`);
      if(row) row.classList.add('disabled');
      if(stEl && !stEl.querySelector('.result-label.disabled')) stEl.insertAdjacentHTML('beforeend', ' <span class="result-label disabled">即時帰還</span>');
      await wait(300);
      // 即時帰還
      const ship = SHIPS.find(s => s.id === e.ship);
      if(ship && SEAS[ship.location]){
        // 枢軸艦（船団除く・人間プレイ時のみ）は戦闘終了後にUIで選択させる（自動配置せず）
        if(ship.side === 'axis' && ship.type !== 'CONVOY' && humanSide === 'axis'){
          ship.disabled = false;
          ship.disabledThisTurn = true;
          if(!pendingAxisDisabledForUI.find(p => p.shipId === ship.id)){
            pendingAxisDisabledForUI.push({ shipId: ship.id, originalSea: ship.location });
          }
          await wait(200);
          break;
        }
        let chosenPort, atDock = false;
        // 14.7 即時帰還船団は米国へ自動
        if(ship.type === 'CONVOY'){
          chosenPort = 'USA';
        } else if(ship.location === 'SouthAtlantic'){
          // UK艦は中立港使用不可、homePort (England) へ
          chosenPort = (ship.country === 'UK') ? (ship.homePort || 'England') : 'Neutral';
        } else {
          const ports = getReturnPorts(ship);
          if(ports.length === 0)      chosenPort = ship.homePort;
          else                        chosenPort = ports.includes(ship.homePort) ? ship.homePort : ports[0];
        }
        if(chosenPort === 'Neutral') ship.arrivedNeutralTurn = currentTurn;
        ship.atDock = atDock;
        ship.location = chosenPort;
        ship.disabled = false;
        ship.disabledThisTurn = true; // 9.5 同ターン中の空爆対象外
        if(stEl) stEl.insertAdjacentHTML('beforeend',
          ` → <span style="color:#cca;">${PORT_LABEL[chosenPort]||chosenPort}</span>`);
        await wait(400);
      }
      break;
    }
    case 'uboat_disabled': {
      const row = document.getElementById(`cs-${e.ship}`);
      const stEl = document.getElementById(`cs-st-${e.ship}`);
      if(row) row.classList.add('disabled');
      if(stEl) stEl.innerHTML = '<span class="result-label disabled">即時帰還→ドイツ</span>';
      await wait(400);
      break;
    }
    case 'return_disabled': {
      const stEl = document.getElementById(`cs-st-${e.ship}`);
      if(stEl && !stEl.querySelector('.result-label.disabled')) stEl.insertAdjacentHTML('beforeend', ' <span class="result-label disabled">即時帰還</span>');
      await wait(300);
      break;
    }
  }
}

// 修理 (13)
function executeRepair(side){
  const log = [];
  console.log('[executeRepair]', { side, currentTurn });
  Object.keys(PORTS).forEach(portKey => {
    const port = PORTS[portKey];
    const portShipsAll = SHIPS.filter(s => s.location === portKey && !s.sunk);
    const damagedShipsAll = portShipsAll.filter(s => s.damage > 0);
    if(damagedShipsAll.length){
      console.log(`[executeRepair] ${portKey} (repair=${port.repair}, avail=${port.available}, side=${port.side}):`, damagedShipsAll.map(s => `${s.name}(${s.side},dmg${s.damage})`));
    }
    if(port.repair <= 0){ if(damagedShipsAll.length) console.log(`  → skip: repair<=0`); return; }
    if(!port.available.includes(currentTurn)){ if(damagedShipsAll.length) console.log(`  → skip: turn ${currentTurn} not in available`); return; }
    if(side && port.side !== 'neutral' && port.side !== side){ if(damagedShipsAll.length) console.log(`  → skip: side filter (${side} vs ${port.side})`); return; }
    const ships = SHIPS.filter(s =>
      s.location === portKey && !s.sunk && s.damage > 0 &&
      (!side || s.side === side)
    );
    if(!ships.length){ console.log(`  → no ships match filter`); return; }
    let budget = port.repair;
    const lines = [];
    for(const ship of ships){
      if(budget <= 0) break;
      const rep = Math.min(budget, ship.damage);
      ship.damage -= rep;
      budget -= rep;
      ship.spd = Math.max(1, ship.spdOrig - ship.damage);
      if(ship.damage < ship.def && ship.atkOrig > 0){
        ship.atk = ship.atkOrig;
      }
      lines.push(`${ship.name}: -${rep} → 残${ship.damage}/${ship.def}`);
    }
    if(lines.length){
      log.push(`<b>${PORT_LABEL[portKey]||portKey}(${port.repair})</b>: ${lines.join(' / ')}`);
    }
  });
  document.getElementById('repairStatus').innerHTML = log.length ? log.join('<br>') : '修理対象艦なし';
  placeAllShips();
  renderLocShipList();
  return log;
}

// シミュレーションモード（true=高速・アニメ無し）
let simMode = false;

// 連合軍AI移動 + 修理
async function aiAlliedMove(bbTargetOverride){
  const aiLog = [];
  // ロシア艦出港判定（ターン3以降、毎ターン、ダイス5+で成功）
  if(currentTurn >= 3){
    const ruResults = [];
    SHIPS.filter(s => s.country === 'RU' && !s.sunk).forEach(s => {
      const r = rollD6();
      s.canMoveThisTurn = (r >= 5);
      aiLog.push(`${s.name}: ロシア出港⚂${r} ${s.canMoveThisTurn ? '成功' : '失敗'}`);
      ruResults.push(`${s.name}: ⚂${r} ${s.canMoveThisTurn ? '成功' : '失敗'}`);
    });
    if(ruResults.length){
      alert('ロシア艦出港判定:\n' + ruResults.join('\n'));
    }
  } else {
    SHIPS.filter(s => s.country === 'RU' && !s.sunk).forEach(s => {
      s.canMoveThisTurn = false;
    });
    aiLog.push(`ロシア艦: ターン${currentTurn}<3 - 出港判定スキップ`);
  }

  // === 地中海補填を最優先で実施 ===
  // Malta 艦の地中海派遣判定: マルタ艦数 ≥ イタリア艦数（生存総数、損害含む）なら出撃。劣勢なら控える
  const itTotalAlive = SHIPS.filter(s => s.country === 'IT' && !s.sunk && !s.removed && s.type !== 'UBOAT').length;
  const maltaTotalAlive = SHIPS.filter(s => s.location === 'Malta' && s.side === 'allies' && !s.sunk && !s.removed && s.type !== 'CONVOY').length;
  if(maltaTotalAlive >= itTotalAlive){
    SHIPS.filter(s => s.location === 'Malta' && s.side === 'allies' && !s.sunk && !s.removed && s.type !== 'CONVOY' && !s.movedThisTurn).forEach(s => {
      s.location = 'Mediterranean';
      s.movedThisTurn = true;
    });
    aiLog.push(`Malta出撃: マルタ${maltaTotalAlive} ≥ IT${itTotalAlive}`);
  } else {
    aiLog.push(`Malta出撃控え（数劣勢）: マルタ${maltaTotalAlive} < IT${itTotalAlive}`);
  }
  // 不足補充: マルタ艦撃沈分を England から地中海へ派遣（2海域移動なので1隻ずつダイス判定、成功するまで送る）
  const maltaSunkCount = SHIPS.filter(s => s.homePort === 'Malta' && s.sunk).length;
  if(maltaSunkCount > 0){
    const englandReinforce = SHIPS.filter(s => s.location === 'England' && s.side === 'allies' && !s.sunk && !s.removed && s.type !== 'CONVOY' && !s.movedThisTurn && !(s.damage > 0));
    let sent = 0;
    for(const s of englandReinforce){
      if(sent >= maltaSunkCount) break;
      const roll = rollD6();
      if(roll < s.spd){
        s.location = 'Mediterranean';
        s.movedThisTurn = true;
        sent++;
        aiLog.push(`${s.name}: England → 地中海 ⚂${roll}<${s.spd} 成功 (補充${sent}/${maltaSunkCount})`);
      } else {
        s.location = s.homePort || 'England';
        s.movedThisTurn = true;
        s.failedMove = true;
        aiLog.push(`${s.name}: England → 地中海 ⚂${roll}≥${s.spd} 失敗 → ${locLabel(s.location)}帰還`);
      }
    }
    if(sent < maltaSunkCount){
      aiLog.push(`<b>地中海補充: ${sent}/${maltaSunkCount} (England艦不足)</b>`);
    }
  }

  // 本番実行時はルールベース配置（各艦→海域のマッピング）を計算（地中海補填後の England 残艦が対象）
  let bestConfig = null;
  if(!bbTargetOverride && !simMode){
    bestConfig = computeAlliedConfig();
  }
  const movable = SHIPS.filter(s =>
    s.side === 'allies' && !s.sunk && !s.removed && !s.movedThisTurn &&
    s.location && PORTS[s.location] &&
    s.damage === 0
  );

  // モンテカルロで決定した配置を適用（bestConfig がある場合、各艦を直接配置）
  if(bestConfig){
    for(const shipId in bestConfig){
      const ship = SHIPS.find(s => s.id === shipId);
      if(!ship || ship.movedThisTurn) continue;
      // 米国艦は投入ロール (ダイス6で成功、永続)
      if(ship.country === 'US' && ship.type !== 'CONVOY' && !ship.usEntered){
        const v = rollD6();
        const success = v === 6;
        aiLog.push(`${ship.name}: 米投入⚂${v}${success?'成功(永続)':'失敗'}`);
        alert(`${ship.name}: 米投入⚂${v} ${success ? '成功(永続)' : '失敗'}`);
        if(!success){
          ship.movedThisTurn = true;
          ship.failedMove = true;
          continue;
        }
        ship.usEntered = true;
      }
      ship.location = bestConfig[shipId];
      ship.movedThisTurn = true;
      aiLog.push(`${ship.name} → ${SEA_LABEL[bestConfig[shipId]]||bestConfig[shipId]} (MC)`);
    }
    if(!simMode) placeAllShips();
  }

  // 枢軸数(Uボート除く)
  const axisCount = {};
  Object.keys(SEAS).forEach(k => {
    axisCount[k] = SHIPS.filter(s => s.side === 'axis' && s.location === k && !s.sunk && s.type !== 'UBOAT').length;
  });
  // 連合既配置数
  const allyCount = {};
  Object.keys(SEAS).forEach(k => {
    allyCount[k] = SHIPS.filter(s => s.side === 'allies' && s.location === k && !s.sunk).length;
  });
  // 不足数（枢軸 - 連合）
  const need = {};
  Object.keys(SEAS).forEach(k => need[k] = Math.max(0, axisCount[k] - allyCount[k]));
  // 14.1 船団の海域占有
  const convoyOccupied = new Set();
  SHIPS.forEach(s => {
    if(s.type === 'CONVOY' && SEAS[s.location] && !s.sunk && !s.removed) convoyOccupied.add(s.location);
  });
  // 既配置CV数
  const cvCount = {};
  Object.keys(SEAS).forEach(k => {
    cvCount[k] = SHIPS.filter(s => s.side === 'allies' && s.type === 'CV' && s.location === k && !s.sunk).length;
  });

  function reachable(ship, dest){
    // 6.6 バルト海はRU/DEのみ
    if(dest === 'Baltic' && ship.country !== 'RU' && ship.country !== 'DE') return null;
    // 15.1 ロシア艦はバルト海のみ
    if(ship.country === 'RU' && dest !== 'Baltic') return null;
    // 15.4 米国艦(船団除く)は北大西洋のみ
    if(ship.country === 'US' && ship.type !== 'CONVOY' && dest !== 'NorthAtlantic') return null;
    const adj = PORT_SEAS[ship.location] || [];
    if(adj.includes(dest)) return { adj:true, two:false };
    for(const s1 of adj){
      if((SEA_ADJ[s1] || []).includes(dest)) return { adj:false, two:true };
    }
    return null;
  }

  async function tryApply(ship, dest){
    // 既に移動済み（失敗含む）の艦は再試行しない
    if(ship.movedThisTurn) return false;
    const r = reachable(ship, dest);
    if(!r) return false;
    let success = true;
    if(ship.country === 'RU'){
      success = !!ship.canMoveThisTurn;
    }
    if(success && ship.country === 'US' && ship.type !== 'CONVOY'){
      if(currentTurn < 4){ aiLog.push(`${ship.name}: T4以降のみ`); success = false; }
      else if(!ship.usEntered){
        const v = rollD6();
        success = v === 6;
        aiLog.push(`${ship.name}: 米投入⚂${v}${success?'成功(永続)':'失敗'}`);
        alert(`${ship.name}: 米投入⚂${v} ${success ? '成功(永続)' : '失敗'}`);
        if(success) ship.usEntered = true;
      }
    }
    if(success && r.two){
      const v = rollD6();
      success = v < ship.spd;
      aiLog.push(`${ship.name}: 2海域⚂${v}<${ship.spd}=${success?'成功':'失敗'}`);
    }
    if(!success){
      ship.movedThisTurn = true;
      ship.failedMove = true;
      return false;
    }
    ship.location = dest;
    ship.movedThisTurn = true;
    allyCount[dest]++;
    if(need[dest] > 0) need[dest]--;
    if(ship.type === 'CV') cvCount[dest]++;
    aiLog.push(`${ship.name} → ${SEA_LABEL[dest]||dest}`);
    if(!simMode){
      placeAllShips();
      await new Promise(rs=>setTimeout(rs,180));
    }
    return true;
  }

  // 想定独最大戦力
  const deAlive = SHIPS.filter(s => s.country === 'DE' && !s.sunk && !s.removed && s.type !== 'UBOAT').length;
  const deDamaged = SHIPS.filter(s => s.country === 'DE' && !s.sunk && s.damage > 0 && s.type !== 'UBOAT').length;
  const deStrength = deAlive - deDamaged * 0.5; // 損害有り艦は半分換算
  const itAlive = SHIPS.filter(s => s.country === 'IT' && !s.sunk && !s.removed).length;
  const deNonUboat = deAlive + itAlive;
  const expectedThreat = Math.max(0, deNonUboat - 2);
  // Uボート数
  const uboatCount = {};
  Object.keys(SEAS).forEach(k => {
    uboatCount[k] = SHIPS.filter(s => s.type === 'UBOAT' && s.location === k && !s.sunk).length;
  });
  // コンボイ位置別カウント
  const convoysAtBarents = SHIPS.filter(s => s.type === 'CONVOY' && s.location === 'Barents' && !s.sunk && !s.removed).length;
  const convoysAtNA = SHIPS.filter(s => s.type === 'CONVOY' && s.location === 'NorthAtlantic' && !s.sunk && !s.removed).length;
  const convoysAtUSA = SHIPS.filter(s => s.type === 'CONVOY' && s.location === 'USA' && !s.sunk && !s.removed).length;

  // === 戦略総当たり評価 ===
  // 初期差分: axis 6 (NS+Bar+Bal) - allies 3 (NA+Med+SA) = -3
  const strategies = [];
  // ルート1: ロシア重点（コンボイ→Barents→ロシア +3、ロシア艦Bal +3スイング、Bar防衛）
  {
    let s = -3; // baseline
    s += 3 * convoysAtBarents; // 即時上陸
    s += 1.5 * convoysAtNA; // 50%確率で次T到達
    s += 3; // Bal制圧
    s += deStrength <= 6 ? 3 : 1; // Bar制圧（独弱なら高確率）
    strategies.push({ name:'Russia', score: s });
  }
  // ルート2: 大西洋・NS集中（コンボイ→英国 +1、NS制圧 +4スイング）
  {
    let s = -3;
    s += 1 * (convoysAtBarents + convoysAtNA + convoysAtUSA);
    s += deStrength <= 7 ? 4 : 2; // NS制圧（独強だと厳しい）
    strategies.push({ name:'England-NS', score: s });
  }
  // ルート3: NS総力決戦
  {
    let s = -3;
    s += deStrength <= 6 ? 5 : 1; // 決戦勝利でNS取れれば+1、+移動制限効果
    s += 1 * convoysAtUSA; // 英国上陸サブ
    strategies.push({ name:'NS-Decisive', score: s });
  }
  // ルート4: イタリア狩り（地中海集中、ITが地中海に居る時のみ有効）
  {
    let s = -3;
    s += axisCount['Mediterranean'] >= 3 ? 3 : 0; // IT地中海居れば殲滅で+3
    s += 1 * convoysAtUSA;
    strategies.push({ name:'Italy-Hunt', score: s });
  }
  // ルート5: バル/バレンツ封じ
  {
    let s = -3;
    s += 3; // Bar制圧
    s += 3; // Bal制圧
    s += 1 * convoysAtUSA;
    strategies.push({ name:'BarBal-Deny', score: s });
  }
  strategies.sort((a,b) => b.score - a.score);
  let chosenStrategy = strategies[0].name;
  // コンボイ無し時: 確率で「通常削り(70%) vs NS+BarBal積極(30%)」を選択
  const totalConvoys = convoysAtBarents + convoysAtNA + convoysAtUSA;
  if(totalConvoys === 0){
    chosenStrategy = Math.random() < 0.3 ? 'NoConvoy-Aggressive' : 'NoConvoy-Attrition';
  }
  aiLog.push(`<b>戦略選択: ${chosenStrategy}</b> | 候補スコア: ` + strategies.map(s=>`${s.name}=${s.score}`).join(', '));

  // 戦艦目標: 戦略により切り替え
  const bbTarget = {
    NorthAtlantic: 0, SouthAtlantic: 0, Mediterranean: 0, Barents: 0, NorthSea: 0
  };
  if(chosenStrategy === 'Russia'){
    bbTarget.Barents = convoyOccupied.has('Barents') ? Math.max(4, Math.ceil(deStrength * 0.6)) : 2;
    bbTarget.NorthAtlantic = Math.ceil(expectedThreat * 0.3);
    bbTarget.SouthAtlantic = Math.ceil(expectedThreat * 0.3);
    bbTarget.Mediterranean = Math.max(2, axisCount['Mediterranean']);
  } else if(chosenStrategy === 'England-NS'){
    bbTarget.NorthAtlantic = Math.ceil(expectedThreat * 0.4);
    bbTarget.SouthAtlantic = Math.ceil(expectedThreat * 0.4);
    bbTarget.NorthSea = Math.max(4, Math.ceil(deStrength * 0.5));
    bbTarget.Mediterranean = Math.max(2, axisCount['Mediterranean']);
  } else if(chosenStrategy === 'NS-Decisive'){
    bbTarget.NorthSea = Math.max(6, Math.ceil(deStrength * 0.8));
    bbTarget.NorthAtlantic = 1;
    bbTarget.SouthAtlantic = 1;
    bbTarget.Mediterranean = Math.max(2, axisCount['Mediterranean']);
  } else if(chosenStrategy === 'Italy-Hunt'){
    bbTarget.Mediterranean = Math.max(4, axisCount['Mediterranean'] + 1);
    bbTarget.NorthAtlantic = Math.ceil(expectedThreat * 0.3);
    bbTarget.SouthAtlantic = Math.ceil(expectedThreat * 0.3);
  } else if(chosenStrategy === 'BarBal-Deny'){
    bbTarget.Barents = Math.max(3, Math.ceil(deStrength * 0.4));
    bbTarget.NorthAtlantic = Math.ceil(expectedThreat * 0.3);
    bbTarget.SouthAtlantic = Math.ceil(expectedThreat * 0.3);
    bbTarget.Mediterranean = Math.max(2, axisCount['Mediterranean']);
  } else if(chosenStrategy === 'NoConvoy-Attrition'){
    // 削り重視・無理しない: 各海域に最低限、大西洋維持、Bar/NSに削り艦
    bbTarget.NorthAtlantic = Math.ceil(expectedThreat * 0.35);
    bbTarget.SouthAtlantic = Math.ceil(expectedThreat * 0.35);
    bbTarget.Mediterranean = Math.max(2, axisCount['Mediterranean']);
    bbTarget.Barents = 2; // spd7削り
    bbTarget.NorthSea = 0; // 嫌がらせ1隻のみ別処理
  } else if(chosenStrategy === 'NoConvoy-Aggressive'){
    // A+B: NS決戦 + Bar/Bal封じ
    bbTarget.NorthSea = Math.max(5, Math.ceil(deStrength * 0.5));
    bbTarget.Barents = Math.max(3, Math.ceil(deStrength * 0.3));
    bbTarget.NorthAtlantic = Math.ceil(expectedThreat * 0.2);
    bbTarget.SouthAtlantic = Math.ceil(expectedThreat * 0.2);
    bbTarget.Mediterranean = Math.max(2, axisCount['Mediterranean']);
  }
  // 地中海: Malta 艦で対抗できない不足分のみ他港から派遣
  const maltaAllyShips = SHIPS.filter(s => s.location === 'Malta' && s.side === 'allies' && !s.sunk && !s.removed && s.type !== 'CONVOY').length;
  bbTarget.Mediterranean = Math.max(0, axisCount['Mediterranean'] + 1 - maltaAllyShips);
  // 外部からの bbTarget 上書き（モンテカルロシミュレーション用）
  if(bbTargetOverride){
    Object.assign(bbTarget, bbTargetOverride);
  }
  const allyBB = {};
  Object.keys(SEAS).forEach(k => {
    allyBB[k] = SHIPS.filter(s => s.side === 'allies' && s.location === k && !s.sunk && (s.type === 'BB' || s.type === 'BC')).length;
  });
  // tryApplyラッパ: BB/CV配置時にカウンタ更新
  const origTryApply = tryApply;
  const tryApplyTracked = async (ship, dest) => {
    const ok = await origTryApply(ship, dest);
    if(ok && (ship.type === 'BB' || ship.type === 'BC')) allyBB[dest] = (allyBB[dest]||0) + 1;
    return ok;
  };

  // 1a-1) 損害コンボイ NA → England 上陸 (POC +1 連合)
  for(const ship of SHIPS.filter(s => s.type === 'CONVOY' && s.side === 'allies' && !s.sunk && !s.removed && !s.movedThisTurn && s.location === 'NorthAtlantic' && s.damage > 0)){
    ship.location = 'England';
    ship.removed = true;
    ship.movedThisTurn = true;
    convoyOccupied.delete('NorthAtlantic');
    poc = Math.max(-10, Math.min(10, poc + 1));
    aiLog.push(`<b>${ship.name}: 損害により England 上陸 +1POC(連合)</b>`);
    if(!simMode){
      placeAllShips();
      await new Promise(rs=>setTimeout(rs,180));
    }
  }
  // 1a-2) 無傷船団 NA→バレンツ海（海上2ターン目以降、ロシア向け）
  for(const ship of SHIPS.filter(s => s.type === 'CONVOY' && s.side === 'allies' && !s.sunk && !s.removed && !s.movedThisTurn && s.location === 'NorthAtlantic' && (s.turnsAtSea||0) >= 1 && s.damage === 0)){
    if(convoyOccupied.has('Barents')) continue;
    ship.location = 'Barents';
    ship.movedThisTurn = true;
    convoyOccupied.add('Barents');
    convoyOccupied.delete('NorthAtlantic');
    allyCount['Barents'] = (allyCount['Barents']||0) + 1;
    aiLog.push(`<b>${ship.name} → バレンツ海(ロシア向)</b>`);
    if(!simMode){
      placeAllShips();
      await new Promise(rs=>setTimeout(rs,180));
    }
  }
  // 1b) 船団 USA→NA
  for(const ship of movable.filter(s => s.type === 'CONVOY')){
    if(ship.location === 'USA' && !convoyOccupied.has('NorthAtlantic')){
      if(await tryApplyTracked(ship, 'NorthAtlantic')) convoyOccupied.add('NorthAtlantic');
    }
  }

  // 2) 母港固定艦 (Leningrad→Baltic, Russia→Barents)
  for(const ship of movable.filter(s => s.type !== 'CONVOY' && (s.location==='Leningrad'||s.location==='Russia'))){
    if(ship.movedThisTurn) continue;
    const dest = ship.location==='Leningrad'?'Baltic':'Barents';
    await tryApplyTracked(ship, dest);
  }

  // 3) Malta艦のBB/CA→地中海 (CVは後で)
  for(const ship of movable.filter(s => s.location==='Malta' && s.type !== 'CV' && s.type !== 'CONVOY' && !s.movedThisTurn)){
    await tryApplyTracked(ship, 'Mediterranean');
  }

  // 4) 戦艦割当（spd7+優先で先に処理、Barents/NSも目標あれば配置）
  const bbsAtPort = movable.filter(s => (s.type === 'BB' || s.type === 'BC') && !s.movedThisTurn);
  bbsAtPort.sort((a,b) => b.spd - a.spd); // 高速優先
  for(const bb of bbsAtPort){
    const targets = ['NorthAtlantic','SouthAtlantic','Mediterranean'];
    if((bbTarget.Barents||0) > 0 || convoyOccupied.has('Barents')) targets.unshift('Barents');
    if((bbTarget.NorthSea||0) > 0) targets.push('NorthSea');
    targets.sort((a,b) => {
      const nA = Math.max(0, (bbTarget[a]||0)-allyBB[a]);
      const nB = Math.max(0, (bbTarget[b]||0)-allyBB[b]);
      // 同需要なら spd<7 はBarents/NSを後回し
      if(nA === nB){
        const dangerA = (a==='Barents'||a==='NorthSea') ? 1 : 0;
        const dangerB = (b==='Barents'||b==='NorthSea') ? 1 : 0;
        if(bb.spd < 7) return dangerA - dangerB;
      }
      return nB - nA;
    });
    for(const target of targets){
      const need2 = Math.max(0, (bbTarget[target]||0) - allyBB[target]);
      if(need2 <= 0) continue;
      if(await tryApplyTracked(bb, target)) break;
    }
  }

  // 5) 空母配置: バレンツ海最優先、行けないなら北海・大西洋。護衛3隻以上必須
  const axisLbaSeas = ['Barents','Baltic','Mediterranean']; // 枢軸LBA射程
  const nonCvAllyCount = (k) => SHIPS.filter(s => s.side==='allies' && s.location===k && !s.sunk && s.type!=='CV' && s.type!=='CONVOY').length;
  const cvsAtPort = movable.filter(s => s.type === 'CV' && !s.movedThisTurn);
  for(const cv of cvsAtPort){
    const targets = ['Barents','NorthSea','NorthAtlantic'];
    for(const target of targets){
      // 護衛: 敵殴り込みに耐える数（敵艦数+1、最低3隻）
      const requiredEscort = Math.max(3, axisCount[target] + 1);
      if(nonCvAllyCount(target) < requiredEscort) continue;
      if(await tryApplyTracked(cv, target)) break;
    }
  }

  // 5.5) 重巡(CA)配置: バレンツ海最優先、行けないなら北海・大西洋
  const casAtPort = movable.filter(s => s.type === 'CA' && !s.movedThisTurn);
  for(const ca of casAtPort){
    const targets = ['Barents','NorthSea','NorthAtlantic'];
    for(const target of targets){
      if(await tryApplyTracked(ca, target)) break;
    }
  }

  // 6) 巡洋艦/その他: 戦艦のいる主要海域に随伴配置（バレンツは CV/CA 専用のため除外）
  const primary = ['NorthAtlantic','SouthAtlantic'];
  const others = movable.filter(s => s.type !== 'CV' && s.type !== 'CONVOY' && s.type !== 'BB' && s.type !== 'BC' && s.type !== 'CA' && !s.movedThisTurn);
  for(const ship of others){
    // この艦が選べる候補のみ（spd<7はBarents/NS除外）
    const myPrimary = primary.filter(p => ship.spd >= 7 || (p !== 'Barents' && p !== 'NorthSea'));
    myPrimary.sort((a,b) => {
      const aHas = allyBB[a] > 0 ? 1 : 0;
      const bHas = allyBB[b] > 0 ? 1 : 0;
      if(aHas !== bHas) return bHas - aHas;
      return allyCount[a] - allyCount[b];
    });
    let placed = false;
    for(const target of myPrimary){
      if(allyBB[target] === 0) continue;
      if(await tryApplyTracked(ship, target)){ placed = true; break; }
    }
    if(placed) continue;
    for(const target of myPrimary){
      if(await tryApplyTracked(ship, target)){ placed = true; break; }
    }
    if(placed) continue;
    // spd7+のみBarents追加投入
    if(ship.spd >= 7){
      if(await tryApplyTracked(ship, 'Barents')){ placed = true; }
    }
  }

  // 6.5) 北海への嫌がらせ: spd7+艦を1隻（追撃回避）
  const nsHasAlly = SHIPS.some(s => s.side === 'allies' && s.location === 'NorthSea' && !s.sunk);
  if(!nsHasAlly){
    const harassPool = SHIPS.filter(s => s.side === 'allies' && !s.sunk && !s.removed && !s.movedThisTurn && PORTS[s.location] && s.type !== 'CONVOY' && s.type !== 'CV' && s.country !== 'RU' && s.country !== 'US' && s.spd >= 7);
    harassPool.sort((a,b) => (a.atk + a.def) - (b.atk + b.def));
    for(const ship of harassPool){
      if(await tryApplyTracked(ship, 'NorthSea')) break;
    }
  }

  // 7) 余剰艦: spd7+のみBarents/NS、遅艦は安全海域へ
  const primaryFilled = primary.every(k => allyBB[k] >= (bbTarget[k]||0));
  if(primaryFilled){
    const surplus = SHIPS.filter(s => s.side === 'allies' && !s.sunk && !s.removed && !s.movedThisTurn && PORTS[s.location] && s.type !== 'CONVOY');
    for(const ship of surplus){
      if(ship.spd >= 7){
        if(await tryApplyTracked(ship, 'Barents')) continue;
        if(await tryApplyTracked(ship, 'NorthSea')) continue;
      } else {
        // 遅艦は安全海域へ（NA/SA/Med）
        const safe = ['NorthAtlantic','SouthAtlantic','Mediterranean'];
        for(const target of safe){
          if(await tryApplyTracked(ship, target)) break;
        }
      }
    }
  }

  // 修理: phase 4 で手動処理（AI自動修理なし）

  if(!simMode){
    document.getElementById('aiLog').innerHTML = aiLog.join('<br>');
  }
}

// 枢軸軍AI移動 + 修理
async function aiAxisMove(){
  const aiLog = [];
  // 連合艦の海域別 (Uボート除く)
  const allyShips = {};
  const allyStr = {}; // 戦力 (atk + def 合計)
  Object.keys(SEAS).forEach(k => {
    allyShips[k] = SHIPS.filter(s => s.side === 'allies' && s.location === k && !s.sunk && s.type !== 'UBOAT');
    allyStr[k] = allyShips[k].reduce((sum, s) => sum + s.atk + s.def, 0);
  });
  const convoy = {};
  Object.keys(SEAS).forEach(k => {
    convoy[k] = SHIPS.filter(s => s.type === 'CONVOY' && s.side === 'allies' && s.location === k && !s.sunk).length;
  });
  // 移動可能枢軸艦 (港にいる + 海域に残っている給油成功艦も含む、損傷艦は除外)
  const movable = SHIPS.filter(s =>
    s.side === 'axis' && !s.sunk && !s.removed && !s.movedThisTurn && (PORTS[s.location] || SEAS[s.location]) &&
    !(s.damage > 0)
  );
  // ドイツ水上艦 / イタリア / Uボート 分類
  const deShips = movable.filter(s => s.country === 'DE' && s.type !== 'UBOAT');
  const itShips = movable.filter(s => s.country === 'IT');
  const uboats = movable.filter(s => s.type === 'UBOAT');
  // 既配置枢軸戦力 (海域別)
  const placedStr = {};
  Object.keys(SEAS).forEach(k => {
    placedStr[k] = SHIPS.filter(s => s.side === 'axis' && s.location === k && !s.sunk && s.type !== 'UBOAT').reduce((sum, s) => sum + s.atk + s.def, 0);
  });

  // === ドイツ水上艦配置 ===
  // 港別の到達可能海域
  const portToSeas = (port) => PORT_SEAS[port] || [];
  // 必勝マージン: 連合戦力 + 5
  const winThreshold = (sea) => allyStr[sea] + 5;

  // 配置優先度を決定
  // 1. 北海・バルト = 最優先 (必勝戦力まで)
  // 2. バレンツ・北大西洋・南大西洋 はコンボイ位置で優先決定
  const priorityList = ['NorthSea', 'Baltic'];
  // コンボイがいる海域を勝率順 (連合戦力低い順) でリスト化
  const convoySeas = ['Barents', 'NorthAtlantic', 'SouthAtlantic'].filter(k => convoy[k] > 0);
  convoySeas.sort((a, b) => allyStr[a] - allyStr[b]); // 連合戦力低い順 = 勝率高い順
  // コンボイあり海域を優先リストに追加
  priorityList.push(...convoySeas);
  // 残りバレンツ (コンボイ無し時) は最後
  if(!convoy.Barents && !priorityList.includes('Barents')) priorityList.push('Barents');

  // ドイツ艦を BB > BC > PB > CA > CV の順で大型から配置
  const typeOrder = { BB: 0, BC: 1, PB: 2, CA: 3, CV: 4 };
  const sortedDe = [...deShips].sort((a, b) => (typeOrder[a.type] ?? 5) - (typeOrder[b.type] ?? 5));

  for(const ship of sortedDe){
    const reachable = portToSeas(ship.location);
    // 優先度順で必勝戦力に未達の海域を探す
    let dest = null;
    for(const target of priorityList){
      if(!reachable.includes(target)) continue;
      if(placedStr[target] < winThreshold(target)){
        dest = target;
        break;
      }
    }
    // 優先海域全部が必勝達成済みなら、コンボイ無しバレンツに余裕配置
    if(!dest && reachable.includes('Barents') && placedStr.Barents < allyStr.Barents + 3){
      dest = 'Barents';
    }
    if(!dest) continue; // 配置先無し → 港待機
    ship.location = dest;
    ship.movedThisTurn = true;
    placedStr[dest] += ship.atk + ship.def;
    aiLog.push(`${ship.name} → ${SEA_LABEL[dest]}`);
  }

  // === イタリア配置 ===
  const itTotalStr = itShips.reduce((sum, s) => sum + s.atk + s.def, 0);
  const medAllyStr = allyStr.Mediterranean;
  // 攻撃判定: 1.1倍以上で出撃 / 2.0倍以上で積極攻撃 (CAも南大西洋等へ展開)
  if(itTotalStr >= medAllyStr * 1.1){
    const aggressive = itTotalStr >= medAllyStr * 2.0;
    for(const ship of itShips){
      if(!portToSeas(ship.location).includes('Mediterranean')) continue;
      // 積極攻撃: CAは南大西洋の連合艦が弱いなら派遣
      if(aggressive && ship.type === 'CA' && allyStr.SouthAtlantic < itShips.filter(s => s.type==='CA').reduce((sum, s)=>sum+s.atk+s.def,0)){
        // CAのみ南大西洋へ
        ship.location = 'SouthAtlantic';
        ship.movedThisTurn = true;
        aiLog.push(`${ship.name} → 南大西洋 (積極攻撃)`);
        continue;
      }
      ship.location = 'Mediterranean';
      ship.movedThisTurn = true;
      aiLog.push(`${ship.name} → 地中海 (出撃)`);
    }
    if(aggressive) aiLog.push(`イタリア: 積極攻撃モード (戦力${itTotalStr} vs 連合${medAllyStr})`);
  } else {
    aiLog.push(`イタリア: 出撃見送り (戦力${itTotalStr} vs 連合${medAllyStr})`);
  }

  // === Uボート配置 ===
  const uboatsInPortCount = SHIPS.filter(s => s.type === 'UBOAT' && s.location === 'Germany' && !s.sunk && !s.removed).length;
  // 連合のASW戦力推定: 連合艦数 (CV/CONVOY=3, 他=1) per sea
  const aswDice = (sea) => allyShips[sea].reduce((sum, s) => sum + ((s.type === 'CV' || s.type === 'CONVOY') ? 3 : 1), 0);
  // バレンツ海のコンボイ最優先
  let uTarget = null;
  if(convoy.Barents > 0){
    uTarget = 'Barents';
  } else if(uboatsInPortCount >= 7){
    // 7隻溜まったら他のコンボイ海域 or ドイツ攻撃エリア
    if(convoy.NorthAtlantic > 0) uTarget = 'NorthAtlantic';
    else if(convoy.SouthAtlantic > 0) uTarget = 'SouthAtlantic';
    else {
      // ドイツ艦の集中先を探す
      const deSeas = ['NorthSea', 'Baltic', 'Barents', 'NorthAtlantic'];
      const deTarget = deSeas.find(k => placedStr[k] > allyStr[k]);
      uTarget = deTarget;
    }
  }
  if(uTarget){
    // ASW期待損失を試算: aswDice * 1/6 = 撃沈期待数
    const expectedSunk = aswDice(uTarget) / 6;
    const uboatsAvail = uboats.filter(s => portToSeas(s.location).includes(uTarget));
    if(uboatsAvail.length > expectedSunk){
      // 攻撃可能性ある
      for(const u of uboatsAvail){
        u.location = uTarget;
        u.movedThisTurn = true;
        aiLog.push(`${u.name} → ${SEA_LABEL[uTarget]}`);
      }
    } else {
      aiLog.push(`Uボート: ${SEA_LABEL[uTarget]} 出撃見送り (ASW${aswDice(uTarget)}ダイス)`);
    }
  } else {
    aiLog.push(`Uボート: 温存 (港${uboatsInPortCount}隻)`);
  }

  // 修理: phase 4 で手動処理（AI自動修理なし）

  placeAllShips();
  if(!simMode){
    document.getElementById('moveStatus').innerHTML = aiLog.join('<br>');
  }
}

// 枢軸の簡易AI（シミュレーション用）
function simulateAxisMove(){
  const alliedBalCount = SHIPS.filter(s => s.side === 'allies' && s.location === 'Baltic' && !s.sunk).length;
  const alliedNSCount = SHIPS.filter(s => s.side === 'allies' && s.location === 'NorthSea' && !s.sunk).length;
  const dePool = SHIPS.filter(s => s.country === 'DE' && s.type !== 'UBOAT' && !s.sunk && !s.removed && PORTS[s.location]);
  // バルト: 連合と同数
  let toBal = 0;
  for(const s of dePool){
    if(toBal >= alliedBalCount) break;
    s.location = 'Baltic'; s.movedThisTurn = true; toBal++;
  }
  // 北海: 連合と同数
  let toNS = 0;
  for(const s of dePool){
    if(s.movedThisTurn) continue;
    if(toNS >= alliedNSCount) break;
    s.location = 'NorthSea'; s.movedThisTurn = true; toNS++;
  }
  // 残り: ランダムでNA/SA/Bar/NSに集中
  const concChoices = ['NorthAtlantic','SouthAtlantic','Barents','NorthSea'];
  const concentrate = concChoices[Math.floor(Math.random()*concChoices.length)];
  for(const s of dePool){
    if(s.movedThisTurn) continue;
    s.location = concentrate; s.movedThisTurn = true;
  }
  // Uボート: 集中先と同じ
  SHIPS.filter(s => s.type === 'UBOAT' && !s.sunk && !s.removed && s.location === 'Germany').forEach(s => {
    s.location = concentrate; s.movedThisTurn = true;
  });
  // IT: 地中海
  SHIPS.filter(s => s.country === 'IT' && !s.sunk && !s.removed && s.location === 'Italy').forEach(s => {
    s.location = 'Mediterranean'; s.movedThisTurn = true;
  });
  return concentrate;
}

// 100回シミュレーション
async function runSimulation100(){
  const N = 100;
  const results = [];
  const concDist = {};
  // 元の状態保存
  const savedShips = SHIPS.map(s => ({...s}));
  const savedPoc = poc;
  const savedTurn = currentTurn;
  const savedLba = {...lbaUsed};
  const savedSeaCtrl = {...seaControl};
  const savedRetreat = new Set(retreatedSeas);

  simMode = true;
  try {
    for(let i=0; i<N; i++){
      // ターン5・無傷・全艦母港にリセット
      SHIPS.forEach((s, idx) => {
        const o = savedShips[idx];
        Object.assign(s, o);
        s.location = s.homePort;
        s.damage = 0; s.sunk = false; s.removed = false; s.atDock = false;
        s.movedThisTurn = false; s.disabled = false; s.disabledThisTurn = false;
        s.atk = s.atkOrig; s.spd = s.spdOrig;
        s.turnsAtSea = 0; s.failedMove = false; s.usEntered = false;
        s.refuelTurn = undefined; s.arrivedNeutralTurn = undefined;
      });
      currentTurn = 5;
      Object.keys(seaControl).forEach(k => delete seaControl[k]);
      lbaUsed.allies = false; lbaUsed.axis = false;
      retreatedSeas.clear();

      // 連合AI移動
      await aiAlliedMove();
      // 枢軸移動
      const conc = simulateAxisMove();
      concDist[conc] = (concDist[conc]||0) + 1;
      // 戦闘解決
      const evs = [];
      resolveAllCombat(evs);
      // POC計算
      let pocChange = 0;
      Object.keys(SEAS).forEach(k => {
        const ships = SHIPS.filter(s => s.location === k && !s.sunk);
        const al = ships.some(s => s.side === 'allies' && s.type !== 'UBOAT');
        const ax = ships.some(s => s.side === 'axis' && s.type !== 'UBOAT');
        const ub = ships.some(s => s.type === 'UBOAT');
        if(al && !ax && !ub) pocChange += SEAS[k].allies;
        else if(ax && !al) pocChange -= SEAS[k].axis;
        else if(ub && !ax && !al) pocChange -= SEAS[k].axis;
      });
      results.push(pocChange);
    }
  } finally {
    simMode = false;
    // 状態復元
    SHIPS.forEach((s, idx) => {
      const o = savedShips[idx];
      Object.keys(s).forEach(k => delete s[k]);
      Object.assign(s, o);
    });
    poc = savedPoc; currentTurn = savedTurn;
    Object.keys(seaControl).forEach(k => delete seaControl[k]);
    Object.assign(seaControl, savedSeaCtrl);
    lbaUsed.allies = savedLba.allies; lbaUsed.axis = savedLba.axis;
    retreatedSeas.clear();
    savedRetreat.forEach(s => retreatedSeas.add(s));
    placeAllShips();
    updatePOC();
  }

  const avg = results.reduce((a,b)=>a+b,0) / results.length;
  const min = Math.min(...results);
  const max = Math.max(...results);
  const win = results.filter(r => r > 0).length;
  const lose = results.filter(r => r < 0).length;
  const draw = results.filter(r => r === 0).length;
  const distLog = Object.entries(concDist).map(([k,v]) => `${SEA_LABEL[k]||k}:${v}`).join(' / ');
  alert(`100回シミュレーション結果:\n平均POC: ${avg.toFixed(2)}\n最小: ${min}  最大: ${max}\n連合勝(POC>0): ${win}回\n引分: ${draw}回\n枢軸勝: ${lose}回\n枢軸集中先分布: ${distLog}`);
}

// === 連合配置 ルールベース ===
// コンボイあり: 北海=ドイツ艦数+1〜2(強い順), バレンツ=CV/CA全派遣, NA=余艦全派遣, SA=単独CA1隻
// コンボイなし: NA/Bar=単独CA1隻, SA=単独CA1隻, 北海=残艦
//   北海でドイツ艦数 > 連合艦数なら捨てる → 余艦 NA+Bar:SA = 7:3
function computeAlliedConfig(){
  const config = {};
  const movableShips = SHIPS.filter(s =>
    s.side === 'allies' && !s.sunk && !s.removed &&
    s.location && PORTS[s.location] && s.type !== 'CONVOY' &&
    s.location !== 'Malta' &&
    !(s.country === 'US' && currentTurn < 4) &&
    !(s.damage > 0)
  );
  const cvs = movableShips.filter(s => s.type === 'CV');
  const cas = movableShips.filter(s => s.type === 'CA');
  const bbs = movableShips.filter(s => s.type === 'BB' || s.type === 'BC');
  const sortByWeak = arr => [...arr].sort((a, b) => {
    const ta = (a.atk||0) + (a.def||0);
    const tb = (b.atk||0) + (b.def||0);
    if(ta !== tb) return ta - tb;
    return (a.spd||0) - (b.spd||0);
  });
  const sortByStrong = arr => [...arr].sort((a, b) => {
    const ta = (a.atk||0) + (a.def||0);
    const tb = (b.atk||0) + (b.def||0);
    if(tb !== ta) return tb - ta;
    return (b.spd||0) - (a.spd||0);
  });
  const casByWeak = sortByWeak(cas);
  const bbsByWeak = sortByWeak(bbs);
  const reachable = (s, sea) => {
    if(s.country === 'US' && s.type !== 'CONVOY' && sea !== 'NorthAtlantic') return false;
    return (PORT_SEAS[s.location] || []).includes(sea);
  };
  const reachableTwoHops = (s, dest) => {
    if(s.country === 'US' && s.type !== 'CONVOY' && dest !== 'NorthAtlantic') return false;
    if(reachable(s, dest)) return true;
    if(s.spd < 7) return false;
    const adjacent = PORT_SEAS[s.location] || [];
    return adjacent.some(mid => (SEA_ADJ[mid] || []).includes(dest));
  };

  // ドイツ艦数（ドイツ/フランス在泊・無傷）とコンボイ位置
  const deShipCount = SHIPS.filter(s =>
    s.country === 'DE' && !s.sunk && !s.removed && s.type !== 'UBOAT' &&
    s.damage === 0 && (s.location === 'Germany' || s.location === 'France')
  ).length;
  const convoysAtBar = SHIPS.filter(s => s.type === 'CONVOY' && s.location === 'Barents' && !s.sunk && !s.removed).length;
  const convoysAtNA = SHIPS.filter(s => s.type === 'CONVOY' && s.location === 'NorthAtlantic' && !s.sunk && !s.removed).length;
  const convoysToBar = SHIPS.filter(s => s.type === 'CONVOY' && s.location === 'NorthAtlantic' && !s.sunk && !s.removed && (s.turnsAtSea||0) >= 1).length;
  const hasBarConvoy = convoysAtBar > 0 || convoysToBar > 0;
  const hasConvoy = convoysAtBar > 0 || convoysAtNA > 0;

  // SA: フランス/中立にいるドイツ艦と同数を配置（弱い艦優先）
  const deAtFranceNeutral = SHIPS.filter(s =>
    s.country === 'DE' && !s.sunk && !s.removed && s.type !== 'UBOAT' &&
    (s.location === 'France' || s.location === 'Neutral')
  ).length;
  if(deAtFranceNeutral > 0){
    const saCandidates = sortByWeak([...cas, ...bbs]).filter(s => !config[s.id] && reachable(s, 'SouthAtlantic'));
    let saPlaced = 0;
    for(const s of saCandidates){
      if(saPlaced >= deAtFranceNeutral) break;
      config[s.id] = 'SouthAtlantic';
      saPlaced++;
    }
  }

  // バレンツ: コンボイがバレンツにいる/今ターン到着予定の時のみ CV/CA 全派遣（それ以外は配置しない）
  if(hasBarConvoy){
    cvs.forEach(s => { if(!config[s.id] && reachableTwoHops(s, 'Barents')) config[s.id] = 'Barents'; });
    cas.forEach(s => { if(!config[s.id] && reachableTwoHops(s, 'Barents')) config[s.id] = 'Barents'; });
  }
  // NA: コンボイなしの時は単独 CA 1隻
  if(!hasConvoy){
    let shipForNA = casByWeak.find(s => reachable(s, 'NorthAtlantic') && !config[s.id]);
    if(!shipForNA) shipForNA = bbsByWeak.find(s => reachable(s, 'NorthAtlantic') && !config[s.id]);
    if(shipForNA) config[shipForNA.id] = 'NorthAtlantic';
  }

  // 北海: ドイツ攻撃力(独/仏在泊・無傷DE艦)以上の攻撃力になるまで配置（強い艦優先）+ 追加で艦種問わず1隻
  const deAtkSum = SHIPS.filter(s =>
    s.country === 'DE' && !s.sunk && !s.removed && s.type !== 'UBOAT' &&
    s.damage === 0 && (s.location === 'Germany' || s.location === 'France')
  ).reduce((sum, s) => sum + (s.atk||0), 0);
  const reachableForNS = (s) => !config[s.id] && reachable(s, 'NorthSea');
  let nsAtkSum = 0;
  for(const s of sortByStrong(bbs.filter(reachableForNS))){
    if(nsAtkSum >= deAtkSum) break;
    config[s.id] = 'NorthSea';
    nsAtkSum += (s.atk||0);
  }
  if(nsAtkSum < deAtkSum){
    for(const s of sortByStrong([...cvs, ...cas].filter(reachableForNS))){
      if(nsAtkSum >= deAtkSum) break;
      config[s.id] = 'NorthSea';
      nsAtkSum += (s.atk||0);
    }
  }
  // 追加 +1隻: 艦種問わず到達可能な艦から1隻（強い順）
  const extra = sortByStrong([...bbs, ...cvs, ...cas].filter(reachableForNS))[0];
  if(extra) config[extra.id] = 'NorthSea';

  // アメリカ来訪時: NAに到着済みの US 戦闘艦と同数のUK艦を NS（barConvoyありなら Barents 可）へ追加配置
  const usCount = SHIPS.filter(s =>
    s.country === 'US' && s.type !== 'CONVOY' && !s.sunk && !s.removed && s.location === 'NorthAtlantic'
  ).length;
  if(usCount > 0){
    let placed = 0;
    const ukAvail = sortByStrong(movableShips.filter(s => s.country === 'UK' && !config[s.id]));
    for(const s of ukAvail){
      if(placed >= usCount) break;
      if(convoysAtBar > 0 && reachableTwoHops(s, 'Barents')){
        config[s.id] = 'Barents';
        placed++;
      } else if(reachable(s, 'NorthSea')){
        config[s.id] = 'NorthSea';
        placed++;
      }
    }
  }

  // 余艦: NA / SA に均等配置（北海連合支配の場合 SA は1ユニットまで）バレンツは対象外
  const distTargets = ['NorthAtlantic', 'SouthAtlantic'];
  const distCounts = { NorthAtlantic: 0, SouthAtlantic: 0 };
  Object.values(config).forEach(sea => {
    if(distCounts[sea] !== undefined) distCounts[sea]++;
  });
  const frenchDeCount = SHIPS.filter(s =>
    s.country === 'DE' && !s.sunk && !s.removed && s.type !== 'UBOAT' &&
    s.damage === 0 && s.location === 'France'
  ).length;
  const saLimit = (seaControl['NorthSea'] === 'allies') ? (frenchDeCount + 1) : Infinity;
  for(const ship of movableShips.filter(s => !config[s.id])){
    const sortedTargets = [...distTargets].sort((a, b) => distCounts[a] - distCounts[b]);
    for(const t of sortedTargets){
      if(t === 'SouthAtlantic' && distCounts.SouthAtlantic >= saLimit) continue;
      if(reachable(ship, t)){
        config[ship.id] = t;
        distCounts[t]++;
        break;
      }
    }
  }

  // ログ
  const dist = {};
  Object.values(config).forEach(sea => { dist[sea] = (dist[sea]||0) + 1; });
  console.log(`[配置決定] コンボイ=${hasConvoy?'あり':'なし'} ドイツ艦=${deShipCount} 配置=${JSON.stringify(dist)} 配置艦=${Object.keys(config).length}隻`);
  return config;
}

// === 連合配置 真のモンテカルロ（各艦を完全ランダム配置 N=500回試行） ===
// 戻り値: bestConfig = { shipId: 'NorthSea' | 'NorthAtlantic' | ... }
async function selectBestAlliedPattern(){
  const N = 500;
  // 状態保存
  const savedShips = SHIPS.map(s => ({...s}));
  const savedPoc = poc;
  const savedTurn = currentTurn;
  const savedLba = {...lbaUsed};
  const savedSeaCtrl = {...seaControl};
  const savedRetreat = new Set(retreatedSeas);

  // 配置候補艦と各艦の reachable 海域（コンボイ・Malta艦・Russia艦・US艦(T<4)は除外）
  const targetSeas = ['NorthSea', 'NorthAtlantic', 'SouthAtlantic', 'Barents'];
  const movableShips = SHIPS.filter(s =>
    s.side === 'allies' && !s.sunk && !s.removed &&
    s.location && PORTS[s.location] && s.type !== 'CONVOY' &&
    s.location !== 'Malta' &&
    !(s.country === 'US' && currentTurn < 4)
  );
  const shipReachable = movableShips.map(s => ({
    id: s.id,
    reachable: (PORT_SEAS[s.location] || []).filter(sea => targetSeas.includes(sea))
  })).filter(s => s.reachable.length > 0);

  let bestPoc = -Infinity;
  let bestConfig = null;
  simMode = true;
  try {
    for(let i = 0; i < N; i++){
      // 艦リセット
      SHIPS.forEach((s, idx) => {
        const o = savedShips[idx];
        Object.keys(s).forEach(k => delete s[k]);
        Object.assign(s, o);
      });
      Object.keys(seaControl).forEach(k => delete seaControl[k]);
      lbaUsed.allies = false; lbaUsed.axis = false;
      retreatedSeas.clear();

      // 各艦の配置先をランダム決定
      const config = {};
      for(const sr of shipReachable){
        config[sr.id] = sr.reachable[Math.floor(Math.random() * sr.reachable.length)];
      }

      // 配置適用
      for(const shipId in config){
        const ship = SHIPS.find(s => s.id === shipId);
        if(!ship) continue;
        ship.location = config[shipId];
        ship.movedThisTurn = true;
      }

      // 枢軸移動・戦闘
      simulateAxisMove();
      const evs = [];
      resolveAllCombat(evs);

      // POC計算
      let pocChange = 0;
      Object.keys(SEAS).forEach(k => {
        const ships = SHIPS.filter(s => s.location === k && !s.sunk);
        const al = ships.some(s => s.side === 'allies' && s.type !== 'UBOAT');
        const ax = ships.some(s => s.side === 'axis' && s.type !== 'UBOAT');
        const ub = ships.some(s => s.type === 'UBOAT');
        if(al && !ax && !ub) pocChange += SEAS[k].allies;
        else if(ax && !al) pocChange -= SEAS[k].axis;
        else if(ub && !ax && !al) pocChange -= SEAS[k].axis;
        else if(!al && !ax && !ub) pocChange -= SEAS[k].axis; // ガラ空きは枢軸支配扱い
      });

      if(pocChange > bestPoc){
        bestPoc = pocChange;
        bestConfig = {...config};
      }
    }
  } finally {
    simMode = false;
    // 状態復元
    SHIPS.forEach((s, idx) => {
      const o = savedShips[idx];
      Object.keys(s).forEach(k => delete s[k]);
      Object.assign(s, o);
    });
    poc = savedPoc;
    currentTurn = savedTurn;
    Object.keys(seaControl).forEach(k => delete seaControl[k]);
    Object.assign(seaControl, savedSeaCtrl);
    lbaUsed.allies = savedLba.allies;
    lbaUsed.axis = savedLba.axis;
    retreatedSeas.clear();
    savedRetreat.forEach(s => retreatedSeas.add(s));
  }
  // 配置数の集計（ログ用）
  const distLog = {};
  if(bestConfig) Object.values(bestConfig).forEach(sea => { distLog[sea] = (distLog[sea]||0) + 1; });
  console.log(`[モンテカルロ] N=${N}試行 最良POC=${bestPoc} 配置数=${JSON.stringify(distLog)} 配置艦=${Object.keys(bestConfig||{}).length}隻`);
  return bestConfig;
}

function setupTest(){
  // 全艦リセット
  SHIPS.forEach(s => {
    s.location = s.homePort;
    s.damage = 0;
    s.disabled = false;
    s.sunk = false;
    s.atk = s.atkOrig;
    s.spd = s.spdOrig;
    s.failedMove = false;
    s.movedThisTurn = false;
    s.originThisTurn = null;
  });
  // 地中海: イタリア艦隊 全部
  const italians = SHIPS.filter(s => s.country === 'IT' && !s.enterTurn);
  italians.forEach(s => s.location = 'Mediterranean');
  // 地中海: イタリアと同数のイギリス艦（CV以外から優先）
  const ukNonCv = SHIPS.filter(s => s.country === 'UK' && !s.enterTurn && s.type !== 'CV');
  ukNonCv.slice(0, italians.length).forEach(s => s.location = 'Mediterranean');
  // 地中海: 英国空母 1隻
  const ukCv = SHIPS.find(s => s.country === 'UK' && !s.enterTurn && s.type === 'CV');
  if(ukCv) ukCv.location = 'Mediterranean';
  placeAllShips();
  renderLocShipList(); renderSeaResetButtons();
  document.getElementById('moveStatus').textContent =
    `テスト配置: 地中海にイタリア艦${italians.length}・イギリス艦${italians.length}+空母1`;
}

function executeMove(){
  if(!selectedShipIds.length || !selectedDest){
    alert('艦と移動先を選択してください');
    return;
  }
  const log = [];
  selectedShipIds.forEach(id=>{
    const s = SHIPS.find(x => x.id === id);
    if(!s) return;
    // 15.2 ロシア艦は5/6で出港
    if(s.country === 'RU'){
      const r = rollD6();
      if(r < 5){
        log.push(`${s.name}: 出港判定⚂${r}<5 失敗 → 移動不可`);
        s.movedThisTurn = true; // 試みたので移動済み扱い
        return;
      }
      log.push(`${s.name}: 出港判定⚂${r}≥5 成功`);
    }
    // 15.3 米国艦はターン4以降、6で永続投入
    if(s.country === 'US' && s.type !== 'CONVOY'){
      if(currentTurn < 4){
        log.push(`${s.name}: ターン4以降に出撃可`);
        s.movedThisTurn = true;
        return;
      }
      if(!s.usEntered){
        const r = rollD6();
        if(r !== 6){
          log.push(`${s.name}: 投入判定⚂${r}≠6 失敗`);
          s.movedThisTurn = true;
          return;
        }
        s.usEntered = true;
        log.push(`${s.name}: 投入判定⚂${r}=6 成功(永続)`);
      }
    }
    const origin = s.location;
    const dest = selectedDest;
    // 移動済みフラグ＆起点記憶
    if(!s.originThisTurn) s.originThisTurn = origin;
    s.movedThisTurn = true;
    // 隣接判定
    let adj = [];
    if(PORTS[origin]) adj = PORT_SEAS[origin] || [];
    else if(SEAS[origin]) adj = SEA_ADJ[origin] || [];
    const isAdjacent = adj.includes(dest);
    const isPortDest = !!PORTS[dest];
    if(s.type === 'UBOAT'){
      // 6.5 Uボートはどこでも自由配置、判定なし
      s.location = dest;
      if(dest === 'Neutral') s.arrivedNeutralTurn = currentTurn;
      log.push(`${s.name}: Uボート → ${locLabel(dest)}`);
    } else if(isAdjacent || isPortDest){
      // 1海域 or 港湾帰還: 判定なし
      s.location = dest;
      if(dest === 'Neutral') s.arrivedNeutralTurn = currentTurn;
      log.push(`${s.name}: → ${locLabel(dest)}`);
    } else {
      // 2海域: ダイス判定 (出目 < 速力 = 成功)
      const roll = rollD6();
      const ok = roll < s.spd;
      if(ok){
        s.location = dest;
        log.push(`${s.name}: 2海域 ⚂${roll}<${s.spd} 成功 → ${locLabel(dest)}`);
      } else {
        s.location = s.homePort || origin;
        s.failedMove = true; // このターンは再配置不可
        log.push(`${s.name}: 2海域 ⚂${roll}≥${s.spd} 失敗 → ${locLabel(s.location)}へ帰還(配置不可)`);
      }
    }
  });
  selectedShipIds = [];
  selectedDest = null;
  placeAllShips();
  renderLocShipList(); renderDestButtons(); renderStatus(); renderSeaResetButtons();
  // ログ表示
  document.getElementById('moveStatus').innerHTML = log.join('<br>');
}

function getLocCoord(loc){
  if(!loc) return null;
  if(loc.startsWith('T')){
    const t = +loc.slice(1);
    return TURN_BOX[t] || null;
  }
  return PORT_COORDS[loc] || SEA_COORDS[loc] || null;
}

// 海域内では陣営/タイプ別の位置を返す
function getShipCoord(ship){
  const loc = ship.location;
  if(!loc) return null;
  if(SEAS[loc]){
    const positions = SEA_POSITIONS[loc];
    if(positions){
      let sub;
      if(ship.type === 'UBOAT')      sub = 'uboat';
      else if(ship.type === 'CONVOY') sub = 'convoy';
      else if(ship.side === 'allies') sub = 'allies';
      else                            sub = 'axis';
      if(positions[sub]) return positions[sub];
    }
    return SEA_COORDS[loc];
  }
  // 港: atDock なら修理ドック座標
  const portCoord = PORT_COORDS[loc];
  if(portCoord && ship.atDock && portCoord.repairX !== undefined){
    return { x: portCoord.repairX, y: portCoord.repairY };
  }
  return getLocCoord(loc);
}

// 陣営/タイプ別の配置キー（海域は陣営毎に分割）
function getPlaceKey(ship){
  const loc = ship.location;
  if(!loc) return null;
  if(SEAS[loc]){
    let sub;
    if(ship.type === 'UBOAT')      sub = 'uboat';
    else if(ship.type === 'CONVOY') sub = 'convoy';
    else if(ship.side === 'allies') sub = 'allies';
    else                            sub = 'axis';
    return `${loc}:${sub}`;
  }
  return loc;
}

function placeAllShips(){
  renderAxisList(); // 撃沈反映
  renderAlliesList();
  const inner = document.getElementById('mapInner');
  inner.querySelectorAll('.tt-ship').forEach(e => e.remove());
  Object.keys(stacks).forEach(k => delete stacks[k]);

  // place key（海域内で陣営/タイプ別に分割）でグルーピング
  const byKey = {};
  SHIPS.forEach(s => {
    if(!s.location || s.sunk || s.removed) return;
    const key = getPlaceKey(s);
    (byKey[key] ||= []).push(s);
  });
  for(const key in byKey){
    const ship0 = byKey[key][0];
    const c = getShipCoord(ship0);
    if(!c) continue;
    const isTrack = key.startsWith('T') && !key.includes(':');
    const w = isTrack ? COUNTER_W : PORT_COUNTER_W;
    placeStack(key, locLabel(ship0.location), byKey[key], c.x, c.y, w);
  }
}

function runFastCombat(){

  console.trace();
  const events = [];
  const start = performance.now();
  resolveAllCombat(events);
  const elapsed = performance.now() - start;
  let sunkAllies = 0, sunkAxis = 0, dmgAllies = 0, dmgAxis = 0;
  events.forEach(e => {
    const s = SHIPS.find(x => x.id === e.ship);
    if(!s) return;
    if(e.type === 'sunk'){
      if(s.side === 'allies') sunkAllies++; else sunkAxis++;
    } else if(e.type === 'damage'){

    }
  });
  placeAllShips();

    `高速戦闘完了 (${elapsed.toFixed(1)}ms) - 撃沈: 連合${sunkAllies}/枢軸${sunkAxis} 損害: 連合${dmgAllies}/枢軸${dmgAxis}`;
}

function endTurn(){
  const log = [];
  const wasAtLastTurn = currentTurn >= 8; // ターン8終了時のみ true（ゲーム終了表示用）
  // 海域支配は phase 7 で設定済み（前ターン維持ルール含む）、ここでは触らない
  // POC加算（5.8）: 海域支配POCはphase 9で加算済み、ここでは中立残留・船団上陸のみ
  let delta = 0;
  // 16. ドイツ艦の給油: phase 8 で自動判定するように移動済み（ここでは何もしない）

  // 17.2 中立港の残留ペナルティ（到着ターン以外、毎ターン1艦1POC損失）
  SHIPS.forEach(s => {
    if(s.location !== 'Neutral' || s.sunk || s.removed) return;
    if(s.arrivedNeutralTurn === currentTurn) return; // 到着ターンは免除
    if(s.side === 'allies'){
      delta -= 1; // 連合-1POC = カウンタ-1
      log.push(`${s.name} 中立港残留 → 連合 -1POC`);
    } else if(s.side === 'axis'){
      delta += 1; // 枢軸-1POC = カウンタ+1
      log.push(`${s.name} 中立港残留 → 枢軸 -1POC`);
    }
  });

  // 14. 船団の上陸（AI判断: 基本ロシアを目指すので英国は上陸しない）
  SHIPS.forEach(s => {
    if(s.type !== 'CONVOY' || s.sunk || s.removed) return;
    if(s.location === 'Barents'){
      // ロシア自動上陸 +3POC
      s.removed = true; s.location = null;
      delta += 3;
      log.push(`船団 ${s.name} ロシア上陸 +3POC(連合)`);
    }
    // NA留まり: 次ターンBarentsへ進ませる（英国上陸はしない）
  });
  const pocBeforeEnd = poc;
  poc = Math.max(-10, Math.min(10, poc + delta));
  console.log(`[POC] endTurn delta=${delta} poc ${pocBeforeEnd} → ${poc} (中立港・コンボイ分)`);
  log.push(`POC変動: ${delta>=0?'+':''}${delta} → 累計${poc>=0?'+':''}${poc}`);

  // 3) フラグ解除と船団のターン経過カウント（帰還は phase 8 で完結）
  SHIPS.forEach(s => {
    s.failedMove = false;
    s.movedThisTurn = false;
    s.originThisTurn = null;
    s.disabledThisTurn = false;
    // 一度マルタに移動した UK 艦は homePort を Malta に固定
    if(s.country === 'UK' && s.location === 'Malta'){
      s.homePort = 'Malta';
    }
    // 船団のターン経過カウント
    if(s.type === 'CONVOY' && !s.removed){
      if(s.location && SEAS[s.location]) s.turnsAtSea = (s.turnsAtSea || 0) + 1;
      else s.turnsAtSea = 0;
    }
  });

  // LBA使用フラグリセット
  lbaUsed.allies = false;
  lbaUsed.axis = false;
  // 戦闘完了フラグリセット
  combatDone.uboat.clear();
  combatDone.surface.clear();
  // 撤退海域フラグリセット
  retreatedSeas.clear();

  // 4) 支配マーカー更新
  placeControlMarkers();

  // 5) ターン進行（5.9）
  if(currentTurn < 8){
    currentTurn++;
    document.getElementById('turnLabel').textContent = currentTurn;
  } else {
    log.push('ゲーム終了');
  }
  // 6) ターントラック処理 / US 戦闘艦は1回ロール統一（6で北大西洋直行、失敗で T+1）
  //    ターン8終了時もここを実行 → T_n に残った艦に最終判定機会を与える
  const usResults = [];
  SHIPS.forEach(s => {
    if(s.location && s.location.startsWith('T')){
      const t = parseInt(s.location.slice(1));
      if(t <= currentTurn){
        if(s.country === 'US' && (s.type === 'BB' || s.type === 'CA')){
          const r = rollD6();
          if(r === 6){
            s.location = 'NorthAtlantic';
            s.homePort = HOME_PORT[s.country] || 'USA';
            s.usEntered = true;
            const line = `${s.name}: 出撃ロール⚂${r} 成功 → 北大西洋`;
            log.push(line); usResults.push(line);
          } else if(currentTurn < 8){
            s.location = 'T' + (currentTurn + 1);
            const line = `${s.name}: 出撃ロール⚂${r} 失敗 → T${currentTurn + 1}`;
            log.push(line); usResults.push(line);
          } else {
            // ターン8の最終判定で失敗 → 出撃せず終了
            const line = `${s.name}: 出撃ロール⚂${r} 失敗 (最終判定)`;
            log.push(line); usResults.push(line);
          }
        } else {
          const home = HOME_PORT[s.country] || null;
          s.location = home;
          s.homePort = home;
        }
      }
    }
  });
  if(usResults.length){
    alert('US 出撃判定:\n' + usResults.join('\n'));
  }
  // 6.5) Uボート総数が8以上なら超過分を削除（enterTurnが新しい順）— ターン進行時のみ
  if(currentTurn < 8 || phaseIdx >= 1){
    const allUboats = SHIPS.filter(s => s.type === 'UBOAT' && !s.sunk && !s.removed);
    if(allUboats.length >= 8){
      const sorted = allUboats.slice().sort((a,b) => (b.enterTurn || 0) - (a.enterTurn || 0));
      const excess = allUboats.length - 7;
      for(let i = 0; i < excess; i++){
        sorted[i].removed = true;
        sorted[i].location = null;
        log.push(`${sorted[i].name}: Uボート総数8隻以上のため削除`);
      }
    }
  }

  // 7) 描画
  phaseIdx = 1;
  renderPhaseBar();
  placeAllShips();
  renderPortButtons(); renderLocShipList(); renderDestButtons();
  renderStatus(); renderSeaResetButtons(); updatePOC();
  document.getElementById('moveStatus').innerHTML = log.join('<br>');

  // ターン8終了 → ゲーム終了 → 戦闘ログ自動表示（ターン7終了時の currentTurn=8 では表示しない）
  if(wasAtLastTurn){
    setTimeout(() => showCombatLog(), 200);
  }
}

      <div class="info">
        <div class="nm">${s.name}${enter}</div>
        <div class="sp">${s.country} / ${s.atkOrig}-${s.def}-${s.spdOrig} ${s.type}</div>
        ${statusHtml ? `<div style="font-size:0.85em;">${statusHtml}</div>` : ''}
      </div>
    </div>`;
  });
  html += `</div><button class="modal-close" onclick="closeModal()">閉じる</button>`;
  document.getElementById('modalBox').innerHTML = html;
  document.getElementById('modal').classList.add('show');
}
function closeModal(){
  document.getElementById('modal').classList.remove('show');
}
