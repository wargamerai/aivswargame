<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>海の戦い - War at Sea</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#0a1a2a; color:#fff; font-family:sans-serif; display:flex; flex-direction:column; height:100vh; overflow:hidden; }

#topbar {
  display:flex; align-items:center; gap:10px; padding:6px 10px;
  background:#13243a; border-bottom:2px solid #234; font-size:0.9em;
  flex-shrink:0;
}
#topbar h1 { font-size:1em; color:#88ccff; margin-right:6px; }

#main { flex:1; display:flex; min-height:0; }

#leftPane {
  width:260px; background:#13243a; border-right:1px solid #234;
  overflow-y:auto; font-size:0.85em; flex-shrink:0;
}
#leftPane h3 {
  padding:4px 8px; background:#3a1a2a; color:#ff8888;
  border-bottom:1px solid #234; font-size:0.95em;
}

#rightPane {
  width:260px; background:#13243a; border-left:1px solid #234;
  overflow-y:auto; font-size:0.85em; flex-shrink:0;
}
#rightPane h3 {
  padding:4px 8px; background:#1a3a5a; color:#88ccff;
  border-bottom:1px solid #234; font-size:0.95em;
}

.ship-entry {
  padding:3px 6px; border-bottom:1px dotted #234;
  display:flex; align-items:center; gap:6px; cursor:pointer;
}
.ship-entry:hover { background:#1a3a5a; }
.ship-entry.sel {
  background:#2a4a7a;
  border-left:4px solid #ffcc44;
  padding-left:6px;
}
.ship-entry img { width:28px; height:28px; image-rendering:pixelated; }
.ship-entry .name { font-weight:bold; font-size:0.85em; }
.ship-entry .spec { font-size:0.75em; color:#aac; }
.ship-entry.sunk {
  opacity:0.5; background:#3a0a0a; border-left:3px solid #ff4444;
}
.ship-entry.sunk .name { text-decoration:line-through; color:#ff8888; }
.ship-entry.sunk img { filter:grayscale(80%); }

.locBtn {
  background:#234; color:#fff; border:1px solid #456;
  padding:3px 8px; border-radius:3px; cursor:pointer;
  font-size:0.8em;
}
.locBtn:hover { background:#2266cc; }
.locBtn.sel { background:#3377dd; border-color:#88ccff; font-weight:bold; }
.locBtn.port { border-color:#6a8; }
.locBtn.sea  { border-color:#68a; }

#mapArea {
  flex:1; overflow:auto; background:#051020; position:relative;
}
#mapInner { display:inline-block; position:relative; }
#mapInner img#mapImg { max-width:none; display:block; }
.tt-ship {
  position:absolute;
  transform:translate(-50%,-50%); /* 座標は駒の中心 */
  cursor:pointer;
}
.tt-ship img {
  display:block; image-rendering:pixelated;
}
body.hide-units .tt-ship { display:none; }
body.hide-units .control-marker { display:none; }

.control-marker {
  position:absolute;
  transform:translate(-50%,-50%);
  pointer-events:none; z-index:0;
}
.control-marker img { display:block; opacity:0.85; }

/* 拡大モーダル */
#modal {
  position:fixed; top:0; left:0; right:0; bottom:0;
  background:rgba(0,0,0,0.85); display:none;
  align-items:center; justify-content:center; z-index:1000;
}
#modal.show { display:flex; }
.modal-box {
  background:#13243a; border:2px solid #234; border-radius:8px;
  padding:16px 20px; max-width:80%; max-height:85%;
  overflow:auto; min-width:600px;
}
.modal-box h3 { color:#88ccff; margin-bottom:10px; padding-bottom:6px; border-bottom:1px solid #234; }
.modal-grid {
  display:grid; grid-template-columns:1fr 1fr; gap:6px 20px;
}
.modal-ship {
  display:flex; align-items:center; gap:12px; padding:6px 4px;
  border-bottom:1px dotted #234;
}
.modal-ship img { width:64px; height:64px; image-rendering:pixelated; }
.modal-ship .info { flex:1; }
.modal-ship .info .nm { font-weight:bold; font-size:1em; color:#fff; }
.modal-ship .info .sp { font-size:0.85em; color:#aac; }
.modal-close {
  background:#2266cc; color:#fff; border:none; padding:6px 14px;
  border-radius:3px; cursor:pointer; font-weight:bold; margin-top:10px;
}

/* 戦闘モーダル */
#combatModal, #axisReturnModal {
  position:fixed; top:0; left:0; right:0; bottom:0;
  background:rgba(0,0,0,0.9); display:none;
  align-items:center; justify-content:center; z-index:1000;
}
#combatModal.show, #axisReturnModal.show { display:flex; }
#axisReturnTable { width:100%; border-collapse:collapse; color:#eee; font-size:0.9em; }
#axisReturnTable th { background:#234; color:#cde; padding:4px 8px; text-align:left; border-bottom:1px solid #456; }
#axisReturnTable td { padding:4px 8px; border-bottom:1px solid #234; vertical-align:middle; }
#axisReturnTable tr:hover td { background:#1a2230; }
#axisReturnTable .ret-btn { background:#345; color:#fff; border:1px solid #567; padding:3px 8px; margin:0 2px; border-radius:3px; cursor:pointer; font-size:0.85em; }
#axisReturnTable .ret-btn:hover:not(:disabled) { background:#456; border-color:#789; }
#axisReturnTable .ret-btn.refuel { background:#643; border-color:#864; }
#axisReturnTable .ret-btn.refuel:hover:not(:disabled) { background:#754; }
#axisReturnTable .ret-btn:disabled { background:#222; color:#666; border-color:#333; cursor:not-allowed; }
#axisReturnTable .ret-result { color:#ffcc44; font-weight:bold; }
.combat-box {
  background:#1a2a3a; border:2px solid #ffcc44; border-radius:8px;
  padding:14px 18px; width:90vw; max-width:1100px; max-height:88vh;
  display:flex; flex-direction:column;
}
.combat-box h3 { color:#ffcc44; margin-bottom:6px; padding-bottom:4px; border-bottom:1px solid #234; }
#phaseLabel {
  font-size:1.1em; color:#ffcc44; padding:6px 10px; margin:6px 0;
  background:rgba(255,204,68,0.1); border-radius:4px; min-height:1.5em;
}
.combat-grid { display:grid; grid-template-columns:1fr 1fr; gap:14px; flex:1; overflow-y:auto; }
.combat-col h4 {
  color:#fff; font-size:0.9em; padding:4px 8px; margin-bottom:6px;
  border-radius:3px;
}
.combat-col.allies h4 { background:#2a4a7a; }
.combat-col.axis h4   { background:#7a2a2a; }

.cs-row {
  display:grid;
  grid-template-columns:36px minmax(110px,auto) 1fr;
  grid-template-rows:auto auto;
  gap:1px 8px; align-items:center;
  padding:5px 6px; margin-bottom:4px;
  background:#0a1a2a; border-left:3px solid #234;
  font-size:0.85em; transition:all .3s;
}
.cs-row .cs-img { grid-column:1; grid-row:1/3; }
.cs-row img { width:36px; height:36px; image-rendering:pixelated; display:block; }
.cs-row .cs-name { grid-column:2; grid-row:1; font-weight:bold; white-space:nowrap; }
.cs-row .cs-status { grid-column:2; grid-row:2; font-size:0.85em; color:#cca; white-space:nowrap; }
.cs-row .cs-dice {
  grid-column:3; grid-row:1/3;
  display:flex; align-items:center; gap:3px; flex-wrap:wrap;
  min-width:0;
}
.cs-row .cs-dice:empty::before {
  content:''; display:inline-block;
}
.cs-row.firing { background:#1a3a5a; border-left-color:#88ccff; }
.cs-row.target { background:#3a1a2a; border-left-color:#ff6666; }
.cs-row.sunk   { opacity:0.4; background:#3a0a0a; }
.cs-row.disabled { opacity:0.6; background:#3a3a1a; border-left-color:#ffcc44; }
.cs-row.selectable {
  cursor:pointer;
  outline:2px solid #ffcc44;
  background:#2a3a5a;
}
.cs-row.selectable:hover {
  background:#3a5a8a;
  outline-color:#ffff66;
}

/* PG風 ダイス */
.dice {
  display:inline-flex; align-items:center; justify-content:center;
  width:34px; height:34px; line-height:1;
  background:#111; border:2px solid #c8a020; border-radius:6px;
  font-size:1.3em; font-weight:bold; color:#ff0;
  margin:0 2px; transition:border-color .15s, color .15s;
}
.dice.hit  { color:#ff6666; border-color:#ff6666; box-shadow:0 0 8px rgba(255,102,102,0.5); }
.dice.dis  { color:#ffcc44; border-color:#ffcc44; }
.dice.miss { color:#888;    border-color:#666;    }
.dice.dmg  { color:#ff8844; border-color:#ff8844; box-shadow:0 0 6px rgba(255,136,68,0.5); }
.dice.rolling {
  animation: shake 0.08s infinite;
  border-color:#f44; color:#fff;
}
@keyframes shake {
  0%,100% { transform:rotate(0deg) scale(1); }
  25% { transform:rotate(-10deg) scale(1.1); }
  75% { transform:rotate(10deg) scale(1.1); }
}
@keyframes flashHit {
  0%, 100% { background:#3a1a2a; }
  50% { background:#aa3333; }
}
.cs-row.flash { animation:flashHit .4s; }
.result-label {
  display:inline-block; padding:3px 10px; border-radius:4px;
  font-weight:bold; font-size:0.95em; margin-left:6px;
}
.result-label.miss     { background:#333;     color:#888; }
.result-label.disabled { background:#6a5a20;  color:#fd8; }
.result-label.hit      { background:#6a2020;  color:#f88; }
.result-label.sunk     { background:#800;     color:#fff; }

.zbtn {
  background:#234; color:#fff; border:1px solid #456;
  width:28px; height:24px; border-radius:3px; cursor:pointer;
  font-weight:bold; font-size:1em;
}
.zbtn:hover { background:#2266cc; }

.ph-cell {
  padding:2px 7px; background:#1a2a3a; color:#aac;
  border:1px solid #345; border-radius:3px; white-space:nowrap;
  font-size:0.85em;
}
.ph-cell.current { background:#ffcc44; color:#000; font-weight:bold; border-color:#fff; }
.ph-cell.done { background:#1a3a1a; color:#8c8; border-color:#4a6a4a; }
</style>
</head>
<body>

<div id="topbar">
  <h1>⚓ 海の戦い - War at Sea</h1>
  <label style="font-size:0.85em;">
    ターン:
    <button class="zbtn" onclick="changeTurn(-1)">−</button>
    <span id="turnLabel" style="display:inline-block;min-width:24px;text-align:center;font-weight:bold;color:#ffcc44;">1</span>
    <button class="zbtn" onclick="changeTurn(1)">＋</button>
  </label>
  <div id="phaseBar" style="display:flex;gap:2px;flex-wrap:wrap;font-size:0.7em;margin-left:8px;"></div>
  <button class="zbtn" onclick="advancePhase()" style="width:auto;padding:0 8px;font-size:0.8em;">次フェイズ▶</button>
  <button class="zbtn" onclick="endTurn()" style="width:auto;padding:0 12px;background:#883;font-weight:bold;">ターン終了</button>
  <span style="font-size:0.85em;color:#ffcc44;">POC:<span id="pocVal" style="font-weight:bold;margin-left:4px;">0</span></span>
  <span style="flex:1;"></span>
  <label style="font-size:0.85em;">
    ズーム:
    <button class="zbtn" onclick="setZoom(-10)">−</button>
    <input type="range" id="zoomSlider" min="20" max="150" value="70" step="5" style="width:120px;vertical-align:middle;">
    <button class="zbtn" onclick="setZoom(10)">＋</button>
    <span id="zoomLabel">70%</span>
  </label>
  <button class="zbtn" id="toggleUnits" onclick="toggleUnits()" style="width:auto;padding:0 10px;font-size:0.85em;">駒表示</button>
  <button class="zbtn" onclick="showCombatLog()" style="width:auto;padding:0 10px;font-size:0.85em;background:#557;display:none;">戦闘ログ</button>
  <label style="font-size:0.85em;margin-left:8px;display:none;">プレイ陣営:
    <select id="humanSideSelect" onchange="setHumanSide(this.value)" style="font-size:0.85em;">
      <option value="axis">枢軸</option>
      <option value="allies" disabled>連合（準備中）</option>
    </select>
  </label>
</div>

<div id="modal" onclick="if(event.target.id==='modal')closeModal()"><div class="modal-box" id="modalBox"></div></div>
<div id="combatLogModal" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.7);z-index:200;align-items:center;justify-content:center;">
  <div style="background:#0a1a2a;border:2px solid #456;border-radius:6px;width:80%;max-width:800px;max-height:80vh;display:flex;flex-direction:column;">
    <h3 style="margin:0;padding:8px 12px;background:#234;color:#cde;">戦闘ログ</h3>
    <div id="combatLogBody" style="overflow-y:auto;flex:1;padding:6px 8px;color:#eee;"></div>
    <div style="padding:6px 12px;text-align:right;background:#123;">
      <button onclick="hideCombatLog()" style="background:#456;color:#fff;border:none;padding:5px 14px;border-radius:4px;cursor:pointer;">閉じる</button>
    </div>
  </div>
</div>
<style>#combatLogModal.show{display:flex !important;}</style>
<div id="axisReturnModal">
  <div class="combat-box" style="max-width:900px;">
    <h3>枢軸艦 帰還フェイズ</h3>
    <div style="overflow-y:auto;flex:1;padding:6px 0;">
      <table id="axisReturnTable">
        <thead><tr><th>艦名</th><th>現在地</th><th>帰還先 / 洋上補給</th></tr></thead>
        <tbody id="axisReturnBody"></tbody>
      </table>
    </div>
  </div>
</div>
<div id="combatModal">
  <div class="combat-box">
    <h3 id="combatTitle">戦闘解決</h3>
    <div id="phaseLabel">―</div>
    <div class="combat-grid">
      <div class="combat-col allies"><h4>連合軍</h4><div id="alliesShipList"></div></div>
      <div class="combat-col axis"><h4>枢軸軍</h4><div id="axisShipList"></div></div>
    </div>
    <div style="margin-top:8px;text-align:right;">
      <button onclick="runAICombat()" style="background:#a55;color:#fff;border:none;padding:6px 14px;border-radius:4px;cursor:pointer;margin-right:8px;">AI戦闘実行</button>
      <button onclick="runFastCombat()" style="background:#a85;color:#fff;border:none;padding:6px 14px;border-radius:4px;cursor:pointer;margin-right:8px;">高速戦闘</button>
      <button id="combatConfirmBtn" onclick="onCombatConfirm()" style="background:#585;color:#fff;border:none;padding:6px 14px;border-radius:4px;cursor:pointer;margin-right:8px;display:none;">戦闘確認</button>
      <button id="roundEndBtn" onclick="onRoundEnd()" style="background:#558;color:#fff;border:none;padding:6px 14px;border-radius:4px;cursor:pointer;margin-right:8px;display:none;">ラウンド終了</button>
      <button class="modal-close" onclick="closeCombatModal()">閉じる</button>

</div>

<div id="main">
  <div id="leftPane">
    <h3>枢軸軍 AXIS</h3>
    <div id="axisList"></div>

<script>
// === 初期配置（ship.location と ship.homePort をセット） ===
function initShipLocations(){
  SHIPS.forEach(s=>{
    if(s.country==='US' && s.enterTurn) s.location = 'T' + s.enterTurn;
    else if(s.country==='US') s.location = 'USA';
    else if(s.country==='UK' && !s.enterTurn) s.location = 'England';
    else if(s.country==='DE' && !s.enterTurn) s.location = 'Germany';
    else if(s.country==='IT' && !s.enterTurn) s.location = 'Italy';
    else if(s.enterTurn) s.location = 'T' + s.enterTurn;
    else s.location = null;
    s.homePort = s.location;
    // 戦闘ステータス
    s.damage = 0;
    s.disabled = false;
    s.sunk = false;
    s.atkOrig = s.atk;
    s.spdOrig = s.spd;
    if(s.country === 'US') s.usEntered = false;
  });
  // === マルタ初期配置: 速力3の戦艦7隻 ===
  const setMalta = s => { s.location = 'Malta'; s.homePort = 'Malta'; };
  SHIPS.filter(s => s.country === 'UK' && !s.enterTurn && s.type === 'BB' && s.spd === 3).forEach(setMalta);
}
initShipLocations();

// === 左パネル：艦船一覧（陣営別） ===
function renderSideList(side, elId){
  const el = document.getElementById(elId);
  if(!el) return;
  const ships = SHIPS.filter(s => s.side === side);
  const byCountry = {};
  ships.forEach(s => { (byCountry[s.country] ||= []).push(s); });
  let html = '';
  for(const country in byCountry){
    html += `<div style="padding:3px 6px;background:#1a2a3a;color:#cde;font-size:0.8em;">${country}</div>`;
    byCountry[country].forEach(s => {
      const enter = s.enterTurn ? ` (T${s.enterTurn})` : '';
      const cls = s.sunk ? ' sunk' : '';
      let status = '';
      if(s.sunk) status = ' <span style="color:#ff4444;font-weight:bold;">[撃沈]</span>';
      else if(s.damage > 0) status = ` <span style="color:#fa8;">[損害${s.damage}]</span>`;
      html += `<div class="ship-entry${cls}">
        <img src="../WAS24/images/${s.file}" alt="${s.name}">
        <div>
          <div class="name">${s.name}${enter}${status}</div>
          <div class="spec">${s.atk}-${s.def}-${s.spd} ${s.type}</div>
        </div>
      </div>`;
    });
  }
  el.innerHTML = html;
}
function renderAxisList(){ renderSideList('axis', 'axisList'); }
function renderAlliesList(){ renderSideList('allies', 'alliesList'); }
renderAxisList();
renderAlliesList();

// === 戦闘ログ ===
const combatLog = []; // [{turn, sea, type, lines:[]}]
let _curLog = null;
function startCombatLogEntry(sea, type){
  _curLog = { turn: currentTurn, sea: sea || '', type: type || '', lines: [] };
  combatLog.push(_curLog);
}
function logCombatLine(text){
  if(_curLog) _curLog.lines.push(text);
}
function endCombatLogEntry(){
  if(_curLog && !_curLog.lines.length){
    // 空エントリは破棄
    const idx = combatLog.indexOf(_curLog);
    if(idx >= 0) combatLog.splice(idx, 1);
  }
  _curLog = null;
}
function showCombatLog(){
  const modal = document.getElementById('combatLogModal');
  const body = document.getElementById('combatLogBody');

}

// === フェイズ ===
const PHASE_NAMES = [
  '1.増援配置','2.連合移動','3.枢軸移動','4.修理',
  '5.支配除去','6.戦闘','7.支配配置','8.帰還','9.POC'
];
let phaseIdx = 1; // 1〜9
function renderPhaseBar(){
  const el = document.getElementById('phaseBar');
  if(!el) return;
  el.innerHTML = PHASE_NAMES.map((nm, i) => {
    const id = i + 1;
    let cls = '';
    if(id === phaseIdx) cls = 'current';
    else if(id < phaseIdx) cls = 'done';
    return `<span class="ph-cell ${cls}">${nm}</span>`;
  }).join('');
}
async function advancePhase(){
  if(phaseIdx >= 9) return; // 9 (POC) で止まる、ターン終了ボタンで次ターンへ
  phaseIdx = phaseIdx + 1;
  renderPhaseBar();
  // フェイズ進行時の自動処理
  if(phaseIdx === 2){
    await aiAlliedMove();
  } else if(phaseIdx === 4){
    const log = executeRepair();
    if(log && log.length){
      alert('修理結果:\n' + log.map(l => l.replace(/<[^>]+>/g,'')).join('\n'));
    } else {
      alert('修理対象艦なし');
    }
  } else if(phaseIdx === 5){
    // 支配除去: 全海域の支配マーカーを除去
    Object.keys(seaControl).forEach(k => delete seaControl[k]);
    placeControlMarkers();
  } else if(phaseIdx === 8){
    // 地中海の連合艦のうち、イタリア生存艦総数+1 を超える分は England に直接帰還
    // （phase 8 時点ではイタリア艦は港に戻っているため、生存総数で比較する）
    const itTotalCount = SHIPS.filter(s => s.country === 'IT' && !s.sunk && !s.removed && s.type !== 'UBOAT').length;
    const medAllied = SHIPS.filter(s => s.location === 'Mediterranean' && s.side === 'allies' && !s.sunk && !s.removed && s.type !== 'CONVOY');
    const keepMed = itTotalCount + 1;
    if(medAllied.length > keepMed){
      const excessShips = medAllied.slice(0, medAllied.length - keepMed);
      for(const s of excessShips){
        s.location = 'England';
        s.atDock = false;
        console.log(`[帰還超過] ${s.name}: 地中海 → England (イタリア総数${itTotalCount}+1=${keepMed}超過)`);
      }
    }
    // バレンツ海の UK・US 水上艦は England に直接帰還（Russia には行かない、コンボイは除外）
    const barUkUs = SHIPS.filter(s =>
      s.location === 'Barents' && !s.sunk && !s.removed &&
      s.type !== 'CONVOY' && (s.country === 'UK' || s.country === 'US')
    );
    for(const s of barUkUs){
      s.location = 'England';
      s.atDock = false;
      console.log(`[帰還] ${s.name}: バレンツ海 → England (${s.country})`);
    }
    // Uボートの帰還先は必ず Germany（中立港・France等に行かせない）
    const allUboats = SHIPS.filter(s =>
      s.type === 'UBOAT' && !s.sunk && !s.removed &&
      s.location && SEAS[s.location]
    );
    for(const u of allUboats){
      const from = u.location;
      u.location = 'Germany';
      u.atDock = false;
      console.log(`[帰還] ${u.name}: ${from} → Germany (Uボート専用)`);
    }
    // 帰還: 海域の艦を港湾へ
    const shipsToReturn = SHIPS.filter(s =>
      s.location && SEAS[s.location] && !s.sunk && !s.removed &&
      s.type !== 'CONVOY' && s.refuelTurn !== currentTurn
    );
    // 連合艦は既存の自動配置
    const alliesToReturn = shipsToReturn.filter(s => s.side === 'allies');
    for(const ship of alliesToReturn){
      const ports = getReturnPorts(ship);
      if(ports.length === 0){
        ship.location = ship.homePort || HOME_PORT[ship.country];
      } else {
        ship.location = ports.includes(ship.homePort) ? ship.homePort : ports[0];
      }
      ship.atDock = false;
    }
    // 枢軸艦は新UIで個別選択（港 or 洋上補給）
    const axisToReturn = shipsToReturn.filter(s => s.side === 'axis');
    if(axisToReturn.length){
      await showAxisReturnUI(axisToReturn);
    }
    placeAllShips();
    renderLocShipList(); renderSeaResetButtons();
  } else if(phaseIdx === 7){
    // 支配配置: 各海域の支配を判定してマーカー配置
    // Uボートだけの海域は支配できない（ただし相手の支配は消す = 支配なし扱い）
    Object.keys(SEAS).forEach(seaKey => {
      const ships = SHIPS.filter(s => s.location === seaKey && !s.sunk);
      const al = ships.some(s => s.side === 'allies' && s.type !== 'UBOAT');
      const ax = ships.some(s => s.side === 'axis' && s.type !== 'UBOAT');
      const ub = ships.some(s => s.type === 'UBOAT');
      if(al && !ax && !ub)       seaControl[seaKey] = 'allies';
      else if(ax && !al)         seaControl[seaKey] = 'axis';
      else                       seaControl[seaKey] = null; // Uボートのみ含む全ての残りケース
    });
    placeControlMarkers();
  } else if(phaseIdx === 9){
    // POC計算: 各海域の支配側に加算
    const pocBefore = poc;
    console.log('[POC] phase 9 開始: poc=', poc, 'seaControl=', JSON.stringify(seaControl));
    let delta = 0;
    Object.keys(seaControl).forEach(seaKey => {
      const side = seaControl[seaKey];
      if(side === 'axis')        { delta -= SEAS[seaKey].axis;   console.log(`[POC]   ${seaKey} axis支配 → -${SEAS[seaKey].axis}`); }
      else if(side === 'allies') { delta += SEAS[seaKey].allies; console.log(`[POC]   ${seaKey} allies支配 → +${SEAS[seaKey].allies}`); }
      else                       { console.log(`[POC]   ${seaKey} 支配なし(${side}) → 0`); }
    });
    poc = Math.max(-10, Math.min(10, poc + delta));
    console.log(`[POC] phase 9 完了: delta=${delta} poc ${pocBefore} → ${poc}`);
    updatePOC();
  }
}
function setPhaseIdx(n){
  phaseIdx = Math.max(1, Math.min(9, n));
  renderPhaseBar();
}

function getValidDests(){
  if(!selectedLoc) return { seas:[], seas2:[], ports:[] };
  const firstShip = selectedShipIds.length ? SHIPS.find(s => s.id === selectedShipIds[0]) : null;
  const isUboat = firstShip && firstShip.type === 'UBOAT';

  // 6.5 Uボートはどこにでも配置可
  if(isUboat){
    return {
      seas: Object.keys(SEAS),
      seas2: [],
      ports: ['Germany']
    };
  }

  const isPort = !!PORTS[selectedLoc];
  const isSea  = !!SEAS[selectedLoc];
  let seas = [], seas2 = [], ports = [];
  if(isPort){
    seas = PORT_SEAS[selectedLoc] || [];
    seas.forEach(s1 => {
      (SEA_ADJ[s1] || []).forEach(s2 => {
        if(s2 !== selectedLoc && !seas.includes(s2) && !seas2.includes(s2)){
          seas2.push(s2);
        }
      });
    });
  } else if(isSea){
    seas = SEA_ADJ[selectedLoc] || [];
    ports = Object.keys(PORT_SEAS).filter(p => PORT_SEAS[p].includes(selectedLoc));
  }
  // 地中海はどこからでも直接移動可
  if(selectedLoc !== 'Mediterranean' && !seas.includes('Mediterranean')){
    seas.push('Mediterranean');
  }

  // 6.6 バルト海はロシアとドイツの艦のみ（艦選択時のみ判定）
  if(firstShip){
    const country = firstShip.country;
    const allowBaltic = country === 'RU' || country === 'DE';
    if(!allowBaltic){
      seas  = seas.filter(s => s !== 'Baltic');
      seas2 = seas2.filter(s => s !== 'Baltic');
    }
  }
  // 14.3 船団は2海域同時移動不可、海上での2ターン目以降のみバレンツ海可
  if(firstShip && firstShip.type === 'CONVOY'){
    seas2 = []; // 2海域移動不可
    if(!firstShip.turnsAtSea || firstShip.turnsAtSea < 1){
      seas = seas.filter(s => s !== 'Barents');
    }
  }
  // 16.1 給油成功ドイツ艦は次ターン全海域配置可（海域→海域 直接）
  if(firstShip && firstShip.refuelTurn === currentTurn - 1){
    seas = Object.keys(SEAS);
    seas2 = [];
  }
  // 15.1 ロシア艦はバルト海のみ
  if(firstShip && firstShip.country === 'RU'){
    seas = seas.filter(s => s === 'Baltic');
    seas2 = seas2.filter(s => s === 'Baltic');
    ports = ports.filter(p => p === 'Leningrad');
  }
  // 15.4 米国艦は北大西洋と米国のみ（船団除く: 船団は欧州へ向かう）
  if(firstShip && firstShip.country === 'US' && firstShip.type !== 'CONVOY'){
    seas = seas.filter(s => s === 'NorthAtlantic');
    seas2 = [];
    ports = ports.filter(p => p === 'USA');
  }
  // イタリア艦はCAのみ南大西洋へ移動可
  if(firstShip && firstShip.country === 'IT' && firstShip.type !== 'CA'){
    seas = seas.filter(s => s !== 'SouthAtlantic');
    seas2 = seas2.filter(s => s !== 'SouthAtlantic');
  }
  // 14.1 同一海域に既に船団があれば船団は移動不可
  if(firstShip && firstShip.type === 'CONVOY'){
    seas = seas.filter(seaKey => {
      const existing = SHIPS.find(s => s !== firstShip && s.type === 'CONVOY' && s.location === seaKey && !s.sunk && !s.removed);
      return !existing;
    });
  }

  // 港のフィルタ: 使用可能ターン + 同陣営/中立のみ
  const side = firstShip ? firstShip.side : null;
  ports = ports.filter(p=>{
    const port = PORTS[p];
    if(!port.available.includes(currentTurn)) return false;
    if(side && port.side !== 'neutral' && port.side !== side) return false;
    return true;
  });
  return { seas, seas2, ports };
}

function renderCombatPane(){

    : noneMsg;

  renderLbaButtons();

  // 4. 水上戦闘

  const surfSeas = Object.keys(SEAS).filter(seaKey => {
    if(combatDone.surface.has(seaKey)) return false; // 処理済み

    const ax = SHIPS.filter(s => s.location===seaKey && !s.sunk && s.side==='axis'   && s.type!=='UBOAT');
    return al.length && ax.length;
  });
  surfEl.innerHTML = surfSeas.length
    ? surfSeas.map(k => seaButton(k, 'resolveSurfacePhase', '水上戦闘')).join('')
    : noneMsg;
}

function seaButton(seaKey, fn, label){
  const ships = SHIPS.filter(s => s.location===seaKey && !s.sunk);
  const al = ships.filter(s => s.side==='allies' && s.type!=='UBOAT').length;
  const ax = ships.filter(s => s.side==='axis'   && s.type!=='UBOAT').length;
  const ub = ships.filter(s => s.type==='UBOAT').length;
  return `<button class="locBtn sea" style="background:${SEA_COLOR[seaKey]};border-color:${SEA_COLOR[seaKey]};display:block;width:100%;text-align:left;padding:6px 10px;margin-bottom:4px;font-weight:bold;" onclick="${fn}('${seaKey}')">
    ${SEA_LABEL[seaKey]}<br>
    <span style="font-size:0.8em;font-weight:normal;">連合${al} vs 枢軸${ax}${ub?` + Uボート${ub}`:''}</span>
  </button>`;
}

function renderLbaButtons(){
  ['allies','axis'].forEach(side => {
    const el = document.getElementById(side==='allies' ? 'lbaAlliedButtons' : 'lbaAxisButtons');
    const enemyName = side==='allies' ? 'axis' : 'allies';
    // CV所在海域も対象に追加（空母のみ攻撃用）
    const cvSeas = new Set();
    SHIPS.filter(s => s.side === side && !s.sunk && s.type === 'CV' && s.location && SEAS[s.location]).forEach(s => cvSeas.add(s.location));
    // LBA使用済みなら CV所在海域のみ表示
    const candidateAreas = lbaUsed[side]
      ? [...cvSeas]
      : [...new Set([...LBA_TARGETS[side], ...cvSeas])];
    const targets = candidateAreas.filter(area => {
      const ships = SHIPS.filter(s =>
        s.location === area && !s.sunk && s.side === enemyName && s.type !== 'UBOAT'
      );
      return ships.length > 0;
    });
    if(!targets.length){
      el.innerHTML = '<div style="color:#888;font-size:0.8em;padding:3px;">攻撃可能なし</div>';
      return;
    }
    el.innerHTML = targets.map(area => {
      const isPort = !!PORTS[area];
      const label = isPort ? PORT_LABEL[area] : SEA_LABEL[area];
      const bg = isPort ? '#444' : SEA_COLOR[area];
      const lbaOk = LBA_TARGETS[side].includes(area);
      const cvHere = cvSeas.has(area);
      let prefix = '';
      if(lbaOk && cvHere) prefix = 'LBA+空母 ';
      else if(lbaOk) prefix = 'LBA ';
      else if(cvHere) prefix = '空母のみ ';
      return `<button class="locBtn" style="background:${bg};border-color:${bg};font-size:0.85em;padding:4px 8px;" onclick="startLbaBombing('${side}','${area}')">${prefix}${label}</button>`;
    }).join('');
  });
}

// 1発の空爆（5=即時帰還, 6=命中→損害ダイス）
function airFireAt(attacker, target, events){
  const r = rollD6();
  let dmgRoll = null;
  if(r === 6){
    dmgRoll = rollD6();
    events.push({ type:'fire', attacker: attacker.id, attackerName: attacker.name,
      target: target.id, targetName: target.name,
      dice:[{r, dmgRoll}], dmgTotal: dmgRoll, disabled: false });
    applyDamage(target, dmgRoll, events);
  } else if(r === 5){
    if(typeof logCombatLine === 'function') logCombatLine(`${target.name}: 即時帰還 (空爆)`);
    events.push({ type:'fire', attacker: attacker.id, attackerName: attacker.name,
      target: target.id, targetName: target.name,
      dice:[{r, dmgRoll:null}], dmgTotal: 0, disabled: true });
    // 'disabled' イベントで帰還港選択（UI or 自動）を行う
    events.push({ type:'disabled', ship: target.id, name: target.name });
  } else {
    events.push({ type:'fire', attacker: attacker.id, attackerName: attacker.name,
      target: target.id, targetName: target.name,
      dice:[{r, dmgRoll:null}], dmgTotal: 0, disabled: false });
  }
}

// LBA空爆 + 同海域の友軍空母合計
async function startLbaBombing(side, area){
  console.log('[DBG] startLbaBombing 呼び出し', side, area);
  console.trace();
  const lbaUsable = LBA_TARGETS[side].includes(area) && !lbaUsed[side];
  const enableAi = (side === aiSide);
  if(enableAi) aiMode = true;
  startCombatLogEntry(SEA_LABEL[area]||PORT_LABEL[area]||area, `LBA空爆 (${side==='allies'?'連合':'枢軸'})`);
  try {
  const enemyName = side==='allies' ? 'axis' : 'allies';
  // 9.5 即時帰還で当ターン帰還の艦は対象外
  const candidates = SHIPS.filter(s =>
    s.location === area && !s.sunk && s.side === enemyName && s.type !== 'UBOAT' && !s.disabledThisTurn
  );
  if(!candidates.length){ alert('対象艦なし'); return; }
  // 友軍CV: 同海域のCVのみ（空母は海にいる船のみ攻撃可、港湾攻撃には参加しない）
  let cvs = [];
  if(SEAS[area]){
    cvs = SHIPS.filter(s => s.location === area && !s.sunk && s.side === side && s.type === 'CV');
  }

  // 空母はLBA同等扱いで攻撃に参加（港湾攻撃には参加しない）
  const cvShots = cvs.reduce((sum, cv) => sum + cv.def, 0);
  const lbaShots = lbaUsable ? LBA_VALUE : 0;
  if(!lbaUsable && cvShots === 0){ alert('攻撃手段なし'); return; }

  const initEvents = [{
    type:'phase', sea: area, phase:'lba',
    label: `空爆 ${side==='allies'?'(連合)':'(枢軸)'} - LBA${lbaShots} + 空母${cvShots}`
  }];
  await openCombatModal(area, initEvents, {excludeUboat: true});
  const lbaImg = side==='allies' ? 'イギリス/allied_lba.gif' : 'ドイツ/axis_lba.gif';
  const lbaCol = side==='allies' ? 'alliesShipList' : 'axisShipList';
  const colEl = document.getElementById(lbaCol);
  colEl.innerHTML = '';
  // LBA行: lbaShots 分（LBA_TARGETS該当海域のみ）
  for(let i=lbaShots-1; i>=0; i--){
    const rid = `lba-${i}`;
    const html = `<div class="cs-row" id="cs-${rid}">
      <div class="cs-img"><img src="../WAS24/images/${lbaImg}"></div>
      <div class="cs-name">陸上攻撃機 ${i+1}/${lbaShots}</div>
      <div class="cs-status" id="cs-st-${rid}">空爆</div>
      <div class="cs-dice" id="cs-dc-${rid}"></div>
    </div>`;
    colEl.insertAdjacentHTML('afterbegin', html);
  }
  // 空母行: 各空母を cv.def 行ずつ独立表示（船名・画像）
  for(const cv of cvs){
    const existing = document.getElementById(`cs-${cv.id}`);
    if(existing) existing.remove();
    for(let i=0; i<cv.def; i++){
      const rid = `${cv.id}-${i}`;
      const html = `<div class="cs-row" id="cs-${rid}">
        <div class="cs-img"><img src="../WAS24/images/${cv.file}"></div>
        <div class="cs-name">${cv.name} ${i+1}/${cv.def}</div>
        <div class="cs-status" id="cs-st-${rid}">空爆</div>
        <div class="cs-dice" id="cs-dc-${rid}"></div>
      </div>`;
      colEl.insertAdjacentHTML('beforeend', html);
    }
  }
  await playEvents(initEvents);

  const targetSide = enemyName;

  // 1) LBA: lbaShots 発（LBA_TARGETS該当海域のみ）
  for(let i=0; i<lbaShots; i++){
    const remaining = candidates.filter(s => !s.sunk);
    if(!remaining.length) break;
    const rid = `lba-${i}`;
    setPhaseLabel(`LBA ${i+1}/${lbaShots} 発: 目標艦をクリック`);
    highlightShip(rid, 'firing');
    const target = await waitForTargetClickIn(targetSide, area, undefined, 'air');
    unhighlightShip(rid, 'firing');
    if(!target) break;
    const fireEvents = [];
    airFireAt({id:rid, name:`LBA${i+1}`}, target, fireEvents);
    await playEvents(fireEvents);
    placeAllShips();
  }
  // 2) 各空母が cv.def 発ずつ
  for(const cv of cvs){
    if(cv.sunk) continue;
    const dice = cv.def;
    for(let i=0; i<dice; i++){
      const remaining = candidates.filter(s => !s.sunk);
      if(!remaining.length) break;
      const rid = `${cv.id}-${i}`;
      setPhaseLabel(`${cv.name} 空爆 ${i+1}/${dice} 発: 目標艦をクリック`);
      highlightShip(rid, 'firing');
      const target = await waitForTargetClickIn(targetSide, area, undefined, 'cv');
      unhighlightShip(rid, 'firing');
      if(!target) break;
      const fireEvents = [];
      airFireAt({id:rid, name:`${cv.name}${i+1}`}, target, fireEvents);
      await playEvents(fireEvents);
      placeAllShips();
    }
  }

  if(lbaUsable) lbaUsed[side] = true;
  // 撃沈・即時帰還艦の表示クリア
  cleanupCombatModal();
  await flushPendingAxisDisabledUI();
  setPhaseLabel('━ 空爆 終了 ━');
  placeAllShips();
  renderLocShipList(); renderSeaResetButtons(); renderCombatPane();
  } finally {
    aiMode = false;
    endCombatLogEntry();
  }
}

// waitForTargetClick の拡張: 既ターゲット除外
function waitForTargetClickIn(side, focusSea, excludeIds, mode){
  return new Promise(resolve => {
    const candidates = SHIPS.filter(s =>
      s.side === side && !s.sunk && s.location === focusSea && (!excludeIds || !excludeIds.has(s.id)) && s.type !== 'UBOAT' && !s.disabledThisTurn
    );
    if(!candidates.length){ resolve(null); return; }
    if(aiMode && side === humanSide){
      if(mode === 'air'){
        // 航空攻撃: 第1巡 無傷で未攻撃の艦を def 低い順
        const undamagedUnhit = candidates.filter(c => c.damage === 0 && !c._aiAirHit1);
        if(undamagedUnhit.length){
          undamagedUnhit.sort((a,b) => (a.def||0) - (b.def||0));
          undamagedUnhit[0]._aiAirHit1 = true;
          undamagedUnhit[0]._aiAirHits = (undamagedUnhit[0]._aiAirHits || 0) + 1;
          resolve(undamagedUnhit[0]); return;
        }
        // 航空攻撃: 第2巡以降 hit数最小、damage少ない、def低い順
        const minAirHits = Math.min(...candidates.map(c => c._aiAirHits || 0));
        const airPool = candidates.filter(c => (c._aiAirHits || 0) === minAirHits);
        airPool.sort((a, b) => {
          if((a.damage||0) !== (b.damage||0)) return (a.damage||0) - (b.damage||0);
          return (a.def||0) - (b.def||0);
        });
        airPool[0]._aiAirHits = minAirHits + 1;
        resolve(airPool[0]); return;
      }
      if(mode === 'cv'){
        // 空母: 一番強い (atk高い) 無傷艦に集中、damage>0/即時帰還で次の無傷艦へ
        const undamaged = candidates.filter(c => c.damage === 0);
        if(undamaged.length){
          undamaged.sort((a,b) => (b.atk||0) - (a.atk||0));
          resolve(undamaged[0]); return;
        }
        // 全艦損害ありなら全艦から atk 高い順
        const sorted = [...candidates].sort((a,b) => (b.atk||0) - (a.atk||0));
        resolve(sorted[0]); return;
      }
      // 水上戦闘: 無傷艦があればモーダル順で先頭、なければモーダル順で先頭
      const undamaged = candidates.filter(c => c.damage === 0);
      resolve(undamaged.length ? undamaged[0] : candidates[0]); return;
    }
    const handlers = {};
    candidates.forEach(s => {
      const row = document.getElementById(`cs-${s.id}`);
      if(!row) return;
      row.classList.add('selectable');
      const onClick = () => {
        candidates.forEach(c => {
          const r = document.getElementById(`cs-${c.id}`);
          if(r){ r.classList.remove('selectable'); if(handlers[c.id]) r.removeEventListener('click', handlers[c.id]); }
        });
        resolve(s);
      };
      handlers[s.id] = onClick;
      row.addEventListener('click', onClick);
    });
  });
}

// 1+2 統合: 同一海域でASW→Uボート反撃を連続実行（損害同時適用）
async function resolveUboatCombatPhase(seaKey){
  console.log('[DBG] resolveUboatCombatPhase 呼び出し', seaKey);
  console.trace();
  startCombatLogEntry(SEA_LABEL[seaKey]||seaKey, 'Uボート戦闘 (ASW+反撃)');
  // 同時適用用のpending: ASW結果(撃沈/帰還) + 反撃ダメージ/即時帰還
  const pending = {
    uboatSunk: new Set(), uboatReturn: new Set(),
    damage: {}, disabled: new Set()
  };
  const aswEvents = [];
  resolveUboatASW(seaKey, aswEvents, pending);
  let modalOpened = false;
  if(aswEvents.length){
    await openCombatModal(seaKey, aswEvents, {aswOnly: true});
    modalOpened = true;
    await playEvents(aswEvents);
  }
  // 反撃: ASWで撃沈/即時帰還となったUボートは反撃不可
  const uboats = SHIPS.filter(s =>
    s.type==='UBOAT' && s.side==='axis' && s.location===seaKey && !s.sunk
    && !pending.uboatSunk.has(s.id) && !pending.uboatReturn.has(s.id)
  );
  if(uboats.length){
    const allies = SHIPS.filter(s => s.location===seaKey && !s.sunk && s.side==='allies');
    if(allies.length){
      if(!modalOpened){
        await openCombatModal(seaKey, [{type:'phase', sea:seaKey, label:'Uボート反撃'}], {aswOnly: true});
        modalOpened = true;
      } else {
        await playEvents([{type:'phase', sea:seaKey, label:'Uボート反撃'}]);
      }
      for(const u of uboats){
        highlightShip(u.id, 'firing');
        const dispName = pending.uboatSunk.has(u.id) ? `${u.name}[撃沈中]` : (pending.uboatReturn.has(u.id) ? `${u.name}[帰還中]` : u.name);
        setPhaseLabel(`${dispName} の目標をクリック`);
        const target = await waitForTargetClickIn('allies', seaKey);
        unhighlightShip(u.id, 'firing');
        if(!target) break;
        const fireEvents = [];
        uboatFireAt(u, target, fireEvents, pending);
        await playEvents(fireEvents);
      }
    }
  }
  // 同時適用
  setPhaseLabel('━ 損害適用 ━');
  const applyEvents = [];
  for(const tid in pending.damage){
    const ship = SHIPS.find(s => s.id === tid);
    if(ship) applyDamage(ship, pending.damage[tid], applyEvents);
  }
  for(const tid of pending.disabled){
    const ship = SHIPS.find(s => s.id === tid);
    if(ship && !ship.sunk){
      ship.location = ship.homePort;
      applyEvents.push({ type:'return_disabled', ship: ship.id, name: ship.name });
    }
  }
  for(const id of pending.uboatSunk){
    const u = SHIPS.find(s => s.id === id);
    if(u) u.sunk = true;
  }
  for(const id of pending.uboatReturn){
    const u = SHIPS.find(s => s.id === id);
    if(u && !u.sunk) u.location = 'Germany';
  }
  await playEvents(applyEvents);
  combatDone.uboat.add(seaKey);
  // 撃沈・即時帰還艦の表示クリア
  cleanupCombatModal();
  await flushPendingAxisDisabledUI();
  setPhaseLabel('━ Uボート戦闘 終了 ━');
  endCombatLogEntry();
  placeAllShips();
  renderCombatPane();
}

// 撃沈艦は表示削除、帰還艦はatDock=true、ダイス/ラベルクリア
function cleanupCombatModal(){
  SHIPS.forEach(s => {
    if(s.sunk){
      const row = document.getElementById(`cs-${s.id}`);
      if(row) row.remove();
    } else if(s.location && PORTS[s.location]){
      s.atDock = true;
      const row = document.getElementById(`cs-${s.id}`);
      if(row) row.remove();
    }
  });
  document.querySelectorAll('#combatModal [id^="cs-dc-"]').forEach(el => el.innerHTML = '');
  document.querySelectorAll('#combatModal .result-label').forEach(el => el.remove());
}

// 戦闘で即時帰還した枢軸艦の帰還港選択UIを呼び出す共通関数
async function flushPendingAxisDisabledUI(){
  if(!pendingAxisDisabledForUI.length) return;
  const ships = pendingAxisDisabledForUI.map(p => SHIPS.find(s => s.id === p.shipId)).filter(s => s && !s.sunk);
  pendingAxisDisabledForUI = [];
  if(ships.length){
    setPhaseLabel('━ 即時帰還 帰還港選択 ━');
    await showAxisReturnUI(ships);
    placeAllShips();
  }
}

// 5.62 航空戦闘（連合 or 枢軸の片方ずつ実行）
async function playAirPhase(side, seaKey, modalAlreadyOpen){
  const enemyName = side==='allies' ? 'axis' : 'allies';
  const cvs = SHIPS.filter(s => s.location === seaKey && !s.sunk && s.side === side && s.type === 'CV');
  const lbaUsable = !lbaUsed[side] && LBA_TARGETS[side].includes(seaKey);
  // 攻撃手段なし
  if(!cvs.length && !lbaUsable) return modalAlreadyOpen;
  // 目標なし
  const targets = SHIPS.filter(s =>
    s.location === seaKey && !s.sunk && s.side === enemyName && s.type !== 'UBOAT' && !s.disabledThisTurn
  );
  if(!targets.length) return modalAlreadyOpen;

  // LBA使用確認
  let useLba = false;
  if(lbaUsable){
    useLba = confirm(`${side==='allies'?'連合':'枢軸'} LBAを ${SEA_LABEL[seaKey]} に使用しますか？`);
  }
  if(!useLba && !cvs.length) return modalAlreadyOpen;

  // モーダル準備
  if(!modalAlreadyOpen){
    await openCombatModal(seaKey, [{type:'phase', sea:seaKey, label:'航空戦闘'}], {excludeUboat: true});
    modalAlreadyOpen = true;
  }
  setPhaseLabel(`━ 航空戦闘 ${side==='allies'?'(連合)':'(枢軸)'} ━`);
  await new Promise(r=>setTimeout(r,500));

  // LBAマーカー挿入: ダイス数分の行
  const colId = side==='allies' ? 'alliesShipList' : 'axisShipList';
  const colEl = document.getElementById(colId);
  if(colEl.children.length === 1 && colEl.firstElementChild && colEl.firstElementChild.tagName === 'DIV' && colEl.firstElementChild.style.color){
    colEl.innerHTML = '';
  }
  if(useLba){
    const lbaImg = side==='allies' ? 'イギリス/allied_lba.gif' : 'ドイツ/axis_lba.gif';
    for(let i=LBA_VALUE-1; i>=0; i--){
      const rid = `lba-${side}-${i}`;
      const html = `<div class="cs-row" id="cs-${rid}">
        <div class="cs-img"><img src="../WAS24/images/${lbaImg}"></div>
        <div class="cs-name">陸上攻撃機 ${i+1}/${LBA_VALUE}</div>
        <div class="cs-status" id="cs-st-${rid}">空爆</div>
        <div class="cs-dice" id="cs-dc-${rid}"></div>
      </div>`;
      colEl.insertAdjacentHTML('afterbegin', html);
    }
  }
  // CV: 火力(def)分の射撃行を追加（元のCV行は触らない）
  for(const cv of cvs){
    for(let i=0; i<cv.def; i++){
      const rid = `${cv.id}-air-${i}`;
      const html = `<div class="cs-row" id="cs-${rid}">
        <div class="cs-img"><img src="../WAS24/images/${cv.file}"></div>
        <div class="cs-name">${cv.name} ${i+1}/${cv.def}</div>
        <div class="cs-status" id="cs-st-${rid}">空爆</div>
        <div class="cs-dice" id="cs-dc-${rid}"></div>
      </div>`;
      colEl.insertAdjacentHTML('beforeend', html);
    }
  }

  const fireOneShot = async (attackerId, attackerName, label, mode) => {
    const remaining = SHIPS.filter(s =>
      s.location === seaKey && !s.sunk && s.side === enemyName && s.type !== 'UBOAT' && !s.disabledThisTurn
    );
    if(!remaining.length) return false;
    setPhaseLabel(`${label}: 目標をクリック`);
    highlightShip(attackerId, 'firing');
    const target = await waitForTargetClickIn(enemyName, seaKey, undefined, mode);
    unhighlightShip(attackerId, 'firing');
    if(!target) return false;
    const events = [];
    airFireAt({id: attackerId, name: attackerName}, target, events);
    await playEvents(events);
    return true;
  };

  if(useLba){
    for(let i=0; i<LBA_VALUE; i++){
      const ok = await fireOneShot(`lba-${side}-${i}`, `LBA${i+1}`, `LBA ${i+1}/${LBA_VALUE}`, 'air');
      if(!ok) break;
    }
    lbaUsed[side] = true;
  }
  for(const cv of cvs){
    if(cv.sunk) continue;
    const dice = cv.def;
    for(let i=0; i<dice; i++){
      const ok = await fireOneShot(`${cv.id}-air-${i}`, `${cv.name}${i+1}`, `${cv.name} ${i+1}/${dice}`, 'cv');
      if(!ok) break;
    }
  }
  return modalAlreadyOpen;
}

// 11. 水上戦闘
async function resolveSurfaceCombat(seaKey, modalAlreadyOpen, oneRound = false){
  console.log('[DBG] resolveSurfaceCombat 呼び出し', seaKey, 'modalAlreadyOpen=', modalAlreadyOpen);
  console.trace();
  let firstIter = true;
  while(true){
    const ships = SHIPS.filter(s => s.location === seaKey && !s.sunk && s.type !== 'UBOAT');
    const allies = ships.filter(s => s.side === 'allies');
    const axis   = ships.filter(s => s.side === 'axis');
    if(!allies.length || !axis.length) return;

    if(!modalAlreadyOpen){
      await openCombatModal(seaKey, [{ type:'phase', sea:seaKey, label:'水上戦闘' }], {excludeUboat: true});
      modalAlreadyOpen = true;
      await playEvents([{ type:'phase', sea:seaKey, label:'水上戦闘' }]);
    } else {
      // 水上戦闘移行時: 前フェーズで撃沈/帰還した艦・Uボートを除外して再描画
      if(firstIter){
        document.getElementById('alliesShipList').innerHTML = allies.map(renderShipRow).join('') || '<div style="color:#aac;padding:6px;">―</div>';
        document.getElementById('axisShipList').innerHTML   = axis.map(renderShipRow).join('')   || '<div style="color:#aac;padding:6px;">―</div>';
      }
      setPhaseLabel(`━ 水上戦闘 (${SEA_LABEL[seaKey]}) ━`);
    }
    firstIter = false;

    // ラウンド開始時の枢軸艦リスト（11.3 撃沈/不能でも反撃可）
    const axisAtStart = axis.slice();
    // 損害保留（11.3 同時適用）
    const pending = { damage: {}, disabled: new Set(), firedAtBy: { allies: new Set(), axis: new Set() } };

    // === 連合先攻 ===
    setPhaseLabel(`連合: 各艦の目標をクリック`);
    for(const ship of allies){
      if(ship.sunk) continue;
      if(ship.type === 'CV') continue; // 水上戦闘では空母は射撃しない
      if(ship.disabled || ship.atk === 0) continue;
      highlightShip(ship.id, 'firing');
      setPhaseLabel(`${ship.name}(${ship.atk}発): 目標をクリック`);
      const target = await waitForSurfaceTarget('axis', seaKey, ship, pending);
      unhighlightShip(ship.id, 'firing');
      if(!target) break;
      pending.firedAtBy.allies.add(target.id);
      const fireEvents = [];
      surfaceFireOne(ship, target, fireEvents, pending);
      await playEvents(fireEvents);
      // CV 即時反撃: 攻撃された target が CV で atk>=1 なら即座に反撃
      if(target.type === 'CV' && target.atk >= 1 && !target.sunk && !target.disabled){
        highlightShip(target.id, 'firing');
        setPhaseLabel(`${target.name}(${target.atk}発) 即時反撃: 目標をクリック`);
        const counterTarget = await waitForSurfaceTarget('allies', seaKey, target, pending);
        unhighlightShip(target.id, 'firing');
        if(counterTarget){
          pending.firedAtBy.axis.add(counterTarget.id);
          const counterEvents = [];
          surfaceFireOne(target, counterTarget, counterEvents, pending);
          await playEvents(counterEvents);
        }
      }
    }

    // === 枢軸反撃（撃沈/不能艦も砲撃可、損害は保留）===
    setPhaseLabel(`枢軸: 各艦の目標をクリック`);
    for(const ship of axisAtStart){
      if(ship.type === 'CV') continue; // 水上戦闘では空母は射撃しない
      if(ship.atk === 0) continue;
      const targets = SHIPS.filter(s => s.location === seaKey && !s.sunk && s.side === 'allies' && s.type !== 'UBOAT' && !s.disabledThisTurn);
      if(!targets.length) break;
      highlightShip(ship.id, 'firing');
      const dispName = ship.sunk ? `${ship.name}[撃沈中]` : (ship.disabled ? `${ship.name}[即時帰還]` : ship.name);
      setPhaseLabel(`${dispName}(${ship.atk}発): 目標をクリック`);
      const target = await waitForSurfaceTarget('allies', seaKey, ship, pending);
      unhighlightShip(ship.id, 'firing');
      if(!target) break;
      pending.firedAtBy.axis.add(target.id);
      const fireEvents = [];
      surfaceFireOne(ship, target, fireEvents, pending);
      await playEvents(fireEvents);
      // CV 即時反撃: 攻撃された target が CV で atk>=1 なら即座に反撃
      if(target.type === 'CV' && target.atk >= 1 && !target.sunk && !target.disabled){
        highlightShip(target.id, 'firing');
        setPhaseLabel(`${target.name}(${target.atk}発) 即時反撃: 目標をクリック`);
        const counterTarget = await waitForSurfaceTarget('axis', seaKey, target, pending);
        unhighlightShip(target.id, 'firing');
        if(counterTarget){
          pending.firedAtBy.allies.add(counterTarget.id);
          const counterEvents = [];
          surfaceFireOne(target, counterTarget, counterEvents, pending);
          await playEvents(counterEvents);
        }
      }
    }

    // === 同時適用（11.3）===
    setPhaseLabel('━ 損害適用 ━');
    const applyEvents = [];
    for(const tid in pending.damage){
      const ship = SHIPS.find(s => s.id === tid);
      if(!ship) continue;
      applyDamage(ship, pending.damage[tid], applyEvents);
    }
    for(const tid of pending.disabled){
      const ship = SHIPS.find(s => s.id === tid);
      if(!ship || ship.sunk) continue;
      ship.disabled = true;
      logCombatLine(`${ship.name}: 即時帰還 (砲撃)`);
      applyEvents.push({ type:'disabled', ship: ship.id, name: ship.name });
    }
    await playEvents(applyEvents);
    placeAllShips();

    // 戦闘確認ボタン待ち（撃沈/帰還艦消去・ドック表示・ダイスクリア）
    setPhaseLabel('戦闘確認ボタンを押してください');
    await waitForCombatConfirm();

    // ラウンド終了ボタン待ち（撤退/追撃判定へ進む）
    setPhaseLabel('ラウンド終了ボタンで撤退/追撃判定へ');
    await waitForRoundEnd();

    // 即時帰還した枢軸艦の行を戦闘モーダルから削除（後で帰還港UIで処理）
    for(const p of pendingAxisDisabledForUI){
      const row = document.getElementById(`cs-${p.shipId}`);
      if(row) row.remove();
    }

    // === 撤退判定（12.x）===
    let allyRetreat = await tryRetreat('allies', seaKey);
    const axisRetreat = await tryRetreat('axis',   seaKey);
    // AI（連合）が撤退宣言したが、こちら（枢軸）も撤退する場合 → AI 撤回して支配を確保
    if(allyRetreat && axisRetreat && aiSide === 'allies'){
      allyRetreat = null;
      setPhaseLabel('連合: 枢軸も撤退のため撤回 → 残留');
      await new Promise(r => setTimeout(r, 800));
    }
    // 同様に AI が枢軸の場合も対応
    let finalAxisRetreat = axisRetreat;
    if(allyRetreat && axisRetreat && aiSide === 'axis'){
      finalAxisRetreat = null;
      setPhaseLabel('枢軸: 連合も撤退のため撤回 → 残留');
      await new Promise(r => setTimeout(r, 800));
    }
    if(allyRetreat || finalAxisRetreat){
      retreatedSeas.add(seaKey); // 12.4 POC獲得不可
    }
    // 連合撤退→枢軸追跡（グループ別）
    if(allyRetreat){
      const pursuits = await tryPursuit('axis', seaKey, allyRetreat);
      if(pursuits){
        for(const p of pursuits){
          await runPursuitRound(p.pursuers, p.retreaters);
        }
      }
      for(const group of allyRetreat){
        await retreatToPort(group);
      }
    }
    // 枢軸撤退→連合追跡（グループ別）
    if(finalAxisRetreat){
      const pursuits = await tryPursuit('allies', seaKey, finalAxisRetreat);
      if(pursuits){
        for(const p of pursuits){
          await runPursuitRound(p.pursuers, p.retreaters);
        }
      }
      for(const group of finalAxisRetreat){
        await retreatToPort(group);
      }
    }
    placeAllShips();
    // 11.4 両軍存続なら次ラウンド
  }
}

// 追跡戦闘: 追跡側が諦めるか、片側が壊滅するか、速度不足になるまで継続
async function runPursuitRound(pursuit, retreat){
  const sea = pursuit.length ? (pursuit[0].location || retreat[0]?.location || '') : (retreat[0]?.location || '');
  startCombatLogEntry(SEA_LABEL[sea]||sea, '追撃戦闘');
  logCombatLine(`追跡側: ${pursuit.map(s=>s.name).join(', ') || '―'}`);
  logCombatLine(`撤退側: ${retreat.map(s=>s.name).join(', ') || '―'}`);
  // 撃沈艦の cs-row を一掃するヘルパー
  const sweepSunk = () => {
    SHIPS.forEach(s => {
      if(s.sunk){
        const row = document.getElementById(`cs-${s.id}`);
        if(row) row.remove();
      }
    });
  };
  try {
  sweepSunk(); // 開始時の掃除
  while(true){
    const alivePur = pursuit.filter(s => !s.sunk);
    const aliveRet = retreat.filter(s => !s.sunk);
    if(!alivePur.length || !aliveRet.length){
      setPhaseLabel('片側壊滅 → 追跡終了');
      break;
    }
    // 速度判定（撤退側最遅速力以上の追跡艦のみ追える）
    const minRetSpd = Math.min(...aliveRet.map(s => s.spd));
    const eligible = alivePur.filter(s => s.spd >= minRetSpd);
    if(!eligible.length){
      setPhaseLabel('追跡速度不足 → 追跡終了');
      await new Promise(r=>setTimeout(r,800));
      break;
    }
    setPhaseLabel('━ 追跡ラウンド ━');
    const pending = { damage: {}, disabled: new Set(), firedAtBy: { allies: new Set(), axis: new Set() } };
    // 追跡側射撃
    setPhaseLabel('追跡側 射撃');
    for(const ship of eligible){
      if(ship.atk === 0) continue;
      highlightShip(ship.id, 'firing');
      setPhaseLabel(`${ship.name}(${ship.atk}発): 撤退艦から目標`);
      const target = await waitForTargetClickFromList(aliveRet, ship);
      unhighlightShip(ship.id, 'firing');
      if(!target) break;
      const fireEvents = [];
      surfaceFireOne(ship, target, fireEvents, pending);
      await playEvents(fireEvents);
    }
    // 撤退側反撃（11.3 同時）
    setPhaseLabel('撤退側 反撃');
    for(const ship of aliveRet){
      if(ship.atk === 0) continue;
      highlightShip(ship.id, 'firing');
      setPhaseLabel(`${ship.name}(${ship.atk}発): 追跡艦から目標`);
      const target = await waitForTargetClickFromList(eligible, ship);
      unhighlightShip(ship.id, 'firing');
      if(!target) break;
      const fireEvents = [];
      surfaceFireOne(ship, target, fireEvents, pending);
      await playEvents(fireEvents);
    }
    // 損害適用
    setPhaseLabel('━ 損害適用 ━');
    const applyEvents = [];
    for(const tid in pending.damage){
      const ship = SHIPS.find(s => s.id === tid);
      if(ship) applyDamage(ship, pending.damage[tid], applyEvents);
    }
    for(const tid of pending.disabled){
      const ship = SHIPS.find(s => s.id === tid);
      if(ship && !ship.sunk){
        ship.disabled = true;
        logCombatLine(`${ship.name}: 即時帰還 (追撃砲撃)`);
        applyEvents.push({ type:'disabled', ship: ship.id, name: ship.name });
      }
    }
    await playEvents(applyEvents);
    placeAllShips();

    // 12.5 追跡継続確認
    const stillPur = pursuit.filter(s => !s.sunk);
    const stillRet = retreat.filter(s => !s.sunk);
    if(!stillPur.length || !stillRet.length){ break; }
    const newMin = Math.min(...stillRet.map(s => s.spd));
    if(!stillPur.some(s => s.spd >= newMin)){
      setPhaseLabel('速度不足 → 追跡終了');
      await new Promise(r=>setTimeout(r,800));
      break;
    }
    // 追跡側が AI なら自動継続、人間側のみ確認
    const pursuerSide = pursuit[0]?.side;
    const cont = (pursuerSide === aiSide) ? true : confirm('追跡を続けますか？(キャンセル=追撃中止し母港帰還)');
    if(!cont){
      // 追撃中止 → 追跡側艦を母港に帰還
      for(const ship of stillPur){
        if(ship.sunk || ship.removed) continue;
        const ports = getReturnPorts(ship);
        if(ports.length === 0){
          ship.location = ship.homePort || HOME_PORT[ship.country];
        } else {
          ship.location = ports.includes(ship.homePort) ? ship.homePort : ports[0];
        }
        ship.atDock = false;
        logCombatLine(`${ship.name}: 追撃中止 → ${PORT_LABEL[ship.location]||ship.location}`);
      }
      break;
    }
  }
  } finally {
    endCombatLogEntry();
  }
}

// 追跡対象（撤退艦）から選択
function waitForTargetClickFromList(targetList, attacker){
  return new Promise(resolve => {
    const candidates = targetList.filter(s => !s.sunk);
    if(!candidates.length){ resolve(null); return; }
    // AI側の射撃のみ自動選択。人間側はクリック待ち
    const isAiAttacker = attacker && attacker.side === aiSide;
    if(isAiAttacker){ resolve(candidates[0]); return; }
    const handlers = {};
    candidates.forEach(s => {
      const row = document.getElementById(`cs-${s.id}`);
      if(!row) return;
      row.classList.add('selectable');
      const onClick = () => {
        candidates.forEach(c => {
          const r = document.getElementById(`cs-${c.id}`);
          if(r){ r.classList.remove('selectable'); if(handlers[c.id]) r.removeEventListener('click', handlers[c.id]); }
        });
        resolve(s);
      };
      handlers[s.id] = onClick;
      row.addEventListener('click', onClick);
    });
  });
}

// 撤退艦を港へ移動（各艦帰還港選択）
async function retreatToPort(ships){
  console.log('[retreatToPort] 開始 group:', ships.map(s=>`${s.name}(loc=${s.location},sunk=${s.sunk})`).join(', '));
  for(const ship of ships){
    if(ship.sunk){ console.log(`  → ${ship.name}: sunk スキップ`); continue; }
    if(!SEAS[ship.location]){ console.log(`  → ${ship.name}: location=${ship.location} は海域でない、スキップ`); continue; }
    const port = decideRetreatPort(ship);
    ship.location = port;
    ship.atDock = false;
    setPhaseLabel(`${ship.name} 撤退 → ${PORT_LABEL[port]||port}`);
    console.log(`  → ${ship.name}: ${port} へ移動`);
    await new Promise(r => setTimeout(r, 200));
  }
  console.log('[retreatToPort] 終了');
}

function decideRetreatPort(ship){
  // ドイツ艦: 損害艦は France3/Germany8、超過は均等。無傷は Germany
  if(ship.country === 'DE'){
    if(ship.damage === 0) return 'Germany';
    const inFrance = SHIPS.filter(s => s.country === 'DE' && s.location === 'France').length;
    const inGermany = SHIPS.filter(s => s.country === 'DE' && s.location === 'Germany').length;
    if(inFrance < 3) return 'France';
    if(inGermany < 8) return 'Germany';
    return inFrance <= inGermany ? 'France' : 'Germany';
  }
  // UK 艦: homePort=Malta なら基本 Malta、降伏後は Malta = 4 + DE接収伊艦数
  if(ship.country === 'UK'){
    if(ship.homePort === 'Malta'){
      if(italySurrendered){
        const deItalyCount = SHIPS.filter(s => s.country === 'IT' && s.controlledBy === 'DE').length;
        const cap = 4 + deItalyCount;
        const inMalta = SHIPS.filter(s => s.country === 'UK' && s.location === 'Malta').length;
        if(inMalta < cap) return 'Malta';
        return 'England';
      }
      return 'Malta';
    }
    return 'England';
  }
  // それ以外: homePort
  return ship.homePort;
}

// 水上戦闘の目標選択 (11.6 空母保護, 14.8 船団保護)
function waitForSurfaceTarget(side, focusSea, attacker, pending){
  return new Promise(resolve => {
    const isAiAttacker = aiMode && attacker && attacker.side === aiSide;
    // pending damageで撃沈確定の艦を除外
    const willBeSunk = (s) => {
      if(!pending) return false;
      const pd = pending.damage[s.id] || 0;
      return (s.damage + pd) > s.def;
    };
    const enemies = SHIPS.filter(s =>
      s.side === side && !s.sunk && s.location === focusSea && s.type !== 'UBOAT' && !s.disabledThisTurn && !s.removed && !willBeSunk(s)
    );
    // 通常艦（CV/CONVOYでない）
    const normal = enemies.filter(s => s.type !== 'CV' && s.type !== 'CONVOY');
    const cv = enemies.filter(s => s.type === 'CV');
    const convoy = enemies.filter(s => s.type === 'CONVOY');
    // 14.8 船団保護 / 11.6 空母保護: 同ラウンドで攻撃側が全非保護艦を砲撃済みになったら保護艦も対象
    const attackerSide = attacker?.side || (side === 'allies' ? 'axis' : 'allies');
    const firedAt = (pending && pending.firedAtBy && pending.firedAtBy[attackerSide]) || new Set();
    const allNormalFired = normal.length === 0 || normal.every(s => firedAt.has(s.id));
    const allConvoyFired = convoy.length === 0 || convoy.every(s => firedAt.has(s.id));
    const candidates = [...normal];
    if(allNormalFired) candidates.push(...convoy);
    if(allNormalFired && allConvoyFired) candidates.push(...cv);
    if(!candidates.length){ resolve(null); return; }
    // デバックログ
    console.log('[waitForSurfaceTarget]', {
      side, focusSea, attacker: attacker?.name,
      enemiesCount: enemies.length, enemiesIds: enemies.map(s=>s.id+'('+s.type+')'),
      normalCount: normal.length, cvCount: cv.length, convoyCount: convoy.length,
      allNormalFired, allConvoyFired, candidatesCount: candidates.length, candidatesIds: candidates.map(s=>s.id+'('+s.type+')'),
      missingRows: candidates.filter(s => !document.getElementById(`cs-${s.id}`)).map(s=>s.id)
    });
    if(isAiAttacker){
      const firedAt = (pending && pending.firedAtBy && pending.firedAtBy[attackerSide]) || new Set();
      const unfired = candidates.filter(c => !firedAt.has(c.id));
      if(unfired.length){
        const undamaged = unfired.filter(c => c.damage === 0);
        resolve(undamaged.length ? undamaged[0] : unfired[0]); return;
      }
      // 全艦攻撃済 → 無傷艦から
      const undamaged = candidates.filter(c => c.damage === 0);
      resolve(undamaged.length ? undamaged[0] : candidates[0]); return;
    }
    const handlers = {};
    candidates.forEach(s => {
      const row = document.getElementById(`cs-${s.id}`);
      if(!row) return;
      row.classList.add('selectable');
      const onClick = () => {
        candidates.forEach(c => {
          const r = document.getElementById(`cs-${c.id}`);
          if(r){ r.classList.remove('selectable'); if(handlers[c.id]) r.removeEventListener('click', handlers[c.id]); }
        });
        resolve(s);
      };
      handlers[s.id] = onClick;
      row.addEventListener('click', onClick);
    });
  });
}

const DICE_GLYPH = ['','⚀','⚁','⚂','⚃','⚄','⚅'];
const wait = ms => new Promise(r => setTimeout(r, ms));
function diceClass(r){ return r===6 ? 'hit' : (r===5 ? 'dis' : 'miss'); }

function renderShipRow(s){
  const grp = s.group ? `<span class="cs-group" style="color:#fc4;font-weight:bold;margin-left:8px;">${s.group}</span>` : '';
  return `<div class="cs-row" id="cs-${s.id}">

  </div>`;
}

async function openCombatModal(focusSea, initialEvents, opts){
  opts = opts || {};
  const excludeUboat = !!opts.excludeUboat;
  const aswOnly = !!opts.aswOnly;
  const modal = document.getElementById('combatModal');
  modal.classList.add('show');
  // 参加艦: 海域内の生存艦のみ（撃沈艦は表示しない）
  const ids = new Set();
  (initialEvents || []).forEach(e => {
    const checkId = (id) => {
      if(!id) return;
      const s = SHIPS.find(x => x.id === id);
      if(!s || s.sunk) return;
      ids.add(id);
    };
    checkId(e.attacker);
    checkId(e.target);
    checkId(e.ship);
  });
  if(focusSea){
    SHIPS.forEach(s => {
      if(s.location !== focusSea) return;
      if(s.sunk) return;
      if(excludeUboat && s.type === 'UBOAT') return;
      // ASW表示: 枢軸はUボートのみ（イタリア艦等の水上艦を除外）
      if(aswOnly && s.side === 'axis' && s.type !== 'UBOAT') return;
      ids.add(s.id);
    });
  }
  const inv = SHIPS.filter(s => ids.has(s.id) && !s.sunk);
  const allies = inv.filter(s => s.side === 'allies');
  const axis   = inv.filter(s => s.side === 'axis');
  document.getElementById('alliesShipList').innerHTML = allies.map(renderShipRow).join('') || '<div style="color:#aac;padding:6px;">―</div>';
  document.getElementById('axisShipList').innerHTML   = axis.map(renderShipRow).join('')   || '<div style="color:#aac;padding:6px;">―</div>';
  document.getElementById('combatTitle').textContent = focusSea ? `戦闘解決: ${SEA_LABEL[focusSea]}` : '戦闘解決';
  setPhaseLabel('━ 開始 ━');
}

async function playEvents(events){
  for(const e of events){
    await playOneEvent(e);
  }
}

// 後方互換
async function playCombatEvents(events, focusSea){
  await openCombatModal(focusSea, events);
  await playEvents(events);
  setPhaseLabel('━ 終了 ━');
}

// 帰還可能港の取得（艦の現在の海域に隣接する友軍/中立で使用可能な港）
function getReturnPorts(ship){
  const sea = ship.location;
  if(!SEAS[sea]) return [];
  // 南大西洋のドイツ艦特例: 無傷=France(不可なら中立)、損害=中立のみ
  if(sea === 'SouthAtlantic' && ship.country === 'DE'){
    const franceUsable = PORTS.France.available.includes(currentTurn);
    if(ship.damage > 0) return ['Neutral'];
    return franceUsable ? ['France'] : ['Neutral'];
  }
  let adjacent = Object.keys(PORT_SEAS).filter(p => PORT_SEAS[p].includes(sea));
  // 地図ルール特例
  // NorthAtlantic のドイツ艦は Germany 帰還可
  if(sea === 'NorthAtlantic' && ship.country === 'DE'){
    if(!adjacent.includes('Germany')) adjacent.push('Germany');
  }
  // Mediterranean の英国艦は England 帰還可
  if(sea === 'Mediterranean' && ship.country === 'UK'){
    if(!adjacent.includes('England')) adjacent.push('England');
  }
  return adjacent.filter(p => {
    const port = PORTS[p];
    if(!port.available.includes(currentTurn)) return false;
    if(port.side !== 'neutral' && port.side !== ship.side) return false;
    if(port.side === 'neutral' && ship.country === 'UK') return false; // UK艦は中立港使用不可
    if(p === 'Russia' && ship.country === 'UK') return false; // UK艦はRussia帰還不可（Englandへ）
    return true;
  });
}

// 枢軸艦帰還UI: 縦に艦一覧、各行に到達可能港ボタン＋洋上補給ボタン＋やり直し
async function showAxisReturnUI(allShips){
  // 港にいる艦は決定不要（既に到着済み）→ 海域にいる艦のみ対象
  const ships = allShips.filter(s => s.location && SEAS[s.location]);
  if(!ships.length) return;
  return new Promise(resolve => {
    const modal = document.getElementById('axisReturnModal');
    const tbody = document.getElementById('axisReturnBody');
    // 元状態を保存（やり直し用）
    const orig = ships.map(s => ({
      shipId: s.id,
      location: s.location,
      atDock: s.atDock,
      arrivedNeutralTurn: s.arrivedNeutralTurn,
      refuelTurn: s.refuelTurn
    }));
    let remaining = ships.length;
    const decided = new Set(); // 既に選択した艦ID
    tbody.innerHTML = '';

    function buildRow(ship){
      const o = orig.find(x => x.shipId === ship.id);
      const ports = getReturnPorts(ship);
      const tr = document.createElement('tr');
      tr.id = `axret-${ship.id}`;

      const tdName = document.createElement('td');
      const dmgText = ship.damage > 0 ? ` <span style="color:#fa8;">[損害${ship.damage}/${ship.def}]</span>` : '';
      tdName.innerHTML = ship.name + dmgText;
      tr.appendChild(tdName);

      const tdLoc = document.createElement('td');
      tdLoc.textContent = SEA_LABEL[o.location] || o.location;
      tr.appendChild(tdLoc);

      const tdBtn = document.createElement('td');

      const showResult = (resultHtml) => {
        tdBtn.innerHTML = '';
        const span = document.createElement('span');
        span.className = 'ret-result';
        span.innerHTML = resultHtml;
        tdBtn.appendChild(span);
        const redoBtn = document.createElement('button');
        redoBtn.className = 'ret-btn';
        redoBtn.textContent = 'やり直し';
        redoBtn.style.background = '#844';
        redoBtn.style.marginLeft = '8px';
        redoBtn.onclick = () => {
          // 状態を元に戻す
          ship.location = o.location;
          ship.atDock = o.atDock;
          ship.arrivedNeutralTurn = o.arrivedNeutralTurn;
          ship.refuelTurn = o.refuelTurn;
          decided.delete(ship.id);
          remaining++;
          placeAllShips();
          // 行を再構築
          const newTr = buildRow(ship);
          tr.parentNode.replaceChild(newTr, tr);
        };
        tdBtn.appendChild(redoBtn);
      };

      const commit = (resultHtml) => {
        if(!decided.has(ship.id)){
          decided.add(ship.id);
          remaining--;
        }
        showResult(resultHtml);
        placeAllShips();
        if(remaining === 0){
          setTimeout(() => { modal.classList.remove('show'); resolve(); }, 600);
        }
      };

      ports.forEach(p => {
        const btn = document.createElement('button');
        btn.className = 'ret-btn';
        btn.textContent = PORT_LABEL[p] || p;
        btn.onclick = () => {
          ship.location = p;
          ship.atDock = false;
          if(p === 'Neutral') ship.arrivedNeutralTurn = currentTurn;
          commit(`→ ${PORT_LABEL[p]||p}`);
        };
        tdBtn.appendChild(btn);
      });

      const refuelBtn = document.createElement('button');
      refuelBtn.className = 'ret-btn refuel';
      refuelBtn.textContent = '洋上補給';
      const isRefuelable = (
        ship.country === 'DE' &&
        currentTurn <= 3 &&
        (o.location === 'NorthAtlantic' || o.location === 'SouthAtlantic')
      );
      if(!isRefuelable){
        refuelBtn.disabled = true;
      } else {
        refuelBtn.onclick = () => {
          const maxRoll = 6 - currentTurn;
          const r = rollD6();
          if(r <= maxRoll){
            ship.refuelTurn = currentTurn;
            ship.atDock = false;
            commit(`補給⚂${r}≤${maxRoll} 成功 → 海上残留`);
          } else {
            ship.location = 'Neutral';
            ship.arrivedNeutralTurn = currentTurn;
            ship.atDock = false;
            commit(`補給⚂${r}>${maxRoll} 失敗 → 中立港`);
          }
        };
      }
      tdBtn.appendChild(refuelBtn);

      tr.appendChild(tdBtn);
      return tr;
    }

    for(const ship of ships){
      const tr = buildRow(ship);
      tbody.appendChild(tr);
      // デフォルト選択: ドイツ艦 → Germany、イタリア艦 → Italy（候補に含まれる場合のみ自動コミット）
      const defaultPort = ship.country === 'DE' ? 'Germany' : (ship.country === 'IT' ? 'Italy' : null);
      if(defaultPort){
        const ports = getReturnPorts(ship);
        if(ports.includes(defaultPort)){
          ship.location = defaultPort;
          ship.atDock = false;
          decided.add(ship.id);
          remaining--;
          // 既存行を再構築（やり直し付きの結果表示状態にする）
          const newTr = buildRow(ship);
          // 元状態は orig に保持済み、newTr は orig.location を使うので OK
          tr.parentNode.replaceChild(newTr, tr);
          // 結果表示に差し替え
          const tdBtnNew = newTr.querySelector('td:last-child');
          if(tdBtnNew){
            tdBtnNew.innerHTML = '';
            const span = document.createElement('span');
            span.className = 'ret-result';
            span.innerHTML = `→ ${PORT_LABEL[defaultPort]}`;
            tdBtnNew.appendChild(span);
            const redoBtn = document.createElement('button');
            redoBtn.className = 'ret-btn';
            redoBtn.textContent = 'やり直し';
            redoBtn.style.background = '#844';
            redoBtn.style.marginLeft = '8px';
            redoBtn.onclick = () => {
              const o = orig.find(x => x.shipId === ship.id);
              ship.location = o.location;
              ship.atDock = o.atDock;
              ship.arrivedNeutralTurn = o.arrivedNeutralTurn;
              ship.refuelTurn = o.refuelTurn;
              decided.delete(ship.id);
              remaining++;
              placeAllShips();
              const rebuiltTr = buildRow(ship);
              newTr.parentNode.replaceChild(rebuiltTr, newTr);
            };
            tdBtnNew.appendChild(redoBtn);
          }
        }
      }
    }
    placeAllShips();
    if(remaining === 0){
      setTimeout(() => { modal.classList.remove('show'); resolve(); }, 600);
      return;
    }

    modal.classList.add('show');
  });
}

// 複数艦選択（撤退/追跡用）
function selectShipsMulti(candidates, prompt){
  return new Promise(resolve => {
    console.log('[selectShipsMulti] candidates:', candidates.map(s => `${s.name}(cs-row=${!!document.getElementById('cs-'+s.id)})`).join(', '));
    if(!candidates.length){ resolve([]); return; }
    const selected = new Set();
    const handlers = {};

    candidates.forEach(s => {
      if(document.getElementById(`cs-${s.id}`)) return;
      const listId = s.side === 'allies' ? 'alliesShipList' : 'axisShipList';
      const list = document.getElementById(listId);
      if(list){
        list.insertAdjacentHTML('beforeend', renderShipRow(s));
        console.log('[selectShipsMulti] cs-row recreated for', s.name);
      }
    });
    candidates.forEach(s => {
      const row = document.getElementById(`cs-${s.id}`);
      if(!row){ console.log('[selectShipsMulti] cs-row 未生成:', s.name); return; }
      row.classList.add('selectable');
      const onClick = () => {
        if(selected.has(s.id)){
          selected.delete(s.id);
          row.style.boxShadow = '';
        } else {
          selected.add(s.id);
          row.style.boxShadow = 'inset 0 0 0 3px #fc4';
        }
      };
      handlers[s.id] = onClick;
      row.addEventListener('click', onClick);
    });

    phaseEl.innerHTML = `${prompt} <button class="locBtn" id="_msOk" style="margin-left:8px;background:#2266cc;">確定</button> <button class="locBtn" id="_msCancel">取消</button>`;
    const cleanup = () => {
      candidates.forEach(s => {
        const row = document.getElementById(`cs-${s.id}`);
        if(row){
          row.classList.remove('selectable');
          row.style.boxShadow = '';
          if(handlers[s.id]) row.removeEventListener('click', handlers[s.id]);

      resolve(candidates.filter(s => selected.has(s.id)));
    };
