<div style="display:flex; justify-content:space-between; align-items:center;">

</div>

<div>

</div>

    </div>
</div>

</div>

</div>

<div id="log"></div>

  </div>
</div>

// --- ユーティリティ ---
function logMsg(msg) {
    const logDiv = document.getElementById('log');
    logDiv.innerHTML += `<div>${msg}</div>`;
    logDiv.scrollTop = logDiv.scrollHeight;
}
function rollDice(sides = 6) { return Math.floor(Math.random() * sides) + 1; }
function getShipByName(name, array) { return array.find(s => s.name === name); }

function sortShips(fleet, isJp) {
    const TYPE_ORDER = { BB: 0, OBB: 1, CA: 2, CL: 3, CLAA: 3, DD: 4 };
    return fleet.sort((a, b) => {
        const ta = TYPE_ORDER[a.type] ?? 9;
        const tb = TYPE_ORDER[b.type] ?? 9;
        if (ta !== tb) return ta - tb;
        if (a.capG !== b.capG) return b.capG - a.capG;
        if (a.capM !== b.capM) return b.capM - a.capM;
        if (isJp) {
            return (a.yomi || '').localeCompare(b.yomi || '', 'ja');
        } else {
            return a.name.localeCompare(b.name, 'en');
        }
    });
}

function updateTurnDisplay() {
    document.getElementById('currentTurn').innerText = currentTurn;
    document.getElementById('currentTurnName').innerText = BATTLE_NAMES[currentTurn] || `第${currentTurn}回戦`;
}

function updateScoreUI() {
    document.getElementById('jpScore').innerText = jpScore;
    document.getElementById('usScore').innerText = usScore;
}

function usThreatOf(s) {
    return (s.type === 'BB' || s.type === 'OBB') ? 4 : s.type === 'CA' ? 2 : 1;
}

// --- キャンペーン状態永続化 ---
function saveCampaignState() {
    const state = {
        currentTurn, jpScore, usScore, usedRolls, maxUsHandicap, currentPhase, jpMission,
        jpAllShipsState: jpAllShips.map(s => ({ name: s.name, dmgG: s.dmgG, dmgM: s.dmgM, status: s.status, rest: s.rest })),
        usAllShipsState: usAllShips.map(s => ({ name: s.name, dmgG: s.dmgG, dmgM: s.dmgM, status: s.status, used: s.used })),
        currentJpFleetNames: currentJpFleet.map(s => s.name),
        currentUsFleetNames: currentUsFleet.map(s => s.name),
        selectedUsShipNames: [...selectedUsShips],
        battleHistory: battleHistory,
        scoutResults: scoutResults,
    };
    localStorage.setItem('pfCampaignState', JSON.stringify(state));
}

function loadCampaignState() {
    const raw = localStorage.getItem('pfCampaignState');
    if (!raw) return false;
    try {
        const state = JSON.parse(raw);
        currentTurn = state.currentTurn || 1;
        jpScore = state.jpScore !== undefined ? state.jpScore : 0;
        usScore = state.usScore !== undefined ? state.usScore : 0;
        usedRolls = state.usedRolls || [];
        currentPhase = state.currentPhase || 'sortie';
        jpMission = state.jpMission || '';
        battleHistory = state.battleHistory || [];
        scoutResults = state.scoutResults || [];
        maxUsHandicap = state.maxUsHandicap || 0;

        if (state.jpAllShipsState) {
            state.jpAllShipsState.forEach(saved => {
                const ship = jpAllShips.find(s => s.name === saved.name);
                if (ship) { ship.dmgG = saved.dmgG; ship.dmgM = saved.dmgM; ship.status = saved.status; ship.rest = saved.rest; }
            });
        }
        if (state.usAllShipsState) {
            state.usAllShipsState.forEach(saved => {
                const ship = usAllShips.find(s => s.name === saved.name);
                if (ship) { ship.dmgG = saved.dmgG; ship.dmgM = saved.dmgM; ship.status = saved.status; ship.used = saved.used; }
            });
        }

        currentJpFleet = (state.currentJpFleetNames || []).map(n => jpAllShips.find(s => s.name === n)).filter(Boolean);
        currentUsFleet = (state.currentUsFleetNames || []).map(n => usAllShips.find(s => s.name === n)).filter(Boolean);
        selectedUsShips = new Set(state.selectedUsShipNames || []);

        updateTurnDisplay();
        updateScoreUI();
        renderBattleHistory();

        if (battleHistory.length > 0) {
            document.getElementById('scoreArea').style.display = '';
        }

        // ボタン状態復元
        if (currentPhase === 'selecting') {
            document.getElementById('btnSortie').disabled = true;
            document.getElementById('btnCombat').disabled = true; document.getElementById('btnAutoAI').disabled = true;
            document.getElementById('btnNext').disabled = true;
            showScoutResults();
            showFleetSelection();
        } else if (currentPhase === 'combat') {
            document.getElementById('btnSortie').disabled = true;
            document.getElementById('btnCombat').disabled = false; document.getElementById('btnAutoAI').disabled = false;
            document.getElementById('btnNext').disabled = true;
            document.getElementById('fleetPanel').style.display = 'block';
            renderFleetTables();
        } else if (currentPhase === 'next') {
            document.getElementById('btnSortie').disabled = true;
            document.getElementById('btnCombat').disabled = true; document.getElementById('btnAutoAI').disabled = true;
            document.getElementById('btnNext').disabled = false;
            document.getElementById('fleetPanel').style.display = 'block';
            renderFleetTables();
        } else {
            document.getElementById('btnSortie').disabled = false;
            document.getElementById('btnCombat').disabled = true; document.getElementById('btnAutoAI').disabled = true;
            document.getElementById('btnNext').disabled = true;
        }

        return true;
    } catch(e) {
        console.error('Campaign state load error:', e);
        return false;
    }
}

function resetCampaign() {
    if (!confirm('キャンペーンデータをリセットしますか？')) return;
    localStorage.removeItem('pfCampaignState');
    localStorage.removeItem('campaignFleet');
    localStorage.removeItem('battleResultForCampaign');
    location.reload();
}

// --- フェイズ1: 索敵 → 日本軍艦隊決定 ---
function phaseSortie() {
    document.getElementById('scoreArea').style.display = 'none';
    logMsg(`\n--- ${BATTLE_NAMES[currentTurn]} 索敵フェイズ ---`);

    let roll = 0;
    while (roll === 0 || usedRolls.includes(roll)) {
        roll = rollDice() + rollDice();
    }
    usedRolls.push(roll);
    logMsg(`日本軍出撃ダイス: ${roll}`);

    let jpNames = [];
    let ddCount = 0;

    if (roll === 2) { jpNames = ['高雄', '愛宕', '大和', '由良', '長門', '陸奥', '摩耶', '鳥海']; ddCount = rollDice() + 4; maxUsHandicap = 100; }
    else if (roll === 3) { jpNames = ['妙高', '羽黒', '大和', '五十鈴']; ddCount = rollDice(); maxUsHandicap = 50; }
    else if (roll === 4) { jpNames = ['比叡', '霧島', '長良']; ddCount = rollDice() + 4; maxUsHandicap = 30; }
    else if (roll === 5) { jpNames = ['古鷹', '青葉', '衣笠']; ddCount = rollDice(); maxUsHandicap = 10; }
    else if (roll === 6) { jpNames = ['高雄', '愛宕', '摩耶', '鳥海', '川内']; ddCount = rollDice() + 2; maxUsHandicap = 20; }
    else if (roll === 7) { jpNames = []; ddCount = rollDice() + 4; maxUsHandicap = 0; }
    else if (roll === 8) { jpNames = ['北上', '大井']; ddCount = rollDice() + 4; maxUsHandicap = 0; }
    else if (roll === 9) { jpNames = ['熊野', '鈴谷']; ddCount = rollDice(); maxUsHandicap = 10; }
    else if (roll === 10) { jpNames = ['神通', '金剛', '榛名', '妙高', '羽黒']; ddCount = rollDice() + 2; maxUsHandicap = 40; }
    else if (roll === 11) { jpNames = ['夕張', '長門', '陸奥', '利根', '筑摩']; ddCount = rollDice() + 2; maxUsHandicap = 45; }
    else if (roll === 12) { jpNames = ['天龍', '龍田', '伊勢', '日向', '山城', '扶桑']; ddCount = rollDice() + 2; maxUsHandicap = 50; }

    currentJpFleet = [];

    jpNames.forEach(n => {
        let ship = getShipByName(n, jpAllShips);
        if (ship && ship.status !== 'sunk' && ship.rest === 0 && ship.dmgG === 0 && ship.dmgM === 0) {
            currentJpFleet.push(ship);
        } else if(ship) {
            let reason = ship.status === 'sunk' ? '沈没' : (ship.rest > 0 ? `ドック入り(残り${ship.rest}休)` : '損傷あり');
            logMsg(`※ ${ship.name} は出撃不可（${reason}）→ 代替なし`);
        }
    });

    let ddPool = jpAllShips.filter(s => s.type === 'DD' && s.status !== 'sunk' && s.rest === 0 && s.dmgG === 0 && s.dmgM === 0);
    sortShips(ddPool, true);
    for(let i=0; i<Math.min(ddCount, ddPool.length); i++) {
        currentJpFleet.push(ddPool[i]);
    }
    currentJpFleet = sortShips(currentJpFleet, true);

    logMsg(`日本軍艦隊: ${currentJpFleet.length}隻出撃`);

    // 索敵
    scoutResults = [];
    currentJpFleet.forEach(s => {
        const r = scoutShip(s);
        scoutResults.push({ name: s.name, type: s.type, seen: r.seen, threat: r.threat, seenClass: r.seenClass });
    });
    // 脅威値の大きい順にソート（艦の並びから正体を推測されないように）
    scoutResults.sort((a, b) => b.threat - a.threat);

    // 日本軍ミッション判定
    jpMission = currentJpFleet.some(s => s.type === 'BB' || s.type === 'OBB' || s.type === 'CA') ? 'bombard' : 'transport';

    // 米軍usedフラグはリセットしない（一度使用した艦は再利用不可）

    // 索敵結果表示
    showScoutResults();

    // 米軍艦隊選択UI表示
    selectedUsShips.clear();
    showFleetSelection();

    document.getElementById('btnCombat').disabled = true; document.getElementById('btnAutoAI').disabled = true;

}

// --- 索敵関数 ---
function scoutShip(s) {
    const d = rollDice() + rollDice();
    if (d === 12) return { seen: '＊（索敵なし）', threat: 0, seenClass: 'scout-none' };
    if (d === 2) {
        if (s.type === 'BB')                      return { seen: 'LL（超大型艦）',  threat: 6, seenClass: 'scout-ll' };
        if (s.type === 'OBB')                     return { seen: 'L（大型艦）',     threat: 4, seenClass: 'scout-l' };
        if (s.type === 'CA')                      return { seen: 'M（中型艦）',     threat: 2, seenClass: 'scout-m' };
        if (s.type === 'CL' || s.type === 'CLAA') return { seen: 'M（中型艦）',     threat: 2, seenClass: 'scout-m' };
        return { seen: '－（不可視）', threat: 0, seenClass: 'scout-none' };
    }
    if (s.type === 'BB') {
        return Math.random() < 0.5 ? { seen: 'LL（超大型艦）', threat: 6, seenClass: 'scout-ll' } : { seen: 'L（大型艦）', threat: 4, seenClass: 'scout-l' };
    }
    if (s.type === 'OBB') {
        return Math.random() < 0.5 ? { seen: 'L（大型艦）', threat: 4, seenClass: 'scout-l' } : { seen: 'M（中型艦）', threat: 2, seenClass: 'scout-m' };
    }
    if (s.type === 'CA') {
        const r = Math.random();
        if (r < 0.33) return { seen: 'L（大型艦）', threat: 4, seenClass: 'scout-l' };
        if (r < 0.67) return { seen: 'M（中型艦）', threat: 2, seenClass: 'scout-m' };
        return { seen: 'S（小型艦）', threat: 1, seenClass: 'scout-s' };
    }
    if (s.type === 'CL' || s.type === 'CLAA') {
        return Math.random() < 0.5 ? { seen: 'M（中型艦）', threat: 2, seenClass: 'scout-m' } : { seen: 'S（小型艦）', threat: 1, seenClass: 'scout-s' };
    }
    return Math.random() < 0.5 ? { seen: 'M（中型艦）', threat: 2, seenClass: 'scout-m' } : { seen: 'S（小型艦）', threat: 1, seenClass: 'scout-s' };
}

// --- 米軍艦隊選択UI ---
function showFleetSelection() {
    const panel = document.getElementById('fleetSelectPanel');
    panel.style.display = 'block';

    const available = usAllShips.filter(s => s.status !== 'sunk');
    const sorted = sortShips([...available], false);

    // 艦種ごとにグループ化
    const TYPE_LABELS = { BB: '戦艦 (BB)', CA: '重巡洋艦 (CA)', CL: '軽巡洋艦 (CL)', CLAA: '防空巡洋艦 (CLAA)', DD: '駆逐艦 (DD)' };
    const TYPE_ORDER_ARR = ['BB', 'CA', 'CL', 'CLAA', 'DD'];

    let html = '';

        const ships = sorted.filter(s => s.type === type);
        if (ships.length === 0) continue;

        html += `<div class="type-header">${TYPE_LABELS[type]} (${ships.filter(s => !s.used).length}隻利用可)</div>`;

    }

    document.getElementById('usFleetCards').innerHTML = html;

}

// --- 艦の選択トグル ---
function toggleShip(name) {
    const ship = usAllShips.find(s => s.name === name);
    if (!ship || ship.status === 'sunk' || ship.used) return;

    if (selectedUsShips.has(name)) {
        selectedUsShips.delete(name);
    } else {
        selectedUsShips.add(name);
    }

    // カードの見た目を更新
    document.querySelectorAll('.ship-card').forEach(card => {
        const cardName = card.dataset.ship;
        if (cardName === name) {
            card.classList.toggle('selected', selectedUsShips.has(name));
        }
    });

    updateHandicapDisplay();
    saveCampaignState();
}

// --- 参加料(fee)計算: VP = (capG + capM) × 5, fee = VP / 2 ---
function shipFee(s) { return (s.capG + s.capM) * s.vp / 2; }
function fleetFee(fleet) { return fleet.reduce((sum, s) => sum + shipFee(s), 0); }

// --- ハンディキャップ表示更新 ---
// 選択中は米軍側の情報だけ表示（日本軍feeを見せるとサクテキの意味がなくなる）
function updateHandicapDisplay() {
    const selected = [...selectedUsShips].map(n => usAllShips.find(s => s.name === n)).filter(Boolean);
    const selCount = selected.length;

    let usFee = fleetFee(selected);

    // 脅威値（米軍の実値と、索敵で得た見かけの脅威値のみ表示）
    const usThreat = selected.reduce((sum, s) => sum + usThreatOf(s), 0);
    const apparentThreat = scoutResults.reduce((sum, r) => sum + r.threat, 0);

    let html = '';
    html += `<span class="handi-label">選択中: ${selCount}隻</span>`;
    html += ` | <span class="handi-us">米軍脅威値: ${usThreat}</span>`;
    html += ` | <span class="handi-jp">日本軍見かけ脅威値: ${apparentThreat}</span>`;
    html += `<br>`;
    html += `<span class="handi-label">米軍出撃費用:</span> ${usFee}`;
    html += ` <span style="color:#888; font-size:0.85em;">（ハンディキャップは確定後に算出）</span>`;

    // 艦種内訳
    const bb = selected.filter(s => s.type === 'BB').length;
    const ca = selected.filter(s => s.type === 'CA').length;
    const cl = selected.filter(s => s.type === 'CL' || s.type === 'CLAA').length;
    const dd = selected.filter(s => s.type === 'DD').length;
    html += `<br><span style="color:#555; font-size:0.9em;">内訳: BB${bb} CA${ca} CL${cl} DD${dd}</span>`;

    document.getElementById('handicapDisplay').innerHTML = html;

    // 出撃ボタン更新
    const btn = document.getElementById('btnConfirmFleet');
    btn.disabled = (selCount === 0);
    btn.textContent = `出撃確定（${selCount}隻選択中）`;
}

// --- 艦隊確定 ---
function confirmFleet() {
    if (selectedUsShips.size === 0) return;

    currentUsFleet = [...selectedUsShips].map(n => usAllShips.find(s => s.name === n)).filter(Boolean);
    currentUsFleet.forEach(s => { s.used = true; });
    currentUsFleet = sortShips(currentUsFleet, false);

    // ハンディキャップ計算: fee = (capG + capM) × 5 / 2
    let jpFee = fleetFee(currentJpFleet);
    let usFee = fleetFee(currentUsFleet);
    let jpHandicapAdd = Math.max(0, usFee - jpFee);
    let usHandicapAdd = Math.max(0, jpFee - usFee);
    // ロール別キャップ適用
    if (usHandicapAdd > maxUsHandicap) usHandicapAdd = maxUsHandicap;

    jpScore += jpHandicapAdd;
    usScore += usHandicapAdd;
    lastJpHandicap = jpHandicapAdd;
    lastUsHandicap = usHandicapAdd;

    logMsg(`米軍艦隊確定: ${currentUsFleet.length}隻出撃`);
    if (jpHandicapAdd > 0) logMsg(`日本軍ハンディキャップ: +${jpHandicapAdd}点`);
    if (usHandicapAdd > 0) logMsg(`米軍ハンディキャップ: +${usHandicapAdd}点`);

    // 選択パネルを隠して艦隊表示
    document.getElementById('scoutPanel').style.display = 'none';
    document.getElementById('fleetSelectPanel').style.display = 'none';
    document.getElementById('fleetPanel').style.display = 'block';
    renderFleetTables();

    currentPhase = 'combat';
    document.getElementById('btnCombat').disabled = false; document.getElementById('btnAutoAI').disabled = false;
    exportJson();
    saveCampaignState();
}

// --- 戦闘結果読み込み ---
function loadBattleResult() {
    const raw = localStorage.getItem('battleResultForCampaign');
    if (!raw) { logMsg('戦闘結果データがありません。'); return; }
    try {
        const parsed = JSON.parse(raw);
        let importData, endTurn;
        if (Array.isArray(parsed)) {
            importData = parsed;
            endTurn = 10;
        } else {
            importData = parsed.ships || [];
            endTurn = parsed.endTurn || 10;
        }
        applyBattleResultData(importData, endTurn);
        localStorage.removeItem('battleResultForCampaign');
    } catch(e) {
        logMsg('戦闘結果の読み込みエラー: ' + e.message);
    }
}

function applyBattleResultData(importData, endTurn) {
    if (!Array.isArray(importData)) { logMsg('データ形式エラー'); return; }
    endTurn = endTurn || 10;

    logMsg(`\n--- ${BATTLE_NAMES[currentTurn]} 戦闘結果 ---`);

    const jpScoreBefore = jpScore;
    const usScoreBefore = usScore;

    importData.forEach(data => {
        let ship = currentJpFleet.find(s => s.name === data.name) || currentUsFleet.find(s => s.name === data.name);
        if (ship) {
            let addG = data.dmgG || 0;
            let addM = data.dmgM || 0;
            let isUs = currentUsFleet.includes(ship);
            applyDamageToShip(ship, addG, addM, isUs);
            if (data.status === 'sunk' && ship.status !== 'sunk') {
                ship.status = 'sunk';
                ship.rest = 99;
                if (isUs) jpScore += (ship.capG + ship.capM) * ship.vp;
                else usScore += (ship.capG + ship.capM) * ship.vp;
                logMsg(`${ship.name} クリティカル轟沈！`);
            }
        }
    });

    // 航行不能の艦 → 自沈
    importData.forEach(data => {
        if (data.speed !== 0) return;
        let ship = currentJpFleet.find(s => s.name === data.name) || currentUsFleet.find(s => s.name === data.name);
        if (ship && ship.status !== 'sunk') {
            let isUs = currentUsFleet.includes(ship);
            logMsg(`${ship.name} 航行不能 → 自沈処理`);
            applyDamageToShip(ship, 999, 0, isUs);
        }
    });

    // --- 日本軍ボーナス得点 ---
    let jpBonus = 0;
    let jpBonusMission = '';
    const usAllGone = currentUsFleet.every(s => s.status === 'sunk' || (importData.find(d => d.name === s.name && d.col < 0)));
    if (usAllGone && endTurn < 10) {
        logMsg('\n--- 日本軍ボーナス得点 ---');
        logMsg(`米軍全艦が第${endTurn}ターンまでに離脱/撃沈`);

        const mission = jpMission || (currentJpFleet.some(s => s.type === 'BB' || s.type === 'OBB' || s.type === 'CA') ? 'bombard' : 'transport');
        jpBonusMission = mission;
        logMsg(`任務: ${mission === 'bombard' ? '艦砲射撃' : '輸送'}`);

        const BOMBARD_BONUS = {
            '大和':[60,30],'長門':[28,14],'陸奥':[28,14],
            '金剛':[20,10],'榛名':[20,10],'比叡':[20,10],'霧島':[20,10],
            '伊勢':[24,12],'日向':[24,12],
            '扶桑':[24,12],'山城':[24,12],
            '高雄':[8,4],'愛宕':[8,4],'摩耶':[8,4],'鳥海':[8,4],
            '妙高':[8,4],'羽黒':[8,4],'熊野':[8,4],'鈴谷':[8,4],
            '利根':[7,4],'筑摩':[7,4],
            '古鷹':[6,3],'青葉':[6,3],'衣笠':[6,3]
        };
        const TRANSPORT_BONUS = [2, 1];

        currentJpFleet.forEach(ship => {
            if (ship.status === 'sunk') return;
            const jpData = importData.find(d => d.name === ship.name);
            if (jpData && jpData.col < 0) return;
            if (ship.status !== 'ok' && ship.status !== 'light') {
                logMsg(`  ${ship.name}: ${statusLabel(ship.status)} → ボーナス対象外`);
                return;
            }
            let bonus = 0;
            if (mission === 'bombard' && BOMBARD_BONUS[ship.name]) {
                bonus = ship.status === 'ok' ? BOMBARD_BONUS[ship.name][0] : BOMBARD_BONUS[ship.name][1];
            } else if (mission === 'transport' && ship.type === 'DD') {
                bonus = ship.status === 'ok' ? TRANSPORT_BONUS[0] : TRANSPORT_BONUS[1];
            }
            if (bonus > 0) {
                jpBonus += bonus;
                logMsg(`  ${ship.name}: +${bonus}点`);
            }
        });

        if (jpBonus > 0) {
            jpScore += jpBonus;
            logMsg(`日本軍ボーナス合計: +${jpBonus}点`);
        } else {
            logMsg('ボーナス対象艦なし');
        }
    }

    // 戦闘記録を保存
    battleHistory.push({
        turn: currentTurn,
        battleName: BATTLE_NAMES[currentTurn],
        jpShips: currentJpFleet.map(s => ({name:s.name, type:s.type, status:s.status, dmgG:s.dmgG, dmgM:s.dmgM, capG:s.capG, capM:s.capM, vp:s.vp})),
        usShips: currentUsFleet.map(s => ({name:s.name, type:s.type, status:s.status, dmgG:s.dmgG, dmgM:s.dmgM, capG:s.capG, capM:s.capM, vp:s.vp})),
        jpSunk: currentJpFleet.filter(s => s.status === 'sunk').map(s => s.name),
        usSunk: currentUsFleet.filter(s => s.status === 'sunk').map(s => s.name),
        jpDamaged: currentJpFleet.filter(s => s.status !== 'ok' && s.status !== 'sunk').map(s => `${s.name}(${statusLabel(s.status)})`),
        usDamaged: currentUsFleet.filter(s => s.status !== 'ok' && s.status !== 'sunk').map(s => `${s.name}(${statusLabel(s.status)})`),
        jpScoreGain: jpScore - jpScoreBefore,
        usScoreGain: usScore - usScoreBefore,
        jpHandicap: lastJpHandicap,
        usHandicap: lastUsHandicap,
        jpBonus: jpBonus,
        jpBonusMission: jpBonusMission,
    });

    updateScoreUI();
    document.getElementById('scoreArea').style.display = '';
    renderBattleHistory();

    currentPhase = 'next';
    document.getElementById('btnCombat').disabled = true; document.getElementById('btnAutoAI').disabled = true;
    document.getElementById('btnNext').disabled = true;
    saveCampaignState();

    showBattleSummary(battleHistory[battleHistory.length - 1]);
}

function statusLabel(s) {
    if (s === 'light') return '小破';
    if (s === 'medium') return '中破';
    if (s === 'heavy') return '大破';
    if (s === 'sunk') return '沈没';
    return '無傷';
}

// --- VP計算 ---
function calcVPDetail(fleet) {
    const items = [];
    let total = 0;
    for (const s of fleet) {
        let vp = 0, reason = '';
        if (s.status === 'sunk') {
            vp = (s.capG + s.capM) * s.vp;
            reason = '撃沈';
        } else {
            const dmg = (s.dmgG||0) + (s.dmgM||0);
            if (dmg > 0) { vp = dmg * s.vp; reason = statusLabel(s.status); }
        }
        if (vp > 0) { items.push({name:s.name, type:s.type, vp, reason, sunk:s.status==='sunk'}); total += vp; }
    }
    return {items, total};
}
function statusClassRp(s) {
    return {ok:'rp-ok',light:'rp-light',medium:'rp-medium',heavy:'rp-heavy',sunk:'rp-sunk'}[s]||'rp-ok';
}

        html += `<div class="rp-total rp-total-jp"><span>日本軍 合計</span><span>${jpEarned} pt</span></div>`;
        html += `</div>`;

        // 勝敗判定
        let winLabel, winClass;
        if (usEarned > jpEarned) { winLabel = '米軍の勝利！'; winClass = 'us-win'; }
        else if (usEarned < jpEarned) { winLabel = '日本軍の勝利…'; winClass = 'jp-win'; }
        else { winLabel = '引き分け'; winClass = 'draw'; }
        const diff = Math.abs(jpEarned - usEarned);
        html += `<div class="rp-winner"><span class="${winClass}">${winLabel}</span><div style="font-size:0.8em;color:#666;font-weight:normal">${usEarned} 対 ${jpEarned}（差: ${diff}pt）</div></div>`;

        // 米軍艦隊テーブル（プレイヤー側を先に）
        html += `<div class="rp-section">`;
        html += `<h4 class="rp-us">米軍艦隊</h4>`;
        html += `<table class="rp-ship-tbl"><tr><th>艦名</th><th>種</th><th>G</th><th>M</th><th>状態</th></tr>`;
        for (const s of us) {
            const sc = statusClassRp(s.status);
            html += `<tr><td>${s.name}</td><td>${s.type}</td><td>${s.dmgG||0}/${s.capG}</td><td>${s.dmgM||0}/${s.capM}</td><td class="${sc}">${statusLabel(s.status)}</td></tr>`;
        }
        html += `</table>`;
        const usSunk = us.filter(s=>s.status==='sunk');
        if (usSunk.length) html += `<div style="color:#2255cc;font-size:0.8em;margin-top:3px">沈没: ${usSunk.map(s=>s.name).join(', ')}</div>`;
        html += `</div>`;

        // 日本軍艦隊テーブル
        html += `<div class="rp-section">`;
        html += `<h4 class="rp-jp">日本軍艦隊</h4>`;
        html += `<table class="rp-ship-tbl"><tr><th>艦名</th><th>種</th><th>G</th><th>M</th><th>状態</th></tr>`;
        for (const s of jp) {
            const sc = statusClassRp(s.status);
            html += `<tr><td>${s.name}</td><td>${s.type}</td><td>${s.dmgG||0}/${s.capG}</td><td>${s.dmgM||0}/${s.capM}</td><td class="${sc}">${statusLabel(s.status)}</td></tr>`;
        }
        html += `</table>`;
        const jpSunk = jp.filter(s=>s.status==='sunk');
        if (jpSunk.length) html += `<div style="color:#cc2200;font-size:0.8em;margin-top:3px">沈没: ${jpSunk.map(s=>s.name).join(', ')}</div>`;
        html += `</div>`;

        html += `</div>`; // report-col
    });

    html += '</div>';
    document.getElementById('battleHistoryContent').innerHTML = html;
}

// --- ダメージ・スコア処理 ---
function applyDamageToShip(ship, addG, addM, isUs) {
    if (ship.status === 'sunk') return;

    ship.dmgG += addG;
    ship.dmgM += addM;

    if (ship.dmgG > ship.capG) {
        ship.dmgM += (ship.dmgG - ship.capG);
        ship.dmgG = ship.capG;
    }

    let totalCap = ship.capG + ship.capM;
    let totalDmg = ship.dmgG + ship.dmgM;
    let ratio = totalDmg / totalCap;

    if (ship.dmgM >= ship.capM || (addG === 999)) {
        ship.status = 'sunk';
        ship.rest = 99;
        if(isUs) jpScore += ship.capG * ship.vp + ship.capM * ship.vp;
        else usScore += ship.capG * ship.vp + ship.capM * ship.vp;
        logMsg(`${ship.name} 轟沈！`);
    } else if (ratio >= 0.5) {
        ship.status = 'heavy';
        ship.rest = 99;
    } else if (ratio >= 0.25) {
        ship.status = 'medium';
        ship.rest = 2;
    } else if (totalDmg > 0) {
        ship.status = 'light';
        ship.rest = 1;
    }

    if (ship.status !== 'sunk' && (addG > 0 || addM > 0)) {
         if(isUs) jpScore += (addG + addM) * ship.vp;
         else usScore += (addG + addM) * ship.vp;
    }
}

// --- 海戦結果サマリー表示 ---
function showBattleSummary(b) {
    const jpGain = b.jpScoreGain || 0;
    const usGain = b.usScoreGain || 0;
    const diff = usGain - jpGain; // PF版: 米軍視点

    let verdict, verdictColor;
    if (diff >= 80) { verdict = '米軍 大勝利！'; verdictColor = '#4488ff'; }
    else if (diff >= 40) { verdict = '米軍 勝利！'; verdictColor = '#4488ff'; }
    else if (diff >= 10) { verdict = '米軍 辛勝'; verdictColor = '#88aaff'; }
    else if (diff > -10) { verdict = '引き分け'; verdictColor = '#ffd700'; }
    else if (diff > -40) { verdict = '日本軍 辛勝'; verdictColor = '#ff8866'; }
    else if (diff > -80) { verdict = '日本軍 勝利！'; verdictColor = '#ff4444'; }
    else { verdict = '日本軍 大勝利！'; verdictColor = '#ff2200'; }

    document.getElementById('summaryTitle').textContent = b.battleName;
    document.getElementById('summaryWinner').textContent = verdict;
    document.getElementById('summaryWinner').style.color = verdictColor;
    document.getElementById('summaryUsScore').textContent = usGain;
    document.getElementById('summaryJpScore').textContent = jpGain;

    const dmgUs = usGain - (b.usHandicap||0);
    const dmgJp = jpGain - (b.jpHandicap||0) - (b.jpBonus||0);

    let html = '<div style="background:#2a3a4a; border-radius:8px; padding:14px; margin-bottom:12px;">';
    html += '<h3 style="color:#ccc; margin:0 0 10px 0;">得点内訳</h3>';
    html += '<table style="width:100%; border-collapse:collapse; font-size:1em;">';
    html += `<tr><td style="color:#aaa; padding:5px 8px;">損害得点</td><td style="color:#88aaff; padding:5px 8px; text-align:right;">米軍 +${dmgUs}</td><td style="color:#ff8888; padding:5px 8px; text-align:right;">日本軍 +${dmgJp}</td></tr>`;

    if ((b.jpHandicap||0) > 0 || (b.usHandicap||0) > 0) {
        html += `<tr><td style="color:#aaa; padding:5px 8px;">ハンディキャップ</td><td style="color:#88aaff; padding:5px 8px; text-align:right;">${(b.usHandicap||0) > 0 ? '+'+b.usHandicap : '-'}</td><td style="color:#ff8888; padding:5px 8px; text-align:right;">${(b.jpHandicap||0) > 0 ? '+'+b.jpHandicap : '-'}</td></tr>`;
    }

    if ((b.jpBonus||0) > 0) {
        const mLabel = b.jpBonusMission === 'bombard' ? '艦砲射撃' : '輸送';
        html += `<tr><td style="color:#aaa; padding:5px 8px;">日本軍ボーナス(${mLabel}成功)</td><td style="padding:5px 8px; text-align:right; color:#666;">-</td><td style="color:#ffcc00; padding:5px 8px; text-align:right;">+${b.jpBonus}</td></tr>`;
    }

    html += `<tr style="border-top:2px solid #555;"><td style="color:#ddd; padding:6px 8px; font-weight:bold; font-size:1.1em;">合計</td><td style="color:#4488ff; padding:6px 8px; text-align:right; font-weight:bold; font-size:1.1em;">+${usGain}</td><td style="color:#ff4444; padding:6px 8px; text-align:right; font-weight:bold; font-size:1.1em;">+${jpGain}</td></tr>`;
    html += '</table>';

    if (b.usSunk.length > 0 || b.jpSunk.length > 0) {
        html += '<div style="margin-top:10px; border-top:1px solid #444; padding-top:8px;">';
        if (b.usSunk.length > 0) html += `<div style="color:#6688ff; margin-bottom:3px;">米軍沈没: ${b.usSunk.join(', ')}</div>`;
        if (b.jpSunk.length > 0) html += `<div style="color:#ff6666;">日本軍沈没: ${b.jpSunk.join(', ')}</div>`;
        html += '</div>';
    }

    if (b.usDamaged.length > 0 || b.jpDamaged.length > 0) {
        html += '<div style="margin-top:6px; font-size:0.9em;">';
        if (b.usDamaged.length > 0) html += `<div style="color:#88aacc;">米軍損傷: ${b.usDamaged.join(', ')}</div>`;
        if (b.jpDamaged.length > 0) html += `<div style="color:#ff9966;">日本軍損傷: ${b.jpDamaged.join(', ')}</div>`;
        html += '</div>';
    }

    html += '</div>';

    // 累計スコア
    html += '<div style="background:#2a3a4a; border-radius:8px; padding:14px;">';
    html += `<h3 style="color:#ccc; margin:0 0 5px 0;">累計スコア (${currentTurn}/4海戦)</h3>`;
    html += `<div style="display:flex; justify-content:center; gap:40px;">`;
    html += `<span style="color:#4488ff; font-size:1.3em; font-weight:bold;">米軍 ${usScore}</span>`;
    html += `<span style="color:#888; font-size:1.3em;">vs</span>`;
    html += `<span style="color:#ff4444; font-size:1.3em; font-weight:bold;">日本軍 ${jpScore}</span>`;
    html += `</div></div>`;

    document.getElementById('summaryBattles').innerHTML = html;
    document.getElementById('summarySunkList').innerHTML = '';

    const btnText = currentTurn >= 4 ? '最終結果へ' : '次の海戦へ';
    document.getElementById('summaryConfirmBtn').textContent = btnText;
    document.getElementById('summaryOverlay').style.display = 'block';
}

let summaryIsFinal = false;

function closeSummaryAndProceed() {
    document.getElementById('summaryOverlay').style.display = 'none';
    if (summaryIsFinal) {
        summaryIsFinal = false;
        return;
    }
    if (currentTurn >= 4) {
        logMsg(`\n=== キャンペーン終了！ ===`);
        logMsg(`最終スコア - 米軍: ${usScore} / 日本軍: ${jpScore}`);
        let winner = usScore > jpScore ? "アメリカ軍" : (jpScore > usScore ? "日本軍" : "引き分け");
        logMsg(`勝者: ${winner}`);
        document.getElementById('btnNext').disabled = true;
        document.getElementById('btnSortie').disabled = true;
        saveCampaignState();
        showCampaignSummary();
    } else {
        document.getElementById('btnNext').disabled = false;
        logMsg(`戦闘結果反映完了。次の海戦へ進んでください。`);
    }
}

// --- キャンペーン終了サマリー ---
function showCampaignSummary() {
    summaryIsFinal = true;
    document.getElementById('summaryTitle').textContent = '＝ キャンペーン終了 ＝';
    let winner = usScore > jpScore ? 'アメリカ軍の勝利！' : (jpScore > usScore ? '日本軍の勝利！' : '引き分け！');
    let winColor = usScore > jpScore ? '#4488ff' : (jpScore > usScore ? '#ff4444' : '#ffd700');
    document.getElementById('summaryWinner').textContent = winner;
    document.getElementById('summaryWinner').style.color = winColor;
    document.getElementById('summaryUsScore').textContent = usScore;
    document.getElementById('summaryJpScore').textContent = jpScore;

    let battlesHtml = '';
    battleHistory.forEach(b => {
        battlesHtml += `<div style="background:#2a3a4a; border-radius:8px; padding:14px; margin-bottom:12px; border-left:4px solid #ffd700;">`;

        const dmgJp = b.jpScoreGain - (b.jpHandicap||0) - (b.jpBonus||0);
        battlesHtml += `<tr><td style="color:#aaa; padding:3px 8px;">損害得点</td><td style="color:#88aaff; padding:3px 8px; text-align:right;">米軍 +${dmgUs}</td><td style="color:#ff8888; padding:3px 8px; text-align:right;">日本軍 +${dmgJp}</td></tr>`;

        if ((b.jpHandicap||0) > 0 || (b.usHandicap||0) > 0) {
            battlesHtml += `<tr><td style="color:#aaa; padding:3px 8px;">ハンディキャップ</td><td style="color:#88aaff; padding:3px 8px; text-align:right;">${(b.usHandicap||0) > 0 ? '+'+b.usHandicap : '-'}</td><td style="color:#ff8888; padding:3px 8px; text-align:right;">${(b.jpHandicap||0) > 0 ? '+'+b.jpHandicap : '-'}</td></tr>`;
        }

        if ((b.jpBonus||0) > 0) {
            const mLabel = b.jpBonusMission === 'bombard' ? '艦砲射撃' : '輸送';
            battlesHtml += `<tr><td style="color:#aaa; padding:3px 8px;">日本軍ボーナス(${mLabel})</td><td style="padding:3px 8px; text-align:right; color:#666;">-</td><td style="color:#ffcc00; padding:3px 8px; text-align:right;">+${b.jpBonus}</td></tr>`;

        if (b.jpSunk.length > 0) battlesHtml += `<tr><td colspan="3" style="color:#ff6666; padding:3px 8px; font-size:0.85em;">日本軍沈没: ${b.jpSunk.join(', ')}</td></tr>`;

// --- 次のターンへ ---
function phaseNextTurn() {
    if (currentTurn >= 4) {
        logMsg(`\n=== キャンペーン終了！ ===`);
        logMsg(`最終スコア - 米軍: ${usScore} / 日本軍: ${jpScore}`);
        let winner = usScore > jpScore ? "アメリカ軍" : (jpScore > usScore ? "日本軍" : "引き分け");
        logMsg(`勝者: ${winner}`);
        document.getElementById('btnNext').disabled = true;
        document.getElementById('btnSortie').disabled = true;
        renderBattleHistory();
        saveCampaignState();
        return;
    }

    // ドックでの修理（米軍艦の修理）
    usAllShips.forEach(s => {
        if (s.status !== 'sunk' && s.status !== 'heavy' && (s.dmgG > 0 || s.dmgM > 0)) {
            // 小破・中破の修理
            const totalCap = s.capG + s.capM;
            const totalDmg = s.dmgG + s.dmgM;
            const ratio = totalDmg / totalCap;
            if (ratio < 0.25) {
                // 小破: 1ターンで修理完了
                s.dmgG = 0; s.dmgM = 0; s.status = 'ok';
                delete s.speed; delete s.crits; delete s.critHitMod; delete s.onFire;
                logMsg(`${s.name} の修理完了。`);
            } else if (ratio < 0.5) {
                // 中破: ダメージ半減
                s.dmgG = Math.floor(s.dmgG / 2);
                s.dmgM = Math.floor(s.dmgM / 2);
                if (s.dmgG + s.dmgM === 0) { s.status = 'ok'; delete s.speed; delete s.crits; delete s.critHitMod; delete s.onFire; }
                else { s.status = 'light'; }
                logMsg(`${s.name} の修理進行中（中破→${statusLabel(s.status)}）`);
            }
        }
    });

    // 日本軍ドック修理
    jpAllShips.forEach(s => {
        if (s.rest > 0 && s.status !== 'sunk' && s.status !== 'heavy') {
            s.rest--;
            if (s.rest === 0) {
                s.dmgG = 0;
                s.dmgM = 0;
                s.status = 'ok';
                delete s.speed; delete s.crits; delete s.critHitMod; delete s.onFire;
                logMsg(`${s.name} の修理完了、戦線復帰。`);
            }
        }
    });

    currentTurn++;
    updateTurnDisplay();

    currentJpFleet = [];
    currentUsFleet = [];
    selectedUsShips.clear();
    scoutResults = [];

    // パネルを隠す
    document.getElementById('scoutPanel').style.display = 'none';
    document.getElementById('fleetSelectPanel').style.display = 'none';
    document.getElementById('fleetPanel').style.display = 'none';

    currentPhase = 'sortie';
    document.getElementById('btnSortie').disabled = false;
    document.getElementById('btnNext').disabled = true;
    saveCampaignState();

    logMsg(`\n--- ${BATTLE_NAMES[currentTurn]} へ移行 ---`);
}

window.addEventListener('load', () => {
    loadCampaignState();

    const raw = localStorage.getItem('battleResultForCampaign');
    if (raw) {
        logMsg('--- 海戦結果を自動読み込み ---');
        document.getElementById('fleetPanel').style.display = 'block';
        renderFleetTables();
        loadBattleResult();
    }
});
