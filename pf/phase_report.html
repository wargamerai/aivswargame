<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<style>
body { background:#f5f5fa; color:#222; font-family:monospace; padding:12px; font-size:0.95em; overflow-y:auto; }
h3 { color:#1a5a8a; margin-bottom:8px; }
h4 { color:#1a5a8a; margin:10px 0 5px; border-bottom:1px solid #ccc; padding-bottom:3px; }
.report { background:#f0f0f0; border:1px solid #bbb; border-radius:4px; padding:10px; margin:8px 0; }
table { width:100%; border-collapse:collapse; font-size:0.9em; margin-top:5px; }
th { background:#e0e8f0; color:#444; padding:4px 6px; border:1px solid #ccc; text-align:left; }
td { padding:4px 6px; border:1px solid #ddd; }
.ok     { color:#2a8a2a; }
.light  { color:#aa8800; }
.medium { color:#cc6600; }
.heavy  { color:#cc2200; }
.sunk   { color:#cc0000; font-weight:bold; }
.crit   { color:#aa00aa; font-size:0.85em; }
.jp { color:#cc3311; } .us { color:#2255cc; }
#scoreBox { background:#f0f0f0; border:1px solid #bbb; padding:10px; border-radius:4px; margin:10px 0; font-size:1em; }
.score-line { margin:4px 0; }
.winner { color:#8a6a00; font-size:1.15em; font-weight:bold; }
.vp-detail { margin:4px 0 2px 16px; font-size:0.85em; color:#555; }
.vp-detail .ship-vp { display:flex; justify-content:space-between; padding:1px 0; border-bottom:1px dotted #ccc; }
.vp-detail .ship-vp:last-child { border-bottom:none; }
.vp-detail .vp-val { font-weight:bold; color:#1a5a8a; min-width:60px; text-align:right; }
.vp-detail .vp-sunk { color:#cc0000; }
.vp-subtotal { margin:4px 0 2px 16px; font-size:0.9em; font-weight:bold; border-top:1px solid #999; padding-top:3px; display:flex; justify-content:space-between; }
.bonus-section { margin:6px 0 2px 16px; padding:6px 8px; background:#fffff0; border:1px solid #cc8; border-radius:3px; }
.bonus-title { font-weight:bold; color:#8a6a00; margin-bottom:3px; }
.winner-box { text-align:center; padding:10px; margin-top:8px; border:2px solid #8a6a00; border-radius:6px; background:#fffff0; }
.winner-box .result-label { font-size:1.3em; font-weight:bold; }
.winner-box .jp-win { color:#cc3311; }
.winner-box .us-win { color:#2255cc; }
.winner-box .draw { color:#888; }
button {
  background:#dde4f0; color:#334; border:1px solid #99a;
  padding:6px 12px; font-size:0.95em; cursor:pointer; border-radius:3px; margin:5px 3px 0 0; font-weight:bold;
}
button:hover { background:#c8d4ee; }
button.send { background:#d0f0d0; border-color:#2a8a2a; color:#1a5a1a; }
button.send:hover { background:#b8e8b8; }
</style>
</head>
<body>
<h3>戦闘レポート</h3>

<div id="reportContent"></div>

<div id="actionButtons" style="margin-top:12px;">
  <button onclick="goNextTurn()" id="btnNextTurn">次のターンへ</button>
  <button class="send" onclick="sendToCampaign()">キャンペーンに戻る（戦闘終了）</button>
</div>

<script>
let state = null;

function statusLabel(s) {
  return {ok:'無傷',light:'小破',medium:'中破',heavy:'大破',sunk:'沈没',exited:'離脱'}[s]||s;
}

// 霧モード用：自軍損害を曖昧表示
function fuzzyStatus(s) {
  if (s.status === 'sunk')   return '沈没確認';
  if (s.status === 'heavy')  return '大損傷か？';
  if (s.status === 'medium') return '損傷中';
  if (s.status === 'light')  return '被弾あり';
  return '異常なし？';
}
function statusClass(s) {
  return {ok:'ok',light:'light',medium:'medium',heavy:'heavy',sunk:'sunk',exited:'sunk'}[s]||'ok';
}

// 艦ごとの内訳付きVP計算
function calcVPDetail(fleet) {
  const items = [];
  let total = 0;
  for (const s of fleet) {
    let vp = 0;
    let reason = '';
    if (s.status === 'sunk') {
      vp = (s.capG + s.capM) * s.vp;
      reason = '撃沈';
    } else {
      const dmg = (s.dmgG||0) + (s.dmgM||0);
      if (dmg > 0) {
        vp = dmg * s.vp;
        reason = statusLabel(s.status);
      }
    }
    if (vp > 0) {
      items.push({ name: s.name, type: s.type, vp, reason, sunk: s.status === 'sunk' });
      total += vp;
    }
  }
  return { items, total };
}

function init() {
  const raw = localStorage.getItem('hubState');
  if (!raw) { document.getElementById('reportContent').textContent='データなし'; return; }
  state = JSON.parse(raw);
  renderReport();
  // 10ターン経過 → 次ターンボタン無効化
  if (state.combatTurn >= 10) {
    const btn = document.getElementById('btnNextTurn');
    if (btn) { btn.disabled = true; btn.textContent = '戦闘終了（10ターン経過）'; }
  }
  // fullAutoAI: レポートを3秒表示してから自動で次ターンへ
  if (localStorage.getItem('fullAutoAI') === '1') {
    if (state.combatTurn >= 10) {
      setTimeout(() => sendToCampaign(), 3000);
    } else {
      setTimeout(() => goNextTurn(), 3000);
    }
  }
}

function renderReport() {
  const jp = state.jpFleet || [];
  const us = state.usFleet || [];

  const jpSunk    = jp.filter(s=>s.status==='sunk');
  const jpHeavy   = jp.filter(s=>s.status==='heavy');
  const jpMedium  = jp.filter(s=>s.status==='medium');
  const jpLight   = jp.filter(s=>s.status==='light');
  const jpOk      = jp.filter(s=>s.status==='ok');

  const usSunk    = us.filter(s=>s.status==='sunk');
  const usHeavy   = us.filter(s=>s.status==='heavy');
  const usMedium  = us.filter(s=>s.status==='medium');
  const usLight   = us.filter(s=>s.status==='light');
  const usOk      = us.filter(s=>s.status==='ok');

  // VP内訳計算: 敵艦への損害 = 自軍の得点
  const jpVPDetail = calcVPDetail(us); // 米艦への損害 = 日本軍得点
  const usVPDetail = calcVPDetail(jp); // 日本艦への損害 = 米軍得点
  const jpCombat = jpVPDetail.total;
  const usEarned = usVPDetail.total;

  const combatTurn = state.combatTurn || 0;

  // ボーナスVP固定値テーブル
  const BOMBARD_BONUS = {
    '大和':[60,30],'長門':[28,14],'陸奥':[28,14],
    '金剛':[20,10],'榛名':[20,10],'比叡':[20,10],'霧島':[20,10],
    '伊勢':[24,12],'日向':[24,12],
    '扶桑':[24,12],'山城':[24,12],
    '高雄':[8,4],'愛宕':[8,4],'摩耶':[8,4],'鳥海':[8,4],
    '妙高':[8,4],'羽黒':[8,4],'熊野':[8,4],'鈴谷':[8,4],
    '利根':[7,4],'筑摩':[7,4],
    '古鷹':[6,3],'青葉':[6,3],'衣笠':[6,3]
  };
  const TRANSPORT_BONUS = [2, 1]; // DD: [無傷, 小破]

  let jpBonus = 0;
  let jpBonusItems = [];
  const usAllGone = us.every(s => s.status === 'sunk' || s.status === 'exited' || s.col < 0);
  const mission = jp.some(s => s.type === 'BB' || s.type === 'OBB' || s.type === 'CA') ? 'bombard' : 'transport';
  const missionLabel = mission === 'bombard' ? '艦砲射撃' : '輸送';
  if (usAllGone && combatTurn < 10) {
    for (const s of jp) {
      if (s.status === 'sunk') continue;
      if (s.col < 0) continue;
      if (s.status !== 'ok' && s.status !== 'light') continue;
      let bonus = 0;
      if (mission === 'bombard' && BOMBARD_BONUS[s.name]) {
        bonus = s.status === 'ok' ? BOMBARD_BONUS[s.name][0] : BOMBARD_BONUS[s.name][1];
      } else if (mission === 'transport' && s.type === 'DD') {
        bonus = s.status === 'ok' ? TRANSPORT_BONUS[0] : TRANSPORT_BONUS[1];
      }
      if (bonus > 0) {
        jpBonus += bonus;
        const cond = s.status === 'ok' ? '無傷' : '小破';
        jpBonusItems.push({ name: s.name, bonus, cond });
      }
    }
  }
  const jpEarned = jpCombat + jpBonus;

  let html = '';

  // Summary
  html += `<div class="report">`;
  html += `<h4>戦闘概要</h4>`;
  html += `<div>戦闘ターン数: <strong>${combatTurn}</strong></div>`;
  html += `<div>視認距離: ${state.spotRange||'-'} hex</div>`;
  html += `<div>先攻: ${state.initiative==='jp'?'<span class="jp">日本軍</span>':'<span class="us">米軍</span>'}</div>`;
  if (usAllGone && combatTurn < 10) {
    html += `<div>任務: <strong>${missionLabel}</strong></div>`;
  }
  html += `</div>`;

  // ── 得点内訳 ──
  html += `<div id="scoreBox">`;
  html += `<h4 class="jp" style="margin-top:0">🎌 日本軍 戦果報告</h4>`;

  // 日本軍の戦闘得点内訳（米艦への損害）
  if (jpVPDetail.items.length > 0) {
    html += `<div style="font-size:0.85em;color:#666;margin-bottom:2px">【戦闘損害による得点】</div>`;
    html += `<div class="vp-detail">`;
    for (const it of jpVPDetail.items) {
      const sunkCls = it.sunk ? ' vp-sunk' : '';
      const mark = it.sunk ? '💥 ' : '💢 ';
      html += `<div class="ship-vp">
        <span>${mark}${it.name} <span style="color:#888">(${it.type})</span> ─ ${it.reason}</span>
        <span class="vp-val${sunkCls}">+${it.vp} pt</span>
      </div>`;
    }
    html += `</div>`;
    html += `<div class="vp-subtotal"><span>戦闘得点 小計</span><span>${jpCombat} pt</span></div>`;
  } else {
    html += `<div style="color:#889;margin:4px 0 4px 16px;font-size:0.85em">戦闘損害なし</div>`;
  }

  // ボーナス内訳
  if (jpBonus > 0) {
    html += `<div class="bonus-section">`;
    html += `<div class="bonus-title">🏆 ${missionLabel}ボーナス（敵艦隊全滅・${combatTurn}ターンで達成）</div>`;
    html += `<div class="vp-detail">`;
    for (const b of jpBonusItems) {
      html += `<div class="ship-vp">
        <span>⭐ ${b.name} <span style="color:#888">(${b.cond})</span></span>
        <span class="vp-val" style="color:#8a6a00">+${b.bonus} pt</span>
      </div>`;
    }
    html += `</div>`;
    html += `<div class="vp-subtotal"><span>${missionLabel}ボーナス 小計</span><span>${jpBonus} pt</span></div>`;
    html += `</div>`;
  } else if (usAllGone && combatTurn >= 10) {
    html += `<div style="color:#889;margin:4px 0 4px 16px;font-size:0.85em">※ 敵全滅も10ターン経過のためボーナスなし</div>`;
  }

  // 日本軍合計
  html += `<div style="font-size:1.1em;font-weight:bold;margin:8px 0 4px 0;padding:4px 8px;background:#ffe8e0;border-radius:3px;display:flex;justify-content:space-between">
    <span>🎌 日本軍 合計得点</span><span>${jpEarned} pt</span></div>`;

  // 米軍得点
  html += `<h4 class="us" style="margin-top:12px">🦅 米軍 戦果</h4>`;
  if (state.contactMade) {
    if (usVPDetail.items.length > 0) {
      html += `<div style="font-size:0.85em;color:#666;margin-bottom:2px">【戦闘損害による得点】</div>`;
      html += `<div class="vp-detail">`;
      for (const it of usVPDetail.items) {
        const sunkCls = it.sunk ? ' vp-sunk' : '';
        const mark = it.sunk ? '💥 ' : '💢 ';
        html += `<div class="ship-vp">
          <span>${mark}${it.name} <span style="color:#888">(${it.type})</span> ─ ${it.reason}</span>
          <span class="vp-val${sunkCls}">+${it.vp} pt</span>
        </div>`;
      }
      html += `</div>`;
    } else {
      html += `<div style="color:#889;margin:4px 0 4px 16px;font-size:0.85em">戦闘損害なし</div>`;
    }
    html += `<div style="font-size:1.1em;font-weight:bold;margin:8px 0 4px 0;padding:4px 8px;background:#e0e8ff;border-radius:3px;display:flex;justify-content:space-between">
      <span>🦅 米軍 合計得点</span><span>${usEarned} pt</span></div>`;

    // 勝敗判定
    let winLabel, winClass;
    if (jpEarned > usEarned) { winLabel = '日本軍の勝利！'; winClass = 'jp-win'; }
    else if (jpEarned < usEarned) { winLabel = '米軍の勝利…'; winClass = 'us-win'; }
    else { winLabel = '引き分け'; winClass = 'draw'; }
    const diff = Math.abs(jpEarned - usEarned);
    const ratio = usEarned > 0 ? (jpEarned / usEarned).toFixed(1) : '∞';
    html += `<div class="winner-box">
      <div class="result-label ${winClass}">${winLabel}</div>
      <div style="font-size:0.85em;color:#666;margin-top:4px">${jpEarned} 対 ${usEarned}（差: ${diff}pt / 比率: ${ratio}）</div>
    </div>`;
  } else {
    html += `<div style="color:#889;padding:8px">未接触 — 米軍得点: 不明</div>`;
  }
  html += `</div>`;

  // JP fleet table
  html += `<div class="report">`;
  html += `<h4 class="jp">🎌 日本軍艦隊</h4>`;
  const fog = !!state.fogMode;
  html += `<table><tr><th>艦名</th><th>艦種</th><th>G損害</th><th>M損害</th><th>状態</th><th>クリティカル</th></tr>`;
  for (const s of jp) {
    const sc = statusClass(s.status);
    const gd = fog ? '???' : `${s.dmgG||0}/${s.capG}`;
    const md = fog ? '???' : `${s.dmgM||0}/${s.capM}`;
    const st = fog ? fuzzyStatus(s) : statusLabel(s.status);
    const crits = (s.crits && s.crits.length > 0) ? `<span class="crit">${s.crits.join(', ')}</span>` : '-';
    html += `<tr><td>${s.name}</td><td>${s.type}</td>
      <td>${gd}</td><td>${md}</td>
      <td class="${sc}">${st}</td><td>${fog ? '???' : crits}</td></tr>`;
  }
  html += `</table>`;
  html += `<div style="margin-top:4px;color:#889;font-size:0.75em">`;
  if (jpSunk.length)   html += `沈没: ${jpSunk.map(s=>s.name).join(', ')}<br>`;
  if (jpHeavy.length)  html += `大破: ${jpHeavy.map(s=>s.name).join(', ')}<br>`;
  if (jpMedium.length) html += `中破: ${jpMedium.map(s=>s.name).join(', ')}<br>`;
  if (jpLight.length)  html += `小破: ${jpLight.map(s=>s.name).join(', ')}`;
  html += `</div></div>`;

  // US fleet table
  html += `<div class="report">`;
  html += `<h4 class="us">🦅 米軍艦隊</h4>`;
  if (!state.contactMade) {
    html += `<div style="color:#889;padding:8px">未接触 — 敵艦隊情報なし</div>`;
  } else {
    html += `<table><tr><th>艦名</th><th>艦種</th><th>状態（推定）</th><th>クリティカル</th></tr>`;
    for (const s of us) {
      const sc = statusClass(s.status);
      if (fog) {
        const est = s.status==='sunk' ? '<span class="sunk">沈没目撃</span>'
          : s.onFire ? '<span class="heavy">炎上中</span>'
          : '不明';
        const fogCrit = s.onFire ? '<span class="crit">炎上</span>' : '不明';
        html += `<tr><td>${s.name}</td><td>???</td><td>${est}</td><td>${fogCrit}</td></tr>`;
      } else {
        const crits = (s.crits && s.crits.length > 0) ? `<span class="crit">${s.crits.join(', ')}</span>` : '-';
        html += `<tr><td>${s.name}</td><td>${s.type}</td>
          <td class="${sc}">${statusLabel(s.status)} (G:${s.dmgG||0} M:${s.dmgM||0})</td><td>${crits}</td></tr>`;
      }
    }
    html += `</table>`;
    html += `<div style="margin-top:4px;color:#889;font-size:0.75em">`;
    if (usSunk.length)   html += `沈没: ${usSunk.map(s=>s.name).join(', ')}<br>`;
    if (usHeavy.length)  html += `大破: ${usHeavy.map(s=>s.name).join(', ')}<br>`;
    if (usMedium.length) html += `中破: ${usMedium.map(s=>s.name).join(', ')}<br>`;
    if (usLight.length)  html += `小破: ${usLight.map(s=>s.name).join(', ')}`;
    html += `</div>`;
  }
  html += `</div>`;

  document.getElementById('reportContent').innerHTML = html;

  // Save result for campaign
  const allFleet = [...jp, ...us];
  const result = allFleet.map(s => ({
    name:   s.name,
    dmgG:   s.dmgG || 0,
    dmgM:   s.dmgM || 0,
    status: s.status,
    speed:  s.speed !== undefined && s.speed !== null ? s.speed : -1,
  }));
  localStorage.setItem('battleResult', JSON.stringify(result));
}

function sendToCampaign() {
  const raw = localStorage.getItem('battleResult');
  if (!raw) { alert('データなし'); return; }
  const data = JSON.parse(raw);
  const ships = data.map(s => ({name:s.name, dmgG:s.dmgG, dmgM:s.dmgM, status:s.status, speed:s.speed}));
  const forCampaign = { endTurn: state.combatTurn || 0, ships: ships };
  localStorage.setItem('battleResultForCampaign', JSON.stringify(forCampaign));
  // キャンペーン画面を開く（同じタブで遷移）
  window.top.location.href = 'campaign.html';
}

function goNextTurn() {
  // hubのnextTurn()を呼んで次ターンへ
  parent.postMessage({type:'NEXT_TURN'}, '*');
}

// hub から BATTLE_END を受信 → 自動でキャンペーンに戻る
window.addEventListener('message', function(e) {
  if (e.data && e.data.type === 'BATTLE_END') {
    sendToCampaign();
  }
});

init();
</script>
</body>
</html>
