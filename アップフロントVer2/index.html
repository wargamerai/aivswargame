function onGroupClickActionPhase(side, idx) {
  if (!state.selectedAction) return;
  const needsSource = ACTIONS_NEED_SOURCE.indexOf(state.selectedAction) >= 0;
  const needsTarget = ACTIONS_NEED_TARGET.indexOf(state.selectedAction) >= 0;
  // アクション済みグループはソースに選べない
  if (side === 'player' && needsSource && state.actedGroups && state.actedGroups.has(idx)) {
    alert('このグループは今ターン既にアクション済みです');
    return;
  }
  if (side === 'player' && needsSource) {
    state.fireSource = { side, idx };
  } else if (side === 'ai' && needsTarget) {
    state.fireTarget = { side, idx };
  } else if (side === 'player' && !needsTarget) {
    state.fireSource = { side, idx };
  }
  renderField('player'); renderField('ai');
  updateConfirmBtn();
  updateDecideBtn();
}

state.sniperTarget = null; // {side, grpIdx, cardIdx}

function updateConfirmBtn() {
  const btn = document.getElementById('btn-confirm');
  const act = state.selectedAction;
  if (!act) { btn.disabled = true; return; }
  if (act === 'move') {
    btn.disabled = !(state.selectedHand.size > 0 && state.fireSource);
    return;
  }
  if (act === 'terrain') {
    btn.disabled = !(state.selectedHand.size > 0 && (state.fireSource || state.fireTarget));
    return;
  }
  if (act === 'recover') {
    btn.disabled = !(state.selectedHand.size > 0 && state.fireSource);
    return;
  }
  if (act === 'wire-remove') {
    btn.disabled = !(state.selectedHand.size > 0 && state.fireSource);
    return;
  }
  if (act === 'repair') {
    btn.disabled = !state.fireSource;
    return;
  }
  if (act === 'snipe') {
    btn.disabled = !(state.selectedHand.size > 0 && state.sniperTarget);
    return;
  }
  if (act === 'discard') {
    const rem = window.DISCARD_RULES ? window.DISCARD_RULES.getRemainingDiscard() : Infinity;
    const can = rem > 0;
    btn.disabled = !(state.selectedHand.size > 0 && can);
    return;
  }
  if (act === 'infiltrate') {
    if (!state.fireSource || !state.fireTarget) { btn.disabled = true; return; }
    const src = state.groups.player[state.fireSource.idx];
    const tgt = state.groups.ai[state.fireTarget.idx];
    if (!src || !tgt || !window.CC_ACTION) { btn.disabled = true; return; }
    const chk = window.CC_ACTION.canAttemptInfiltration(src, tgt, 'player');
    btn.disabled = !chk.ok;
    return;
  }
  if (act === 'cc') {
    if (!state.fireSource) { btn.disabled = true; return; }
    const src = state.groups.player[state.fireSource.idx];
    if (!src || !window.CC_ACTION) { btn.disabled = true; return; }
    const chk = window.CC_ACTION.canAttemptCC(src);
    btn.disabled = !chk.ok;
    return;
  }
  btn.disabled = true;
}
window.updateConfirmBtn = updateConfirmBtn;

document.getElementById('btn-confirm').addEventListener('click', () => {
  const btn = document.getElementById('btn-confirm');
  if (btn.disabled) return;
  const act = state.selectedAction;
  let playerDidRuleAction = false;

  if (act === 'move') {
    const cardIdx = [...state.selectedHand][0];
    const card = state.playerHand[cardIdx];
    if (!card || !state.fireSource) return;
    const grp = state.groups.player[state.fireSource.idx];
    const R = window.INFANTRY_RULES;
    if (R && grp.cards.some(c => R.isPinned(c))) {
      alert('PIN状態の兵士がいるグループは移動できません');
      return;
    }
    showMoveDirectionModal(grp, card, cardIdx);
    return;
  }

  if (act === 'crew') {
    if (!state.fireSource) return;
    const grp = state.groups.player[state.fireSource.idx];
    const R = window.INFANTRY_RULES;
    if (!R) return;
    const playerKey = getFactionKey(state.player);
    const pairs = grp.crewPairs || {};
    const pairStr = Object.entries(pairs).map(([o, a]) => `${o}→${a}`).join(', ') || '(なし)';
    const soldierList = grp.cards.filter(c => R.isAlive(c))
      .map(c => { const d = R.lookupSoldier(c, playerKey); return `${c.num}: ${d ? d.name : c.id} (${d ? d.weaponCat : '-'})`; })
      .join('\n');
    const input = prompt(`現在のクルーペア: ${pairStr}\n\n兵士一覧:\n${soldierList}\n\n操作:\n・解除: clear\n・設定: オーナー番号=アシスタント番号 (例 3=17)\n・全解除+新設定: clear;3=17`);
    if (input == null) return;
    if (!grp.crewPairs) grp.crewPairs = {};
    input.split(';').forEach(cmd => {
      cmd = cmd.trim();
      if (cmd === 'clear') { grp.crewPairs = {}; return; }
      const m = cmd.match(/^(\d+)=(\d+)$/);
      if (m) grp.crewPairs[parseInt(m[1], 10)] = parseInt(m[2], 10);
    });
    renderField('player');
    playerDidRuleAction = true;
  }

  if (act === 'flank') {
    const cardIdx = [...state.selectedHand][0];
    const card = state.playerHand[cardIdx];
    if (!card || !state.fireSource || !state.fireTarget) return;
    if (!card.terrain || card.terrain.type !== 'MOVEMENT') { alert('移動カードを選択してください'); return; }
    const srcGrp = state.groups.player[state.fireSource.idx];
    const tgtGrp = state.groups.ai[state.fireTarget.idx];
    const R = window.INFANTRY_RULES;
    if (!R) return;
    const diff = Math.abs(state.fireSource.idx - state.fireTarget.idx);
    if (diff !== 1) { alert('側面射撃は敵隣接グループに対してのみ可能です'); return; }
    state.playerHand.splice(cardIdx, 1);
    card._moveMode = 'lateral';
    pushTerrainWithFaction(srcGrp, card);
    srcGrp.flankingTarget = state.fireTarget.idx;
    alert(`側面射撃成立: GROUP ${srcGrp.name} → GROUP ${tgtGrp.name}`);
    playerDidRuleAction = true;
  }

  if (act === 'encircle') {
    const cardIdx = [...state.selectedHand][0];
    const card = state.playerHand[cardIdx];
    if (!card || !state.fireSource || !state.fireTarget) return;
    if (!card.terrain || card.terrain.type !== 'MOVEMENT') { alert('移動カードを選択してください'); return; }
    const srcGrp = state.groups.player[state.fireSource.idx];
    const tgtGrp = state.groups.ai[state.fireTarget.idx];
    const R = window.INFANTRY_RULES;
    if (!R) return;
    const diff = Math.abs(state.fireSource.idx - state.fireTarget.idx);
    if (diff !== 1) { alert('包囲は敵隣接グループに対してのみ可能です'); return; }
    // 相手グループのもう一方の隣接（自軍側）グループを確認
    const otherIdx = state.fireTarget.idx === state.fireSource.idx - 1 ? state.fireTarget.idx - 1 : state.fireTarget.idx + 1;
    const partner = state.groups.player[otherIdx];
    if (!partner || partner.eliminated) { alert('包囲を構成するもう1つの自軍グループがありません'); return; }
    const r1 = R.relativeRange(srcGrp.distance, tgtGrp.distance);
    const r2 = R.relativeRange(partner.distance, tgtGrp.distance);
    if (r1 > 4 || r2 > 4) { alert(`包囲不成立: 相対距離${r1}/${r2}（両方4以下必要）`); return; }
    state.playerHand.splice(cardIdx, 1);
    card._moveMode = 'lateral';
    pushTerrainWithFaction(srcGrp, card);
    tgtGrp.encircled = true;
    alert(`包囲成立: GROUP ${tgtGrp.name} を包囲`);
    playerDidRuleAction = true;
  }

  if (act === 'cross-stream') {
    const cardIdx = [...state.selectedHand][0];
    const card = state.playerHand[cardIdx];
    if (!card || !state.fireSource) return;
    const grp = state.groups.player[state.fireSource.idx];
    const R = window.INFANTRY_RULES;
    if (!R) return;
    if (!R.isInStream(grp)) { alert('このグループは河川内ではありません'); return; }
    if (R.hasCrossedStream(grp)) { alert('既に渡河済みです'); return; }
    if (grp.cards.some(c => R.isPinned(c))) { alert('PIN状態の兵士がいると渡河できません'); return; }
    if (!card.terrain || card.terrain.type !== 'MOVEMENT') { alert('移動カードを選択してください'); return; }
    state.playerHand.splice(cardIdx, 1);
    if (R.isFordCard(card)) {
      card._moveMode = 'lateral';
      pushTerrainWithFaction(grp, card);
      alert('渡河成功（渡河カード使用）');
    } else {
      const judge = drawTerrainCard();
      showJudgeCard(judge);
      if (judge) { checkBreezeRemoveSmoke(judge); pushTerrainToDiscard(judge); }
      const isBlack = !(judge && judge.terrain && judge.terrain.rncColor === '赤');
      if (isBlack) {
        card._moveMode = 'lateral';
        pushTerrainWithFaction(grp, card);
        alert('渡河成功（RNC 黒）');
      } else {
        pushTerrainToDiscard(card);
        alert('渡河失敗（RNC 赤）— カードは捨て札');
      }
    }
    playerDidRuleAction = true;
  }

  if (act === 'terrain') {
    const cardIdx = [...state.selectedHand][0];
    const card = state.playerHand[cardIdx];
    if (!card) return;
    if (window.SCENARIO_HELPERS && window.SCENARIO_HELPERS.isCardDisabledAsTerrain(state.scenario, card)) {
      alert('このシナリオではこのカードを地形として使用できません');
      return;
    }
    const target = state.fireSource || state.fireTarget;
    if (!target) return;
    const grp = state.groups[target.side][target.idx];
    const R = window.INFANTRY_RULES;
    if (R && !R.canPlaceTerrainOnMarsh(grp)) {
      alert('湿地に地形カードを置くには移動カード2枚が必要です');
      return;
    }
    state.playerHand.splice(cardIdx, 1);
    // AI側グループに置く場合: AIが拒否するか自動判定
    if (target.side === 'ai') {
      const isStream = card.terrain && card.terrain.type === 'STREAM';
      const isWire = card.terrain && card.terrain.type === 'WIRE';
      const lastMove = findLastMovement(grp);
      // §8.5 河川は拒否不可。鉄条網も拒否不可。他は移動カードがあれば50%の確率で拒否
      if (!isStream && !isWire && lastMove && Math.random() < 0.5) {
        if (lastMove.mode === 'advance') {
          grp.distance -= 1;
          if (lastMove.card) lastMove.card._moveMode = 'lateral';
        } else if (lastMove.mode === 'retreat') {
          grp.distance += 1;
          if (lastMove.card) lastMove.card._moveMode = 'lateral';
        }
        if (lastMove.mode === 'lateral') {
          grp.terrain.splice(lastMove.idx, 1);
          pushTerrainToDiscard(lastMove.card);
        }
        pushTerrainToDiscard(card);
        alert('AI: 地形カードを拒否しました（横移動モードに変更）');
        playerDidRuleAction = true;
        // 以降のリセット処理へ
      } else {
        // §7.34 受け入れ: 下のカードを全て捨て札（煙幕/鉄条網は重ねるだけ）
        const tType1 = card.terrain && card.terrain.type;
        const isOverlay1 = tType1 === 'SMOKE' || tType1 === 'WIRE';
        if (!isOverlay1) {
          while (grp.terrain.length > 0) {
            pushTerrainToDiscard(grp.terrain.pop());
          }
        }
        pushTerrainWithFaction(grp, card);
        playerDidRuleAction = true;
      }
    } else {
      // §7.34 新しい地形に入る: 下のカードを全て捨て札（煙幕/鉄条網は重ねるだけ）
      const tType2 = card.terrain && card.terrain.type;
      const isOverlay2 = tType2 === 'SMOKE' || tType2 === 'WIRE';
      if (!isOverlay2) {
        while (grp.terrain.length > 0) {
          pushTerrainToDiscard(grp.terrain.pop());
        }
      }
      pushTerrainWithFaction(grp, card);
      playerDidRuleAction = true;
    }
  }

  if (act === 'wire-remove') {
    const cardIdx = [...state.selectedHand][0];
    const card = state.playerHand[cardIdx];
    if (!card || !state.fireSource) return;
    const grp = state.groups.player[state.fireSource.idx];
    const wireIdx = (grp.terrain || []).findIndex(c => c.terrain && c.terrain.type === 'WIRE');
    if (wireIdx < 0) { alert('このグループに鉄条網がありません'); return; }
    const R = window.INFANTRY_RULES;
    if (R && grp.cards.some(c => R.isPinned(c))) { alert('PIN状態の兵士がいると鉄条網を除去できません'); return; }
    const wire = grp.terrain.splice(wireIdx, 1)[0];
    pushTerrainToDiscard(wire);
    state.playerHand.splice(cardIdx, 1);
    pushTerrainToDiscard(card);
    playerDidRuleAction = true;
  }

  if (act === 'repair') {
    if (!state.fireSource) return;
    const grp = state.groups.player[state.fireSource.idx];
    const R = window.INFANTRY_RULES;
    if (!R) return;
    // PIN不可、移動中不可
    const lastT = grp.terrain.length > 0 ? grp.terrain[grp.terrain.length - 1] : null;
    const isMoving = lastT && lastT.terrain && lastT.terrain.type === 'MOVEMENT';
    if (isMoving) { alert('移動中は修理できません'); return; }
    if (R.isInMarsh(grp)) { alert('湿地内では修理できません'); return; }
    if (R.isInStream(grp)) { alert('河川内では修理できません'); return; }
    // 故障兵士を探す
    const playerKey = getFactionKey(state.player);
    const broken = grp.cards.map((c, i) => (c.malfunctioned && R.isAlive(c) && !R.isPinned(c)) ? i : -1).filter(i => i >= 0);
    if (broken.length === 0) { alert('修理可能な故障武器がありません'); return; }
    // 最初の故障兵士を修理対象
    const ci = broken[0];
    const card = grp.cards[ci];
    const def = R.lookupSoldier(card, playerKey);
    const name = def ? def.name : card.id;
    const entry = def ? getRepairEntry(playerKey, def.weaponCat) : null;
    if (!entry) { alert('この武器の修理データがありません'); return; }
    // RNCを引く
    const judge = drawTerrainCard();
    if (!judge) return;
    showJudgeCard(judge);
    checkBreezeRemoveSmoke(judge); pushTerrainToDiscard(judge);
    const rncVal = parseInt(judge.terrain.range, 10) || 0;
    const rncColor = judge.terrain.rncColor === '赤' ? '赤' : '黒';
    const repairR = parseRepairRange(entry.repair);
    const destroyR = parseRepairRange(entry.destroy);
    const specialR = entry.special ? parseRepairRange(entry.special) : null;
    if (specialR && matchesRange(specialR, rncColor, rncVal)) {
      card.malfunctioned = false;
      alert(`修理成功(特殊): ${name} — ${rncColor}${rncVal}`);
    } else if (matchesRange(destroyR, rncColor, rncVal)) {
      card.malfunctioned = false;
      card.destroyed = true;
      alert(`武器破壊: ${name} — ${rncColor}${rncVal}`);
    } else if (matchesRange(repairR, rncColor, rncVal)) {
      card.malfunctioned = false;
      alert(`修理成功: ${name} — ${rncColor}${rncVal}`);
    } else {
      alert(`修理失敗: ${name} — ${rncColor}${rncVal}`);
    }
    playerDidRuleAction = true;
  }

  if (act === 'discard') {
    if (window.DISCARD_RULES) window.DISCARD_RULES.execute();
  }

  if (act === 'recover') {
    const cardIdx = [...state.selectedHand][0];
    const card = state.playerHand[cardIdx];
    if (!card || !state.fireSource) return;
    const grp = state.groups.player[state.fireSource.idx];
    const R = window.INFANTRY_RULES;
    if (!R) return;
    // RALLY X → X人回復、RALLY ALL → 全員回復、HERO → 1人回復
    const pinnedIdx = grp.cards.map((c, i) => (R.isPinned(c) && R.isAlive(c)) ? i : -1).filter(i => i >= 0);
    let rallyVal = 0;
    if (card.terrain.type === 'RALLY ALL') {
      rallyVal = pinnedIdx.length;
    } else if (card.terrain.type === 'HERO') {
      rallyVal = 1;
    } else {
      rallyVal = parseInt(card.terrain.type.replace('RALLY ', ''), 10) || 0;
    }
    if (pinnedIdx.length === 0) { alert('このグループにPIN状態の兵士がいません'); return; }
    const playerKey = getFactionKey(state.player);
    if (rallyVal >= pinnedIdx.length) {
      // 全員回復
      const names = pinnedIdx.map(i => { const d = R.lookupSoldier(grp.cards[i], playerKey); return d ? d.name : grp.cards[i].id; });
      pinnedIdx.forEach(i => R.unpinSoldier(grp.cards[i]));
      alert(`回復(${rallyVal}): ${names.join(', ')} が回復しました`);
    } else {
      // 回復対象を選択させる（簡易: 先頭から回復値分）
      // TODO: 選択UI
      const targets = pinnedIdx.slice(0, rallyVal);
      const names = targets.map(i => { const d = R.lookupSoldier(grp.cards[i], playerKey); return d ? d.name : grp.cards[i].id; });
      targets.forEach(i => R.unpinSoldier(grp.cards[i]));
      alert(`回復(${rallyVal}): ${names.join(', ')} が回復しました`);
    }
    state.playerHand.splice(cardIdx, 1);
    pushTerrainToDiscard(card);
    playerDidRuleAction = true;
  }

  if (act === 'snipe') {
    const cardIdx = [...state.selectedHand][0];
    const card = state.playerHand[cardIdx];
    if (!card || !state.sniperTarget) return;
    const tgt = state.sniperTarget;
    const grp = state.groups[tgt.side][tgt.grpIdx];
    const soldier = grp.cards[tgt.cardIdx];
    if (!soldier) return;
    const judge = drawTerrainCard();
    showJudgeCard(judge);
    if (judge) { checkBreezeRemoveSmoke(judge); pushTerrainToDiscard(judge); }
    const rnc = parseInt((judge && judge.terrain && judge.terrain.range) || '0', 10) || 0;
    const sniperDef = card.terrain;
    const R = window.INFANTRY_RULES;
    const enemyKey = getFactionKey(state.ai);
    const def = R ? R.lookupSoldier(soldier, enemyKey) : null;
    const wasPinned = R ? R.isPinned(soldier) : false;
    // KIA/PIN範囲パース
    let kiaRange = [], pinRange = [];
    if (sniperDef && sniperDef.modifier) {
      const mk = sniperDef.modifier.match(/KIA[:\s]*([0-9\-]+)/);
      const mp = sniperDef.modifier.match(/PIN[:\s]*([0-9\-]+)/);
      kiaRange = mk ? mk[1].split('-').map(Number) : [];
      pinRange = mp ? mp[1].split('-').map(Number) : [];
    }
    let result = 'MISS';
    if (kiaRange.length === 2 && rnc >= kiaRange[0] && rnc <= kiaRange[1]) result = 'KIA';
    else if (kiaRange.length === 1 && rnc === kiaRange[0]) result = 'KIA';
    else if (pinRange.length === 2 && rnc >= pinRange[0] && rnc <= pinRange[1]) result = 'PIN';
    else if (pinRange.length === 1 && rnc === pinRange[0]) result = 'PIN';
    if (result === 'KIA') { if (R) R.killSoldier(soldier); }
    else if (result === 'PIN') {
      if (wasPinned) { if (R) R.killSoldier(soldier); result = 'PANIC'; }
      else { if (R) R.pinSoldier(soldier); }
    }
    // §20.53 狙撃によるピン/KIA → 侵入状態解除
    if (result !== 'MISS' && soldier.infiltrating && window.CC_ACTION) {
      window.CC_ACTION.clearSoldierInfiltration(soldier);
    }
    const name = def ? def.name : soldier.id;
    const kiaStr = kiaRange.length ? kiaRange.join('-') : '—';
    const pinStr = pinRange.length ? pinRange.join('-') : '—';
    const snipeResults = [{ name, rnc, rncColor: '黒', result, finalFP: null, sum: rnc, morale: null, kia: null, wasPinned, snipeKia: kiaStr, snipePin: pinStr }];
    const title = `狙撃 → ${name} (KIA:${kiaStr} / PIN:${pinStr})`;
    showFireResultOverlay(title, snipeResults).then(() => {
      cleanupEliminatedGroups();
      renderField('player'); renderField('ai');
      renderHands();
    });
    state.playerHand.splice(cardIdx, 1);
    pushTerrainToDiscard(card);
    playerDidRuleAction = true;
  }
  // ===== 侵入 (§20) =====
  if (act === 'infiltrate') {
    if (!state.fireSource || !state.fireTarget || !window.CC_ACTION) return;
    const srcGrp = state.groups.player[state.fireSource.idx];
    const tgtGrp = state.groups.ai[state.fireTarget.idx];
    const facKey = getFactionKey(state.player) || 'us';
    const srcIdx = state.fireSource.idx;
    (async () => {
      const res = await window.CC_ACTION.executeInfiltration(
        srcGrp, tgtGrp, 'ai', state.fireTarget.idx, drawTerrainCard, facKey
      );
      if (res.actionUsed) {
        if (window.DISCARD_RULES) window.DISCARD_RULES.markActed();
        if (!state.actedGroups) state.actedGroups = new Set();
        state.actedGroups.add(srcIdx);
      }
      state.selectedAction = null;
      state.selectedHand.clear();
      state.fireSource = null;
      state.fireTarget = null;
      document.querySelectorAll('.action-btn').forEach(b => b.classList.remove('active'));
      renderField('player'); renderField('ai');
      renderHands();
      updateDeckCounts();
      updateDecideBtn();
    })();
    return;
  }

  // ===== 白兵戦 (§20) =====
  if (act === 'cc') {
    if (!state.fireSource || !window.CC_ACTION) return;
    const srcGrp = state.groups.player[state.fireSource.idx];
    const facKey = getFactionKey(state.player) || 'us';
    const srcIdx = state.fireSource.idx;
    (async () => {
      const res = await window.CC_ACTION.executeCC(
        srcGrp, srcIdx, drawTerrainCard, facKey
      );
      if (res.actionUsed) {
        if (window.DISCARD_RULES) window.DISCARD_RULES.markActed();
        if (!state.actedGroups) state.actedGroups = new Set();
        state.actedGroups.add(srcIdx);
      }
      state.selectedAction = null;
      state.selectedHand.clear();
      state.fireSource = null;
      state.fireTarget = null;
      document.querySelectorAll('.action-btn').forEach(b => b.classList.remove('active'));
      cleanupEliminatedGroups();
      renderField('player'); renderField('ai');
      renderHands();
      updateDeckCounts();
      updateDecideBtn();
    })();
    return;
  }

  state.sniperTarget = null;

  if (playerDidRuleAction && window.DISCARD_RULES) window.DISCARD_RULES.markActed();
  if (playerDidRuleAction && state.fireSource) {
    if (!state.actedGroups) state.actedGroups = new Set();
    state.actedGroups.add(state.fireSource.idx);
  }

  // リセット
  state.selectedAction = null;
  state.selectedHand.clear();
  state.fireSource = null;
  state.fireTarget = null;
  document.querySelectorAll('.action-btn').forEach(b => b.classList.remove('active'));
  btn.disabled = true;
  renderField('player'); renderField('ai');
  renderHands();
  updateDecideBtn();
});

// 判定ボタンは射撃のみ有効化（狙撃は確定ボタンで処理）
const ACTIONS_NEED_JUDGE = ['fire'];

function updateDecideBtn() {
  const slot = document.getElementById('judge-slot');
  if (!slot) return;
  const act = state.selectedAction;
  let ok = false;
  if (act && ACTIONS_NEED_JUDGE.indexOf(act) >= 0) {
    const needSrc = ACTIONS_NEED_SOURCE.indexOf(act) >= 0;
    const needTgt = ACTIONS_NEED_TARGET.indexOf(act) >= 0;
    const hasHand = state.selectedHand.size > 0;
    const hasSrc  = !!state.fireSource;
    const hasTgt  = !!state.fireTarget;
    ok = hasHand;
    if (needSrc) ok = ok && hasSrc;
    if (needTgt) ok = ok && hasTgt;
  }
  slot.classList.toggle('armed', ok);
}

document.getElementById('judge-slot').addEventListener('click', () => {
  const slot = document.getElementById('judge-slot');
  if (!slot.classList.contains('armed')) return;
  if (state.phase === 'play' && state.currentTurn !== 'player') return;
  const act = state.selectedAction;
  if (act === 'fire') {
    resolveFireAction();
  } else {
    // 他のアクションは判定カードのみ表示 (中身は順次実装)
    const indices = [...state.selectedHand].sort((a,b) => b-a);
    indices.forEach(i => {
      const hc = state.playerHand[i];
      state.playerHand.splice(i, 1);
      if (hc) pushTerrainToDiscard(hc);
    });
    const judgeCard = drawTerrainCard();
    showJudgeCard(judgeCard);
    if (judgeCard) pushTerrainToDiscard(judgeCard);
  }
  // リセット
  state.selectedAction = null;
  state.selectedHand.clear();
  state.fireSource = null;
  state.fireTarget = null;
  document.querySelectorAll('.action-btn').forEach(b => b.classList.remove('active'));
  renderField('player'); renderField('ai');
  renderHands();
  updateDecideBtn();
});

function showJudgeCard(card) {
  const result = document.getElementById('judge-result');
  result.innerHTML = '';
  if (!card) return;
  const img = document.createElement('img');
  img.src = card.img;
  img.onerror = () => { result.textContent = card.id; };
  result.appendChild(img);
}

function getFactionKey(facObj) {
  return Object.keys(FACTIONS).find(k => FACTIONS[k] === facObj);
}

// 日本軍がゲームに参加しているか（建物-3 / 全射撃-1 ルール用）
function isJapanInGame() {
  return (state && state.player && getFactionKey(state.player) === 'jpn') ||
         (state && state.ai     && getFactionKey(state.ai)     === 'jpn');
}

// ===== 隠蔽カード処理 =====
function findConcealedIndices(hand) {
  const out = [];
  hand.forEach((c, i) => {
    if (c && c.terrain && c.terrain.type === 'CONCEALED') out.push(i);
  });
  return out;
}

function getConcealMod(cards) {
  let mod = 0;
  cards.forEach(c => { mod += parseInt(c.terrain.modifier, 10) || 0; });
  return mod;
}

/** プレイヤーに隠蔽カード選択モーダルを表示し、選択結果をPromiseで返す */
function askPlayerConcealment() {
  const indices = findConcealedIndices(state.playerHand);
  if (indices.length === 0) return Promise.resolve([]);
  return new Promise(resolve => {
    const modal = document.getElementById('conceal-modal');
    const grid = document.getElementById('conceal-cards');
    grid.innerHTML = '';
    const selected = new Set();
    modal.style.display = 'flex';
    const useBtn = document.getElementById('conceal-use');
    const skipBtn = document.getElementById('conceal-skip');
    const updateUseBtn = () => {
      useBtn.disabled = selected.size === 0;
      useBtn.style.opacity = selected.size === 0 ? '0.4' : '1';
      useBtn.style.cursor = selected.size === 0 ? 'not-allowed' : 'pointer';
    };
    indices.forEach(idx => {
      const card = state.playerHand[idx];
      const wrap = document.createElement('div');
      wrap.style.cssText = 'cursor:pointer; border:2px solid #555; border-radius:4px; padding:2px; transition:all 0.15s;';
      const img = document.createElement('img');
      img.src = card.img;
      img.style.cssText = 'width:90px; display:block; border-radius:3px;';
      wrap.appendChild(img);
      wrap.addEventListener('click', () => {
        if (selected.has(idx)) { selected.delete(idx); wrap.style.borderColor = '#555'; }
        else { selected.add(idx); wrap.style.borderColor = '#ffeb3b'; }
        updateUseBtn();
      });
      grid.appendChild(wrap);
    });
    updateUseBtn();
    const cleanup = () => {
      modal.style.display = 'none';
      useBtn.replaceWith(useBtn.cloneNode(true));
      skipBtn.replaceWith(skipBtn.cloneNode(true));
    };
    document.getElementById('conceal-use').addEventListener('click', () => {
      cleanup();
      const cards = [...selected].sort((a,b) => b-a).map(i => {
        const c = state.playerHand[i];
        state.playerHand.splice(i, 1);
        if (c) pushTerrainToDiscard(c);
        return c;
      }).filter(Boolean);
      renderHands();
      resolve(cards);
    });
    document.getElementById('conceal-skip').addEventListener('click', () => {
      cleanup();
      resolve([]);
    });
  });
}

/** AI側の隠蔽カード自動使用: 1枚あれば使う */
function aiUseConcealment() {
  const indices = findConcealedIndices(state.aiHand);
  if (indices.length === 0) return [];
  const idx = indices[0];
  const card = state.aiHand[idx];
  state.aiHand.splice(idx, 1);
  if (card) pushTerrainToDiscard(card);
  state.aiHandCount = state.aiHand.length;
  renderHands();
  return [card];
}

// ===== 射撃結果オーバーレイ =====
function resultLabel(r) {
  if (r === 'NONE') return '無傷';
  if (r === 'PANIC_KIA') return 'KIA(パニック)';
  if (r === 'PANIC_ROUT') return '潰走';
  if (r === 'BERSERK') return '狂暴兵';
  return r;
}
function resultColor(r) {
  if (r === 'KIA' || r === 'PANIC_KIA') return '#f44';
  if (r === 'PIN') return '#fd0';
  if (r === '潰走' || r === 'PANIC_ROUT') return '#f80';
  if (r === 'BERSERK') return '#f0f';
  return '#8f8';
}

/** 全滅グループの地形カードを捨て札にしてグループを除去 */
// §17.6 グループが包囲されているかを判定（両隣の敵が横向き移動中で距離4以下）
function isGroupEncircled(group, side) {
  const R = window.INFANTRY_RULES;
  if (!R || !R.canEncircle || !group || group.eliminated) return false;
  const enemySide = side === 'player' ? 'ai' : 'player';
  const enemyGroups = state.groups[enemySide] || [];
  const idx = state.groups[side].indexOf(group);
  if (idx < 0) return false;
  const left = enemyGroups[idx - 1], right = enemyGroups[idx + 1];
  const isGrpAlive = g => g && !g.eliminated && g.cards && g.cards.some(c => R.isAlive(c));
  const hasLateral = g => {
    const top = g && g.terrain && g.terrain.length > 0 ? g.terrain[g.terrain.length - 1] : null;
    return top && top.terrain && top.terrain.type === 'MOVEMENT' && top._moveMode === 'lateral';
  };
  return isGrpAlive(left) && isGrpAlive(right) && R.canEncircle(left, right, group) && (hasLateral(left) || hasLateral(right));
}

function cleanupEliminatedGroups() {
  const R = window.INFANTRY_RULES;
  if (!R) return;
  // 消滅グループは削除せず eliminated フラグを立てて位置関係を保持
  ['player', 'ai'].forEach(side => {
    state.groups[side].forEach(grp => {
      const alive = grp.cards.some(c => R.isAlive(c));
      if (!alive && grp.cards.length > 0 && !grp.eliminated) {
        (grp.terrain || []).forEach(tc => { if (tc) pushTerrainToDiscard(tc); });
        grp.terrain = [];
        grp.eliminated = true;
      }
    });
  });
  checkDefeat();
}

function checkDefeat() {
  if (!state.initialSoldierCount) return;
  const R = window.INFANTRY_RULES;
  if (!R) return;
  ['player', 'ai'].forEach(side => {
    const initial = state.initialSoldierCount[side];
    if (!initial) return;
    let lost = 0;
    state.groups[side].forEach(g => {
      g.cards.forEach(c => { if (c.killed || c.routed) lost++; });
    });
    // 全滅グループの兵士も数える（グループ除去済みなので initialCount - 現存生存数）
    let alive = 0;
    state.groups[side].forEach(g => {
      g.cards.forEach(c => { if (R.isAlive(c)) alive++; });
    });
    lost = initial - alive;
    const half = Math.floor(initial / 2) + 1;
    if (lost >= half) {
      const name = side === 'player' ? state.player.name : state.ai.name;
      const winner = side === 'player' ? state.ai.name : state.player.name;
      state.phase = 'gameover';
      alert(`${name} の過半数が損害を受けました。${winner} の勝利です！`);
      endCampaignScenario(side === 'player' ? 'ai' : 'player');
    }
  });
}

// ===== キャンペーン: シナリオ終了処理 =====
function endCampaignScenario(winner) {
  const R = window.INFANTRY_RULES;
  if (!R) return;
  const playerKey = getFactionKey(state.player);
  const playerWon = (winner === 'player');

  // プレイヤー側の全兵士を記録更新
  const allCards = [];
  state.groups.player.forEach(g => { g.cards.forEach(c => allCards.push(c)); });
  // 初期配置にいたが全滅グループで消えた兵士もカウント
  const initialCount = state.initialSoldierCount ? state.initialSoldierCount.player : 0;

  allCards.forEach(card => {
    const def = R.lookupSoldier(card, playerKey);
    if (!def) return;
    const id = card.id;
    const rec = getRecord(playerKey, id);
    rec.battles++;
    if (playerWon) rec.wins++;
    if (!rec.rank) rec.rank = def.rank || '';

    if (card.killed) {
      rec.status = 'killed';
    } else if (card.routed) {
      rec.status = 'killed'; // 潰走もキャンペーン上はKIA扱い
    } else if (card.pinned) {
      rec.pins++;
      rec.moralePoints += 1;
    } else {
      rec.moralePoints += 1; // 生存ボーナス
    }
    if (card.malfunctioned) rec.malfunctioned = true;
    if (card.destroyed) rec.destroyed = true;
  });

  // 敵兵士のKIA数をプレイヤーのkillsに加算
  let totalEnemyKills = 0;
  state.groups.ai.forEach(g => {
    g.cards.forEach(c => { if (c.killed || c.routed) totalEnemyKills++; });
  });
  const aiInitial = state.initialSoldierCount ? state.initialSoldierCount.ai : 0;
  const aiAlive = state.groups.ai.reduce((s, g) => s + g.cards.filter(c => R.isAlive(c)).length, 0);
  totalEnemyKills = aiInitial - aiAlive;

  // killsを生存プレイヤー兵士に分配（簡易: 均等）
  const alivePlayers = allCards.filter(c => R.isAlive(c));
  if (alivePlayers.length > 0 && totalEnemyKills > 0) {
    const perSoldier = Math.floor(totalEnemyKills / alivePlayers.length);
    const remainder = totalEnemyKills % alivePlayers.length;
    alivePlayers.forEach((c, i) => {
      const rec = getRecord(playerKey, c.id);
      rec.kills += perSoldier + (i < remainder ? 1 : 0);
      rec.moralePoints += (perSoldier + (i < remainder ? 1 : 0)) * 5;
    });
  }

  if (playerWon) {
    allCards.forEach(c => {
      if (R.isAlive(c)) {
        const rec = getRecord(playerKey, c.id);
        rec.moralePoints += 3; // 勝利ボーナス
      }
    });
  }

  saveRecords();
  showInterimScreen(playerKey, playerWon);
}

// 補充兵追加: KIA兵士を新兵に置き換え
function interimReplace(factionKey) {
  const soldiers = getAllSoldiers(factionKey);
  let replaced = 0;
  soldiers.forEach(s => {
    const rec = getRecord(factionKey, s.id);
    if (rec.status === 'killed') {
      rec.status = 'active';
      rec.battles = 0; rec.wins = 0; rec.kills = 0; rec.wounds = 0; rec.pins = 0;
      rec.moralePoints = 0; rec.promoted = false; rec.decorations = [];
      rec.malfunctioned = false; rec.destroyed = false;
      rec.rank = '補充兵';
      replaced++;
    }
  });
  saveRecords();
  alert(`${replaced}名の補充兵を追加しました`);
}

// 昇進判定
function interimPromote(factionKey) {
  const SH = window.SCENARIO_HELPERS;
  const table = SH ? SH.getPromotionTable(factionKey) : null;
  if (!table) { alert('昇進テーブルがありません'); return; }
  const ranks = table.ranks;
  const thresholds = table.thresholds;
  const soldiers = getAllSoldiers(factionKey);
  let promoted = 0;
  const promotedNames = [];
  soldiers.forEach(s => {
    const rec = getRecord(factionKey, s.id);
    if (rec.status !== 'active') return;
    const currentIdx = ranks.indexOf(rec.rank);
    if (currentIdx < 0 || currentIdx >= ranks.length - 1) return;
    const nextThreshold = thresholds[currentIdx + 1] || Infinity;
    if (rec.moralePoints >= nextThreshold) {
      const oldRank = rec.rank;
      rec.rank = ranks[currentIdx + 1];
      rec.promoted = true;
      promoted++;
      const def = (SOLDIER_CARDS[factionKey] || []).find(d => {
        const m = s.id.match(/(\d+)\s*$/);
        return m && d.num === parseInt(m[1], 10);
      });
      promotedNames.push(`${def ? def.name : s.id}: ${oldRank}→${rec.rank}`);
    }
  });
  saveRecords();
  if (promoted > 0) {
    alert(`昇進:\n${promotedNames.join('\n')}`);
  } else {
    alert('昇進対象者はいません');
  }
}

// 武器修理（戦間）
function interimRepair(factionKey) {
  const soldiers = getAllSoldiers(factionKey);
  let repaired = 0;
  soldiers.forEach(s => {
    const rec = getRecord(factionKey, s.id);
    if (rec.status !== 'active') return;
    if (rec.malfunctioned) {
      rec.malfunctioned = false;
      repaired++;
    }
  });
  saveRecords();
  alert(`${repaired}件の武器を修理しました`);
}

/**
 * §7.32 地形拒否: プレイヤーのグループに相手が地形を置いた時の選択
 * 受け入れ → 地形スタックに積む、下のアクションカード(移動等)を捨て札(§7.34)
 * 拒否 → 移動カードを横移動に変更(距離戻す)or横移動の移動カードを捨て札、地形カードも捨て札
 */
function askTerrainRefusal(grp, terrainCard) {
  return new Promise(resolve => {
    const modal = document.getElementById('terrain-refuse-modal');
    const title = document.getElementById('terrain-refuse-title');
    const info = document.getElementById('terrain-refuse-info');
    title.textContent = `地形カード「${terrainCard.terrain.type}」が配置されました`;

    // グループの最後の移動カード情報を表示
    const lastMove = findLastMovement(grp);
    if (lastMove) {
      info.textContent = '拒否すると移動カードが横移動モードになり、距離が戻ります。';
    } else {
      info.textContent = '移動カードがないため拒否できません。';
    }

    modal.style.display = 'flex';
    const accBtn = document.getElementById('terrain-accept');
    const refBtn = document.getElementById('terrain-refuse');
    const newAcc = accBtn.cloneNode(true);
    const newRef = refBtn.cloneNode(true);
    accBtn.replaceWith(newAcc);
    refBtn.replaceWith(newRef);

    // §8.5 河川は拒否不可 / 移動カードがなければ拒否不可
    const isStream = terrainCard.terrain && terrainCard.terrain.type === 'STREAM';
    const canRefuse = lastMove && !isStream;
    newRef.disabled = !canRefuse;
    newRef.style.opacity = canRefuse ? '1' : '0.4';
    if (isStream) info.textContent = '河川は拒否できません。';

    newAcc.addEventListener('click', () => {
      modal.style.display = 'none';
      // §7.34 下のカードを全て捨て札（煙幕/鉄条網は重ねるだけ）
      const tType = terrainCard.terrain && terrainCard.terrain.type;
      const isOverlay = tType === 'SMOKE' || tType === 'WIRE';
      if (!isOverlay) {
        while (grp.terrain.length > 0) {
          pushTerrainToDiscard(grp.terrain.pop());
        }
      }
      pushTerrainWithFaction(grp, terrainCard);
      resolve('accept');
    });

    newRef.addEventListener('click', () => {
      if (!lastMove) return;
      modal.style.display = 'none';
      // 前進/後退の移動カード → 横移動に変更、距離を戻す
      if (lastMove.mode === 'advance') {
        grp.distance -= 1;
        if (lastMove.card) lastMove.card._moveMode = 'lateral';
      } else if (lastMove.mode === 'retreat') {
        grp.distance += 1;
        if (lastMove.card) lastMove.card._moveMode = 'lateral';
      }
      // 既に横移動モードなら移動カードを捨て札
      if (lastMove.mode === 'lateral') {
        grp.terrain.splice(lastMove.idx, 1);
        pushTerrainToDiscard(lastMove.card);
      }
      // 地形カードを捨て札
      pushTerrainToDiscard(terrainCard);
      resolve('refuse');
    });
  });
}

/** グループの地形スタック最上の移動カード情報を返す */
function findLastMovement(grp) {
  if (!grp.terrain || grp.terrain.length === 0) return null;
  for (let i = grp.terrain.length - 1; i >= 0; i--) {
    const c = grp.terrain[i];
    if (c && c.terrain && c.terrain.type === 'MOVEMENT') {
      // mode判定: lateral フラグがあるか、距離変動があったか
      // 簡易: moveMode プロパティで判定
      const mode = c._moveMode || 'advance';
      return { idx: i, card: c, mode };
    }
    break; // 最上が移動でなければなし
  }
  return null;
}

function showMoveDirectionModal(grp, card, cardIdx) {
  const modal = document.getElementById('move-dir-modal');
  modal.style.display = 'flex';
  const advBtn = document.getElementById('move-advance');

  const retBtn = document.getElementById('move-retreat');
  const newAdv = advBtn.cloneNode(true);

  const newRet = retBtn.cloneNode(true);
  advBtn.replaceWith(newAdv);
  latBtn.replaceWith(newLat);

  function finish() {
    modal.style.display = 'none';
    // §45 日本軍: 移動はアクションとしてカウントしない（捨て札制限に影響しない）

    if (facKey !== 'jpn' && window.DISCARD_RULES) window.DISCARD_RULES.markActed();
    if (!state.actedGroups) state.actedGroups = new Set();
    if (state.fireSource) state.actedGroups.add(state.fireSource.idx);
    // §20.53 移動カード使用 → 侵入状態解除
    if (window.CC_ACTION) window.CC_ACTION.clearInfiltration(grp, 'move');
    state.selectedAction = null;
    state.selectedHand.clear();
    state.fireSource = null;
    state.fireTarget = null;
    document.querySelectorAll('.action-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('btn-confirm').disabled = true;
    renderField('player'); renderField('ai');
    renderHands();
    updateDecideBtn();
  }

  // §8.53 河川内は前進・後退不可（横移動の渡河でのみ脱出）
  const R_move = window.INFANTRY_RULES;
  const inStream = R_move && R_move.isInStream(grp);
  if (inStream) {
    newAdv.disabled = true; newAdv.style.opacity = '0.4';
    newRet.disabled = true; newRet.style.opacity = '0.4';
  }
  // §5.8 横移動後は前進/後退不可
  const hasLateral = grp.terrain.some(c => c && c.terrain && c.terrain.type === 'MOVEMENT' && c._moveMode === 'lateral');
  if (hasLateral) {
    newAdv.disabled = true; newAdv.style.opacity = '0.4';
    newRet.disabled = true; newRet.style.opacity = '0.4';
  }

  newAdv.addEventListener('click', () => {
    if (inStream) return;
    // §5.7 相対距離5 で前進不可
    const R_blk = window.INFANTRY_RULES;
    const selfIdx = state.groups.player.indexOf(grp);
    const opposing = state.groups.ai[selfIdx];
    if (opposing && R_blk && R_blk.isBlocked && R_blk.isBlocked(grp, opposing)) {
      alert('相対距離5のため前進できません（§5.7）');
      return;
    }
    grp.distance += 1;
    card._moveMode = 'advance';
    pushTerrainWithFaction(grp, card);
    state.playerHand.splice(cardIdx, 1);
    finish();
  });

  newLat.addEventListener('click', () => {
    const R = window.INFANTRY_RULES;
    // §8.53 河川内なら渡河判定
    if (R && R.isInStream(grp) && !R.hasCrossedStream(grp)) {
      state.playerHand.splice(cardIdx, 1);
      if (R.isFordCard(card)) {
        card._moveMode = 'lateral';
        pushTerrainWithFaction(grp, card);
        alert('渡河成功（渡河カード使用）');
        finish();
      } else {
        // RNCで判定: 黒なら成功
        const judge = drawTerrainCard();
        showJudgeCard(judge);
        if (judge) { checkBreezeRemoveSmoke(judge); pushTerrainToDiscard(judge); }
        const isBlack = !(judge && judge.terrain && judge.terrain.rncColor === '赤');
        if (isBlack) {
          card._moveMode = 'lateral';
          pushTerrainWithFaction(grp, card);
          alert('渡河成功（RNC 黒）');
        } else {
          pushTerrainToDiscard(card);
          alert('渡河失敗（RNC 赤）— カードは捨て札');
        }
        finish();
      }
      return;
    }
    card._moveMode = 'lateral';
    pushTerrainWithFaction(grp, card);
    state.playerHand.splice(cardIdx, 1);
    finish();
  });

  newRet.addEventListener('click', () => {
    if (inStream) return;
    // 距離はマイナスも可（相対距離は0として扱う）
    grp.distance -= 1;
    card._moveMode = 'retreat';
    // 地形スタックの一番上のMOVEMENTカードを除去して元の地形に戻る
    if (grp.terrain.length > 0) {
      const top = grp.terrain[grp.terrain.length - 1];
      if (top && top.terrain && top.terrain.type === 'MOVEMENT') {
        grp.terrain.pop();
        pushTerrainToDiscard(top);
      }
    }
    state.playerHand.splice(cardIdx, 1);
    pushTerrainToDiscard(card);
    finish();
  });
}

function resolveFireAction() {
  const R = window.INFANTRY_RULES;
  if (!R) { alert('ルールエンジン未読込'); return; }
  const src = state.fireSource;
  const tgt = state.fireTarget;
  if (!src || !tgt) return;
  const srcGroup = state.groups[src.side][src.idx];
  const tgtGroup = state.groups[tgt.side][tgt.idx];
  const playerKey = getFactionKey(state.player);
  const enemyKey  = getFactionKey(state.ai);
  const srcFacKey = src.side === 'player' ? playerKey : enemyKey;
  const tgtFacKey = tgt.side === 'player' ? playerKey : enemyKey;

  // 相対距離（隣接でなければ-1）
  const adjacent = Math.abs(src.idx - tgt.idx) <= 1;
  const baseDistance = R.relativeRange(srcGroup.distance, tgtGroup.distance);
  const distance = adjacent ? baseDistance : Math.max(0, baseDistance - 1);

  // §8.2 GULLY チェック
  if (R.isInGully(srcGroup)) { alert('涸れ谷にいるグループは攻撃できません'); return; }
  if (R.isInGully(tgtGroup) && !R.canFireAtGully(srcGroup, distance, {})) { alert('涸れ谷にいるグループは攻撃できません（例外: 狙撃、迫撃砲、丘上、相対距離5）'); return; }

  // §6.2 火力（地形スタック末尾がMOVEMENTなら移動中＝火力半減）
  const lastTerrain = srcGroup.terrain.length > 0 ? srcGroup.terrain[srcGroup.terrain.length - 1] : null;
  const moving = !!(lastTerrain && lastTerrain.terrain && lastTerrain.terrain.type === 'MOVEMENT');
  const crewMap = srcGroup.crewPairs ? buildCrewMapFromPairs(srcGroup) : {};
  let fp = R.calcGroupFirepower(srcGroup, srcFacKey, distance, { moving, crewMap });
  // §20.51 侵入兵の火力2倍（侵入先グループへの射撃時）
  const CC = window.CC_ACTION;
  const infBonus = CC ? CC.calcInfiltrationFPBonus(srcGroup, tgt.side, tgt.idx, srcFacKey, distance) : 0;
  fp += infBonus;

  // 射撃カードを抽出し、必要火力チェック
  const fireCards = [...state.selectedHand].map(i => state.playerHand[i]).filter(c => c.terrain && c.terrain.type && c.terrain.type.indexOf('FIRE') === 0);
  if (fireCards.length === 0) { alert('「射撃」カードを選択してください'); return; }
  let needed = 0;
  fireCards.forEach(c => {
    const m = (c.terrain.sub || '').match(/FP(.)/);
    needed += circledToNum((m && m[1]) || '');
  });
  if (fp < needed) {
    alert(`火力不足: 必要 ${needed} / 利用可能 ${fp}${infBonus ? ' (侵入+' + infBonus + ')' : ''}`);
    return;
  }

  // 地形修正 (攻撃側 + 防御側)
  const jpOpts = { japanBuildings: isJapanInGame() };
  const atkMod = R.calcTerrainMod(srcGroup.terrain, true, jpOpts);
  const defMod = R.calcTerrainMod(tgtGroup.terrain, false, jpOpts);
  // §8.21 GULLY防御修正 / §8.4 MARSH防御修正
  const gullyMod = R.isInGully(tgtGroup) ? -2 : 0;
  const marshDefMod = R.isInMarsh(tgtGroup) ? -1 : 0;

  // §9 隠蔽: AI側が隠蔽カードを使うか判定
  const aiConcealCards = aiUseConcealment();
  const concealMod = getConcealMod(aiConcealCards);

  // 射撃力 = FIREカードの数字（合算しない、1枚目を使用）
  let strength = parseInt(fireCards[0].terrain.type.replace('FIRE ', ''), 10) || 0;
  // §10.45 英雄: 射撃と同時に英雄カード → 最高火力兵士の火力を倍（射撃力倍として近似）
  const heroCard = [...state.selectedHand].map(i => state.playerHand[i]).find(c => c && c.terrain && c.terrain.type === 'HERO');
  if (heroCard) {
    // 日本/イギリスは黒の英雄カードのみ有効
    const isBlackHero = !(heroCard.terrain.rncColor === '赤');
    if ((srcFacKey === 'jpn' || srcFacKey === 'uk') && !isBlackHero) {
      alert('日本軍/イギリス軍は黒の英雄カードでないと使えません');
      return;
    }
    strength = strength * 2;
  }
  // §20.51 侵入兵がいる場合、右2コラムシフト（+2）
  const infShift = (CC && CC.hasInfiltratorsTargeting(srcGroup, tgt.side, tgt.idx)) ? 2 : 0;
  // §17.4 側面射撃: 手動設定フラグ参照。§17.612 包囲下は自動で側面射撃扱い
  const tgtEliminated = tgtGroup.eliminated;
  const isFlankFire = ((srcGroup.flankingTarget === tgt.idx) || !!tgtGroup.encircled) && !tgtEliminated;
  const movingFP = moving ? Math.floor(strength / 2) : strength;
  const flankFP = isFlankFire ? movingFP * 2 : movingFP;
  const japanRuleMod = isJapanInGame() ? -1 : 0;
  let baseFP = flankFP + atkMod + defMod + concealMod + gullyMod + marshDefMod + infShift + japanRuleMod;
  let malfuncMod = 0;

  // 各防御兵士に判定（1回の射撃で全員に判定）
  const results = [];
  for (let i = 0; i < tgtGroup.cards.length; i++) {
    const card = tgtGroup.cards[i];
    if (!R.isAlive(card)) continue;
    const finalFP = baseFP + malfuncMod;
    const judge = drawTerrainCard();
    if (!judge) continue;
    const rncAbs = parseInt((judge.terrain && judge.terrain.range) || '0', 10) || 0;
    const isRed = judge.terrain && judge.terrain.rncColor === '赤';
    const rnc = isRed ? -rncAbs : rncAbs;
    const rpc0r = parseInt((judge.terrain && judge.terrain.dice && judge.terrain.dice['0r']) || '0', 10) || 0;
    const def = R.lookupSoldier(card, tgtFacKey);
    const wasPinned = R.isPinned(card);
    const commissarMod = hasCommissar(tgtGroup) ? 1 : 0;
    const malfMoraleMod = (card.malfunctioned || card.destroyed) ? -1 : 0;
    // §17.613 包囲下のピン兵士はパニック値-1
    const encircleMod = (tgtGroup && tgtGroup.encircled && wasPinned) ? -1 : 0;
    const r = R.resolveFireOnSoldier(finalFP, rnc, def, wasPinned, rpc0r, commissarMod + malfMoraleMod + encircleMod);
    // §20.9 狂暴兵チェック（ソ連軍ピン状態兵がPANIC_KIAのとき）
    let actualResult = r.result;
    if (r.result === 'PANIC_KIA' && def && window.CC_ACTION) {
      const enemySide = tgt.side === 'ai' ? 'player' : 'ai';
      const enemyGroups = state.groups[enemySide] || [];
      const atDist5 = enemyGroups.some(eg => R.relativeRange(tgtGroup.distance, eg.distance) === 5);
      if (window.CC_ACTION.checkBerserkEligibility(card, def, rpc0r, tgtFacKey, atDist5 ? 5 : 0)) {
        card.berserk = true;
        actualResult = 'BERSERK';
      }
    }
    // §20.9 既に狂暴兵が再パニック → KIA
    if (r.result === 'PANIC_KIA' && card.berserk && actualResult !== 'BERSERK') {
      actualResult = 'PANIC_KIA';
    }
    if (actualResult === 'KIA' || actualResult === 'PANIC_KIA') R.killSoldier(card);
    else if (actualResult === 'PANIC_ROUT') R.routSoldier(card);
    else if (actualResult === 'PIN') R.pinSoldier(card);
    // §20.53 ピン/KIA/潰走 → 侵入状態解除
    if (actualResult !== 'NONE' && actualResult !== 'BERSERK' && card.infiltrating && window.CC_ACTION) {
      window.CC_ACTION.clearSoldierInfiltration(card);
    }
    if (actualResult !== 'NONE' && actualResult !== 'BERSERK' && def && def.leader && def.leader === '分隊長') {
      applySLDamagePenalty(tgt.side);
    }
    const morale = def ? (wasPinned ? parseInt(def.panic,10)||0 : parseInt(def.morale,10)||0 + commissarMod) : 0;
    const kia = def ? (wasPinned ? parseInt(def.kiaBack,10)||0 : parseInt(def.kiaFront,10)||0) : 0;
    results.push({ i, name: def ? def.name : card.id, rnc, rncColor: isRed ? '赤' : '黒', result: actualResult, finalFP, sum: finalFP + rnc, morale, kia, wasPinned });
    showJudgeCard(judge);
    malfuncMod += checkMalfunction(judge, srcGroup, srcFacKey);
    checkBreezeRemoveSmoke(judge); pushTerrainToDiscard(judge);
  }

  // 使用した射撃カードを手札から除去（カード参照は保持）
  const usedFireCards = [];
  const indices = [...state.selectedHand].sort((a,b) => b-a);
  indices.forEach(i => {
    const hc = state.playerHand[i];
    if (hc) usedFireCards.unshift(hc);
    state.playerHand.splice(i, 1);
    if (hc) pushTerrainToDiscard(hc);
  });

  // 修正項目の内訳を取得（カードごとに表示）
  const atkBreakdown = R.getTerrainModBreakdown ? R.getTerrainModBreakdown(srcGroup.terrain, true, jpOpts) : [];
  const defBreakdown = R.getTerrainModBreakdown ? R.getTerrainModBreakdown(tgtGroup.terrain, false, jpOpts) : [];

  // 結果をオーバーレイ表示（修正項目を全て列挙）
  const mods = [];
  if (isFlankFire) mods.push('側面射撃(火力×2)');
  atkBreakdown.forEach(x => {
    const label = x.type === 'MOVEMENT' ? '攻撃側移動カード' : `攻撃側 ${x.type}`;
    mods.push(`${label} ${x.mod>=0?'+':''}${x.mod}`);
  });
  defBreakdown.forEach(x => {
    const label = x.type === 'MOVEMENT' ? '防御側移動カード' : `防御側 ${x.type}`;
    mods.push(`${label} ${x.mod>=0?'+':''}${x.mod}`);
  });
  if (concealMod) mods.push(`隠蔽${concealMod>=0?'+':''}${concealMod}`);
  if (malfuncMod) mods.push(`故障${malfuncMod>=0?'+':''}${malfuncMod}`);
  if (japanRuleMod) mods.push(`日本ルール ${japanRuleMod>=0?'+':''}${japanRuleMod}`);
  const title = `射撃 ${srcGroup.name}→${tgtGroup.name} 距離${distance} 基礎射撃力${strength}<br/>修正項目:<br/>${mods.length ? mods.join('<br/>') : 'なし'}`;
  showFireResultOverlay(title, results, usedFireCards).then(() => {
    cleanupEliminatedGroups();
    renderField('player'); renderField('ai');
    renderHands();
  });
  // §20.53 射撃を行ったグループの侵入兵は侵入状態解除
  if (window.CC_ACTION) window.CC_ACTION.clearInfiltration(srcGroup, 'fire');
  if (window.DISCARD_RULES) window.DISCARD_RULES.markActed();
}

function buildCrewMapFromPairs(group) {
  // group.crewPairs (主num→副num) を card index ベースの crewMap に変換
  const out = {};
  if (!group.crewPairs) return out;
  Object.keys(group.crewPairs).forEach(ownerNum => {
    const ownerIdx = group.cards.findIndex(c => c.num === parseInt(ownerNum, 10));
    const assistIdx = group.cards.findIndex(c => c.num === group.crewPairs[ownerNum]);
    if (ownerIdx >= 0 && assistIdx >= 0) out[ownerIdx] = assistIdx;
  });
  return out;
}

// ===== 右クリックメニュー =====
const ctxMenu = document.getElementById('ctx-menu');

function nextGroupLetter() {
  const used = new Set(state.groups.player.map(g => g.name));
  for (const l of ALL_GROUP_LETTERS) if (!used.has(l)) return l;
  return null;
}

function showCardContextMenu(x, y, fromGroup, cardIdx) {
  const card = fromGroup.cards[cardIdx];
  if (!card) return;
  ctxMenu.innerHTML = '';

  const title = document.createElement('div');
  title.className = 'ctx-title';
  title.textContent = `${card.id}${card.name ? ' (' + card.name + ')' : ''} を移動`;
  ctxMenu.appendChild(title);

  state.groups.player.forEach(g => {
    if (g === fromGroup) return;
    const it = document.createElement('div');
    it.className = 'ctx-item';
    it.textContent = `GROUP ${g.name} へ (${g.cards.length}人)`;
    it.addEventListener('click', () => {
      moveCard(fromGroup, cardIdx, g);
      hideContextMenu();
    });
    ctxMenu.appendChild(it);
  });

  const sep = document.createElement('div'); sep.className = 'ctx-sep'; ctxMenu.appendChild(sep);

  const newItem = document.createElement('div');
  newItem.className = 'ctx-item new';
  const nextL = nextGroupLetter();
  if (nextL) {
    newItem.textContent = `＋ 新グループ ${nextL} を作成して移動`;
    newItem.addEventListener('click', () => {
      const newGroup = { name: nextL, cards: [], distance: 0, terrain: [], actions: [] };
      state.groups.player.push(newGroup);
      moveCard(fromGroup, cardIdx, newGroup);
      hideContextMenu();
    });
  } else {
    newItem.className = 'ctx-item disabled';
    newItem.textContent = '＋ 新グループ作成 (上限A〜Z)';
  }
  ctxMenu.appendChild(newItem);

  const cancel = document.createElement('div');
  cancel.className = 'ctx-item';
  cancel.style.color = '#aaa';
  cancel.textContent = 'キャンセル';
  cancel.addEventListener('click', hideContextMenu);
  ctxMenu.appendChild(cancel);

  // 位置調整 (画面外にはみ出ないように)
  ctxMenu.style.left = '0px'; ctxMenu.style.top = '0px';
  ctxMenu.classList.add('active');
  const rect = ctxMenu.getBoundingClientRect();
  let px = x, py = y;
  if (px + rect.width  > window.innerWidth)  px = window.innerWidth  - rect.width  - 6;
  if (py + rect.height > window.innerHeight) py = window.innerHeight - rect.height - 6;
  ctxMenu.style.left = px + 'px';
  ctxMenu.style.top  = py + 'px';
}

function hideContextMenu() { ctxMenu.classList.remove('active'); }

function moveCard(fromGroup, idx, toGroup) {
  const [card] = fromGroup.cards.splice(idx, 1);
  toGroup.cards.push(card);
  renderField('player');
  // オーバーレイ表示中なら再描画
  if (overlay.classList.contains('active') && currentOverlayGroup === fromGroup && currentOverlaySide === 'player') {
    if (fromGroup.cards.length > 0) {
      showGroupOverlay('player', fromGroup);
    } else {
      overlay.classList.remove('active');
    }
  }
}

document.addEventListener('click', e => {
  if (!ctxMenu.contains(e.target)) hideContextMenu();
});
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') hideContextMenu();
});

const overlayImg = document.getElementById('card-overlay-img');
const overlayGroup = document.getElementById('card-overlay-group');
const groupTitle = document.getElementById('group-view-title');

function showOverlay(src) {
  overlayImg.src = src;
  overlayImg.style.display = '';
  overlayGroup.style.display = 'none';
  overlay.classList.add('active');
}
let groupOverlayImgs = []; // {img, card, showBack}

let currentOverlayGroup = null;
let currentOverlaySide = null;

function showGroupOverlay(side, group) {
  currentOverlayGroup = group;
  currentOverlaySide = side;
  overlayImg.style.display = 'none';
  overlayGroup.style.display = '';
  const faction = side === 'player' ? state.player : state.ai;
  const hint = side === 'player' ? '※ 左クリック=裏/表, 右クリック=移動' : '※ クリックで裏/表';
  groupTitle.textContent = `${faction.flag} ${faction.name} — GROUP ${group.name}  (距離 ${group.distance} / 兵士 ${group.cards.length}人)  ${hint}`;
  groupGrid.innerHTML = '';
  groupOverlayImgs = [];
  group.cards.forEach((card, idx) => {
    if (card.killed || card.routed) return;
    const wrap = document.createElement('div');
    wrap.style.display = 'flex'; wrap.style.flexDirection = 'column'; wrap.style.alignItems = 'center';
    const img = document.createElement('img');
    const initBack = !!card.pinned;
    const entry = { img, card, showBack: initBack };
    img.src = initBack ? (card.imgBack || card.img) : card.img;
    img.alt = card.id;
    img.onerror = () => { img.style.background = '#666'; img.alt = card.id; };
    img.addEventListener('click', e => {
      e.stopPropagation();
      entry.showBack = !entry.showBack;
      img.src = entry.showBack ? (card.imgBack || card.img) : card.img;
    });
    if (side === 'player') {
      img.addEventListener('contextmenu', e => {
        e.preventDefault();
        e.stopPropagation();
        showCardContextMenu(e.clientX, e.clientY, group, idx, true);
      });
    }
    wrap.appendChild(img);
    groupGrid.appendChild(wrap);
    groupOverlayImgs.push(entry);
  });
  overlay.classList.add('active');
}

document.getElementById('flip-all-front').addEventListener('click', e => {
  e.stopPropagation();
  groupOverlayImgs.forEach(en => { en.showBack = false; en.img.src = en.card.img; });
});
document.getElementById('flip-all-back').addEventListener('click', e => {
  e.stopPropagation();
  groupOverlayImgs.forEach(en => { en.showBack = true; en.img.src = en.card.imgBack || en.card.img; });
});

// 汎用グリッドオーバーレイ (地形/アクションカード用)
function showCardGridOverlay(title, cards) {
  overlayImg.style.display = 'none';
  overlayGroup.style.display = '';
  groupTitle.textContent = `${title}  (${cards.length}枚)  ※ クリックで裏/表`;
  groupGrid.innerHTML = '';
  groupOverlayImgs = [];
  cards.forEach(card => {
    const wrap = document.createElement('div');
    wrap.style.display = 'flex'; wrap.style.flexDirection = 'column'; wrap.style.alignItems = 'center';
    const img = document.createElement('img');
    const entry = { img, card, showBack: false };
    img.src = card.img; img.alt = card.id;
    img.onerror = () => { img.style.background = '#666'; img.alt = card.id; };
    img.addEventListener('click', e => {
      e.stopPropagation();
      entry.showBack = !entry.showBack;
      img.src = entry.showBack ? (card.imgBack || card.img) : card.img;
    });
    wrap.appendChild(img);
    groupGrid.appendChild(wrap);
    groupOverlayImgs.push(entry);
  });

}
overlay.addEventListener('click', e => {
  if (e.target === overlay || e.target === overlayImg) overlay.classList.remove('active');
});

// ===== §3.6 開始時の地形交互配置フェーズ =====
state.phase = 'play'; // 'play' | 'terrainPlacement'
state.terrainTurn = null; // 'player' | 'ai'
state.terrainSelected = null; // 選択中の手札index
state.terrainDone = { player: false, ai: false };

function isTerrainHandCard(card) {
  if (!card || !card.terrain) return false;
  const t = card.terrain.type;
  // §3.6 配置可能なのは地形カード(平地以外); 移動カード等は不可
  // 平地相当として除外: MOVEMENT, FIRE, RALLY, HERO, SNIPER, CONCEALED
  // 配置可能: WOODS, BUILDINGS, HILL, GULLY, WALL, BRUSH, STREAM, MARSH, SMOKE, WIRE, MINEFIELD, PILLBOX
  const placeable = ['WOODS','BUILDINGS','HILL','GULLY','WALL','BRUSH','STREAM','MARSH','SMOKE','WIRE','MINEFIELD','PILLBOX'];
  if (placeable.indexOf(t) < 0) return false;
  // シナリオで除外指定があれば除く (treatAsPlain)
  const tap = state.scenario && state.scenario.treatAsPlain;
  if (tap && tap.indexOf(t) >= 0) return false;
  return true;
}

function startTerrainPlacementPhase() {
  state.phase = 'terrainPlacement';
  // §3.6 先攻陣営 (シナリオから取得)
  const firstFac = state.scenario && state.scenario.firstPlayer;
  // 自陣営が先攻なら 'player', そうでなければ 'ai'
  let firstSide = 'player';
  if (firstFac) {
    const playerKey = Object.keys(FACTIONS).find(k => FACTIONS[k] === state.player);
    firstSide = (playerKey === firstFac) ? 'player' : 'ai';
  }
  state.terrainTurn = firstSide;
  state.terrainSelected = null;
  state.terrainDone = { player: false, ai: false };
  document.getElementById('phase-banner').classList.add('active');
  updatePhaseBanner();
  renderHands();
  if (state.terrainTurn === 'ai') setTimeout(aiPlaceTerrain, 600);
}

function updatePhaseBanner() {
  const msg = document.getElementById('phase-msg');
  if (state.phase !== 'terrainPlacement') return;
  const turnName = state.terrainTurn === 'player' ? state.player.name : state.ai.name;
  const placeable = state.terrainTurn === 'player'
    ? state.playerHand.filter(isTerrainHandCard).length
    : state.aiHand.filter(isTerrainHandCard).length;
  msg.innerHTML = `<b>地形配置フェーズ §3.6</b> ／ 手番: <b>${turnName}</b> ／ 配置可能な地形カード: <b>${placeable}枚</b>`;
}

function endTerrainPlacementPhase() {
  state.phase = 'play';
  state.terrainSelected = null;
  state.actedGroups = new Set();
  updateCommissarMarker('player');
  updateCommissarMarker('ai');
  document.querySelectorAll('.action-btn').forEach(b => { b.disabled = false; });
  document.getElementById('phase-banner').classList.remove('active');
  // §3.6 末尾: 手札を補充
  while (state.playerHand.length < state.player.handMax) {
    const c = drawTerrainCard(); if (!c) break; state.playerHand.push(c);
  }
  while (state.aiHand.length < state.ai.handMax) {
    const c = drawTerrainCard(); if (!c) break; state.aiHand.push(c);
  }
  state.aiHandCount = state.aiHand.length;
  // §4.1 先攻陣営からターン開始
  const firstFac = state.scenario && state.scenario.firstPlayer;
  const playerKey = getFactionKey(state.player);
  state.currentTurn = (firstFac === playerKey) ? 'player' : 'ai';
  if (state.currentTurn === 'player' && window.DISCARD_RULES) window.DISCARD_RULES.resetTurn();
  renderHands();
  updateTurnBanner();
  if (state.currentTurn === 'ai') setTimeout(aiTurn, 800);
}

function updateTurnBanner() {
  if (state.phase !== 'play') return;
  const isPlayer = state.currentTurn === 'player';
  const turnName = isPlayer ? state.player.name : state.ai.name;

    document.body.appendChild(ov);

function getEffectiveHandMax(side) {
  const fac = side === 'player' ? state.player : state.ai;
  let max = fac.handMax;
  // SLダメージの一時ペナルティ
  if (state.slDamagePenalty && state.slDamagePenalty[side]) {
    max -= state.slDamagePenalty[side];
  }
  // SLとASLが両方いなくなったら恒久-1
  if (checkAllLeadersLost(side)) {
    max -= 1;
  }
  // 敵グループが1つになったら+1
  const enemySide = side === 'player' ? 'ai' : 'player';
  if (state.groups[enemySide].length <= 1) {
    max += 1;
  }
  return Math.max(1, max);
}

/** ソ連のコミッサール: SLかASLにランダムで配置 */
function initCommissar(side) {
  const factionKey = getFactionKey(side === 'player' ? state.player : state.ai);
  if (factionKey !== 'rus') return;
  const R = window.INFANTRY_RULES;
  if (!R) return;
  // SL/ASLを探す
  const candidates = [];
  state.groups[side].forEach((g, gi) => {
    g.cards.forEach((c, ci) => {
      if (!R.isAlive(c)) return;
      const def = R.lookupSoldier(c, factionKey);
      if (def && def.leader && (def.leader === '分隊長' || def.leader === '副分隊長')) {
        candidates.push({ gi, ci, card: c });
      }
    });
  });
  // 既にコミッサールが配置済みで生存中ならそのまま
  for (const g of state.groups[side]) {
    for (const c of g.cards) {
      if (c._commissar && R.isAlive(c)) return;
    }
  }
  // 全カードのコミッサールをクリア
  state.groups[side].forEach(g => g.cards.forEach(c => { c._commissar = false; }));
  if (candidates.length === 0) return;
  // ランダムで1人に配置
  const pick = candidates[Math.floor(Math.random() * candidates.length)];
  pick.card._commissar = true;
}

/** コミッサール持ちが死亡したら再配置 */
function updateCommissarMarker(side) {
  const factionKey = getFactionKey(side === 'player' ? state.player : state.ai);
  if (factionKey !== 'rus') return;
  initCommissar(side);
}

/** グループにコミッサールがいて、かつPINでないか */
function hasCommissar(group) {
  const R = window.INFANTRY_RULES;
  return group.cards.some(c => c._commissar && R && !R.isPinned(c) && R.isAlive(c));
}

function checkAllLeadersLost(side) {
  const R = window.INFANTRY_RULES;
  if (!R) return false;
  const factionKey = getFactionKey(side === 'player' ? state.player : state.ai);
  let hasSL = false, hasASL = false;
  state.groups[side].forEach(g => {
    g.cards.forEach(c => {
      if (!R.isAlive(c)) return;
      const def = R.lookupSoldier(c, factionKey);
      if (!def || !def.leader) return;
      if (def.leader === '分隊長') hasSL = true;
      if (def.leader === '副分隊長') hasASL = true;
    });
  });
  return !hasSL && !hasASL;
}

/** SLがダメージを受けた時に呼ぶ。今ターンのみ手札-1 */
function applySLDamagePenalty(side) {
  if (!state.slDamagePenalty) state.slDamagePenalty = { player: 0, ai: 0 };
  state.slDamagePenalty[side]++;
}

/** ターン開始時にSLペナルティをリセット */
function resetSLDamagePenalty() {
  state.slDamagePenalty = { player: 0, ai: 0 };
}

/** コミッサール処刑チェック: PIN兵士がいればRPCで判定 */
function commissarExecutionCheck(side) {
  const factionKey = getFactionKey(side === 'player' ? state.player : state.ai);
  if (factionKey !== 'rus') return;
  const R = window.INFANTRY_RULES;
  if (!R) return;
  state.groups[side].forEach(g => {
    if (!hasCommissar(g)) return;
    const pinnedIdx = g.cards.map((c, i) => (R.isPinned(c) && R.isAlive(c)) ? i : -1).filter(i => i >= 0);
    if (pinnedIdx.length === 0) return;
    // RPC判定カードを引く
    const judge = drawTerrainCard();
    if (!judge) return;
    // RPCの0r列の値で対象兵士を決定
    const rpc = parseInt((judge.terrain && judge.terrain.dice && judge.terrain.dice['0r']) || '0', 10) || 0;
    const targetIdx = rpc % g.cards.length;
    checkBreezeRemoveSmoke(judge);
    pushTerrainToDiscard(judge);
    if (R.isPinned(g.cards[targetIdx]) && R.isAlive(g.cards[targetIdx])) {
      const def = R.lookupSoldier(g.cards[targetIdx], factionKey);
      const name = def ? def.name : g.cards[targetIdx].id;
      R.killSoldier(g.cards[targetIdx]);
      alert(`コミッサール処刑: ${name} (RPC ${rpc})`);
      renderField(side);
    }
  });
}

function endPlayerTurn() {
  commissarExecutionCheck('player');
  commissarExecutionCheck('ai');
  updateCommissarMarker('player');
  updateCommissarMarker('ai');
  // §4.5 手札補充
  const pMax = getEffectiveHandMax('player');
  while (state.playerHand.length < pMax) {
    const c = drawTerrainCard(); if (!c) break; state.playerHand.push(c);
  }
  // 次ターンでSLペナルティリセット
  resetSLDamagePenalty();
  state.currentTurn = 'ai';
  state.actedGroups = new Set();
  renderHands();
  updateTurnBanner();
  setTimeout(aiTurn, 3000);
}

function endAITurn() {
  commissarExecutionCheck('player');
  commissarExecutionCheck('ai');
  updateCommissarMarker('player');
  updateCommissarMarker('ai');
  // §4.5 AI 手札補充
  const aiMax = getEffectiveHandMax('ai');
  while (state.aiHand.length < aiMax) {
    const c = drawTerrainCard(); if (!c) break; state.aiHand.push(c);
  }
  state.aiHandCount = state.aiHand.length;
  state.currentTurn = 'player';
  state.actionDone = false;
  state.actedGroups = new Set();
  if (window.DISCARD_RULES) window.DISCARD_RULES.resetTurn();
  document.querySelectorAll('.action-btn').forEach(b => { b.disabled = false; });
  renderField('player'); renderField('ai');
  renderHands();
  updateTurnBanner();

  // §20.91 狂暴兵の自動CC（プレイヤーターン開始時）
  if (window.CC_ACTION) {
    const R_b = window.INFANTRY_RULES;
    const playerFacKey = getFactionKey(state.player);
    (async () => {
      for (let gi = 0; gi < state.groups.player.length; gi++) {
        const grp = state.groups.player[gi];
        for (const card of grp.cards) {
          if (!card.berserk || !R_b.isAlive(card)) continue;
          // 距離5の敵グループを探す
          let tgtGrp = null, tgtIdx = -1;
          for (let ei = 0; ei < state.groups.ai.length; ei++) {
            const eg = state.groups.ai[ei];
            if (eg.cards.some(c => R_b.isAlive(c)) && R_b.relativeRange(grp.distance, eg.distance) === 5) {
              tgtGrp = eg; tgtIdx = ei; break;
            }
          }
          if (!tgtGrp) {
            // §20.92 距離5の敵がいない → 回復
            R_b.unpinSoldier(card); card.berserk = false; continue;
          }
          await window.CC_ACTION.executeBerserkCC(card, grp, gi, tgtGrp, 'ai', tgtIdx, drawTerrainCard, playerFacKey);
          cleanupEliminatedGroups();
          renderField('player'); renderField('ai');
        }
      }
    })();
  }
}

// ===== 簡易 AI (優先順位ベース) =====
//   0. (最優先) 移動中の敵がいたら射撃
//   1. 鉄条網が自グループにあれば除去 (移動カード使用)

    ov.innerHTML = '';
    const label = document.createElement('div');
    label.textContent = '▶ ' + text;
    label.style.cssText = 'font-size:30px;font-weight:bold;margin-bottom:12px;text-shadow:0 2px 4px rgba(0,0,0,0.7);';
    ov.appendChild(label);

      row.style.cssText = 'display:flex;gap:8px;justify-content:center;flex-wrap:wrap;max-width:90vw;';
      valid.forEach(c => {

        img.src = c.img;
        img.style.cssText = 'height:260px;border-radius:6px;box-shadow:0 2px 8px rgba(0,0,0,0.5);';
        row.appendChild(img);
      });
      ov.appendChild(row);
    }
    const btn = document.createElement('button');
