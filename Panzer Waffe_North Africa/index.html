<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>対Ai Panzer Waffe North Africa1942 ©IED 2026</title>
    <link rel="stylesheet" href="https://pyscript.net/releases/2024.1.1/core.css" />
    <script type="module" src="https://pyscript.net/releases/2024.1.1/core.js"></script>
    
    <style>
        /* 基本設定：横スワイプ禁止 */
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #000; font-family: 'Courier New', monospace; overscroll-behavior-x: none; }
        .container { display: flex; flex-direction: column; height: 100vh; }

        /* 上半分：戦況ボード（高さはJSで制御するため flex: none に変更） */
        #fixed-dashboard {
            height: 45vh; /* 初期サイズ：画面の45% */
            flex: none;   
            background: #111;
            color: #00ff00;
            padding: 15px;
            white-space: pre-wrap;
            overflow-y: auto;
            font-size: 14px;
            line-height: 1.2;
            min-height: 100px; /* 潰れすぎ防止 */
        }

        /* ★新機能：ドラッグできる仕切りバー */
        #drag-handle {
            height: 10px;
            background: #444;
            cursor: row-resize; /* マウスカーソルを上下矢印に */
            border-top: 1px solid #666;
            border-bottom: 1px solid #666;
            flex: none;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        /* バーの真ん中に「つまみ」っぽい飾りを表示 */
        #drag-handle::after {
            content: "|||";
            color: #888;
            font-size: 8px;
            letter-spacing: 2px;
        }
        #drag-handle:hover { background: #666; }

        /* 下半分：操作ログ */
        #scroll-log {
            flex: 1;
            min-height: 0; /* スクロールさせるための必須設定 */
            overflow-y: auto;
            padding: 15px;
            color: #fff;
            background: #000;
            font-size: 14px;
        }

        #input-area { background: #222; padding: 10px; display: flex; border-top: 1px solid #555; }
        input { flex: 1; background: #000; color: #fff; border: 1px solid #00ff00; padding: 8px; outline: none; }
        button { background:#000; color:#00ff00; border:1px solid #00ff00; padding:0 15px; margin-left:5px; cursor:pointer; }
    </style>
</head>
<body>

<div class="container">
    <div id="fixed-dashboard">システム起動中... AIデータを読み込んでいます...</div>
    
    <div id="drag-handle"></div>
    
    <div id="scroll-log"><div id="output-area"></div></div>
    <div id="input-area">
        <span style="color:#00ff00; padding-right:5px;">></span>
        <input type="text" id="user-input" autocomplete="off" placeholder="番号を入力...">
        <button id="submit-btn" type="button">送信</button>
    </div>
</div>

<script>
    const handle = document.getElementById('drag-handle');
    const topBox = document.getElementById('fixed-dashboard');
    let isDragging = false;

    // マウス操作（PC）
    handle.addEventListener('mousedown', (e) => {
        isDragging = true;
        document.body.style.cursor = 'row-resize';
        e.preventDefault(); // 文字選択などを防止
    });

    document.addEventListener('mousemove', (e) => {
        if (!isDragging) return;
        let newHeight = e.clientY;
        // 画面からはみ出さないように制限
        if (newHeight < 50) newHeight = 50;
        if (newHeight > window.innerHeight - 100) newHeight = window.innerHeight - 100;
        topBox.style.height = newHeight + 'px';
    });

    document.addEventListener('mouseup', () => {
        isDragging = false;
        document.body.style.cursor = 'default';
    });

    // タッチ操作（スマホ・タブレット）
    handle.addEventListener('touchstart', (e) => {
        isDragging = true;
        e.preventDefault();
    });

    document.addEventListener('touchmove', (e) => {
        if (!isDragging) return;
        let newHeight = e.touches[0].clientY;
        if (newHeight < 50) newHeight = 50;
        if (newHeight > window.innerHeight - 100) newHeight = window.innerHeight - 100;
        topBox.style.height = newHeight + 'px';
    }, { passive: false });

    document.addEventListener('touchend', () => {
        isDragging = false;
    });
</script>

<script src="ai_pretrained_africa.js"></script>
<py-config>
    packages = ["pandas"]
    [[fetch]]
    files = [
        "main.py",
        "ai_system.py",
        "game_effects.py",
        "cards_africa.csv"
    ]
</py-config>
<script type="py">
    import js
    import main
    try:
        main.main()
    except Exception as e:
        js.console.error(f"実行エラーが発生しました: {e}")
</script>

</body>
</html>
