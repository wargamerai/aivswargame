vassalengine.org/t/auto-reveal-invisible-units/2444/3)\u3000\u3000\u60F3\u50CF\u3060\u304C\u3001\u3053\u306E\u3088\u3046\u306A\u4E8B\u4F8B(Invisible\u30C8\u30EC\u30A4\u30C8\u3092\u4F7F\u308F\u305A\u306B\u30E6\u30CB\u30C3\u30C8\u3092\u900F\u660E\u5316\u3059\u308B)\u3092\u53EF\u80FD\u306B\u3059\u308B\u305F\u3081\u306B\u306F\u524D\u8FF0\u306E\u30D5\u30A9\u30FC\u30E9\u30E0\u53C2\u8003\u30DA\u30FC\u30B8\u306B\u3042\u308B\u901A\u308ABasic\ Name\u3067\u30E6\u30CB\u30C3\u30C8\u3092\u900F\u660E\u306A\u3082\u306E\u306B\u3057\u3066(\u78BA\u304BBasic\ Name\u306E\u753B\u50CF\u306B\u4F55\u3082\u5165\u308C\u306A\u3044\u3068\u30A8\u30E9\u30FC\u8868\u793A\u304C\u51FA\u308B\u306F\u305A\u3067\u3001\u7279\u306B\u30B2\u30FC\u30E0\u304C\u30D5\u30EA\u30FC\u30BA\u3059\u308B\u3068\u3044\u3063\u305F\u4E8B\u6545\u306F\u306A\u304B\u3063\u305F\u3068\u601D\u3046\u304C\u3001\u3084\u306F\u308A\u983B\u7E41\u306B\u30A8\u30E9\u30FC\u8868\u793A\u304C\u51FA\u308B\u306E\u306F\u76EE\u969C\u308A\u3060\u3068\u601D\u3046)Layer\u30C8\u30EC\u30A4\u30C8\u3067\u5F53\u8A72Piece\u306E\u672C\u6765\u306E\u753B\u50CF\u3092\u8868\u793A\u3055\u305B\u308B\u306E\u304C\u3001\u6700\u3082\u7C21\u5358\u306B\u3067\u304D\u308B\u51E6\u7F6E\u306A\u306E\u3060\u3068\u601D\u3046\u3002(\u30B3\u30DE\u30F3\u30C9\u64CD\u4F5C\u306B\u3064\u3044\u3066\u306FRestrict\ Commands\u30C8\u30EC\u30A4\u30C8\u3067\u81EA\u5206\u4EE5\u5916\u306E\u30D7\u30EC\u30A4\u30E4\u30FC\u304B\u3089\u53F3\u30AF\u30EA\u30C3\u30AF\u30E1\u30CB\u30E5\u30FC\u3092\u96A0\u3057\u3066\u3057\u307E\u3048\u3070\u89E3\u6C7A\u3059\u308B\u3068\u601D\u3046)\u3000\u3000\u305F\u3060\u3001\u3053\u306E\u5834\u5408\u3060\u3068\u5F53\u8A72\u30E6\u30CB\u30C3\u30C8\u306E\uFF62\u6240\u6709\u8005\uFF63\u304B\u3089\u3082\u900F\u660E\u306B\u306A\u308B\u3067\u64CD\u4F5C\u3082\u308F\u304B\u308A\u3065\u3089\u304F\u306A\u3063\u3066\u3057\u307E\u3046\u3060\u308D\u3046\u304B\u3089\u3001\u3053\u306E\u65B9\u5F0F\u3092\u4F7F\u3063\u3066Mask\u3084Invisible\u30C8\u30EC\u30A4\u30C8\u3092\u64CD\u4F5C\u