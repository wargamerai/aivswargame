DoActionButton.\u30B2\u30FC\u30E0\u958B\u59CB\u306E\u8868\u793A\u3092\u884C\u3046\u3002\u3000\u3000\u3053\u306E\u30E2\u30B8\u30E5\u30FC\u30EB\u3067\u306E\u30B2\u30FC\u30E0\u958B\u59CB\u306B\u3064\u3044\u3066\u306F\u4ED6\u306E\u30C8\u30EC\u30A4\u30C8\u5185\u3067\u3082\u8A18\u3057\u305F\u8A18\u61B6\u304C\u3042\u308B\u304C\u3053\u3053\u3067\u3082\u8A18\u3057\u3066\u304A\u304F\u3002\u3000\u3000\u4E00\u822C\u7684\u306A\u30E2\u30B8\u30E5\u30FC\u30EB\u3067\u306F\u30B2\u30FC\u30E0\u30D7\u30EC\u30A4\u958B\u59CB\u306F\u7B2C1\u30BF\u30FC\u30F3(\u3082\u3057\u304F\u306F\u7B2C1\u30D5\u30A7\u30A4\u30BA)\u958B\u59CB\u3082\u610F\u5473\u3057\u3066\u3044\u308B\u304C\u3001\u305D\u308C\u306F\u5F53\u30E2\u30B8\u30E5\u30FC\u30EB\u3067\u3082\u540C\u3058\u3067\u3042\u308B\u3002\u3000\u3000\u7570\u306A\u308B\u70B9\u306F\ Global\ Property\uFF62Start\uFF63\u306A\u3069\u3092\u8A2D\u3051\u3066\u3001\u305D\u306E\u5024\u304C\u7279\u5B9A\u306E\u3082\u306E\u306B\u306A\u3089\u306A\u3051\u308C\u3070\u30B3\u30DE\u30F3\u30C9\u306B\u4F55\u3089\u304B\u306E\u5236\u9650\u304C\u304B\u304B\u308B\u3088\u3046\u306B\u3057\u3066\u3042\u308B\u3053\u3068\u306B\u3042\u308B\u3002\u3000\u3000\u3053\u308C\u306B\u3088\u3063\u3066\u3001\u3042\u305F\u304B\u3082\u30B2\u30FC\u30E0\u958B\u59CB\u524D\u30D5\u30A7\u30A4\u30BA\u304C\u8A2D\u3051\u3089\u308C\u3066\u3044\u308B\u3088\u3046\u306B\u898B\u305B\u3066\u3044\u308B\u3060\u3051\u3067\u3042\u308B\u3002(\u5F53\u521D\u306F\uFF62\u7B2C0\u30BF\u30FC\u30F3\uFF63\u3092\u8A2D\u3051\u3066\u307F\u305F\u306E\u3060\u304C\u30AB\u30A6\u30F3\u30C8\u306E\u5024\u304C\u305A\u308C\u308B\u3088\u3046\u306A\u5947\u5999\u306A\u52D5\u304D\u3092\u3059\u308B\u306E\u3067\u8AE6\u3081\u305F)\ \u3000\u3000\u3057\u304B\u3057\u3001\u3053\u306E\u65B9\u5F0F\u306B\u554F\u984C\u304C\u306A\u3044\u308F\u3051\u3067\u306F\u306A\u3044\u3002\u3000\u3000\u81F4\u547D\u7684\u306A\u3082\u306E\u306E\u4F8B\u3068\u3057\u3066\u306F\uFF62Mask\u3084Invisible\u30C8\u30EC\u30A4\u30C8\u3092\u4F7F\u7528\u3057\u3066\u76F8\u624B\u306B\u5404\u30E6\u30CB\u30C3\u30C8\u306E\u60C5\u5831\u3092\u96A0\u3057\u305F\u72B6\u614B\u3067\u521D\u671F\u914D\u7F6E\u3092\u884C\u3044\u3001\u30B2\u30FC\u30E0\u30B9\u30BF\u30FC\u30C8\u3084\u6B21\u306E\u30D5\u30A7\u30A4\u30BA\u306B\u79FB\u308B\u969B\u306B\u4E21\u9663\u55B6\u306E\u30E6\u30CB\u30C3\u30C8\u3092\u4E00\u6589\u516C\u958B\u3055\u305B\u308B\uFF63(\u3053\u306E\u30B2\u30FC\u30E0\u306B\u304A\u3051\u308B"\u885D\u7ACB\u3092\u3064\u304B\u3063\u3066\u4E92\u3044\u306E\u521D\u671F\u914D\u7F6E\u3092\u96A0\u3059"\u306B\u76F8\u5F53\u3059\u308B\u3082\u306E)\u3068\u3044\u3063\u305F\u3053\u3068\u306F\u3067\u304D\u306A\u3044\u3001\u3068\u3044\u3063\u305F\u3053\u3068\u304C\u6319\u3052\u3089\u308C\u308B\u3002\u3000\u3000\u5B9F\u969B\u306B\u305D\u308C\u3092\u884C\u3046\u3068\u3001\u305D\u308C\u3089\u306E\u30DC\u30BF\u30F3\u3092\u30AF\u30EA\u30C3\u30AF\u3057\u305F\u5074\u306EPiece\u3057\u304B\u516C\u958B\u3055\u308C\u306A\u3044\u306E\u3067\u3042\u308B\u3002\u3000\u3000\u304A\u305D\u3089\u304FMask\u3084Invisible\u30C8\u30EC\u30A4\u30C8\u3092\u4F7F\u7528\u3059\u308B\u3068\u3044\u3046\u3053\u3068\u306F\u3001\u305D\u306EPiece\u306B\uFF62\u6240\u6709\u6A29\uFF63\u304C\u751F\u307E\u308C\u3001\u305D\u306E\u6240\u6709\u6A29\u3092\u6709\u3059\u308B\u30D7\u30EC\u30A4\u30E4\u30FC\u3057\u304BMask\u3084Invisible\u30C8\u30EC\u30A4\u30C8\u3092\u64CD\u4F5C\u3059\u308B\u3053\u3068\u306F\u3067\u304D\u306A\u3044\u306E\u3060\u3068\u601D\u308F\u308C\u308B\u3002\ \u3000\u3000\u78BA\u304B\u306B\uFF62Global\ Option\uFF63\u5185\u306E\uFF62Allow\ non-owners\ to\ unmask\ pieces\uFF63\u3084Mask\u30C8\u30EC\u30A4\u30C8\u5185\u306E\uFF62Can\ be\ masked\ by\uFF63\u306A\u3069\u3067Mask\u30B3\u30DE\u30F3\u30C9\u3092\u64CD\u4F5C\u3067\u304D\u308B\u30D7\u30EC\u30A4\u30E4\u30FC\u3092\u9078\u629E\u3059\u308B\u3053\u3068\u304C\u3067\u304D\u308B\u306E\u306F\u78BA\u8A8D\u3057\u3066\u3044\u308B\u304C\u3001\u305D\u308C\u3067\u3082Mask\u72B6\u614B\u306E\u30E6\u30CB\u30C3\u30C8\u304C\u4ED6\u306E\u30D7\u30EC\u30A4\u30E4\u30FC\u304B\u3089\u64CD\u4F5C\u3067\u304D\u306A\u3044\u304B\u3001\u3042\u308B\u3044\u306F\u6240\u6709\u3057\u3066\u3044\u308B\u30D7\u30EC\u30A4\u30E4\u30FC\u3068\u540C\u3058\u72B6\u614B(\u3053\u306E\u30E2\u30B8\u30E5\u30FC\u30EB\u3060\u3068\u8996\u899A\u7684\u306B\u534A\u900F\u660E\u306E\u72B6\u614B\u3067\u3001\u307B\u307C\u5168\u3066\u306E\u30B3\u30DE\u30F3\u30C9\u304C\u64CD\u4F5C\u3067\u304D\u308B\u72B6\u614B)\u306B\u306A\u3063\u3066\u3057\u307E\u3046\u3002(\u8A66\u3057\u3066\u306F\u3044\u306A\u3044\u304C\u3001Invisible\u30C8\u30EC\u30A4\u30C8\u3082\u540C\u3058\u3060\u3068\u601D\u308F\u308C\u308B)\ \ \ \ \ \u3000\u3000Invisible\u30C8\u30EC\u30A4\u30C8\u306E\u30D8\u30EB\u30D7(file\:///C\:/Program%20Files/VASSAL-3.7.19/doc/ReferenceManual/Hideable.html)\u306B\u3042\u308B\u3088\u3046\u306B\u4ED6\u306E\u30D7\u30EC\u30A4\u30E4\u30FC\u304C\u5F53\u8A72Piece\u3092\u96A0\u3059\u8A2D\u5B9A\u306F\u53EF\u80FD\u306A\u3088\u3046\u3060\u304C\u3001\u3053\u308C\u306F\u53CD\u5BFE\u306E\u64CD\u4F5C\u3067\u3042\u308B\uFF62\u96A0\u3055\u308C\u3066\u3044\u308B\u72B6\u614B\u3092\u516C\u958B\u3055\u305B\u308B\uFF63\u3053\u3068\u306F\u3067\u304D\u306A\u3044\u3089\u3057\u3044\u3002(\u30D5\u30A9\u30FC\u30E9\u30E0\u53C2\u8003\u30DA\u30FC\u30B8\uFF1Ahttps\://forum.vassalengine.org/t/auto-reveal-invisible-units/2444/3)\u3000\u3000\u60F3\u50CF\u3060\u304C\u3001\u3053\u306E\u3088\u3046\u306A\u4E8B\u4F8B(Invisible\u30C8\u30EC\u30A4\u30C8\u3092\u4F7F\u308F\u305A\u306B\u30E6\u30CB\u30C3\u30C8\u3092\u900F\u660E\u5316\u3059\u308B)\u3092\u53EF\u80FD\u306B\u3059\u308B\u305F\u3081\u306B\u306F\u524D\u8FF0\u306E\u30D5\u30A9\u30FC\u30E9\u30E0\u53C2\u8003\u30DA\u30FC\u30B8\u306B\u3042\u308B\u901A\u308ABasic\ Name\u3067\u30E6\u30CB\u30C3\u30C8\u3092\u900F\u660E\u306A\u3082\u306E\u306B\u3057\u3066(\u78BA\u304BBasic\ Name\u306E\u753B\u50CF\u306B\u4F55\u3082\u5165\u308C\u306A\u3044\u3068\u30A8\u30E9\u30FC\u8868\u793A\u304C\u51FA\u308B\u306F\u305A\u3067\u3001\u7279\u306B\u30B2\u30FC\u30E0\u304C\u30D5\u30EA\u30FC\u30BA\u3059\u308B\u3068\u3044\u3063\u305F\u4E8B\u6545\u306F\u306A\u304B\u3063\u305F\u3068\u601D\u3046\u304C\u3001\u3084\u306F\u308A\u983B\u7E41\u306B\u30A8\u30E9\u30FC\u8868\u793A\u304C\u51FA\u308B\u306E\u306F\u76EE\u969C\u308A\u3060\u3068\u601D\u3046)Layer\u30C8\u30EC\u30A4\u30C8\u3067\u5F53\u8A72Piece\u306E\u672C\u6765\u306E\u753B\u50CF\u3092\u8868\u793A\u3055\u305B\u308B\u306E\u304C\u3001\u6700\u3082\u7C21\u5358\u306B\u3067\u304D\u308B\u51E6\u7F6E\u306A\u306E\u3060\u3068\u601D\u3046\u3002(\u30B3\u30DE\u30F3\u30C9\u64CD\u4F5C\u306B\u3064\u3044\u3066\u306FRestrict\ Commands\u30C8\u30EC\u30A4\u30C8\u3067\u81EA\u5206\u4EE5\u5916\u306E\u30D7\u30EC\u30A4\u30E4\u30FC\u304B\u3089\u53F3\u30AF\u30EA\u30C3\u30AF\u30E1\u30CB\u30E5\u30FC\u3092\u96A0\u3057\u3066\u3057\u307E\u3048\u3070\u89E3\u6C7A\u3059\u308B\u3068\u601D\u3046)\u3000\u3000\u305F\u3060\u3001\u3053\u306E\u5834\u5408\u3060\u3068\u5F53\u8A72\u30E6\u30CB\u30C3\u30C8\u306E\uFF62\u6240\u6709\u8005\uFF63\u304B\u3089\u3082\u900F\u660E\u306B\u306A\u308B\u3067\u64CD\u4F5C\u3082\u308F\u304B\u308A\u3065\u3089\u304F\u306A\u3063\u3066\u3057\u307E\u3046\u3060\u308D\u3046\u304B\u3089\u3001\u3053\u306E\u65B9\u5F0F\u3092\u4F7F\u3063\u3066Mask\u3084Invisible\u30C8\u30EC\u30A4\u30C8\u3092\u64CD\u4F5C\u3059\u308B\u306E\u306F\u96E3\u3057\u3044\u3068\u601D\u308F\u308C\u308B\u3002\ \ \ \ \ \u3000\u3000\u3000\u3000\u203B\u8FFD\u8A18\uFF1A\u305D\u306E\u5F8C\u3001\u89E3\u6C7A\u7B56\u306E\u4E00\u3064\u3092\u601D\u3044\u3064\u3044\u305F\u3002\u3000\u3000\u8981\u306FGamestart\u3084Nextphase\u30B3\u30DE\u30F3\u30C9\u3067\u6240\u6709\u6A29\u304C\u751F\u3058\u308BMask\u3084Invisible\u30C8\u30EC\u30A4\u30C8\u3092\u76F4\u63A5\u64CD\u4F5C\u3057\u3088\u3046\u3068\u3059\u308B\u304B\u3089\u3046\u307E\u304F\u3044\u304B\u306A\u3044\u306E\u3060\u308D\u3046\u3068\u601D\u3046\u3002\u3000\u3000\ \ \u3000\u3000\u4F8B\u3048\u3070\u30BB\u30C3\u30C8\u30A2\u30C3\u30D7\u6642\u306B\u4E92\u3044\u306E\u914D\u7F6E\u30A8\u30EA\u30A2\u306E\u9593\u306B\u4ED5\u5207\u