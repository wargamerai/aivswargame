DoActionButton.\uFF20\u624B\u756A\u30E6\u30CB\u30C3\u30C8\u306E\u5C04\u6483\u30DE\u30FC\u30AB\u30FC\u3092\u9664\u53BB\u3059\u308BHotkey\u3092\u767A\u5C04\u3059\u308B\u3002\u3000\u3000\u307E\u305A\u624B\u756A\u5225\u306B\u5C04\u6483\u30DE\u30FC\u30AB\u30FC\u3092\u9664\u53BB\u3067\u304D\u308B\u4ED5\u7D44\u307F\u3060\u304C\u3001\u3053\u308C\u306F\u5404\u9663\u55B6\u3067\u9664\u53BB\u3059\u308BKey\ Command\ \u304C\u7570\u306A\u3063\u3066\u3044\u308B\u304B\u3089\u3067\u3042\u308B\u3002\u3000\u3000\u3053\u308C\u306F\u5143\u3005\u30DE\u30C3\u30D7\u4E0A\u306E\u30E6\u30CB\u30C3\u30C8\u3092\u8907\u6570\u9078\u629E\u3057\u305F\u72B6\u614B\u3067\u7279\u5B9A\u306E\u30B3\u30DE\u30F3\u30C9\u3092\u3092\u9078\u629E\u3059\u308C\u3070\u9078\u629E\u3055\u308C\u3066\u3044\u308B\u30E6\u30CB\u30C3\u30C8\u3059\u3079\u3066\u306B\u540C\u3058\u30B3\u30DE\u30F3\u30C9\u304C\u4E0E\u3048\u3089\u308C\u308B\u3001\u3068\u3044\u3046VASSAL\u81EA\u4F53\u306E\u6A5F\u80FD\u3092\u5229\u7528\u3057\u3066\u5C04\u6483\u30DE\u30FC\u30AB\u30FC\u3092\u4E00\u6589\u306B\u9664\u53BB\u3059\u308B\u305F\u3081\u306E\u3082\u306E\u3067\u3042\u3063\u305F\u3002\u3000\u3000\u305F\u3060\u3001\u3053\u306E\u30B2\u30FC\u30E0\u306E\u5834\u5408\u3001(\u9632\u5FA1\u5C04\u6483\u306A\u3069\u306B\u3088\u3063\u3066)\u5C04\u6483\u30DE\u30FC\u30AB\u30FC\u304C\u7F6E\u304B\u308C\u3066\u3044\u308B\u76F8\u624B\u5074\u30E6\u30CB\u30C3\u30C8\u3082\u542B\u3081\u3066\u8907\u6570\u9078\u629E\u304C\u3055\u308C\u308B\u53EF\u80FD\u6027\u304C\u3042\u308B\u306E\u3067\u3001\u305D\u308C\u3089\u306E\u5C04\u6483\u30DE\u30FC\u30AB\u30FC\u9664\u53BB\u3092\u56DE\u907F\u3059\u308B\u305F\u3081\u306B\u5225\u3005\u306EKey\ Command\u3092\u8A2D\u5B9A\u3057\u305F\u3002(\u30BD\u30ED\u9663\u55B6\u3082\u30D7\u30EC\u30A4\u4E2D\u306F\u4ED6\u9663\u55B6\u3068\u7279\u306B\u5927\u5DEE\u306A\u3044\u306E\u3067\u540C\u3058ProtoType\uFF1D\u540C\u3058\u30C8\u30EC\u30A4\u30C8\u3092\u4F7F\u3063\u3066\u3044\u308B)\u3000\u3000\u3000\u305D\u306E\u610F\u5473\u3067\u306F\u3001\u3053\u306E\u30DC\u30BF\u30F3\u306E\u6A5F\u80FD\u306F\u305D\u306E\u5EF6\u9577\u7DDA\u4E0A\u306B\u3042\u308B\u30B7\u30B9\u30C6\u30E0\u3060\u3068\u3044\u3048\u308B\u3002\u3000\u3000\u3053\u306E\u30DC\u30BF\u30F3\u306E\u6A5F\u80FD\u81EA\u4F53\u306E\u8AAC\u660E\u3060\u304C\u3001\u3053\u308C\u306F\u57FA\u672C\u7684\u306B\u30E6\u30CB\u30C3\u30C8\u30C8\u30EC\u30A4\u3092\u547C\u3073\u51FA\u3059\u30B7\u30B9\u30C6\u30E0\u3068\u540C\u3058\u3067\u3042\u308B\u3002\u3000\u3000\u3064\u307E\u308A\u6D41\u308C\u3068\u3057\u3066\u306F\uFF62\u30D7\u30EC\u30A4\u30E4\u30FC\u304C\u30C4\u30FC\u30EB\u30D0\u30FC\u3092\u30AF\u30EA\u30C3\u30AF\u3057\u30661\u3064\u306EHotkey\u3092\u767A\u4FE1\u3059\u308B\ \u2192\ \u30C4\u30FC\u30EB\u30D0\u30FC\u4E0A\u3067Hotkey\u3092Global\ Key\ Command\u306B\u5909\u63DB\u3057\u3066\u30EC\u30AE\u30E5\u30EC\u30FC\u30B7\u30E7\u30F3\u8A2D\u5B9A\u30DE\u30C3\u30D7\u3078\u9001\u308B\ \u2192\ \u30EC\u30AE\u30E5\u30EC\u30FC\u30B7\u30E7\u30F3\u8A2D\u5B9A\u30DE\u30C3\u30D7\u4E0A\u3067\u5909\u63DB\u3055\u308C\u305FGlobal\ Key\ Command\u306B\u53CD\u5FDC\u3059\u308BPiece(\u3053\u3053\u3067\u306F\uFF62\u30EC\u30AE\u30E5\u30EC\u30FC\u30B7\u30E7\u30F3\u8A2D\u5B9A\uFF63\u3068\u3044\u3046\u30CD\u30FC\u30E0\u30D7\u30EC\u30FC\u30C8)\u3060\u3051\u304C\u53CD\u5FDC\u3057\u3066\u30E1\u30A4\u30F3\u30DE\u30C3\u30D7\u4E0A\u306B\u624B\u756A\u306B\u9069\u3057\u305FGlobal\ Key\ Command\u3092\u9001\u308B\ \u2192\ \u30E1\u30A4\u30F3\u30DE\u30C3\u30D7\u4E0A\u306E\u4E2D\u3067\u8A72\u5F53\u3059\u308BKey\ Command\u3092\u6301\u3064\u30E6\u30CB\u30C3\u30C8\u3060\u3051\u304C\u53CD\u5FDC\u3057\u3066Key\ Command\u306E\u51E6\u7406\u3092\u884C\u3046\uFF63\u3068\u3044\u3046\u3082\u306E\u3067\u3042\u308B\u3002\u3000\u3000Global\ Key\ Command\u30C8\u30EC\u30A4\u30C8\u306F\u3001\u305D\u306E\u30D8\u30EB\u30D7(file\:///C\:/Program%20Files/VASSAL-3.7.18/doc/ReferenceManual/GlobalKeyCommand.html)\u306B\u66F8\u304B\u308C\u3066\u3044\u308B\u3068\u304A\u308A\u3001\u5BFE\u8C61\u306E\u30DE\u30C3\u30D7\u306A\u3069\u306E\u98