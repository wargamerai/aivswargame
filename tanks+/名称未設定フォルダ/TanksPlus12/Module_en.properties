089\u3070\uFF62\u30C4\u30FC\u30EB\u30D0\u30FC\u304B\u3089\u306E1\u3064\u306E\u30B3\u30DE\u30F3\u30C9\u304B\u3089\u300E\u5148\u653B\u5074\u306E\u5C04\u6483\u30DE\u30FC\u30AB\u30FC\u9664\u53BB\u300F\u3068\u300E\u5148\u653B\u5074\u306E\u5C04\u6483\u30DE\u30FC\u30AB\u30FC\u9664\u53BB\u300F\u306E2\u3064\u306EKey\ Command\u3092\u5207\u308A\u66FF\u3048\u3066\uFF62\u3070\u3089\u6492\u304F\uFF63\u65B9\u6CD5\u3092\u3001\u3069\u3046\u3084\u3063\u3066\u30C4\u30FC\u30EB\u30D0\u30FC\u5185\u3060\u3051\u3067\u884C\u3048\u308B\u304B\u304C\u5206\u304B\u3089\u306A\u304B\u3063\u305F\u306E\u3067\u3001Piece\u5185\u306ETrigger\ Action\u3092\u4F7F\u3063\u305F\uFF63\u3060\u3051\u3067\u3042\u308B\u3002.text=Remove
