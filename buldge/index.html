<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Panzers in the Snow - Map Editor</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #333; overflow: hidden; }

#controls {
  position: fixed; top: 10px; left: 10px; z-index: 100;
  background: rgba(0,0,0,0.85); color: #fff; padding: 12px;
  border-radius: 8px; font-size: 13px; font-family: monospace;
  display: flex; flex-direction: column; gap: 6px;
  min-width: 240px;
}
#controls label { display: flex; justify-content: space-between; align-items: center; gap: 8px; }
#controls input[type="number"] {
  width: 70px; background: #222; color: #0f0; border: 1px solid #555;
  padding: 2px 4px; font-family: monospace; font-size: 13px; text-align: right;
}
#controls .title { font-size: 14px; font-weight: bold; color: #ff0; margin-bottom: 4px; }
#controls button {
  background: #555; color: #fff; border: none; padding: 6px 8px;
  cursor: pointer; border-radius: 4px; font-size: 12px;
}
#controls button:hover { background: #777; }
#controls button.active-mode { background: #c80; color: #000; font-weight: bold; }

#legend { display: flex; flex-wrap: wrap; gap: 4px; margin: 4px 0; }
.legend-item {
  display: flex; align-items: center; gap: 3px; font-size: 11px;
  padding: 2px 6px; border-radius: 3px; cursor: pointer; border: 2px solid transparent;
}
.legend-item.active { border-color: #ff0; }
.legend-swatch { width: 14px; height: 14px; border: 1px solid #888; border-radius: 2px; }

#hexInfo {
  position: fixed; bottom: 10px; left: 10px; z-index: 100;
  background: rgba(0,0,0,0.85); color: #fff; padding: 8px 12px;
  border-radius: 8px; font-size: 14px; font-family: monospace;
}

#mapContainer { position: relative; display: inline-block; padding: 80px; }
#mapImage { display: block; user-select: none; -webkit-user-drag: none; position: relative; z-index: 0; }
#hexCanvas { position: absolute; top: 0; left: 0; z-index: 1; }
#scrollWrapper { width: 100vw; height: 100vh; overflow: auto; }
</style>
</head>
<body>

<div id="controls">
  <div class="title">Map Editor</div>
  <label>Hex Size: <input type="number" id="hexSize" value="62" step="0.5"></label>
  <label>Offset X: <input type="number" id="offsetX" value="110" step="1"></label>
  <label>Offset Y: <input type="number" id="offsetY" value="173" step="1"></label>
  <label>Cols: <input type="number" id="cols" value="21" step="1"></label>
  <label>Rows: <input type="number" id="rows" value="17" step="1"></label>
  <label>Show Numbers: <input type="checkbox" id="showNumbers" checked></label>
  <hr style="border-color:#555;">
  <div style="display:flex;gap:4px;">
    <button id="btnModeTerrain" class="active-mode">地形</button>
    <button id="btnModeFacility">施設</button>
    <button id="btnModeTag">タグ</button>
    <button id="btnModeRoad">道路</button>
  </div>
  <div id="legend"></div>
  <hr style="border-color:#555;">
  <button id="btnExport">Export mapdata.js</button>
  <div id="exportMsg" style="color:#0f0;font-size:11px;display:none;">コンソールに出力しました</div>
</div>

<div id="hexInfo">--</div>

<div id="scrollWrapper">
  <div id="mapContainer">
    <img id="mapImage" src="ssbulgemap12.png" alt="Map">
    <canvas id="hexCanvas"></canvas>
  </div>
</div>

<script src="mapdata.js"></script>
<script>
const img = document.getElementById('mapImage');
const canvas = document.getElementById('hexCanvas');
const ctx = canvas.getContext('2d');
const hexInfoEl = document.getElementById('hexInfo');

// 編集用データ
const terrainData = { ...TERRAIN_MAP };
const facilityData = { ...FACILITY_MAP };
const tagData = { ...TAG_MAP };
// 道路データ: hexId → [route numbers]
const roadData = {};
for (const [id, routes] of Object.entries(ROAD_MAP)) {
  roadData[id] = Array.isArray(routes) ? [...routes] : [routes];
}
let currentBrush = 'p';
let editMode = 'terrain'; // 'terrain', 'facility', 'tag', or 'road'

const inputs = {
  hexSize: document.getElementById('hexSize'),
  offsetX: document.getElementById('offsetX'),
  offsetY: document.getElementById('offsetY'),
  cols: document.getElementById('cols'),
  rows: document.getElementById('rows'),
  showNumbers: document.getElementById('showNumbers'),
};

function getParams() {
  return {
    hexSize: parseFloat(inputs.hexSize.value),
    offsetX: parseFloat(inputs.offsetX.value),
    offsetY: parseFloat(inputs.offsetY.value),
    cols: parseInt(inputs.cols.value),
    rows: parseInt(inputs.rows.value),
    showNumbers: inputs.showNumbers.checked,
  };
}

// --- Hex geometry (pointy-top, even-r offset) ---
function hexCorner(cx, cy, size, i) {
  const angle = Math.PI / 180 * (60 * i + 30);
  return { x: cx + size * Math.cos(angle), y: cy + size * Math.sin(angle) };
}

function hexCenter(col, row, size, ox, oy) {
  const w = Math.sqrt(3) * size;
  const h = size * 2;
  let x = ox + col * w + w / 2;
  const y = oy + row * h * 0.75 + size;
  if (row % 2 === 1) x += w / 2;
  return { x, y };
}

function hexId(col, row) {
  return String(col + 1).padStart(2, '0') + String(row + 1).padStart(2, '0');
}

function drawHexPath(cx, cy, size) {
  ctx.beginPath();
  for (let i = 0; i < 6; i++) {
    const c = hexCorner(cx, cy, size, i);
    if (i === 0) ctx.moveTo(c.x, c.y); else ctx.lineTo(c.x, c.y);
  }
  ctx.closePath();
}

// --- 描画 ---
const PAD = 80; // 端ヘクス用の余白

function drawHexGrid() {
  const p = getParams();
  const imgW = img.naturalWidth || img.width;
  const imgH = img.naturalHeight || img.height;
  canvas.width = imgW + PAD * 2;
  canvas.height = imgH + PAD * 2;
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  // 描画座標にPADを加算（画像がPAD,PADから始まるため）
  p.offsetX += PAD;
  p.offsetY += PAD;

  for (let c = 0; c < p.cols; c++) {
    for (let r = 0; r < p.rows; r++) {
      const center = hexCenter(c, r, p.hexSize, p.offsetX, p.offsetY);
      const id = hexId(c, r);
      const terrain = terrainData[id] || 'p';
      const facility = facilityData[id] || '';
      const isRoadMode = editMode === 'road';

      // 地形色で塗り（道路モード時は非表示）
      if (!isRoadMode) {
        drawHexPath(center.x, center.y, p.hexSize);
        ctx.fillStyle = TERRAIN_COLORS[terrain] || 'rgba(0,0,0,0)';
        ctx.fill();
      }

      // 施設の上塗り（道路モード時は非表示）
      if (!isRoadMode && facility && FACILITY_COLORS[facility]) {
        drawHexPath(center.x, center.y, p.hexSize * 0.55);
        ctx.fillStyle = FACILITY_COLORS[facility];
        ctx.fill();
      }

      // タグマーカー（道路モード時は非表示）
      const tag = tagData[id] || '';
      if (!isRoadMode && tag && TAG_COLORS[tag]) {
        const tx = center.x + p.hexSize * 0.3;
        const ty = center.y + p.hexSize * 0.3;
        const tr = p.hexSize * 0.18;
        ctx.beginPath();
        ctx.arc(tx, ty, tr, 0, Math.PI * 2);
        ctx.fillStyle = TAG_COLORS[tag];
        ctx.fill();
        ctx.strokeStyle = '#fff';
        ctx.lineWidth = 1;
        ctx.stroke();
        const label = tag === 'fuel' ? 'F' : tag.replace('reinforce_','').toUpperCase();
        ctx.fillStyle = '#000';
        ctx.font = `bold ${Math.round(tr * 1.1)}px monospace`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(label, tx, ty);
      }

      // 道路マーカー（路線ごとに色付き丸を並べる）
      const routes = roadData[id] || [];
      if (routes.length > 0) {
        const dotR = p.hexSize * 0.13;
        const positions = [
          { x: 0, y: 0 },                           // 1本: 中央
          { x: -dotR * 1.3, y: 0 }, { x: dotR * 1.3, y: 0 },  // 2本
          { x: -dotR * 2.2, y: 0 }, { x: 0, y: 0 }, { x: dotR * 2.2, y: 0 },  // 3本
          // 4-5本: 2行に分散
        ];
        const sorted = [...routes].sort();
        sorted.forEach((route, i) => {
          let ox, oy;
          if (sorted.length <= 3) {
            // 横一列
            const totalW = (sorted.length - 1) * dotR * 2.6;
            ox = -totalW / 2 + i * dotR * 2.6;
            oy = p.hexSize * 0.25;
          } else {
            // 2行
            if (i < 3) {
              const totalW = 2 * dotR * 2.6;
              ox = -totalW / 2 + i * dotR * 2.6;
              oy = p.hexSize * 0.15;
            } else {
              const row2 = sorted.length - 3;
              const totalW = (row2 - 1) * dotR * 2.6;
              ox = -totalW / 2 + (i - 3) * dotR * 2.6;
              oy = p.hexSize * 0.35;
            }
          }
          ctx.beginPath();
          ctx.arc(center.x + ox, center.y + oy, dotR, 0, Math.PI * 2);
          ctx.fillStyle = ROAD_COLORS[route] || '#fff';
          ctx.fill();
          ctx.strokeStyle = '#000';
          ctx.lineWidth = 1.5;
          ctx.stroke();
          // 路線番号
          ctx.fillStyle = '#000';
          ctx.font = `bold ${Math.round(dotR * 1.4)}px monospace`;
          ctx.textAlign = 'center';
          ctx.textBaseline = 'middle';
          ctx.fillText(String(route), center.x + ox, center.y + oy);
        });
      }

      // 枠線
      drawHexPath(center.x, center.y, p.hexSize);
      ctx.strokeStyle = 'rgba(255,255,255,0.4)';
      ctx.lineWidth = 1;
      ctx.lineJoin = 'round';
      ctx.stroke();

      // ヘクス番号
      if (p.showNumbers) {
        ctx.fillStyle = 'rgba(0,0,0,0.8)';
        ctx.font = `bold ${Math.max(9, p.hexSize * 0.22)}px monospace`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(id, center.x, center.y - p.hexSize * 0.15);

        // 地名表示
        const place = PLACE_NAMES[id];
        if (place) {
          ctx.fillStyle = '#ff0';
          ctx.font = `bold ${Math.max(8, p.hexSize * 0.18)}px sans-serif`;
          ctx.fillText(place, center.x, center.y + p.hexSize * 0.15);
        }
      }
    }
  }
}

// --- ヘクス判定 ---
function pixelToHex(px, py) {
  const p = getParams();
  p.offsetX += PAD;
  p.offsetY += PAD;
  let closest = null, minDist = Infinity;
  for (let c = 0; c < p.cols; c++) {
    for (let r = 0; r < p.rows; r++) {
      const center = hexCenter(c, r, p.hexSize, p.offsetX, p.offsetY);
      const dx = px - center.x, dy = py - center.y;
      const dist = dx * dx + dy * dy;
      if (dist < minDist) { minDist = dist; closest = { col: c, row: r }; }
    }
  }
  if (closest && minDist < (p.hexSize * 1.5) * (p.hexSize * 1.5)) return closest;
  return null;
}

// --- クリックで変更 ---
canvas.style.pointerEvents = 'auto';
canvas.style.cursor = 'pointer';

let isPainting = false;
let isDragging = false;

canvas.addEventListener('mousedown', (e) => {
  isPainting = true;
  isDragging = false;
  paintHex(e);
});
canvas.addEventListener('mousemove', (e) => {
  const rect = canvas.getBoundingClientRect();
  const scaleX = canvas.width / rect.width;
  const scaleY = canvas.height / rect.height;
  const px = (e.clientX - rect.left) * scaleX;
  const py = (e.clientY - rect.top) * scaleY;
  const hex = pixelToHex(px, py);
  if (hex) {
    const id = hexId(hex.col, hex.row);
    const t = terrainData[id] || 'p';
    const f = facilityData[id] || '';
    const tg = tagData[id] || '';
    const place = PLACE_NAMES[id] ? ` (${PLACE_NAMES[id]})` : '';
    const facilityStr = f ? ` + ${FACILITY_NAMES[f]}` : '';
    const tagStr = tg ? ` [${TAG_NAMES[tg]}]` : '';
    const rd = roadData[id] || [];
    const roadStr = rd.length > 0 ? ` 道路[${rd.join(',')}]` : '';
    let brushName;
    if (editMode === 'terrain') brushName = TERRAIN_NAMES[currentBrush] || currentBrush;
    else if (editMode === 'facility') brushName = currentBrush === '' ? 'なし' : FACILITY_NAMES[currentBrush] || currentBrush;
    else if (editMode === 'tag') brushName = currentBrush === '' ? 'なし' : TAG_NAMES[currentBrush] || currentBrush;
    else brushName = currentBrush === 0 ? '消去' : ROAD_NAMES[currentBrush] || currentBrush;
    const modeLabel = editMode === 'terrain' ? '地形' : editMode === 'facility' ? '施設' : editMode === 'tag' ? 'タグ' : '道路';
    hexInfoEl.textContent = `${id}${place} : ${TERRAIN_NAMES[t]}${facilityStr}${tagStr}${roadStr} | [${modeLabel}] ブラシ: ${brushName}`;
  }
  if (isPainting) { isDragging = true; paintHex(e); }
});
canvas.addEventListener('mouseup', () => { isPainting = false; isDragging = false; });
canvas.addEventListener('mouseleave', () => { isPainting = false; isDragging = false; });

function paintHex(e) {
  const rect = canvas.getBoundingClientRect();
  const scaleX = canvas.width / rect.width;
  const scaleY = canvas.height / rect.height;
  const px = (e.clientX - rect.left) * scaleX;
  const py = (e.clientY - rect.top) * scaleY;
  const hex = pixelToHex(px, py);
  if (hex) {
    const id = hexId(hex.col, hex.row);
    if (editMode === 'terrain') {
      terrainData[id] = currentBrush;
    } else if (editMode === 'facility') {
      if (currentBrush === '') { delete facilityData[id]; }
      else { facilityData[id] = currentBrush; }
    } else if (editMode === 'tag') {
      if (currentBrush === '') { delete tagData[id]; }
      else { tagData[id] = currentBrush; }
    } else if (editMode === 'road') {
      if (currentBrush === 0) {
        // 消しゴム: 全路線削除
        delete roadData[id];
      } else {
        if (!roadData[id]) roadData[id] = [];
        const idx = roadData[id].indexOf(currentBrush);
        if (idx >= 0) {
          // 既にある路線を削除（トグル）— ただしドラッグ中は追加のみ
          if (!isDragging) roadData[id].splice(idx, 1);
          if (roadData[id].length === 0) delete roadData[id];
        } else {
          roadData[id].push(currentBrush);
        }
      }
    }
    drawHexGrid();
  }
}

// --- モード切替 ---
const btnTerrain = document.getElementById('btnModeTerrain');
const btnFacility = document.getElementById('btnModeFacility');
const btnTag = document.getElementById('btnModeTag');
const btnRoad = document.getElementById('btnModeRoad');
const modes = ['terrain', 'facility', 'tag', 'road'];

function switchMode(mode) {
  editMode = mode;
  btnTerrain.classList.toggle('active-mode', mode === 'terrain');
  btnFacility.classList.toggle('active-mode', mode === 'facility');
  btnTag.classList.toggle('active-mode', mode === 'tag');
  btnRoad.classList.toggle('active-mode', mode === 'road');
  buildLegend();
  drawHexGrid();
}

btnTerrain.addEventListener('click', () => switchMode('terrain'));
btnFacility.addEventListener('click', () => switchMode('facility'));
btnTag.addEventListener('click', () => switchMode('tag'));
btnRoad.addEventListener('click', () => switchMode('road'));

// --- 凡例（ブラシ選択）---
function buildLegend() {
  const legendEl = document.getElementById('legend');
  legendEl.innerHTML = '';

  if (editMode === 'terrain') {
    currentBrush = 'p';
    TERRAIN_CYCLE.forEach((t, i) => {
      const item = document.createElement('div');
      item.className = 'legend-item' + (t === currentBrush ? ' active' : '');
      item.dataset.brush = t;
      const swatch = document.createElement('div');
      swatch.className = 'legend-swatch';
      swatch.style.background = TERRAIN_COLORS[t].replace(/[\d.]+\)$/, '0.8)');
      item.appendChild(swatch);
      item.appendChild(document.createTextNode(`${i+1}:${TERRAIN_NAMES[t]}`));
      item.addEventListener('click', () => selectBrush(t));
      legendEl.appendChild(item);
    });
  } else if (editMode === 'facility') {
    currentBrush = '';
    FACILITY_CYCLE.forEach((f, i) => {
      const item = document.createElement('div');
      item.className = 'legend-item' + (f === currentBrush ? ' active' : '');
      item.dataset.brush = f;
      const swatch = document.createElement('div');
      swatch.className = 'legend-swatch';
      swatch.style.background = f === '' ? '#444' : FACILITY_COLORS[f].replace(/[\d.]+\)$/, '0.8)');
      item.appendChild(swatch);
      item.appendChild(document.createTextNode(`${i+1}:${f === '' ? 'なし' : FACILITY_NAMES[f]}`));
      item.addEventListener('click', () => selectBrush(f));
      legendEl.appendChild(item);
    });
  } else if (editMode === 'tag') {
    currentBrush = '';
    TAG_CYCLE.forEach((tg, i) => {
      const item = document.createElement('div');
      item.className = 'legend-item' + (tg === currentBrush ? ' active' : '');
      item.dataset.brush = tg;
      const swatch = document.createElement('div');
      swatch.className = 'legend-swatch';
      swatch.style.background = tg === '' ? '#444' : TAG_COLORS[tg].replace(/[\d.]+\)$/, '0.8)');
      swatch.style.borderRadius = '50%';
      item.appendChild(swatch);
      item.appendChild(document.createTextNode(`${i+1}:${tg === '' ? 'なし' : TAG_NAMES[tg]}`));
      item.addEventListener('click', () => selectBrush(tg));
      legendEl.appendChild(item);
    });
  } else if (editMode === 'road') {
    currentBrush = 1;
    ROAD_CYCLE.forEach((rt, i) => {
      const item = document.createElement('div');
      item.className = 'legend-item' + (rt === currentBrush ? ' active' : '');
      item.dataset.brush = String(rt);
      const swatch = document.createElement('div');
      swatch.className = 'legend-swatch';
      swatch.style.background = rt === 0 ? '#444' : ROAD_COLORS[rt].replace(/[\d.]+\)$/, '0.8)');
      swatch.style.borderRadius = '50%';
      item.appendChild(swatch);
      item.appendChild(document.createTextNode(`${i+1}:${rt === 0 ? '消去' : ROAD_NAMES[rt]}`));
      item.addEventListener('click', () => selectBrush(rt));
      legendEl.appendChild(item);
    });
  }
}

function selectBrush(b) {
  currentBrush = b;
  document.querySelectorAll('.legend-item').forEach(el => {
    el.classList.toggle('active', el.dataset.brush === String(b));
  });
}

// キーボードショートカット
document.addEventListener('keydown', (e) => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT') return;

  // Tab でモード切替
  if (e.key === 'Tab') {
    e.preventDefault();
    const idx = modes.indexOf(editMode);
    switchMode(modes[(idx + 1) % modes.length]);
    return;
  }

  // 数字キーでブラシ切替
  const num = parseInt(e.key);
  const cycle = editMode === 'terrain' ? TERRAIN_CYCLE : editMode === 'facility' ? FACILITY_CYCLE : editMode === 'tag' ? TAG_CYCLE : ROAD_CYCLE;
  if (num >= 1 && num <= cycle.length) {
    selectBrush(cycle[num - 1]);
    e.preventDefault();
    return;
  }

  // 矢印キーでオフセット移動
  const step = e.shiftKey ? 10 : 1;
  switch (e.key) {
    case 'ArrowLeft':
      inputs.offsetX.value = parseFloat(inputs.offsetX.value) - step;
      e.preventDefault(); break;
    case 'ArrowRight':
      inputs.offsetX.value = parseFloat(inputs.offsetX.value) + step;
      e.preventDefault(); break;
    case 'ArrowUp':
      inputs.offsetY.value = parseFloat(inputs.offsetY.value) - step;
      e.preventDefault(); break;
    case 'ArrowDown':
      inputs.offsetY.value = parseFloat(inputs.offsetY.value) + step;
      e.preventDefault(); break;
    default: return;
  }
  drawHexGrid();
});

// --- Export ---
document.getElementById('btnExport').addEventListener('click', () => {
  const p = getParams();

  // 地形データ
  let out = 'const TERRAIN_MAP = {\n';
  for (let r = 0; r < p.rows; r++) {
    out += `  // Row ${r + 1}\n  `;
    const entries = [];
    for (let c = 0; c < p.cols; c++) {
      const id = hexId(c, r);
      const t = terrainData[id] || 'p';
      entries.push(`"${id}":"${t}"`);
    }
    out += entries.join(',') + ',\n';
  }
  out += '};\n\n';

  // 施設データ
  out += 'const FACILITY_MAP = {\n';
  const fEntries = [];
  for (const [id, f] of Object.entries(facilityData)) {
    if (f) {
      const name = PLACE_NAMES[id] || '';
      fEntries.push(`  "${id}": "${f}"${name ? ',  // ' + name : ''}`);
    }
  }
  out += fEntries.join('\n') + '\n};\n\n';

  // タグデータ
  out += 'const TAG_MAP = {\n';
  const tEntries = [];
  for (const [id, tg] of Object.entries(tagData)) {
    if (tg) {
      tEntries.push(`  "${id}": "${tg}"`);
    }
  }
  out += tEntries.join(',\n') + '\n};\n\n';

  // 道路データ
  out += 'const ROAD_MAP = {\n';
  const rEntries = [];
  for (const [id, routes] of Object.entries(roadData)) {
    if (routes && routes.length > 0) {
      rEntries.push(`  "${id}": [${routes.sort().join(',')}]`);
    }
  }
  out += rEntries.join(',\n') + '\n};\n';

  console.log(out);
  const msg = document.getElementById('exportMsg');
  msg.style.display = 'block';
  setTimeout(() => { msg.style.display = 'none'; }, 2000);
});

// --- 初期化 ---
buildLegend();

Object.values(inputs).forEach(el => {
  el.addEventListener('input', drawHexGrid);
  el.addEventListener('change', drawHexGrid);
});

img.addEventListener('load', drawHexGrid);
if (img.complete) drawHexGrid();
</script>
</body>
</html>
