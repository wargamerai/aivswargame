function cancelSelect() {
  G.selectedUnit = null;
  G.reachable = null;
  G.opPhase = 'select';
  updateRightPanel();
  draw();
}

// 移動しない: その場に留まり、隣接敵がいれば攻撃フェーズへ
function stayInPlace() {
  if (!G.selectedUnit) return;
  const unit = G.selectedUnit;
  const stacked = isStacked(unit);
  const pair = stacked ? G.units.find(u => u.id === unit.mechPair) : null;
  unit.acted = true;
  if (stacked && pair && !pair.acted) { pair.acted = true; }
  addLog('move', `${unit.name}: 移動せず`);

  // 隣接敵チェック → 攻撃フェーズ or サイド切替
  const adjEnemy = getNeighborIds(unit.hexId).some(nid =>
    getUnitsAt(nid).some(u => u.side !== G.activeSide)
  );
  G.selectedUnit = null;
  G.reachable = null;

  if (adjEnemy) {
    unit.mustAttack = true;
    if (stacked && pair) pair.mustAttack = true;
    G.opPhase = 'attack';
    resetCombat();
    addLog('turn', `━ ${unit.name} 攻撃フェーズ ━`);
  } else {
    unit.flipped = true;
    if (stacked && pair) pair.flipped = true;
    switchSide();
    return;
  }
  updateRightPanel();
  draw();
}

// AI行動確認後に進行
function confirmAI() {
  G._awaitConfirm = false;
  // 経路表示をクリア
  for (const u of G.units) {
    if (u._movePathExpiry) {
      delete u.movePath;
      delete u._movePathExpiry;
      delete u._lastMovedAt;
    }
  }
  const sideName = G.activeSide === 'german' ? 'ドイツ軍' : '連合軍';
  showFlash(`${sideName}の手番`, G.activeSide);
  updateRightPanel();
  draw();
}

// スタック解除: mechPairを一時的に無効化して個別行動可能に
function unstackUnit(id) {
  const unit = G.units.find(u => u.id === id);
  if (!unit || !unit.mechPair) return;
  unit._unstacked = true;
  const pair = G.units.find(u => u.id === unit.mechPair);
  if (pair) pair._unstacked = true;
  addLog('move', `${unit.name} スタック解除`);
  G.selectedUnit = null;
  G.reachable = null;
  updateRightPanel();
  draw();
}

// スタック中かチェック
function isStacked(unit) {
  if (!unit.mechPair || unit._unstacked) return false;
  const pair = G.units.find(u => u.id === unit.mechPair);
  if (!pair || pair.eliminated || pair._unstacked) return false;
  return unit.hexId === pair.hexId;
}

function selectUnit(id) {
  const unit = G.units.find(u => u.id === id);
  if (unit && !unit.acted && !unit.flipped) {
    G.selectedUnit = unit;
    G.reachable = calcReachable(unit);
    G.opPhase = 'move';
    updateRightPanel();
    draw();
  }
}

// ========== ログ ==========
function addLog(type, msg) {
  G.log.push({ type, msg });
  const el = document.getElementById('logPanel');
  const div = document.createElement('div');
  div.className = 'log-' + type;
  div.textContent = msg;
  el.appendChild(div);
  el.scrollTop = el.scrollHeight;
}


// フラッシュ通知
function showFlash(text, side) {
  const el = document.getElementById('flashOverlay');
  el.className = 'show ' + (side || '');
  el.querySelector('.flash-text').textContent = text;
  setTimeout(() => { el.className = ''; }, 2500);
}

// ========== 行動履歴 ==========
function toggleHistory() {
  const el = document.getElementById('historyOverlay');
  if (el.classList.contains('show')) { closeHistory(); return; }
  el.classList.add('show');
  buildHistoryTabs();
}
function closeHistory() {
  document.getElementById('historyOverlay').classList.remove('show');
}
function buildHistoryTabs() {
  // ログをターンごとに分類
  const turns = {};
  let curTurn = 1;
  for (const entry of G.log) {
    const m = entry.msg.match(/═══ ターン(\d+)/);
    if (m) curTurn = parseInt(m[1]);
    if (!turns[curTurn]) turns[curTurn] = [];
    turns[curTurn].push(entry);
  }
  const tabs = document.getElementById('histTabs');
  const turnKeys = Object.keys(turns).map(Number).sort((a, b) => a - b);
  tabs.innerHTML = turnKeys.map(t =>
    `<div class="hist-tab${t === G.turn ? ' active' : ''}" onclick="showHistoryTurn(${t})">${t === G.turn ? '現在' : 'T' + t}</div>`
  ).join('') + `<div class="hist-tab" onclick="showHistoryTurn(0)">全て</div>`;
  showHistoryTurn(G.turn);
}
function showHistoryTurn(turn) {
  // タブのactive更新
  document.querySelectorAll('#histTabs .hist-tab').forEach(tab => {
    tab.classList.remove('active');
    if ((turn === 0 && tab.textContent === '全て') ||
        (turn === G.turn && tab.textContent === '現在') ||
        (turn !== 0 && turn !== G.turn && tab.textContent === 'T' + turn)) {
      tab.classList.add('active');
    }
  });
  // ログ表示
  const body = document.getElementById('histBody');
  let entries = G.log;
  if (turn > 0) {
    let curTurn = 1;
    entries = G.log.filter(entry => {
      const m = entry.msg.match(/═══ ターン(\d+)/);
      if (m) curTurn = parseInt(m[1]);
      return curTurn === turn;
    });
  }
  body.innerHTML = entries.map(e =>
    `<div class="log-${e.type}">${e.msg}</div>`
  ).join('');
  body.scrollTop = body.scrollHeight;
}

// パス
function passPhase() {
  dbg('passPhase', {side:G.activeSide, passCount:G.passCount});
  const sideName = G.activeSide === 'german' ? 'ドイツ軍' : '連合軍';
  showFlash(`${sideName} パス`, G.activeSide);
  addLog('turn', `${sideName}: パス`);

  // パスフラグ管理
  if (!G.passCount) G.passCount = 0;
  G.passCount++;

  // 両軍パスでターンエンド
  if (G.passCount >= 2) {
    addLog('turn', `両軍パス → ターン終了`);
    showFlash('ターン終了', '');
    G.passCount = 0;
    setTimeout(() => nextTurn(), 1600);
    return;
  }

  // 相手側へ
  const nextSide = G.activeSide === 'german' ? 'allied' : 'german';
  G.activeSide = nextSide;
  G.opPhase = 'select';
  G.selectedUnit = null;
  G.reachable = null;
  G.attackTargets = null;
  const nextName = nextSide === 'german' ? 'ドイツ軍' : '連合軍';
  setTimeout(() => { showFlash(`${nextName}の手番`, nextSide); }, 1600);
  addLog('turn', `${nextName}の手番`);
  updateUI();
  draw();

  // AIチェック
  scheduleAI(1800);
}

// ========== AI ==========

// AI制御判定: そのサイドがAI操作かどうか
function isAISide(side) {
  if (G.mode === 'watch') return true;
  if (G.mode === 'hotseat') return false;
  if (G.mode === 'german') return side === 'allied';   // プレイヤー=独、AI=連合
  if (G.mode === 'allied') return side === 'german';    // プレイヤー=連合、AI=独
  return false;
}

// AI処理中フラグ（二重起動防止）
let aiRunning = false;

// AIタイマー管理（重複防止）
let aiTimerId = null;
function scheduleAI(delay) {
  if (aiTimerId) clearTimeout(aiTimerId);
  aiTimerId = setTimeout(() => { aiTimerId = null; aiTick(); }, delay);
}

// デバッグログ
function dbg(...args) { console.log('[BULGE]', ...args); }

// AIメインループ: 現在のフェーズに応じて1アクション実行
function aiTick() {
  dbg('aiTick', {phase:G.phase, opPhase:G.opPhase, side:G.activeSide, aiRunning, turn:G.turn});
  if (aiRunning) return;
  if (G.turn > G.maxTurn) return;

  // 増援・回復フェーズはactiveSideに関係なく両軍処理
  if (G.phase === 'reinforce') {
    // 英軍投入選択（T3以降、未投入）
    if (G.turn >= 3 && G.britishDeployedTurn === 0) {
      if (isAISide('allied')) {
        // AI連合: ターン5でデフォルト投入（VP1で済む）
        if (G.turn >= 5) {
          aiRunning = true;
          setTimeout(() => {
            addLog('turn', `[AI] 英軍投入決定 (T${G.turn})`);
            deployBritish();
            aiRunning = false;
            aiTick();
          }, 500);
          return;
        }
        // T3-4: AIは見送り → そのまま増援終了へ
      } else {
        // 人間が連合軍 → 英軍投入選択は人間に任せる（ボタンクリック待ち）
        return;
      }
    }
    // 両軍ともAIか、人間の判断が不要な場合 → 増援フェーズ自動終了
    // ホットシートの場合は人間がボタンを押す
    if (G.mode === 'hotseat') return;
    aiRunning = true;
    setTimeout(() => {
      endPhase();
      aiRunning = false;
    }, 300);
    return;
  }

  if (G.phase === 'recovery') {
    // 回復フェーズ: ドイツ軍手動回復が必要な場合
    if (isAISide('german') && G.recovery && G.recovery.remaining > 0) {
      aiRunning = true;
      setTimeout(() => {
        aiDoRecovery();
        aiRunning = false;
        // 回復後、再度aiTickで回復フェーズ終了を処理
        scheduleAI(300);
      }, 300);
      return;
    }
    // 人間がドイツ軍で回復選択が必要な場合はスキップ
    if (!isAISide('german') && G.recovery && G.recovery.remaining > 0) {
      return; // 人間が手動で回復選択
    }
    // ホットシートの場合は人間がボタンを押す
    if (G.mode === 'hotseat') return;
    // 回復フェーズ終了（endPhase内でaiTickが呼ばれる）
    aiRunning = true;
    setTimeout(() => {
      endPhase();
      aiRunning = false;
    }, 300);
    return;
  }

  if (G.phase === 'operation') {
    // retreat/advanceは敵サイドのユニットの可能性があるので先にチェック
    if (G.opPhase === 'retreat') {
      const retreatingUnit = G.combat.retreatingUnits[0] ?
        G.units.find(u => u.id === G.combat.retreatingUnits[0]) : null;
      const retreatSide = retreatingUnit ? retreatingUnit.side : G.activeSide;
      if (isAISide(retreatSide)) {
        aiRunning = true;
        setTimeout(() => {
          aiDoRetreat();
          aiRunning = false;
        }, 500);
        return;
      }
      return; // 人間が退却先を選択
    }

    if (G.opPhase === 'advance') {
      if (isAISide(G.activeSide)) {
        aiRunning = true;
        setTimeout(() => {
          aiDoAdvance();
          aiRunning = false;
        }, 500);
        return;
      }
      return; // 人間が前進選択
    }

    if (!isAISide(G.activeSide)) return; // 人間の手番

    if (G.opPhase === 'select' || G.opPhase === 'move') {
      aiRunning = true;
      setTimeout(() => {
        aiDoMovement();
        aiRunning = false;
      }, 500);
      return;
    }

    if (G.opPhase === 'attack') {
      aiRunning = true;
      setTimeout(() => {
        aiDoAttack();
        aiRunning = false;
      }, 500);
      return;
    }

  }
}

// AI回復: 攻撃力の高いユニットから優先回復
function aiDoRecovery() {
  if (!G.recovery || G.recovery.remaining <= 0) return;
  const flipped = G.units.filter(u => u.side === 'german' && u.flipped && !u.eliminated);
  // 攻撃力降順でソート
  flipped.sort((a, b) => b.atk - a.atk);
  while (G.recovery.remaining > 0 && flipped.length > 0) {
    const u = flipped.shift();
    recoverUnit(u.id);
    addLog('turn', `[AI] ${u.name} を回復`);
  }
}

// AI移動: 1ユニット移動→攻撃or切替
function aiDoMovement() {
  dbg('aiDoMovement', {side:G.activeSide});
  const side = G.activeSide;
  const units = G.units.filter(u =>
    u.side === side && !u.acted && !u.flipped && !u.eliminated && !u.exited
  );

  if (units.length === 0) {
    // 未行動ユニットなし → パス
    passPhase();
    return;
  }

  // NW突破チェック（ドイツAI）
  if (side === 'german') {
    for (const u of units) {
      if (canExitNW(u)) {
        addLog('turn', `[AI] ${u.name} NW突破`);
        exitUnitNW(u.id);
        // NW突破後サイド切替
        switchSide();
        return;
      }
    }
  }

  // 機械化ユニットを先に移動（ドイツAIのみ）
  if (side === 'german') {
    units.sort((a, b) => (isMechanized(a) ? 0 : 1) - (isMechanized(b) ? 0 : 1));
  }

  const unit = units[0];
  const reachable = calcReachable(unit);

  if (reachable.size === 0) {
    // 移動先なし → 行動済み、裏にしてサイド切替
    unit.acted = true;
    unit.flipped = true;
    addLog('move', `[AI] ${unit.name}: 移動先なし`);
    switchSide();
    return;
  }

  // 最適な移動先を選択
  const bestHex = aiPickMoveTarget(unit, reachable);
  if (bestHex && bestHex !== unit.hexId) {
    const destUnits = getUnitsAt(bestHex).filter(u => u.side === unit.side);
    if (destUnits.length > 0 && !(unit.mechPair && destUnits.length < 2 && destUnits[0].id === unit.mechPair)) {
      unit.acted = true;
      unit.flipped = true;
      addLog('move', `[AI] ${unit.name}: スタック制限で移動不可`);
      switchSide();
      return;
    }
    const info = reachable.get(bestHex);
    const fromHex = unit.hexId;
    const stacked = isStacked(unit);
    const pair = stacked ? G.units.find(u => u.id === unit.mechPair) : null;
    unit.movePath = [fromHex, ...info.path];
    unit.hexId = bestHex;
    unit.acted = true;
    if (stacked && pair && !pair.acted) {
      pair.hexId = bestHex;
      pair.acted = true;
      pair.movePath = [fromHex, ...info.path];
    }
    const pathStr = unit.movePath.map(h => dispHex(h)).join('→');
    addLog('move', `[AI] ${unit.name}: ${pathStr}`);
    panToHex(bestHex);

    // 隣接敵チェック → 攻撃フェーズ or サイド切替
    const adjEnemy = getNeighborIds(bestHex).some(nid =>
      getUnitsAt(nid).some(u => u.side !== side)
    );
    if (adjEnemy) {
      unit.mustAttack = true;
      if (stacked && pair) pair.mustAttack = true;
      G.opPhase = 'attack';
      resetCombat();
      addLog('turn', `━ [AI] ${unit.name} 攻撃 ━`);
      updateRightPanel();
      draw();
      // AI攻撃へ
      scheduleAI(600);
    } else {
      unit.flipped = true; expireMovePath(unit);
      if (stacked && pair) { pair.flipped = true; expireMovePath(pair); }
      switchSide();
    }
  } else {
    unit.acted = true;
    unit.flipped = true;
    addLog('move', `[AI] ${unit.name}: 待機`);
    switchSide();
  }
}

// AI移動先選択: サイドに応じた戦略
function aiPickMoveTarget(unit, reachable) {
  const side = unit.side;
  let bestHex = null;
  let bestScore = -Infinity;

  for (const [hid, info] of reachable) {
    let score = 0;
    const { col, row } = parseHexId(hid);
    const isCity = FACILITY_MAP && FACILITY_MAP[hid] === 'c';
    const isRoad = ROAD_MAP && ROAD_MAP[hid] && ROAD_MAP[hid].length > 0;

    if (side === 'german') {
      // ドイツAI: 西（col小さい）・都市・NW突破hex方向へ
      score -= col * 3; // 西へ行くほど高得点
      if (isCity) score += 20;
      // NW突破hex近さ
      const nwHexes = getNWExitHexes();
      if (nwHexes.length > 0 && isMechanized(unit)) {
        const minDist = Math.min(...nwHexes.map(nh => hexDist(hid, nh)));
        score -= minDist * 2; // 近いほど高得点
        if (nwHexes.includes(hid)) score += 30;
      }
      if (isRoad) score += 2;
    } else {
      // 連合AI: 都市防衛・退却
      if (isCity) score += 25;
      // 圧倒的劣勢なら後方へ退却（row小さい=北）
      const adjEnemies = getNeighborIds(hid).reduce((s, nid) => {
        return s + getUnitsAt(nid).filter(e => e.side !== side).reduce((es, e) => es + (e.flipped ? e.def : e.atk), 0);
      }, 0);
      const myPower = unit.flipped ? unit.def : unit.atk;
      if (adjEnemies > myPower * 2) {
        // 圧倒的劣勢 → 逃げる
        score += col * 2; // 東（後方）へ
      } else {
        // 都市に近づく
        const cityHexes = [];
        if (FACILITY_MAP) {
          for (const [fhid, fac] of Object.entries(FACILITY_MAP)) {
            if (fac === 'c') cityHexes.push(fhid);
          }
        }
        if (cityHexes.length > 0) {
          const minCityDist = Math.min(...cityHexes.map(ch => hexDist(hid, ch)));
          score -= minCityDist * 2;
        }
      }
    }

    // 装甲部隊は道路なし森を避ける（出られなくなる）
    const terrain = TERRAIN_MAP[hid];
    if (terrain === 'f' && isMechanized(unit) && !isRoad) {
      score -= 50; // 大幅減点
    }

    // 敵に隣接している場合のボーナス/ペナルティ
    const adjEnemyCount = getNeighborIds(hid).filter(nid =>
      getUnitsAt(nid).some(e => e.side !== side)
    ).length;
    if (side === 'german') {
      score += adjEnemyCount * 2; // 攻撃的
    }

    if (score > bestScore) {
      bestScore = score;
      bestHex = hid;
    }
  }
  return bestHex;
}

// AI攻撃: 有利な戦闘を実行
function aiDoAttack() {
  dbg('aiDoAttack', {side:G.activeSide});
  const side = G.activeSide;
  const enemySide = side === 'german' ? 'allied' : 'german';

  // 行動済み・未攻撃・裏でない味方ユニットに隣接する敵hexを探す
  const actedUnits = G.units.filter(u =>
    u.side === side && u.acted && !u.eliminated && !u.exited && !u.flipped && !u._aiAttacked
  );

  // 攻撃可能な敵hexを収集
  const enemyHexes = new Set();
  for (const u of actedUnits) {
    for (const nid of getNeighborIds(u.hexId)) {
      const enemies = getUnitsAt(nid).filter(e => e.side === enemySide);
      if (enemies.length > 0) enemyHexes.add(nid);
    }
  }

  // 各敵hexについて攻撃力を計算し、有利なら攻撃
  let bestAttack = null;
  let bestDiff = -Infinity;

  for (const defHex of enemyHexes) {
    const defenders = getUnitsAt(defHex).filter(u => u.side === enemySide);
    const defPower = defenders.reduce((s, u) => s + (u.flipped ? u.def : u.atk), 0);

    // 隣接する行動済み味方ユニットを攻撃参加候補に
    const adjFriendly = [];
    for (const nid of getNeighborIds(defHex)) {
      const friends = getUnitsAt(nid).filter(u =>
        u.side === side && u.acted && !u.eliminated && !u.exited && !u.flipped && !u._aiAttacked
      );
      adjFriendly.push(...friends);
    }

    const atkPower = adjFriendly.reduce((s, u) => s + (u.flipped ? u.def : u.atk), 0);
    const diff = atkPower - defPower;

    // 有利（攻撃力>=防御力）なら攻撃候補
    if (atkPower >= defPower && diff > bestDiff) {
      bestDiff = diff;
      bestAttack = { defHex, attackers: adjFriendly.map(u => u.id), defenders };
    }
  }

  // 有利な攻撃がない場合、mustAttackユニットの強制攻撃を探す
  if (!bestAttack) {
    const mustUnits = G.units.filter(u =>
      u.side === side && u.mustAttack && !u.eliminated && !u.exited && !u.flipped && !u._aiAttacked
    );
    for (const mu of mustUnits) {
      for (const nid of getNeighborIds(mu.hexId)) {
        const enemies = getUnitsAt(nid).filter(e => e.side === enemySide);
        if (enemies.length > 0) {
          // 同hexの味方も参加させる
          const coAttackers = getUnitsAt(mu.hexId).filter(u =>
            u.side === side && u.acted && !u.eliminated && !u.exited && !u.flipped && !u._aiAttacked
          );
          bestAttack = { defHex: nid, attackers: coAttackers.map(u => u.id), defenders: enemies };
          break;
        }
      }
      if (bestAttack) break;
    }
  }

  if (bestAttack) {
    // 攻撃参加ユニットにフラグ
    for (const uid of bestAttack.attackers) {
      const u = G.units.find(x => x.id === uid);
      if (u) u._aiAttacked = true;
    }
    // 戦闘セットアップ（人間と同じUI表示）
    resetCombat();
    G.combat.defHex = bestAttack.defHex;
    G.combat.defenders = bestAttack.defenders;
    G.combat.attackers = bestAttack.attackers;
    // 攻撃対象hexと攻撃参加hexをハイライト
    G.attackTargets = new Set([bestAttack.defHex]);
    const atkNames = bestAttack.attackers.map(id => { const u = G.units.find(x => x.id === id); return u ? u.name : ''; }).join(', ');
    const defNames = bestAttack.defenders.map(u => u.name).join(', ');
    addLog('combat', `[AI] ${atkNames} → ${defNames} (${dispHex(bestAttack.defHex)}) を攻撃`);
    // 戦闘hexに画面をパン
    panToHex(bestAttack.defHex);
    updateRightPanel();
    // 攻撃ハイライトを見せてから実行（2秒待ち）
    setTimeout(() => {
      executeCombat();
    }, 2000);
  } else {
    // 攻撃なし → mustAttackクリアして裏にしてサイド切替
    G.units.filter(u => u.side === side).forEach(u => { delete u.mustAttack; });
    G.units.filter(u => u.side === side && u.acted && !u.flipped).forEach(u => {
      u.flipped = true; expireMovePath(u);
    });
    switchSide();
  }
}

// AI退却: 最初の有効な退却先を選択
function aiDoRetreat() {
  dbg('aiDoRetreat', {retreating:G.combat.retreatingUnits});
  const ru = G.combat.retreatingUnits[0];
  if (!ru) {
    checkAdvance();
    scheduleAI(500);
    return;
  }
  const unit = G.units.find(u => u.id === ru);
  if (!unit) {
    G.combat.retreatingUnits.shift();
    scheduleAI(300);
    return;
  }
  const validHexes = getRetreatHexes(unit);
  if (validHexes.length > 0) {
    // 退却先を選択: サイドに応じた方向
    let bestHex = validHexes[0];
    if (unit.side === 'german') {
      // ドイツ: 東（col大）方向へ退却
      bestHex = validHexes.reduce((best, h) => {
        const bc = parseHexId(best).col;
        const hc = parseHexId(h).col;
        return hc > bc ? h : best;
      }, validHexes[0]);
    } else {
      // 連合: 西（col大）方向へ退却（後方）
      bestHex = validHexes.reduce((best, h) => {
        const bc = parseHexId(best).col;
        const hc = parseHexId(h).col;
        return hc > bc ? h : best;
      }, validHexes[0]);
    }
    unit.hexId = bestHex;
    addLog('combat', `[AI] ${unit.name} → ${dispHex(bestHex)} に退却`);
    G.combat.retreatingUnits.shift();
    if (G.combat.retreatingUnits.length === 0) {
      checkAdvance();
    }
    updateRightPanel();
    draw();
    scheduleAI(1500);
  } else {
    // 退却先なし → ユニット除去
    eliminateUnit(unit);
    addLog('combat', `[AI] ${unit.name}: 退却先なし → 除去`);
    G.combat.retreatingUnits.shift();
    if (G.combat.retreatingUnits.length === 0) {
      checkAdvance();
    }
    updateRightPanel();
    draw();
    scheduleAI(1500);
  }
}

// AI戦闘後前進: 常に前進
function aiDoAdvance() {
  dbg('aiDoAdvance', {eligible:G.combat.advanceEligible, defHex:G.combat.defHex});
  if (G.combat.advanceEligible.length === 0) {
    finishCombat();
    scheduleAI(500);
    return;
  }
  const uid = G.combat.advanceEligible[0];
  const unit = G.units.find(u => u.id === uid);
  const defHex = G.combat.defHex;

  if (unit && defHex) {
    // 装甲部隊が森に前進する場合、道路経由でのみ可能
    const defTerrain = TERRAIN_MAP[defHex];
    if (defTerrain === 'f' && isMechanized(unit)) {
      const fromRoutes = ROAD_MAP[unit.hexId] || [];
      const toRoutes = ROAD_MAP[defHex] || [];
      const sharedRoad = fromRoutes.some(r => toRoutes.includes(r));
      if (!sharedRoad) {
        addLog('combat', `[AI] ${unit.name}: 装甲部隊は道路なしで森に前進不可`);
        G.combat.advanceEligible.shift();
        if (G.combat.advanceEligible.length === 0) finishCombat();
        updateRightPanel();
        draw();
        scheduleAI(500);
        return;
      }
    }
    G.combat.advanceEligible.shift();
    unit.hexId = defHex;
    addLog('combat', `[AI] ${unit.name} → ${dispHex(defHex)} に前進`);
  } else {
    G.combat.advanceEligible.shift();
  }

  if (G.combat.advanceEligible.length === 0) {
    finishCombat();
  }
  updateRightPanel();
  draw();
  scheduleAI(500);
}

// ========== ゲーム開始 ==========
function startGame(mode) {
  G.mode = mode;
  document.getElementById('startScreen').style.display = 'none';

  // ユニット初期化
  G.units = [];
  if (typeof INITIAL_SETUP !== 'undefined') {
    for (const u of INITIAL_SETUP.german) {
      G.units.push(Object.assign({}, u, { side: 'german', acted: false, flipped: false, eliminated: false, exited: false }));
    }
    for (const u of INITIAL_SETUP.allied) {
      G.units.push(Object.assign({}, u, { side: 'allied', acted: false, flipped: false, eliminated: false, exited: false }));
    }
  }

  addLog('turn', `═══ ターン1 ═══`);
  addLog('turn', `モード: ${mode === 'watch' ? 'AI観戦' : mode === 'hotseat' ? '2人対戦' : mode + 'プレイ'}`);

  G.phase = 'reinforce';
  updateUI();
  draw();

  // AI開始チェック
  scheduleAI(800);
}

// ========== 初期化 ==========
mapImg.onload = () => { mapLoaded = true; draw(); };
mapImg.onerror = () => { mapLoaded = false; draw(); };
mapImg.src = 'ssbulgemap12.png';

// ズームスライダー
const zoomSlider = document.getElementById('zoomSlider');
const zoomLabel = document.getElementById('zoomLabel');
zoomSlider.addEventListener('input', () => {
  const rect = mapArea.getBoundingClientRect();
  const cx = rect.width / 2, cy = rect.height / 2;
  const oldZoom = zoom;
  zoom = parseInt(zoomSlider.value) / 100;
  panX = cx - (cx - panX) * (zoom / oldZoom);
  panY = cy - (cy - panY) * (zoom / oldZoom);
  zoomLabel.textContent = Math.round(zoom * 100) + '%';
  clampPan();
  draw();
});
function zoomBy(delta) {
  const rect = mapArea.getBoundingClientRect();
  const cx = rect.width / 2, cy = rect.height / 2;
  const oldZoom = zoom;
  zoom = Math.max(0.3, Math.min(2.0, (Math.round(zoom * 100) + delta) / 100));
  panX = cx - (cx - panX) * (zoom / oldZoom);
  panY = cy - (cy - panY) * (zoom / oldZoom);
  clampPan();
  syncZoomSlider();
  draw();
}
function syncZoomSlider() {
  zoomSlider.value = Math.round(zoom * 100);
  zoomLabel.textContent = Math.round(zoom * 100) + '%';
}

// 初期描画
draw();
</script>
