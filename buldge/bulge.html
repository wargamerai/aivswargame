<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>バルジの戦い — Panzers in the Snow</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body { height:100%; overflow:hidden; background:#1a1a2e; color:#e0e0e0; font-family:'Segoe UI',Arial,sans-serif; }

/* === トップバー === */
#topbar { display:flex; align-items:center; justify-content:space-between; height:40px; background:#16213e; border-bottom:1px solid #333; padding:0 12px; font-size:0.9em; }
#topbar .info { display:flex; gap:16px; align-items:center; }
#topbar .info span { white-space:nowrap; }
.phase-label { background:#0f3460; padding:2px 10px; border-radius:3px; font-weight:bold; color:#e94560; }
.vp-box { display:flex; gap:8px; }
.vp-de { color:#c55; } .vp-al { color:#5a5; }
#topbar button { background:#0f3460; color:#e0e0e0; border:1px solid #444; padding:3px 12px; border-radius:3px; cursor:pointer; font-size:0.85em; }
#topbar button:hover { background:#1a508b; }

/* === メインレイアウト === */
#main { display:flex; height:calc(100% - 40px); }

/* === 中央マップ === */
#mapArea { flex:1; position:relative; overflow:hidden; background:#1a1a2e; cursor:grab; }
#mapArea.dragging { cursor:grabbing; }
#zoomControl { position:absolute; top:8px; left:50%; transform:translateX(-50%); background:rgba(22,33,62,0.85); padding:4px 12px; border-radius:16px; display:flex; align-items:center; gap:4px; z-index:10; color:#aaa; }
#mapCanvas { position:absolute; top:0; left:0; image-rendering:auto; }

/* === 右パネル === */
#rightPanel { width:320px; min-width:280px; background:#16213e; border-left:1px solid #333; display:flex; flex-direction:column; overflow:hidden; }
#phaseInfo { padding:10px; border-bottom:1px solid #333; }
#phaseInfo h3 { font-size:1em; color:#e94560; margin-bottom:6px; }
#actionPanel { flex:1; overflow-y:auto; padding:10px; }
#actionPanel .section { margin-bottom:12px; }
#actionPanel .section h4 { font-size:0.85em; color:#aaa; margin-bottom:4px; border-bottom:1px solid #333; padding-bottom:2px; }
.unit-card { background:#0f3460; border:1px solid #444; border-radius:4px; padding:6px 8px; margin-bottom:4px; cursor:pointer; font-size:0.85em; display:flex; justify-content:space-between; align-items:center; }
.unit-card:hover { background:#1a508b; }
.unit-card.selected { border-color:#e94560; background:#2a1040; }
.unit-card .name { font-weight:bold; }
.unit-card .stats { color:#aaa; font-size:0.8em; }
.btn { display:inline-block; background:#0f3460; color:#e0e0e0; border:1px solid #555; padding:5px 14px; border-radius:3px; cursor:pointer; font-size:0.85em; margin:2px; }
.btn:hover { background:#1a508b; }
.btn.primary { background:#e94560; border-color:#e94560; color:#fff; }
.btn.primary:hover { background:#c03050; }
.btn:disabled { opacity:0.4; cursor:default; }

/* === ログ === */
#logPanel { height:120px; border-top:1px solid #333; overflow-y:auto; padding:6px 10px; font-size:0.8em; font-family:monospace; background:#0d1117; color:#8b949e; }
#logPanel .log-turn { color:#e94560; font-weight:bold; }
#logPanel .log-combat { color:#ffa657; }
#logPanel .log-move { color:#79c0ff; }

/* === スタート画面 === */
#startScreen { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(10,10,30,0.95); display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:100; }
#startScreen h1 { font-size:2em; color:#e94560; margin-bottom:8px; text-shadow:0 0 20px rgba(233,69,96,0.5); }
#startScreen h2 { font-size:1.1em; color:#aaa; margin-bottom:30px; }
#startScreen .mode-btn { display:block; width:300px; padding:14px; margin:6px; background:#0f3460; border:2px solid #333; border-radius:6px; color:#e0e0e0; font-size:1em; cursor:pointer; text-align:center; }
#startScreen .mode-btn:hover { background:#1a508b; border-color:#e94560; }
#startScreen .mode-btn .desc { font-size:0.8em; color:#888; margin-top:4px; }

/* === フラッシュ通知 === */
#flashOverlay { position:fixed; top:0; left:0; width:100%; height:100%; display:flex; align-items:center; justify-content:center; z-index:200; pointer-events:none; opacity:0; transition:opacity 0.4s; }
#flashOverlay.show { opacity:1; }
#flashOverlay .flash-text { font-size:3.2em; font-weight:bold; padding:24px 60px; border-radius:14px; text-shadow:0 0 40px rgba(0,0,0,0.9), 0 2px 8px rgba(0,0,0,0.6); letter-spacing:0.05em; }
#flashOverlay.german .flash-text { background:rgba(120,60,60,0.95); color:#ffd; border:3px solid #e94560; box-shadow:0 0 60px rgba(233,69,96,0.5); }
#flashOverlay.allied .flash-text { background:rgba(40,100,60,0.95); color:#ffd; border:3px solid #5ae960; box-shadow:0 0 60px rgba(90,233,96,0.5); }
#flashOverlay .flash-text { animation: flashPop 0.4s ease-out; }
@keyframes flashPop { 0% { transform:scale(0.6); opacity:0; } 60% { transform:scale(1.1); } 100% { transform:scale(1); opacity:1; } }

/* === 履歴パネル === */
#historyOverlay { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(10,10,30,0.85); z-index:150; display:none; }
#historyOverlay.show { display:flex; align-items:center; justify-content:center; }
#historyPanel { width:500px; max-width:90vw; max-height:80vh; background:#16213e; border:2px solid #444; border-radius:8px; display:flex; flex-direction:column; overflow:hidden; }
#historyPanel .hist-header { display:flex; justify-content:space-between; align-items:center; padding:10px 14px; border-bottom:1px solid #333; }
#historyPanel .hist-header h3 { color:#e94560; font-size:1em; margin:0; }
#historyPanel .hist-tabs { display:flex; gap:4px; padding:8px 14px; border-bottom:1px solid #333; flex-wrap:wrap; }
#historyPanel .hist-tab { background:#0f3460; color:#aaa; border:1px solid #333; padding:3px 10px; border-radius:3px; cursor:pointer; font-size:0.85em; }
#historyPanel .hist-tab.active { background:#e94560; color:#fff; border-color:#e94560; }
#historyPanel .hist-body { flex:1; overflow-y:auto; padding:10px 14px; font-size:0.85em; font-family:monospace; color:#8b949e; }
#historyPanel .hist-body .log-turn { color:#e94560; font-weight:bold; }
#historyPanel .hist-body .log-combat { color:#ffa657; }
#historyPanel .hist-body .log-move { color:#79c0ff; }

/* === ダイス演出 === */
.dice-result { font-size:2em; font-weight:bold; color:#ffa657; text-align:center; padding:10px; animation: diceFlash 0.3s ease; }
@keyframes diceFlash { 0% { transform:scale(1.5); opacity:0; } 100% { transform:scale(1); opacity:1; } }

/* === 戦闘パネル === */
.combat-info { background:#1a1a2e; border:1px solid #444; border-radius:4px; padding:8px; margin:6px 0; font-size:0.85em; }
.combat-info .ratio { font-size:1.2em; font-weight:bold; color:#e94560; text-align:center; }
.combat-info .mods { color:#aaa; font-size:0.8em; }
</style>
</head>
<body>

<!-- スタート画面 -->
<div id="startScreen">
  <h1>バルジの戦い</h1>
  <h2>Panzers in the Snow</h2>
  <button class="mode-btn" onclick="startGame('german')">
    ドイツ軍でプレイ
    <div class="desc">連合軍はAIが操作</div>
  </button>
  <button class="mode-btn" onclick="startGame('allied')">
    連合軍でプレイ
    <div class="desc">ドイツ軍はAIが操作</div>
  </button>
  <button class="mode-btn" onclick="startGame('hotseat')">
    2人対戦（ホットシート）
    <div class="desc">両方人間が操作</div>
  </button>
  <button class="mode-btn" onclick="startGame('watch')">
    AI観戦
    <div class="desc">両方AIが自動進行</div>
  </button>
</div>

<!-- トップバー -->
<div id="topbar">
  <div class="info">
    <span id="turnLabel">ターン 1/6</span>
    <span class="phase-label" id="phaseLabel">増援フェーズ</span>
    <span id="sideLabel">ドイツ軍</span>
  </div>
  <div class="vp-box">
    <span class="vp-de">独: <b id="vpGerman">0</b>VP</span>
    <span class="vp-al">連: <b id="vpAllied">0</b>VP</span>
  </div>
  <div style="display:flex;align-items:center;gap:4px;">
    <button onclick="zoomBy(-10)" style="background:#0f3460;color:#e0e0e0;border:1px solid #444;padding:3px 10px;border-radius:3px;cursor:pointer;font-size:1em;font-weight:bold;">−</button>
    <input type="range" id="zoomSlider" min="30" max="200" value="70" style="width:140px;vertical-align:middle;">
    <button onclick="zoomBy(10)" style="background:#0f3460;color:#e0e0e0;border:1px solid #444;padding:3px 10px;border-radius:3px;cursor:pointer;font-size:1em;font-weight:bold;">+</button>
    <span id="zoomLabel" style="font-size:0.75em;min-width:30px;">70%</span>
  </div>
  <div>
    <button onclick="toggleHistory()">履歴</button>
    <button onclick="endPhase()">フェーズ終了</button>
  </div>
</div>

<!-- メイン -->
<div id="main">
  <!-- 中央マップ -->
  <div id="mapArea">
    <canvas id="mapCanvas"></canvas>
  </div>

  <!-- 右パネル -->
  <div id="rightPanel">
    <div id="phaseInfo">
      <h3 id="phaseTitle">増援フェーズ</h3>
      <div id="phaseDesc">増援ユニットを配置してください</div>
    </div>
    <div id="actionPanel">
      <!-- 動的に更新 -->
    </div>
    <div id="logPanel"></div>
  </div>
</div>

<div id="flashOverlay"><div class="flash-text"></div></div>

<!-- 履歴パネル -->
<div id="historyOverlay" onclick="if(event.target===this)closeHistory()">
  <div id="historyPanel">
    <div class="hist-header">
      <h3>行動履歴</h3>
      <button class="btn" onclick="closeHistory()" style="padding:2px 10px;">✕</button>
    </div>
    <div class="hist-tabs" id="histTabs"></div>
    <div class="hist-body" id="histBody"></div>
  </div>
</div>

<script src="mapdata.js"></script>
<script src="bulge_units.js"></script>
<script>
'use strict';

// ========== 定数 ==========
const COLS = MAP_CONFIG.cols;
const ROWS = MAP_CONFIG.rows;
const HEX_SIZE = MAP_CONFIG.hexSize;
const BASE_OX = MAP_CONFIG.offsetX;
const BASE_OY = MAP_CONFIG.offsetY;

// ========== ゲーム状態 ==========
const G = {
  turn: 1,
  maxTurn: 6,
  phase: 'reinforce',     // reinforce, recovery, operation
  opPhase: 'select',      // select, move, attack, retreat, advance, done
  activeSide: 'german',
  germanDone: false,
  alliedDone: false,
  units: [],
  selectedUnit: null,
  reachable: null,         // Map: hexId -> {cost, path}
  attackTargets: null,     // Set of hexIds
  // 戦闘状態
  combat: {
    defHex: null,          // 防御側hex
    attackers: [],         // 攻撃参加ユニットID
    defenders: [],         // 防御側ユニット（自動: defHex内の全敵）
    result: null,          // CRT結果
    retreatingUnits: [],   // 退却待ちユニット
    advanceEligible: [],   // 戦闘後前進可能ユニット
  },
  vpGerman: 0,
  vpAllied: 0,
  mode: 'german',          // german, allied, hotseat, watch
  log: [],
  undoStack: [],
  britishDeployedTurn: 0,  // 英軍投入ターン（0=未投入）
};

// ========== マップ描画 ==========
const canvas = document.getElementById('mapCanvas');
const ctx = canvas.getContext('2d');
const mapArea = document.getElementById('mapArea');
let mapImg = new Image();
let mapLoaded = false;

// パン・ズーム
let panX = 0, panY = 0, zoom = 0.7;
let dragStart = null;

function hexCorner(cx, cy, size, i) {
  const angle = Math.PI / 180 * (60 * i + 30);
  return { x: cx + size * Math.cos(angle), y: cy + size * Math.sin(angle) };
}

function hexCenter(col, row) {
  const s = HEX_SIZE;
  const w = Math.sqrt(3) * s;
  const h = s * 2;
  let x = BASE_OX + col * w + w / 2;
  const y = BASE_OY + row * h * 0.75 + s;
  if (row % 2 === 1) x += w / 2;
  return { x, y };
}

function hexId(col, row) {
  return String(col + 1).padStart(2, '0') + String(row + 1).padStart(2, '0');
}

// 内部hexId → マップ表示用番号に変換
function dispHex(id) {
  if (!id || id === 'eliminated' || id === 'exited') return id || '';
  const cc = parseInt(id.substring(0, 2));
  const rr = id.substring(2, 4);
  return rr + String(22 - cc).padStart(2, '0');
}

function parseHexId(id) {
  return { col: parseInt(id.substring(0, 2)) - 1, row: parseInt(id.substring(2, 4)) - 1 };
}

function getNeighbors(col, row) {
  const even = row % 2 === 0;
  if (even) {
    return [[col, row-1],[col+1, row],[col, row+1],[col-1, row+1],[col-1, row],[col-1, row-1]];
  } else {
    return [[col+1, row-1],[col+1, row],[col+1, row+1],[col, row+1],[col-1, row],[col, row-1]];
  }
}

function getNeighborIds(hid) {
  const { col, row } = parseHexId(hid);
  return getNeighbors(col, row)
    .filter(([c, r]) => c >= 0 && c < COLS && r >= 0 && r < ROWS)
    .map(([c, r]) => hexId(c, r));
}

function hexDist(id1, id2) {
  const a = parseHexId(id1), b = parseHexId(id2);
  const ax = a.col - (a.row - (a.row & 1)) / 2;
  const az = a.row;
  const ay = -ax - az;
  const bx = b.col - (b.row - (b.row & 1)) / 2;
  const bz = b.row;
  const by = -bx - bz;
  return Math.max(Math.abs(ax - bx), Math.abs(ay - by), Math.abs(az - bz));
}

function drawHexPath(cx, cy, size) {
  ctx.beginPath();
  for (let i = 0; i < 6; i++) {
    const c = hexCorner(cx, cy, size, i);
    if (i === 0) ctx.moveTo(c.x, c.y); else ctx.lineTo(c.x, c.y);
  }
  ctx.closePath();
}

// 道路線描画
function drawRoads() {
  for (let route = 1; route <= 5; route++) {
    const hexes = new Set();
    for (const [id, routes] of Object.entries(ROAD_MAP)) {
      if (routes.includes(route)) hexes.add(id);
    }
    if (hexes.size === 0) continue;
    ctx.strokeStyle = 'rgba(180,140,80,0.6)';
    ctx.lineWidth = 2;
    ctx.lineCap = 'round';
    const drawn = new Set();
    for (const id of hexes) {
      const { col, row } = parseHexId(id);
      const c1 = hexCenter(col, row);
      for (const [nc, nr] of getNeighbors(col, row)) {
        if (nc < 0 || nc >= COLS || nr < 0 || nr >= ROWS) continue;
        const nid = hexId(nc, nr);
        if (!hexes.has(nid)) continue;
        const key = [id, nid].sort().join('-');
        if (drawn.has(key)) continue;
        drawn.add(key);
        const c2 = hexCenter(nc, nr);
        ctx.beginPath();
        ctx.moveTo(c1.x, c1.y);
        ctx.lineTo(c2.x, c2.y);
        ctx.stroke();
      }
    }
  }
}

// 河川描画
function drawRivers() {
  if (!RIVER_MAP) return;
  ctx.strokeStyle = 'rgba(80,140,255,0.7)';
  ctx.lineWidth = 3;
  for (const [id1, id2] of RIVER_MAP) {
    const a = parseHexId(id1), b = parseHexId(id2);
    const c1 = hexCenter(a.col, a.row), c2 = hexCenter(b.col, b.row);
    const mx = (c1.x + c2.x) / 2, my = (c1.y + c2.y) / 2;
    // 辺の中点付近に線を引く
    const dx = c2.x - c1.x, dy = c2.y - c1.y;
    const len = Math.sqrt(dx * dx + dy * dy);
    const nx = -dy / len * HEX_SIZE * 0.4, ny = dx / len * HEX_SIZE * 0.4;
    ctx.beginPath();
    ctx.moveTo(mx - nx, my - ny);
    ctx.lineTo(mx + nx, my + ny);
    ctx.stroke();
  }
}

// メイン描画
function draw() {
  const W = mapImg.naturalWidth || 2400;
  const H = mapImg.naturalHeight || 2000;
  canvas.width = W;
  canvas.height = H;
  canvas.style.transform = `translate(${panX}px, ${panY}px) scale(${zoom})`;
  canvas.style.transformOrigin = '0 0';

  ctx.clearRect(0, 0, W, H);

  // 背景画像
  if (mapLoaded) ctx.drawImage(mapImg, 0, 0);

  // 地形オーバーレイ
  for (let c = 0; c < COLS; c++) {
    for (let r = 0; r < ROWS; r++) {
      const id = hexId(c, r);
      const terrain = TERRAIN_MAP[id] || 'p';
      if (terrain === 'x') continue;
      const center = hexCenter(c, r);
      drawHexPath(center.x, center.y, HEX_SIZE);
      ctx.fillStyle = TERRAIN_COLORS[terrain] || 'rgba(0,0,0,0)';
      ctx.fill();

      // 施設
      const fac = FACILITY_MAP && FACILITY_MAP[id];
      if (fac && FACILITY_COLORS[fac]) {
        drawHexPath(center.x, center.y, HEX_SIZE * 0.5);
        ctx.fillStyle = FACILITY_COLORS[fac];
        ctx.fill();
      }
    }
  }

  // 道路・河川
  drawRoads();
  drawRivers();

  // hexグリッド線
  ctx.strokeStyle = 'rgba(200,200,200,0.15)';
  ctx.lineWidth = 0.5;
  for (let c = 0; c < COLS; c++) {
    for (let r = 0; r < ROWS; r++) {
      const id = hexId(c, r);
      if (TERRAIN_MAP[id] === 'x') continue;
      const center = hexCenter(c, r);
      drawHexPath(center.x, center.y, HEX_SIZE);
      ctx.stroke();
    }
  }

  // 増援配置可能hexハイライト
  if (G.reinforceValidHexes) {
    for (const hid of G.reinforceValidHexes) {
      const { col, row } = parseHexId(hid);
      const center = hexCenter(col, row);
      drawHexPath(center.x, center.y, HEX_SIZE);
      ctx.fillStyle = 'rgba(255,200,0,0.35)';
      ctx.fill();
      ctx.strokeStyle = 'rgba(255,200,0,0.7)';
      ctx.lineWidth = 2;
      ctx.stroke();
    }
  }

  // 到達可能hexハイライト
  if (G.reachable) {
    for (const [hid, info] of G.reachable) {
      const { col, row } = parseHexId(hid);
      const center = hexCenter(col, row);
      drawHexPath(center.x, center.y, HEX_SIZE);
      ctx.fillStyle = 'rgba(100,200,255,0.25)';
      ctx.fill();
      ctx.strokeStyle = 'rgba(100,200,255,0.5)';
      ctx.lineWidth = 1.5;
      ctx.stroke();
    }
  }

  // 攻撃可能hexハイライト
  if (G.attackTargets) {
    for (const hid of G.attackTargets) {
      const { col, row } = parseHexId(hid);
      const center = hexCenter(col, row);
      drawHexPath(center.x, center.y, HEX_SIZE);
      ctx.fillStyle = 'rgba(255,80,80,0.3)';
      ctx.fill();
      ctx.strokeStyle = 'rgba(255,80,80,0.6)';
      ctx.lineWidth = 2;
      ctx.stroke();
    }
  }

  // 攻撃参加ユニットのhexハイライト
  if (G.combat && G.combat.attackers.length > 0) {
    const atkHexes = new Set();
    for (const id of G.combat.attackers) {
      const u = G.units.find(x => x.id === id);
      if (u) atkHexes.add(u.hexId);
    }
    for (const hid of atkHexes) {
      const { col, row } = parseHexId(hid);
      const center = hexCenter(col, row);
      drawHexPath(center.x, center.y, HEX_SIZE);
      ctx.fillStyle = 'rgba(255,200,50,0.25)';
      ctx.fill();
      ctx.strokeStyle = 'rgba(255,200,50,0.6)';
      ctx.lineWidth = 2;
      ctx.stroke();
    }
  }

  // 退却可能hexハイライト（緑）
  if (G.opPhase === 'retreat' && G.combat.retreatingUnits.length > 0) {
    const ru = G.combat.retreatingUnits[0];
    const unit = G.units.find(u => u.id === ru);
    if (unit) {
      const retreatHexes = getRetreatHexes(unit);
      for (const hid of retreatHexes) {
        const { col, row } = parseHexId(hid);
        const center = hexCenter(col, row);
        drawHexPath(center.x, center.y, HEX_SIZE);
        ctx.fillStyle = 'rgba(80,255,80,0.3)';
        ctx.fill();
        ctx.strokeStyle = 'rgba(80,255,80,0.7)';
        ctx.lineWidth = 2;
        ctx.stroke();
      }
    }
  }

  // 前進可能hexハイライト（青緑）
  if (G.opPhase === 'advance' && G.combat.defHex && G.combat.advanceEligible.length > 0) {
    const { col, row } = parseHexId(G.combat.defHex);
    const center = hexCenter(col, row);
    drawHexPath(center.x, center.y, HEX_SIZE);
    ctx.fillStyle = 'rgba(80,200,255,0.35)';
    ctx.fill();
    ctx.strokeStyle = 'rgba(80,200,255,0.8)';
    ctx.lineWidth = 3;
    ctx.stroke();
    // 「前進」テキスト
    ctx.fillStyle = 'rgba(80,200,255,0.9)';
    ctx.font = `bold ${Math.round(HEX_SIZE * 0.25)}px sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('前進', center.x, center.y);
  }

  // NW突破マーカー
  if (G.exitMarkers) {
    for (const hid of G.exitMarkers) {
      const { col, row } = parseHexId(hid);
      const center = hexCenter(col, row);
      drawHexPath(center.x, center.y, HEX_SIZE);
      ctx.fillStyle = 'rgba(255,200,0,0.35)';
      ctx.fill();
      ctx.strokeStyle = 'rgba(255,200,0,0.7)';
      ctx.lineWidth = 2;
      ctx.stroke();
      // 突破テキスト
      ctx.fillStyle = 'rgba(255,200,0,0.9)';
      ctx.font = `bold ${Math.round(HEX_SIZE * 0.25)}px sans-serif`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('突破', center.x, center.y);
    }
  }

  // 移動経路線の描画
  drawMovePaths();

  // ユニット描画
  drawUnits();

  // hex番号（小さく）
  ctx.fillStyle = 'rgba(255,255,255,0.3)';
  ctx.font = `${Math.round(HEX_SIZE * 0.2)}px monospace`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'top';
  for (let c = 0; c < COLS; c++) {
    for (let r = 0; r < ROWS; r++) {
      const id = hexId(c, r);
      if (TERRAIN_MAP[id] === 'x') continue;
      const center = hexCenter(c, r);
      ctx.fillText(dispHex(id), center.x, center.y - HEX_SIZE * 0.85);
    }
  }
}

// ========== 移動経路描画 ==========
const MOVE_PATH_DURATION = 4000; // 経路表示時間(ms)

function clearExpiredPaths() {
  // 確認待ち中は経路を消さない
  if (G._awaitConfirm) return;
  const now = Date.now();
  for (const u of G.units) {
    if (u._movePathExpiry && now > u._movePathExpiry) {
      delete u.movePath;
      delete u._movePathExpiry;
      delete u._lastMovedAt;
    }
  }
}

// movePath削除を即時ではなく遅延にする
function expireMovePath(unit) {
  if (unit.movePath) {
    unit._movePathExpiry = Date.now() + MOVE_PATH_DURATION;
    unit._lastMovedAt = Date.now();
    startPathAnimation();
  }
}

// 経路表示中のアニメーションループ
let _pathAnimId = null;
function startPathAnimation() {
  if (_pathAnimId) return;
  function tick() {
    const hasActive = G.units.some(u => u._movePathExpiry && Date.now() < u._movePathExpiry);
    if (hasActive) {
      draw();
      _pathAnimId = requestAnimationFrame(tick);
    } else {
      _pathAnimId = null;
      draw(); // 最終クリア描画
    }
  }
  _pathAnimId = requestAnimationFrame(tick);
}

function drawMovePaths() {
  clearExpiredPaths();
  const now = Date.now();
  const PATH_COLORS = { german: 'rgba(255,100,100,', allied: 'rgba(100,180,255,' };
  for (const u of G.units) {
    if (!u.movePath || u.movePath.length < 2 || u.eliminated || u.exited) continue;
    // フェードアウト計算
    let alpha = 0.8;
    if (u._movePathExpiry) {
      const remaining = u._movePathExpiry - now;
      alpha = Math.max(0.1, Math.min(0.8, remaining / MOVE_PATH_DURATION));
    }
    const baseColor = PATH_COLORS[u.side] || 'rgba(255,255,100,';
    const color = baseColor + alpha + ')';

    // 経路線（太く＋グロー）
    ctx.save();
    ctx.shadowColor = baseColor + '0.6)';
    ctx.shadowBlur = 15;
    ctx.strokeStyle = color;
    ctx.lineWidth = 10;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    ctx.setLineDash([14, 8]);
    ctx.beginPath();
    for (let i = 0; i < u.movePath.length; i++) {
      const { col, row } = parseHexId(u.movePath[i]);
      const c = hexCenter(col, row);
      if (i === 0) ctx.moveTo(c.x, c.y);
      else ctx.lineTo(c.x, c.y);
    }
    ctx.stroke();
    ctx.setLineDash([]);
    ctx.restore();

    // 移動元に丸
    const start = parseHexId(u.movePath[0]);
    const sc = hexCenter(start.col, start.row);
    ctx.beginPath();
    ctx.arc(sc.x, sc.y, 14, 0, Math.PI * 2);
    ctx.fillStyle = color;
    ctx.fill();

    // 矢印（太く）
    const last = parseHexId(u.movePath[u.movePath.length - 1]);
    const prev = parseHexId(u.movePath[u.movePath.length - 2]);
    const lc = hexCenter(last.col, last.row);
    const pc = hexCenter(prev.col, prev.row);
    const angle = Math.atan2(lc.y - pc.y, lc.x - pc.x);
    const arrLen = 28;
    ctx.save();
    ctx.shadowColor = baseColor + '0.8)';
    ctx.shadowBlur = 10;
    ctx.beginPath();
    ctx.moveTo(lc.x, lc.y);
    ctx.lineTo(lc.x - arrLen * Math.cos(angle - 0.4), lc.y - arrLen * Math.sin(angle - 0.4));
    ctx.moveTo(lc.x, lc.y);
    ctx.lineTo(lc.x - arrLen * Math.cos(angle + 0.4), lc.y - arrLen * Math.sin(angle + 0.4));
    ctx.strokeStyle = color;
    ctx.lineWidth = 8;
    ctx.stroke();
    ctx.restore();
  }

  // 最後に動いたユニットのhex強調（パルスグロー）
  for (const u of G.units) {
    if (!u._lastMovedAt || u.eliminated || u.exited) continue;
    const elapsed = now - u._lastMovedAt;
    if (elapsed > MOVE_PATH_DURATION) continue;
    const { col, row } = parseHexId(u.hexId);
    const center = hexCenter(col, row);
    const pulse = 0.4 + 0.3 * Math.sin(elapsed / 200);
    const glowColor = u.side === 'german' ? `rgba(255,100,100,${pulse})` : `rgba(100,180,255,${pulse})`;
    drawHexPath(center.x, center.y, HEX_SIZE * 1.05);
    ctx.strokeStyle = glowColor;
    ctx.lineWidth = 4;
    ctx.stroke();
  }
}

// ========== ユニット画像プリロード ==========
const unitImgCache = {};
function getUnitImg(u) {
  const isFlipped = u.flipped; // actedでは裏にしない、flippedのみ
  const imgFile = isFlipped && u.imgBack ? u.imgBack : u.img;
  if (!imgFile) return null;
  const base = isFlipped && u.imgBack ? IMG_BACK : IMG_BASE;
  const key = base + imgFile;
  if (!unitImgCache[key]) {
    const img = new Image();
    img.src = key;
    img.onload = () => { if (!unitImgCache[key]._loaded) { unitImgCache[key]._loaded = true; draw(); } };
    unitImgCache[key] = img;
    unitImgCache[key]._loaded = false;
  }
  return unitImgCache[key]._loaded ? unitImgCache[key] : null;
}

// ========== ユニット描画 ==========
const UNIT_COLORS = {
  de: { bg: '#4a4a5a', border: '#777', text: '#fff', flippedBg: '#2a2a35' },
  us: { bg: '#3a6a3a', border: '#5a9a5a', text: '#fff', flippedBg: '#1a3a1a' },
  uk: { bg: '#6a5a3a', border: '#9a8a5a', text: '#fff', flippedBg: '#3a2a1a' },
};

function drawUnits() {
  const unitsByHex = {};
  for (const u of G.units) {
    if (u.eliminated || u.exited) continue;
    if (!unitsByHex[u.hexId]) unitsByHex[u.hexId] = [];
    unitsByHex[u.hexId].push(u);
  }

  for (const [hid, units] of Object.entries(unitsByHex)) {
    const { col, row } = parseHexId(hid);
    const center = hexCenter(col, row);
    const count = units.length;
    const baseSize = HEX_SIZE * 0.92;
    const sz = count > 1 ? baseSize * 0.72 : baseSize;

    for (let i = 0; i < count; i++) {
      const u = units[i];
      const offsetX = count > 1 ? (i === 0 ? -sz * 0.15 : sz * 0.3) : 0;
      const offsetY = count > 1 ? (i === 0 ? sz * 0.15 : -sz * 0.35) : 0;
      const ux = center.x + offsetX;
      const uy = center.y + offsetY;
      const half = sz / 2;
      const isSelected = G.selectedUnit === u;

      // 選択中ハイライト
      if (isSelected) { ctx.shadowColor = '#e94560'; ctx.shadowBlur = 14; }

      // 画像があれば画像で描画
      const img = getUnitImg(u);
      if (img) {
        ctx.drawImage(img, ux - half, uy - half, sz, sz);
        // 選択時の枠
        if (isSelected) {
          ctx.strokeStyle = '#e94560';
          ctx.lineWidth = 3;
          ctx.strokeRect(ux - half, uy - half, sz, sz);
        }
      } else {
        // フォールバック: 色付き矩形+数字
        const colors = UNIT_COLORS[u.nation] || UNIT_COLORS.de;
        const isFlipped = u.flipped;
        ctx.fillStyle = isFlipped ? colors.flippedBg : colors.bg;
        ctx.strokeStyle = isSelected ? '#e94560' : colors.border;
        ctx.lineWidth = isSelected ? 3 : 1.5;
        ctx.beginPath();
        ctx.roundRect(ux - half, uy - half, sz, sz, 4);
        ctx.fill();
        ctx.stroke();

        const power = isFlipped ? u.def : u.atk;
        const fontSize = Math.round(sz * 0.55);
        ctx.fillStyle = colors.text;
        ctx.font = `bold ${fontSize}px monospace`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(power, ux, uy);
      }
      ctx.shadowBlur = 0;
    }
  }
}

// hexを画面中央にパン
function panToHex(hid) {
  const { col, row } = parseHexId(hid);
  const center = hexCenter(col, row);
  const rect = mapArea.getBoundingClientRect();
  panX = rect.width / 2 - center.x * zoom;
  panY = rect.height / 2 - center.y * zoom;
  clampPan();
  draw();
}

// ========== マップ操作 ==========
function pixelToHex(px, py) {
  // canvas座標に変換
  const rect = canvas.getBoundingClientRect();
  const cx = (px - rect.left) / zoom;
  const cy = (py - rect.top) / zoom;

  let closest = null, minDist = Infinity;
  for (let c = 0; c < COLS; c++) {
    for (let r = 0; r < ROWS; r++) {
      const center = hexCenter(c, r);
      const dx = cx - center.x, dy = cy - center.y;
      const dist = dx * dx + dy * dy;
      if (dist < minDist) { minDist = dist; closest = { col: c, row: r }; }
    }
  }
  if (closest && minDist < (HEX_SIZE * 1.2) * (HEX_SIZE * 1.2)) return closest;
  return null;
}

// パン制限: マップが画面外に出すぎないようにする
function clampPan() {
  const W = (mapImg.naturalWidth || 2400) * zoom;
  const H = (mapImg.naturalHeight || 2000) * zoom;
  const rect = mapArea.getBoundingClientRect();
  const vw = rect.width, vh = rect.height;
  if (W >= vw) { panX = Math.max(-W + vw, Math.min(0, panX)); }
  else { panX = (vw - W) / 2; }
  if (H >= vh) { panY = Math.max(-H + vh, Math.min(0, panY)); }
  else { panY = (vh - H) / 2; }
}

// パン
mapArea.addEventListener('mousedown', e => {
  if (e.button === 0) {
    dragStart = { x: e.clientX - panX, y: e.clientY - panY, moved: false };
    mapArea.classList.add('dragging');
  }
});
window.addEventListener('mousemove', e => {
  if (dragStart) {
    const dx = e.clientX - dragStart.x - panX;
    const dy = e.clientY - dragStart.y - panY;
    if (Math.abs(dx) > 3 || Math.abs(dy) > 3) dragStart.moved = true;
    panX = e.clientX - dragStart.x;
    panY = e.clientY - dragStart.y;
    clampPan();
    draw();
  }
});
window.addEventListener('mouseup', e => {
  if (dragStart && !dragStart.moved) {
    handleMapClick(e);
  }
  dragStart = null;
  mapArea.classList.remove('dragging');
});

// スクロール: 通常=パン、Ctrl/Cmd=ズーム
mapArea.addEventListener('wheel', e => {
  e.preventDefault();
  if (e.ctrlKey || e.metaKey) {
    const oldZoom = zoom;
    zoom *= e.deltaY < 0 ? 1.1 : 0.9;
    zoom = Math.max(0.3, Math.min(2.0, zoom));
    const rect = mapArea.getBoundingClientRect();
    const mx = e.clientX - rect.left;
    const my = e.clientY - rect.top;
    panX = mx - (mx - panX) * (zoom / oldZoom);
    panY = my - (my - panY) * (zoom / oldZoom);
    clampPan();
    syncZoomSlider();
  } else {
    panX -= e.deltaX * 1.5;
    panY -= e.deltaY * 1.5;
    clampPan();
  }
  draw();
}, { passive: false });

// ========== マップクリック ==========
function handleMapClick(e) {
  // AI操作中はクリック無効（ただし退却/前進は人間ユニットかもしれないので許可）
  if (G.phase === 'operation' && isAISide(G.activeSide)) {
    if (G.opPhase !== 'retreat' && G.opPhase !== 'advance') return;
    // 退却/前進: 退却ユニットが人間側なら許可
    const ru = G.combat.retreatingUnits && G.combat.retreatingUnits[0];
    const retreatUnit = ru ? G.units.find(u => u.id === ru) : null;
    const advUnit = G.combat.advanceEligible && G.combat.advanceEligible[0] ? G.units.find(u => u.id === G.combat.advanceEligible[0]) : null;
    const checkUnit = G.opPhase === 'retreat' ? retreatUnit : advUnit;
    if (checkUnit && isAISide(checkUnit.side)) return; // AIユニットならブロック
  }
  const hex = pixelToHex(e.clientX, e.clientY);
  if (!hex) return;
  const hid = hexId(hex.col, hex.row);

  // 増援配置モード
  if (G.phase === 'reinforce' && G.reinforceQueue && G.reinforceQueue.length > 0) {
    onReinforceClick(hid);
    return;
  }

  if (G.phase === 'operation') {
    if (G.opPhase === 'select' || G.opPhase === 'move') {
      onMoveClick(hid);
    } else if (G.opPhase === 'attack' || G.opPhase === 'retreat' || G.opPhase === 'advance') {
      onAttackClick(hid);
    }
  }
}

// 増援配置クリック処理
function onReinforceClick(hid) {
  if (!G.reinforceValidHexes || !G.reinforceValidHexes.includes(hid)) return;
  const u = G.reinforceQueue[0];
  u.hexId = hid;
  G.units.push(u);
  addLog('turn', `増援配置: ${u.name} → ${dispHex(hid)}`);
  G.reinforceQueue.shift();
  if (G.reinforceQueue.length > 0) {
    prepareNextReinforce();
  } else {
    G.reinforceValidHexes = null;
    // 全増援配置完了 → 回復フェーズへ
    G.phase = 'recovery';
    startRecoveryPhase();
    updateUI(); draw();
  }
}

// ========== 移動システム ==========
function getMoveCost(fromId, toId, unit) {
  const terrain = TERRAIN_MAP[toId] || 'p';
  if (terrain === 'x') return Infinity;

  const facility = FACILITY_MAP && FACILITY_MAP[toId];
  const fromRoutes = ROAD_MAP[fromId] || [];
  const toRoutes = ROAD_MAP[toId] || [];
  const sharedRoad = fromRoutes.some(r => toRoutes.includes(r));

  // 河川チェック
  let riverCross = false;
  if (RIVER_MAP) {
    const pair1 = fromId + '-' + toId;
    const pair2 = toId + '-' + fromId;
    for (const [a, b] of RIVER_MAP) {
      if ((a === fromId && b === toId) || (a === toId && b === fromId)) {
        riverCross = true;
        break;
      }
    }
  }

  let cost;
  if (sharedRoad) {
    if (unit.side === 'allied') {
      // 連合軍: 道路1/3（森林非機械化は1）
      cost = 1/3;
      if (terrain === 'f' && !isMechanized(unit)) cost = 1;
    } else {
      // ドイツ軍: 道路沿いは1
      cost = 1;
    }
  } else {
    switch (terrain) {
      case 'p': cost = 1; break;
      case 'r': cost = 3; break;
      case 'f': cost = 3; break;
      default: cost = 1;
    }
  }

  // 河川: +2（道路沿いなら不要）
  if (riverCross && !sharedRoad) cost += 2;

  dbg('MoveCost', dispHex(fromId)+'→'+dispHex(toId), {terrain, road:sharedRoad, river:riverCross, cost, unit:unit.name});
  return cost;
}

function isMechanized(unit) {
  return unit.type === 'panzer' || unit.type === 'panzergrenadier';
}

function getUnitsAt(hexId) {
  return G.units.filter(u => u.hexId === hexId && !u.eliminated && !u.exited);
}

function canEnter(hexId, unit) {
  const terrain = TERRAIN_MAP[hexId];
  if (!terrain || terrain === 'x') return false;
  // 敵ユニットのいるhexには入れない
  const occupants = getUnitsAt(hexId);
  if (occupants.some(u => u.side !== unit.side)) return false;
  // スタック制限: 同hex同側2ユニットまで（機械化師団のみ）
  const friendly = occupants.filter(u => u.side === unit.side);
  if (friendly.length >= 1) {
    // 機械化師団ペアのみ可
    if (!unit.mechPair) return false;
    if (friendly.length >= 2) return false;
    if (friendly[0].id !== unit.mechPair) return false;
  }
  return true;
}

function calcReachable(unit) {
  const start = unit.hexId;
  const maxMP = 6; // 全ユニット移動力6
  const dist = new Map();
  const prev = new Map();
  const pq = [[0, start]];
  dist.set(start, 0);

  while (pq.length > 0) {
    pq.sort((a, b) => a[0] - b[0]);
    const [cost, hid] = pq.shift();
    if (cost > dist.get(hid)) continue;

    // ZOC判定: 味方がカバーしている敵のZOCは無効
    // 敵ZOCから敵ZOCへの1hex移動は可能
    if (hid !== start) {
      let zocLog = [];
      const hasActiveEnemyZOC = getNeighborIds(hid).some(adj => {
        const enemies = getUnitsAt(adj).filter(e => e.side !== unit.side);
        if (enemies.length === 0) return false;
        // この敵hexに味方が隣接していればZOC無効（移動中のユニット自身は除く）
        const covers = getNeighborIds(adj).filter(fn =>
          getUnitsAt(fn).some(f => f.side === unit.side && f.id !== unit.id)
        );
        const active = covers.length === 0;
        zocLog.push({enemyHex:dispHex(adj), enemies:enemies.map(e=>e.name), coveredBy:covers.map(c=>dispHex(c)), active});
        return active;
      });
      if (zocLog.length > 0) {
        dbg('ZOC', dispHex(hid), 'unit:', unit.name, 'stop:', hasActiveEnemyZOC, zocLog);
      }
      if (hasActiveEnemyZOC) {
        continue;
      }
    }

    const nids = getNeighborIds(hid);
    for (const nid of nids) {
      const terrain = TERRAIN_MAP[nid];
      if (!terrain || terrain === 'x') continue;
      // 敵がいるhexには入れない
      if (getUnitsAt(nid).some(u => u.side !== unit.side)) continue;
      const mc = getMoveCost(hid, nid, unit);
      const nc = cost + mc;
      if (nc <= maxMP && (!dist.has(nid) || nc < dist.get(nid))) {
        dist.set(nid, nc);
        prev.set(nid, hid);
        pq.push([nc, nid]);
      }
    }
  }

  dist.delete(start);
  const result = new Map();
  for (const [hid, cost] of dist) {
    // 停止可能チェック: 味方がいるhexには停止不可（mechPairのみ例外）
    const friendly = getUnitsAt(hid).filter(u => u.side === unit.side);
    if (friendly.length > 0) {
      if (!unit.mechPair) continue; // スタック不可
      if (friendly.length >= 2) continue; // 既に2ユニット
      if (friendly[0].id !== unit.mechPair) continue; // ペア相手ではない
    }
    // パスを逆算
    const path = [];
    let cur = hid;
    while (cur && cur !== start) {
      path.unshift(cur);
      cur = prev.get(cur);
    }
    result.set(hid, { cost, path });
  }
  return result;
}

function onMoveClick(hid) {
  // ユニット選択
  const units = getUnitsAt(hid).filter(u => u.side === G.activeSide && !u.acted && !u.flipped);
  if (units.length > 0 && (!G.selectedUnit || !G.reachable || !G.reachable.has(hid))) {
    G.selectedUnit = units[0];
    G.reachable = calcReachable(G.selectedUnit);
    G.opPhase = 'move';
    updateRightPanel();
    draw();
    return;
  }

  // 移動実行
  if (G.selectedUnit && G.reachable && G.reachable.has(hid)) {
    const info = G.reachable.get(hid);
    const fromHex = G.selectedUnit.hexId;
    // スタック判定は移動前に行う（hexId変更前）
    const stacked = isStacked(G.selectedUnit);
    const pair = stacked ? G.units.find(u => u.id === G.selectedUnit.mechPair) : null;
    // 経路を記録（移動元を先頭に追加）
    G.selectedUnit.movePath = [fromHex, ...info.path];
    G.selectedUnit.hexId = hid;
    G.selectedUnit.acted = true;
    // スタック中なら相方も一緒に移動
    if (stacked && pair && !pair.acted) {
      pair.hexId = hid;
      pair.acted = true;
      pair.movePath = [fromHex, ...info.path];
      addLog('move', `${pair.name} → ${dispHex(hid)} (スタック移動)`);
    }
    // 裏にはしない — 相手の手番開始時にまとめて裏にする
    const pathStr = G.selectedUnit.movePath.map(h => dispHex(h)).join('→');
    addLog('move', `${G.selectedUnit.name}: ${pathStr} (${info.cost.toFixed(1)}MP)`);

    // 隣接敵チェック → 攻撃フェーズへ
    const movedUnit = G.selectedUnit;
    const adjEnemy = getNeighborIds(hid).some(nid =>
      getUnitsAt(nid).some(u => u.side !== G.activeSide)
    );
    G.selectedUnit = null;
    G.reachable = null;

    if (adjEnemy) {
      // 敵隣接 → この1ユニットで攻撃フェーズ（必須）
      movedUnit.mustAttack = true;
      if (stacked && pair) pair.mustAttack = true;
      G.opPhase = 'attack';
      resetCombat();
      addLog('turn', `━ ${movedUnit.name} 攻撃フェーズ ━`);
    } else {
      // 敵隣接なし → 即サイド切替
      movedUnit.flipped = true; expireMovePath(movedUnit);
      if (stacked && pair) { pair.flipped = true; expireMovePath(pair); }
      switchSide();
    }
    updateRightPanel();
    draw();
  }
}

// ========== 戦闘システム ==========
function resetCombat() {
  G.combat = { defHex: null, attackers: [], defenders: [], result: null, retreatingUnits: [], advanceEligible: [] };
}

function onAttackClick(hid) {
  const enemySide = G.activeSide === 'german' ? 'allied' : 'german';

  if (G.opPhase === 'attack') {
    // 敵hexクリック → 防御対象選択
    const defenders = getUnitsAt(hid).filter(u => u.side === enemySide);
    if (defenders.length > 0) {
      resetCombat();
      G.combat.defHex = hid;
      G.combat.defenders = defenders;
      // 隣接自軍を攻撃候補としてハイライト
      G.attackTargets = new Set([hid]);
      updateRightPanel();
      draw();
      return;
    }

    // 自軍hexクリック → 攻撃参加トグル
    if (G.combat.defHex) {
      const myUnits = getUnitsAt(hid).filter(u => u.side === G.activeSide && u.acted);
      // このhexが防御hexに隣接しているか
      if (myUnits.length > 0 && getNeighborIds(G.combat.defHex).includes(hid)) {
        for (const u of myUnits) {
          const idx = G.combat.attackers.indexOf(u.id);
          if (idx >= 0) G.combat.attackers.splice(idx, 1);
          else G.combat.attackers.push(u.id);
        }
        updateRightPanel();
        draw();
        return;
      }
    }
  }

  // 退却先選択
  if (G.opPhase === 'retreat') {
    const ru = G.combat.retreatingUnits[0];
    if (!ru) return;
    const unit = G.units.find(u => u.id === ru);
    if (!unit) return;
    // 退却先として有効か
    const validRetreats = getRetreatHexes(unit);
    if (validRetreats.includes(hid)) {
      unit.hexId = hid;
      addLog('combat', `${unit.name} → ${dispHex(hid)} に退却`);
      G.combat.retreatingUnits.shift();
      if (G.combat.retreatingUnits.length === 0) {
        // 退却完了 → 戦闘後前進チェック
        checkAdvance();
      }
      updateRightPanel();
      draw();
    }
    return;
  }

  // 戦闘後前進
  if (G.opPhase === 'advance') {
    if (hid === G.combat.defHex && G.combat.advanceEligible.length > 0) {
      const uid = G.combat.advanceEligible[0];
      const unit = G.units.find(u => u.id === uid);
      if (unit) {
        // 装甲部隊が森に前進する場合、道路経由でのみ可能
        const defTerrain = TERRAIN_MAP[hid];
        if (defTerrain === 'f' && isMechanized(unit)) {
          const fromRoutes = ROAD_MAP[unit.hexId] || [];
          const toRoutes = ROAD_MAP[hid] || [];
          const sharedRoad = fromRoutes.some(r => toRoutes.includes(r));
          if (!sharedRoad) {
            addLog('combat', `${unit.name}: 装甲部隊は道路なしで森に前進不可`);
            G.combat.advanceEligible.shift();
            if (G.combat.advanceEligible.length === 0) finishCombat();
            updateRightPanel(); draw();
            return;
          }
        }
        G.combat.advanceEligible.shift();
        unit.hexId = hid;
        addLog('combat', `${unit.name} → ${dispHex(hid)} に前進`);
      }
    }
    if (G.combat.advanceEligible.length === 0) {
      finishCombat();
    }
    updateRightPanel();
    draw();
    return;
  }
}

function getRetreatHexes(unit) {
  // BFS: 味方がいるhexを通過して空きhexを探す（退却時は味方カバー無効）
  const result = [];
  const visited = new Set([unit.hexId]);
  const queue = [unit.hexId]; // BFS開始

  while (queue.length > 0) {
    const cur = queue.shift();
    const neighbors = getNeighborIds(cur);
    for (const nid of neighbors) {
      if (visited.has(nid)) continue;
      visited.add(nid);
      const terrain = TERRAIN_MAP[nid];
      if (!terrain || terrain === 'x') continue;
      // 敵がいるhexには退却不可
      if (getUnitsAt(nid).some(u => u.side !== unit.side)) continue;
      // 敵ZOCには退却不可（退却時は味方カバー無効 — 敵ZOCは常に有効）
      const inEnemyZOC = getNeighborIds(nid).some(adj =>
        getUnitsAt(adj).some(e => e.side !== unit.side && !e.eliminated)
      );
      if (inEnemyZOC) continue;

      // 味方がいるか
      const friendly = getUnitsAt(nid).filter(u => u.side === unit.side);
      if (friendly.length === 0 || (unit.mechPair && friendly.length < 2 && friendly[0].id === unit.mechPair)) {
        // 空きhex（またはmechPair可能）→ 退却先候補
        result.push(nid);
      } else {
        // 味方がいる → 通過してさらに奥を探索
        queue.push(nid);
      }
    }
  }
  dbg('RETREAT', unit.name, 'from:', dispHex(unit.hexId), 'valid:', result.map(h=>dispHex(h)));
  return result;
}

function executeCombat() {
  const cb = G.combat;
  if (!cb.defHex || cb.attackers.length === 0) return;

  const attackers = cb.attackers.map(id => G.units.find(u => u.id === id)).filter(Boolean);
  const defenders = cb.defenders;
  const defHexId = cb.defHex;

  const atkPower = attackers.reduce((s, u) => s + (u.flipped ? u.def : u.atk), 0);
  const defPower = defenders.reduce((s, u) => s + (u.flipped ? u.def : u.atk), 0);
  let diff = atkPower - defPower;

  // 戦闘支援: 防御hexに隣接する自軍hexで、攻撃者を除いた味方がいるhex数
  const facility = FACILITY_MAP && FACILITY_MAP[defHexId];
  let support = 0;
  if (facility !== 'c') {
    for (const nid of getNeighborIds(defHexId)) {
      const friendly = getUnitsAt(nid).filter(u => u.side === G.activeSide && !cb.attackers.includes(u.id));
      if (friendly.length > 0) support++;
    }
  }

  // 森林防御: +1段階シフト（差分から引く）
  const terrain = TERRAIN_MAP[defHexId];
  const forestMod = terrain === 'f' ? 1 : 0;

  // ダイスロール (1d6) + 戦闘支援 - 森林修正
  const die = Math.floor(Math.random() * 6) + 1;
  const modDie = die + support - forestMod;

  // CRT参照
  const result = lookupCRT(diff, modDie);
  cb.result = result;

  dbg('COMBAT', {
    defHex: dispHex(defHexId), terrain, facility,
    attackers: attackers.map(u => ({name:u.name, hex:dispHex(u.hexId), atk:u.atk, def:u.def, flipped:u.flipped, power:u.flipped?u.def:u.atk})),
    defenders: defenders.map(u => ({name:u.name, hex:dispHex(u.hexId||defHexId), atk:u.atk, def:u.def, flipped:u.flipped, power:u.flipped?u.def:u.atk})),
    atkPower, defPower, diff, support, forestMod, die, modDie, result
  });
  addLog('combat', `━━━ 戦闘解決 ━━━`);
  addLog('combat', `攻撃力: ${atkPower} vs 防御力: ${defPower} (差分: ${diff > 0 ? '+' : ''}${diff})`);
  if (support > 0) addLog('combat', `戦闘支援: +${support}`);
  if (forestMod > 0) addLog('combat', `森林防御: -${forestMod}`);
  addLog('combat', `ダイス: ${die}${support || forestMod ? ` → 修正後: ${modDie}` : ''} → 結果: ${result}`);

  // 右パネルに戦闘結果を大きく表示
  const RESULT_NAMES_JP = { AR:'攻撃側退却', NE:'効果なし', DR:'防御側退却', DD:'防御側混乱', EX:'相互損害', DE:'防御側壊滅' };
  const panel = document.getElementById('actionPanel');
  panel.innerHTML = `
    <div style="text-align:center;padding:10px;">
      <div style="font-size:0.9em;color:#aaa;margin-bottom:8px;">攻撃 ${atkPower} vs 防御 ${defPower} (${diff > 0 ? '+' : ''}${diff})</div>
      ${support > 0 ? `<div style="color:#79c0ff;font-size:0.85em;">戦闘支援 +${support}</div>` : ''}
      ${forestMod > 0 ? `<div style="color:#3fb950;font-size:0.85em;">森林防御 -${forestMod}</div>` : ''}
      <div class="dice-result" style="margin:12px 0;">🎲 ${die}${(support || forestMod) ? ` → ${modDie}` : ''}</div>
      <div style="font-size:2em;font-weight:bold;color:${result === 'DE' ? '#e94560' : result === 'NE' ? '#aaa' : '#ffa657'};margin:8px 0;">${RESULT_NAMES_JP[result] || result}</div>
      <div style="font-size:1.1em;color:#888;margin-top:4px;">(${result})</div>
    </div>`;

  // 攻撃参加ユニットのmustAttackをクリア
  for (const u of attackers) { delete u.mustAttack; }

  // AI戦闘は長めに表示して結果を確認できるようにする
  const delay = isAISide(G.activeSide) ? 3000 : 1500;
  setTimeout(() => applyCombatResult(result, attackers, defenders, defHexId), delay);
}

function applyCombatResult(result, attackers, defenders, defHexId) {
  const cb = G.combat;
  const RESULT_NAMES = { AR:'攻撃側退却', NE:'効果なし', DR:'防御側退却', DD:'防御側混乱退却', EX:'相互損害', DE:'防御側壊滅' };
  addLog('combat', `→ ${RESULT_NAMES[result] || result}`);

  switch (result) {
    case 'AR':
      cb.retreatingUnits = attackers.map(u => u.id);
      G.opPhase = 'retreat';
      updateRightPanel();
      draw();
      scheduleAI(600);
      return;
    case 'NE':
      finishCombat();
      return;
    case 'DR':
      cb.retreatingUnits = defenders.map(u => u.id);
      G.opPhase = 'retreat';
      updateRightPanel();
      draw();
      scheduleAI(600);
      return;
    case 'DD':
      for (const u of defenders) u.flipped = true;
      cb.retreatingUnits = defenders.map(u => u.id);
      G.opPhase = 'retreat';
      updateRightPanel();
      draw();
      scheduleAI(600);
      return;
    case 'EX':
      // 攻撃側1ユニット除去、防御側1ユニット除去
      eliminateUnit(attackers[0]);
      eliminateUnit(defenders[0]);
      // 残り防御側がいなければ前進可能
      if (defenders.filter(u => !u.eliminated).length === 0) {
        checkAdvance();
      } else {
        finishCombat();
      }
      return;
    case 'DE':
      for (const u of defenders) eliminateUnit(u);
      checkAdvance();
      return;
  }
}

function checkAdvance() {
  const cb = G.combat;
  dbg('checkAdvance', {defHex:cb.defHex, attackers:cb.attackers});
  if (!cb.defHex) { finishCombat(); return; }
  // 防御hexが空なら攻撃側が前進可能
  const remaining = getUnitsAt(cb.defHex).filter(u => !u.eliminated);
  if (remaining.length === 0) {
    const attackers = cb.attackers.map(id => G.units.find(u => u.id === id)).filter(u => u && !u.eliminated);
    if (attackers.length > 0) {
      cb.advanceEligible = attackers.map(u => u.id);
      G.opPhase = 'advance';
      addLog('combat', `戦闘後前進: ${dispHex(cb.defHex)} をクリックで前進（スキップ可）`);
      updateRightPanel();
      draw();
      scheduleAI(600);
      return;
    }
  }
  finishCombat();
}

function finishCombat() {
  dbg('finishCombat', {side:G.activeSide, defHex:G.combat.defHex});
  // 操作ユニットを裏にする
  G.units.filter(u => u.side === G.activeSide && u.acted && !u.flipped).forEach(u => {
    u.flipped = true; expireMovePath(u);
  });
  resetCombat();
  G.attackTargets = null;
  // 1ユニット操作完了 → サイド切替
  switchSide();
}

function skipAdvance() {
  G.combat.advanceEligible = [];
  finishCombat();
}

function eliminateUnit(unit) {
  unit.eliminated = true;
  unit.hexId = 'eliminated';
  addLog('combat', `${unit.name} 除去`);
}

// ========== ターン管理 ==========
function endPhase() {
  dbg('endPhase', {phase:G.phase, opPhase:G.opPhase, side:G.activeSide});
  // AI操作中は人間のボタンクリック無効（AI自身からの呼び出しは許可）
  if (G.phase === 'operation' && isAISide(G.activeSide) && !aiRunning) return;
  G.passCount = 0; // 通常のフェーズ終了ではパスカウントリセット
  if (G.phase === 'reinforce') {
    placeReinforcements();
    // 人間の手動配置待ちの場合はここで止める
    if (G.reinforceQueue && G.reinforceQueue.length > 0) return;
    G.phase = 'recovery';
    startRecoveryPhase();
    updateUI(); draw();
    return;
  } else if (G.phase === 'recovery') {
    // 回復フェーズ完了 → 作戦フェーズへ
    addLog('turn', `回復フェーズ完了`);
    G.phase = 'operation';
    G.opPhase = 'select';
    G.activeSide = 'german';
    G.germanDone = false;
    G.alliedDone = false;
    addLog('turn', `ターン${G.turn} 作戦フェーズ開始 — ドイツ軍`);
  } else if (G.phase === 'operation' && (G.opPhase === 'attack')) {
    // 攻撃必須チェック: mustAttackフラグが残っているユニットがいれば終了不可
    const mustAttackUnits = G.units.filter(u =>
      u.side === G.activeSide && u.mustAttack && !u.eliminated && !u.exited
    );
    if (mustAttackUnits.length > 0 && !isAISide(G.activeSide)) {
      addLog('combat', `攻撃必須のユニットがあります: ${mustAttackUnits.map(u => u.name).join(', ')}`);
      return;
    }
    // mustAttackフラグをクリア
    G.units.filter(u => u.side === G.activeSide).forEach(u => { delete u.mustAttack; });
    // 1ユニット操作完了 → 相手側へ交代
    switchSide();
  }
  G.selectedUnit = null;
  G.reachable = null;
  G.attackTargets = null;
  updateUI();
  draw();

  // AIチェック（フラッシュ表示のため長めに待つ）
  scheduleAI(2000);
}

// 1ユニット操作後のサイド切り替え
function switchSide() {
  dbg('switchSide', {from:G.activeSide});
  // 操作済みユニットを裏にする（今操作した1ユニット分）
  // actedかつまだflippedでないユニットをflip
  G.units.filter(u => u.side === G.activeSide && u.acted && !u.flipped).forEach(u => {
    u.flipped = true; expireMovePath(u);
  });
  // サイド切り替え
  const nextSide = G.activeSide === 'german' ? 'allied' : 'german';
  G.activeSide = nextSide;
  G.opPhase = 'select';
  G.passCount = 0; // 操作したらパスカウントリセット
  G.selectedUnit = null;
  G.reachable = null;
  G.attackTargets = null;
  const sideName = nextSide === 'german' ? 'ドイツ軍' : '連合軍';
  addLog('turn', `${sideName}の手番`);
  // 人間vsAI: 人間の手番に戻る時は確認待ち（フラッシュは確認後に出す）
  if (!isAISide(nextSide) && G.mode !== 'hotseat' && G.mode !== 'watch') {
    G._awaitConfirm = true;
    updateUI();
    draw();
    updateRightPanel();
    return; // 自動進行しない
  }
  showFlash(`${sideName}の手番`, nextSide);
  updateUI();
  draw();
  // AIチェック（フラッシュが見えるよう長めに待つ）
  scheduleAI(1800);
}

function nextTurn() {
  G.turn++;
  if (G.turn > G.maxTurn) {
    endGame();
    return;
  }
  G.phase = 'reinforce';
  G.units.forEach(u => { u.acted = false; u.mustAttack = false; delete u.movePath; delete u._movePathExpiry; delete u._lastMovedAt; delete u._unstacked; delete u._aiAttacked; });
  addLog('turn', `═══ ターン${G.turn} ═══`);
  updateUI();
  draw();

  // AIチェック
  scheduleAI(800);
}

function getEntryHexes(tag) {
  const hexes = [];
  if (typeof TAG_MAP !== 'undefined') {
    for (const [hid, t] of Object.entries(TAG_MAP)) {
      if (t === tag) hexes.push(hid);
    }
  }
  return hexes;
}

function getValidEntryHexes(u) {
  if (!u.entryTag) return [];
  const entryHexes = getEntryHexes(u.entryTag);
  return entryHexes.filter(hid => {
    // 敵がいるhexは不可
    if (getUnitsAt(hid).some(o => o.side !== u.side)) return false;
    // スタックチェック
    const friendlyCount = getUnitsAt(hid).filter(o => o.side === u.side).length;
    if (friendlyCount === 0) return true;
    if (u.mechPair && friendlyCount < 2) return true;
    return false;
  });
}

function prepareNextReinforce() {
  const u = G.reinforceQueue[0];
  G.reinforceValidHexes = getValidEntryHexes(u);
  if (G.reinforceValidHexes.length === 0) {
    addLog('turn', `${u.name}: 登場hex使用不可 → 次ターンに延期`);
    G.reinforceQueue.shift();
    if (G.reinforceQueue.length > 0) { prepareNextReinforce(); return; }
    G.reinforceValidHexes = null;
  }
  updateUI(); draw();
}

function placeReinforcements() {
  // 同ターン二重実行防止
  if (!G._reinforcedTurns) G._reinforcedTurns = [];
  if (G._reinforcedTurns.includes(G.turn)) return;
  G._reinforcedTurns.push(G.turn);

  const reinforcements = REINFORCEMENTS[G.turn];
  if (!reinforcements || reinforcements.length === 0) return;

  // 配置キューを作成
  G.reinforceQueue = [];
  for (const rUnit of reinforcements) {
    if (rUnit.nation === 'uk') continue;
    const u = Object.assign({}, rUnit, {
      acted: false, flipped: false, eliminated: false, exited: false
    });
    if (!u.entryTag && u.hexId) {
      // hexId直接指定 → 自動配置
      G.units.push(u);
      addLog('turn', `増援: ${u.name} → ${dispHex(u.hexId)}`);
    } else if (u.entryTag) {
      G.reinforceQueue.push(u);
    }
  }

  // AI側は自動配置
  const aiUnits = G.reinforceQueue.filter(u => isAISide(u.side));
  const humanUnits = G.reinforceQueue.filter(u => !isAISide(u.side));
  for (const u of aiUnits) {
    const valid = getValidEntryHexes(u);
    if (valid.length > 0) {
      u.hexId = valid[0];
      G.units.push(u);
      addLog('turn', `増援: ${u.name} → ${dispHex(u.hexId)}`);
    } else {
      addLog('turn', `${u.name}: 登場hex使用不可 → 次ターンに延期`);
    }
  }

  // 人間側は手動配置
  G.reinforceQueue = humanUnits;
  if (G.reinforceQueue.length > 0) {
    prepareNextReinforce();
  }
}

function startRecoveryPhase() {
  // 連合軍: 全ターン自動回復
  let alRecovered = 0;
  for (const u of G.units) {
    if (u.side !== 'allied' || !u.flipped || u.eliminated) continue;
    u.flipped = false;
    alRecovered++;
  }
  if (alRecovered > 0) addLog('turn', `連合軍: ${alRecovered}ユニット回復`);

  // ドイツ軍: ターンごとに燃料制限
  const deFlipped = G.units.filter(u => u.side === 'german' && u.flipped && !u.eliminated);

  // 燃料集積所ボーナス
  const hasFuel = getUnitsAt('1304').some(f => f.side === 'german');
  const fuelBonus = hasFuel ? 2 : 0;

  // 回復上限を計算
  let recoveryMax = 0;
  let isDiceMode = false;
  if (G.turn <= 2) {
    recoveryMax = deFlipped.length; // 全回復
  } else if (G.turn === 3) {
    recoveryMax = 12 + fuelBonus;
  } else if (G.turn === 4) {
    recoveryMax = 10 + fuelBonus;
  } else {
    isDiceMode = true; // ターン5-6はダイス判定
  }

  if (deFlipped.length === 0) {
    addLog('turn', `ドイツ軍: 回復対象なし`);
    // 回復対象なし → 自動で作戦フェーズへ
    G.phase = 'recovery';
    return;
  }

  if (isDiceMode) {
    // ターン5-6: 自動ダイス判定
    let recovered = 0, failed = 0;
    for (const u of deFlipped) {
      const die = Math.floor(Math.random() * 6) + 1;
      const mechBonus = isMechanized(u) ? fuelBonus : 0;
      const total = die + 4 + mechBonus;
      if (total >= 7) {
        u.flipped = false;
        recovered++;
        addLog('turn', `${u.name}: 回復 (D${die}+4${mechBonus ? '+2燃料' : ''}=${total})`);
      } else {
        failed++;
        addLog('turn', `${u.name}: 回復失敗 (D${die}+4${mechBonus ? '+2燃料' : ''}=${total})`);
      }
    }
    if (recovered > 0) addLog('turn', `ドイツ軍: ${recovered}ユニット回復`);
    if (failed > 0) addLog('turn', `ドイツ軍: ${failed}ユニット回復失敗`);
    return;
  }

  // ターン1-4: 手動選択モード
  G.recovery = {
    max: Math.min(recoveryMax, deFlipped.length),
    remaining: Math.min(recoveryMax, deFlipped.length),
    recovered: [],  // 回復済みユニットID
    fuelBonus: fuelBonus,
  };

  if (G.turn <= 2) {
    // ターン1-2: 全回復（自動）
    for (const u of deFlipped) {
      u.flipped = false;
      G.recovery.recovered.push(u.id);
    }
    G.recovery.remaining = 0;
    addLog('turn', `ドイツ軍: 全${deFlipped.length}ユニット回復（燃料制限なし）`);
  }
  addLog('turn', `ドイツ軍 回復フェーズ: 上限${G.recovery.max}ユニット`);
}

function recoverUnit(id) {
  if (!G.recovery || G.recovery.remaining <= 0) return;
  const unit = G.units.find(u => u.id === id);
  if (!unit || !unit.flipped || unit.eliminated || unit.side !== 'german') return;
  unit.flipped = false;
  G.recovery.recovered.push(id);
  G.recovery.remaining--;
  addLog('turn', `${unit.name} 回復`);
  updateRightPanel();
  draw();
}

function undoRecovery() {
  if (!G.recovery || G.recovery.recovered.length === 0) return;
  const lastId = G.recovery.recovered.pop();
  const unit = G.units.find(u => u.id === lastId);
  if (unit) {
    unit.flipped = true;
    G.recovery.remaining++;
    addLog('turn', `${unit.name} 回復取消`);
  }
  updateRightPanel();
  draw();
}

function endGame() {
  // VP計算
  calcVP();
  const winner = G.vpGerman > G.vpAllied ? 'ドイツ軍' : G.vpGerman < G.vpAllied ? '連合軍' : '引き分け';
  addLog('turn', `═══ ゲーム終了 ═══`);
  addLog('turn', `独${G.vpGerman}VP vs 連${G.vpAllied}VP → ${winner}の勝利！`);
  updateUI();
}

function calcVP() {
  // 都市VP
  G.vpGerman = 0;
  G.vpAllied = 0;
  if (FACILITY_MAP) {
    for (const [hid, fac] of Object.entries(FACILITY_MAP)) {
      if (fac !== 'c') continue;
      const hasGerman = getUnitsAt(hid).some(u => u.side === 'german');
      if (hasGerman) G.vpGerman++;
      else G.vpAllied++;
    }
  }
  // NW突破ボーナス
  const exitCount = G.units.filter(u => u.side === 'german' && u.exited && u._exitedNW).length;
  G.vpGerman += exitCount;
  // 英軍投入VP
  if (G.britishDeployedTurn > 0) {
    G.vpGerman += BRITISH_VP_COST[G.britishDeployedTurn] || 0;
  }
}

// NW突破hexリスト
function getNWExitHexes() {
  const hexes = [];
  if (typeof TAG_MAP !== 'undefined') {
    for (const [hid, t] of Object.entries(TAG_MAP)) {
      if (t === 'reinforce_nw') hexes.push(hid);
    }
  }
  return hexes;
}

// イギリス軍投入VP: T3=4, T4=2, T5=1, T6=0
const BRITISH_VP_COST = { 3: 4, 4: 2, 5: 1, 6: 0 };

function getBritishPendingUnits() {
  // まだ投入されていない英軍ユニット（全ターンの増援から収集）
  if (G.britishDeployedTurn > 0) return []; // 既に投入済み
  const pending = [];
  for (const turn of [3, 4, 5, 6]) {
    const rein = REINFORCEMENTS[turn];
    if (!rein) continue;
    for (const u of rein) {
      if (u.nation === 'uk') pending.push(u);
    }
  }
  return pending;
}

function deployBritish() {
  G.britishDeployedTurn = G.turn;
  const vpCost = BRITISH_VP_COST[G.turn] || 0;
  addLog('turn', `英軍投入! (ドイツ軍 +${vpCost}VP)`);

  // 全英軍ユニットを配置
  function getEntryHexes(tag) {
    const hexes = [];
    if (typeof TAG_MAP !== 'undefined') {
      for (const [hid, t] of Object.entries(TAG_MAP)) {
        if (t === tag) hexes.push(hid);
      }
    }
    return hexes;
  }

  for (const turn of [3, 4, 5, 6]) {
    const rein = REINFORCEMENTS[turn];
    if (!rein) continue;
    for (const rUnit of rein) {
      if (rUnit.nation !== 'uk') continue;
      const u = Object.assign({}, rUnit, {
        acted: false, flipped: false, eliminated: false, exited: false
      });
      if (u.entryTag) {
        const entryHexes = getEntryHexes(u.entryTag);
        let placed = false;
        for (const hid of entryHexes) {
          const occupants = getUnitsAt(hid);
          const friendlyCount = occupants.filter(o => o.side === u.side).length;
          if (friendlyCount === 0 || (u.mechPair && friendlyCount < 2)) {
            u.hexId = hid; placed = true; break;
          }
        }
        if (!placed && entryHexes.length > 0) u.hexId = entryHexes[0];
        else if (!placed) continue;
      }
      if (!u.hexId) continue;
      G.units.push(u);
      addLog('turn', `英軍増援: ${u.name} → ${dispHex(u.hexId)}`);
    }
  }

  calcVP();
  updateUI();
  draw();
}

function skipBritish() {
  addLog('turn', `英軍投入を見送り（現在T${G.turn}: 投入時 独+${BRITISH_VP_COST[G.turn] || 0}VP）`);
  updateRightPanel();
}

function canExitNW(unit) {
  if (!unit || unit.side !== 'german' || !isMechanized(unit)) return false;
  if (unit.eliminated || unit.exited || unit.acted) return false;
  return getNWExitHexes().includes(unit.hexId);
}

function exitUnitNW(id) {
  const unit = G.units.find(u => u.id === id);
  if (!unit || unit.side !== 'german' || !isMechanized(unit)) return;
  const nwHexes = getNWExitHexes();
  if (!nwHexes.includes(unit.hexId)) return;
  unit.exited = true;
  unit._exitedNW = true;
  unit.acted = true;
  unit.hexId = 'exited';
  addLog('turn', `${unit.name} NW突破! (+1VP)`);
  // 選択解除
  G.selectedUnit = null;
  G.reachable = null;
  G.opPhase = 'select';
  // 突破マーカー記録
  if (!G.exitMarkers) G.exitMarkers = [];
  G.exitMarkers.push(unit.hexId);
  calcVP();
  updateUI();
  draw();
}

// ========== UI更新 ==========

  const phaseNames = { reinforce: '増援フェーズ', recovery: '回復フェーズ', operation: '作戦フェーズ' };

      html += '</div>';
      html += `<div class="section" style="display:flex;gap:8px;">

        }).join(', ');
        const atkTotal = cb.attackers.reduce((s, id) => { const u = G.units.find(x => x.id === id); return s + (u ? (u.flipped ? u.def : u.atk) : 0); }, 0);

          ? `<div style="color:#5f5;margin:4px 0;">退却可能: ${retreatHexes.map(h => dispHex(h)).join(', ')}</div><div>緑色のhexをクリックしてください</div>`

      let html = '<div class="section"><h4>ユニット一覧</h4>';
      for (const u of sideUnits) {
        const status = u.acted ? '✓' : u.flipped ? '混乱' : '';
        html += `<div class="unit-card" onclick="selectUnit('${u.id}')">

          <span class="stats">${u.atk}/${u.def} ${status}</span>
