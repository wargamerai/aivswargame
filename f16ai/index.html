        // ===== RH発射・ロックオンフェイズ =====
        async function startRHLaunchPhase() {
            currentPhase = 'RH_LAUNCH';
            currentOrderIndex = 0;
            showPhaseSplash('🚀 RH発射フェイズ', '#4499ff');
            updatePhaseBadge('RH_LAUNCH');
            console.log(`[RH_LAUNCH] フェイズ開始 Turn:${gameTurn} 機体数:${turnOrder.length}`);
            updateTopBar();
            await processNextRHLaunchUnit();
        }

        async function processNextRHLaunchUnit() {
            console.log(`[RH_LAUNCH] processNext: orderIndex:${currentOrderIndex} / ${turnOrder.length}`);
            if (currentOrderIndex >= turnOrder.length) {
                // 全機体終了 → 次ターンへ
                addLog(`🚀 [RH発射フェイズ] 全機体終了`);
                let delay = (gameConfig && gameConfig.mode === 'WATCH_FAST') ? 0 : 300;
                setTimeout(() => { if (checkGameState()) return; gameTurn++; startNewTurn(); }, delay);
                return;
            }

            let o = turnOrder[currentOrderIndex];
            let u = units[o.index];

            if (u.status !== 'alive') {
                currentOrderIndex++;
                await processNextRHLaunchUnit();
                return;
            }

            // RHミサイルを持っていない機体はスキップ
            if (!u.missiles || (u.missiles.rh <= 0 && !u.lockOnTargetId && !u.rhMissileInFlight)) {
                currentOrderIndex++;
                await processNextRHLaunchUnit();
                return;
            }

            activeUnitIndex = o.index;
            updateTopBar();
            console.log(`[RH_LAUNCH] 処理中: ${u.id} isAI:${isAIControl(u)} index:${o.index}`);

            if (isAIControl(u)) {
                // AI処理
                let enemies = units.filter(t => t.team !== u.team && t.status === 'alive');
                let attackInfo = AI.decideAttack(u, enemies);
                let delay = (gameConfig && gameConfig.mode === 'WATCH_FAST') ? 0 : 800;
                setTimeout(async () => {
                    if (attackInfo.type === 'RH_FIRE') {
                        await executeRHLaunch(attackInfo.targetId);
                    } else if (attackInfo.type === 'RH_LOCK') {
                        u.lockOnTargetId = attackInfo.targetId;
                        addLog(`📡 ${u.id} が ${attackInfo.targetId} をロックオンしました！`);
                    } else if (attackInfo.type === 'RH_KEEP') {
                        addLog(`📡 ${u.id} がロックオンを継続しました。`);
                    } else {
                        addLog(`📡 ${u.id} はRH行動なし。`);
                    }
                    currentOrderIndex++;
                    await processNextRHLaunchUnit();
                }, delay);
            } else {
                // プレイヤー処理 - 操作完了まで待機
                await new Promise(resolve => openRHLaunchMenu(resolve));
                currentOrderIndex++;
                await processNextRHLaunchUnit();
            }
        }

        async function openRHLaunchMenu(onDone) {
            let u = units[activeUnitIndex];
            console.log(`[RH_LAUNCH] openRHLaunchMenu: ${u.id} (index:${activeUnitIndex}, orderIndex:${currentOrderIndex})`);
            let area = document.getElementById('attack-controls-area');
            area.innerHTML = '';
            currentFireOptions = [];

            let targets = units.filter(t => t.id !== u.id && t.status === 'alive' && t.team !== u.team);
            let mType = u.missileType;
            let canAct = false;

            targets.forEach(t => {
                let dist = getHexDistance(u, t);
                let tx = t.x * hStep;
                let ty = t.y * vStep + (t.x % 2) * (vStep / 2);
                let arc = getArcToPoint(u, tx, ty, t);
                let altDiff = Math.abs(u.altitude - t.altitude);
                let rhVal = getMissileTargetValue('RH', mType, dist);

                if (arc === "前方" && altDiff <= 3 && rhVal > 0) {
                    let rhPct = Math.min(100, (()=>{ let n=0; for(let a=1;a<=6;a++) for(let b=1;b<=6;b++) if(a+b<=rhVal) n++; return Math.round(n/36*100); })());

                    if (u.lockOnTargetId === t.id) {
                        if (u.missiles.rh > 0 && (!u.rhMissileInFlight || u.rhMissileInFlight.targetId !== t.id)) {
                            addFireOption(area, `🚀 RHミサイル発射 vs ${t.id} [命中${rhPct}%]`, async () => {
                                await executeRHLaunch(t.id);
                                if (onDone) onDone();
                            }, 'btn-rh');
                            canAct = true;
                        }
                        if (u.rhMissileInFlight && u.rhMissileInFlight.targetId === t.id) {
                            addFireOption(area, `📡 ロックオン継続 → ${t.id}`, () => {
                                addLog(`📡 ロックオンを継続しました。`);
                                if (onDone) onDone();
                            }, 'btn-gun');
                            canAct = true;
                        }
                        addFireOption(area, `❌ ロックオン解除 (${t.id})`, () => {
                            if (u.rhMissileInFlight) {
                                addLog(`⚠️ ロックオンを解除したため、飛翔中のRHミサイルは失われました。`);
                                u.rhMissileInFlight = null;
                            }
                            u.lockOnTargetId = null;
                            addLog(`📡 ロックオンを解除しました。`);
                            drawMap();
                            openRHLaunchMenu(onDone);
                        }, 'btn-unlock');
                        canAct = true;
                    } else if (!u.lockOnTargetId && u.missiles.rh > 0) {
                        addFireOption(area, `📡 ロックオン → ${t.id} [命中${rhPct}%]`, () => {
                            u.lockOnTargetId = t.id;
                            addLog(`📡 ${t.id} をロックオンしました！`);
                            drawMap();
                            openRHLaunchMenu(onDone);
                        }, 'btn-rh');
                        canAct = true;
                    }
                }
            });

            if (!canAct) {
                addLog(`📡 ${u.id} はRH行動なし。`);
                if (onDone) onDone();
                return;
            }

            addFireOption(area, `スキップ`, () => {
                addLog(`📡 ${u.id} はRH行動をスキップしました。`);
                if (onDone) onDone();
            }, 'btn-unlock');

            document.getElementById('fire-panel-ui').style.display = 'block';
            addLog(`<span class="phase-text">📡 ${u.id} のRHロックオン・発射を選択してください</span>`);
            keepFocus();
        }
        function drawAltGraph() {
            const svg = document.getElementById('alt-graph-svg');
            if (!svg) return;
            const panel = document.getElementById('alt-graph-panel');
            const W = 116;
            const H = Math.max(200, panel.clientHeight - 24);
            svg.setAttribute('width', W);
            svg.setAttribute('height', H);
            svg.setAttribute('viewBox', `0 0 ${W} ${H}`);
            svg.innerHTML = '';

            if (!units || units.length === 0) return;
            const alive = units.filter(u => u.status !== 'destroyed');
            if (alive.length === 0) return;

            let altMin = Math.max(0, Math.min(...alive.map(u => u.altitude)) - 2);
            let altMax = Math.min(40, Math.max(...alive.map(u => u.altitude)) + 2);
            if (altMax - altMin < 5) altMax = Math.min(40, altMin + 5);
            altMin = Math.floor(altMin);
            altMax = Math.ceil(altMax);

            const ordered = [...alive].sort((a, b) => {
                let oa = turnOrder.findIndex(o => o.u.id === a.id);
                let ob = turnOrder.findIndex(o => o.u.id === b.id);
                if (oa === -1) oa = 999; if (ob === -1) ob = 999;
                return ob - oa;
            });

            const altUnits = {};
            for (let a = altMin; a <= altMax; a++) altUnits[a] = [];
            ordered.forEach(u => { if (altUnits[u.altitude] !== undefined) altUnits[u.altitude].push(u); });

            const numH = 22;
            const unitH = 22;

            const rowY = {};
            let y = 4;
            for (let a = altMax; a >= altMin; a--) {
                rowY[a] = y;
                y += numH + altUnits[a].length * unitH;
            }

            // 白背景
            let bg = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
            bg.setAttribute('x', 0); bg.setAttribute('y', 0);
            bg.setAttribute('width', W); bg.setAttribute('height', Math.max(H, y + 4));
            bg.setAttribute('fill', '#ffffff'); svg.appendChild(bg);

            for (let a = altMax; a >= altMin; a--) {
                const ry = rowY[a];
                const isMajor = (a % 5 === 0);

                // 区切り線
                let line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
                line.setAttribute('x1', 0); line.setAttribute('x2', W);
                line.setAttribute('y1', ry); line.setAttribute('y2', ry);
                line.setAttribute('stroke', isMajor ? '#aaa' : '#e0e0e0');
                line.setAttribute('stroke-width', isMajor ? '1' : '0.5');
                svg.appendChild(line);

                // 高度数字
                let lbl = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                lbl.setAttribute('x', 4);
                lbl.setAttribute('y', ry + 17);
                lbl.setAttribute('font-size', isMajor ? '17' : '13');
                lbl.setAttribute('font-weight', isMajor ? 'bold' : 'normal');
                lbl.setAttribute('fill', isMajor ? '#111' : '#999');
                lbl.textContent = a;
                svg.appendChild(lbl);

                // 機体名（数字の直下、青/赤バック＋白文字）
                altUnits[a].forEach((u, i) => {
                    const isBlue = u.team === 'Blue';
                    const isActive = (units.indexOf(u) === activeUnitIndex);
                    const bgColor = isBlue ? (isActive ? '#1144ee' : '#2255cc') : (isActive ? '#ee1111' : '#cc2222');
                    const uy = ry + numH + i * unitH;
                    const fontSize = isActive ? 17 : 15;

                    // バック
                    let rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
                    rect.setAttribute('x', 2);
                    rect.setAttribute('y', uy + 1);
                    rect.setAttribute('width', W - 4);
                    rect.setAttribute('height', unitH - 2);
                    rect.setAttribute('rx', '2');
                    rect.setAttribute('fill', bgColor);
                    svg.appendChild(rect);

                    // 白文字
                    let nameT = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                    nameT.setAttribute('x', 6);
                    nameT.setAttribute('y', uy + unitH - 5);
                    nameT.setAttribute('font-size', fontSize);
                    nameT.setAttribute('font-weight', 'bold');
                    nameT.setAttribute('fill', '#ffffff');
                    nameT.textContent = u.id;
                    svg.appendChild(nameT);
                });
            }
        }

        function drawMap() {
            const svg = document.getElementById('game-map');
            svg.innerHTML = ''; 
            
            let svgRect = svg.getBoundingClientRect();
            let svgW = svgRect.width || 800;
            let svgH = svgRect.height || 800;

            let viewW = svgW / zoomLevel;
            let viewH = svgH / zoomLevel;
            let viewX = cameraX - viewW / 2;
            let viewY = cameraY - viewH / 2;
            
            svg.setAttribute('viewBox', `${viewX} ${viewY} ${viewW} ${viewH}`);

            for (let c = 0; c <= mapMaxC; c++) {
                for (let r = 0; r <= mapMaxR; r++) {
                    let absX = c * hStep;
                    let absY = r * vStep + (c % 2) * (vStep / 2);
                    
                    if (absX < viewX - hexSize*2 || absX > viewX + viewW + hexSize*2 ||
                        absY < viewY - hexSize*2 || absY > viewY + viewH + hexSize*2) {
                        continue;
                    }

                    let points = [];
                    for (let i = 0; i < 6; i++) {
                        let angle_rad = Math.PI / 180 * (60 * i);
                        points.push(`${absX + hexSize * Math.cos(angle_rad)},${absY + hexSize * Math.sin(angle_rad)}`);
                    }
                    
                    let polygon = document.createElementNS('http://www.w3.org/2000/svg', 'polygon');
                    polygon.setAttribute('points', points.join(' '));
                    polygon.setAttribute('class', 'hex');

                    // 射界表示モード：前方射界のみ、距離ごとに命中率グラデーション
                    if (showArcDebug && viewingUnitIndex >= 0 && units[viewingUnitIndex]) {
                        let vu = units[viewingUnitIndex];
                        if (c === vu.x && r === vu.y) {
                            polygon.style.fill = 'rgba(255,255,255,0.6)';
                        } else {
                            let tx = c * hStep, ty = r * vStep + (c % 2) * (vStep / 2);
                            let arc = getArcToPoint(vu, tx, ty);
                            let dist = Math.round(getHexDistance(vu, {x: c, y: r}));
                            let fillColor = null;
                            if (arc === "前方") {
                                // 命中率に応じたグラデーション
                                // 1-3:  0 → 表示なし
                                // 4-6:  6 → 濃い緑
                                // 7-12: 7 → 黄緑（最高）
                                // 13-15:6 → 黄
                                // 16-20:5 → オレンジ
                                // 21-25:4 → 薄い赤
                                // 26-30:3 → 暗い赤
                                if (dist <= 3)       fillColor = null;
                                else if (dist <= 6)  fillColor = 'rgba(0,220,80,0.55)';
                                else if (dist <= 12) fillColor = 'rgba(160,220,0,0.50)';
                                else if (dist <= 15) fillColor = 'rgba(220,200,0,0.50)';
                                else if (dist <= 20) fillColor = 'rgba(255,130,0,0.45)';
                                else if (dist <= 25) fillColor = 'rgba(220,50,50,0.40)';
                                else if (dist <= 30) fillColor = 'rgba(150,30,30,0.35)';
                            }
                            if (fillColor) polygon.style.fill = fillColor;
                        }
                    }

                    svg.appendChild(polygon);
                }
            }

            // 射界表示ON時：正面軸上に各距離帯1個だけ巨大な命中数を表示
            if (showArcDebug && viewingUnitIndex >= 0 && units[viewingUnitIndex]) {
                let vu = units[viewingUnitIndex];
                let ux = vu.x * hStep, uy = vu.y * vStep + (vu.x % 2) * (vStep / 2);
                let facingRad = dirAngles[vu.direction] * Math.PI / 180;

                const bands = [
                    { dist: 5,  hit: 6 },
                    { dist: 9,  hit: 7 },
                    { dist: 14, hit: 6 },
                    { dist: 18, hit: 5 },
                    { dist: 23, hit: 4 },
                    { dist: 28, hit: 3 },
                ];

                bands.forEach(band => {
                    // 機体の向きの正面方向にdist分進んだ座標を計算
                    let px = ux + Math.cos(facingRad) * band.dist * hStep;
                    let py = uy + Math.sin(facingRad) * band.dist * vStep;

                    let numText = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                    numText.setAttribute('x', px);
                    numText.setAttribute('y', py + 35);
                    numText.setAttribute('text-anchor', 'middle');
                    numText.setAttribute('font-size', String(hexSize * 3.5));
                    numText.setAttribute('font-weight', 'bold');
                    numText.setAttribute('fill', 'rgba(255,255,255,0.18)');
                    numText.setAttribute('pointer-events', 'none');
                    numText.textContent = band.hit;
                    svg.appendChild(numText);
                });
            }

            units.forEach((u, idx) => {
                if (idx === activeUnitIndex && currentPhase === 'MOVE') {
                    let absX = u.x * hStep;
                    let absY = u.y * vStep + (u.x % 2) * (vStep / 2);
                    let color = u.team === 'Blue' ? '#4169e1' : '#dc143c';

                    if (previewState) {
                        let pointsStr = previewState.path.map(p => `${p.x},${p.y}`).join(' ');
                        let polyline = document.createElementNS('http://www.w3.org/2000/svg', 'polyline');
                        polyline.setAttribute('points', pointsStr);
                        polyline.setAttribute('stroke', '#32cd32');
                        polyline.setAttribute('stroke-width', '4');
                        polyline.setAttribute('stroke-dasharray', '6,4');
                        polyline.setAttribute('fill', 'none');
                        svg.appendChild(polyline);

                        let lastPt = previewState.path[previewState.path.length - 1];
                        let ghostVisualAngle = dirAngles[dirOrder[previewState.finalDirIdx]] + 90;
                        let ghostPlane = document.createElementNS('http://www.w3.org/2000/svg', 'polygon');
                        ghostPlane.setAttribute('points', planePoints);
                        ghostPlane.setAttribute('fill', '#32cd32');
                        ghostPlane.setAttribute('opacity', '0.6');
                        ghostPlane.setAttribute('transform', `translate(${lastPt.x}, ${lastPt.y}) rotate(${ghostVisualAngle})`);
                        svg.appendChild(ghostPlane);

                    } else {
                        let reqSpeeds = parseSpeeds(u.speed);
                        let maxTurns = parseMaxTurns(planeData[u.aircraft].turn[u.cursorRow][u.cursorCol]);
                        let allowedTurnCmd = null;
                        if (u.cursorCol === 0 || u.cursorCol === 1) allowedTurnCmd = '4';
                        if (u.cursorCol === 3 || u.cursorCol === 4) allowedTurnCmd = '6';
                        let canLateral = (u.cursorCol === 2) && (u.cursorRow === 2 || u.cursorRow === 3);
                        let canImmelmann = (u.prevRow === 0) && (u.cursorRow === 0) && (u.cursorCol >= 1 && u.cursorCol <= 3);
                        let canSplitS = (u.prevRow === 4) && (u.cursorRow === 4) && (u.cursorCol >= 1 && u.cursorCol <= 3);

                        let currentDirIdx = dirOrder.indexOf(u.direction);
                        let validRoutes = getValidRoutes(absX, absY, currentDirIdx, reqSpeeds, maxTurns, allowedTurnCmd, canLateral, canImmelmann, canSplitS, u.stepsSinceLastTurn);

                        validRoutes.forEach(route => {
                            let pointsStr = route.path.map(p => `${p.x},${p.y}`).join(' ');
                            let polyline = document.createElementNS('http://www.w3.org/2000/svg', 'polyline');
                            polyline.setAttribute('points', pointsStr);
                            polyline.setAttribute('stroke', '#ffcc00');
                            polyline.setAttribute('stroke-width', '2');
                            polyline.setAttribute('stroke-dasharray', '4,4');
                            polyline.setAttribute('fill', 'none');
                            svg.appendChild(polyline);

                            let lastPt = route.path[route.path.length - 1];
                            let ghostVisualAngle = dirAngles[dirOrder[route.finalDirIdx]] + 90;
                            let ghostPlane = document.createElementNS('http://www.w3.org/2000/svg', 'polygon');
                            ghostPlane.setAttribute('points', planePoints);
                            ghostPlane.setAttribute('fill', color);
                            ghostPlane.setAttribute('opacity', '0.25');
                            ghostPlane.setAttribute('transform', `translate(${lastPt.x}, ${lastPt.y}) rotate(${ghostVisualAngle})`);
                            svg.appendChild(ghostPlane);
                        });
                    }
                }
            });

            units.forEach(u => {
                if (u.status === 'destroyed') return;
                
                if (u.path && u.path.length > 1) {
                    let pointsStr = u.path.map(p => `${p.x},${p.y}`).join(' ');
                    let polyline = document.createElementNS('http://www.w3.org/2000/svg', 'polyline');
                    polyline.setAttribute('points', pointsStr);
                    
                    let color = u.team === 'Blue' ? '#4169e1' : '#dc143c';
                    let lineWidth = 3; 
                    if (u.pitch.includes('上昇')) lineWidth = 6; 
                    else if (u.pitch.includes('降下')) lineWidth = 1.5; 
                    
                    polyline.setAttribute('stroke', color);
                    polyline.setAttribute('stroke-width', lineWidth);
                    polyline.setAttribute('stroke-dasharray', '8,6');
                    polyline.setAttribute('fill', 'none');
                    polyline.setAttribute('opacity', '0.7');
                    svg.appendChild(polyline);
                }
                
                if (u.lockOnTargetId) {
                    let t = units.find(target => target.id === u.lockOnTargetId);
                    if (t && t.status !== 'destroyed') {
                        let ux = u.x * hStep;
                        let uy = u.y * vStep + (u.x % 2) * (vStep / 2);
                        let tx = t.x * hStep;
                        let ty = t.y * vStep + (t.x % 2) * (vStep / 2);
                        
                        let reticle = document.createElementNS('http://www.w3.org/2000/svg', 'g');
                        
                        let circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
                        circle.setAttribute('cx', tx);
                        circle.setAttribute('cy', ty);
                        circle.setAttribute('r', 25);
                        circle.setAttribute('fill', 'none');
                        circle.setAttribute('stroke', 'red');
                        circle.setAttribute('stroke-width', '2');
                        circle.setAttribute('stroke-dasharray', '5,5');
                        reticle.appendChild(circle);

                        let path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
                        path.setAttribute('d', `M ${tx-35} ${ty} L ${tx-15} ${ty} M ${tx+15} ${ty} L ${tx+35} ${ty} M ${tx} ${ty-35} L ${tx} ${ty-15} M ${tx} ${ty+15} L ${tx} ${ty+35}`);
                        path.setAttribute('stroke', 'red');
                        path.setAttribute('stroke-width', '2');
                        reticle.appendChild(path);
                        
                        let lockText = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                        lockText.setAttribute('x', tx + 20);
                        lockText.setAttribute('y', ty - 20);
                        lockText.setAttribute('fill', 'red');
                        lockText.setAttribute('font-size', '12px');
                        lockText.setAttribute('font-weight', 'bold');
                        lockText.textContent = "LOCKED";
                        reticle.appendChild(lockText);

                        svg.appendChild(reticle);

                        let lockLine = document.createElementNS('http://www.w3.org/2000/svg', 'line');
                        lockLine.setAttribute('x1', ux);
                        lockLine.setAttribute('y1', uy);
                        lockLine.setAttribute('x2', tx);
                        lockLine.setAttribute('y2', ty);
                        lockLine.setAttribute('stroke', 'red');
                        lockLine.setAttribute('stroke-width', '1');
                        lockLine.setAttribute('stroke-dasharray', '4,4');
                        lockLine.setAttribute('opacity', '0.5');
                        svg.appendChild(lockLine);
                    }
                }
                
                if (u.rhMissileInFlight) {
                    let t = units.find(target => target.id === u.rhMissileInFlight.targetId);
                    if (t && t.status !== 'destroyed') {
                        let ux = u.x * hStep;
                        let uy = u.y * vStep + (u.x % 2) * (vStep / 2);
                        let tx = t.x * hStep;
                        let ty = t.y * vStep + (t.x % 2) * (vStep / 2);
                        
                        let mx = (ux + tx) / 2;
                        let my = (uy + ty) / 2;
                        let angle = Math.atan2(ty - uy, tx - ux) * 180 / Math.PI;

                        let missilePoints = "0,-4 12,0 0,4 -2,0"; 
                        let missile = document.createElementNS('http://www.w3.org/2000/svg', 'polygon');
                        missile.setAttribute('points', missilePoints);
                        missile.setAttribute('fill', 'orange');
                        missile.setAttribute('stroke', 'red');
                        missile.setAttribute('stroke-width', '1');
                        missile.setAttribute('transform', `translate(${mx}, ${my}) rotate(${angle}) scale(1.5)`);
                        svg.appendChild(missile);
                        
                        let mText = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                        mText.setAttribute('x', mx - 20);
                        mText.setAttribute('y', my - 15);
                        mText.setAttribute('font-size', '11px');
                        mText.setAttribute('fill', 'red');
                        mText.setAttribute('font-weight', 'bold');
                        mText.textContent = "🚀 RH飛翔中";
                        svg.appendChild(mText);
                    }
                }
            });

            // --- ラベル配置: 引き出し線付き・重なり回避 ---
            const LABEL_W = 155, LABEL_H = 14, LABEL_MARGIN = 6;
            const ANCHOR_DIST = 38;
            // 候補方向: 右→右下→右上→左→左下→左上→下→上
            const anchorAngles = [0, 45, -45, 180, 135, -135, 90, -90];

            // 生存機体の座標を収集
            const aliveUnitsList = units.map((u, idx) => ({ u, idx }))
                .filter(({ u }) => u.status !== 'destroyed');

            // ラベル配置結果: idx -> {lx, ly, ax, ay}
            const labelPositions = {};
            const placedRects = []; // {x, y, w, h} 左上基準

            function rectsOverlap(a, b) {
                return a.x < b.x + b.w + LABEL_MARGIN &&
                       a.x + a.w + LABEL_MARGIN > b.x &&
                       a.y < b.y + b.h + LABEL_MARGIN &&
                       a.y + a.h + LABEL_MARGIN > b.y;
            }

            for (let { u, idx } of aliveUnitsList) {
                let ux = u.x * hStep;
                let uy = u.y * vStep + (u.x % 2) * (vStep / 2);
                let placed = false;

                for (let deg of anchorAngles) {
                    let rad = deg * Math.PI / 180;
                    let ax = ux + ANCHOR_DIST * Math.cos(rad);
                    let ay = uy + ANCHOR_DIST * Math.sin(rad);
                    // ラベルは引き出し先の右or左に配置
                    let lx = deg > 90 || deg < -90 ? ax - LABEL_W : ax;
                    let ly = ay - LABEL_H / 2;
                    let rect = { x: lx, y: ly, w: LABEL_W, h: LABEL_H };

                    if (!placedRects.some(r => rectsOverlap(r, rect))) {
                        labelPositions[idx] = { lx, ly, ax, ay, ux, uy };
                        placedRects.push(rect);
                        placed = true;
                        break;
                    }
                }
                // どこにも置けなければ最終候補に強制配置
                if (!placed) {
                    let rad = 0;
                    let ax = ux + ANCHOR_DIST;
                    let ay = uy + (placedRects.length % 3 - 1) * (LABEL_H + LABEL_MARGIN) * 2;
                    labelPositions[idx] = { lx: ax, ly: ay - LABEL_H / 2, ax, ay, ux, uy };
                    placedRects.push({ x: ax, y: ay - LABEL_H / 2, w: LABEL_W, h: LABEL_H });
                }
            }
            // --- ここまで ---

            units.forEach((u, idx) => {
                let absX = u.x * hStep;
                let absY = u.y * vStep + (u.x % 2) * (vStep / 2);

                if (u.status === 'destroyed') {
                    let boom = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                    boom.setAttribute('x', absX - 12);
                    boom.setAttribute('y', absY + 5);
                    boom.setAttribute('font-size', '24px');
                    boom.textContent = "💥";
                    svg.appendChild(boom);

                    let deadText = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                    deadText.setAttribute('x', absX - 10);
                    deadText.setAttribute('y', absY + 20);
                    deadText.setAttribute('font-size', '11px');
                    deadText.setAttribute('fill', '#fff');
                    deadText.setAttribute('font-weight', 'bold');
                    deadText.textContent = "撃墜";
                    svg.appendChild(deadText);

                    return; 
                }
                
                let color = u.team === 'Blue' ? '#4169e1' : '#dc143c';
                let visualAngle = (dirAngles[u.direction] || 0) + 90; 

                let g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
                g.style.cursor = 'pointer';
                g.addEventListener('click', (e) => onUnitClick(e, idx));

                if (idx === viewingUnitIndex) {
                    let halo = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
                    halo.setAttribute('cx', absX);
                    halo.setAttribute('cy', absY);
                    halo.setAttribute('r', 18);
                    halo.setAttribute('fill', 'none');
                    halo.setAttribute('stroke', 'rgba(255,255,255,0.8)');
                    halo.setAttribute('stroke-width', '2');
                    halo.setAttribute('stroke-dasharray', '4,2');
                    svg.appendChild(halo);
                }

                let plane = document.createElementNS('http://www.w3.org/2000/svg', 'polygon');
                plane.setAttribute('points', planePoints);
                plane.setAttribute('fill', color);
                plane.setAttribute('transform', `translate(${absX}, ${absY}) rotate(${visualAngle})`);
                
                if (idx === viewingUnitIndex) {
                    plane.setAttribute('stroke', 'white');
                    plane.setAttribute('stroke-width', '1.5');
                }
                g.appendChild(plane);

                let lp = labelPositions[idx];
                if (!lp) { svg.appendChild(g); return; }

                let orderIdx = turnOrder.findIndex(o => o.u.id === u.id);
                let numStr = orderIdx !== -1 ? circNums[orderIdx] + " " : "";

                const colLabels = ["左急旋回", "左旋回", "直進", "右旋回", "右急旋回"];
                let pitchLabel = pitchStates[u.cursorRow] || "";
                let colLabel = colLabels[u.cursorCol] || "";
                let flightStatus = colLabel === "直進" ? `${pitchLabel}直進` : `${pitchLabel}${colLabel}`;

                // 距離表示：手番中の機体との距離、なければ最寄りの敵との距離
                let distStr = '';
                let activeUnit = units[activeUnitIndex];
                if (activeUnit && activeUnit.id !== u.id) {
                    // 手番機体と自分が同チームなら、手番機体の敵（=自分の敵）との距離
                    // 手番機体と自分が別チームなら、手番機体との距離を表示
                    if (activeUnit.team !== u.team) {
                        let d = Math.round(getHexDistance(u, activeUnit));
                        distStr = ` 距離:${d}`;
                    } else {
                        // 同チーム同士→手番機体が相手にしている敵との距離
                        let enemies = units.filter(t => t.team !== u.team && t.status === 'alive');
                        if (enemies.length > 0) {
                            let minDist = Math.min(...enemies.map(t => getHexDistance(u, t)));
                            distStr = ` 距離:${Math.round(minDist)}`;
                        }
                    }
                }
                let labelStr = `${numStr}${u.id} [${flightStatus}]${distStr}`;

                // 引き出し線
                let leaderLine = document.createElementNS('http://www.w3.org/2000/svg', 'line');
                leaderLine.setAttribute('x1', lp.ux);
                leaderLine.setAttribute('y1', lp.uy);
                leaderLine.setAttribute('x2', lp.ax);
                leaderLine.setAttribute('y2', lp.ay);
                leaderLine.setAttribute('stroke', 'rgba(255,255,255,0.6)');
                leaderLine.setAttribute('stroke-width', '1');
                leaderLine.setAttribute('stroke-dasharray', '3,2');
                svg.appendChild(leaderLine);

                // テキスト背景（白縁）
                let bgText = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                bgText.setAttribute('x', lp.lx);
                bgText.setAttribute('y', lp.ly + LABEL_H);
                bgText.setAttribute('class', 'status-text');
                bgText.setAttribute('stroke', 'rgba(255,255,255,0.8)');
                bgText.setAttribute('stroke-width', '3');
                bgText.setAttribute('fill', 'none');
                bgText.textContent = labelStr;
                svg.appendChild(bgText);

                // テキスト本体
                let statusText = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                statusText.setAttribute('x', lp.lx);
                statusText.setAttribute('y', lp.ly + LABEL_H);
                statusText.setAttribute('class', 'status-text');
                statusText.textContent = labelStr;

                svg.appendChild(g);
                svg.appendChild(statusText);
            });
            drawAltGraph();
        }
        
        // ==========================================
        // 高速シミュレーションエンジン（全ターン同期処理）
        // ==========================================
        function runInstantSimulation() {
            let maxTurns = 15;
            if (window.SCENARIO_INFO && window.SCENARIO_INFO[gameConfig.scenario]) {
                maxTurns = window.SCENARIO_INFO[gameConfig.scenario].maxTurns;
            }

            // 全機体の軌跡履歴を保存（ターン番号付き・全経由ヘクス）
            let trailHistory = {}; // unitId -> [{turn, points:[{x,y},...]}]
            units.forEach(u => {
                let sx = u.x * hStep;
                let sy = u.y * vStep + (u.x % 2) * (vStep / 2);
                trailHistory[u.id] = [{ turn: 0, points: [{x: sx, y: sy}] }];
            });

            let simLogs = [];
            function simLog(msg) { simLogs.push(msg.replace(/<[^>]*>/g, '')); }

            for (let turn = 1; turn <= maxTurns; turn++) {
                // 生存機体チェック
                let redAlive = units.filter(u => u.team === 'Red' && u.status !== 'destroyed').length;
                let blueAlive = units.filter(u => u.team === 'Blue' && u.status !== 'destroyed').length;
                if (redAlive === 0 || blueAlive === 0) break;

                simLog(`--- 第${turn}ターン ---`);

                // 行動順決定
                let order = units.filter(u => u.status === 'alive')
                    .map(u => u)
                    .sort((a, b) => {
                        if (a.altitude !== b.altitude) return a.altitude - b.altitude;
                        if (a.aircraft === 'MiG-15' && b.aircraft !== 'MiG-15') return -1;
                        if (b.aircraft === 'MiG-15' && a.aircraft !== 'MiG-15') return 1;
                        return 0;
                    });

                // 移動フェーズ
                for (let u of order) {
                    if (u.status !== 'alive') continue;
                    // validateAndSimulateがunits[activeUnitIndex]を参照するので合わせる
                    activeUnitIndex = units.indexOf(u);
                    let enemies = units.filter(t => t.team !== u.team && t.status !== 'destroyed');
                    let moveInfo = AI.decideMove(u, enemies);
                    u.cursorRow = moveInfo.r;
                    u.cursorCol = moveInfo.c;
                    u.speed = planeData[u.aircraft].speed[u.cursorRow][u.cursorCol];
                    u.pitch = pitchStates[u.cursorRow];

                    // コマンドを即時実行（位置だけ更新）
                    let sim = validateAndSimulate(moveInfo.cmd);
                    if (sim) {
                        u.x = sim.finalC;
                        u.y = sim.finalR;
                        u.direction = dirOrder[sim.finalDirIdx];
                        u.altitude += sim.altChange;
                        u.stepsSinceLastTurn = sim.finalSteps;
                        if (sim.usedLateral !== null || sim.hasFlipped) {
                            u.cursorRow = 2; u.cursorCol = 2; u.startRow = 2; u.startCol = 2;
                            u.prevRow = 2; u.initPitch = pitchStates[2];
                            u.initSpeed = planeData[u.aircraft].speed[2][2];
                        } else {
                            u.prevRow = u.cursorRow; u.startRow = u.cursorRow;
                            u.startCol = u.cursorCol; u.initPitch = pitchStates[u.cursorRow];
                            u.initSpeed = planeData[u.aircraft].speed[u.cursorRow][u.cursorCol];
                        }
                        trailHistory[u.id].push({ turn, points: sim.path });
                        simLog(`✈️ ${u.id} → (${u.x},${u.y}) Alt:${u.altitude}`);
                    }
                }

                // 射撃フェーズ
                for (let u of order) {
                    if (u.status !== 'alive') continue;
                    let enemies = units.filter(t => t.team !== u.team && t.status !== 'destroyed');
                    let attackInfo = AI.decideAttack(u, enemies);
                    if (attackInfo.type === 'SKIP') continue;

                    if (attackInfo.type === 'GUN' || attackInfo.type === 'HS') {
                        let t = units.find(unit => unit.id === attackInfo.targetId);
                        if (!t || t.status === 'destroyed') continue;
                        let sum = (Math.floor(Math.random()*6)+1) + (Math.floor(Math.random()*6)+1);
                        let val = 0;
                        if (attackInfo.type === 'GUN') {
                            let ak = attackInfo.aspect;
                            if (window.COMBAT_CHARTS?.GUN?.[u.gunType]?.[ak]) {
                                val = window.COMBAT_CHARTS.GUN[u.gunType][ak][attackInfo.dist] || 0;
                            }
                            if (val <= 0) { continue; } // 命中不可能な射撃はスキップ（弾節約）
                            u.gun--;
                            if (sum < val) { t.status = 'destroyed'; simLog(`💥 ${u.id} が ${t.id} を機関砲で撃墜！(2D6=${sum} < ${val})`); }
                            else if (sum === val) { t.damage = '損害あり'; simLog(`⚠️ ${u.id} が ${t.id} に損害！(2D6=${sum} = ${val})`); }
                            else { simLog(`☁️ ${u.id} の機関砲が外れ(2D6=${sum})`); }
                        } else {
                            val = getMissileTargetValue('HS', u.missileType, attackInfo.dist);
                            if (val <= 0) { continue; } // 命中不可能なミサイルはスキップ
                            u.missiles.hs--;
                            if (sum <= val) { t.status = 'destroyed'; simLog(`🚀 ${u.id} が ${t.id} をHSで撃墜！(2D6=${sum} ≤ ${val})`); }
                            else { simLog(`☁️ ${u.id} のHSが外れ(2D6=${sum})`); }
                        }
                    } else if (attackInfo.type === 'RH_LOCK') {
                        u.lockOnTargetId = attackInfo.targetId;
                        simLog(`📡 ${u.id} が ${attackInfo.targetId} をロックオン`);
                    } else if (attackInfo.type === 'RH_FIRE') {
                        u.rhMissileInFlight = { targetId: attackInfo.targetId, turnFired: turn };
                        u.missiles.rh--;
                        simLog(`🚀 ${u.id} がRH発射 → ${attackInfo.targetId}`);
                    }
                }

                // RH命中判定
                for (let u of units) {
                    if (u.status === 'destroyed' || !u.rhMissileInFlight) continue;
                    if (u.rhMissileInFlight.turnFired >= turn) continue;
                    let t = units.find(unit => unit.id === u.rhMissileInFlight.targetId);
                    if (!t || t.status === 'destroyed') { u.rhMissileInFlight = null; u.lockOnTargetId = null; continue; }
                    let dist = getHexDistance(u, t);
                    let val = getMissileTargetValue('RH', u.missileType, dist);
                    let sum = (Math.floor(Math.random()*6)+1) + (Math.floor(Math.random()*6)+1);
                    if (val > 0 && sum <= val) { t.status = 'destroyed'; simLog(`💥 ${u.id} のRHが ${t.id} に命中！撃墜！(2D6=${sum})`); }
                    else { simLog(`☁️ ${u.id} のRHが外れ(2D6=${sum})`); }
                    u.rhMissileInFlight = null; u.lockOnTargetId = null;
                }
            }

            // 結果表示
            showSimulationResult(trailHistory, simLogs);
        }

        function showSimulationResult(trailHistory, simLogs) {
            // スコア計算
            let blueScore = 0, redScore = 0;
            units.forEach(u => {
                if (u.team === 'Blue') { if (u.status === 'destroyed') redScore += 3; else if (u.damage === '損害あり') redScore += 1; }
                else { if (u.status === 'destroyed') blueScore += 3; else if (u.damage === '損害あり') blueScore += 1; }
            });
            let winner = blueScore > redScore ? '🏆 米軍の勝利！' : redScore > blueScore ? '🏆 ソ連軍の勝利！' : '🤝 引き分け！';

            // ログエリアに結果を出力
            const logArea = document.getElementById('log-area');
            logArea.innerHTML = '';
            simLogs.forEach(msg => {
                let d = document.createElement('div');
                d.textContent = '> ' + msg;
                logArea.appendChild(d);
            });
            logArea.scrollTop = logArea.scrollHeight;

            // トップバーに結果表示
            document.getElementById('turn-display').textContent = `シミュレーション完了`;
            document.getElementById('phase-display').textContent =
                `米軍:${blueScore}点 / ソ連軍:${redScore}点　${winner}`;
            document.getElementById('phase-display').style.color = '#ffff00';

            // マップに軌跡を描画
            lastTrailHistory = trailHistory;
            drawSimulationTrails(trailHistory, true);
        }

        function drawSimulationTrails(trailHistory, resetCamera = true) {
            const svg = document.getElementById('game-map');
            let svgRect = svg.getBoundingClientRect();
            let svgW = svgRect.width || 800;
            let svgH = svgRect.height || 600;

            if (resetCamera) {
                // 初回のみ：マップ全体が見えるようにカメラとズームを調整
                let mapW = mapMaxC * hStep;
                let mapH = mapMaxR * vStep;
                let zoomW = svgW / (mapW + hexSize * 4);
                let zoomH = svgH / (mapH + hexSize * 4);
                zoomLevel = Math.min(zoomW, zoomH);
                cameraX = mapW / 2;
                cameraY = mapH / 2;
                drawMap();
            }

            const teamColors = { Blue: '#00eeff', Red: '#ff4444' };
            const teamOffset = { Blue: -3, Red: 3 }; // 重なり防止のためチームごとにずらす

            // Red → Blue の順に描画（Blueが上になる）
            ['Red', 'Blue'].forEach(team => {
                units.filter(u => u.team === team).forEach(u => {
                    let history = trailHistory[u.id];
                    if (!history || history.length < 2) return;
                    let color = teamColors[team];
                    let offset = teamOffset[team] / zoomLevel;

                    for (let t = 1; t < history.length; t++) {
                        let pts = history[t].points;
                        if (!pts || pts.length < 2) continue;

                        for (let i = 1; i < pts.length; i++) {
                            let line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
                            line.setAttribute('x1', pts[i-1].x + offset);
                            line.setAttribute('y1', pts[i-1].y + offset);
                            line.setAttribute('x2', pts[i].x + offset);
                            line.setAttribute('y2', pts[i].y + offset);
                            line.setAttribute('stroke', color);
                            line.setAttribute('stroke-width', `${2.5 / zoomLevel}`);
                            line.setAttribute('stroke-dasharray', `${6 / zoomLevel},${3 / zoomLevel}`);
                            line.setAttribute('opacity', '0.9');
                            svg.appendChild(line);
                        }

                        // ターン番号をセグメントの中間付近に表示
                        let mid = pts[Math.floor(pts.length / 2)];
                        let label = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                        label.setAttribute('x', mid.x + offset + 4 / zoomLevel);
                        label.setAttribute('y', mid.y + offset - 3 / zoomLevel);
                        label.setAttribute('font-size', `${9 / zoomLevel}px`);
                        label.setAttribute('fill', color);
                        label.setAttribute('font-weight', 'bold');
                        label.textContent = `T${history[t].turn}`;
                        svg.appendChild(label);
                    }
                });
            });
        }
        // ==========================================
        // --- ここから：観戦コントロール追加プログラム（既存のコードは一切消しません） ---
        let aiWatchMode = 'STEP';
        let aiStepResolver = null;

        window.waitForStep = function() {
            return new Promise(resolve => {
                if (aiWatchMode === 'FAST') {
                    resolve();
                } else {
                    aiStepResolver = resolve;
                    let btn = document.getElementById('top-btn-step');
                    if (btn) {
                        btn.style.backgroundColor = '#ff3300';
                        btn.innerText = '⏯ 次へ進む (待機中)';
                        btn.style.boxShadow = '0 0 10px #ff3300';
                    }
                }
            });
        };

        window.resumeStep = function() {
            if (aiStepResolver) {
                let resolve = aiStepResolver;
                aiStepResolver = null;
                let btn = document.getElementById('top-btn-step');
                if (btn) {
                    btn.style.backgroundColor = '#cc6600';
                    btn.innerText = '⏯ 次へ（確認）';
                    btn.style.boxShadow = '0 2px 4px rgba(0,0,0,0.3)';
                }
                resolve();
            }
        };

        window.toggleFastMode = function() {
            let btnFast = document.getElementById('top-btn-fast');
            if (aiWatchMode === 'STEP') {
                aiWatchMode = 'FAST';
                if(btnFast) {
                    btnFast.style.backgroundColor = '#0066cc';
                    btnFast.innerText = '⏩ 高速モード中';
                }
                resumeStep(); // 待機中なら即座に解除して進める
            } else {
                aiWatchMode = 'STEP';
                if(btnFast) {
                    btnFast.style.backgroundColor = '#555';
                    btnFast.innerText = '⏩ 高速化';
                }
            }
        };

        // 既存の行動終了処理を安全にラップして、AIの行動直後（ログ出力後）に必ず待機させる
        const _originalFinishPhase = window.finishCurrentUnitPhase || finishCurrentUnitPhase;
        finishCurrentUnitPhase = async function() {
            // RH_LAUNCHフェイズ中はproceedToNextUnitを呼ばせない
            if (currentPhase === 'RH_LAUNCH') {
                console.log(`[PHASE] finishCurrentUnitPhase: RH_LAUNCHフェイズ中のため無視`);
                return;
            }
            let u = units[activeUnitIndex];
            let isWatchNormal = gameConfig && gameConfig.mode === 'WATCH_NORMAL';
            if (isWatchNormal && u && typeof isAIControl === 'function' && isAIControl(u)) {
                await window.waitForStep();
            }
            await _originalFinishPhase();
        };
        // --- ここまで ---
    </script>
<div id="debug-panel" style="display:none; position:fixed; bottom:0; left:0; right:0; height:200px; background:#111; color:#0f0; font-size:11px; font-family:monospace; z-index:9999; border-top:2px solid #0f0;">
  <div style="display:flex; justify-content:space-between; padding:2px 6px; background:#222; border-bottom:1px solid #0f0;">
    <span>🖥 デバッグログ（テキスト選択→コピー可）</span>
    <span>
      <button onclick="navigator.clipboard.writeText(document.getElementById('debug-log').textContent).then(()=>alert('コピーしました'))" style="margin-right:8px; font-size:10px; background:#060; color:#0f0; border:1px solid #0f0;">📋 コピー</button>
      <button onclick="document.getElementById('debug-log').textContent=''" style="margin-right:8px; font-size:10px;">クリア</button>
      <button onclick="document.getElementById('debug-panel').style.display='none'" style="font-size:10px;">閉じる</button>
    </span>
  </div>
  <pre id="debug-log" style="margin:0; padding:6px; height:170px; overflow-y:auto; white-space:pre-wrap; word-break:break-all; user-select:text;"></pre>
</div>

<button id="debug-toggle" onclick="var p=document.getElementById('debug-panel'); p.style.display=p.style.display==='none'?'block':'none';" 
  style="position:fixed; bottom:4px; right:4px; z-index:10000; background:#222; color:#0f0; border:1px solid #0f0; font-size:10px; padding:2px 6px; cursor:pointer;">
  DEBUGログ
</button>

<script>
(function() {
    var el = document.getElementById('debug-log');
    var orig = console.log.bind(console);
    console.log = function() {
        orig.apply(console, arguments);
        var msg = Array.from(arguments).map(function(a) {
            return (typeof a === 'object') ? JSON.stringify(a) : String(a);
        }).join(' ');
        el.textContent += msg + '\n';
        el.scrollTop = el.scrollHeight;
    };
})();
</script>
