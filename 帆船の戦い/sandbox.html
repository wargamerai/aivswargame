<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>帆船の戦い - シナリオ選択</title>
<style>
  body { background:#0a1a2a; color:#fff; font-family:sans-serif; padding:20px; }
  .panel { background:#13243a; border:1px solid #234; border-radius:6px; padding:14px; margin-bottom:14px; }
  h1 { color:#88ccff; margin-top:0; }
  button.back { background:#555; color:#fff; border:none; padding:8px 16px; border-radius:4px; cursor:pointer; font-weight:bold; margin-bottom:12px; }
  .scen-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(320px, 1fr)); gap:10px; }
  .scen-btn { background:#2266cc; color:#fff; border:none; padding:14px 16px; border-radius:6px; cursor:pointer; font-weight:bold; font-size:1em; text-align:left; }
  .scen-btn:hover { background:#3377dd; }
  .scen-btn .n { color:#88ccff; font-size:1.1em; display:block; margin-bottom:3px; }
  .scen-btn .t { font-weight:normal; font-size:0.92em; color:#fff; }
  .scen-btn .s { font-weight:normal; font-size:0.85em; color:#bcd; margin-top:4px; display:block; }
</style>
</head>
<body>
<a href="../index1.html"><button class="back">← トップへ</button></a>
<h1>⚓ 帆船の戦い - シナリオ選択</h1>

<div class="panel">
  <h3 style="color:#ffcc88;margin:0 0 8px 0;">ゲームモード</h3>
  <div style="display:flex;flex-direction:column;gap:6px;">
    <label style="cursor:pointer;"><input type="radio" name="gameMode" value="human-vs-ai" checked> 人間対AI（自軍=人間、敵軍=AI）</label>
    <label style="cursor:pointer;"><input type="radio" name="gameMode" value="ai-vs-ai-step"> AI対AI ステップ確認（フェイズ毎に停止）</label>
    <label style="cursor:pointer;"><input type="radio" name="gameMode" value="ai-vs-ai-auto"> AI対AI オート観戦（自動進行）</label>
  </div>
</div>

<div class="panel">
  <div class="scen-grid" id="scenGrid"></div>
</div>

<script src="shipdata.js"></script>
<script src="hittables.js"></script>
<script src="criticaldata.js"></script>
<script src="chartsdata.js"></script>
<script>
// wsm_hub.html の SCENARIOS と同一の一覧を定義（艦名表示のみに使用）
// 実際のゲームデータは wsm_hub.html 内 SCENARIOS を参照
const SCENARIO_LIST = [
  { n:2,  title:'Ranger vs Drake (1778)',             sides:'米:Ranger / 英:Drake' },
  { n:4,  title:'Bonhomme-Richard vs Serapis (1779)', sides:'米:Bonhomme-Richard / 英:Serapis' },
  { n:9,  title:'Nymphe vs Cleopatre (1793)',         sides:'英:Nymphe / 仏:Cleopatre' },
  { n:10, title:'Mars vs Hercule (1798)',             sides:'英:Mars / 仏:Hercule' },
  { n:12, title:'Ambuscade vs Baionnaise (1798)',     sides:'英:Ambuscade / 仏:Baionnaise' },
  { n:13, title:'Constellation vs Insurgent (1799)',  sides:'米:Constellation / 仏:Insurgent' },
  { n:14, title:'Constellation vs Vengeance (1800)',  sides:'米:Constellation / 仏:Vengeance' },
  { n:16, title:'Lissa (1811)',                       sides:'英4隻 / 仏+伊6隻' },
  { n:17, title:'Constitution vs Guerriere (1812)',   sides:'米:Constitution / 英:Guerriere' },
  { n:18, title:'United States vs Macedonian (1812)', sides:'米:United States / 英:Macedonian' },
  { n:19, title:'Constitution vs Java (1812)',        sides:'米:Constitution / 英:Java' },
  { n:20, title:'Chesapeake vs Shannon (1813)',       sides:'米:Chesapeake / 英:Shannon' },
  { n:21, title:'Lake Erie (1813)',                   sides:'米2隻 / 英3隻' },
  { n:22, title:'Wasp vs Reindeer (1814)',            sides:'米:Wasp / 英:Reindeer' },
  { n:23, title:'Constitution vs Cyane+Levant (1815)',sides:'米:Constitution / 英:Cyane, Levant' },
];

function renderScenarios() {
  const grid = document.getElementById('scenGrid');
  grid.innerHTML = SCENARIO_LIST.map(sc => `
    <button class="scen-btn" onclick="startScenario(${sc.n})">
      <span class="n">シナリオ ${sc.n}</span>
      <span class="t">${sc.title}</span>
      <span class="s">${sc.sides}</span>
    </button>
  `).join('');
}

function startScenario(n) {
  const mode = document.querySelector('input[name="gameMode"]:checked')?.value || 'human-vs-ai';
  localStorage.removeItem('hubState');
  localStorage.setItem('pendingScenario', String(n));
  localStorage.setItem('gameMode', mode);
  localStorage.setItem('campaignReady', 'true');
  localStorage.setItem('scenarioMode', 'scenario');
  localStorage.setItem('scenarioRules', JSON.stringify({ jpHandicap: 0 }));
  localStorage.setItem('jpAutoAI', mode === 'human-vs-ai' ? '0' : '1');
  localStorage.setItem('fullAutoAI', mode === 'ai-vs-ai-auto' ? '1' : '0');
  window.location.href = 'wsm_hub.html';
}

renderScenarios();
</script>
</body>
</html>
