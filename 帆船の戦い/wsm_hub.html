}
function toggleArcs() {
  state.showArcs = !state.showArcs;
  document.getElementById('btnArcs').textContent = '射界: ' + (state.showArcs ? 'ON' : 'OFF');
  document.getElementById('btnArcs').style.background = state.showArcs ? '#cc66aa' : '#884466';
  draw();
}

// ヘクス→ヘクス の方向ベアリング (0-5, 0=真上)
function hexBearing(fromCol, fromRow, toCol, toRow) {
  const fp = hexPt(fromCol, fromRow);
  const tp = hexPt(toCol, toRow);
  const dx = tp.x - fp.x;
  const dy = tp.y - fp.y;
  let angle = Math.atan2(dy, dx) * 180 / Math.PI;  // canvas Y-down: 0=east
  let upAngle = (angle + 90 + 360) % 360;            // 真上を0°
  return Math.round(upAngle / 60) % 6;
}

// 起点ヘクス(srcCol/srcRow)に対する target の射界分類
function arcFromHex(srcCol, srcRow, dir, targetCol, targetRow) {
  const b = hexBearing(srcCol, srcRow, targetCol, targetRow);
  const rel = (b - dir + 6) % 6;
  if (rel === 0) return 'bow';
  if (rel === 3) return 'stern';
  if (rel === 1 || rel === 2) return 'stbd';
  return 'port';
}

// 射界テンプレート（艦首=N向き、相対 col/row オフセット）
// 艦首大砲=フィールド[1,3,5]、艦尾大砲=[1,2,4]
const BOW_GUN_ARCS = [1, 3, 5];
const STERN_GUN_ARCS = [1, 2, 4];

// firer から target が ARC_TEMPLATE のどのフィールド番号(1-5)にあるか判定
function getArcFieldNumber(firer, target) {
  return getArcFieldInfo(firer, target).field;
}

// field と side (port/stbd) を返す
// ARC_TEMPLATE は dc<0 のみ定義。オリジナル=port、ミラー(dc→-dc)=stbd と規約
function getArcFieldInfo(firer, target) {
  if (typeof ARC_TEMPLATE !== 'object') return { field: 0, side: null };
  const dirOrder = [8, 9, 3, 2, 1, 7];
  const shipIdx = dirOrder.indexOf(firer.dir);
  if (shipIdx < 0) return { field: 0, side: null };
  for (const key in ARC_TEMPLATE) {
    const [dc, dr] = key.split(',').map(Number);
    const f = ARC_TEMPLATE[key];
    // オリジナル (dc<0 → port)
    let cubeP = offsetDeltaToCube(dc, dr);
    for (let i = 0; i < shipIdx; i++) cubeP = rotateCube60CW(cubeP);
    const posP = cubeDeltaToShipTarget(cubeP, firer.col, firer.row);
    if (posP.col === target.col && posP.row === target.row) {
      return { field: f, side: 'port' };
    }
    // ミラー (dc>0 → stbd)
    if (dc !== 0) {
      let cubeS = offsetDeltaToCube(-dc, dr);
      for (let i = 0; i < shipIdx; i++) cubeS = rotateCube60CW(cubeS);
      const posS = cubeDeltaToShipTarget(cubeS, firer.col, firer.row);
      if (posS.col === target.col && posS.row === target.row) {
        return { field: f, side: 'stbd' };
      }
    }
  }
  return { field: 0, side: null };
}

// 艦首/艦尾大砲で撃てるかチェック
function canBowGunFire(firer, target) {
  return BOW_GUN_ARCS.includes(getArcFieldNumber(firer, target));
}
function canSternGunFire(firer, target) {
  return STERN_GUN_ARCS.includes(getArcFieldNumber(firer, target));
}

const ARC_TEMPLATE = {
  "-1,0": 1, "-3,0": 1, "-5,0": 1, "-7,0": 1, "-9,0": 1,
  "-1,1": 4, "-2,2": 4, "-3,2": 4, "-4,3": 4, "-5,3": 4, "-6,4": 4, "-7,4": 4, "-8,5": 4, "-9,5": 4, "-10,6": 4,
  "-5,2": 4, "-6,3": 4, "-7,3": 4, "-8,4": 4, "-9,4": 4, "-10,5": 4, "-9,3": 4, "-10,4": 4,
  "-1,-1": 5, "-2,-1": 5, "-3,-2": 5, "-4,-2": 5, "-5,-3": 5, "-6,-3": 5, "-7,-4": 5, "-8,-4": 5, "-9,-5": 5, "-10,-5": 5,
  "-5,-2": 5, "-6,-2": 5, "-7,-3": 5, "-8,-3": 5, "-9,-4": 5, "-10,-4": 5, "-9,-3": 5, "-10,-3": 5,
  "-2,0": 3, "-3,-1": 3, "-4,0": 3, "-4,-1": 3, "-5,-1": 3, "-6,0": 3, "-6,-1": 3, "-7,-1": 3, "-7,-2": 3, "-8,-2": 3,
  "-9,-2": 3, "-10,-2": 3, "-10,-1": 3, "-10,0": 3, "-9,-1": 3, "-8,0": 3, "-8,-1": 3,
  "-2,1": 2, "-3,1": 2, "-4,2": 2, "-4,1": 2, "-5,1": 2, "-6,1": 2, "-6,2": 2, "-7,2": 2, "-7,1": 2,
  "-8,1": 2, "-8,2": 2, "-8,3": 2, "-9,2": 2, "-9,1": 2, "-10,3": 2, "-10,2": 2, "-10,1": 2
};

// 60°回転用ヘルパー
function offsetDeltaToCube(dc, dr) {
  // 参照 col=0 (even) 想定
  const q = dc;
  const r = dr - (dc - (dc & 1)) / 2;
  return { x: q, y: r, z: -q - r };
}
function cubeDeltaToShipTarget(cube, shipCol, shipRow) {
  const qShip = shipCol;
  const rShip = shipRow - (shipCol - (shipCol & 1)) / 2;
  const qT = qShip + cube.x;
  const rT = rShip + cube.y;
  return { col: qT, row: rT + (qT - (qT & 1)) / 2 };
}
function rotateCube60CW(c) {
  return { x: -c.y, y: -c.z, z: -c.x };
}

// 選択艦の射界（テンプレートから5フィールド表示）
function drawArcsForShip(ship) {
  if (!ship || ship.col < 0) return;
  // 旧 isBroadside ロジックは保持しつつ、テンプレート優先
  if (typeof ARC_TEMPLATE === 'object') {
    const dirOrder = [8, 9, 3, 2, 1, 7];
    const shipIdx = dirOrder.indexOf(ship.dir);
    if (shipIdx < 0) return;
    const rotations = shipIdx;  // N=0回転、NE=1回転CW、...
    const fieldColors = {
      1: 'rgba(255,80,80,0.35)',
      2: 'rgba(255,180,60,0.35)',
      3: 'rgba(255,240,80,0.35)',
      4: 'rgba(80,180,255,0.35)',
      5: 'rgba(180,80,255,0.35)',
    };
    // テンプレート + 反対側ミラー (dc → -dc)
    const entries = [];
    for (const key in ARC_TEMPLATE) {
      const [dc, dr] = key.split(',').map(Number);
      const f = ARC_TEMPLATE[key];
      entries.push({ dc, dr, field: f });
      if (dc !== 0) entries.push({ dc: -dc, dr, field: f });
    }
    for (const e of entries) {
      let cube = offsetDeltaToCube(e.dc, e.dr);
      for (let i = 0; i < rotations; i++) cube = rotateCube60CW(cube);
      const target = cubeDeltaToShipTarget(cube, ship.col, ship.row);
      if (target.col < 0 || target.col >= MAP_CONFIG.cols) continue;
      if (target.row < 0 || target.row >= MAP_CONFIG.rows) continue;
      const color = fieldColors[e.field];
      if (!color) continue;
      const {x, y} = hexPt(target.col, target.row);
      drawHexPath(x, y);
      ctx.fillStyle = color;
      ctx.fill();
      ctx.fillStyle = '#000';
      ctx.font = `bold ${Math.round(HEX_SIZE * 0.35)}px sans-serif`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(String(e.field), x, y);
    }
    return;
  }
  // フォールバック: 旧 IJN 方式
  drawArcsForShipLegacy(ship);
}

function drawArcsForShipLegacy(ship) {
  if (!ship || ship.col < 0) return;
  const bowH = { col: ship.col, row: ship.row };
  const sternH = getSternHex(ship);
  if (!sternH) return;
  const range = 10;
  const sources = [
    { col: bowH.col, row: bowH.row },
    { col: sternH.col, row: sternH.row },
  ];
  for (let c = 0; c < MAP_CONFIG.cols; c++) {
    for (let r = 0; r < MAP_CONFIG.rows; r++) {
      if (c === bowH.col && r === bowH.row) continue;
      if (c === sternH.col && r === sternH.row) continue;
      let color = null;
      for (const src of sources) {
        const d = hexDist(src.col, src.row, c, r);
        if (d === 0 || d > range) continue;
        const fa = toAxial(src.col, src.row);
        const ta = toAxial(c, r);
        const dq = ta.q - fa.q;
        const dr = ta.r - fa.r;
        const ds = -dq - dr;
        const broad = isBroadside(ship.dir, dq, dr, ds);
        if (broad) {
          color = 'rgba(0,255,68,0.22)';   // 舷側=緑
          break;
        } else {
          color = 'rgba(255,136,0,0.25)';  // 艦首・艦尾=橙
        }
      }
      if (color) {
        const {x, y} = hexPt(c, r);
        drawHexPath(x, y);
        ctx.fillStyle = color;
        ctx.fill();
      }
    }
  }
}

function drawPlotPreview() {
  // プレイヤー側（jp）のみプロット表示。敵（us）の未来位置は隠す
  for (const s of state.jpFleet) {
    if (!s.plottedMoves || s.plottedMoves.length === 0) continue;
    if (s.col < 0) continue;
    const path = simulatePlot(s);
    if (path.length < 2) continue;
    // 軌跡線（黄色系で海と区別、太め）
    const color = s.side === 'jp' ? 'rgba(255,255,80,0.85)' : 'rgba(255,140,40,0.85)';
    ctx.save();
    ctx.strokeStyle = color;
    ctx.lineWidth = 4;
    ctx.setLineDash([8, 4]);
    ctx.beginPath();
    for (let i = 0; i < path.length; i++) {
      const p = hexPt(path[i].col, path[i].row);
      if (i === 0) ctx.moveTo(p.x, p.y); else ctx.lineTo(p.x, p.y);
    }
    ctx.stroke();
    ctx.setLineDash([]);

    // 終点に薄い船を描画（プレビュー）
    const last = path[path.length - 1];
    if (last.col !== s.col || last.row !== s.row || last.dir !== s.dir) {
      const ghost = Object.assign({}, s, { col: last.col, row: last.row, dir: last.dir });
      ctx.globalAlpha = 0.45;
      drawShip(ghost);
      ctx.globalAlpha = 1.0;
    }

    // 確定マーク
    if (s.plotDone) {
      const lp = hexPt(last.col, last.row);
      ctx.fillStyle = '#00ff00';
      ctx.font = `bold ${Math.round(HEX_SIZE*0.4)}px sans-serif`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('✓', lp.x + HEX_SIZE * 0.5, lp.y - HEX_SIZE * 0.5);
    }
    ctx.restore();
  }
}

// ============================================================
// 全艦プロット同時実行（アニメーション）
// ============================================================
let isExecuting = false;
function executeAllPlots() {
  debugLog(`[DEBUG executeAllPlots] 呼出 isExecuting=${isExecuting}`);
  if (isExecuting) return;
  const allShips = [...state.jpFleet, ...state.usFleet].filter(s => s.col >= 0 && (s.plottedMoves||[]).length > 0);
  debugLog(`[DEBUG executeAllPlots] allShips=${allShips.length}件 ${allShips.map(s=>s.name+':'+(s.plottedMoves||[]).join('')).join(', ')}`);
  if (allShips.length === 0) { setInfo('プロット済みの艦がありません'); return; }
  isExecuting = true;
  setInfo('プロット実行中...');

  // 各艦の経路を事前計算
  const paths = allShips.map(s => ({ ship: s, path: simulatePlot(s), step: 0 }));
  const maxSteps = Math.max(...paths.map(p => p.path.length));
  debugLog(`===== executeAllPlots 開始 maxSteps=${maxSteps} =====`);
  paths.forEach(p => {
    addLog(`  [${p.ship.name}] plot=${JSON.stringify(p.ship.plottedMoves)}`);
    addLog(`  [${p.ship.name}] path=${p.path.map(x=>`(${x.col},${x.row})dir${x.dir}`).join(' → ')}`);
    addLog(`  [${p.ship.name}] 現在位置: (${p.ship.col},${p.ship.row})dir${p.ship.dir}, sailState=${p.ship.sailState}, anchored=${!!p.ship.anchored}`);
  });

  let step = 1;
  const stepDuration = 150;  // ms per step

  function nextStep() {
    if (step >= maxSteps) {
      debugLog(`===== 最終位置確定 =====`);
      // 完了: 各艦の最終位置を確定
      paths.forEach(p => {
        const last = p.path[p.path.length - 1];
        const before = `(${p.ship.col},${p.ship.row})dir${p.ship.dir}`;
        p.ship.col = last.col;
        p.ship.row = last.row;
        p.ship.dir = last.dir;
        addLog(`  [${p.ship.name}] ${before} → (${p.ship.col},${p.ship.row})dir${p.ship.dir}`);
      });
      // 漂流/復帰カウンター更新
      paths.forEach(p => updateDriftState(p.ship, p.path));
      // 錨処理
      paths.forEach(p => updateAnchorState(p.ship));
      // 鉤縄処理
      paths.forEach(p => updateGrappleState(p.ship));
      // プロットクリア
      paths.forEach(p => {
        p.ship.plottedMoves = [];
        p.ship.plotDone = false;
      });
      isExecuting = false;
      executeMoveAftermath();
      addLog('=== プロット実行完了 ===');
      setInfo('プロット実行完了');
      draw();
      return;
    }
    // 衝突解決: このステップで同一ヘクスへ入る艦を検出
    // 衝突判定: 艦のbow/stern両hexで重なりを検出
    // 各艦の「次の位置」のbow/stern 2ヘクスを取得
    function getOccupiedHexes(col, row, dir) {
      const stern = (typeof getSternHex === 'function') ? getSternHex({ col, row, dir }) : null;
      return stern ? [`${col},${row}`, `${stern.col},${stern.row}`] : [`${col},${row}`];
    }
    // 停止中・path外の艦の現在位置（bow+stern）を「占有済み」として登録
    const occupiedByStatic = {};  // key=hex → ship参照
    paths.forEach(p => {
      const atFinal = (p.stopped || step >= p.path.length);
      if (!atFinal) return;
      const hexes = getOccupiedHexes(p.ship.col, p.ship.row, p.ship.dir);
      hexes.forEach(h => { occupiedByStatic[h] = p; });
    });
    // 動く艦の次位置のbow/stern を収集
    const movingCandidates = paths.map(p => {
      if (p.stopped) return null;
      if (step >= p.path.length) return null;
      const pos = p.path[step];
      return { p, pos, hexes: getOccupiedHexes(pos.col, pos.row, pos.dir) };
    }).filter(Boolean);
    // 衝突検出: 動く艦のhex全て vs 静止艦hex or 他の動く艦hex
    const collisionsByHex = {};
    movingCandidates.forEach(c => {
      c.hexes.forEach(h => {
        (collisionsByHex[h] = collisionsByHex[h] || []).push(c);
      });
    });
    const processedPairs = new Set();
    for (const h in collisionsByHex) {
      const group = collisionsByHex[h];
      const staticOwner = occupiedByStatic[h];
      const hasConflict = (group.length >= 2) || (staticOwner && !group.some(c => c.p === staticOwner));
      if (!hasConflict) continue;
      const combatants = [...group];
      if (staticOwner && !combatants.some(c => c.p === staticOwner)) combatants.push(staticOwner);
      const key = combatants.map(c => c.p.ship.name).sort().join('|');
      if (processedPairs.has(key)) continue;
      processedPairs.add(key);
      const [hc, hr] = h.split(',').map(Number);
      addLog(`衝突検出 @${hexId(hc, hr)}: ${combatants.map(c => c.p.ship.name).join(' vs ')}`);
      // 停止中艦が1隻でもあれば、そちらが優先。動艦は全て一歩手前に戻る
      const movingOnly = combatants.filter(c => !c.p.stopped && step < c.p.path.length);
      const staticExists = combatants.some(c => c.p.stopped || step >= c.p.path.length);
      let losers;
      if (staticExists) {
        // 静止艦優先、動艦は全員敗者
        losers = movingOnly;
      } else if (movingOnly.length >= 2) {
        // 動vs動: d6判定、同点は再振り
        while (true) {
          const rolls = movingOnly.map(g => ({ g, r: rollD6() }));
          rolls.sort((a, b) => b.r - a.r);
          addLog(`勝者判定: ${rolls.map(x => `${x.g.p.ship.name}=${x.r}`).join(', ')}`);
          if (rolls[0].r !== rolls[1].r) {
            losers = rolls.slice(1).map(x => x.g);
            break;
          }
          addLog(`同点 → 振り直し`);
        }
      } else {
        losers = movingOnly;
      }
      // 敗者は手前で侵入キャンセル → 停止（重なり解消まで後退）
      losers.forEach(l => {
        l.p.stopped = true;
        let retreatIdx = step - 1;
        while (retreatIdx >= 0) {
          const pos = l.p.path[retreatIdx];
          const hexes = getOccupiedHexes(pos.col, pos.row, pos.dir);
          const conflicts = paths.some(other => {
            if (other === l.p) return false;
            const oHexes = getOccupiedHexes(other.ship.col, other.ship.row, other.ship.dir);
            return hexes.some(h => oHexes.includes(h));
          });
          if (!conflicts) break;
          retreatIdx--;
        }
        l.p.path = l.p.path.slice(0, Math.max(0, retreatIdx + 1));
        if (l.p.path.length > 0) {
          const prev = l.p.path[l.p.path.length - 1];
          l.p.ship.col = prev.col;
          l.p.ship.row = prev.row;
          l.p.ship.dir = prev.dir;
        }
        addLog(`${l.p.ship.name}: 侵入キャンセル、step ${retreatIdx >= 0 ? retreatIdx : '開始'}まで後退`);
      });
    }

    // 第2チェック: 勝者の最終bow/sternが他艦のhexと重なるなら、その勝者も停止
    const allOccupiedAfter = {};
    paths.forEach(p => {
      if (p.stopped || step >= p.path.length) {
        // 停止中 or path外 → 現在位置でhex確定
        const hexes = getOccupiedHexes(p.ship.col, p.ship.row, p.ship.dir);
        hexes.forEach(h => { (allOccupiedAfter[h] = allOccupiedAfter[h] || []).push(p); });
      } else {
        // 動く艦は step 位置でhex算出
        const pos = p.path[step];
        const hexes = getOccupiedHexes(pos.col, pos.row, pos.dir);
        hexes.forEach(h => { (allOccupiedAfter[h] = allOccupiedAfter[h] || []).push(p); });
      }
    });
    for (const h in allOccupiedAfter) {
      const list = allOccupiedAfter[h];
      if (list.length < 2) continue;
      // 動く艦を優先的に停止（静止艦はそのまま）
      const movers = list.filter(p => !p.stopped && step < p.path.length);
      if (movers.length === 0) continue;
      const [hc, hr] = h.split(',').map(Number);
      movers.forEach(p => {
        if (p.stopped) return;
        p.stopped = true;
        let retreatIdx = step - 1;
        while (retreatIdx >= 0) {
          const pos = p.path[retreatIdx];
          const hexes = getOccupiedHexes(pos.col, pos.row, pos.dir);
          const conflicts = paths.some(other => {
            if (other === p) return false;
            const oHexes = getOccupiedHexes(other.ship.col, other.ship.row, other.ship.dir);
            return hexes.some(h => oHexes.includes(h));
          });
          if (!conflicts) break;
          retreatIdx--;
        }
        p.path = p.path.slice(0, Math.max(0, retreatIdx + 1));
        if (p.path.length > 0) {
          const prev = p.path[p.path.length - 1];
          p.ship.col = prev.col;
          p.ship.row = prev.row;
          p.ship.dir = prev.dir;
        }
        addLog(`${p.ship.name}: 再重なり検出 @${hexId(hc, hr)} → step ${retreatIdx >= 0 ? retreatIdx : '開始'}まで後退`);
      });
    }
    // 通常移動（停止していない艦のみ step 位置へ）
    paths.forEach(p => {
      if (p.stopped) { debugLog(`[step${step}] [${p.ship.name}] 停止中 (stopped)`); return; }
      if (step < p.path.length) {
        const before = `(${p.ship.col},${p.ship.row})dir${p.ship.dir}`;
        p.ship.col = p.path[step].col;
        p.ship.row = p.path[step].row;
        p.ship.dir = p.path[step].dir;
        debugLog(`[step${step}] [${p.ship.name}] ${before} → (${p.ship.col},${p.ship.row})dir${p.ship.dir}`);
      } else {
        debugLog(`[step${step}] [${p.ship.name}] path外 (path長=${p.path.length})`);
      }
    });
    // 高速観戦モード: 動いている jp艦にセンタリング
    if (isFastAiObserve()) {
      const movingJp = paths.find(p => p.ship.side === 'jp' && !p.stopped && step < p.path.length);
      if (movingJp) {
        const { x, y } = hexPt(movingJp.ship.col, movingJp.ship.row);
        const ma = document.getElementById('mapArea');
        if (ma) {
          ma.scrollLeft = x * zoomLevel - ma.clientWidth / 2;
          ma.scrollTop = y * zoomLevel - ma.clientHeight / 2;
        }
      }
    }
    draw();
    step++;
    setTimeout(nextStep, stepDuration);
  }
  nextStep();
}

// 漂流状態の更新（プロット実行後に呼ぶ）
function updateDriftState(s, path) {
  if (!path || path.length === 0) return;
  const startDir = path[0].dir;
  const endDir = path[path.length - 1].dir;
  const hasTurn = startDir !== endDir;
  const bs = s.battleSailSpeed || 3;

  if (s.drifting) {
    if (hasTurn) {
      s.turningRecoverCount = (s.turningRecoverCount || 0) + 1;
      const threshold = Math.max(1, 4 - bs);
      if (s.turningRecoverCount >= threshold) {
        s.drifting = false;
        s.turningRecoverCount = 0;
        addLog(`${s.name}: 漂流から復帰`);
      } else {
        addLog(`${s.name}: 回頭プロット ${s.turningRecoverCount}/${threshold}ターン目`);
      }
    } else {
      s.turningRecoverCount = 0;
    }
  } else {
    s.straightTurnCount = 0;
  }
  // 索具全列全損 or マスト喪失 → 漂流
  if (s.rigging?.sections && s.rigging.sections.every(v => v === 0) && !s.drifting) {
    s.drifting = true;
    addLog(`${s.name}: 索具全損 → 漂流`);
  }
  if (s.mastLost && !s.drifting) {
    s.drifting = true;
    addLog(`${s.name}: マスト喪失 → 漂流`);
  }
  // 鉤縄接続中は漂流
  if (s.grappledWith && s.grappledWith.length > 0 && !s.drifting) {
    s.drifting = true;
    addLog(`${s.name}: 鉤縄接続中 → 漂流`);
  }
}

// 鉤縄判定（プロット実行後に呼ぶ、1d6で1-2成功）
function updateGrappleState(s) {
  if (!s.plannedGrapple) return;
  const action = s.plannedGrapple;
  s.plannedGrapple = null;
  // 隣接艦を検出
  const others = [...state.jpFleet, ...state.usFleet].filter(o => o !== s && o.col >= 0);
  const adj = others.filter(o => {
    const nbs = getNeighbors(s.col, s.row);
    return nbs.some(([c, r]) => c === o.col && r === o.row);
  });
  if (adj.length === 0) { addLog(`${s.name}: 鉤縄操作失敗（隣接艦なし）`); return; }
  const target = adj[0]; // 複数隣接なら最初の艦
  const roll = rollD6();
  const success = roll <= 2;
  if (action === 'attach') {
    addLog(`${s.name} 鉤かけ vs ${target.name}: 1d6=${roll} → ${success?'成功':'失敗'}`);
    if (success) {
      s.grappledWith = Array.from(new Set([...(s.grappledWith||[]), target.name]));
      target.grappledWith = Array.from(new Set([...(target.grappledWith||[]), s.name]));
    }
  } else if (action === 'detach') {
    addLog(`${s.name} 鉤はずし vs ${target.name}: 1d6=${roll} → ${success?'成功':'失敗'}`);
    if (success) {
      s.grappledWith = (s.grappledWith||[]).filter(n => n !== target.name);
      target.grappledWith = (target.grappledWith||[]).filter(n => n !== s.name);
    }
  }
}

// 錨状態の更新（プロット実行後に呼ぶ）
function updateAnchorState(s) {
  if (s.plannedAnchor === 'drop') {
    if (s.anchorCut) {
      addLog(`${s.name}: 錨綱切断済みのため投錨不可`);
    } else {
      s.anchored = true;
      addLog(`${s.name}: 投錨 → 停止`);
    }
    s.plannedAnchor = null;
  } else if (s.plannedAnchor === 'raise') {
    s.raisingAnchorTurns = (s.raisingAnchorTurns || 0) + 1;
    if (s.raisingAnchorTurns >= 2) {
      s.anchored = false;
      s.raisingAnchorTurns = 0;
      addLog(`${s.name}: 抜錨完了`);
    } else {
      addLog(`${s.name}: 抜錨 ${s.raisingAnchorTurns}/2ターン目`);
    }
    s.plannedAnchor = null;
  } else if (s.plannedAnchor === 'cut') {
    s.anchored = false;
    s.anchorCut = true;
    addLog(`${s.name}: 錨綱切断 → 次ターンから移動可能、以後投錨不可`);
    s.plannedAnchor = null;
  } else {
    // プロットなしの場合、抜錨中ならカウンター維持（次ターン指示があれば継続）
  }
}

// プロットを仮実行して経路を返す（IJN phase_move.html 準拠）
// 漂流中の艦は通常移動不可、経路末尾に風方向1ヘクス自動追加
function simulatePlot(ship) {
  const path = [{col: ship.col, row: ship.row, dir: ship.dir}];
  let col = ship.col, row = ship.row, dir = ship.dir;

  // 投錨中は移動不可
  if (ship.anchored) {
    path.push({col, row, dir});
    return path;
  }

  // 漂流中はプロット処理を通常通り行う（プレイヤー選択で漂流トークン'6'を使う）

  let mp = (typeof maxMoveForAttitude === 'function') ? maxMoveForAttitude(ship, state.wind) : 4;
  let turnedThisHex = false;
  const dbg = (ship._debugPlot !== false);  // デバッグログ（既定ON）
  if (dbg) debugLog(`[simulatePlot] ${ship.name} 開始 col=${col} row=${row} dir=${dir} initMP=${mp} plot=${JSON.stringify(ship.plottedMoves)}`);
  for (const tok of (ship.plottedMoves || [])) {
    if (tok === '0') { path.push({col,row,dir}); if (dbg) debugLog(`  [${ship.name}] tok=0 stop`); continue; }
    if (mp <= 0) { if (dbg) debugLog(`  [${ship.name}] tok=${tok} → break (mp=${mp})`); break; }
    if (['1','2','3','7','8','9'].includes(tok)) {
      const newDir = parseInt(tok);
      if (newDir === dir) { path.push({col,row,dir}); if (dbg) debugLog(`  [${ship.name}] tok=${tok} 同方位 no-op`); continue; }
      if (turnedThisHex) { if (dbg) debugLog(`  [${ship.name}] tok=${tok} → break (turnedThisHex)`); break; }
      const ci = DIR_CW_ORDER.indexOf(dir);
      const adj1 = DIR_CW_ORDER[(ci + 1) % 6];
      const adj2 = DIR_CW_ORDER[(ci + 5) % 6];
      if (newDir !== adj1 && newDir !== adj2) { if (dbg) debugLog(`  [${ship.name}] tok=${tok} → break (非隣接: adj=${adj1},${adj2})`); break; }
      dir = newDir;
      mp--;
      turnedThisHex = true;
      const newMax = (typeof maxMoveForAttitude === 'function')
        ? maxMoveForAttitude({ ...ship, dir }, state.wind) : mp;
      const beforeCap = mp;
      if (mp > newMax) mp = newMax;
      if (dbg) debugLog(`  [${ship.name}] tok=${tok} 転舵→dir=${dir} mp=${beforeCap}→${mp} (cap=${newMax})`);
    } else if (tok === '5') {
      const n = hexNeighbor(col, row, dir);
      if (!n) { if (dbg) debugLog(`  [${ship.name}] tok=5 → break (edge)`); break; }
      col = n.col; row = n.row;
      mp--;
      turnedThisHex = false;
      if (dbg) debugLog(`  [${ship.name}] tok=5 前進→(${col},${row}) mp=${mp}`);
    } else if (tok === '4') {
      mp--;
      if (dbg) debugLog(`  [${ship.name}] tok=4 BACK mp=${mp}`);
    } else if (tok === '6') {
      const wd = state.wind?.direction;
      if (wd) {
        const n = hexNeighbor(col, row, wd);
        if (n) { col = n.col; row = n.row; }
      }
      if (dbg) debugLog(`  [${ship.name}] tok=6 DRIFT→(${col},${row})`);
    }
    path.push({col, row, dir});
  }
  return path;
}

// ブラウザバック禁止
history.pushState(null, '', location.href);
window.addEventListener('popstate', () => {
  history.pushState(null, '', location.href);
});
// ページ離脱確認
window.addEventListener('beforeunload', (e) => {
  e.preventDefault();
  e.returnValue = '';
});

// ゲームモード制御
const GAME_MODE_JP = {
  'human-vs-ai':'人間対AI',
  'ai-vs-ai-step':'AI対AI(ステップ)',
  'ai-vs-ai-auto':'AI対AI(オート)',
};
let autoAdvanceTimer = null;
const AUTO_STEP_INTERVAL = 2500; // ms

function applyGameModeUI() {
  const mode = state.gameMode || 'human-vs-ai';
  const lbl = document.getElementById('modeLabel');
  if (lbl) lbl.textContent = `モード: ${GAME_MODE_JP[mode]||mode}`;
  const btnAuto = document.getElementById('btnToggleAuto');
  const btnNext = document.getElementById('btnNextPhase');
  if (btnAuto && btnNext) {
    if (mode === 'human-vs-ai') {
      btnAuto.style.display = 'none';
      btnNext.style.display = 'none';
    } else if (mode === 'ai-vs-ai-step') {
      btnAuto.style.display = '';
      btnNext.style.display = '';
    } else { // ai-vs-ai-auto
      btnAuto.style.display = '';
      btnNext.style.display = '';
    }
    updateAutoButton();
  }
}

function updateAutoButton() {
  const b = document.getElementById('btnToggleAuto');
  if (!b) return;
  const on = !!autoAdvanceTimer;
  b.textContent = 'オート: ' + (on ? 'ON' : 'OFF');
  b.style.background = on ? '#8a4' : '#448';
}

function nextPhaseStep() {
  if (isExecuting) return;
  advancePhase();
}

function toggleAutoAdvance() {
  if (autoAdvanceTimer) {
    clearInterval(autoAdvanceTimer);
    autoAdvanceTimer = null;
  } else {
    const interval = isFastAiObserve() ? 400 : AUTO_STEP_INTERVAL;
    autoAdvanceTimer = setInterval(() => {
      if (!isExecuting) advancePhase();
    }, interval);
  }
  updateAutoButton();
}

// 初期化
if (loadFromSandbox()) {
  addLog(`戦闘開始 (自軍${state.jpFleet.length}隻, 敵軍${state.usFleet.length}隻)`);
  setInfo(`ターン 1 / ${state.phase} / ${GAME_MODE_JP[state.gameMode]||state.gameMode}`);
  applyGameModeUI();
  // ai-vs-ai-auto は起動時から自動進行開始
  if (state.gameMode === 'ai-vs-ai-auto') toggleAutoAdvance();
} else {
  addLog('サンドボックスから艦隊を編成してください');
  setInfo('艦隊未設定');
}
// 画像ロード待ち
if (mapImgLoaded) { initCanvas(); draw(); }
