<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<style>
body { background:#f5f5fa; color:#222; font-family:monospace; padding:12px; font-size:1.05em; }
h3 { color:#1a5a8a; margin-bottom:10px; font-size:1.15em; }
#info { background:#e8f0e8; border:1px solid #8a8; padding:8px; margin:8px 0; min-height:52px; line-height:1.6; border-radius:3px; }
#moveBar { color:#8a6a00; font-size:1.05em; font-weight:bold; margin:5px 0; min-height:20px; }
#shipList { margin:8px 0; max-height:200px; overflow-y:auto; }
.ship { padding:3px 6px; cursor:pointer; border-radius:2px; font-size:1em; }
.ship.active { background:#d0f0d0; color:#1a6a1a; font-weight:bold; }
.ship.done { color:#999; }
.ship.jp { color:#cc3311; }
.ship.us { color:#2255cc; }
button {
  background:#dde4f0; color:#334; border:1px solid #99a;
  padding:6px 10px; font-size:0.92em; cursor:pointer; border-radius:3px; margin:4px 3px 4px 0; font-weight:bold;
}
button:hover { background:#c8d4ee; }
button:disabled { background:#e8e8e8; color:#999; cursor:default; }
#keyHint { color:#666; font-size:0.88em; margin-top:10px; line-height:1.8; }
.phase-label { color:#2a8a2a; font-size:0.95em; font-weight:bold; margin:5px 0; }
button.undo-btn { background:#f0d0c0; color:#aa4400; border-color:#cc8866; }
button.undo-btn:hover { background:#ffd8c0; }
</style>
</head>
<body>
<h3 id="phTitle">移動フェーズ</h3>

<div id="info">localStorageからデータ読み込み中...</div>
<div id="moveBar"></div>

<div id="manualControls" style="display:none">
  <button onclick="doUndo()" class="undo-btn" id="btnUndo" disabled>◀ やり直し</button>
</div>

<div id="shipList"></div>

<button onclick="donePhase()" id="btnDone" style="display:none">次フェーズへ</button>

<div id="keyHint" style="display:none">
  テンキー操作:<br>
  7=左上 　　 9=右上<br>
  4=左　 5=直進 6=右<br>
  1=左下 　　 3=右下<br>
  Tab=次の艦
</div>

<script>
let state = null;
let jpFleet = [];
let usFleet = [];
let moving = null;    // 現在操作中の艦
let remainMove = 0;
let turnedThisHex = false;
let movedShips = new Set();  // 移動済み艦のインデックス
let undoStack = [];

const COLS = 36;
const JP_LINE_COL = 9;
const US_LINE_COL = COLS - 10; // 26

const DIR_NAMES = {6:'→東', 3:'↘南東', 1:'↙南西', 4:'←西', 7:'↗北西', 9:'↖北東'};

// 今の移動フェーズは先攻 or 後攻？
function isFirstMove() {
  return state.phase === 'move1' || state.phase === 'move'; // 旧名互換
}

// このフェーズで日本軍が動くか？
function isJPMoving() {
  const jpFirst = (state.initiative === 'jp');
  return isFirstMove() ? jpFirst : !jpFirst;
}

// デバッグ用
function dumpFleet(label, fleet) {
  console.log(`[FLEET] ${label}:`);
  fleet.forEach(s => {
    const flags = [];
    if (s.withdrawing) flags.push('離脱中');
    if (s.status === 'sunk') flags.push('沈没');
    if (getSpeed(s) === 0) flags.push('航行不能');
    if (s.cannotTurn) flags.push('回頭不能');
    if (s.cannotShoot) flags.push('射撃不能');
    console.log(`  ${s.name}(${s.type}) pos=(${s.col},${s.row}) dir=${s.dir} ${flags.join(' ')}`);
  });
}

// === 艦が移動可能か ===
function canShipMove(s) {
  if (s.status === 'sunk' || s.col < 0) return false;
  if (s.withdrawing) return false;
  if (getSpeed(s) === 0) return false;  // 航行不能
  return true;
}

// Load state
function init() {
  const raw = localStorage.getItem('hubState');
  if (!raw) { setInfo('hubStateが見つかりません'); return; }
  state = JSON.parse(raw);
  jpFleet = state.jpFleet || [];
  usFleet = state.usFleet || [];

  // 移動パスをリセット＋回頭カウントリセット
  [...jpFleet, ...usFleet].forEach(s => { s.path = []; s.turnCount = 0; });

  console.log(`=== 移動フェーズ開始 (${state.phase}) ターン${state.combatTurn} ===`);
  dumpFleet('JP移動前', jpFleet);

  // 大破艦・射撃不能艦 自動離脱
  autoWithdrawHeavy();

  const jpMoving = isJPMoving();

  if (jpMoving && !state.jpFreeMove) {
    startStraightMode();
  } else if (!jpMoving && !state.usFreeMove) {
    startStraightMode();
  } else if (!jpMoving) {
    startAutoUSMove();
  } else {
    startFreeMode();
  }
}

// ========== 直進モード（接触前）==========
function startStraightMode() {
  const label = isFirstMove() ? '先攻' : '後攻';
  const jpMoving = isJPMoving();
  const side = jpMoving ? '日本軍' : '米軍';
  document.getElementById('phTitle').textContent = `${label}移動 — ${side}直進`;
  setInfo(`接触前 — ${side}直進中...`);
  document.getElementById('keyHint').style.display = 'none';
  document.getElementById('manualControls').style.display = 'none';
  document.getElementById('btnDone').style.display = 'none';

  if (jpMoving) {
    autoAdvanceIndividual(jpFleet);  // JP: 各艦個別に直進
  } else {
    autoAdvanceColumn(usFleet);     // US: 旗艦+随伴グループ移動
  }

  pushState();

  // 接触チェック（非対称: 視認=両軍、レーダー=米軍のみ）
  const visual = checkVisualSpotting();
  const radar = checkRadar();

  if (visual) {
    state.jpDetected = true;
    state.usDetected = true;
    state.jpFreeMove = true;
    state.usFreeMove = true;
    state.contactMade = true;
    pushState();
    setInfo('敵艦発見！ 両軍自由移動可能');
  } else if (radar && !state.usDetected) {
    state.usDetected = true;
    state.usFreeMove = true;
    state.contactMade = true;
    pushState();
    setInfo(`${side}直進完了 — 敵未発見`);
  } else if (!visual && !radar) {
    checkLineReach();
    setInfo(`${side}直進完了 — 敵未発見`);
  }

  renderList();
  dumpFleet('JP移動後', jpFleet);

  setTimeout(() => donePhase(), 1500);
}

// ========== 大破艦・射撃不能艦 自動離脱 ==========
function autoWithdrawHeavy() {
  const allShips = [...jpFleet, ...usFleet];
  for (const ship of allShips) {
    // 大破 or (US側で射撃不能)
    const shouldWithdraw = (ship.status === 'heavy') ||
                           (ship.side === 'us' && ship.cannotShoot);
    if (!shouldWithdraw || ship.col < 0 || ship.status === 'sunk') continue;
    if (ship.withdrawing) {
      // 既に離脱中 → 退却移動（航行不能なら移動不可）
      if (getSpeed(ship) > 0) withdrawMove(ship);
      continue;
    }
    // 離脱開始
    ship.withdrawing = true;
    ship.retreatDir = ship.side === 'jp' ? 4 : 6;  // JP=西, US=東
    const wasLead = ship.isLead;
    const ci = ship.colIndex;
    ship.isLead = false;
    const reason = ship.status === 'heavy' ? '大破' : '射撃不能';
    setInfo(`${ship.name} ${reason}！ 離脱開始`);
    if (getSpeed(ship) > 0) withdrawMove(ship);

    // US旗艦だった場合 → 次の艦に昇格（US列構造維持のため）
    if (ship.side === 'us' && wasLead) {
      const remaining = usFleet.filter(s =>
        s.colIndex === ci && s.col >= 0 && s.status !== 'sunk' &&
        s.status !== 'heavy' && !s.withdrawing && !s.cannotShoot
      );
      if (remaining.length > 0) {
        remaining.sort((a,b) => a.followOrder - b.followOrder);
        remaining[0].isLead = true;
        setInfo(`${remaining[0].name} が旗艦に昇格`);
        remaining.forEach((s,i) => { s.followOrder = i; });
      }
    }
  }
  pushState();
}

// 60°ずつ最短回頭で退却方向を向きながら移動
const DIR_CW = [6,3,1,4,7,9];
function turnStep(curDir, targetDir) {
  if (curDir === targetDir) return curDir;
  const ci = DIR_CW.indexOf(curDir);
  const ti = DIR_CW.indexOf(targetDir);
  const cwDist = (ti - ci + 6) % 6;
  const ccwDist = (ci - ti + 6) % 6;
  if (cwDist <= ccwDist) return DIR_CW[(ci + 1) % 6];
  return DIR_CW[(ci + 5) % 6];
}

function withdrawMove(ship) {
  const spd = Math.max(1, Math.ceil(getSpeed(ship) / 2));  // 大破=半速
  const target = ship.retreatDir;
  let remain = spd;

  while (remain > 0) {
    if (ship.dir !== target) {
      ship.dir = turnStep(ship.dir, target);
      remain--;
      if (remain <= 0) break;
    }
    const next = hexNeighbor(ship.col, ship.row, ship.dir);
    if (!next) { ship.col = -1; break; }
    if (next.col < 0 || next.col >= COLS || next.row < 0) { ship.col = -1; break; }
    if (occupied(next.col, next.row, ship)) break;
    ship.col = next.col;
    ship.row = next.row;
    remain--;
  }
  if (ship.col < 0) {
    setInfo(`${ship.name} マップから離脱`);
  }
}

// ========== JP: 各艦個別に直進（接触前） ==========
function autoAdvanceIndividual(fleet) {
  const ships = fleet.filter(s => s.status !== 'sunk' && s.col >= 0 && !s.withdrawing && getSpeed(s) > 0);
  // 前方の艦から先に動かす（ブロック回避）
  ships.sort((a, b) => {
    const aEast = [6,3,9].includes(a.dir);
    const bEast = [6,3,9].includes(b.dir);
    if (aEast && bEast) return b.col - a.col;
    if (!aEast && !bEast) return a.col - b.col;
    return 0;
  });

  for (const ship of ships) {
    const spd = getSpeed(ship);
    const moveCount = ship.dmgM >= ship.capM / 2 ? Math.max(1, Math.ceil(spd/2)) : spd;
    for (let step = 0; step < moveCount; step++) {
      const next = hexNeighbor(ship.col, ship.row, ship.dir);
      if (!next) break;
      if (next.col < 0 || next.col >= COLS || next.row < 0) break;
      if (occupied(next.col, next.row, ship)) break;
      ship.col = next.col;
      ship.row = next.row;
    }
  }
}

// ========== US: 旗艦+随伴のグループ移動（直進モード） ==========
function autoAdvanceColumn(fleet) {
  const preMove = fleet.map(s => ({ name: s.name, colIndex: s.colIndex, col: s.col, row: s.row }));
  const leads = fleet.filter(s => s.isLead && s.status !== 'sunk' && s.col >= 0 && !s.withdrawing);

  leads.sort((a, b) => {
    const aEast = [6,3,9].includes(a.dir);
    const bEast = [6,3,9].includes(b.dir);
    if (aEast && bEast) return b.col - a.col;
    if (!aEast && !bEast) return a.col - b.col;
    return 0;
  });

  for (const lead of leads) {
    const spd = getSpeed(lead);
    const moveCount = lead.dmgM >= lead.capM / 2 ? Math.max(1, Math.ceil(spd/2)) : spd;

    for (let step = 0; step < moveCount; step++) {
      const next = hexNeighbor(lead.col, lead.row, lead.dir);
      if (!next) break;
      if (next.col < 0 || next.col >= COLS || next.row < 0) break;
      if (occupied(next.col, next.row, lead)) break;

      lead.path = lead.path || [];
      lead.path.push({col: lead.col, row: lead.row, dir: lead.dir});
      lead.col = next.col;
      lead.row = next.row;

      moveFollowers(lead, fleet);
    }
  }

  // 整合性チェック
  for (let i = 0; i < fleet.length; i++) {
    const s = fleet[i];
    const pre = preMove[i];
    if (s.colIndex !== pre.colIndex) {
      console.error(`[BUG] ${s.name} colIndex変化: ${pre.colIndex} → ${s.colIndex}`);
    }
  }
}

// 視認距離内に敵がいるか
function checkVisualSpotting() {
  const sr = state.spotRange || 0;
  if (sr <= 0) return false;
  for (const jp of jpFleet) {
    if (jp.status === 'sunk' || jp.col < 0) continue;
    for (const us of usFleet) {
      if (us.status === 'sunk' || us.col < 0) continue;
      if (hexDist(jp.col, jp.row, us.col, us.row) <= sr) return true;
    }
  }
  return false;
}

// レーダー探知（米軍用 — 20hex以内）
function checkRadar() {
  for (const us of usFleet) {
    if (us.status === 'sunk' || us.col < 0 || !us.radar) continue;
    for (const jp of jpFleet) {
      if (jp.status === 'sunk' || jp.col < 0) continue;
      if (hexDist(jp.col, jp.row, us.col, us.row) <= 20) return true;
    }
  }
  return false;
}

function checkSpotting() { return checkVisualSpotting() || checkRadar(); }

function checkLineReach() {
  if (!state.jpFreeMove && jpFleet.some(s => s.status !== 'sunk' && s.col >= US_LINE_COL)) {
    state.jpFreeMove = true;
  }
  if (!state.usFreeMove && usFleet.some(s => s.status !== 'sunk' && s.col <= JP_LINE_COL)) {
    state.usFreeMove = true;
  }
}

// ========== 米軍自動移動 ==========
function startAutoUSMove() {
  const label = isFirstMove() ? '先攻' : '後攻';
  document.getElementById('phTitle').textContent = `${label}移動 — 米軍（自動）`;
  setInfo('米軍移動中...');
  document.getElementById('keyHint').style.display = 'none';
  document.getElementById('manualControls').style.display = 'none';
  document.getElementById('btnDone').style.display = 'none';

  if (state.contactMade || state.usFreeMove) {
    aiUSMove();  // 戦術AI移動
  } else {
    autoAdvanceColumn(usFleet);  // 接触前は直進
  }
  pushState();
  renderList();

  setTimeout(() => donePhase(), 1000);
}

// ===== 米軍戦術AI移動 =====
const DIR_CW_AI = [6,3,1,4,7,9];

// JP艦隊の重心
function jpCenter() {
  const alive = jpFleet.filter(s => s.status !== 'sunk' && s.col >= 0);
  if (alive.length === 0) return {col:0, row:10};
  const sc = alive.reduce((a,s) => a+s.col, 0) / alive.length;
  const sr = alive.reduce((a,s) => a+s.row, 0) / alive.length;
  return {col: Math.round(sc), row: Math.round(sr)};
}

// JP艦隊の主要進行方向
function jpMainDir() {
  const alive = jpFleet.filter(s => s.status !== 'sunk' && s.col >= 0);
  if (alive.length === 0) return 6;
  const counts = {};
  for (const s of alive) { counts[s.dir] = (counts[s.dir]||0)+1; }
  let best = 6, bv = 0;
  for (const [d,c] of Object.entries(counts)) { if (c > bv) { bv=c; best=parseInt(d); } }
  return best;
}

// from→targetへの最適方向
function bestDirToward(fc, fr, tc, tr) {
  let bestDir = 6, bestDist = 999;
  for (const d of DIR_CW_AI) {
    const n = hexNeighbor(fc, fr, d);
    if (!n) continue;
    const dist = hexDist(n.col, n.row, tc, tr);
    if (dist < bestDist) { bestDist = dist; bestDir = d; }
  }
  return bestDir;
}

// from→targetから離れる最適方向
function bestDirAway(fc, fr, tc, tr) {
  let bestDir = 6, bestDist = -1;
  for (const d of DIR_CW_AI) {
    const n = hexNeighbor(fc, fr, d);
    if (!n) continue;
    const dist = hexDist(n.col, n.row, tc, tr);
    if (dist > bestDist) { bestDist = dist; bestDir = d; }
  }
  return bestDir;
}

// JP進行方向に対して垂直な方向（T字用）
function perpDirToJP(jpDir, usCol, usRow, jpCol, jpRow) {
  const ci = DIR_CW_AI.indexOf(jpDir);
  const perp1 = DIR_CW_AI[(ci + 2) % 6];
  const perp2 = DIR_CW_AI[(ci + 4) % 6];
  const n1 = hexNeighbor(usCol, usRow, perp1);
  const n2 = hexNeighbor(usCol, usRow, perp2);
  if (!n1) return perp2;
  if (!n2) return perp1;
  const d1 = hexDist(n1.col, n1.row, jpCol, jpRow);
  const d2 = hexDist(n2.col, n2.row, jpCol, jpRow);
  const ideal = 12;
  return Math.abs(d1 - ideal) <= Math.abs(d2 - ideal) ? perp1 : perp2;
}

function aiTurnStep(curDir, targetDir) {
  if (curDir === targetDir) return curDir;
  const ci = DIR_CW_AI.indexOf(curDir);
  const ti = DIR_CW_AI.indexOf(targetDir);
  const cwDist = (ti - ci + 6) % 6;
  const ccwDist = (ci - ti + 6) % 6;
  if (cwDist <= ccwDist) return DIR_CW_AI[(ci + 1) % 6];
  return DIR_CW_AI[(ci + 5) % 6];
}

function aiUSMove() {
  const jpc = jpCenter();
  const jpDir = jpMainDir();
  const sr = state.spotRange || 6;
  const leads = usFleet.filter(s => s.isLead && s.status !== 'sunk' && s.col >= 0 && !s.withdrawing);

  // 前方の艦からソート
  leads.sort((a, b) => {
    const aEast = [6,3,9].includes(a.dir);
    const bEast = [6,3,9].includes(b.dir);
    if (aEast && bEast) return b.col - a.col;
    if (!aEast && !bEast) return a.col - b.col;
    return 0;
  });

  for (const lead of leads) {
    const spd = getSpeed(lead);
    const moveCount = lead.dmgM >= lead.capM / 2 ? Math.max(1, Math.ceil(spd/2)) : spd;
    const isDD = (lead.type === 'DD');
    const distToJP = hexDist(lead.col, lead.row, jpc.col, jpc.row);

    let targetDir;

    if (isDD) {
      // === DD戦術: 魚雷突撃 or 離脱 ===
      if (lead.torpedoFired) {
        targetDir = 6;
      } else {
        let closestJP = null, closestDist = 999;
        for (const jp of jpFleet) {
          if (jp.status === 'sunk' || jp.col < 0) continue;
          const d = hexDist(lead.col, lead.row, jp.col, jp.row);
          if (d < closestDist) { closestDist = d; closestJP = jp; }
        }
        if (closestJP) {
          targetDir = bestDirToward(lead.col, lead.row, closestJP.col, closestJP.row);
        } else {
          targetDir = lead.dir;
        }
      }
    } else {
      // === 主力艦戦術: T字戦法 ===
      if (distToJP > sr + 3) {
        let goalCol = jpc.col, goalRow = jpc.row;
        for (let i = 0; i < sr + 2; i++) {
          const n = hexNeighbor(goalCol, goalRow, jpDir);
          if (!n) break;
          goalCol = n.col; goalRow = n.row;
        }
        targetDir = bestDirToward(lead.col, lead.row, goalCol, goalRow);
      } else if (distToJP < 8) {
        targetDir = bestDirAway(lead.col, lead.row, jpc.col, jpc.row);
      } else {
        targetDir = perpDirToJP(jpDir, lead.col, lead.row, jpc.col, jpc.row);
      }
    }

    // 移動実行（回頭+直進、衝突回避付き）
    let remain = moveCount;
    let turned = false;
    while (remain > 0) {
      // 目標方向を向いていなければ60°回頭
      if (lead.dir !== targetDir && !turned && !lead.cannotTurn) {
        lead.dir = aiTurnStep(lead.dir, targetDir);
        lead.turnCount = (lead.turnCount || 0) + 1;
        remain--;
        turned = true;
        if (remain <= 0) break;
      }
      // 直進
      const next = hexNeighbor(lead.col, lead.row, lead.dir);
      if (!next) break;
      if (next.col < 0 || next.col >= COLS || next.row < 0) break;

      if (occupied(next.col, next.row, lead)) {
        // === 衝突回避: 左右60°に迂回を試みる ===
        const curDirIdx = DIR_CW_AI.indexOf(lead.dir);
        let avoided = false;
        for (const offset of [1, 5]) {  // CW, CCW
          const altDir = DIR_CW_AI[(curDirIdx + offset) % 6];
          const altNext = hexNeighbor(lead.col, lead.row, altDir);
          if (altNext && altNext.col >= 0 && altNext.col < COLS && altNext.row >= 0
              && !occupied(altNext.col, altNext.row, lead)) {
            lead.path = lead.path || [];
            lead.path.push({col: lead.col, row: lead.row, dir: lead.dir});
            lead.col = altNext.col;
            lead.row = altNext.row;
            moveFollowers(lead, usFleet);
            avoided = true;
            remain--;
            break;
          }
        }
        if (!avoided) break;  // 完全にブロック → 停止
        turned = false;
        continue;
      }

      lead.path = lead.path || [];
      lead.path.push({col: lead.col, row: lead.row, dir: lead.dir});
      lead.col = next.col;
      lead.row = next.row;
      turned = false;
      remain--;

      moveFollowers(lead, usFleet);
    }
  }
}

// ========== 自由移動モード（接触後・日本軍ターン）==========
function startFreeMode() {
  const label = isFirstMove() ? '先攻' : '後攻';
  document.getElementById('phTitle').textContent = `${label}移動 — 日本軍`;
  setInfo('艦をクリックかTabで選択\n147963=方向転換 5=直進');
  document.getElementById('keyHint').style.display = 'block';
  document.getElementById('manualControls').style.display = 'block';
  document.getElementById('btnDone').style.display = '';

  // 移動不可の艦を自動スキップ
  jpFleet.forEach((s, i) => {
    if (!canShipMove(s)) {
      movedShips.add(i);
      if (getSpeed(s) === 0 && s.status !== 'sunk' && s.col >= 0 && !s.withdrawing) {
        console.log(`${s.name} 航行不能 — 移動スキップ`);
      }
    }
  });

  renderList();
  checkAllMoved();
}

function setInfo(t) { document.getElementById('info').textContent = t; }
function setMoveBar(t) { document.getElementById('moveBar').textContent = t; }

function statusJP(s) {
  return {light:'小破', medium:'中破', heavy:'大破', sunk:'沈没'}[s] || '';
}

function getShipStatusText(s) {
  const parts = [];
  if (s.status !== 'ok') parts.push(statusJP(s.status));
  if (getSpeed(s) === 0 && s.status !== 'sunk') parts.push('航行不能');
  if (s.cannotTurn) parts.push('回頭不能');
  if (s.cannotShoot) parts.push('射撃不能');
  if (s.withdrawing) parts.push('離脱中');
  return parts.length > 0 ? ` [${parts.join('/')}]` : '';
}

function renderList() {
  const el = document.getElementById('shipList');
  let html = '<div class="phase-label">— 日本軍 —</div>';

  jpFleet.forEach((s, i) => {
    const statusText = getShipStatusText(s);
    const isDone = movedShips.has(i);
    const isActive = (moving === s);
    const isMoveable = canShipMove(s) && !isDone;

    let cls = 'ship jp';
    if (isActive) cls += ' active';
    else if (isDone || !isMoveable) cls += ' done';

    const onclick = (isMoveable || isActive) ? ` onclick="clickShip(${i})"` : '';
    const style = (!isMoveable && !isActive) ? ' style="cursor:default"' : '';

    html += `<div class="${cls}"${onclick}${style}>${s.name}(${s.type})${statusText}</div>`;
  });

  html += '<div class="phase-label" style="margin-top:6px">— 米軍 —</div>';
  html += usFleet.map(s => {
    const statusText = getShipStatusText(s);
    return `<div class="ship us">${s.name}(${s.type})${statusText}</div>`;
  }).join('');

  el.innerHTML = html;
}

function clickShip(i) {
  if (!state.jpFreeMove) return;
  const s = jpFleet[i];
  if (!canShipMove(s)) return;
  if (movedShips.has(i) && moving !== s) return;
  startMove(s);
}

function startMove(ship) {
  // 航行不能チェック（念のため）
  if (getSpeed(ship) === 0) {
    const idx = jpFleet.indexOf(ship);
    movedShips.add(idx);
    setInfo(`${ship.name} 航行不能 — 移動スキップ`);
    renderList();
    checkAllMoved();
    return;
  }

  moving = ship;
  turnedThisHex = false;
  undoStack = [];
  document.getElementById('btnUndo').disabled = true;
  let spd = getSpeed(ship);
  if (ship.dmgM >= ship.capM / 2) spd = Math.max(1, Math.ceil(spd/2));
  remainMove = spd;

  let restriction = '';
  if (ship.cannotTurn) restriction = '\n⚠ 回頭不能 — 直進(5)のみ';
  setInfo(`移動中: ${ship.name} 向き:${DIR_NAMES[ship.dir]||'?'}${restriction}\n147963=方向転換 5=直進`);
  setMoveBar(`残り移動力: ${remainMove}`);
  renderList();
  pushState();
}

function getSpeed(s) {
  // クリティカルで速力変更済みならそちらを使用
  if (s.speed !== undefined && s.speed !== null) return s.speed;
  return {BB:4,OBB:3,CA:5,CL:6,CLAA:5,DD:6}[s.type] || 4;
}

// Axial hex math (pointy-top offset)
function toAxial(c,r) { return {q:c-(r-(r&1))/2, r:r}; }
function hexDist(c1,r1,c2,r2) {
  const a=toAxial(c1,r1), b=toAxial(c2,r2);
  return Math.max(Math.abs(a.q-b.q),Math.abs(a.r-b.r),Math.abs((a.q+a.r)-(b.q+b.r)));
}

// Pointy-top hex neighbor (odd-row offset)
function hexNeighbor(col, row, dir) {
  const even = (row % 2 === 0);
  const neighbors = {
    6:  even ? [1,0]  : [1,0],
    4:  even ? [-1,0] : [-1,0],
    3:  even ? [0,1]  : [1,1],
    1:  even ? [-1,1] : [0,1],
    9:  even ? [0,-1] : [1,-1],
    7:  even ? [-1,-1]: [0,-1],
  };
  const d = neighbors[dir];
  if (!d) return null;
  return {col: col+d[0], row: row+d[1]};
}

function occupied(col, row, skipShip) {
  return [...(state.jpFleet||[]), ...(state.usFleet||[])].some(s =>
    s !== skipShip && s.col===col && s.row===row && s.status!=='sunk' && s.col >= 0
  );
}

// ========== やり直し ==========
function saveUndo() {
  undoStack.push({
    col: moving.col, row: moving.row, dir: moving.dir,
    remainMove,
    turnedThisHex
  });
  document.getElementById('btnUndo').disabled = false;
}

function doUndo() {
  if (undoStack.length === 0 || !moving) return;
  const snap = undoStack.pop();
  moving.col = snap.col;
  moving.row = snap.row;
  moving.dir = snap.dir;
  remainMove = snap.remainMove;
  turnedThisHex = snap.turnedThisHex;
  let restriction = moving.cannotTurn ? '\n⚠ 回頭不能 — 直進(5)のみ' : '';
  setInfo(`やり直し — ${moving.name} 向き:${DIR_NAMES[moving.dir]||'?'}${restriction}\n147963=方向転換 5=直進`);
  setMoveBar(`残り移動力: ${remainMove}`);
  pushState();
  renderList();
  if (undoStack.length === 0) document.getElementById('btnUndo').disabled = true;
}

// ========== 方向転換（147963）==========
function turnTo(dir) {
  if (!moving || remainMove <= 0) return;
  if (moving.cannotTurn) {
    setInfo('回頭不能 — 直進(5)のみ可能！');
    return;
  }
  if (moving.dir === dir) {
    setInfo(`既に${DIR_NAMES[dir]}を向いています`);
    return;
  }
  if (turnedThisHex) {
    setInfo('同じヘックスで2回連続回頭不可！');
    return;
  }

  saveUndo();
  moving.dir = dir;
  moving.turnCount = (moving.turnCount || 0) + 1;  // 回頭数記録（砲撃修正用）
  remainMove--;
  turnedThisHex = true;
  setInfo(`${moving.name} → ${DIR_NAMES[dir]} (回頭)\n5=直進`);
  setMoveBar(`残り移動力: ${remainMove}`);
  pushState();
  if (remainMove <= 0) finishMove();
}

// ========== 直進（5キー）==========
function moveForward() {
  if (!moving || remainMove <= 0) return;

  const next = hexNeighbor(moving.col, moving.row, moving.dir);
  if (!next) { setInfo('移動先なし'); return; }
  if (next.col < 0 || next.col >= COLS || next.row < 0) {
    setInfo('マップ外'); return;
  }
  if (occupied(next.col, next.row, moving)) {
    setInfo(`(${next.col},${next.row}) は塞がっています`); return;
  }

  saveUndo();

  moving.col = next.col;
  moving.row = next.row;
  turnedThisHex = false;
  remainMove--;

  let restriction = moving.cannotTurn ? '\n⚠ 回頭不能 — 直進(5)のみ' : '';
  setInfo(`${moving.name} 前進 → (${next.col},${next.row})${restriction}\n147963=方向転換 5=直進`);
  setMoveBar(`残り移動力: ${remainMove}`);
  pushState();

  if (remainMove <= 0) finishMove();
}

// US列用の随伴艦追従（USのみ使用）
function moveFollowers(lead, fleet) {
  const ci = lead.colIndex;
  const followers = fleet
    .filter(s => !s.isLead && s.colIndex === ci && s.status !== 'sunk' && s.col >= 0 && !s.withdrawing)
    .sort((a,b) => a.followOrder - b.followOrder);

  const chain = [lead, ...followers];
  for (let i = 1; i < chain.length; i++) {
    const ahead = chain[i-1];
    if (!ahead.path || ahead.path.length === 0) continue;
    const target = ahead.path[0];
    chain[i].path = chain[i].path || [];
    chain[i].path.push({col: chain[i].col, row: chain[i].row, dir: chain[i].dir});
    chain[i].col = target.col;
    chain[i].row = target.row;
    chain[i].dir = target.dir;
    ahead.path.shift();
  }
  if (chain.length > 1) {
    const last = chain[chain.length - 1];
    if (last.path && last.path.length > 0) last.path = [];
  }
}

function finishMove() {
  const idx = jpFleet.indexOf(moving);
  movedShips.add(idx);
  setInfo(`${moving.name} 移動完了`);
  setMoveBar('');
  moving = null;
  undoStack = [];
  document.getElementById('btnUndo').disabled = true;
  renderList();
  pushState();

  checkAllMoved();
}

// 全艦の移動完了チェック
function checkAllMoved() {
  const allDone = jpFleet.every((s, i) => {
    if (!canShipMove(s)) return true;  // 移動不可は自動完了扱い
    return movedShips.has(i);
  });
  if (allDone) {
    setInfo('全艦の移動完了！');
    setTimeout(() => donePhase(), 800);
  }
}

function pushState() {
  state.jpFleet = jpFleet;
  state.usFleet = usFleet;
  localStorage.setItem('hubState', JSON.stringify(state));
  parent.postMessage({ type:'STATE_UPDATE',
    jpFleet, usFleet,
    jpDetected:state.jpDetected, usDetected:state.usDetected,
    jpFreeMove:state.jpFreeMove, usFreeMove:state.usFreeMove,
    contactMade:state.contactMade
  }, '*');
}

function donePhase() {
  if (moving) {
    const idx = jpFleet.indexOf(moving);
    movedShips.add(idx);
    moving = null;
  }
  pushState();
  parent.postMessage({ type:'PHASE_DONE' }, '*');
}

// Keyboard
document.addEventListener('keydown', e => {
  if (!state || !state.jpFreeMove) return; // 直進モード中はキー無効

  // 方向転換キー（147963）
  const dirs = {'6':6,'4':4,'9':9,'3':3,'7':7,'1':1};
  if (dirs[e.key] !== undefined) {
    e.preventDefault();
    turnTo(dirs[e.key]);
    return;
  }

  // 直進キー（5）
  if (e.key === '5') {
    e.preventDefault();
    moveForward();
    return;
  }

  // やり直し（Backspace / z）
  if (e.key === 'Backspace' || e.key === 'z') {
    e.preventDefault();
    doUndo();
    return;
  }

  if (e.key === 'Tab') {
    e.preventDefault();
    // 未移動の艦を順に選択
    const moveable = jpFleet
      .map((s, i) => ({ship: s, idx: i}))
      .filter(x => canShipMove(x.ship) && !movedShips.has(x.idx));
    if (moveable.length === 0) return;
    const curIdx = moving ? jpFleet.indexOf(moving) : -1;
    let next = moveable.find(x => x.idx > curIdx);
    if (!next) next = moveable[0];  // 先頭に戻る
    startMove(next.ship);
  }
});

init();
</script>
</body>
</html>
