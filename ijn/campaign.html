        .status-sunk { color: #999; text-decoration: line-through; }

        button:disabled { background-color: #ddd; color: #999; cursor: not-allowed; }
        #log { background-color: #f0f0f0; padding: 10px; height: 160px; overflow-y: scroll; font-family: monospace; border: 1px solid #ccc; margin-top: 20px; font-size: 1em; color: #333;}
        .history-entry { background:#fff; padding:12px; border-radius:8px; margin-bottom:10px; border-left: 3px solid #2266cc; border: 1px solid #ddd; }

</head>

let usScore = 14;
let currentJpFleet = [];
let currentUsFleet = [];
let usedRolls = [];
let maxUsHandicap = 0;
let battleHistory = [];
let currentPhase = 'sortie'; // 'sortie', 'combat', 'next'

// --- ユーティリティ ---
function logMsg(msg) {
    const logDiv = document.getElementById('log');
    logDiv.innerHTML += `<div>${msg}</div>`;
    logDiv.scrollTop = logDiv.scrollHeight;
}
function rollDice(sides = 6) { return Math.floor(Math.random() * sides) + 1; }
function getShipByName(name, array) { return array.find(s => s.name === name); }

function sortShips(fleet, isJp) {
    return fleet.sort((a, b) => {
        // 火力(capG)降順 → 同火力なら装甲(capM)降順
        if (a.capG !== b.capG) return b.capG - a.capG;
        if (a.capM !== b.capM) return b.capM - a.capM;
        if (isJp) {
            return a.yomi.localeCompare(b.yomi, 'ja');
        } else {
            return a.name.localeCompare(b.name, 'en');
        }
    });
}

function updateTurnDisplay() {
    document.getElementById('currentTurn').innerText = currentTurn;
    document.getElementById('currentTurnName').innerText = BATTLE_NAMES[currentTurn] || `第${currentTurn}回戦`;
}

function updateScoreUI() {
    document.getElementById('jpScore').innerText = jpScore;
    document.getElementById('usScore').innerText = usScore;
}

// --- キャンペーン状態永続化 ---
function saveCampaignState() {
    const state = {
        currentTurn, jpScore, usScore, usedRolls, maxUsHandicap, currentPhase,
        jpAllShipsState: jpAllShips.map(s => ({ name: s.name, dmgG: s.dmgG, dmgM: s.dmgM, status: s.status, rest: s.rest })),
        usAllShipsState: usAllShips.map(s => ({ name: s.name, dmgG: s.dmgG, dmgM: s.dmgM, status: s.status, used: s.used })),
        currentJpFleetNames: currentJpFleet.map(s => s.name),
        currentUsFleetNames: currentUsFleet.map(s => s.name),
        battleHistory: battleHistory,
    };
    localStorage.setItem('campaignState', JSON.stringify(state));
}

function loadCampaignState() {
    const raw = localStorage.getItem('campaignState');
    if (!raw) return false;
    try {
        const state = JSON.parse(raw);
        currentTurn = state.currentTurn || 1;
        jpScore = state.jpScore || 38;
        usScore = state.usScore || 14;
        usedRolls = state.usedRolls || [];
        maxUsHandicap = state.maxUsHandicap || 0;
        currentPhase = state.currentPhase || 'sortie';
        battleHistory = state.battleHistory || [];

        if (state.jpAllShipsState) {
            state.jpAllShipsState.forEach(saved => {
                const ship = jpAllShips.find(s => s.name === saved.name);
                if (ship) { ship.dmgG = saved.dmgG; ship.dmgM = saved.dmgM; ship.status = saved.status; ship.rest = saved.rest; }
            });
        }
        if (state.usAllShipsState) {
            state.usAllShipsState.forEach(saved => {
                const ship = usAllShips.find(s => s.name === saved.name);
                if (ship) { ship.dmgG = saved.dmgG; ship.dmgM = saved.dmgM; ship.status = saved.status; ship.used = saved.used; }
            });
        }

        currentJpFleet = (state.currentJpFleetNames || []).map(n => jpAllShips.find(s => s.name === n)).filter(Boolean);
        currentUsFleet = (state.currentUsFleetNames || []).map(n => usAllShips.find(s => s.name === n)).filter(Boolean);

        updateTurnDisplay();
        updateScoreUI();
        renderTables();
        renderBattleHistory();

        // スコアは戦闘結果があるときだけ表示
        if (battleHistory.length > 0) {
            document.getElementById('scoreArea').style.display = '';
        }

        // ボタン状態復元
        if (currentPhase === 'combat') {
            document.getElementById('btnSortie').disabled = true;
            document.getElementById('btnCombat').disabled = false;
            document.getElementById('btnNext').disabled = true;
            document.getElementById('scoreArea').style.display = 'none';
        } else if (currentPhase === 'next') {
            document.getElementById('btnSortie').disabled = true;
            document.getElementById('btnCombat').disabled = true;
            document.getElementById('btnNext').disabled = false;
        } else {
            document.getElementById('btnSortie').disabled = false;
            document.getElementById('btnCombat').disabled = true;
            document.getElementById('btnNext').disabled = true;
        }

        return true;
    } catch(e) {
        console.error('Campaign state load error:', e);
        return false;
    }
}

function resetCampaign() {
    if (!confirm('キャンペーンデータをリセットしますか？')) return;
    localStorage.removeItem('campaignState');
    localStorage.removeItem('campaignFleet');
    localStorage.removeItem('battleResultForCampaign');
    location.reload();
}

// --- フェイズ1: 出撃編成 ---
function phaseSortie() {
    document.getElementById('scoreArea').style.display = 'none';
    logMsg(`\n--- ${BATTLE_NAMES[currentTurn]} 編成フェイズ ---`);

    let roll = 0;
    while (roll === 0 || usedRolls.includes(roll)) {
        roll = rollDice() + rollDice();
    }
    usedRolls.push(roll);
    logMsg(`連合艦隊出撃ダイス: ${roll}`);

    let jpNames = [];
    let ddCount = 0;

    if (roll === 2) { jpNames = ['高雄', '愛宕', '大和', '由良', '長門', '陸奥', '摩耶', '鳥海']; ddCount = rollDice() + 4; maxUsHandicap = 100; }
    else if (roll === 3) { jpNames = ['妙高', '羽黒', '大和', '五十鈴']; ddCount = rollDice(); maxUsHandicap = 50; }
    else if (roll === 4) { jpNames = ['比叡', '霧島', '長良']; ddCount = rollDice() + 4; maxUsHandicap = 30; }
    else if (roll === 5) { jpNames = ['古鷹', '青葉', '衣笠']; ddCount = rollDice(); maxUsHandicap = 10; }
    else if (roll === 6) { jpNames = ['高雄', '愛宕', '摩耶', '鳥海', '川内']; ddCount = rollDice() + 2; maxUsHandicap = 20; }
    else if (roll === 7) { jpNames = []; ddCount = rollDice() + 4; maxUsHandicap = 0; }
    else if (roll === 8) { jpNames = ['北上', '大井']; ddCount = rollDice() + 4; maxUsHandicap = 0; }
    else if (roll === 9) { jpNames = ['熊野', '鈴谷']; ddCount = rollDice(); maxUsHandicap = 10; }
    else if (roll === 10) { jpNames = ['神通', '金剛', '榛名', '妙高', '羽黒']; ddCount = rollDice() + 2; maxUsHandicap = 40; }
    else if (roll === 11) { jpNames = ['夕張', '長門', '陸奥', '利根', '筑摩']; ddCount = rollDice() + 2; maxUsHandicap = 45; }
    else if (roll === 12) { jpNames = ['天龍', '龍田', '伊勢', '日向', '山城', '扶桑']; ddCount = rollDice() + 2; maxUsHandicap = 50; }

    currentJpFleet = [];

    jpNames.forEach(n => {
        let ship = getShipByName(n, jpAllShips);
        if (ship && ship.status !== 'sunk' && ship.rest === 0 && ship.dmgG === 0 && ship.dmgM === 0) {
            currentJpFleet.push(ship);
        } else if(ship) {
            let reason = ship.status === 'sunk' ? '沈没' : (ship.rest > 0 ? `ドック入り(残り${ship.rest}休)` : '損傷あり');
            logMsg(`※ ${ship.name} は出撃不可（${reason}）`);
        }
    });

    let ddPool = jpAllShips.filter(s => s.type === 'DD' && s.status !== 'sunk' && s.rest === 0 && s.dmgG === 0 && s.dmgM === 0);
    sortShips(ddPool, true);
    for(let i=0; i<Math.min(ddCount, ddPool.length); i++) {
        currentJpFleet.push(ddPool[i]);
    }
    currentJpFleet = sortShips(currentJpFleet, true);

    // 索敵報告
    function scoutShip(s) {
        const d = rollDice() + rollDice();
        if (d === 12) return { seen: '＊（索敵なし）', threat: 0 };
        if (d === 2) {
            if (s.type === 'BB')                      return { seen: 'LL（超大型艦）',  threat: 6 };
            if (s.type === 'OBB')                     return { seen: 'L（大型艦）',     threat: 4 };
            if (s.type === 'CA')                      return { seen: 'M（中型艦）',     threat: 2 };
            if (s.type === 'CL' || s.type === 'CLAA') return { seen: 'M（中型艦）',     threat: 2 };
            return { seen: '－（不可視）', threat: 0 };
        }
        if (s.type === 'BB') {
            return Math.random() < 0.5 ? { seen: 'LL（超大型艦）', threat: 6 } : { seen: 'L（大型艦）', threat: 4 };
        }
        if (s.type === 'OBB') {
            return Math.random() < 0.5 ? { seen: 'L（大型艦）', threat: 4 } : { seen: 'M（中型艦）', threat: 2 };
        }
        if (s.type === 'CA') {
            const r = Math.random();
            if (r < 0.33) return { seen: 'L（大型艦）', threat: 4 };
            if (r < 0.67) return { seen: 'M（中型艦）', threat: 2 };
            return { seen: 'S（小型艦）', threat: 1 };
        }
        if (s.type === 'CL' || s.type === 'CLAA') {
            return Math.random() < 0.5 ? { seen: 'M（中型艦）', threat: 2 } : { seen: 'S（小型艦）', threat: 1 };
        }
        return Math.random() < 0.5 ? { seen: 'M（中型艦）', threat: 2 } : { seen: 'S（小型艦）', threat: 1 };
    }

    let apparentThreat = 0;
    let actualThreat = 0;
    currentJpFleet.forEach(s => {
        const r = scoutShip(s);
        apparentThreat += r.threat;
        actualThreat   += (s.type==='BB'||s.type==='OBB') ? 4 : s.type==='CA' ? 2 : 1;
    });

    // 米軍編成: 日本軍の視認隻数+1~2隻、余りポイントでクラスアップ
    currentUsFleet = [];
    const jpVisibleCount = currentJpFleet.filter((s,i) => {
        // scoutShipは既に呼ばれているが結果を保持していないので、実隻数を使う
        return s.status !== 'sunk' && s.col >= 0;
    }).length;
    const usTargetCount = jpVisibleCount + 1 + (Math.random() < 0.5 ? 1 : 0); // +1 or +2

    let usAvailable = usAllShips.filter(s => !s.used);
    usAvailable.sort(() => Math.random() - 0.5);

    // まず目標隻数まで追加（小型艦優先で枠を確保）
    const smallShips = usAvailable.filter(s => s.type === 'DD' || s.type === 'CL' || s.type === 'CLAA');
    const bigShips = usAvailable.filter(s => s.type === 'BB' || s.type === 'CA' || s.type === 'OBB');
    // 大型艦を1~2隻確保、残りを小型艦で埋める
    const bigCount = Math.min(bigShips.length, 1 + (Math.random() < 0.4 ? 1 : 0));
    for (let i = 0; i < bigCount && currentUsFleet.length < usTargetCount; i++) {
        currentUsFleet.push(bigShips[i]);
        bigShips[i].used = true;
    }
    const remainSmall = smallShips.filter(s => !s.used);
    for (let i = 0; i < remainSmall.length && currentUsFleet.length < usTargetCount; i++) {
        currentUsFleet.push(remainSmall[i]);
        remainSmall[i].used = true;
    }
    // まだ足りなければ残りの大型艦で埋める
    for (let i = bigCount; i < bigShips.length && currentUsFleet.length < usTargetCount; i++) {
        if (!bigShips[i].used) {
            currentUsFleet.push(bigShips[i]);
            bigShips[i].used = true;
        }
    }

    // ポイント余りでクラスアップ: 脅威値が低ければDD→CL/CA等に差し替え
    let currentUsThreat = currentUsFleet.reduce((sum, s) =>
        sum + (s.type === 'BB' ? 4 : s.type === 'CA' ? 2 : s.type === 'OBB' ? 4 : 1), 0);
    if (currentUsThreat < apparentThreat) {
        // 小型艦を大型艦に差し替え（隻数は変えない）
        const upgradePool = usAllShips.filter(s => !s.used && (s.type === 'BB' || s.type === 'CA'));
        for (const upgrade of upgradePool) {
            const weakIdx = currentUsFleet.findIndex(s => s.type === 'DD' || s.type === 'CL');
            if (weakIdx < 0) break;
            const weak = currentUsFleet[weakIdx];
            const oldThreat = weak.type === 'DD' || weak.type === 'CL' ? 1 : 2;
            const newThreat = upgrade.type === 'BB' ? 4 : 2;
            if (currentUsThreat - oldThreat + newThreat <= apparentThreat + 2) {
                weak.used = false;
                currentUsFleet[weakIdx] = upgrade;
                upgrade.used = true;
                currentUsThreat = currentUsThreat - oldThreat + newThreat;
            }
        }
    }
    currentUsFleet = sortShips(currentUsFleet, false);

    // ハンディキャップ計算
    let jpFee = currentJpFleet.reduce((sum, s) => sum + (Math.ceil(s.vp / 2)), 0);
    let usFee = currentUsFleet.reduce((sum, s) => sum + (Math.ceil(s.vp / 2)), 0);
    let jpHandicapAdd = Math.max(0, usFee - jpFee) * 10;
    let usHandicapAdd = Math.max(0, jpFee - usFee) * 10;

    if (usHandicapAdd > maxUsHandicap) {
        usHandicapAdd = maxUsHandicap;
    }

    jpScore += jpHandicapAdd;
    usScore += usHandicapAdd;

    document.getElementById('jpHandicapInfo').innerText = `出撃: ${currentJpFleet.length}隻`;

    renderTables();
    exportJson();

    currentPhase = 'combat';
    document.getElementById('btnSortie').disabled = true;
    document.getElementById('btnCombat').disabled = false;
    saveCampaignState();
}

// --- テーブル描画 ---
function renderTables() {
    const tbodyJp = document.querySelector('#jpTable tbody');
    tbodyJp.innerHTML = '';
    currentJpFleet.forEach(s => {
        let typeStr = s.type === 'OBB' ? 'BB(旧式)' : s.type;
        const speed = SPEEDS[s.type] || 4;
        const torpedo = TORPEDOES[s.type] || '-';
        tbodyJp.innerHTML += `<tr><td>${s.name}</td><td>${typeStr}</td><td>${speed}</td><td>${s.capG}</td><td>${s.capM}</td><td>${torpedo}</td></tr>`;
    });
}

// --- JSON出力（localStorage自動連携） ---
function exportJson() {
    const exportData = {
        turn: currentTurn,
        battleName: BATTLE_NAMES[currentTurn],
        jpFleet: currentJpFleet.map(s => ({ name: s.name, type: s.type, capG: s.capG, capM: s.capM, dmgG: s.dmgG, dmgM: s.dmgM, vp: s.vp })),
        usFleet: currentUsFleet.map(s => ({ name: s.name, type: s.type, capG: s.capG, capM: s.capM, dmgG: s.dmgG, dmgM: s.dmgM, vp: s.vp }))
    };
    localStorage.setItem('campaignFleet', JSON.stringify(exportData));
}

// --- 戦闘開始 → hub.htmlへ遷移 ---
function openBattle() {
    exportJson();
    saveCampaignState();
    localStorage.setItem('campaignReady', 'true');
    window.location.href = 'hub.html';
}

// --- 戦闘結果読み込み ---
function loadBattleResult() {
    const raw = localStorage.getItem('battleResultForCampaign');
    if (!raw) { logMsg('戦闘結果データがありません。'); return; }
    try {
        const importData = JSON.parse(raw);
        applyBattleResultData(importData);
        localStorage.removeItem('battleResultForCampaign');
    } catch(e) {
        logMsg('戦闘結果の読み込みエラー: ' + e.message);
    }
}

function applyBattleResultData(importData) {
    if (!Array.isArray(importData)) { logMsg('データ形式エラー'); return; }

    logMsg(`\n--- ${BATTLE_NAMES[currentTurn]} 戦闘結果 ---`);

    // スコア記録用（反映前のスコア）
    const jpScoreBefore = jpScore;
    const usScoreBefore = usScore;

    importData.forEach(data => {
        let ship = currentJpFleet.find(s => s.name === data.name) || currentUsFleet.find(s => s.name === data.name);
        if (ship) {
            let addG = data.dmgG || 0;
            let addM = data.dmgM || 0;
            let isUs = currentUsFleet.includes(ship);
            applyDamageToShip(ship, addG, addM, isUs);
        }
    });

    // 航行不能の艦 → 自沈扱い（戦闘後に帰還できないため）
    importData.forEach(data => {
        if (data.speed !== 0) return;  // speed=0のみ対象
        let ship = currentJpFleet.find(s => s.name === data.name) || currentUsFleet.find(s => s.name === data.name);
        if (ship && ship.status !== 'sunk') {
            let isUs = currentUsFleet.includes(ship);
            logMsg(`${ship.name} 航行不能 → 自沈処理`);
            applyDamageToShip(ship, 999, 0, isUs);  // 999 = instant sink
        }
    });

    // 戦闘記録を保存
    battleHistory.push({
        turn: currentTurn,
        battleName: BATTLE_NAMES[currentTurn],
        jpShips: currentJpFleet.map(s => ({name:s.name, type:s.type, status:s.status, dmgG:s.dmgG, dmgM:s.dmgM, capG:s.capG, capM:s.capM})),
        usShips: currentUsFleet.map(s => ({name:s.name, type:s.type, status:s.status, dmgG:s.dmgG, dmgM:s.dmgM, capG:s.capG, capM:s.capM})),
        jpSunk: currentJpFleet.filter(s => s.status === 'sunk').map(s => s.name),
        usSunk: currentUsFleet.filter(s => s.status === 'sunk').map(s => s.name),
        jpDamaged: currentJpFleet.filter(s => s.status !== 'ok' && s.status !== 'sunk').map(s => `${s.name}(${statusLabel(s.status)})`),
        usDamaged: currentUsFleet.filter(s => s.status !== 'ok' && s.status !== 'sunk').map(s => `${s.name}(${statusLabel(s.status)})`),
        jpScoreGain: jpScore - jpScoreBefore,
        usScoreGain: usScore - usScoreBefore,
    });

    updateScoreUI();
    document.getElementById('scoreArea').style.display = '';
    renderBattleHistory();

    currentPhase = 'next';
    document.getElementById('btnCombat').disabled = true;
    document.getElementById('btnNext').disabled = false;
    saveCampaignState();
    logMsg(`戦闘結果反映完了。次の海戦へ進んでください。`);
}

function statusLabel(s) {
    if (s === 'light') return '小破';
    if (s === 'medium') return '中破';
    if (s === 'heavy') return '大破';
    if (s === 'sunk') return '沈没';
    return '無傷';
}

// --- 戦闘記録表示 ---
function renderBattleHistory() {
    const panel = document.getElementById('battleHistoryPanel');
    if (battleHistory.length === 0) { panel.style.display = 'none'; return; }
    panel.style.display = 'block';

    let html = '';
    battleHistory.forEach(b => {
        html += `<div class="history-entry">`;
        html += `<h3 style="color:#1a5a8a;">${b.battleName}</h3>`;

        // 日本軍
        html += `<div style="margin:4px 0;"><strong style="color:#cc3311;">日本軍参加艦:</strong> `;
        html += b.jpShips.map(s => {
            let style = s.status === 'sunk' ? 'color:#aaa;text-decoration:line-through'
                      : s.status === 'heavy' ? 'color:#cc2200'
                      : s.status === 'medium' ? 'color:#cc6600'
                      : s.status === 'light' ? 'color:#aa8800' : 'color:#2a8a2a';
            return `<span style="${style}">${s.name}</span>`;
        }).join(', ');
        html += `</div>`;

        // 米軍
        html += `<div style="margin:4px 0;"><strong style="color:#2255cc;">米軍迎撃艦:</strong> `;
        html += b.usShips.map(s => {
            let style = s.status === 'sunk' ? 'color:#aaa;text-decoration:line-through'
                      : s.status === 'heavy' ? 'color:#cc2200'
                      : s.status === 'medium' ? 'color:#cc6600'
                      : s.status === 'light' ? 'color:#aa8800' : 'color:#2a8a2a';
            return `<span style="${style}">${s.name}</span>`;
        }).join(', ');
        html += `</div>`;

        // 沈没艦
        if (b.jpSunk.length) html += `<div style="color:#cc2200; margin:2px 0;">日本軍沈没: ${b.jpSunk.join(', ')}</div>`;
        if (b.usSunk.length) html += `<div style="color:#2255cc; margin:2px 0;">米軍沈没: ${b.usSunk.join(', ')}</div>`;

        // 損傷艦
        if (b.jpDamaged.length) html += `<div style="color:#cc6600; margin:2px 0;">日本軍損傷: ${b.jpDamaged.join(', ')}</div>`;
        if (b.usDamaged.length) html += `<div style="color:#cc6600; margin:2px 0;">米軍損傷: ${b.usDamaged.join(', ')}</div>`;

        // スコア
        html += `<div style="margin-top:4px; font-size:0.9em; color:#666;">スコア獲得 - 日本軍: +${b.jpScoreGain} / 米軍: +${b.usScoreGain}</div>`;

        html += `</div>`;
    });

    document.getElementById('battleHistoryContent').innerHTML = html;
}

// --- ダメージ・スコア処理コア ---
function applyDamageToShip(ship, addG, addM, isUs) {
    if (ship.status === 'sunk') return;

    ship.dmgG += addG;
    ship.dmgM += addM;

    if (ship.dmgG > ship.capG) {
        ship.dmgM += (ship.dmgG - ship.capG);
        ship.dmgG = ship.capG;
    }

    let totalCap = ship.capG + ship.capM;
    let totalDmg = ship.dmgG + ship.dmgM;
    let ratio = totalDmg / totalCap;

    if (ship.dmgM >= ship.capM || (addG === 999)) {
        ship.status = 'sunk';
        ship.rest = 99;
        if(isUs) jpScore += ship.capG * ship.vp + ship.capM * ship.vp;
        else usScore += ship.capG * ship.vp + ship.capM * ship.vp;
        logMsg(`${ship.name} 轟沈！`);
    } else if (ratio >= 0.5) {
        ship.status = 'heavy';
        ship.rest = 99;
    } else if (ratio >= 0.25) {
        ship.status = 'medium';
        ship.rest = 2;
    } else if (totalDmg > 0) {
        ship.status = 'light';
        ship.rest = 1;
    }

    if (ship.status !== 'sunk' && (addG > 0 || addM > 0)) {
         if(isUs) jpScore += (addG + addM) * ship.vp;
         else usScore += (addG + addM) * ship.vp;
    }
}

// --- 次のターンへ ---
function phaseNextTurn() {
    if (currentTurn >= 4) {
        logMsg(`\n=== キャンペーン終了！ ===`);
        logMsg(`最終スコア - 日本軍: ${jpScore} / 米軍: ${usScore}`);
        let winner = jpScore > usScore ? "日本軍" : (usScore > jpScore ? "アメリカ軍" : "引き分け");
        logMsg(`勝者: ${winner}`);
        document.getElementById('btnNext').disabled = true;
        document.getElementById('btnSortie').disabled = true;
        renderBattleHistory();
        saveCampaignState();
        return;
    }

    // ドックでの修理
    jpAllShips.forEach(s => {
        if (s.rest > 0 && s.status !== 'sunk' && s.status !== 'heavy') {
            s.rest--;
            if (s.rest === 0) {
                s.dmgG = 0;
                s.dmgM = 0;
                s.status = 'ok';
                logMsg(`${s.name} の修理完了、戦線復帰。`);
            }
        }
    });

    currentTurn++;
    updateTurnDisplay();

    currentJpFleet = [];
    currentUsFleet = [];
    renderTables();

    currentPhase = 'sortie';
    document.getElementById('btnSortie').disabled = false;
    document.getElementById('btnNext').disabled = true;
    saveCampaignState();

    logMsg(`\n--- ${BATTLE_NAMES[currentTurn]} へ移行 ---`);
}

// --- ページ読み込み ---
window.addEventListener('load', () => {
    loadCampaignState();
    updateTurnDisplay();

    const raw = localStorage.getItem('battleResultForCampaign');
    if (raw) {
        logMsg('--- 海戦結果を自動読み込み ---');
        loadBattleResult();
    }
});

</script>
</body>
</html>
