<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>装甲擲弾兵 — Panzer Grenadier</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#2a2a2a; color:#ddd; font-family:'Segoe UI',sans-serif; overflow:hidden; height:100vh; display:flex; flex-direction:column; }

/* --- トップバー --- */
#topbar {
  background:#1a1a24; padding:6px 12px; display:flex; align-items:center; gap:12px;
  border-bottom:1px solid #555; flex:0 0 auto; font-size:0.9em;
}
#topbar .title { font-weight:bold; font-size:1.1em; color:#c8a020; }
#topbar .info { color:#aaa; }
#phaseBar { display:flex; gap:2px; }
#phaseBar .ph {
  padding:3px 8px; background:#333; border-radius:3px; font-size:0.8em; color:#888; cursor:pointer;
}
#phaseBar .ph.active { background:#c8a020; color:#000; font-weight:bold; }
#phaseBar .ph.done { background:#555; color:#aaa; }
button.top-btn {
  background:#445; color:#ccc; border:1px solid #667; padding:4px 12px;
  border-radius:3px; cursor:pointer; font-size:0.85em;
}
button.top-btn:hover { background:#556; }

/* --- メインエリア --- */
#main { display:flex; flex:1; overflow:hidden; }

/* --- マップエリア --- */
#mapArea { flex:1; position:relative; overflow:hidden; background:#3a3a2a; margin:0; padding:0; }
#mapCanvas { position:absolute; top:0; left:0; cursor:grab; margin:0; padding:0; }

/* --- 右パネル --- */
#rightPanel {
  width:320px; background:#1a1a24; border-left:1px solid #444;
  display:flex; flex-direction:column; flex:0 0 320px; overflow-y:auto;
}
#rightPanel .phase-title {
  padding:8px 12px; background:#222; color:#c8a020; font-weight:bold;
  font-size:0.95em; border-bottom:1px solid #444;
}
#phaseContent { padding:10px; flex:1; }

/* --- イニシアチブ・チャート --- */
#initChart { margin:10px 0; }
#initChart table { border-collapse:collapse; width:100%; font-size:0.8em; }
#initChart th, #initChart td {
  border:1px solid #555; padding:3px 6px; text-align:center; min-width:24px;
}
#initChart th { background:#333; color:#aaa; }
#initChart td.a { background:#2a4a6a; color:#8cf; }
#initChart td.g { background:#5a3a2a; color:#fa8; }
#initChart td.marker { outline:3px solid #ff0; outline-offset:-2px; }

/* マーカー位置表示 */
#markerRow { display:flex; gap:2px; margin:8px 0; }
#markerRow .slot {
  flex:1; height:24px; background:#333; border:1px solid #555; border-radius:2px;
  display:flex; align-items:center; justify-content:center; font-size:0.7em; color:#888;
}
#markerRow .slot.current { background:#c8a020; color:#000; font-weight:bold; }

/* ダイス */
#diceArea { text-align:center; margin:8px 0; }
#diceResult {
  display:inline-block; width:80px; height:80px; line-height:80px;
  background:#111; border:3px solid #c8a020; border-radius:10px;
  font-size:3em; font-weight:bold; color:#ff0; margin:6px;
}
#diceResult.rolling { animation:shake 0.08s infinite; border-color:#f44; }
@keyframes shake {
  0%,100% { transform:rotate(0deg) scale(1); }
  25% { transform:rotate(-8deg) scale(1.05); }
  75% { transform:rotate(8deg) scale(1.05); }
}
button.dice-btn {
  background:#c8a020; color:#000; border:none; padding:10px 28px;
  border-radius:4px; font-size:1.1em; font-weight:bold; cursor:pointer;
}
button.dice-btn:hover { background:#dab030; }
button.dice-btn:disabled { background:#555; color:#888; cursor:default; }
.btn-sm { background:#556; color:#ddd; border:1px solid #778; padding:4px 12px; border-radius:3px; cursor:pointer; font-size:0.85em; }
.btn-sm:hover { background:#778; }

/* 結果表示 — 大きく */
#initResult {
  text-align:center; padding:12px; margin:8px 0;
  border-radius:6px; font-weight:bold; font-size:1.3em; display:none;
  border:2px solid;
}
#initResult.allied { background:#2a4a6a; color:#8cf; border-color:#4af; }
#initResult.german { background:#5a3a2a; color:#fa8; border-color:#f84; }

/* ダイス結果オーバーレイ */
#diceOverlay {
  display:none; position:fixed; top:0; left:0; width:100%; height:100%;
  background:rgba(0,0,0,0.7); z-index:500;
  justify-content:center; align-items:center; flex-direction:column;
}
#diceOverlay.show { display:flex; }
#diceOverlay .big-result {
  font-size:4em; font-weight:bold; padding:20px 40px;
  border-radius:12px; margin:10px; border:3px solid;
}
#diceOverlay .big-die {
  font-size:6em; font-weight:bold; color:#ff0;
  background:#111; border:4px solid #c8a020; border-radius:14px;
  width:120px; height:120px; line-height:120px; text-align:center; margin:10px;
}
#diceOverlay .big-result.allied { background:#2a4a6a; color:#8cf; border-color:#4af; }
#diceOverlay .big-result.german { background:#5a3a2a; color:#fa8; border-color:#f84; }

/* --- 砲撃結果オーバーレイ --- */
#fireOverlay {
  display:none; position:fixed; top:0; left:0; width:100%; height:100%;
  background:rgba(0,0,0,0.8); z-index:600;
  justify-content:center; align-items:center; flex-direction:column;
}
#fireOverlay.show { display:flex; }
#fireOverlay .fire-title {
  font-size:2em; font-weight:bold; color:#f84; margin-bottom:12px;
  text-shadow: 0 0 20px rgba(255,100,0,0.6);
}
#fireOverlay .fire-target {
  font-size:1.2em; color:#c8a020; margin-bottom:16px;
}
#fireOverlay .fire-results {
  max-width:600px; width:90%;
}
#fireOverlay .fire-row {
  display:flex; align-items:center; gap:12px; padding:10px 16px; margin:4px 0;
  background:rgba(30,30,30,0.9); border-radius:8px; border-left:4px solid #555;
  animation: fireRowIn 0.3s ease-out forwards;
  opacity:0; transform:translateX(-20px);
}
@keyframes fireRowIn {
  to { opacity:1; transform:translateX(0); }
}
#fireOverlay .fire-row.hit-d { border-left-color:#fd8; }
#fireOverlay .fire-row.hit-dd { border-left-color:#f84; }
#fireOverlay .fire-row.hit-elim { border-left-color:#f22; }
#fireOverlay .fire-row.hit-none { border-left-color:#666; }
#fireOverlay .fire-unit-name {
  flex:1; font-weight:bold; font-size:1.1em; color:#ddd;
}
#fireOverlay .fire-dice {
  display:inline-block; width:48px; height:48px; line-height:48px; text-align:center;
  background:#111; border:3px solid #c8a020; border-radius:8px;
  font-size:1.8em; font-weight:bold; color:#ff0;
}
#fireOverlay .fire-dice.rolling { animation:shake 0.08s infinite; border-color:#f44; }
#fireOverlay .fire-detail {
  font-size:0.85em; color:#aaa;
}
#fireOverlay .fire-damage {
  font-size:1.3em; font-weight:bold; padding:4px 12px; border-radius:4px;
  min-width:60px; text-align:center;
}
#fireOverlay .fire-damage.none { background:#333; color:#888; }
#fireOverlay .fire-damage.d { background:#6a5a20; color:#fd8; }
#fireOverlay .fire-damage.dd { background:#6a2020; color:#f88; }
#fireOverlay .fire-damage.eliminated { background:#800; color:#fff; }
#fireOverlay .fire-close {
  color:#888; font-size:0.9em; margin-top:16px; cursor:pointer;
}

/* フェイズ情報 */
.phase-info { color:#aaa; font-size:0.85em; line-height:1.6; margin:8px 0; }
.phase-btn-row { display:flex; gap:8px; margin:8px 0; }

/* 回復フェイズ */
.recovery-section { margin:8px 0; }
.recovery-section h3 { color:#c8a020; font-size:0.9em; margin:8px 0 4px; border-bottom:1px solid #444; padding-bottom:2px; }
.recovery-unit {
  display:flex; align-items:center; gap:6px; padding:4px 6px; margin:2px 0;
  background:#222; border-radius:3px; font-size:0.82em;
}
.recovery-unit .u-name { flex:1; font-weight:bold; }
.recovery-unit .u-status { padding:1px 6px; border-radius:2px; font-size:0.9em; font-weight:bold; }
.recovery-unit .u-status.ok { background:#2a5a2a; color:#8f8; }
.recovery-unit .u-status.d { background:#6a5a20; color:#fd8; }
.recovery-unit .u-status.dd { background:#6a2020; color:#f88; }
.recovery-unit .u-status.eliminated { background:#400; color:#f44; }
.recovery-unit .u-morale { color:#888; font-size:0.85em; }
.recovery-unit .u-blocked { color:#f66; font-size:0.8em; }
.recovery-unit .u-result { font-size:0.85em; padding:1px 4px; border-radius:2px; }
.recovery-unit .u-result.success { background:#2a5a2a; color:#8f8; }
.recovery-unit .u-result.fail { background:#444; color:#aaa; }
.recovery-unit .u-result.critical { background:#6a2020; color:#f88; }
.recovery-unit button {
  background:#556; color:#ddd; border:none; padding:2px 8px; border-radius:3px;
  cursor:pointer; font-size:0.85em;
}
.recovery-unit button:hover { background:#778; }
.recovery-unit button:disabled { background:#333; color:#666; cursor:default; }
.recovery-all-btn {
  background:#c8a020; color:#000; border:none; padding:6px 16px; border-radius:4px;
  font-size:0.9em; font-weight:bold; cursor:pointer; margin:6px 0;
}
.recovery-all-btn:hover { background:#dab030; }
.recovery-all-btn:disabled { background:#555; color:#888; cursor:default; }

/* --- ログ --- */
#gameLog {
  flex:0 0 auto; max-height:140px; overflow-y:auto;
  background:#1a1a24; color:#ccc; font-size:0.8em; font-family:monospace;
  padding:4px 8px; border-top:1px solid #555; line-height:1.5;
}
#gameLog .log-turn { color:#c8a020; font-weight:bold; }
#gameLog .log-init { color:#8cf; }

/* --- スタック吹き出し --- */
#stackPopup {
  display:none; position:fixed; z-index:400;
  background:#1a1a24; border:2px solid #c8a020; border-radius:8px;
  padding:8px; min-width:120px; max-width:360px;
  box-shadow: 0 4px 16px rgba(0,0,0,0.6);
  pointer-events:auto;
}
#stackPopup .popup-arrow {
  position:absolute; bottom:-8px; left:50%; transform:translateX(-50%);
  width:0; height:0; border-left:8px solid transparent; border-right:8px solid transparent;
  border-top:8px solid #c8a020;
}
#stackPopup .popup-title {
  color:#c8a020; font-size:0.8em; font-weight:bold; margin-bottom:6px;
  border-bottom:1px solid #444; padding-bottom:4px;
}
#stackPopup .popup-unit {
  display:flex; align-items:center; gap:8px; padding:4px 2px;
  border-bottom:1px solid #333;
}
#stackPopup .popup-unit:last-child { border-bottom:none; }
#stackPopup .popup-unit img {
  width:106px; height:106px; object-fit:contain; border:1px solid #666; border-radius:2px;
}
#stackPopup .popup-unit .pu-info { font-size:0.8em; }
#stackPopup .popup-unit .pu-name { font-weight:bold; color:#ddd; }
#stackPopup .popup-unit .pu-status {
  display:inline-block; padding:1px 6px; border-radius:2px; font-size:0.85em; font-weight:bold; margin-top:2px;
}
#stackPopup .popup-unit .pu-status.ok { background:#2a5a2a; color:#8f8; }
#stackPopup .popup-unit .pu-status.d { background:#6a5a20; color:#fd8; }
#stackPopup .popup-unit .pu-status.dd { background:#6a2020; color:#f88; }
</style>
</head>
<body>

<!-- タイトル画面オーバーレイ -->
<div id="titleOverlay" style="position:fixed;top:0;left:0;width:100%;height:100%;background:#1a1a1a;z-index:9999;display:flex;flex-direction:column;align-items:center;overflow-y:auto;">
  <div style="text-align:center;padding:40px 20px 20px;">
    <h1 style="font-size:2.8em;color:#c8a020;letter-spacing:0.15em;text-shadow:2px 2px 8px rgba(0,0,0,0.8);">装甲擲弾兵</h1>
    <h2 style="font-size:1.4em;color:#888;font-weight:normal;letter-spacing:0.3em;font-style:italic;">PANZER GRENADIER</h2>
  </div>
  <div style="max-width:900px;width:100%;padding:20px;" id="titleContent"></div>
</div>

<!-- トップバー -->
<div id="topbar">
  <span class="title">装甲擲弾兵</span>
  <span class="info" id="turnInfo">ターン 1</span>
  <div id="phaseBar"></div>
  <span id="initBadge" style="display:none;"></span>
  <span class="info" id="playerInfo"></span>
  <button class="top-btn" onclick="nextPhase()">次のフェイズ</button>
  <button class="top-btn" id="btnSplit" onclick="toggleStackSplit()" style="margin-left:4px;">スタック解除</button>
  <span id="losInfo" style="color:#aaa;font-size:0.8em;display:none;"></span>
  <span id="hexCursor" style="color:#ff0;font-size:0.85em;font-weight:bold;margin-left:8px;">--</span>
</div>

<!-- メイン -->
<div id="main">
  <!-- マップ -->
  <div id="mapArea">
    <canvas id="mapCanvas"></canvas>
  </div>

  <!-- 右パネル -->
  <div id="rightPanel">
    <div class="phase-title" id="phaseTitle">1. イニシアチブ・フェイズ</div>
    <div id="phaseContent"></div>
  </div>
</div>

<!-- ゲーム終了オーバーレイ -->
<div id="gameOverOverlay" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.85);z-index:9999;justify-content:center;align-items:center;flex-direction:column;cursor:pointer;" onclick="this.style.display='none'">
  <div id="gameOverTitle" style="font-size:3em;font-weight:bold;text-shadow:0 0 20px currentColor;"></div>
  <div id="gameOverDetail" style="font-size:1.5em;color:#ccc;margin-top:20px;"></div>
  <div style="color:#666;font-size:0.9em;margin-top:30px;">クリックで閉じる</div>
</div>

<!-- ダイス結果オーバーレイ -->
<div id="diceOverlay" onclick="closeDiceOverlay()">
  <div class="big-die" id="overlayDie">-</div>
  <div class="big-result" id="overlayResult"></div>
  <div style="color:#888;font-size:0.9em;margin-top:10px;">クリックで閉じる</div>
</div>

<!-- 砲撃結果オーバーレイ -->
<div id="fireOverlay">
  <div class="fire-title" id="fireOverlayTitle">砲撃！</div>
  <div class="fire-target" id="fireOverlayTarget"></div>
  <div class="fire-results" id="fireOverlayResults"></div>
  <div class="fire-close" onclick="closeFireOverlay()">クリックで閉じる</div>
</div>

<!-- AI配置完了オーバーレイ -->
<div id="aiPlacementOverlay" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.8);z-index:9999;display:none;justify-content:center;align-items:center;">
  <div style="background:#1a1a2e;border:2px solid #c8a020;border-radius:12px;padding:30px 50px;text-align:center;max-width:500px;">
    <div style="font-size:1.5em;color:#c8a020;font-weight:bold;margin-bottom:15px;" id="aiPlacementTitle">AI配置完了</div>
    <div style="color:#ddd;font-size:1.1em;margin-bottom:20px;" id="aiPlacementInfo"></div>
    <button onclick="closeAIPlacementOverlay()" style="background:#c8a020;color:#000;border:none;padding:10px 30px;border-radius:6px;font-size:1.1em;font-weight:bold;cursor:pointer;">ゲーム開始</button>
  </div>
</div>

<!-- スタック吹き出し -->
<div id="stackPopup">
  <div class="popup-arrow"></div>
  <div id="stackPopupContent"></div>
</div>

<!-- 下部バー -->
<div id="bottomBar" style="background:#1a1a2e;border-top:1px solid #333;padding:4px 10px;font-size:0.85em;display:flex;align-items:center;gap:8px;">
  <span id="visionDisplay" style="color:#c8a020;font-weight:bold;">--</span>
  <span style="color:#555;">|</span>
  <button class="top-btn" onclick="zoomFit()">全体</button>
  <button class="top-btn" onclick="zoomStep(-10)">−</button>
  <input type="range" id="zoomSlider" min="10" max="300" value="100" style="width:120px;vertical-align:middle;">
  <button class="top-btn" onclick="zoomStep(10)">＋</button>
  <span id="zoomLabel" style="color:#aaa;font-size:0.8em;">100%</span>
  <button class="top-btn" id="btnLOS" onclick="toggleLOSMode()" style="margin-left:8px;">視認</button>
  <button class="top-btn" id="btnLOSCheck" onclick="toggleLOSCheckMode()" style="margin-left:4px;">LOS確認</button>
  <span id="losCheckInfo" style="color:#aaa;font-size:0.8em;margin-left:4px;"></span>
  <span style="color:#555;margin-left:8px;">|</span>
  <span id="breakthroughScore" style="color:#e04040;font-weight:bold;margin-left:4px;">突破: 0 / 7</span>
  <span style="color:#555;margin-left:8px;">|</span>
  <button class="top-btn" id="btnAIStep" onclick="toggleAIStepMode()" style="margin-left:4px;">確認:ON</button>
</div>

<!-- ログ（非表示） -->
<div id="gameLog" style="display:none;"></div>

<script>
// シナリオに応じてマップデータを動的に読み込む
(function() {
  var sid = parseInt(new URLSearchParams(window.location.search).get('scenario')) || 2;

  document.write('<script src="' + mapFile + '"><\/script>');

</script>
<script>
// シナリオに応じてシナリオデータを動的に読み込む
(function() {
  var sid = parseInt(new URLSearchParams(window.location.search).get('scenario')) || 2;
  var scenarioFile = 'scenario' + sid + '.js';
  document.write('<script src="' + scenarioFile + '"><\/script>');
})();
</script>
<script>
// ===== ゲーム状態 =====
// URLパラメータからシナリオと陣営を取得
const _urlParams = new URLSearchParams(window.location.search);
const _scenarioId = parseInt(_urlParams.get('scenario')) || 2;
const _playerSide = _urlParams.get('side') || 'allied';

// シナリオ選択
const SCENARIO = window['SCENARIO_' + _scenarioId] || SCENARIO_2;

const G = {
  turn: 1,
  maxTurn: SCENARIO.maxTurn,
  phase: 0, // 0-6
  markerPos: SCENARIO.initiative.start,
  initiative: null,
  markerShift: SCENARIO.initiative.shift,
  diceRolled: false,
  visionRange: SCENARIO.visionRange,
  playerSide: _playerSide,
  ammoCheck: SCENARIO.ammoCheck,
  breakthroughCount: 0, // 突破ユニット数
};

const PHASES = [
  { id:'initiative', name:'イニシアチブ', short:'主導権' },
  { id:'recovery',   name:'回復',         short:'回復' },
  { id:'supportAtk', name:'先攻支援射撃',  short:'先攻支援' },
  { id:'supportDef', name:'後攻支援射撃',  short:'後攻支援' },
  { id:'moveFire',   name:'先攻移動・射撃', short:'移動射撃' },
  { id:'assault',    name:'突撃',         short:'突撃' },
  { id:'defMove',    name:'後攻移動',     short:'後攻移動' },
  { id:'turnEnd',    name:'ターン終了',   short:'終了' },
];

// ===== ユニットデータ =====
// morale: ユニット固有のモラルレベル（数値）
// status: 'ok', 'd', 'dd', 'eliminated'
// side: 'german' or 'allied'
// type: 'T','AC','AT','A','I' (戦車/装甲車/対戦車砲/砲兵/歩兵)
// hexId: 配置ヘクス
// adjacentEnemy: 敵隣接フラグ（マップから計算）
// inEnemyRange: 敵射程内フラグ
// inCover: 遮蔽物内フラグ（森/林/町/市街地）
// leaderM: M能力リーダーがスタックにいるか

// 仮ユニット（テスト用）
let units = [
  // シナリオデータから読み込む — testUnits生成後に代入される
];

// ===== ダミーと偵察 (ルール7) =====
// ダミーは独立したユニット駒として testUnits に type='dummy' で存在する
// 旧dummyMapは互換用に残す（空オブジェクト）
const dummyMap = {};

// 国籍別ダミー画像
const DUMMY_IMAGES = {
  'イギリス軍': 'images/ge表1cut46000020.jpg',
  'アメリカ軍': 'images/us表03cut28000014.jpg',
  'ドイツ軍':   'images/ドイツcut47000021.jpg',
};

// ダミーを配置（ユニットとして生成）
function placeDummy(hexId, side, count, nation) {
  if (!count || count <= 0) return;
  // nationが指定されなければ同ヘクスのユニットから推定
  if (!nation) {
    const mate = testUnits.find(u => u.hexId === hexId && u.side === side && u.nation);
    nation = mate ? mate.nation : (side === 'german' ? 'ドイツ軍' : 'イギリス軍');
  }
  const existing = getDummyCount(hexId);
  const toAdd = Math.min(count, 4 - existing); // 7-1-(7) 4枚まで
  const pos = fromHexId(hexId);
  for (let i = 0; i < toAdd; i++) {
    const center = getHexCenter(pos.col, pos.row);
    const dummy = {
      id: `dummy_${side}_${hexId}_${Date.now()}_${i}`,
      name: `ダミー`,
      unitName: 'Dummy',
      type: 'dummy',
      side: side,
      nation: nation,
      col: pos.col, row: pos.row,
      x: center.x, y: center.y,
      hexId: hexId,
      status: 'ok',
      range: 0, fpAT: 0, fpSoft: 0, def: 0, morale: 0,
      closeAtk: 0, closeDef: 0, move: 0,
      src: DUMMY_IMAGES[nation] || '',
    };
    testUnits.push(dummy);
  }
}

// ダミー枚数を取得
function getDummyCount(hexId) {
  return testUnits.filter(u =>
    u.type === 'dummy' && u.hexId === hexId && u.status !== 'eliminated'
  ).length;
}

// ダミーを除去（指定枚数）
function removeDummy(hexId, count) {
  const dummies = testUnits.filter(u =>
    u.type === 'dummy' && u.hexId === hexId && u.status !== 'eliminated'
  );
  const toRemove = Math.min(dummies.length, count);
  for (let i = 0; i < toRemove; i++) {
    dummies[i].status = 'eliminated';
  }
  return toRemove;
}

// ダミーを全除去
function removeAllDummies(hexId) {
  const dummies = testUnits.filter(u =>
    u.type === 'dummy' && u.hexId === hexId && u.status !== 'eliminated'
  );
  dummies.forEach(d => { d.status = 'eliminated'; });
  return dummies.length;
}

// 7-1-(5): ダミーによる視認保護判定
function isDummyProtected(hexId) {
  if (getDummyCount(hexId) === 0) return false;
  const terrain = getHexTerrain(hexId);
  if (terrain === 'p' || terrain === 'r') return false;
  return true;
}

// 7-1-(5): 平地・荒地で敵に視認された場合ダミー除去
function checkDummyOnSpotted(hexId, spottingSide) {
  if (getDummyCount(hexId) === 0) return false;
  // そのヘクスのダミーが視認側の敵のものか
  const dummies = testUnits.filter(u => u.type === 'dummy' && u.hexId === hexId && u.status !== 'eliminated');
  if (dummies.length === 0) return false;
  if (dummies[0].side === spottingSide) return false; // 自軍のダミーには影響なし
  const terrain = getHexTerrain(hexId);
  if (terrain === 'p' || terrain === 'r') {
    const removed = removeAllDummies(hexId);
    addLog('dummy', `ダミー除去: ${hexId} (平地/荒地で視認) ${removed}枚`);
    return true;
  }
  return false;
}

// ユニット移動時のダミー視認チェック
// 移動したユニットの視認範囲内にある敵の平地/荒地ダミーを除去
// また、移動したユニット自身が平地/荒地にいて敵から視認される場合もダミー除去
function checkDummyVisibility(movedUnit) {
  const side = movedUnit.side;
  const enemySide = side === 'german' ? 'allied' : 'german';

  // 1. 移動ユニットが敵のダミーを視認
  const visionRange = G.visionPoints || 12;
  testUnits.forEach(u => {
    if (u.type !== 'dummy' || u.side === side || u.status === 'eliminated') return;
    const dist = hexDistance(movedUnit.col, movedUnit.row, u.col, u.row);
    if (dist > 0 && dist <= visionRange) {
      if (hasLOS(movedUnit.col, movedUnit.row, u.col, u.row)) {
        checkDummyOnSpotted(u.hexId, side);
      }
    }
  });

  // 2. 移動ユニット自身が平地/荒地にいて、敵から視認される→自分のダミー除去
  const myHexId = toHexId(movedUnit.col, movedUnit.row);
  if (getDummyCount(myHexId) > 0) {
    const myDummies = testUnits.filter(u => u.type === 'dummy' && u.hexId === myHexId && u.status !== 'eliminated');
    if (myDummies.length > 0 && myDummies[0].side === side) {
      const terrain = getHexTerrain(myHexId);
      if (terrain === 'p' || terrain === 'r') {
        // 敵の視認範囲内か
        const spotted = testUnits.some(e =>
          e.side === enemySide && e.status !== 'eliminated' && e.type !== 'dummy' &&
          hexDistance(e.col, e.row, movedUnit.col, movedUnit.row) <= visionRange &&
          hasLOS(e.col, e.row, movedUnit.col, movedUnit.row)
        );
        if (spotted) {
          checkDummyOnSpotted(myHexId, enemySide);
        }
      }
    }
  }
}

// 7-2: ダミー増加判定（ターン終了時）
// 条件: 攻撃を受けず、行動せず、視認されず、D/DDでない
function checkDummyIncrease(hexId, side) {
  // 1ヘクスにつき1枚
  if (getDummyCount(hexId) >= 4) return false; // 上限

  // 同ヘクスのユニットを確認
  const hexUnits = units.filter(u =>
    u.hexId === hexId && u.side === side &&
    u.status !== 'eliminated' &&
    u.type !== 'leader' && u.type !== 'dummy'
  );
  if (hexUnits.length === 0) return false;

  // D/DD状態のユニットがいたら不可 7-2-(4)
  if (hexUnits.some(u => u.status === 'd' || u.status === 'dd')) return false;

  // 行動フラグ・被攻撃フラグ・被視認フラグのチェック（実装時にフラグ追加）
  if (hexUnits.some(u => u.actedThisTurn || u.attackedThisTurn || u.spottedThisTurn)) return false;

  placeDummy(hexId, side, 1);
  addLog('init', `ダミー増加: ${hexId} (+1枚, 計${getDummyCount(hexId)}枚)`);
  return true;
}

// 7-3: ダミー除去（行動時）
// 行動しようとしたユニットのヘクスからダミーを即除去
// 同ヘクスに未行動ユニットがいればダミー1枚残す
function onUnitAction(unit, batchUnits) {
  if (!unit.hexId || unit.status === 'eliminated') return;
  const hexId = unit.hexId;
  if (getDummyCount(hexId) === 0) return;

  // 同ヘクスの同陣営ダミーがあるか
  const sideDummies = testUnits.filter(u =>
    u.hexId === hexId && u.type === 'dummy' && u.side === unit.side && u.status !== 'eliminated'
  );
  if (sideDummies.length === 0) return;

  // 同ヘクスの同陣営実ユニット
  const hexMates = testUnits.filter(u =>
    u.hexId === hexId && u.side === unit.side && u.status !== 'eliminated' &&
    u.type !== 'dummy' && u.type !== 'leader'
  );
  // 同時行動ユニット（スタック一括移動等）を除外して未行動を判定
  const batchSet = batchUnits ? new Set(batchUnits) : new Set([unit]);
  const unactedMates = hexMates.filter(u =>
    !batchSet.has(u) && !u.firedThisTurn && !u.moveComplete && !u.assaultedThisTurn
  );

  if (unactedMates.length > 0) {
    // 未行動ユニットあり → ダミー1枚残して残り除去
    const toRemove = sideDummies.length - 1;
    if (toRemove > 0) {
      for (let i = 0; i < toRemove; i++) sideDummies[i].status = 'eliminated';
      addLog('dummy', `ダミー減少: ${hexId} ${unit.name}行動 (1枚残し)`);
    }
  } else {
    // 全員行動済み → ダミー全除去
    sideDummies.forEach(d => { d.status = 'eliminated'; });
    addLog('dummy', `ダミー全除去: ${hexId} 行動により発見`);
  }
}

// ===== 偵察 (ルール7-4) =====

// 偵察チャート
const RECON_CHART = [
  1, 1, 2, 2, 3, 3, 4, 4, 0, 0  // index=ダイス目, 値=除去枚数(0=失敗)
];

// 偵察可能か判定
function canRecon(unit) {
  // 歩兵(I)と装甲車(AC)のみ 7-4-(1)
  if (unit.type !== 'I' && unit.type !== 'AC') return { can: false, reason: '歩兵・装甲車のみ偵察可能' };
  if (unit.status !== 'ok') return { can: false, reason: '正常状態でない' };
  if (unit.reconDone) return { can: false, reason: '今ターン偵察済み' };
  if (unit.movingFormation) return { can: false, reason: '移動隊形では偵察不可' }; // 7-4-(8)
  return { can: true, reason: '' };
}

// 偵察実行（移動完了後に隣接ヘクスを指定）
function executeRecon(unit, targetHexId) {
  const check = canRecon(unit);
  if (!check.can) return { success: false, reason: check.reason };

  // 隣接チェック 7-4-(3)
  const uPos = fromHexId(unit.hexId);
  const tPos = fromHexId(targetHexId);
  const dist = hexDistance(uPos.col, uPos.row, tPos.col, tPos.row);
  if (dist !== 1) return { success: false, reason: '隣接ヘクスのみ偵察可能' };

  // ダミーがあるか
  if (getDummyCount(targetHexId) === 0) return { success: false, reason: 'ダミーなし' };

  // ターンに1回制限チェック 7-4-(4)
  // (同ヘクスに対しても1ターン1回)
  if (dummyMap[targetHexId] && dummyMap[targetHexId].reconedThisTurn) {
    return { success: false, reason: '今ターンこのヘクスは偵察済み' };
  }

  // ダイスロール
  const roll = Math.floor(Math.random() * 10);
  const removedCount = RECON_CHART[roll];

  unit.reconDone = true; // 7-4-(4) このユニットは今ターン偵察済み
  unit.firedThisTurn = true; // 7-4-(5) 偵察ターンは射撃不可
  if (dummyMap[targetHexId]) dummyMap[targetHexId].reconedThisTurn = true;

  if (removedCount === 0) {
    addLog('init', `偵察失敗: ${unit.name} → ${targetHexId} (ダイス: ${roll})`);
    return { success: false, roll, removed: 0, reason: '偵察失敗' };
  }

  const actualRemoved = removeDummy(targetHexId, removedCount);
  addLog('init', `偵察成功: ${unit.name} → ${targetHexId} (ダイス: ${roll}) ダミー${actualRemoved}枚除去 (残${getDummyCount(targetHexId)}枚)`);
  return { success: true, roll, removed: actualRemoved, remaining: getDummyCount(targetHexId) };
}

// ターン開始時に偵察フラグリセット
function resetReconFlags() {
  units.forEach(u => {
    u.reconDone = false;
    u.firedThisTurn = false;
    u.actedThisTurn = false;
    u.attackedThisTurn = false;
    u.spottedThisTurn = false;
  });
  // ヘクスの偵察済みフラグもリセット
  for (const hexId of Object.keys(dummyMap)) {
    dummyMap[hexId].reconedThisTurn = false;
  }
}

// ===== ヘクスID変換 =====
// col,row(0-indexed) → hexId("CCRR")
function toHexId(col, row) {
  return String(col + 1).padStart(2, '0') + String(row + 1).padStart(2, '0');
}
// hexId("CCRR") → {col, row} (0-indexed)
function fromHexId(hexId) {
  return { col: parseInt(hexId.substring(0, 2)) - 1, row: parseInt(hexId.substring(2, 4)) - 1 };
}

// ヘクスの地形を取得（施設込み）
function getHexTerrain(hexId) {
  const facility = FACILITY_MAP[hexId];
  if (facility) return facility; // 町(t)・都市(c)は施設優先
  return TERRAIN_MAP[hexId] || 'x';
}

// ヘクスの高度レベル（斜面データから計算）
// slope1境界の低い側=0, 高い側=1, slope2の高い側=2
function getHexElevation(col, row) {
  const hid = toHexId(col, row);
  if (typeof ELEVATION_MAP !== 'undefined' && ELEVATION_MAP[hid] != null) {
    return ELEVATION_MAP[hid];
  }
  return 0;
}

// ===== 視認システム (ルール6) =====
let losMode = false;       // 視認モードON/OFF
let losSourceUnit = null;  // 視認元ユニット
let losVisibleHexes = {};  // { hexId: true/false }

// 視線(LOS)障害判定: 森林・林・町・市街地・高地
function isLOSBlocker(hexId) {
  const t = getHexTerrain(hexId);
  // 森林(f)・林(w)・町(t)・市街地(c) は障害
  return t === 'f' || t === 'w' || t === 't' || t === 'c';
}

// 2点間のヘクスを直線で結んで通過ヘクスを列挙（ブレゼンハム風）
function getHexesOnLine(col1, row1, col2, row2) {
  const c1 = getHexCenter(col1, row1);
  const c2 = getHexCenter(col2, row2);
  const steps = Math.max(Math.abs(col2 - col1), Math.abs(row2 - row1), 1) * 3;
  const hexes = [];
  const seen = new Set();
  for (let i = 1; i < steps; i++) {
    const t = i / steps;
    const px = c1.x + (c2.x - c1.x) * t;
    const py = c1.y + (c2.y - c1.y) * t;
    const nh = getNearestHex(px, py);
    const key = `${nh.col},${nh.row}`;
    if (seen.has(key) || (nh.col === col1 && nh.row === row1) || (nh.col === col2 && nh.row === row2)) continue;
    // ヘクスサイド平行チェック: 最近ヘクスの中心とLOS線の距離が
    // ヘクスサイズの一定割合以内なら境界上 → parallel フラグを付ける
    const hc = getHexCenter(nh.col, nh.row);
    const distToCenter = Math.sqrt((px - hc.x) ** 2 + (py - hc.y) ** 2);
    const threshold = MAP_CONFIG.hexSize * 0.75; // ヘクスサイド近傍（中心→サイド≈0.866）
    nh._onBorder = distToCenter > threshold;
    nh._sampleX = px;
    nh._sampleY = py;
    seen.add(key);
    hexes.push(nh);
  }
  return hexes;
}


// LOS判定: 2ヘクス間の視線が通るか
// 斜面隣接で得られる高さボーナスを返す（0, 1, 2）
function getSlopeBonus(col, row) {
  const hid = toHexId(col, row);
  let bonus = 0;
  for (const [h1, h2, type] of RIVER_MAP) {
    if (type === 'slope1' || type === 'slope2' || type === 'cliff') {
      if (h1 === hid || h2 === hid) {
        const b = (type === 'slope2') ? 2 : 1;
        if (b > bonus) bonus = b;
      }
    }
  }
  return bonus;
}

// 地形の障害物レベル（森・林・街 = 1、それ以外 = 0）
function getTerrainBlockLevel(hexId) {
  const t = getHexTerrain(hexId);
  if (t === 'f' || t === 'w' || t === 't' || t === 'c') return 1;
  return 0;
}

// 点から直線への距離
function _distPointToLine(px, py, x1, y1, x2, y2) {
  const dx = x2 - x1, dy = y2 - y1;
  const len2 = dx * dx + dy * dy;
  if (len2 === 0) return Math.sqrt((px - x1) ** 2 + (py - y1) ** 2);
  return Math.abs(dy * px - dx * py + x2 * y1 - y2 * x1) / Math.sqrt(len2);
}

// 点から直線への垂線の足
function _projectPointToLine(px, py, x1, y1, x2, y2) {
  const dx = x2 - x1, dy = y2 - y1;
  const len2 = dx * dx + dy * dy;
  if (len2 === 0) return { x: x1, y: y1 };
  const t = ((px - x1) * dx + (py - y1) * dy) / len2;
  return { x: x1 + t * dx, y: y1 + t * dy };
}

// hasLOS用のLOS線座標（一時変数）
let _losX1 = 0, _losY1 = 0, _losX2 = 0, _losY2 = 0;

// LOS線が斜面ヘクスサイドを横切るかチェック
// LOS通過ヘクスの遷移で、隣接ヘクス間にRIVER_MAPの斜面があるか判定
function checkSlopeCrossing(col1, row1, col2, row2) {
  const hexesOnLine = getHexesOnLine(col1, row1, col2, row2);
  const srcSight = 1 + getHexElevation(col1, row1);
  const tgtSight = 1 + getHexElevation(col2, row2);

  // 通過ヘクス列（始点→中間→終点）
  const fullPath = [{ col: col1, row: row1 }, ...hexesOnLine, { col: col2, row: row2 }];

  // 斜面ルックアップ用マップを構築
  const slopeMap = {};
  for (const [h1, h2, type] of RIVER_MAP) {
    if (type !== 'slope1' && type !== 'slope2' && type !== 'cliff') continue;
    const key1 = `${h1}-${h2}`;
    const key2 = `${h2}-${h1}`;
    const level = (type === 'slope2') ? 2 : 1;
    slopeMap[key1] = level;
    slopeMap[key2] = level;
  }

  // LOS線の座標（かすめ判定用）
  const _sc = getHexCenter(col1, row1);
  const _tc = getHexCenter(col2, row2);
  const slopeApothem = MAP_CONFIG.hexSize * 0.75;

  // 連続するヘクス間に斜面があるかチェック
  for (let i = 0; i < fullPath.length - 1; i++) {
    const cur = fullPath[i];
    const next = fullPath[i + 1];
    const curId = toHexId(cur.col, cur.row);
    const nextId = toHexId(next.col, next.row);
    const key = `${curId}-${nextId}`;
    const slopeLevel = slopeMap[key];
    if (slopeLevel) {
      // 斜面の両方のヘクスがLOS線に近いか（かすめなら横切りでない）
      const cc = getHexCenter(cur.col, cur.row);
      const nc = getHexCenter(next.col, next.row);
      const curDist = _distPointToLine(cc.x, cc.y, _sc.x, _sc.y, _tc.x, _tc.y);
      const nextDist = _distPointToLine(nc.x, nc.y, _sc.x, _sc.y, _tc.x, _tc.y);
      if (curDist > slopeApothem || nextDist > slopeApothem) continue; // 片方がかすめ → 横切りでない
      // 斜面を横切った
      const srcId = toHexId(col1, row1);
      const tgtId = toHexId(col2, row2);
      const srcElev = getHexElevation(col1, row1);
      const tgtElev = getHexElevation(col2, row2);

      // 上から下を見る場合
      if (srcElev > tgtElev) {
        // 途中に始点と同じ高度のヘクスがあれば遮蔽
        const curElev = getHexElevation(cur.col, cur.row);
        const nextElev = getHexElevation(next.col, next.row);
        const midElev = Math.max(curElev, nextElev);
        if (midElev >= srcElev) {
          // ただし斜面の隣接なら見える
          if (curId === srcId || nextId === srcId) continue;
          if (curId === tgtId || nextId === tgtId) continue;
          return false;
        }
        continue; // 同じ高度でなければ見える
      }
      // 下から上を見る場合（従来ロジック）
      if ((curId === srcId || nextId === srcId) && srcElev >= slopeLevel) continue;
      if ((curId === tgtId || nextId === tgtId) && tgtElev >= slopeLevel) continue;
      if (srcSight > slopeLevel && tgtSight > slopeLevel) continue;
      if (srcSight > slopeLevel + 1 || tgtSight > slopeLevel + 1) continue;
      return false;
    }
  }
  return true; // 斜面に遮られない
}

function hasLOS(col1, row1, col2, row2) {
  if (col1 === col2 && row1 === row2) return true;

  // LOS線の座標を設定
  const _s = getHexCenter(col1, row1);
  const _t = getHexCenter(col2, row2);
  _losX1 = _s.x; _losY1 = _s.y; _losX2 = _t.x; _losY2 = _t.y;

  // 斜面ヘクスサイドの交差チェック
  if (!checkSlopeCrossing(col1, row1, col2, row2)) return false;

  // 地形障害チェック
  const hexesOnLine = getHexesOnLine(col1, row1, col2, row2);
  const srcSight = 1 + getHexElevation(col1, row1);
  const tgtSight = 1 + getHexElevation(col2, row2);

  for (const h of hexesOnLine) {
    const hexId = toHexId(h.col, h.row);

    // LOS線がこのヘクスを本当に通過するか判定
    // LOS線とヘクス中心の距離を計算
    const hc = getHexCenter(h.col, h.row);
    const losDistToCenter = _distPointToLine(hc.x, hc.y, _losX1, _losY1, _losX2, _losY2);
    const apothem = MAP_CONFIG.hexSize * 0.75; // ヘクス内部判定閾値
    if (losDistToCenter > apothem) {
      // LOS線がヘクスの端をかすめるだけ → ブロッカーなら反対側チェック
      if (isLOSBlocker(hexId)) {
        // 反対側のヘクスを特定（ヘクス中心からLOS線への垂線の反対方向）
        const proj = _projectPointToLine(hc.x, hc.y, _losX1, _losY1, _losX2, _losY2);
        const rx = proj.x * 2 - hc.x;
        const ry = proj.y * 2 - hc.y;
        const otherHex = getNearestHex(rx, ry);
        if (otherHex.col !== h.col || otherHex.row !== h.row) {
          const otherId = toHexId(otherHex.col, otherHex.row);
          if (isLOSBlocker(otherId)) return false; // 両側ブロッカー → 遮蔽
        }
      }
      continue; // 片側だけ or 非ブロッカー → 通る
    }

    // --- 地形障害（森林・林・町・市街地）---
    if (isLOSBlocker(hexId)) {
      // 障害物レベル = 地形レベル + 地面の高さ
      const blockLevel = getTerrainBlockLevel(hexId) + getHexElevation(h.col, h.row);
      // 始点・終点の両方の視線レベルが障害物レベルより高ければ越えて見える
      if (srcSight > blockLevel && tgtSight > blockLevel) continue;
      return false;
    }

    // --- 高度障害（中間ヘクスが端点より高い場合）---
    const midElev = getHexElevation(h.col, h.row);
    if (midElev > 0) {
      const midSight = 1 + midElev;
      const lo = Math.min(srcSight, tgtSight);
      const hi = Math.max(srcSight, tgtSight);
      // 中間が低い方より高く、かつ高い方以上 → 遮蔽
      // （高い方が中間より高ければ壁の上から見える）
      if (midSight > lo && midSight >= hi) return false;
    }
  }
  return true;
}

// 視認コスト（地形チャートより）
// hasElevDiff: 観測者と対象に高度差がある場合true
function getVisionCost(hexId, hasElevDiff) {
  const t = getHexTerrain(hexId);
  switch (t) {
    case 'p': return 1;
    case 'w': return 2;  // 林
    case 'f': return 3;  // 森林 — 障害だが、中にいる敵は見えない場合も
    case 'r': return hasElevDiff ? 1 : 4;  // 荒地（高度差ありなら1、なしなら4）
    case 't': return 2;  // 町
    case 'c': return 3;  // 市街地
    case 'lake': return 1;
    default: return 1;
  }
}

// 視認範囲を計算（直線上の地形コスト合計で判定）
// visionPoints: シナリオ指定の視認能力ポイント
function calculateVisionRange(col, row, visionPoints) {
  const result = {}; // { "col,row": true }
  const startKey = `${col},${row}`;
  result[startKey] = true;

  // マップ上の全ヘクスに対して直線判定
  for (let r = 0; r < MAP_CONFIG.rows; r++) {
    for (let c = 0; c < MAP_CONFIG.cols; c++) {
      if (c === col && r === row) continue;
      // LOS判定（地形障害・高低差）
      if (!hasLOS(col, row, c, r)) continue;
      // LOS通過 → 視認コスト計算
      const hexesOnLine = getHexesOnLine(col, row, c, r);
      const observerElev = getHexElevation(col, row);
      const targetElev = getHexElevation(c, r);
      const hasElevDiff = observerElev !== targetElev;
      let totalCost = 0;
      for (const h of hexesOnLine) {
        const hid = toHexId(h.col, h.row);
        totalCost += getVisionCost(hid, hasElevDiff);
      }
      // 目標ヘクス自体のコストも加算
      const tgtHexId = toHexId(c, r);
      totalCost += getVisionCost(tgtHexId, hasElevDiff);
      // 視認ポイント内なら見える（余りルール: コスト超えても1ヘクス前で余りがあれば見える）
      if (totalCost <= visionPoints) {
        result[`${c},${r}`] = true;
      } else {
        // 余りルール: 目標の1つ手前まででポイントが残っていれば目標も見える
        const costBeforeTarget = totalCost - getVisionCost(tgtHexId, hasElevDiff);
        if (costBeforeTarget < visionPoints) {
          result[`${c},${r}`] = true;
        }
      }
    }
  }
  return result;
}

// ヘクスの6方向隣接（flat-top: 奇数列が下にずれる）
function getHexNeighbors(col, row) {
  const odd = col % 2 === 1;
  if (odd) {
    return [
      { col: col - 1, row: row     }, // 左上
      { col: col - 1, row: row + 1 }, // 左下
      { col: col,     row: row - 1 }, // 上
      { col: col,     row: row + 1 }, // 下
      { col: col + 1, row: row     }, // 右上
      { col: col + 1, row: row + 1 }, // 右下
    ];
  } else {
    return [
      { col: col - 1, row: row - 1 }, // 左上
      { col: col - 1, row: row     }, // 左下
      { col: col,     row: row - 1 }, // 上
      { col: col,     row: row + 1 }, // 下
      { col: col + 1, row: row - 1 }, // 右上
      { col: col + 1, row: row     }, // 右下
    ];
  }
}

// ===== スタッキング制限 (ルール8) =====
const STACK_LIMIT = 4;
// スタック制限から除外する型（ダミー・指揮官・陣地・I.P.）
const STACK_EXEMPT_TYPES = ['dummy', 'leader', 'fortification', 'ip'];

// ヘクスごとのスタック数を取得（制限除外ユニットを除く）
function getStackCount(hexId) {
  return units.filter(u =>
    u.hexId === hexId &&
    u.status !== 'eliminated' &&
    !STACK_EXEMPT_TYPES.includes(u.type)
  ).length;
}

// 組織間スタック禁止チェック: 移動ユニットがそのヘクスに入れるか
function canStackWithOrg(movingUnit, hexId) {
  if (!movingUnit.org) return true;
  const existing = units.filter(u =>
    u.hexId === hexId && u.status !== 'eliminated' && u.org && u.id !== movingUnit.id
  );
  for (const u of existing) {
    // SS/国防軍スタック禁止
    if (SCENARIO.noSSHeerStack) {
      if ((movingUnit.org === 'ss' && u.org === 'heer') ||
          (movingUnit.org === 'heer' && u.org === 'ss')) return false;
    }
    // 米英スタック禁止
    if (SCENARIO.noUSUKStack) {
      if ((movingUnit.org === 'us' && u.org === 'uk') ||
          (movingUnit.org === 'uk' && u.org === 'us')) return false;
    }
  }
  return true;
}

// 超過ヘクス一覧を返す { hexId: [units] }
function getOverstackedHexes() {
  const hexUnits = {};
  units.forEach(u => {
    if (u.status === 'eliminated' || STACK_EXEMPT_TYPES.includes(u.type)) return;
    if (!hexUnits[u.hexId]) hexUnits[u.hexId] = [];
    hexUnits[u.hexId].push(u);
  });
  const result = {};
  for (const [hexId, uList] of Object.entries(hexUnits)) {
    if (uList.length > STACK_LIMIT) result[hexId] = uList;
  }
  return result;
}

// スタック超過チェック＋確認 → DD強制適用
function checkAndApplyOverstackPenalty() {
  const overstacked = getOverstackedHexes();
  const hexIds = Object.keys(overstacked);
  if (hexIds.length === 0) return;

  // 確認ダイアログ
  const msgs = hexIds.map(hid => {
    const uList = overstacked[hid];
    const names = uList.map(u => u.name).join(', ');
    return `ヘクス${hid}: ${uList.length}個 (${names})`;
  });
  const ok = confirm(
    `⚠ スタック超過！（上限${STACK_LIMIT}個）\n\n` +
    msgs.join('\n') +
    '\n\n全ユニットがDD状態になります。よろしいですか？'
  );
  if (!ok) return;

  // DD適用
  hexIds.forEach(hid => {
    overstacked[hid].forEach(u => {
      if (u.status !== 'dd') {
        const prev = u.status;
        u.status = 'dd';
        addLog('init', `スタック超過: ${u.name} (${hid}) ${prev.toUpperCase()} → DD`);
      }
    });
  });
  // マップ再描画
  drawMap();
}

// ヘクスがスタック超過中か判定
function isOverstacked(hexId) {
  return getStackCount(hexId) > STACK_LIMIT;
}

// ===== 指揮官システム (ルール16) =====

// 指揮官の能力定義
// Leader A: 3能力 (A.M.R / F.A.R / F.M.R からランダム選択)
// Leader B: 2能力 (F.R / A.R / M.R からランダム選択)
// Leader C: 1能力 (F / A / M or R or R からランダム選択)
const LEADER_ABILITY_POOL = {
  leader_a: [
    ['A','M','R'], ['F','A','R'], ['F','M','R']
  ],
  leader_b: [
    ['F','R'], ['A','R'], ['M','R']
  ],
  leader_c: [
    ['F'], ['A'], ['M'], ['R'], ['R']
  ],
};

// 指揮官ユニットに能力をランダム割り当て（シナリオ開始時、以後固定）
function assignLeaderAbilities(unit) {
  if (unit.type !== 'leader') return;
  const rank = unit.leaderRank || 'leader_c';
  const pool = LEADER_ABILITY_POOL[rank];
  unit.abilities = pool[Math.floor(Math.random() * pool.length)];
}

// 指揮官が同ヘクスのユニットを指揮できるか判定
// 国防軍(ge)とSS(ss)は互いに指揮不可
function canCommandUnit(leader, target) {
  if (leader.type !== 'leader') return false;
  if (leader.status === 'eliminated') return false;
  if (target.type === 'leader' || target.type === 'dummy') return false;
  // 同じ陣営チェック
  if (leader.side !== target.side) return false;
  // 国防軍/SS別軍制限
  const leaderNation = leader.nation || (leader.ss ? 'ss' : 'ge');
  const targetNation = target.nation || (target.ss ? 'ss' : 'ge');
  if (leader.side === 'german' && leaderNation !== targetNation) return false;
  return true;
}

// ヘクスにいる指揮官を取得
function getLeaderInHex(hexId, side) {
  return units.find(u =>
    u.hexId === hexId &&
    u.type === 'leader' &&
    u.side === side &&
    u.status !== 'eliminated'
  );
}

// 指揮官の能力が有効か判定（同ヘクス、R持ちなら隣接も）
function getActiveLeaderForUnit(unit, abilityType) {
  // 同ヘクスの指揮官
  const leader = getLeaderInHex(unit.hexId, unit.side);
  if (leader && canCommandUnit(leader, unit)) {
    if (leader.abilities && leader.abilities.includes(abilityType)) return leader;
  }
  // R能力を持つ隣接ヘクスの指揮官（指定能力も持っている場合）
  const pos = fromHexId(unit.hexId);
  const neighbors = getHexNeighbors(pos.col, pos.row);
  for (const n of neighbors) {
    if (n.col < 0 || n.col >= MAP_CONFIG.cols || n.row < 0 || n.row >= MAP_CONFIG.rows) continue;
    const nHexId = toHexId(n.col, n.row);
    const nLeader = getLeaderInHex(nHexId, unit.side);
    if (nLeader && canCommandUnit(nLeader, unit)) {
      if (nLeader.abilities && nLeader.abilities.includes('R') && nLeader.abilities.includes(abilityType)) {
        return nLeader;
      }
    }
  }
  return null;
}

// 指揮官負傷チェック — 16-3-(1): スタック内ユニットが損害を受けた時（1回の攻撃につき1回）
// ダイス0 → 除去
function checkLeaderCasualty(hexId, side) {
  const leader = getLeaderInHex(hexId, side);
  if (!leader) return null;
  const roll = Math.floor(Math.random() * 10);
  if (roll === 0) {
    leader.status = 'eliminated';
    addLog('init', `⚠ ${leader.name} 負傷！（ダイス: ${roll}）→ 除去`);
    return { leader, roll, wounded: true };
  }
  return { leader, roll, wounded: false };
}

// 16-3-(3): スタック壊滅時の指揮官チェック
// ダイス0-4 → 指揮官も除去、5-9 → 最寄り味方へワープ（味方なし→援軍と再登場）
function checkLeaderOnStackEliminated(hexId, side) {
  const leader = getLeaderInHex(hexId, side);
  if (!leader) return null;
  // 同ヘクスに生存ユニット（指揮官以外）がいるか
  const aliveUnits = units.filter(u =>
    u.hexId === hexId && u.side === side &&
    u.type !== 'leader' && u.type !== 'dummy' &&
    u.status !== 'eliminated'
  );
  if (aliveUnits.length > 0) return null; // まだ壊滅してない

  const roll = Math.floor(Math.random() * 10);
  if (roll <= 4) {
    leader.status = 'eliminated';
    addLog('init', `⚠ ${leader.name}: 部隊壊滅（ダイス: ${roll}）→ 指揮官も除去`);
    return { leader, roll, eliminated: true };
  } else {
    // 最寄りの味方ユニットのヘクスへワープ
    const nearest = findNearestFriendlyHex(hexId, side);
    if (nearest) {
      leader.hexId = nearest;
      const pos = fromHexId(nearest);
      leader.col = pos.col;
      leader.row = pos.row;
      const center = getHexCenter(pos.col, pos.row);
      leader.x = center.x;
      leader.y = center.y;
      addLog('init', `${leader.name}: 部隊壊滅（ダイス: ${roll}）→ ${nearest}の味方へ合流`);
    } else {
      // 味方なし → 援軍待ち（マップから一時退場）
      leader.hexId = 'reinforcement';
      addLog('init', `${leader.name}: 部隊壊滅（ダイス: ${roll}）→ 援軍と再登場`);
    }
    return { leader, roll, eliminated: false, movedTo: leader.hexId };
  }
}

// 最寄りの味方ユニットがいるヘクスを探す
function findNearestFriendlyHex(srcHexId, side) {
  const srcPos = fromHexId(srcHexId);
  const srcCenter = getHexCenter(srcPos.col, srcPos.row);
  let bestHex = null, bestDist = Infinity;
  const seen = new Set();
  units.forEach(u => {
    if (u.side !== side || u.type === 'leader' || u.type === 'dummy' ||
        u.status === 'eliminated' || u.hexId === srcHexId || !u.hexId || u.hexId === 'reinforcement') return;
    if (seen.has(u.hexId)) return;
    seen.add(u.hexId);
    const pos = fromHexId(u.hexId);
    const c = getHexCenter(pos.col, pos.row);
    const dist = (c.x - srcCenter.x) ** 2 + (c.y - srcCenter.y) ** 2;
    if (dist < bestDist) { bestDist = dist; bestHex = u.hexId; }
  });
  return bestHex;
}

// 16-3-(4): 指揮官単独で敵射程内にいる場合、敵ユニットごとに負傷チェック
// ダイス0-4 → 死亡
function checkLoneLeaderDanger(leader) {
  if (!leader || leader.type !== 'leader' || leader.status === 'eliminated') return [];
  if (!leader.hexId || leader.hexId === 'reinforcement') return [];
  // 同ヘクスに味方ユニットがいるか
  const friendlies = units.filter(u =>
    u.hexId === leader.hexId && u.side === leader.side &&
    u.type !== 'leader' && u.type !== 'dummy' &&
    u.status !== 'eliminated'
  );
  if (friendlies.length > 0) return []; // 単独ではない

  // 射程内の敵ユニットを列挙
  const results = [];
  const leaderPos = fromHexId(leader.hexId);
  units.forEach(enemy => {
    if (enemy.side === leader.side || enemy.status === 'eliminated') return;
    if (enemy.type === 'leader' || enemy.type === 'dummy') return;
    if (!enemy.hexId || enemy.hexId === 'reinforcement') return;
    const enemyPos = fromHexId(enemy.hexId);
    // 射程内か（ヘクス距離で判定）
    const dist = hexDistance(leaderPos.col, leaderPos.row, enemyPos.col, enemyPos.row);
    if (dist <= (enemy.range || 1)) {
      const roll = Math.floor(Math.random() * 10);
      if (roll <= 4) {
        leader.status = 'eliminated';
        addLog('init', `⚠ ${leader.name}: 単独で${enemy.name}の射程内（ダイス: ${roll}）→ 死亡`);
        results.push({ enemy, roll, killed: true });
        return; // 死んだら終了
      } else {
        addLog('init', `${leader.name}: 単独で${enemy.name}の射程内（ダイス: ${roll}）→ 無事`);
        results.push({ enemy, roll, killed: false });
      }
    }
  });
  return results;
}

// ヘクス距離計算（flat-top offset座標）
function hexDistance(c1, r1, c2, r2) {
  // offset座標 → cube座標に変換して距離計算
  function toCube(col, row) {
    const x = col;
    const z = row - (col - (col & 1)) / 2;
    const y = -x - z;
    return { x, y, z };
  }
  const a = toCube(c1, r1);
  const b = toCube(c2, r2);
  return Math.max(Math.abs(a.x - b.x), Math.abs(a.y - b.y), Math.abs(a.z - b.z));
}

// M能力による回復修正があるか判定
function hasLeaderMoraleBonus(unit) {
  const leader = getActiveLeaderForUnit(unit, 'M');
  return !!leader;
}

// ===== AI側のフェイズか判定 =====
function isAIPhase() {
  if (G.gameMode !== 'pvai') return false;
  const aiSide = G.playerSide === 'german' ? 'allied' : 'german';
  const phase = PHASES[G.phase];
  // 先攻移動・射撃と突撃は先攻プレイヤーのフェイズ
  if (phase.id === 'moveFire' || phase.id === 'assault') {
    return G.initiative === aiSide;
  }
  // 後攻移動は後攻プレイヤーのフェイズ
  if (phase.id === 'defMove') {
    return G.initiative !== aiSide;
  }
  return false;
}
