// 射撃戦闘結果を取得
// fp: 火力, dieRoll: 修正済みダイス目
// 戻り値: { damageLevel, isElimination, ammoCheck }
function getFireCombatResult(fp, dieRoll) {
  const colIdx = getFPColumnIndex(fp);
  // ダイス範囲クランプ (-3~12)
  const clampedDie = Math.max(-3, Math.min(12, dieRoll));
  const row = FIRE_COMBAT_TABLE[String(clampedDie)];
  if (!row) return { damageLevel: 0, isElimination: false, ammoCheck: false };
  const val = row[colIdx];
  const isE = val === 99;
  const damageLevel = isE ? 99 : val;
  // 弾薬切れチェック
  const ammoRow = AMMO_CHECK[String(clampedDie)];
  const ammoCheck = ammoRow ? !!ammoRow[colIdx] : false;
  return { damageLevel, isElimination: isE, ammoCheck };
}

// 損害判定: 損害レベルと防御力の差からD/DD/壊滅を決定
// damageLevel: 戦闘結果表の値, defenseLevel: ユニットの防御レベル
// 戻り値: 'none', 'd', 'dd', 'eliminated'
function resolveDamage(damageLevel, defenseLevel) {
  if (damageLevel === 99) return 'eliminated'; // E = 防御レベルに関係なく壊滅
  const diff = damageLevel - defenseLevel;
  if (diff >= 3) return 'eliminated'; // +3以上 → 壊滅
  if (diff === 2) return 'dd';        // +2 → DD
  if (diff >= 0) return 'd';          // +0 or +1 → D
  return 'none';                       // マイナス → 効果なし
}

// ヘクス中心座標を計算（flat-top: 辺が上）
function getHexCenter(col, row) {
  const size = MAP_CONFIG.hexSize;
  const ox = MAP_CONFIG.offsetX;
  const oy = MAP_CONFIG.offsetY;
  const w = size * 2;
  const h = Math.sqrt(3) * size;
  const x = ox + col * w * 0.75 + size;
  let y = oy + row * h + h / 2;
  if (col % 2 === 1) y += h / 2;
  return { x, y };
}

// マップ座標から最近傍ヘクス(col,row)を返す
function getNearestHex(mx, my) {
  const size = MAP_CONFIG.hexSize;
  const ox = MAP_CONFIG.offsetX;
  const oy = MAP_CONFIG.offsetY;
  const w = size * 2;
  const h = Math.sqrt(3) * size;
  let bestCol = 0, bestRow = 0, bestDist = Infinity;
  for (let r = 0; r < MAP_CONFIG.rows; r++) {
    for (let c = 0; c < MAP_CONFIG.cols; c++) {
      const hx = ox + c * w * 0.75 + size;
      let hy = oy + r * h + h / 2;
      if (c % 2 === 1) hy += h / 2;
      const dx = mx - hx, dy = my - hy;
      const dist = dx * dx + dy * dy;
      if (dist < bestDist) { bestDist = dist; bestCol = c; bestRow = r; }
    }
  }
  return { col: bestCol, row: bestRow, dist: Math.sqrt(bestDist) };
}

// マップ座標でユニットのヒットテスト（一番上のユニットを返す）
function hitTestUnit(mx, my) {
  const hexSize = MAP_CONFIG.hexSize;
  const unitSize = hexSize * 0.9;
  const cascadeOffX = unitSize * 0.18;
  const cascadeOffY = -unitSize * 0.18;
  const stacks = getStacksByHex();
  let hit = null;
  // 後に描画されるもの（上に見える）を優先
  Object.values(stacks).forEach(stack => {
    const sn = stack.filter(u => u.status !== 'eliminated').length;
    const bOffX = -(sn - 1) * cascadeOffX * 0.5;
    const bOffY = (sn - 1) * Math.abs(cascadeOffY) * 0.5;
    for (let i = stack.length - 1; i >= 0; i--) {
      const u = stack[i];
      const ox = i * cascadeOffX;
      const oy = i * cascadeOffY;
      const dx = u.x - unitSize/2 + bOffX + ox;
      const dy = u.y - unitSize/2 + bOffY + oy;
      if (mx >= dx && mx <= dx + unitSize && my >= dy && my <= dy + unitSize) {
        hit = u;
        return;
      }
    }
  });
  return hit;
}

      let rank = 'C';
      if (lu.unitName && lu.unitName.includes('Leader A')) rank = 'A';
      else if (lu.unitName && lu.unitName.includes('Leader B')) rank = 'B';
      else if (lu.unitName && lu.unitName.includes('Leader C')) rank = 'C';

      const poolKey = (lu.side === 'german' && lu.org === 'ss' && scenario.leaderPool.germanSS) ? 'germanSS' : lu.side;
      const pool = scenario.leaderPool[poolKey];

    });

  return defs;
}

// 援軍を投入（スタック制限を考慮して入口ヘクスに分散配置）
function deployReinforcements(scenario, turn) {
  const reinforcements = scenario.reinforcements.filter(r => r.turn === turn);
  reinforcements.forEach(r => {
    // 全ユニットをフラットに並べる
    const allNewUnits = [];
    r.units.forEach(u => {
      for (let i = 0; i < u.count; i++) {
        allNewUnits.push({
          src: scenario.getUnitImage(u.nation || (r.side === 'german' ? 'ドイツ軍' : 'イギリス軍'), u.unitName),
          side: r.side, type: u.type, status: 'ok',
          name: `${u.unitName}-R${turn}-${i}`,
          range: u.range || 0, fpAT: u.fpAT || 0, fpSoft: u.fpSoft || 0,
          def: u.def || 0, morale: u.morale || 5,
          closeAtk: u.closeAtk || 0, closeDef: u.closeDef || 0, move: u.move || 0,
          nation: u.nation, unitName: u.unitName,
        });
      }
    });

    // 4ユニットずつ入口ヘクスに分散配置（目的地に近い入口を優先）
    const usedEntries = {};  // 入口ヘクスごとの配置済みユニット数
    for (let i = 0; i < allNewUnits.length; i += 4) {
      const batch = allNewUnits.slice(i, i + 4);
      // このバッチの事前割り当て先を調べる
      let targetDest = null;
      if (typeof _aiAssignedTargets !== 'undefined') {
        const firstName = batch[0].name || '';
        let stackKey = null;
        if (firstName.match(/^M4-R\d+-[0-3]$/)) stackKey = 'M4_0';
        else if (firstName.match(/^M4-R\d+-[4-7]$/)) stackKey = 'M4_1';
        else if (firstName.startsWith('A27-R')) stackKey = 'A27_0';
        else if (firstName.startsWith('A22-R') || firstName.startsWith('Infantry-R4-0') || firstName.startsWith('Infantry-R4-1')) {
          stackKey = 'R4_0';
        } else if (firstName.startsWith('Infantry-R4-2') || firstName.startsWith('Infantry-R4-3')) {
          stackKey = 'R4_1';
        }
        if (stackKey && _aiAssignedTargets[stackKey]) {
          targetDest = fromHexId(_aiAssignedTargets[stackKey]);
        }
      }
      // 目的地に最も近い空き入口を選択
      let targetHexId = null;
      let bestDist = Infinity;
      for (const ehId of r.entryHexes) {
        const existing = testUnits.filter(su =>
          su.hexId === ehId && su.status !== 'eliminated' &&
          !STACK_EXEMPT_TYPES.includes(su.type)
        ).length + (usedEntries[ehId] || 0);
        if (existing + batch.length > 4) continue;
        if (targetDest) {
          const ePos = fromHexId(ehId);
          const dist = hexDistance(ePos.col, ePos.row, targetDest.col, targetDest.row);
          if (dist < bestDist) { bestDist = dist; targetHexId = ehId; }
        } else {
          targetHexId = ehId;
          break;
        }
      }
      // 全入口が満杯なら最初の入口を使用
      if (!targetHexId) targetHexId = r.entryHexes[0];
      usedEntries[targetHexId] = (usedEntries[targetHexId] || 0) + batch.length;

      const pos = fromHexId(targetHexId);
      const center = getHexCenter(pos.col, pos.row);
      batch.forEach(u => {
        u.col = pos.col;
        u.row = pos.row;
        u.x = center.x;
        u.y = center.y;
        u.hexId = targetHexId;
        u.reinforcement = { deployed: true, entryHexes: r.entryHexes };
        u.moveComplete = false;  // 配置ターンに移動可能
        // 指揮官ならランダム裏面割り当て
        assignLeaderBack(scenario, u);
        // 援軍ユニットはid未設定になりやすいので必ず一意idを付与
        if (!u.id) u.id = `${u.name || u.unitName || 'unit'}_${turn}_${testUnits.length}`;
        testUnits.push(u);
      });
    }
    addLog('turn', `援軍到着: ${r.side === 'german' ? 'ドイツ軍' : '連合軍'} (${r.units.map(u => u.unitName + 'x' + u.count).join(', ')})`);
  });
}

// 指揮官ユニットにランダム裏面を割り当てるヘルパー
// 使用済み追跡: 同じ陣営・ランク内で重複しない
const _usedLeaderBacks = {};
function assignLeaderBack(scenario, unit) {
  if (unit.type !== 'leader' || !scenario.leaderPool) return;
  let rank = 'C';
  if (unit.unitName && unit.unitName.includes('Leader A')) rank = 'A';
  else if (unit.unitName && unit.unitName.includes('Leader B')) rank = 'B';
  const pool = scenario.leaderPool[unit.side];
  if (!pool || !pool[rank] || pool[rank].length === 0) return;
  const key = unit.side + '_' + rank;
  if (!_usedLeaderBacks[key]) _usedLeaderBacks[key] = new Set();
  const available = pool[rank].filter((_, i) => !_usedLeaderBacks[key].has(i));
  if (available.length === 0) return;
  const idx = Math.floor(Math.random() * available.length);
  const choice = available[idx];
  const origIdx = pool[rank].indexOf(choice);
  _usedLeaderBacks[key].add(origIdx);
  unit.abilities = choice.abilities;
  unit.srcBack = 'images/' + choice.back;
  unit.src = unit.srcBack;
  addLog('init', `${unit.name}: 能力 [${choice.abilities.join(',')}] (${rank}ランク)`);
}

  ['allied', 'german'].forEach(side => {
    const drt = scenario.diceReinforcements[side];
    if (!drt || turn < drt.startTurn) return;

    const roll = Math.floor(Math.random() * 10);
    const bonus = (initiative === side) ? (drt.firstPlayerBonus || 0) : 0;
    const effectiveRoll = roll + bonus;

    const entry = drt.table.find(e => effectiveRoll >= e.min && effectiveRoll <= e.max);
    if (!entry) {
      addLog('turn', `${sideNames[side]} 援軍ダイス: ${roll}${bonus ? '+' + bonus : ''} = ${effectiveRoll} → なし`);
      _reinforceOverlayRows.push({
        label: sideNames[side],
        roll: roll,
        detail: bonus ? `+${bonus}=${effectiveRoll}` : '',
        resultText: 'なし',
        resultClass: 'hit-none',
      });
      return;
    }

    addLog('turn', `${sideNames[side]} 援軍ダイス: ${roll}${bonus ? '+' + bonus : ''} = ${effectiveRoll} → ${entry.label}`);
    _reinforceOverlayRows.push({
      label: sideNames[side],
      roll: roll,
      detail: bonus ? `+${bonus}=${effectiveRoll}` : '',
      resultText: entry.label,
      resultClass: 'hit-d',
    });

    // 航空支援の場合: 個別にd10で火力を決定し盤外砲兵として登録
    if (entry.airSupport) {
      for (let i = 0; i < entry.airSupport; i++) {
        const fpRoll = Math.floor(Math.random() * 10);
        const ob = {
          id: 'air_' + G.turn + '_' + side + '_' + i,
          name: `航空支援${entry.airSupport > 1 ? (i+1) : ''}(T${G.turn})`,
          side: side,
          fp: fpRoll,
          uses: 1,
          usedCount: 0,
          combinable: false,
        };
        SCENARIO_OFF_BOARD.push(ob);
        addLog('turn', `${sideNames[side]} 航空支援到着！ 火力ダイス: ${fpRoll} → FP${fpRoll}`);
      }
      return;
    }

    if (!entry.units || entry.units.length === 0) return;

    // ユニットを生成
    const entryHexes = entry.entryHexes || ['3106'];
    const nationName = side === 'german' ? 'ドイツ軍' : 'アメリカ軍';
    const allNewUnits = [];
    entry.units.forEach(u => {
      for (let i = 0; i < u.count; i++) {
        allNewUnits.push({
          src: scenario.getUnitImage(nationName, u.unitName),
          side, type: u.type, status: 'ok',
          name: `${u.unitName}-DR${turn}-${Math.random().toString(36).substr(2,4)}`,
          range: u.range || 0, fpAT: u.fpAT || 0, fpSoft: u.fpSoft || 0,
          def: u.def || 0, morale: u.morale || 5,
          closeAtk: u.closeAtk || 0, closeDef: u.closeDef || 0, move: u.move || 0,
          nation: nationName, unitName: u.unitName,
        });
      }
    });

    // 入口ヘクスに分散配置
    const usedEntries = {};
    for (let i = 0; i < allNewUnits.length; i += 4) {
      const batch = allNewUnits.slice(i, i + 4);
      let targetHexId = null;
      for (const ehId of entryHexes) {
        const existing = testUnits.filter(su =>
          su.hexId === ehId && su.status !== 'eliminated' &&
          !STACK_EXEMPT_TYPES.includes(su.type)
        ).length + (usedEntries[ehId] || 0);
        if (existing + batch.length <= 4) {
          targetHexId = ehId;
          break;
        }
      }
      if (!targetHexId) targetHexId = entryHexes[0];
      usedEntries[targetHexId] = (usedEntries[targetHexId] || 0) + batch.length;

      const pos = fromHexId(targetHexId);
      const center = getHexCenter(pos.col, pos.row);
      batch.forEach(u => {
        u.col = pos.col;
        u.row = pos.row;
        u.x = center.x;
        u.y = center.y;
        u.hexId = targetHexId;
        u.reinforcement = { deployed: true, entryHexes };
        u.moveComplete = false;  // 配置ターンに移動可能
        // 指揮官ならランダム裏面割り当て
        assignLeaderBack(scenario, u);
        // 援軍ユニットはid未設定になりやすいので必ず一意idを付与
        if (!u.id) u.id = `${u.name || u.unitName || 'unit'}_${turn}_${testUnits.length}`;
        testUnits.push(u);
      });
    }
  });

  loadUnitImages();

  // 増援ダイス結果をオーバーレイ表示
  if (_reinforceOverlayRows.length > 0) {
    showDiceOverlay('増援ダイス', `ターン${turn}`, _reinforceOverlayRows);
  }
}

// ユニットが去ったヘクスのダミーを掃除（味方実ユニットがいなければ除去）
function cleanupOrphanDummies(hexId, side) {
  if (!hexId) return;
  const hasFriendly = testUnits.some(u =>
    u.hexId === hexId && u.side === side && u.status !== 'eliminated' &&
    u.type !== 'dummy' && u.type !== 'leader' && u.type !== 'fortification' && u.type !== 'ip'
  );
  if (!hasFriendly) {
    removeAllDummies(hexId);
  }
}

const testUnitDefs = buildUnitsFromScenario(SCENARIO);

const testUnits = testUnitDefs.map((d, i) => {
  const center = getHexCenter(d.col, d.row);
  const hexId = (d.col >= 0 && d.row >= 0) ? toHexId(d.col, d.row) : 'reinforcement';
  return { ...d, x: center.x, y: center.y, hexId, id: d.name + '_' + i };
});
// units を testUnits に統一
units = testUnits;

// シナリオ別AI定義は ai_scenario2.js 等の外部ファイルで定義

// ヘクスキーでユニットをグループ化
function getStacksByHex() {
  const stacks = {};
  testUnits.forEach(u => {
    if (u.status === 'eliminated') return; // 壊滅ユニットは表示しない
    if (u.col < 0) return; // マップ外
    // AI側の未配置援軍は非表示（人間側の援軍は表示）
    if (u.reinforcement && !u.reinforcement.deployed) {
      const isHumanSide = (G.gameMode === 'pvp') || (G.gameMode === 'pvai' && u.side === G.playerSide);
      if (!isHumanSide) return;
    }
    const key = `${u.col},${u.row}`;
    if (!stacks[key]) stacks[key] = [];
    stacks[key].push(u);
  });
  return stacks;
}

function loadUnitImages() {
  testUnits.forEach(u => {
    if (!u.src) { console.warn('画像srcなし:', u.name, u.type, u.unitName); return; }
    const img = new Image();
    img.onload = () => { u.img = img; drawMap(); };
    img.onerror = () => { console.error('画像読込失敗:', u.src, u.name); };
    img.src = u.src;
  });
}

// ダミー画像キャッシュ
const _dummyImgCache = {};
(function preloadDummyImages() {
  Object.values(DUMMY_IMAGES).forEach(src => {
    const img = new Image();
    img.onload = () => drawMap();
    img.src = src;
    _dummyImgCache[src] = img;
  });
})();

// AI移動経路を記録（drawMapで描画用）
let _aiMoveTrail = [];

function drawMap() {
  if (!mapState.img) return;
  const area = document.getElementById('mapArea');
  canvas.width = area.clientWidth;
  canvas.height = area.clientHeight;
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = '#3a3a2a';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  ctx.save();
  ctx.translate(mapState.x, mapState.y);
  ctx.scale(mapState.zoom, mapState.zoom);
  if (mapState.imgs) {
    const rot = SCENARIO.mapImageRotate || 0;
    const offsets = SCENARIO.mapImageOffsets || [];
    let x = 0, y = 0;
    mapState.imgs.forEach((im, i) => {
      const ox = (offsets[i] && offsets[i].x) || 0;
      const oy = (offsets[i] && offsets[i].y) || 0;
      ctx.save();
      if (rot === 90) {
        // 90度回転 → 横連結（左から右）
        ctx.translate(x + im.height + ox, oy);
        ctx.rotate(Math.PI / 2);
        ctx.drawImage(im, 0, 0);
        x += im.height + ox;
      } else if (rot === 270) {
        ctx.translate(x + ox, im.width + oy);
        ctx.rotate(-Math.PI / 2);
        ctx.drawImage(im, 0, 0);
        x += im.height + ox;
      } else if (rot === 180) {
        ctx.translate(im.width + ox, y + im.height + oy);
        ctx.rotate(Math.PI);
        ctx.drawImage(im, 0, 0);
        y += im.height + oy;
      } else {
        ctx.drawImage(im, ox, y + oy);
        y += im.height + oy;
      }
      ctx.restore();
    });
  } else {
    ctx.drawImage(mapState.img, 0, 0);
  }

  // マップ周囲余白（1-2ヘクス分）
  if (mapState.img) {
    const pad = MAP_CONFIG.hexSize * 4;
    ctx.fillStyle = '#3a3a2a';
    ctx.fillRect(mapState.img.width, -pad, pad, mapState.img.height + pad * 2);
    ctx.fillRect(-pad, -pad, pad, mapState.img.height + pad * 2);
    ctx.fillRect(-pad, -pad, mapState.img.width + pad * 2, pad);
    ctx.fillRect(-pad, mapState.img.height, mapState.img.width + pad * 2, pad);
  }

  // 視認範囲の色分け描画
  const hexSize = MAP_CONFIG.hexSize;
  if (losMode && losSourceUnit && Object.keys(losVisibleHexes).length > 0) {
    for (let r = 0; r < MAP_CONFIG.rows; r++) {
      for (let c = 0; c < MAP_CONFIG.cols; c++) {
        const key = `${c},${r}`;
        const center = getHexCenter(c, r);
        const visible = losVisibleHexes[key];
        // ヘクス六角形パスを作成
        ctx.beginPath();
        for (let a = 0; a < 6; a++) {
          const angle = Math.PI / 3 * a;
          const hx = center.x + hexSize * Math.cos(angle);
          const hy = center.y + hexSize * Math.sin(angle);
          if (a === 0) ctx.moveTo(hx, hy); else ctx.lineTo(hx, hy);
        }
        ctx.closePath();
        if (visible) {
          ctx.fillStyle = 'rgba(50,200,50,0.2)';   // 見える → 緑
        } else {
          ctx.fillStyle = 'rgba(0,0,0,0.45)';       // 見えない → 暗く
        }
        ctx.fill();
      }
    }
    // 視認元ユニットのヘクスをハイライト
    const srcCenter = getHexCenter(losSourceUnit.col, losSourceUnit.row);
    ctx.beginPath();
    for (let a = 0; a < 6; a++) {
      const angle = Math.PI / 3 * a;
      const hx = srcCenter.x + hexSize * Math.cos(angle);
      const hy = srcCenter.y + hexSize * Math.sin(angle);
      if (a === 0) ctx.moveTo(hx, hy); else ctx.lineTo(hx, hy);
    }
    ctx.closePath();
    ctx.fillStyle = 'rgba(200,200,50,0.35)';
    ctx.fill();
    ctx.strokeStyle = '#ff0';
    ctx.lineWidth = 2;
    ctx.stroke();
  }

  // 支援射撃: 目標ヘクスのハイライト＋弓形矢印
  if (supportState.targetHexId) {
    const tPos = fromHexId(supportState.targetHexId);
    const tCenter = getHexCenter(tPos.col, tPos.row);
    // 目標ヘクス赤ハイライト
    ctx.beginPath();
    for (let a = 0; a < 6; a++) {
      const angle = Math.PI / 3 * a;
      const hx = tCenter.x + hexSize * Math.cos(angle);
      const hy = tCenter.y + hexSize * Math.sin(angle);
      if (a === 0) ctx.moveTo(hx, hy); else ctx.lineTo(hx, hy);
    }
    ctx.closePath();
    ctx.fillStyle = 'rgba(255,50,50,0.25)';
    ctx.fill();
    ctx.strokeStyle = '#f44';
    ctx.lineWidth = 3;
    ctx.stroke();

    // 選択中の砲兵から目標への弓形矢印
    const artilleryUnits = supportState.selectedArtillery.map(name => testUnits.find(u => u.name === name)).filter(Boolean);
    artilleryUnits.forEach(au => {
      const sx = au.x, sy = au.y;
      const ex = tCenter.x, ey = tCenter.y;
      // 弓の頂点（中間点を上にずらす）
      const midX = (sx + ex) / 2;
      const midY = (sy + ey) / 2;
      const dx = ex - sx, dy = ey - sy;
      const dist = Math.sqrt(dx * dx + dy * dy);
      const bulge = dist * 0.3; // 弓の膨らみ
      // 進行方向に対して左側に膨らませる
      const nx = -dy / dist, ny = dx / dist;
      const cpx = midX + nx * bulge;
      const cpy = midY + ny * bulge;

      // 弓形の線
      ctx.beginPath();
      ctx.moveTo(sx, sy);
      ctx.quadraticCurveTo(cpx, cpy, ex, ey);
      ctx.strokeStyle = 'rgba(255,160,40,0.7)';
      ctx.lineWidth = 15;
      ctx.setLineDash([16, 8]);
      ctx.stroke();
      ctx.setLineDash([]);

      // 矢じり
      const t = 0.92;
      const tangentX = 2*(1-t)*(cpx-sx) + 2*t*(ex-cpx);
      const tangentY = 2*(1-t)*(cpy-sy) + 2*t*(ey-cpy);
      const tAngle = Math.atan2(tangentY, tangentX);
      const arrowLen = 40;
      const arrowW = Math.PI / 5;
      ctx.beginPath();
      ctx.moveTo(ex, ey);
      ctx.lineTo(ex - arrowLen * Math.cos(tAngle - arrowW), ey - arrowLen * Math.sin(tAngle - arrowW));
      ctx.lineTo(ex - arrowLen * 0.5 * Math.cos(tAngle), ey - arrowLen * 0.5 * Math.sin(tAngle));
      ctx.lineTo(ex - arrowLen * Math.cos(tAngle + arrowW), ey - arrowLen * Math.sin(tAngle + arrowW));
      ctx.closePath();
      ctx.fillStyle = 'rgba(255,160,40,0.9)';
      ctx.fill();

      // 起点の丸マーカー
      ctx.beginPath();
      ctx.arc(sx, sy, 14, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(255,160,40,0.8)';
      ctx.fill();
    });
  }

  // AI移動経路の描画
  if (_aiMoveTrail && _aiMoveTrail.length > 1) {
    ctx.beginPath();
    ctx.moveTo(_aiMoveTrail[0].x, _aiMoveTrail[0].y);
    for (let i = 1; i < _aiMoveTrail.length; i++) {
      ctx.lineTo(_aiMoveTrail[i].x, _aiMoveTrail[i].y);
    }
    ctx.strokeStyle = 'rgba(255,80,80,0.8)';
    ctx.lineWidth = 3;
    ctx.setLineDash([8, 4]);
    ctx.stroke();
    ctx.setLineDash([]);
    // 起点マーカー
    ctx.beginPath();
    ctx.arc(_aiMoveTrail[0].x, _aiMoveTrail[0].y, 6, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(255,80,80,0.8)';
    ctx.fill();
  }

  // ユニット描画（カスケード方式：右上ずらし、起点を枚数に応じて左下に）
  const unitSize = hexSize * 0.9;
  const cascadeOffX = unitSize * 0.18;  // 右方向ずらし量
  const cascadeOffY = -unitSize * 0.18; // 上方向ずらし量
  const stacks = getStacksByHex();

  Object.keys(stacks).forEach(key => {
    const stack = stacks[key];
    if (stack.length === 0) return;
    const u0 = stack[0];
    // スタック枚数に応じて起点を左下にオフセット（ヘクス内に収まるように）
    const n = stack.filter(u => u.status !== 'eliminated').length;
    const baseOffX = -(n - 1) * cascadeOffX * 0.5;  // 左にずらす
    const baseOffY = (n - 1) * Math.abs(cascadeOffY) * 0.5;  // 下にずらす
    const hexId = toHexId(u0.col, u0.row);
    const hasDummy = getDummyCount(hexId) > 0;
    const isEnemy = G.playerSide !== 'both' && G.playerSide !== 'watch' && u0.side !== G.playerSide;

    // 通常描画
    const drawStack = stack.filter(u => !dragStack.includes(u));
    const drawN = drawStack.length;
    drawStack.forEach((u, i) => {
      if (!u.img) return;
      const ox = i * cascadeOffX;
      const oy = i * cascadeOffY;
      const dx = u.x - unitSize/2 + baseOffX + ox;
      const dy = u.y - unitSize/2 + baseOffY + oy;

      // 影（スタック時のみ、奥行き感を出す）
      if (drawN > 1 && i > 0) {
        ctx.fillStyle = 'rgba(0,0,0,0.3)';
        ctx.fillRect(dx + 2, dy + 2, unitSize, unitSize);
      }

      ctx.drawImage(u.img, dx, dy, unitSize, unitSize);

      // 移動隊形マーカー表示
      if (u.marchMode) {
        ctx.fillStyle = 'rgba(0,128,255,0.7)';
        const mw = unitSize * 0.5, mh = 12;
        ctx.fillRect(dx + unitSize/2 - mw/2, dy + unitSize - mh, mw, mh);
        ctx.fillStyle = '#fff';
        ctx.font = `bold ${mh * 0.7}px sans-serif`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('移動', dx + unitSize/2, dy + unitSize - mh/2);
      }

      // 支援射撃フェイズ: 選択中の砲兵をハイライト
      const isSelectedArtillery = supportState.selectedArtillery.includes(u.name);
      if (isSelectedArtillery) {
        ctx.strokeStyle = '#ff0';
        ctx.lineWidth = 4;
        ctx.strokeRect(dx - 2, dy - 2, unitSize + 4, unitSize + 4);
        // 「選択中」ラベル
        ctx.fillStyle = 'rgba(255,255,0,0.85)';
        const lw = unitSize * 0.7, lh = 14;
        ctx.fillRect(dx + unitSize/2 - lw/2, dy - lh - 2, lw, lh);
        ctx.fillStyle = '#000';
        ctx.font = `bold ${lh * 0.75}px sans-serif`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('選択中', dx + unitSize/2, dy - lh/2 - 2);
      } else {
        ctx.strokeStyle = u.side === 'german' ? '#888' : '#48a';
        ctx.lineWidth = 2;
        ctx.strokeRect(dx, dy, unitSize, unitSize);
      }

      // D/DDマーカー
      if (u.status === 'd' || u.status === 'dd') {
        const mw = unitSize * 0.45;
        const mh = unitSize * 0.28;
        const mx = dx + unitSize/2 - mw/2;
        const my = dy + unitSize - mh;
        ctx.fillStyle = u.status === 'dd' ? 'rgba(200,30,30,0.85)' : 'rgba(200,160,30,0.85)';
        ctx.fillRect(mx, my, mw, mh);
        ctx.strokeStyle = '#000';
        ctx.lineWidth = 1;
        ctx.strokeRect(mx, my, mw, mh);
        ctx.fillStyle = '#fff';
        ctx.font = `bold ${Math.round(mh * 0.7)}px sans-serif`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(u.status.toUpperCase(), mx + mw/2, my + mh/2);
      }
    });

    // 自軍ダミー付き → ダミー枚数バッジ表示
    if (!isEnemy && hasDummy) {
      const topU = drawStack[n - 1] || u0;
      const lastOx = (n > 0 ? (n-1) : 0) * cascadeOffX;
      const lastOy = (n > 0 ? (n-1) : 0) * cascadeOffY;
      const dbx = topU.x + unitSize/2 + lastOx + 4;
      const dby = topU.y + unitSize/2 + lastOy - 4;
      const dbr = 9;
      ctx.beginPath();
      ctx.arc(dbx, dby, dbr, 0, Math.PI * 2);
      ctx.fillStyle = '#556';
      ctx.fill();
      ctx.strokeStyle = '#aaa';
      ctx.lineWidth = 1;
      ctx.stroke();
      ctx.fillStyle = '#fff';
      ctx.font = `bold ${dbr * 1.2}px sans-serif`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('D' + getDummyCount(hexId), dbx, dby);
    }

    // スタック数バッジ（2個以上、通常表示時のみ）
    const stackCountForBadge = drawStack.filter(u => !STACK_EXEMPT_TYPES.includes(u.type)).length;
    if (n >= 2) {
      const topU = drawStack[n - 1];
      if (!topU || topU.x == null) return;
      const bx = topU.x + unitSize/2 + (n-1) * cascadeOffX - 2;
      const by = topU.y - unitSize/2 + (n-1) * cascadeOffY - 2;
      const br = 10;
      const isOver = stackCountForBadge > STACK_LIMIT;
      ctx.beginPath();
      ctx.arc(bx, by, br, 0, Math.PI * 2);
      ctx.fillStyle = isOver ? '#e02020' : '#c8a020';
      ctx.fill();
      ctx.strokeStyle = '#000';
      ctx.lineWidth = 1.5;
      ctx.stroke();
      ctx.fillStyle = isOver ? '#fff' : '#000';
      ctx.font = `bold ${br * 1.3}px sans-serif`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(n, bx, by);
    }

    // スタック超過警告（赤い破線枠）
    if (stackCountForBadge > STACK_LIMIT) {
      const u0s = drawStack[0];
      const topU = drawStack[n - 1];
      const x0 = u0s.x - unitSize/2;
      const y0 = topU.y - unitSize/2 + (n-1) * cascadeOffY;
      const x1 = topU.x + unitSize/2 + (n-1) * cascadeOffX;
      const y1 = u0s.y + unitSize/2;
      const pad = 4;
      ctx.strokeStyle = '#f00';
      ctx.lineWidth = 3;
      ctx.setLineDash([6, 4]);
      ctx.strokeRect(x0 - pad, y0 - pad, x1 - x0 + pad*2, y1 - y0 + pad*2);
      ctx.setLineDash([]);
      ctx.fillStyle = 'rgba(200,0,0,0.85)';
      const lw = 40, lh = 16;
      const lx = (x0 + x1) / 2 - lw/2;
      const ly = y1 + pad + 2;
      ctx.fillRect(lx, ly, lw, lh);
      ctx.fillStyle = '#fff';
      ctx.font = `bold ${lh * 0.75}px sans-serif`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('超過!', lx + lw/2, ly + lh/2);
    }

  });

  // 援軍配置: 入口ヘクスのハイライト
  if (typeof reinforcementState !== 'undefined' && reinforcementState.entryHexes && reinforcementState.entryHexes.length > 0) {
    const undeployed = testUnits.filter(u => u.reinforcement && !u.reinforcement.deployed && u.col < 0);
    if (undeployed.length > 0) {
      reinforcementState.entryHexes.forEach(e => {
        const center = getHexCenter(e.col, e.row);
        ctx.beginPath();
        for (let a = 0; a < 6; a++) {
          const angle = Math.PI / 3 * a;
          const hx = center.x + hexSize * Math.cos(angle);
          const hy = center.y + hexSize * Math.sin(angle);
          if (a === 0) ctx.moveTo(hx, hy); else ctx.lineTo(hx, hy);
        }
        ctx.closePath();
        ctx.fillStyle = 'rgba(200,160,32,0.25)';
        ctx.fill();
        ctx.strokeStyle = '#c8a020';
        ctx.lineWidth = 3;
        ctx.setLineDash([8, 4]);
        ctx.stroke();
        ctx.setLineDash([]);
        // ラベル
        ctx.fillStyle = '#c8a020';
        ctx.font = `bold ${Math.round(hexSize * 0.25)}px sans-serif`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('入口', center.x, center.y - hexSize * 0.6);
      });
    }
  }

  // 射程・視認距離の反転表示（3段階: 射程内=クリア, 視認内=薄暗, 範囲外=濃暗）
  const hasFireRange = typeof fireRangeHexes !== 'undefined' && Object.keys(fireRangeHexes).length > 0;
  const hasFireVision = typeof fireVisionHexes !== 'undefined' && Object.keys(fireVisionHexes).length > 0;
  if (hasFireRange || hasFireVision) {
    for (let r = 0; r < MAP_CONFIG.rows; r++) {
      for (let c = 0; c < MAP_CONFIG.cols; c++) {
        const key = `${c},${r}`;
        const inFire = hasFireRange && fireRangeHexes[key];
        const inVision = hasFireVision && fireVisionHexes[key];
        if (inFire) continue; // 射程内: クリア
        const center = getHexCenter(c, r);
        ctx.beginPath();
        for (let a = 0; a < 6; a++) {
          const angle = Math.PI / 3 * a;
          const hx = center.x + hexSize * Math.cos(angle);
          const hy = center.y + hexSize * Math.sin(angle);
          if (a === 0) ctx.moveTo(hx, hy); else ctx.lineTo(hx, hy);
        }
        ctx.closePath();
        if (inVision) {
          ctx.fillStyle = 'rgba(0,0,0,0.2)';  // 視認内だけど射程外: 薄暗
        } else {
          ctx.fillStyle = 'rgba(0,0,0,0.5)';  // 視認距離外: 濃暗
        }
        ctx.fill();
      }
    }
  }

  // 移動可能ヘクスのハイライト
  if (typeof moveState !== 'undefined' && moveState.movingUnit && Object.keys(moveState.validHexes).length > 0) {
    Object.keys(moveState.validHexes).forEach(key => {
      const [c, r] = key.split(',').map(Number);
      const center = getHexCenter(c, r);
      ctx.beginPath();
      for (let a = 0; a < 6; a++) {
        const angle = Math.PI / 3 * a;
        const hx = center.x + hexSize * Math.cos(angle);
        const hy = center.y + hexSize * Math.sin(angle);
        if (a === 0) ctx.moveTo(hx, hy); else ctx.lineTo(hx, hy);
      }
      ctx.closePath();
      ctx.fillStyle = 'rgba(50,200,50,0.2)';
      ctx.fill();
      ctx.strokeStyle = 'rgba(50,200,50,0.5)';
      ctx.lineWidth = 2;
      ctx.stroke();
    });
    // 移動中ユニットのヘクスをハイライト
    const mu = moveState.movingUnit;
    const muCenter = getHexCenter(mu.col, mu.row);
    ctx.beginPath();
    for (let a = 0; a < 6; a++) {
      const angle = Math.PI / 3 * a;
      const hx = muCenter.x + hexSize * Math.cos(angle);
      const hy = muCenter.y + hexSize * Math.sin(angle);
      if (a === 0) ctx.moveTo(hx, hy); else ctx.lineTo(hx, hy);
    }
    ctx.closePath();
    ctx.fillStyle = 'rgba(50,255,50,0.3)';
    ctx.fill();
    ctx.strokeStyle = '#4f4';
    ctx.lineWidth = 3;
    ctx.stroke();
  }

  // 退却先ハイライト
  if (typeof assaultState !== 'undefined' && assaultState._validRetreats && assaultState._validRetreats.length > 0) {
    assaultState._validRetreats.forEach(key => {
      const [c, r] = key.split(',').map(Number);
      const center = getHexCenter(c, r);
      ctx.beginPath();
      for (let a = 0; a < 6; a++) {
        const angle = Math.PI / 3 * a;
        const hx = center.x + hexSize * Math.cos(angle);
        const hy = center.y + hexSize * Math.sin(angle);
        if (a === 0) ctx.moveTo(hx, hy); else ctx.lineTo(hx, hy);
      }
      ctx.closePath();
      ctx.fillStyle = 'rgba(50,255,50,0.25)';
      ctx.fill();
      ctx.strokeStyle = 'rgba(50,255,50,0.7)';
      ctx.lineWidth = 3;
      ctx.stroke();
    });
  }

  // LOS確認: 始点マーカー（終点選択待ち）
  if (losCheckMode && losCheckStart && !losCheckEnd) {
    const sc = getHexCenter(losCheckStart.col, losCheckStart.row);
    ctx.beginPath();
    ctx.arc(sc.x, sc.y, 6, 0, Math.PI * 2);
    ctx.fillStyle = '#ff0';
    ctx.fill();
  }
  // LOS確認線の描画
  if (losCheckMode && losCheckEnd && losCheckEnd._srcCol !== undefined) {
    const sc = getHexCenter(losCheckEnd._srcCol, losCheckEnd._srcRow);
    const ec = getHexCenter(losCheckEnd.col, losCheckEnd.row);
    ctx.beginPath();
    ctx.moveTo(sc.x, sc.y);
    ctx.lineTo(ec.x, ec.y);
    ctx.strokeStyle = losCheckResult ? '#4f4' : '#f44';
    ctx.lineWidth = 3;
    ctx.stroke();
    // 始点マーカー
    ctx.beginPath();
    ctx.arc(sc.x, sc.y, 6, 0, Math.PI * 2);
    ctx.fillStyle = '#ff0';
    ctx.fill();
    // 終点マーカー
    ctx.beginPath();
    ctx.arc(ec.x, ec.y, 6, 0, Math.PI * 2);
    ctx.fillStyle = losCheckResult ? '#4f4' : '#f44';
    ctx.fill();
  }

  // 移動経路の線と消費移動力表示
  if (typeof moveState !== 'undefined' && moveState.path && moveState.path.length > 1) {
    const path = moveState.path;
    // 経路線
    ctx.beginPath();
    const startCenter = getHexCenter(path[0].col, path[0].row);
    ctx.moveTo(startCenter.x, startCenter.y);
    for (let i = 1; i < path.length; i++) {
      const c = getHexCenter(path[i].col, path[i].row);
      ctx.lineTo(c.x, c.y);
    }
    ctx.strokeStyle = '#0af';
    ctx.lineWidth = 4;
    ctx.setLineDash([]);
    ctx.stroke();
    // 各ヘクスに消費移動力を表示
    let totalCost = 0;
    for (let i = 1; i < path.length; i++) {
      totalCost += (path[i].cost || 1);
      const c = getHexCenter(path[i].col, path[i].row);
      // 背景丸
      ctx.beginPath();
      ctx.arc(c.x, c.y - hexSize * 0.5, 12, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(0,0,0,0.7)';
      ctx.fill();
      // コスト数字
      ctx.fillStyle = '#0af';
      ctx.font = 'bold 14px sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(totalCost, c.x, c.y - hexSize * 0.5);
    }
    // 始点マーカー
    ctx.beginPath();
    ctx.arc(startCenter.x, startCenter.y, 6, 0, Math.PI * 2);
    ctx.fillStyle = '#0af';
    ctx.fill();
  }
  // 完了済みユニットの移動線（薄く表示）
  if (typeof _completedMoveTrails !== 'undefined') {
    _completedMoveTrails.forEach(trail => {
      if (trail.length < 2) return;
      ctx.beginPath();
      const s = getHexCenter(trail[0].col, trail[0].row);
      ctx.moveTo(s.x, s.y);
      for (let i = 1; i < trail.length; i++) {
        const c = getHexCenter(trail[i].col, trail[i].row);
        ctx.lineTo(c.x, c.y);
      }
      ctx.strokeStyle = 'rgba(0,170,255,0.3)';
      ctx.lineWidth = 3;
      ctx.setLineDash([6, 4]);
      ctx.stroke();
      ctx.setLineDash([]);
    });
  }

  // 直接射撃: 選択中ヘクスのハイライト
  if (PHASES[G.phase] && PHASES[G.phase].id === 'moveFire' && typeof directFireState !== 'undefined') {
    // 選択中スタックのヘクスをハイライト
    if (directFireState.selectedHexId) {
      const selPos = fromHexId(directFireState.selectedHexId);
      const selCenter = getHexCenter(selPos.col, selPos.row);
      ctx.beginPath();
      for (let a = 0; a < 6; a++) {
        const angle = Math.PI / 3 * a;
        const hx = selCenter.x + hexSize * Math.cos(angle);
        const hy = selCenter.y + hexSize * Math.sin(angle);
        if (a === 0) ctx.moveTo(hx, hy); else ctx.lineTo(hx, hy);
      }
      ctx.closePath();
      ctx.fillStyle = 'rgba(200,200,50,0.15)';
      ctx.fill();
      ctx.strokeStyle = '#cc0';
      ctx.lineWidth = 3;
      ctx.stroke();
    }
    // 射撃ユニットのヘクスをハイライト
    if (directFireState.shooters.length > 0) {
      directFireState.shooters.forEach(u => {
        if (u.status === 'eliminated') return;
        const center = getHexCenter(u.col, u.row);
        ctx.beginPath();
        for (let a = 0; a < 6; a++) {
          const angle = Math.PI / 3 * a;
          const hx = center.x + hexSize * Math.cos(angle);
          const hy = center.y + hexSize * Math.sin(angle);
          if (a === 0) ctx.moveTo(hx, hy); else ctx.lineTo(hx, hy);
        }
        ctx.closePath();
        ctx.fillStyle = 'rgba(100,200,255,0.2)';
        ctx.fill();
        ctx.strokeStyle = '#4af';
        ctx.lineWidth = 3;
        ctx.stroke();
      });
    }
    // 射撃矢印（太い直線）
    if (fireArrowData && fireArrowData.from && fireArrowData.to) {
      const fPos = fromHexId(fireArrowData.from);
      const tPos = fromHexId(fireArrowData.to);
      const fCenter = getHexCenter(fPos.col, fPos.row);
      const tCenter = getHexCenter(tPos.col, tPos.row);
      const dx = tCenter.x - fCenter.x;
      const dy = tCenter.y - fCenter.y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      const angle = Math.atan2(dy, dx);

      // 陣営ごとの色
      const side = fireArrowData.side || 'german';
      const arrowColor = side === 'german' ? 'rgba(255,160,40,0.85)' : 'rgba(60,160,255,0.85)';
      const arrowColorSolid = side === 'german' ? 'rgba(255,160,40,0.95)' : 'rgba(60,160,255,0.95)';

      // 太い矢印ライン
      ctx.beginPath();
      ctx.moveTo(fCenter.x, fCenter.y);
      ctx.lineTo(tCenter.x, tCenter.y);
      ctx.strokeStyle = arrowColor;
      ctx.lineWidth = 18;
      ctx.stroke();

      // 矢じり（大きく）
      const arrowLen = 50;
      const arrowW = Math.PI / 4.5;
      ctx.beginPath();
      ctx.moveTo(tCenter.x, tCenter.y);
      ctx.lineTo(tCenter.x - arrowLen * Math.cos(angle - arrowW), tCenter.y - arrowLen * Math.sin(angle - arrowW));
      ctx.lineTo(tCenter.x - arrowLen * 0.35 * Math.cos(angle), tCenter.y - arrowLen * 0.35 * Math.sin(angle));
      ctx.lineTo(tCenter.x - arrowLen * Math.cos(angle + arrowW), tCenter.y - arrowLen * Math.sin(angle + arrowW));
      ctx.closePath();
      ctx.fillStyle = arrowColorSolid;
      ctx.fill();

      // 起点マーカー（大きく）
      ctx.beginPath();
      ctx.arc(fCenter.x, fCenter.y, 20, 0, Math.PI * 2);
      ctx.fillStyle = arrowColor;
      ctx.fill();
      ctx.strokeStyle = '#fff';
      ctx.lineWidth = 2;
      ctx.stroke();
    }
  }

  // ドラッグ中スタック（浮いた状態で描画）
  if (dragUnit && dragStack.length > 0) {
    // ドロップ先ヘクスのハイライト
    const nearest = getNearestHex(dragMapX, dragMapY);
    const snapCenter = getHexCenter(nearest.col, nearest.row);
    ctx.beginPath();
    for (let a = 0; a < 6; a++) {
      const angle = Math.PI / 3 * a;
      const hx = snapCenter.x + hexSize * Math.cos(angle);
      const hy = snapCenter.y + hexSize * Math.sin(angle);
      if (a === 0) ctx.moveTo(hx, hy); else ctx.lineTo(hx, hy);
    }
    ctx.closePath();
    ctx.fillStyle = 'rgba(200,200,50,0.25)';
    ctx.fill();
    ctx.strokeStyle = '#ff0';
    ctx.lineWidth = 2;
    ctx.stroke();

    // スタック全体を描画
    const dSize = unitSize;
    dragStack.forEach((u, i) => {
      if (!u.img) return;
      const ox = i * cascadeOffX;
      const oy = i * cascadeOffY;
      const dx = dragMapX - dSize/2 + ox;
      const dy = dragMapY - dSize/2 + oy;
      if (i > 0) {
        ctx.fillStyle = 'rgba(0,0,0,0.3)';
        ctx.fillRect(dx + 2, dy + 2, dSize, dSize);
      }
      ctx.globalAlpha = 0.8;
      ctx.drawImage(u.img, dx, dy, dSize, dSize);
      ctx.globalAlpha = 1.0;
      ctx.strokeStyle = '#ff0';
      ctx.lineWidth = 2;
      ctx.strokeRect(dx, dy, dSize, dSize);
    });
  }

  // 移動軌跡を描画
  if (window._aiMoveTrails && window._aiMoveTrails.length > 0) {
    window._aiMoveTrails.forEach(t => {
      if (t.trail.length < 2) return;
      ctx.beginPath();
      ctx.strokeStyle = t.side === 'german' ? 'rgba(255,120,50,0.7)' : 'rgba(80,160,255,0.7)';
      ctx.lineWidth = 3;
      ctx.setLineDash([6, 4]);
      const start = getHexCenter(t.trail[0].col, t.trail[0].row);
      ctx.moveTo(start.x, start.y);
      for (let i = 1; i < t.trail.length; i++) {
        const p = getHexCenter(t.trail[i].col, t.trail[i].row);
        ctx.lineTo(p.x, p.y);
      }
      ctx.stroke();
      ctx.setLineDash([]);
    });
  }

  ctx.restore();
}

function initMap() {
  const area = document.getElementById('mapArea');
  canvas.width = area.clientWidth;
  canvas.height = area.clientHeight;
  ctx.fillStyle = '#3a3a2a';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = '#666';
  ctx.font = '16px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('地図読込中…', canvas.width/2, canvas.height/2);

  if (SCENARIO.mapImages && SCENARIO.mapImages.length > 1) {
    // 複数マップ画像を連結（描画時に順番に描く）
    const imgs = SCENARIO.mapImages.map(src => {
      const im = new Image(); im.src = src; return im;
    });
    let loaded = 0;
    imgs.forEach(im => {
      im.onload = () => {
        if (++loaded === imgs.length) {
          const rot = SCENARIO.mapImageRotate || 0;
          let totalW, totalH;
          if (rot === 90 || rot === 270) {
            // 回転後は幅と高さが入れ替わる → 横連結
            totalW = imgs.reduce((s, i) => s + i.height, 0);
            totalH = Math.max(...imgs.map(i => i.width));
          } else if (rot === 180) {
            // 180度回転 → 縦連結
            totalH = imgs.reduce((s, i) => s + i.height, 0);
            totalW = Math.max(...imgs.map(i => i.width));
          } else {
            totalH = imgs.reduce((s, i) => s + i.height, 0);
            totalW = Math.max(...imgs.map(i => i.width));
          }
          const offsets = SCENARIO.mapImageOffsets || [];
          offsets.forEach(o => {
            if (o.x) totalW += Math.abs(o.x);
            if (o.y) totalH += Math.abs(o.y);
          });
          mapState.imgs = imgs;
          mapState.img = { width: totalW, height: totalH };
          zoomFit();
        }
      };
    });
  } else if (SCENARIO.mapImages && SCENARIO.mapImages.length === 1 && SCENARIO.mapImageRotate) {
    // 1枚マップ画像 + 回転あり → imgsパスで処理
    const im = new Image();
    im.src = SCENARIO.mapImages[0];
    im.onload = () => {
      const rot = SCENARIO.mapImageRotate || 0;
      let totalW = im.width, totalH = im.height;
      if (rot === 90 || rot === 270) { totalW = im.height; totalH = im.width; }
      mapState.imgs = [im];
      mapState.img = { width: totalW, height: totalH };
      zoomFit();
    };
  } else {
    const img = new Image();
    img.onload = () => { mapState.img = img; zoomFit(); };
    img.src = (SCENARIO.mapImages && SCENARIO.mapImages.length === 1) ? SCENARIO.mapImages[0] : 'map/m' + SCENARIO.map + '.jpg';
  }

  loadUnitImages();

  // ドラッグ移動 + クリック検出
  let dragStartX = 0, dragStartY = 0, dragMoved = false;
  // 右クリックメニュー無効化（吹き出し表示に使用）
  area.addEventListener('contextmenu', (e) => { e.preventDefault(); });
  area.addEventListener('mousedown', (e) => {
    const rect = canvas.getBoundingClientRect();
    const mx = (e.clientX - rect.left - mapState.x) / mapState.zoom;
    const my = (e.clientY - rect.top - mapState.y) / mapState.zoom;

    // ユニットのヒットテスト
    const hitU = hitTestUnit(mx, my);
    if (hitU) {
      // スタック解除モードなら個別、通常ならスタック単位
      if (stackSplitMode) {
        dragUnit = hitU;
        dragStack = [hitU];
      } else {
        dragUnit = hitU;
        const hexId = hitU.hexId || toHexId(hitU.col, hitU.row);
        dragStack = testUnits.filter(u =>
          (u.hexId || toHexId(u.col, u.row)) === hexId && u.status !== 'eliminated'
        );
      }
      dragOffX = mx - hitU.x;
      dragOffY = my - hitU.y;
      dragMapX = hitU.x;
      dragMapY = hitU.y;
      dragMoved = false;
      dragStartX = e.clientX;
      dragStartY = e.clientY;
      canvas.style.cursor = 'move';
      closeStackPopup();
      return;
    }

    // マップドラッグ移動
    mapState.dragging = true;
    dragMoved = false;
    dragStartX = e.clientX;
    dragStartY = e.clientY;
    mapState.dragX = e.clientX - mapState.x;
    mapState.dragY = e.clientY - mapState.y;
    canvas.style.cursor = 'grabbing';
  });
  area.addEventListener('mousemove', (e) => {
    // カーソル位置のヘクスID表示
    const rectM = canvas.getBoundingClientRect();
    const hmx = (e.clientX - rectM.left - mapState.x) / mapState.zoom;
    const hmy = (e.clientY - rectM.top - mapState.y) / mapState.zoom;
    const hoverHex = getNearestHex(hmx, hmy);
    const hoverHexId = toHexId(hoverHex.col, hoverHex.row);
    const terrain = getHexTerrain(hoverHexId);
    const tNames = {p:'平地',w:'林',f:'森林',r:'荒地',t:'町',c:'市街地',lake:'湖'};
    document.getElementById('hexCursor').textContent = `${hoverHexId} (${tNames[terrain]||terrain})`;

    // ユニットドラッグ中
    if (dragUnit) {
      const rect = canvas.getBoundingClientRect();
      const mx = (e.clientX - rect.left - mapState.x) / mapState.zoom;
      const my = (e.clientY - rect.top - mapState.y) / mapState.zoom;
      dragMapX = mx - dragOffX;
      dragMapY = my - dragOffY;
      const dx = e.clientX - dragStartX;
      const dy = e.clientY - dragStartY;
      if (Math.abs(dx) > 4 || Math.abs(dy) > 4) dragMoved = true;
      drawMap();
      return;
    }
    // マップドラッグ移動
    if (!mapState.dragging) return;
    const dx = e.clientX - dragStartX;
    const dy = e.clientY - dragStartY;
    if (Math.abs(dx) > 4 || Math.abs(dy) > 4) dragMoved = true;
    mapState.x = e.clientX - mapState.dragX;
    mapState.y = e.clientY - mapState.dragY;
    clampMap();
    drawMap();
  });
  area.addEventListener('mouseup', (e) => {
    // ユニットドロップ
    if (dragUnit) {
      if (dragMoved) {
        // 最近傍ヘクスにスナップ（スタック全体）
        const nearest = getNearestHex(dragMapX, dragMapY);
        const center = getHexCenter(nearest.col, nearest.row);
        const newHexId = toHexId(nearest.col, nearest.row);
        dragStack.forEach(u => {
          u.col = nearest.col;
          u.row = nearest.row;
          u.x = center.x;
          u.y = center.y;
          u.hexId = newHexId;
        });
      }
      dragUnit = null;
      dragStack = [];
      canvas.style.cursor = 'grab';
      drawMap();
      if (!dragMoved) onMapClick(e);
      return;
    }
    mapState.dragging = false;
    canvas.style.cursor = 'grab';
    if (!dragMoved) onMapClick(e);
  });
  area.addEventListener('mouseleave', () => {
    if (dragUnit) { dragUnit = null; drawMap(); }
    mapState.dragging = false;
    canvas.style.cursor = 'grab';
  });

  // ホイール → 無効化（ドラッグのみで移動）
  area.addEventListener('wheel', (e) => {
    e.preventDefault();
  }, { passive: false });

  // ズームスライダー
  const zoomSlider = document.getElementById('zoomSlider');
  const zoomLabel = document.getElementById('zoomLabel');
  zoomSlider.addEventListener('input', () => {
    const area = document.getElementById('mapArea');
    const cx = area.clientWidth / 2;
    const cy = area.clientHeight / 2;
    const oldZoom = mapState.zoom;
    mapState.zoom = parseFloat(zoomSlider.value) / 100;
    mapState.x = cx - (cx - mapState.x) * (mapState.zoom / oldZoom);
    mapState.y = cy - (cy - mapState.y) * (mapState.zoom / oldZoom);
    zoomLabel.textContent = zoomSlider.value + '%';
    drawMap();
  });
}

// ===== ヘクスクリック → 吹き出し =====
function onMapClick(e) {
  const rect = canvas.getBoundingClientRect();
  // クリック座標 → マップ座標に変換
  const mx = (e.clientX - rect.left - mapState.x) / mapState.zoom;
  const my = (e.clientY - rect.top - mapState.y) / mapState.zoom;

  // 突撃フェイズ中のマップクリック
  if (PHASES[G.phase] && PHASES[G.phase].id === 'assault') {
    if (e.altKey || e.button === 2) {
      // 吹き出し表示へフォールスルー
    } else {
      const nearest = getNearestHex(mx, my);
      if (nearest.col >= 0 && nearest.col < MAP_CONFIG.cols && nearest.row >= 0 && nearest.row < MAP_CONFIG.rows) {
        onAssaultMapClick(nearest.col, nearest.row, e.metaKey || e.ctrlKey);
      }
      return;
    }
  }

  // 移動・射撃フェイズ中のマップクリック（援軍配置含む）
  if (PHASES[G.phase] && PHASES[G.phase].id === 'moveFire') {
    // 右クリックまたはAlt+クリックでスタック吹き出し表示
    if (e.altKey || e.button === 2) {
      // 吹き出し表示へ（下のコードにフォールスルー）
    } else {
      const nearest = getNearestHex(mx, my);
      if (nearest.col >= 0 && nearest.col < MAP_CONFIG.cols && nearest.row >= 0 && nearest.row < MAP_CONFIG.rows) {
        // 援軍配置モード
        if (typeof reinforcementState !== 'undefined' && reinforcementState.selectedUnit) {
          placeReinforcement(nearest.col, nearest.row);
          return;
        }
        onMoveFireMapClick(nearest.col, nearest.row, e.metaKey || e.ctrlKey);
      }
      return;
    }
  }

  // 支援射撃フェイズ中のマップクリック
  if (PHASES[G.phase].id === 'supportAtk' || PHASES[G.phase].id === 'supportDef') {
    const hitU = hitTestUnit(mx, my);
    // 味方砲兵ユニットをクリック → 選択/解除（敵砲兵は目標として扱う）
    const firingSide = supportState._firingSide || G.initiative;
    if (hitU && hitU.type === 'A' && hitU.side === firingSide && hitU.status !== 'eliminated' && !hitU.firedThisTurn) {
      // 同ヘクスの全砲兵を選択
      const hitHexId = hitU.hexId || toHexId(hitU.col, hitU.row);
      const hexArtillery = testUnits.filter(u =>
        u.type === 'A' && u.side === firingSide && u.status !== 'eliminated' && !u.firedThisTurn &&
        (u.hexId || toHexId(u.col, u.row)) === hitHexId
      );
      hexArtillery.forEach(u => {
        if (!supportState.selectedArtillery.includes(u.name)) {
          toggleArtillerySelect(u.name);
        }
      });
      return;
    }
    // 目標選択モード中 → ヘクス選択
    if (supportState.targetMode) {
      const nearest = getNearestHex(mx, my);
      if (nearest.col >= 0 && nearest.col < MAP_CONFIG.cols && nearest.row >= 0 && nearest.row < MAP_CONFIG.rows) {
        if (onSupportMapClick(nearest.col, nearest.row)) return;
      }
    }
  }

  // LOS確認モード: Command+クリックで始点→終点
  if (losCheckMode && (e.metaKey || e.ctrlKey)) {
    const nearest = getNearestHex(mx, my);
    if (nearest.col >= 0 && nearest.col < MAP_CONFIG.cols && nearest.row >= 0 && nearest.row < MAP_CONFIG.rows) {
      onLOSCheckClick(nearest.col, nearest.row);
    }
    return;
  }

  // 視認モード: ユニットクリックで視認範囲表示
  if (losMode) {
    const hitU = hitTestUnit(mx, my);
    if (hitU) {
      selectLOSUnit(hitU);
      return;
    }
    // ユニット外クリック → 視認リセット
    losSourceUnit = null;
    losVisibleHexes = {};
    const info = document.getElementById('losInfo');
    info.textContent = '← ユニットをクリックして視認範囲を表示';
    drawMap();
    return;
  }

  // 通常モード: スタック吹き出し
  let bestKey = null, bestDist = Infinity;
  const stacks = getStacksByHex();
  for (const key of Object.keys(stacks)) {
    const u0 = stacks[key][0];
    const dx = mx - u0.x;
    const dy = my - u0.y;
    const dist = dx * dx + dy * dy;
    if (dist < bestDist) { bestDist = dist; bestKey = key; }
  }

  const hexSize = MAP_CONFIG.hexSize;
  if (!bestKey || bestDist > hexSize * hexSize * 2) {
    closeStackPopup();
    return;
  }

  showStackPopup(stacks[bestKey], e.clientX, e.clientY);
}

function showStackPopup(stack, screenX, screenY) {
  const popup = document.getElementById('stackPopup');
  const content = document.getElementById('stackPopupContent');
  const n = stack.length;

  const u0 = stack[0];
  const hexId = toHexId(u0.col, u0.row);

  const stackCountReal = stack.filter(u => !STACK_EXEMPT_TYPES.includes(u.type)).length;
  const isOver = stackCountReal > STACK_LIMIT;
  let html = `<div class="popup-title" ${isOver ? 'style="color:#f44;border-bottom-color:#f44;"' : ''}>スタック (${n}個)${isOver ? ' ⚠ 超過!' : ''}</div>`;
  if (isOver) {
    html += `<div style="color:#f88;font-size:0.75em;padding:2px 0 4px;border-bottom:1px solid #444;margin-bottom:4px;">上限${STACK_LIMIT}個 — 全ユニットDD</div>`;
  }
  const ABILITY_LABELS = { F:'射撃', A:'突撃', M:'回復', R:'指揮範囲' };
  stack.forEach(u => {
    const statusLabel = u.status === 'ok' ? '正常' : u.status === 'eliminated' ? '除去' : u.status.toUpperCase();
    const statusCls = u.status;
    const imgSrc = u.src || '';
    const name = u.name || u.src.split('/').pop().replace(/\.[^.]+$/, '');
    html += `<div class="popup-unit">
      <img src="${imgSrc}" alt="${name}">
      <div class="pu-info">
        <div class="pu-name">${name}</div>
        <span class="pu-status ${statusCls}">${statusLabel}</span>`;
    // 指揮官の能力表示（固定）
    if (u.type === 'leader' && u.abilities && u.status !== 'eliminated') {
      html += `<div style="margin-top:3px;">`;
      u.abilities.forEach(ab => {
        html += `<span style="display:inline-block;background:#c8a020;color:#000;font-weight:bold;padding:1px 5px;border-radius:2px;font-size:0.75em;margin:1px;">${ab}(${ABILITY_LABELS[ab]})</span>`;
      });
      html += `</div>`;
    }
    html += `</div></div>`;
  });
  content.innerHTML = html;
  popup.style.display = 'block';

  // 位置決め（クリック位置の左側に表示）
  const pw = popup.offsetWidth;
  const ph = popup.offsetHeight;
  let px = screenX - pw - 20;
  let py = screenY - ph / 2;
  if (px < 4) { px = screenX + 20; } // 左に収まらなければ右に
  if (py < 4) py = 4;
  if (py + ph > window.innerHeight - 4) py = window.innerHeight - ph - 4;
  popup.style.left = px + 'px';
  popup.style.top = py + 'px';

  // 矢印非表示（左側表示のため）
  const arrow = popup.querySelector('.popup-arrow');
  arrow.style.display = 'none';
  // 下表示時は矢印を上に
  if (py > screenY) {
    arrow.style.bottom = '';
    arrow.style.top = '-8px';
    arrow.style.borderTop = 'none';
    arrow.style.borderBottom = '8px solid #c8a020';
  } else {
    arrow.style.top = '';
    arrow.style.bottom = '-8px';
    arrow.style.borderBottom = 'none';
    arrow.style.borderTop = '8px solid #c8a020';
  }
}

function closeStackPopup() {
  document.getElementById('stackPopup').style.display = 'none';
}

// 吹き出し外クリックで閉じる
document.addEventListener('mousedown', (e) => {
  const popup = document.getElementById('stackPopup');
  if (popup.style.display === 'block' && !popup.contains(e.target)) {
    closeStackPopup();
  }
});

function clampMap() {
  if (!mapState.img) return;
  const area = document.getElementById('mapArea');
  const pad = MAP_CONFIG.hexSize * 4; // 余白分
  const w = (mapState.img.width + pad * 2) * mapState.zoom;
  const h = (mapState.img.height + pad * 2) * mapState.zoom;
  const padZ = pad * mapState.zoom;
  if (w > area.clientWidth) {
    mapState.x = Math.min(padZ, Math.max(area.clientWidth - w + padZ, mapState.x));
  } else {
    mapState.x = (area.clientWidth - w) / 2 + padZ;
  }
  if (h > area.clientHeight) {
    mapState.y = Math.min(padZ, Math.max(area.clientHeight - h + padZ, mapState.y));
  } else {
    mapState.y = (area.clientHeight - h) / 2 + padZ;
  }
}

function updateZoomSlider() {
  const slider = document.getElementById('zoomSlider');
  const label = document.getElementById('zoomLabel');
  const pct = Math.round(mapState.zoom * 100);
  slider.value = Math.max(10, Math.min(300, pct));
  label.textContent = pct + '%';
}

function zoomFit() {
  if (!mapState.img) return;
  const area = document.getElementById('mapArea');
  // 高さにフィット
  mapState.zoom = area.clientHeight / mapState.img.height;
  mapState.x = 0;
  mapState.y = 0;
  canvas.dataset.loaded = '1';
  updateZoomSlider();
  drawMap();
}

function zoomStep(delta) {
  const area = document.getElementById('mapArea');
  const cx = area.clientWidth / 2;
  const cy = area.clientHeight / 2;
  const oldZoom = mapState.zoom;
  mapState.zoom = Math.max(0.1, Math.min(3, mapState.zoom + delta / 100));
  mapState.x = cx - (cx - mapState.x) * (mapState.zoom / oldZoom);
  mapState.y = cy - (cy - mapState.y) * (mapState.zoom / oldZoom);
  updateZoomSlider();
  drawMap();
}

      <div class="top-btn" style="padding:16px 24px;min-width:150px;text-align:center;cursor:pointer;" onclick="selectTitleMode('pvp')">
        <div style="color:#c8a020;font-weight:bold;">人間 vs 人間</div>
      </div>
      <div class="top-btn" style="padding:16px 24px;min-width:150px;text-align:center;cursor:pointer;" onclick="selectTitleMode('aivai')">
        <div style="color:#c8a020;font-weight:bold;">AI vs AI</div>
      </div>
    </div>
    <div id="titleSideSelect" style="margin:16px 0;"></div>

      <div style="color:#aaa;font-size:0.85em;font-weight:bold;">勝利条件</div>
      ${SCENARIO.victory.german ? '<div style="color:#8a8;font-size:0.8em;padding:2px 0;">● ' + SCENARIO.victory.german + '</div>' : ''}
      ${SCENARIO.victory.allied ? '<div style="color:#8a8;font-size:0.8em;padding:2px 0;">● ' + SCENARIO.victory.allied + '</div>' : ''}
      ${SCENARIO.victory.draw ? '<div style="color:#8a8;font-size:0.8em;padding:2px 0;">● ' + SCENARIO.victory.draw + '</div>' : ''}
    </div>

    <div style="text-align:center;margin:20px 0;">
      <button id="titleStartBtn" style="background:#c8a020;color:#000;border:none;padding:14px 48px;border-radius:6px;font-size:1.2em;font-weight:bold;cursor:pointer;letter-spacing:0.1em;" disabled onclick="startGameFromTitle()">ゲーム開始</button>

function selectTitleMode(mode) {
  _titleSelectedMode = mode;
  _titleSelectedSide = null;
  // ボタンハイライト
  document.querySelectorAll('#titleModeSelect .top-btn').forEach(b => {
    b.style.background = '#445';
    b.style.borderColor = '#667';
  });
  event.currentTarget.style.background = '#665522';
  event.currentTarget.style.borderColor = '#c8a020';

  const sideEl = document.getElementById('titleSideSelect');
  if (mode === 'pvai') {
    sideEl.innerHTML = `
      <h4 style="color:#aaa;margin-bottom:8px;">操作する陣営</h4>
      <div style="display:flex;gap:12px;justify-content:center;">
        <div class="top-btn" style="padding:16px 24px;min-width:150px;text-align:center;cursor:pointer;" onclick="selectTitleSide('german')">
          <div style="color:#fa8;font-weight:bold;">ドイツ軍</div>
        </div>
        <div class="top-btn" style="padding:16px 24px;min-width:150px;text-align:center;cursor:pointer;" onclick="selectTitleSide('allied')">
          <div style="color:#8cf;font-weight:bold;">連合軍</div>
        </div>
      </div>`;
    document.getElementById('titleStartBtn').disabled = true;
  } else {
    sideEl.innerHTML = '';
    _titleSelectedSide = mode === 'pvp' ? 'both' : 'watch';
    document.getElementById('titleStartBtn').disabled = false;
  }
}

function selectTitleSide(side) {
  _titleSelectedSide = side;
  document.querySelectorAll('#titleSideSelect .top-btn').forEach(b => {
    b.style.background = '#445';
    b.style.borderColor = '#667';
  });
  event.currentTarget.style.background = '#665522';
  event.currentTarget.style.borderColor = '#c8a020';
  document.getElementById('titleStartBtn').disabled = false;
}

// AI配置完了オーバーレイ
let _aiPlacementCallback = null;
function showAIPlacementOverlay(text, callback) {
  document.getElementById('aiPlacementInfo').textContent = text;
  const overlay = document.getElementById('aiPlacementOverlay');
  overlay.style.display = 'flex';
  _aiPlacementCallback = callback;
}
function closeAIPlacementOverlay() {
  document.getElementById('aiPlacementOverlay').style.display = 'none';
  if (_aiPlacementCallback) { _aiPlacementCallback(); _aiPlacementCallback = null; }
}

function startGameFromTitle() {
  if (!_titleSelectedMode || !_titleSelectedSide) return;
  G.playerSide = _titleSelectedSide;
  G.gameMode = _titleSelectedMode;
  document.getElementById('titleOverlay').style.display = 'none';
  initGame();
}

// ===== ゲーム初期化 =====
function initGame() {
  initOffBoardArtillery();
  initAirSupport(SCENARIO);

  // 連合軍AI配置（人間vsAIでドイツ操作、またはAI同士）
  // シナリオ3は初期配置済みなのでスキップ
  let aiPlacementText = '';
  if (((G.gameMode === 'pvai' && G.playerSide === 'german') || G.gameMode === 'aivai') && SCENARIO.id !== 3) {
    addLog('init', '連合軍AI: 配置決定中...');
    const chosen = runAIPlacement();
    applyAIPlacement(chosen);
    aiPlacementText = '連合軍AI配置完了';
  }

  // ドイツAI（人間vsAIで連合軍操作、またはAI同士）
  if ((G.gameMode === 'pvai' && G.playerSide === 'allied') || G.gameMode === 'aivai') {
    if (AI_RUN_SIMULATION.germanRoute) {
      addLog('init', 'ドイツ軍AI: ルート計算中...');
      runGermanAI();
    } else {
      addLog('init', 'ドイツ軍AI: デフォルトルート使用');
      window._aiGermanRoute = { targetRow: 5, routeKey: 'r5_default' };
    }
  }

  assignAmbushTargets();  // 全スタックの行き先を先に決定
  // 援軍は移動フェイズ開始時に配置（ここでは配置しない）
  addLog('turn', `===== ターン ${G.turn} 開始 =====`);
  addLog('init', `シナリオ${SCENARIO.id}: ${SCENARIO.name} (${SCENARIO.date})`);
  updatePhaseBar();
  initMap();

  // マップ読み込み完了後の処理
  const afterMapLoaded = () => {
    drawMap();
    if (aiPlacementText) {
      showAIPlacementOverlay(aiPlacementText, () => {
        startGamePhases();
      });
    } else {
      startGamePhases();
    }
  };

  const waitMap = setInterval(() => {
    if (canvas.dataset.loaded) {
      clearInterval(waitMap);
      afterMapLoaded();
    }
  }, 100);
}

function startGamePhases() {
  if (G.gameMode === 'aivai') {
    addLog('init', 'AI同士の対戦を開始します...');
    renderPhase();
    setTimeout(() => runAIvAILoop(), 2000);
  } else {
    renderPhase();
  }
}

window.onload = function() {
  // URLパラメータにmodeがあればタイトルをスキップして直接開始
  const _urlMode = _urlParams.get('mode');
  if (_urlMode) {
    G.gameMode = _urlMode;
    G.playerSide = _playerSide;
    document.getElementById('titleOverlay').style.display = 'none';
    initGame();
  } else {
    showTitle();
  }
  // マップを裏で先読み
  if (SCENARIO.mapImages) {
    SCENARIO.mapImages.forEach(src => { const p = new Image(); p.src = src; });
  } else {
    const preImg = new Image();
    preImg.src = 'map/m' + SCENARIO.map + '.jpg';
  }
};
window.onresize = () => {
  if (canvas.dataset.loaded) drawMap();
};
