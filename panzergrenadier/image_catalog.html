<style>
body { background:#222; color:#ddd; font-family:sans-serif; padding:20px; }
h1 { color:#c8a020; }
h2 { color:#8cf; border-bottom:1px solid #555; padding-bottom:4px; margin-top:30px; }
.info { color:#aaa; font-size:0.9em; margin:8px 0; }
.selected-info { color:#ff0; font-size:1.1em; font-weight:bold; margin:8px 0; min-height:1.5em; }

/* ユニット枠 */
.unit-grid { display:flex; flex-wrap:wrap; gap:6px; margin:8px 0; }
.unit-slot {
  background:#333; border:2px solid #555; border-radius:4px; padding:4px;
  width:130px; text-align:center; cursor:pointer; transition:border-color 0.2s;
}
.unit-slot:hover { border-color:#888; }
.unit-slot.selected { border-color:#ff0; box-shadow:0 0 10px rgba(255,255,0,0.4); }
.unit-slot img { width:90px; height:90px; object-fit:contain; display:block; margin:0 auto; }
.unit-slot .slot-name { font-size:0.75em; color:#c8a020; font-weight:bold; margin-bottom:2px; min-height:2em; }
.unit-slot .slot-file { font-size:0.55em; color:#888; word-break:break-all; min-height:1.5em; }
.unit-slot.empty img { opacity:0.3; }
.unit-slot.matched { border-color:#4a4; }

/* 未割当画像 */
.pool { display:flex; flex-wrap:wrap; gap:4px; margin:8px 0; padding:10px; background:#1a1a1a; border:1px solid #444; border-radius:4px; }
.pool-img {
  width:80px; height:80px; object-fit:contain; border:2px solid #555; border-radius:3px;
  cursor:pointer; transition:border-color 0.2s;
}
.pool-img:hover { border-color:#888; }
.pool-img.selected { border-color:#ff0; box-shadow:0 0 8px rgba(255,255,0,0.4); }
.pool-img.used { opacity:0.3; border-color:#333; }

/* ボタン */
.btn { background:#c8a020; color:#000; border:none; padding:8px 20px; border-radius:4px; font-weight:bold; cursor:pointer; font-size:1em; margin:4px; }
.btn:hover { background:#dab030; }
.btn-sub { background:#556; color:#ddd; border:none; padding:6px 14px; border-radius:3px; cursor:pointer; font-size:0.9em; margin:4px; }
.btn-sub:hover { background:#778; }
</style>
</head>

<div class="info">
  ユニット枠の画像をクリック → 別のユニット枠またはプール画像をクリック → 入れ替え<br>
  全部合ったら「対応表を保存」で JSON を出力

<div class="selected-info" id="selectInfo"></div>

  <button class="btn" onclick="exportMapping()">対応表を保存（JSON）</button>
  <button class="btn-sub" onclick="autoMatchByName()">ファイル名から自動マッチ</button>
  <button class="btn-sub" onclick="clearAll()">全リセット</button>
</div>

// マッピング状態: { "国名/ユニット名": "filename" }
let mapping = {};
let selected = null; // { type:'slot', key:'...' } or { type:'pool', file:'...' }

function getSlotKey(nation, unit) { return `${nation}/${unit.name}`; }

function init() {
  // ローカルストレージから復元
  const saved = localStorage.getItem('pg_image_mapping');
  if (saved) { try { mapping = JSON.parse(saved); } catch(e){} }

  render();
}

function render() {
  const content = document.getElementById('content');
  content.innerHTML = '';

  const usedFiles = new Set(Object.values(mapping));

  for (const [nation, units] of Object.entries(UNIT_LIST)) {
    const h = document.createElement('h2');
    h.textContent = nation;
    content.appendChild(h);

    const grid = document.createElement('div');
    grid.className = 'unit-grid';

    units.forEach(u => {
      const key = getSlotKey(nation, u);
      const file = mapping[key] || '';
      const slot = document.createElement('div');
      const isSel = selected && selected.type === 'slot' && selected.key === key;
      slot.className = 'unit-slot' + (isSel ? ' selected' : '') + (file ? ' matched' : ' empty');
      slot.innerHTML = `
        <div class="slot-name">${u.name} (${u.type}) x${u.count}</div>
        <img src="${file ? 'images/' + file : ''}" alt="${file || '未設定'}" onerror="this.style.opacity=0.1">
        <div class="slot-file">${file || '---'}</div>
      `;
      slot.onclick = () => onSlotClick(key);
      grid.appendChild(slot);
    });

    content.appendChild(grid);
  }

  // プール
  const pool = document.getElementById('pool');
  pool.innerHTML = '';
  ALL_IMAGES.forEach(f => {
    const used = usedFiles.has(f);
    const isSel = selected && selected.type === 'pool' && selected.file === f;
    const img = document.createElement('img');
    img.src = 'images/' + f;
    img.className = 'pool-img' + (isSel ? ' selected' : '') + (used ? ' used' : '');
    img.title = f;
    img.onclick = () => onPoolClick(f);
    pool.appendChild(img);
  });

  // 選択状態表示
  const info = document.getElementById('selectInfo');
  if (selected) {
    if (selected.type === 'slot') info.textContent = '選択中: ' + selected.key + ' → 入れ替え先をクリック';
    else info.textContent = '選択中: ' + selected.file + ' → 割当先のユニット枠をクリック';
  } else {
    info.textContent = '';
  }

  // 自動保存
  localStorage.setItem('pg_image_mapping', JSON.stringify(mapping));
}

function onSlotClick(key) {
  if (!selected) {
    // 1回目: この枠を選択
    selected = { type:'slot', key };
  } else if (selected.type === 'slot') {
    if (selected.key === key) {
      // 同じ枠 → 選択解除
      selected = null;
    } else {
      // 枠同士 → 画像を入れ替え
      const f1 = mapping[selected.key] || '';
      const f2 = mapping[key] || '';
      if (f1) mapping[key] = f1; else delete mapping[key];
      if (f2) mapping[selected.key] = f2; else delete mapping[selected.key];
      selected = null;
    }
  } else if (selected.type === 'pool') {
    // プール画像 → この枠に割当
    const oldFile = mapping[key];
    mapping[key] = selected.file;
    selected = null;
  }
  render();
}

function onPoolClick(file) {
  if (!selected) {
    selected = { type:'pool', file };
  } else if (selected.type === 'pool') {
    if (selected.file === file) { selected = null; } else { selected = { type:'pool', file }; }
  } else if (selected.type === 'slot') {
    // 枠が選択されてる → この画像を割当
    mapping[selected.key] = file;
    selected = null;
  }
  render();
}

    'uk_40aag.jpg':'イギリス軍/40 AAG', 'uk_76mort.jpg':'イギリス軍/76Mortar',
    'uk_leader_b.jpg':'イギリス軍/Leader B', 'uk_leader_c.jpg':'イギリス軍/Leader C',
    'ip.jpg':'マーカー/I.P.',
  };
  for (const [file, key] of Object.entries(nameMap)) {
    if (!mapping[key]) mapping[key] = file;
  }
  selected = null;
  render();
  alert('ファイル名から推測できる分を自動マッチしました。残りは手動で対応付けてください。');
}

function clearAll() {
  if (!confirm('全マッチングをリセットしますか？')) return;
  mapping = {};
  selected = null;
  localStorage.removeItem('pg_image_mapping');
  render();
}

function exportMapping() {
  const json = JSON.stringify(mapping, null, 2);
  const blob = new Blob([json], { type:'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'pg_unit_images.json';
  a.click();
  alert('pg_unit_images.json をダウンロードしました');
}

init();
