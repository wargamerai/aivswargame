<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>装甲擲弾兵 — Panzer Grenadier</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background:#1a1a1a; color:#ddd; font-family:'Segoe UI',sans-serif;
  min-height:100vh; display:flex; flex-direction:column; align-items:center;
  background-image: linear-gradient(180deg, #1a1a24 0%, #2a2a1a 50%, #1a1a24 100%);
}

/* タイトル */
.title-area {
  text-align:center; padding:40px 20px 20px;
}
.title-area h1 {
  font-size:2.8em; color:#c8a020; letter-spacing:0.15em;
  text-shadow: 2px 2px 8px rgba(0,0,0,0.8);
  margin-bottom:4px;
}
.title-area h2 {
  font-size:1.4em; color:#888; font-weight:normal; letter-spacing:0.3em;
  font-style:italic;
}
.title-area .version {
  font-size:0.8em; color:#555; margin-top:8px;
}

/* メインコンテナ */
.main {
  max-width:900px; width:100%; padding:20px;
}

/* シナリオカード */
.scenario-list {
  display:flex; flex-direction:column; gap:12px; margin:20px 0;
}
.scenario-card {
  background:#222; border:2px solid #444; border-radius:8px;
  padding:16px; cursor:pointer; transition:all 0.2s;
  display:flex; flex-direction:column; gap:12px;
}
.scenario-card:hover { border-color:#c8a020; background:#2a2a22; }
.scenario-card.selected { border-color:#c8a020; background:#2a2a22; box-shadow:0 0 12px rgba(200,160,32,0.3); }
.scenario-card.disabled { opacity:0.4; cursor:default; pointer-events:none; }

.sc-thumb { border-radius:4px; overflow:hidden; }
.sc-thumb img { display:block; width:100%; }
.sc-thumb .no-img { color:#555; font-size:0.8em; padding:20px; text-align:center; background:#333; }

.sc-info { flex:1; }
.sc-info .sc-num { color:#c8a020; font-size:0.85em; font-weight:bold; }
.sc-info .sc-name { font-size:1.3em; font-weight:bold; color:#eee; margin:2px 0; }
.sc-info .sc-date { color:#aaa; font-size:0.85em; }
.sc-info .sc-desc { color:#888; font-size:0.8em; margin-top:6px; line-height:1.4; }
.sc-info .sc-details {
  display:flex; gap:12px; margin-top:8px; font-size:0.75em; color:#aaa;
}
.sc-info .sc-details span {
  background:#333; padding:2px 8px; border-radius:3px;
}

/* 対戦設定 */
.match-setup {
  background:#222; border:2px solid #555; border-radius:8px;
  padding:20px; margin:20px 0; display:none;
}
.match-setup.show { display:block; }
.match-setup h3 { color:#c8a020; margin-bottom:12px; }

.side-select {
  display:flex; gap:12px; justify-content:center; margin:16px 0;
}
.side-btn {
  padding:16px 32px; border:2px solid #555; border-radius:8px;
  background:#2a2a2a; cursor:pointer; text-align:center; min-width:180px;
  transition:all 0.2s;
}
.side-btn:hover { border-color:#888; }
.side-btn.selected { border-color:#c8a020; background:#333; box-shadow:0 0 8px rgba(200,160,32,0.3); }
.side-btn .side-name { font-size:1.2em; font-weight:bold; }
.side-btn .side-desc { font-size:0.8em; color:#888; margin-top:4px; }
.side-btn.german .side-name { color:#fa8; }
.side-btn.allied .side-name { color:#8cf; }

/* 特別ルール */
.special-rules {
  margin:12px 0; padding:10px; background:#1a1a2a; border:1px solid #446; border-radius:4px;
}
.special-rules h4 { color:#aaa; font-size:0.85em; margin-bottom:4px; }
.special-rules li { color:#88a; font-size:0.8em; margin-left:16px; }

/* 勝利条件 */
.victory-cond {
  margin:12px 0; padding:10px; background:#1a2a1a; border:1px solid #464; border-radius:4px;
}
.victory-cond h4 { color:#aaa; font-size:0.85em; margin-bottom:4px; }
.victory-cond .vc-line { font-size:0.8em; color:#8a8; padding:2px 0; }

/* 開始ボタン */
.start-area { text-align:center; margin:20px 0; }
.start-btn {
  background:#c8a020; color:#000; border:none; padding:14px 48px;
  border-radius:6px; font-size:1.2em; font-weight:bold; cursor:pointer;
  letter-spacing:0.1em; transition:all 0.2s;
}
.start-btn:hover { background:#dab030; transform:scale(1.02); }
.start-btn:disabled { background:#555; color:#888; cursor:default; transform:none; }

/* フッター */
.footer {
  text-align:center; padding:20px; color:#444; font-size:0.75em;
  margin-top:auto;
}
</style>
</head>
<body>

<div class="title-area">
  <h1>装甲擲弾兵</h1>
  <h2>PANZER GRENADIER</h2>
  <div class="version">v0.1</div>
</div>

<div class="main">
  <div class="scenario-list" id="scenarioList"></div>

  <div class="match-setup" id="matchSetup">
    <h3 id="setupTitle">対戦設定</h3>

    <h4 style="color:#aaa;margin-bottom:8px;">対戦モード</h4>
    <div class="side-select" id="modeSelect"></div>

    <h4 style="color:#aaa;margin:16px 0 8px;" id="sideLabel" style="display:none;">操作する陣営</h4>
    <div class="side-select" id="sideSelect"></div>

    <div class="victory-cond" id="victoryCond"></div>
    <div class="special-rules" id="specialRules"></div>

    <div class="start-area">
      <button class="start-btn" id="startBtn" disabled onclick="startGame()">ゲーム開始</button>
    </div>
  </div>
</div>

<div class="footer">
  Panzer Grenadier — Avalon Hill Game Company
</div>

<script>
// シナリオ定義（タイトル画面用の概要データ）
const SCENARIOS = [
  {
    id: 2,
    file: 'scenario2.js',
    name: 'カーンの逆襲',
    date: '1944年6月6日',
    map: 2,
    turns: 6,
    sides: {
      german: { name:'ドイツ軍', desc:'第21装甲師団 — カーンへ撤退' },
      allied: { name:'イギリス軍', desc:'第6空挺師団 + 第27機甲旅団' },
    },
    desc: '連合軍ノルマンディに上陸の急報を受け、ドイツ第21装甲師団は海岸に急いだ。しかしイギリス軍に阻止され、カーンに向かって撤退を始めた。その裏手には既にイギリス第6空挺師団の兵と第27機甲旅団の戦車が待ち構えていた。',
    victory: {
      german: 'ドイツ軍: 7ユニット以上が地図南端から突破',
      allied: 'イギリス軍: ドイツ軍の突破を5ユニット以下に抑える',
      draw: '6ユニット突破で引き分け',
    },
    specialRules: ['移動隊形は使用できない'],
    available: true,
  },
  {
    id: 3,
    name: 'サン・メール・エグリーズ',
    date: '1944年6月6日',
    map: 3,
    turns: 8,
    sides: {
      german: { name:'ドイツ軍', desc:'第6降下猟兵連隊 第2大隊' },
      allied: { name:'アメリカ軍', desc:'第101空挺師団' },
    },
    desc: 'D-Day早朝、米第101空挺師団がユタ・ビーチ裏手に降下。ドイツ軍第6降下猟兵連隊が反撃を開始する。毎ターン、ダイスで援軍が決定される。',
    victory: {
      german: 'D/DD状態でないユニットを5個以上突破。または全ての町・市街地から米軍を排除',
      allied: 'ドイツ軍の勝利条件を阻止',
    },
    specialRules: ['アメリカ軍は移動隊形不可', '援軍はダイス判定', '盤外砲兵(FP8)×4回'],
    available: true,
  },
  {
    id: 4,
    name: 'ヴェリエール＝ランジェヴル',
    date: '1944年6月11日',
    map: 4,
    turns: 11,
    difficulty: 1,
    sides: {
      german: { name:'ドイツ軍', desc:'装甲教導師団 第901装甲擲弾兵連隊 + 第130装甲連隊' },
      allied: { name:'イギリス軍', desc:'第7機甲師団' },
    },
    desc: 'ノルマンディに大兵力を揚陸したイギリス軍の最初の攻勢。バイユーからヴィレル・ボカージュへ向かう途中、装甲教導師団と激突。第130装甲連隊の予備戦車は間に合うか？',
    victory: {
      allied: 'ゲーム終了時に地図4の町AまたはCの2ヘクスを占領',
      german: 'イギリス軍の勝利を阻止',
    },
    specialRules: ['第5ターン以降:空軍支援判定(ダイス8-9で1回)', '第3ターン終了時:イニシアチブ+3(ドイツ側へ)'],
    available: true,
  },
  {
    id: 5,
    name: 'コブラ作戦',
    date: '1944年7月25日',
    map: 4,
    turns: 11,
    difficulty: 2,
    sides: {
      german: { name:'ドイツ軍', desc:'教導装甲師団 + 第5降下猟兵連隊' },
      allied: { name:'アメリカ軍', desc:'歩兵師団 + 機甲師団' },
    },
    desc: '教導装甲師団前面で2000機の絨毯爆撃の後、アメリカ軍がノルマンディ橋頭堡からの突破を開始。果たしてノルマンディの戦闘の決着は？',
    victory: {
      allied: 'ゲーム終了時に北端～南端の連続道路をドイツ軍の射程外で確保',
      german: 'アメリカ軍の勝利を阻止',
    },
    specialRules: ['重爆攻撃(開始前6ヘクス指定、直撃FP16/隣接FP8)', 'ダイス援軍(両軍T2-10)'],
    available: false,
  },
  {
    id: 7,
    name: '赤い悪魔：アルンエム',
    date: '1944年9月18日',
    map: 7,
    turns: 8,
    difficulty: 2,
    sides: {
      german: { name:'ドイツ軍', desc:'第10SS装甲師団 + 国防軍' },
      allied: { name:'イギリス軍', desc:'第1空挺師団' },
    },
    desc: 'マーケット・ガーデン作戦の最先鋒、イギリス第1空挺師団はアルンエムの橋を守りきれるか。第10SS装甲師団と国防軍が反撃を開始する。',
    victory: {
      allied: 'ゲーム終了時にヘクス2248を占領',
      german: 'ゲーム終了時にヘクス2248を占領',
    },
    specialRules: ['ネーベルヴェルファーと迫撃砲は共同射撃不可', 'SSと国防軍はスタック・共同攻撃不可', '大河の南側・橋への進入不可'],
    available: true,
  },
  {
    id: 8,
    name: '地獄のハイウェイ：フェーヘル',
    date: '1944年9月22日',
    map: 6,
    turns: 8,
    difficulty: 2,
    sides: {
      german: { name:'ドイツ軍', desc:'第10SS装甲師団 + 国防軍' },
      allied: { name:'連合軍', desc:'第101空挺師団 + イギリス近衛機甲師団' },
    },
    desc: 'マーケット・ガーデン作戦の補給路フェーヘルにドイツ軍が反撃。第101空挺師団とイギリス近衛機甲師団がフェーヘルの鍵を守れるか。',
    victory: {
      allied: 'フェーヘル6ヘクスのうち4ヘクス以上を占領',
      german: 'フェーヘル6ヘクスのうち4ヘクス以上を占領',
    },
    specialRules: ['SS+国防軍はスタック・共同攻撃可', '米英はスタック・共同攻撃不可'],
    available: true,
  },
  {
    id: 9,
    name: 'ヒュルトゲン森林',
    date: '1944年11月3日',
    map: 8,
    turns: 8,
    difficulty: 3,
    sides: {
      german: { name:'ドイツ軍', desc:'第89歩兵師団 + 第116装甲師団' },
      allied: { name:'アメリカ軍', desc:'第28歩兵師団' },
    },
    desc: 'ヒュルトゲン森林でアメリカ第28歩兵師団が攻勢。見通しの利かない森林地帯での歩兵中心の戦闘。戦略的に重要な高地を巡る激戦。',
    victory: {
      allied: 'レベル3高地5ヘクスのうち3ヘクス以上を占領',
      german: 'アメリカ軍の勝利を阻止',
    },
    specialRules: ['盤外砲兵(米FP8×3回/独FP8×2回)'],
    available: true,
  },
];

let selectedScenario = null;
let selectedSide = null;
let selectedMode = null; // 'pvai', 'pvp', 'aivai'

function init() {
  const list = document.getElementById('scenarioList');
  list.innerHTML = '';

  SCENARIOS.forEach(sc => {
    const card = document.createElement('div');
    card.className = 'scenario-card' + (sc.available ? '' : ' disabled');
    card.onclick = () => { if (sc.available) selectScenario(sc); };

    card.innerHTML = `
      ${sc.map > 0 ? `<img src="map/m${sc.map}.jpg" alt="Map ${sc.map}" style="display:block;width:50%;border-radius:4px;">` : ''}
      <div>
        <div style="color:#c8a020;font-size:0.85em;font-weight:bold;">SCENARIO ${sc.id}</div>
        <div style="font-size:1.3em;font-weight:bold;color:#eee;margin:2px 0;">${sc.name}</div>
        <div style="color:#aaa;font-size:0.85em;">${sc.date || ''}</div>
        <div style="color:#888;font-size:0.8em;margin-top:6px;line-height:1.4;">${sc.desc}</div>
        <div style="display:flex;gap:12px;margin-top:8px;font-size:0.75em;color:#aaa;flex-wrap:wrap;">
          ${sc.difficulty != null ? `<span style="background:#2a4a2a;border:1px solid #4a4;padding:2px 8px;border-radius:3px;color:#8c8;">難易度 ${'★'.repeat(sc.difficulty)}${'☆'.repeat(3-sc.difficulty)}</span>` : ''}
          ${sc.turns ? `<span style="background:#333;padding:2px 8px;border-radius:3px;">ターン: ${sc.turns}</span>` : ''}
          ${sc.map ? `<span style="background:#333;padding:2px 8px;border-radius:3px;">マップ: ${sc.map}</span>` : ''}
          ${sc.sides.german ? `<span style="background:#333;padding:2px 8px;border-radius:3px;">${sc.sides.german.name} vs ${sc.sides.allied.name}</span>` : ''}
        </div>
      </div>
    `;
    card.id = 'sc_' + sc.id;
    list.appendChild(card);
  });
}

function selectScenario(sc) {
  selectedScenario = sc;
  selectedSide = null;

  // カード選択状態
  document.querySelectorAll('.scenario-card').forEach(c => c.classList.remove('selected'));
  document.getElementById('sc_' + sc.id).classList.add('selected');

  // 対戦設定表示
  const setup = document.getElementById('matchSetup');
  setup.classList.add('show');
  document.getElementById('setupTitle').textContent = `${sc.name} — 対戦設定`;

  // 対戦モード選択
  selectedMode = null;
  const modeEl = document.getElementById('modeSelect');
  modeEl.innerHTML = `
    <div class="side-btn" data-mode="pvai" onclick="selectMode('pvai')">
      <div class="side-name" style="color:#c8a020;">人間 vs AI</div>
      <div class="side-desc">片方を操作、相手はAI</div>
    </div>
    <div class="side-btn" data-mode="pvp" onclick="selectMode('pvp')">
      <div class="side-name" style="color:#c8a020;">人間 vs 人間</div>
      <div class="side-desc">2人で交互にプレイ</div>
    </div>
    <div class="side-btn" data-mode="aivai" onclick="selectMode('aivai')">
      <div class="side-name" style="color:#c8a020;">AI vs AI</div>
      <div class="side-desc">観戦モード</div>
    </div>
  `;

  // 陣営選択は非表示
  document.getElementById('sideLabel').style.display = 'none';
  document.getElementById('sideSelect').innerHTML = '';

  // 勝利条件
  const vc = document.getElementById('victoryCond');
  if (sc.victory && (sc.victory.german || sc.victory.allied)) {
    vc.innerHTML = '<h4>勝利条件</h4>';
    if (sc.victory.german) vc.innerHTML += `<div class="vc-line">● ${sc.victory.german}</div>`;
    if (sc.victory.allied) vc.innerHTML += `<div class="vc-line">● ${sc.victory.allied}</div>`;
    if (sc.victory.draw) vc.innerHTML += `<div class="vc-line">● ${sc.victory.draw}</div>`;
    vc.style.display = '';
  } else {
    vc.style.display = 'none';
  }

  // 特別ルール
  const sr = document.getElementById('specialRules');
  if (sc.specialRules && sc.specialRules.length > 0) {
    sr.innerHTML = '<h4>特別ルール</h4><ul>' +
      sc.specialRules.map(r => `<li>${r}</li>`).join('') + '</ul>';
    sr.style.display = '';
  } else {
    sr.style.display = 'none';
  }

  document.getElementById('startBtn').disabled = true;

  // スクロール
  setup.scrollIntoView({ behavior:'smooth', block:'start' });
}

function selectMode(mode) {
  selectedMode = mode;
  selectedSide = null;
  document.querySelectorAll('#modeSelect .side-btn').forEach(b => b.classList.remove('selected'));
  document.querySelector(`#modeSelect [data-mode="${mode}"]`).classList.add('selected');

  const sideLabel = document.getElementById('sideLabel');
  const sideEl = document.getElementById('sideSelect');
  const sc = selectedScenario;

  if (mode === 'pvai') {
    // 陣営選択を表示
    sideLabel.style.display = '';
    sideEl.innerHTML = `
      <div class="side-btn german" onclick="selectSide('german')">
        <div class="side-name">${sc.sides.german.name}</div>
        <div class="side-desc">${sc.sides.german.desc}</div>
      </div>
      <div class="side-btn allied" onclick="selectSide('allied')">
        <div class="side-name">${sc.sides.allied.name}</div>
        <div class="side-desc">${sc.sides.allied.desc}</div>
      </div>
    `;
    document.getElementById('startBtn').disabled = true;
  } else if (mode === 'pvp') {
    // 人間同士は陣営選択不要
    sideLabel.style.display = 'none';
    sideEl.innerHTML = '';
    selectedSide = 'both';
    document.getElementById('startBtn').disabled = false;
  } else if (mode === 'aivai') {
    // AI同士は陣営選択不要
    sideLabel.style.display = 'none';
    sideEl.innerHTML = '';
    selectedSide = 'watch';
    document.getElementById('startBtn').disabled = false;
  }
}

function selectSide(side) {
  selectedSide = side;
  document.querySelectorAll('.side-btn').forEach(b => b.classList.remove('selected'));
  const btns = document.querySelectorAll('.side-btn');
  btns.forEach(b => {
    if ((side === 'german' && b.classList.contains('german')) ||
        (side === 'allied' && b.classList.contains('allied'))) {
      b.classList.add('selected');
    }
  });
  document.getElementById('startBtn').disabled = false;
}

function startGame() {
  if (!selectedScenario || !selectedSide || !selectedMode) return;
  const params = new URLSearchParams({
    scenario: selectedScenario.id,
    side: selectedSide,
    mode: selectedMode,
  });
  window.location.href = 'hub.html?' + params.toString();
}

init();
</script>
</body>
</html>
