}

function escapeHtml(s) {
  return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function handleMapPointerClick(e) {
  if (e.target.closest && e.target.closest('#mapHudPanel')) return;

  const hit = pickUnitAtMapPointer(e);
  const active = getActiveUnit();

  if (currentPhase === 'PLAN_READY') {
    if (hit) showInspectPanelForUnit(hit);
    else clearInspectPanel();
    return;
  }

  if (currentPhase === 'RANGED' && rangedAwaitingTarget && selectedWeapon && active && isPlayerUnit(active)) {
    if (tryRangedTargetClick(e)) return;
    if (hit && (!active || hit.id !== active.id)) showInspectPanelForUnit(hit);
    else clearInspectPanel();
    return;
  }

  if (currentPhase === 'MOVE' && active && isPlayerUnit(active)) {
    if (hit && hit.id !== active.id) {
      showInspectPanelForUnit(hit);
      return;
    }
    onMapClick(e);
    if (!hit || hit.id === active.id) clearInspectPanel();
    return;
  }

  if (currentPhase === 'ACTION_SELECT' && active && isPlayerUnit(active)) {
    if (hit && hit.id !== active.id) {
      showInspectPanelForUnit(hit);
      return;
    }
    tryActionSelectUnitClick(e);
    return;
  }

  if (hit) showInspectPanelForUnit(hit);
  else clearInspectPanel();
}

function tryActionSelectUnitClick(e) {
  const unit = getActiveUnit();
  const { mx, my } = clientToMapSvgXY(e);
  const c = hexCenter(unit.x, unit.y);
  if (Math.hypot(mx - c.x, my - c.y) < hexSize * 0.92) positionMapHudAtUnit(unit);
}

function tryRangedTargetClick(e) {
  const unit = getActiveUnit();
  if (!unit || !selectedWeapon || !rangedAwaitingTarget) return false;
  const { mx, my } = clientToMapSvgXY(e);
  let best = null, bestD = Infinity;
  for (const u of units) {
    if (u.status !== 'alive' || u.team === unit.team) continue;
    const c = hexCenter(u.x, u.y);
    const d = Math.hypot(mx - c.x, my - c.y);
    if (d < hexSize * 0.88 && d < bestD) { bestD = d; best = u; }
  }
  if (!best) return false;
  const wKey = selectedWeapon === 'オーラソード' ? 'ソード' : selectedWeapon;
  const range = hexDistance(unit.x, unit.y, best.x, best.y);
  if (range < 1 || range > 8 || !WEAPON_HIT[wKey]) return false;
  if (WEAPON_HIT[wKey][range - 1] === null || WEAPON_HIT[wKey][range - 1] === undefined) return false;
  if (!isInEffectiveRangedArc(unit, best)) return false;
  rangedAwaitingTarget = false;
  const p = document.getElementById('mapHudPanel');
  if (p) p.classList.remove('ranged-pick-target');
  fireAt(best.id);
  return true;
}

// マップクリックで移動先選択
function onMapClick(e) {
  if (currentPhase === 'PLAN_READY') return;
  if (currentPhase !== 'MOVE') return;
  const unit = getActiveUnit();
  if (!unit || !isPlayerUnit(unit)) return;

  const { mx, my } = clientToMapSvgXY(e);

  const byHex = new Map();
  for (const rh of reachableHexes) {
    const key = `${rh.x},${rh.y}`;
    if (!byHex.has(key)) byHex.set(key, []);
    byHex.get(key).push(rh);
  }
  let bestKey = null, bestDist = Infinity;
  for (const key of byHex.keys()) {
    const [hx, hy] = key.split(',').map(Number);
    const c = hexCenter(hx, hy);
    const d = Math.sqrt((mx - c.x) ** 2 + (my - c.y) ** 2);
    if (d < hexSize && d < bestDist) {
      bestDist = d;
      bestKey = key;
    }
  }

  if (!bestKey) return;
  if (isDragging) return;

  const selKey = selectedMoveTarget ? `${selectedMoveTarget.x},${selectedMoveTarget.y}` : null;
  if (selectedMoveTarget && dirChoices.length > 1 && bestKey === selKey) {
    const picked = pickFacingDirFromHexSideClick(selectedMoveTarget.x, selectedMoveTarget.y, mx, my, dirChoices);
    if (picked != null) {
      confirmMoveWithDir(selectedMoveTarget.x, selectedMoveTarget.y, picked);
      return;
    }
    return;
  }

  const states = byHex.get(bestKey);
  const dirs = [...new Set(states.map(s => s.dir))].sort((a, b) => a - b);
  if (dirs.length === 1) {
    const s = states.find(st => st.dir === dirs[0]);
    confirmMoveWithDir(s.x, s.y, s.dir);
    return;
  }

  const [tx, ty] = bestKey.split(',').map(Number);
  const edgeNow = pickFacingDirFromHexSideClick(tx, ty, mx, my, dirs);
  if (edgeNow != null) {
    confirmMoveWithDir(tx, ty, edgeNow);
    return;
  }
  selectedMoveTarget = { x: tx, y: ty };
  previewPath = [];
  previewStepStates = [];
  dirChoices = dirs;
  showDirSelect(unit, selectedMoveTarget, dirs);
  drawMap();
}

function showDirSelect(unit, target, allowedDirs) {
  const panel = document.getElementById('mapHudPanel');
  showMapHud();
  const dirNames = ['↑N','↗NE','↘SE','↓S','↙SW','↖NW'];
  const isSameHex = target.x === unit.x && target.y === unit.y;
  const allow = allowedDirs != null && allowedDirs.length > 0 ? new Set(allowedDirs) : null;
  let html = `<div class="section-title" style="color:#c8a020;font-size:12px;font-weight:bold;margin-bottom:6px;">${isSameHex ? 'その場で旋回' : `移動先(${target.x},${target.y})`} — 向き選択</div>`;
  html += '<div style="color:#888;font-size:11px;margin-bottom:8px;line-height:1.35;">マップで<strong style="color:#f88;">同じマスのヘクス辺</strong>（進みたい向きの外側の辺）をクリックしても確定できます。中央付近のクリックは無視されます。</div>';
  html += '<div class="action-btns">';
  for (let d = 0; d < 6; d++) {
    if (allow && !allow.has(d)) continue;
    const current = (d === unit.dir && isSameHex) ? ' (現在)' : '';
    html += `<button class="action-btn" onclick="confirmMoveWithDir(${target.x},${target.y},${d})">${dirNames[d]}${current}</button>`;
  }
  html += '</div>';
  html += '<div style="margin-top:8px;display:flex;gap:6px;">';
  html += '<button class="action-btn" onclick="cancelMoveSelect()">戻る</button>';
  if (isSameHex) html += '<button class="action-btn" onclick="skipMove()">移動しない</button>';
  html += '</div>';
  panel.innerHTML = html;
  requestAnimationFrame(() => {
    positionMapHudAtUnit(unit);
    requestAnimationFrame(() => positionMapHudAtUnit(unit));
  });
}

function previewMove(unit) {
  const input = document.getElementById('moveInput');
  const raw = input.value.toUpperCase();
  const cmd = raw.replace(/[^FBLR]/g, '');
  if (raw !== cmd) input.value = cmd;
  const result = simulateMove(unit, cmd);
  previewPath = result.path;
  previewStepStates = result.stepStates || [];
  moveCost = result.cost;
  input.className = result.valid ? 'preview' : '';
  const remainEl = document.getElementById('moveRemain');
  if (remainEl) remainEl.textContent = unit.movementRemaining - moveCost;
  updateMovePadButtons(unit);
  drawMap();
}

function simulateMove(unit, cmd) {
  let x = unit.x, y = unit.y, dir = unit.dir;
  let cost = 0;
  const path = [{ x, y }];
  const stepStates = [{ x, y, dir }];
  let valid = true;
  const rotStep = meleeRotateMoveCost(unit);

  for (const c of cmd) {
    if (c === 'F' || c === 'B') {
      const stepDir = c === 'F' ? dir : (dir + 3) % 6;
      const nx = x + DIR_DX[stepDir];
      const ny = y + (x % 2 === 0 ? DIR_DY_EVEN[stepDir] : DIR_DY_ODD[stepDir]);
      if (nx < 0 || nx >= mapCols || ny < 0 || ny >= mapRows) { valid = false; break; }
      if (isMoveStepBlockedByAlly(unit, nx, ny)) { valid = false; break; }
      cost++;
      if (cost > unit.movementRemaining) { valid = false; break; }
      x = nx; y = ny;
      path.push({ x, y });
      stepStates.push({ x, y, dir });
      const steppedOnEnemy = units.some(u =>
        u.status === 'alive' && u.id !== unit.id && u.x === nx && u.y === ny && u.team !== unit.team);
      if (steppedOnEnemy) break;
    } else if (c === 'L') {
      cost += rotStep;
      if (cost > unit.movementRemaining) { valid = false; break; }
      dir = (dir + 5) % 6;
      stepStates.push({ x, y, dir });
    } else if (c === 'R') {
      cost += rotStep;
      if (cost > unit.movementRemaining) { valid = false; break; }
      dir = (dir + 1) % 6;
      stepStates.push({ x, y, dir });
    } else {
      valid = false; break;
    }
  }
  return { path, cost, valid, endX: x, endY: y, endDir: dir, stepStates };
}

function confirmMoveWithDir(x, y, dir) {
  const unit = getActiveUnit();
  if (!unit) return;
  if (turnSubPhase === 'planning') {
    unit.planEndState = { x, y, dir };
    unit.planMoveCmd = null;
    const rh = reachableHexes.find(r => r.x === x && r.y === y && r.dir === dir);
    if (rh && rh.path && rh.path.length) {
      unit.planPathHexes = rh.path.map(h => ({ x: h.x, y: h.y }));
    } else {
      unit.planPathHexes = [{ x: unit.x, y: unit.y }];
      if (x !== unit.x || y !== unit.y) unit.planPathHexes.push({ x, y });
    }
    previewPath = [];
    previewStepStates = [];
    reachableHexes = [];
    selectedMoveTarget = null;
    dirChoices = [];
    const dirNames = ['N','NE','SE','S','SW','NW'];
    addLog(unit.team, `${unit.pilot}: 移動プラン → (${x},${y}) 向き${dirNames[dir]}`);
    hideMapHud();
    endMovePhase(unit);
    return;
  }
  unit.x = x;
  unit.y = y;
  unit.dir = dir;
  previewPath = [];
  previewStepStates = [];
  reachableHexes = [];
  selectedMoveTarget = null;
  dirChoices = [];
  const dirNames = ['N','NE','SE','S','SW','NW'];
  addLog(unit.team, `${unit.pilot}: 移動 → (${x},${y}) 向き${dirNames[dir]}`);
  hideMapHud();
  endMovePhase(unit);
}

function cancelMoveSelect() {
  selectedMoveTarget = null;
  previewPath = [];
  previewStepStates = [];
  const unit = getActiveUnit();
  if (unit) startMovePhase(unit);
}

function confirmMove() {
  const unit = getActiveUnit();
  if (!unit) return;
  const cmd = document.getElementById('moveInput').value.toUpperCase().replace(/[^FBLR]/g, '');
  if (!cmd) { skipMove(); return; }
  const result = simulateMove(unit, cmd);
  if (!result.valid) return;

  if (turnSubPhase === 'planning') {
    unit.planMoveCmd = cmd;
    unit.planEndState = { x: result.endX, y: result.endY, dir: result.endDir };
    unit.planPathHexes = result.path.map(h => ({ x: h.x, y: h.y }));
    previewPath = [];
    previewStepStates = [];
    reachableHexes = [];
    addLog(unit.team, `${unit.pilot}: 移動プラン → (${result.endX},${result.endY}) 向き${result.endDir}`);
    hideMapHud();
    endMovePhase(unit);
    return;
  }

  unit.x = result.endX;
  unit.y = result.endY;
  unit.dir = result.endDir;
  previewPath = [];
  previewStepStates = [];
  reachableHexes = [];
  addLog(unit.team, `${unit.pilot}: 移動 → (${unit.x},${unit.y}) 向き${unit.dir}`);
  hideMapHud();
  endMovePhase(unit);
}

function cancelMove() {
  previewPath = [];
  previewStepStates = [];
  moveCost = 0;
  const input = document.getElementById('moveInput');
  if (input) {
    input.value = '';
    input.className = '';
  }
  const unit = getActiveUnit();
  const remainEl = document.getElementById('moveRemain');
  if (remainEl && unit) remainEl.textContent = unit.movementRemaining;
  updateMovePadButtons(unit);
  drawMap();
}

function skipMove() {
  const unit = getActiveUnit();
  previewPath = [];
  previewStepStates = [];
  reachableHexes = [];
  if (turnSubPhase === 'planning') {
    unit.planEndState = { x: unit.x, y: unit.y, dir: unit.dir };
    unit.planMoveCmd = '';
    unit.planPathHexes = [{ x: unit.x, y: unit.y }];
    addLog(unit.team, `${unit.pilot}: 移動なし（プラン）`);
    hideMapHud();
    endMovePhase(unit);
    return;
  }
  addLog(unit.team, `${unit.pilot}: 移動なし`);
  hideMapHud();
  endMovePhase(unit);
}

function endMovePhase(unit) {
  drawMap();
  if (turnSubPhase === 'planning') {
    if (!unit.planEndState) {
      unit.planEndState = { x: unit.x, y: unit.y, dir: unit.dir };
    }
    unit.planComplete = true;
    advanceToNextHumanPlan();
    return;
  }
  if (unit.selectedAction === '射撃') {
    startRangedPhase(unit);
  } else if (unit.selectedAction === '格闘') {
    startMeleePhase(unit);
  } else {
    finishUnitTurn();
  }
}

// ===== 射撃フェイズ =====
function startRangedPhase(unit) {
  currentPhase = 'RANGED';
  updateTopBar();
  rangedAwaitingTarget = false;
  rangedShotInProgress = false;
  selectedWeapon = null;
  document.getElementById('combatPanel').style.display = 'none';

  const enemies = units.filter(u => u.team !== unit.team && u.status === 'alive');
  if (enemies.length === 0 || unit.weapons.length === 0) {
    addLog('system', `${unit.pilot}: 射撃対象なし`);
    hideMapHud();
    finishUnitTurn();
    return;
  }

  let html = '<div class="combat-title">武器選択 → 敵機をクリック</div>';
  html += '<div id="rangedWeaponRow" style="margin-bottom:6px;">';
  unit.weapons.forEach(w => {
    if (w === 'ソード' || w === 'オーラソード' || w === 'ガッシュ') return;
    if (!canOperateWeapon(unit, w)) return;
    const wKey = w === 'オーラソード' ? 'ソード' : w;
    if (!WEAPON_HIT[wKey]) return;
    html += `<button type="button" class="weapon-btn ranged-wpick" data-weapon="${encodeURIComponent(w)}">${w}</button>`;
  });
  html += '</div>';
  html += '<div id="rangedHudHint" style="display:none;color:#8cf;font-size:11px;line-height:1.35;margin:6px 0;"></div>';
  html += '<button type="button" class="action-btn" style="margin-top:6px;" id="rangedSkipBtn">射撃しない</button>';
  const mapHudPanel = document.getElementById('mapHudPanel');
  mapHudPanel.innerHTML = html;
  mapHudPanel.classList.remove('ranged-pick-target');
  mapHudPanel.classList.add('map-hud-ranged-phase');
  mapHudPanel.querySelectorAll('.ranged-wpick').forEach(btn => {
    btn.addEventListener('click', ev => {
      ev.stopPropagation();
      selectWeapon(decodeURIComponent(btn.getAttribute('data-weapon')), ev);
    });
  });
  document.getElementById('rangedSkipBtn').addEventListener('click', ev => {
    ev.stopPropagation();
    skipRanged();
  });
  showMapHud();
  drawMap();
  requestAnimationFrame(() => {
    positionMapHudAtUnit(unit);
    requestAnimationFrame(() => positionMapHudAtUnit(unit));
  });
}

function selectWeapon(weapon, ev) {
  selectedWeapon = weapon;
  const unit = getActiveUnit();
  if (!canOperateWeapon(unit, weapon)) return;
  const wKey = weapon === 'オーラソード' ? 'ソード' : weapon;
  const hitTable = WEAPON_HIT[wKey];
  if (!hitTable) return;

  const enemies = units.filter(u => u.team !== unit.team && u.status === 'alive');
  let any = false;
  for (const e of enemies) {
    const range = hexDistance(unit.x, unit.y, e.x, e.y);
    if (range < 1 || range > 8) continue;
    if (!isInEffectiveRangedArc(unit, e)) continue;
    const baseHit = hitTable[range - 1];
    if (baseHit === null || baseHit === undefined) continue;
    any = true;
    break;
  }
  const hint = document.getElementById('rangedHudHint');
  if (!any) {
    rangedAwaitingTarget = false;
    if (hint) {
      hint.style.display = 'block';
      hint.textContent = 'この武器で正面射界・射程内の敵がありません。別の武器ボタンで切り替えるか「射撃しない」でください。';
    }
    document.getElementById('mapHudPanel').classList.remove('ranged-pick-target');
  } else {
    rangedAwaitingTarget = true;
    if (hint) {
      hint.style.display = 'block';
      hint.textContent = unit.destroyed && unit.destroyed['頭']
        ? '頭破壊: 射界は正面1ラインのみ。敵をクリックして射撃。'
        : '敵をクリックして射撃（1回のみ）。別の武器に変えるときは上の武器ボタンを押す。射程1–8・正面3方向';
    }
    document.getElementById('mapHudPanel').classList.add('ranged-pick-target');
  }

  document.querySelectorAll('#mapHudPanel .weapon-btn').forEach(b => b.classList.remove('selected'));
  const t = ev && ev.target;
  if (t) t.classList.add('selected');

  drawMap();
  if (unit) {
    requestAnimationFrame(() => {
      positionMapHudAtUnit(unit);
      requestAnimationFrame(() => positionMapHudAtUnit(unit));
    });
  }
}

function roll2d6Detailed() {
  const d1 = roll1d6();
  const d2 = roll1d6();
  return { sum: d1 + d2, d1, d2 };
}

function combatSequenceWait(ms) {
  return new Promise(res => setTimeout(res, ms));
}

/**
 * 命中箇所表の読替：破壊済みの手足は飛ばす（足・手で同じ扱い）。
 * 右足／右手が破壊なら同名表出目→左足／左手。左足／左手も破壊なら→胴。
 */
function remapHitPartForLimbDestruction(target, tablePart) {
  const d = (target && target.destroyed) || {};
  let p = tablePart;
  if (p === '右足' && d['右足']) p = '左足';
  if (p === '左足' && d['左足']) p = '胴';
  if (p === '右手' && d['右手']) p = '左手';
  if (p === '左手' && d['左手']) p = '胴';
  return p;
}

/** ポップアップ用：表の箇所と実効箇所が異なるときの注記HTML */
function appendHitPartLimbRemapHtml(hitPart, hitPartRaw) {
  if (!hitPartRaw || hitPartRaw === hitPart) return '';
  return ` <span style="color:#8ac;font-size:11px;">（表:${escapeHtml(hitPartRaw)}→${escapeHtml(hitPart)}）</span>`;
}

/** 射撃解決の出目を先にすべて決定（演出後に apply のみ） */
function computeRangedResolution(unit, target) {
  const weaponLabel = selectedWeapon;
  if (!canOperateWeapon(unit, weaponLabel)) {
    return { kind: 'invalid' };
  }
  if (!isInEffectiveRangedArc(unit, target)) {
    return { kind: 'outOfArc' };
  }
  const wKey = weaponLabel === 'オーラソード' ? 'ソード' : weaponLabel;
  const tbl = WEAPON_HIT[wKey];
  if (!tbl) return { kind: 'invalid' };
  const range = hexDistance(unit.x, unit.y, target.x, target.y);
  if (range < 1 || range > 8) return { kind: 'invalid' };
  const baseHit = tbl[range - 1];
  if (baseHit === null || baseHit === undefined) return { kind: 'invalid' };
  const mod = SHOOTER_POWER_MOD[unit.effectivePower] + TARGET_EVADE_MOD[target.effectivePower] +
    (TARGET_ACTION_MOD[target.selectedAction] || 0);
  const finalHit = baseHit + mod;
  const hr = roll2d6Detailed();
  const hit = hr.sum <= finalHit;
  if (!hit) {
    return {
      kind: 'miss',
      weaponLabel, wKey, range, baseHit, mod, finalHit,
      hitRoll: hr.sum, hitD1: hr.d1, hitD2: hr.d2,
    };
  }
  const direction = getAttackDirection(unit, target);
  const lr = roll2d6Detailed();
  const locTable = HIT_LOCATION_AB[direction];
  const rawLocPart = locTable ? locTable[lr.sum - 2] : '胴';
  const hitPart = remapHitPartForLimbDestruction(target, rawLocPart);
  const basePower = WEAPON_POWER[wKey] ? WEAPON_POWER[wKey][range - 1] : 0;
  const powerMod = POWER_DAMAGE_MOD[unit.effectivePower] || 0;
  const weaponPower = (basePower || 0) + powerMod;
  const armor = getArmor(target.machine, hitPart);
  const diff = weaponPower - armor;
  const dmgRoll = roll1d6();
  const dmgKey = getDamageKey(diff);
  const dmgResult = DAMAGE_TABLE[dmgKey] ? DAMAGE_TABLE[dmgKey][dmgRoll - 1] : 'n';
  return {
    kind: 'hit',
    weaponLabel, wKey, range, baseHit, mod, finalHit,
    hitRoll: hr.sum, hitD1: hr.d1, hitD2: hr.d2,
    direction,
    locRoll: lr.sum, locD1: lr.d1, locD2: lr.d2, hitPart,
    hitPartRaw: rawLocPart !== hitPart ? rawLocPart : undefined,
    basePower, powerMod, weaponPower, armor, diff,
    dmgRoll, dmgKey, dmgResult,
  };
}

function formatRangedDmgHtml(dmgRoll, dmgResult) {
  const inner = dmgResult === 'n' ? '効果なし' : dmgResult === 'e' ? '<span class="popup-damage">壊滅!</span>' : `<span class="popup-damage">${dmgResult}ダメージ</span>`;
  return `被害判定(1d6=${dmgRoll}): ${inner}`;
}

function formatMeleeDmgExplain(dmgResult) {
  if (dmgResult === 'n') return '<div class="popup-line">効果なし</div>';
  if (dmgResult === 'e') {
    return '<div class="popup-line"><span class="popup-damage">壊滅（被害判定e・ユニット全損）</span></div>' +
      '<div class="popup-line" style="color:#888;font-size:11px;line-height:1.45;">左足だけの耐久切れでは全滅しません（胴／コクピット破壊時は別）。ここでの壊滅は<strong>被害表のe</strong>が出た結果です。</div>';
  }
  return `<div class="popup-line"><span class="popup-damage">${dmgResult}ダメージ</span></div>`;
}

/** 格闘命中修正＝射撃と同様に加算（射手パワー・目標回避・目標行動・剣位置） */
function computeMeleeHitMods(unit, target) {
  const pw = String(unit.effectivePower || 'g').toLowerCase();
  const tw = String(target.effectivePower || 'g').toLowerCase();
  const actionMod = TARGET_ACTION_MOD[target.selectedAction] || 0;
  let posMod = 0;
  if (meleeUsesSwordArc(unit) && selectedSwordSide) {
    posMod = getSwordHexHitMod(unit, target, selectedSwordSide);
  } else if (hexDistance(unit.x, unit.y, target.x, target.y) === 1) {
    posMod = getPunchKickHexHitMod(unit, target, 'right');
  }
  const shooterMod = SHOOTER_POWER_MOD[pw] || 0;
  const evadeMod = TARGET_EVADE_MOD[tw] || 0;
  const mod = shooterMod + evadeMod + actionMod + posMod;
  return { pw, tw, actionMod, posMod, shooterMod, evadeMod, mod };
}

/**
 * 味方→AI の格闘を一括出目（演出用）。命中→敵受け（常時）→命中箇所→被害
 * @returns {{ kind:'miss'|'defended'|'hit', ... }}
 */
function computeMeleeResolutionVsAI(unit, target) {
  const method = selectedMeleeMethod;
  const atkTier = selectedMeleeTier;
  const atkPartDeclared = selectedMeleeAttackPart || '';
  const { pw, mod } = computeMeleeHitMods(unit, target);
  const baseHit = MELEE_HIT[method] ? MELEE_HIT[method][pw] : 0;
  const finalHit = baseHit + mod;
  const hr = roll2d6Detailed();
  const hit = hr.sum <= finalHit;
  const swExtra = meleeUsesSwordArc(unit) && selectedSwordSide ? (selectedSwordSide === 'left' ? '・左' : '・右') : '';
  if (!hit) {
    return {
      kind: 'miss', method, atkTier, atkPartDeclared, baseHit, mod, finalHit,
      hitRoll: hr.sum, hitD1: hr.d1, hitD2: hr.d2, swExtra,
    };
  }
  // AI同士は受け判定をスキップ
  const aiVsAi = !isPlayerUnit(unit) && !isPlayerUnit(target);
  let dt = null, dp = null, rowKey = null;
  let defBaseRate = 0, defParryAdj = 0, defRate = 0;
  let dr = { sum: 0, d1: 0, d2: 0 };
  let defSuccess = false;
  if (!aiVsAi) {
    const tiers = ['high', 'mid', 'low'];
    const canWs = defenderCanWeaponParry(target);
    const useWS = canWs && Math.random() < 0.48;
    if (useWS) {
      rowKey = '武器・盾';
      dt = 'ws';
      dp = '—';
    } else {
      dt = tiers[Math.floor(Math.random() * 3)];
      const pArr = MELEE_TIER_PARTS[dt];
      dp = pArr[Math.floor(Math.random() * pArr.length)];
      rowKey = getDefenseTableRowKey(atkTier, atkPartDeclared, dt, dp);
    }
    defBaseRate = defenseRateForRow(target, rowKey);
    defParryAdj = meleeParryStanceMod(target);
    defRate = effectiveMeleeDefenseNeed(target, rowKey);
    dr = roll2d6Detailed();
    defSuccess = dr.sum <= defRate;
    if (defSuccess) {
      const parryStress = useWS ? rollParryEquipmentStress(unit, target, method) : null;
      return {
        kind: 'defended',
        method, atkTier, atkPartDeclared, baseHit, mod, finalHit,
        hitRoll: hr.sum, hitD1: hr.d1, hitD2: hr.d2, swExtra,
        defenseTier: dt, defensePart: dp, rowKey, defRate, defBaseRate, defParryAdj,
        defRoll: dr.sum, defD1: dr.d1, defD2: dr.d2,
        weaponShieldParry: useWS,
        parryStress,
      };
    }
  }
  const direction = getAttackDirection(unit, target);
  // 命中箇所: 1d6で1-4→狙い通り、5-6→命中箇所判定表で決定
  const locAimRoll = roll1d6();
  let rawLocPart;
  let lr = null;
  let ab2Roll = null;
  if (locAimRoll <= 4) {
    // 狙い通り
    rawLocPart = atkPartDeclared || '胴';
  } else {
    // 命中箇所判定表で決定
    lr = roll2d6Detailed();
    const locTable = HIT_LOCATION_AB[direction];
    rawLocPart = locTable ? locTable[lr.sum - 2] : '胴';
    // 格闘で側面/後面から胴に当たった場合の再判定
    if (rawLocPart === '胴' && (direction === '後面' || direction === '右側面' || direction === '左側面')) {
      ab2Roll = roll1d6();
      const ab2Key = direction === '後面' ? '後面' : '側面';
      rawLocPart = HIT_LOCATION_AB2[ab2Key][ab2Roll - 1];
    }
  }
  const hitPart = remapHitPartForLimbDestruction(target, rawLocPart);
  const basePower = MELEE_POWER[method] ? MELEE_POWER[method][unit.effectivePower] : 0;
  const powerMod = POWER_DAMAGE_MOD[unit.effectivePower] || 0;
  const locPowMod = getMeleeLocationPowerMod(method, hitPart);
  const totalPower = basePower + powerMod + locPowMod;
  const armor = getArmor(target.machine, hitPart);
  const diff = totalPower - armor;
  const dmgR = roll1d6();
  const dmgKey = getDamageKey(diff);
  const dmgResult = DAMAGE_TABLE[dmgKey] ? DAMAGE_TABLE[dmgKey][dmgR - 1] : 'n';
  return {
    kind: 'hit',
    method, atkTier, atkPartDeclared, baseHit, mod, finalHit,
    hitRoll: hr.sum, hitD1: hr.d1, hitD2: hr.d2, swExtra,
    defenseTier: dt, defensePart: dp, rowKey, defRate, defBaseRate, defParryAdj,
    defRoll: dr.sum, defD1: dr.d1, defD2: dr.d2,
    direction, locAimRoll,
    locRoll: lr ? lr.sum : null, locD1: lr ? lr.d1 : null, locD2: lr ? lr.d2 : null, hitPart,
    hitPartRaw: rawLocPart !== hitPart ? rawLocPart : undefined,
    basePower, powerMod, locPowMod, totalPower, armor, diff,
    dmgRoll: dmgR, dmgResult,
  };
}

function applyMeleeResolutionData(unit, target, data) {
  if (!data || data.kind === 'miss') {
    if (data && data.method) {
      addLog(unit.team, `${unit.pilot}→${target.pilot}: ${data.method} 外れ`);
    }
    return;
  }
  if (data.kind === 'defended') {
    addLog('defend', `${target.pilot}: 受け成功${data.weaponShieldParry ? '（武器・盾）' : ''}`);
    if (data.parryStress) applyParryEquipmentStressAfterRoll(target, data.parryStress);
    return;
  }
  applyDamage(target, data.hitPart, data.dmgResult);
  if (typeof DunbainQL !== 'undefined') DunbainQL.registerCombatOutcome(unit, target, data.dmgResult);
  addLog('damage', `${unit.pilot}→${target.pilot}: ${data.method} ${data.hitPart}に${data.dmgResult === 'n' ? '効果なし' : data.dmgResult === 'e' ? '壊滅' : data.dmgResult + 'ダメージ'}`);
}

function animateCombatDicePair(container, d1, d2, duration) {
  duration = duration == null ? 760 : duration;
  return new Promise(resolve => {
    if (!container) {
      resolve();
      return;
    }
    container.innerHTML = '<div class="combat-dice-pair"><span class="combat-die">1</span><span class="combat-dice-plus">+</span><span class="combat-die">1</span><span class="combat-dice-eq">=</span><span class="combat-dice-sum">?</span></div>';
    const dies = container.querySelectorAll('.combat-die');
    const sumEl = container.querySelector('.combat-dice-sum');
    const t0 = performance.now();
    function tick(now) {
      if (now - t0 < duration) {
        dies[0].textContent = String(Math.floor(Math.random() * 6) + 1);
        dies[1].textContent = String(Math.floor(Math.random() * 6) + 1);
        sumEl.textContent = '?';
        requestAnimationFrame(tick);
      } else {
        dies[0].textContent = String(d1);
        dies[1].textContent = String(d2);
        dies[0].classList.add('combat-die-settled');
        dies[1].classList.add('combat-die-settled');
        sumEl.textContent = String(d1 + d2);
        resolve();
      }
    }
    requestAnimationFrame(tick);
  });
}

function animateCombatDieSingle(container, d, duration) {
  duration = duration == null ? 680 : duration;
  return new Promise(resolve => {
    if (!container) {
      resolve();
      return;
    }
    container.innerHTML = '<div class="combat-dice-single"><span class="combat-die combat-die-lg">1</span></div>';
    const span = container.querySelector('.combat-die');
    const t0 = performance.now();
    function tick(now) {
      if (now - t0 < duration) {
        span.textContent = String(Math.floor(Math.random() * 6) + 1);
        requestAnimationFrame(tick);
      } else {
        span.textContent = String(d);
        span.classList.add('combat-die-settled');
        resolve();
      }
    }
    requestAnimationFrame(tick);
  });
}

function buildRangedSummaryHtml(data) {
  if (data.kind === 'outOfArc') {
    return '<div class="popup-line">射界外（正面隣接3マス方向のみ）</div>';
  }
  if (data.kind === 'invalid') {
    return '<div class="popup-line">射撃を処理できません（射程・武器）</div>';
  }
  let h = `<div class="popup-line">武器: ${escapeHtml(data.weaponLabel)} 射程: ${data.range}</div>`;
  h += `<div class="popup-line">① 命中 2d6=${data.hitRoll}（${data.hitD1}+${data.hitD2}） 必要≤${data.finalHit} → ${data.kind === 'miss' ? '<span class="popup-miss">外れ</span>' : '<span class="popup-hit">命中</span>'}</div>`;
  if (data.kind === 'miss' || data.kind === 'invalid') return h;
  h += `<div class="popup-line">② 命中箇所 ${data.direction} 2d6=${data.locRoll}（${data.locD1}+${data.locD2}）→ <b>${data.hitPart}</b>${appendHitPartLimbRemapHtml(data.hitPart, data.hitPartRaw)}</div>`;
  h += `<div class="popup-line">威力: ${data.basePower}+${data.powerMod}=${data.weaponPower} 装甲: ${data.armor} 差: ${data.diff}</div>`;
  h += `<div class="popup-line">${formatRangedDmgHtml(data.dmgRoll, data.dmgResult)}</div>`;
  return h;
}

/** 観戦用：格闘の出目をテキスト一括（ダイスウィジェットは出さない） */
function buildMeleeSpectatorSummaryBody(data) {
  const modStr = `${data.mod >= 0 ? '+' : ''}${data.mod}`;
  let h =
    `<div class="popup-line">命中 2d6=<b>${data.hitRoll}</b>（${data.hitD1}+${data.hitD2}） 表${data.baseHit}${modStr} 必要≤<b>${data.finalHit}</b> → ${
      data.kind === 'miss' ? '<span class="popup-miss">外れ</span>' : '<span class="popup-hit">命中</span>'
    }</div>`;
  if (data.kind === 'miss') return h;
  const defPosLabel = data.defenseTier === 'ws' ? '武器・盾' : `${MELEE_TIER_LABELS[data.defenseTier]}・${data.defensePart}`;
  const adjNote = data.defParryAdj ? ` 態勢${data.defParryAdj > 0 ? '+' : ''}${data.defParryAdj}` : '';
  h += `<div class="popup-line">受け 2d6=<b>${data.defRoll}</b>（${data.defD1}+${data.defD2}） <b>${defPosLabel}</b>（${data.rowKey}）表<b>${data.defBaseRate}</b>${adjNote} 必要≤<b>${data.defRate}</b> → ${
    data.kind === 'defended' ? '<span class="popup-defend">成功</span>' : '失敗'
  }</div>`;
  if (data.kind === 'defended') {
    if (data.parryStress) h += formatParryEquipmentStressHtml(data.parryStress);
    return h;
  }
  h += `<div class="popup-line">箇所 <b>${data.direction}</b> 2d6=<b>${data.locRoll}</b>（${data.locD1}+${data.locD2}）→ <b>${data.hitPart}</b>${appendHitPartLimbRemapHtml(data.hitPart, data.hitPartRaw)}</div>`;
  let powLine = `威力 ${data.basePower}+${data.powerMod}`;
  if (data.locPowMod) powLine += `${data.locPowMod > 0 ? '+' : ''}${data.locPowMod}(箇所)`;
  powLine += `=<b>${data.totalPower}</b> 装甲 ${data.armor} 差 ${data.diff}`;
  h += `<div class="popup-line">被害 1d6=<b>${data.dmgRoll}</b> ／ ${powLine}</div>`;
  h += formatMeleeDmgExplain(data.dmgResult);
  return h;
}

/** 射撃ポップアップ：命中→箇所→被害を同一スロットに順に差し替え（縦スクロールを避ける） */
function setRangedSeqPhaseSlot(labelText) {
  const slot = document.getElementById('rangedSeqSlot');
  if (!slot) return;
  slot.innerHTML =
    '<div class="ranged-seq-phase">' +
    '<div class="ranged-seq-label">' + labelText + '</div>' +
    '<div id="rangedDiceSlot"></div>' +
    '<div id="rangedOutcomeSlot" class="ranged-seq-outcome"></div>' +
    '</div>';
}

async function runRangedCombatDiceSequence(unit, target, opts) {
  opts = opts || {};
  const autoMs = opts.autoCloseMs > 0 ? opts.autoCloseMs : 0;
  const data = computeRangedResolution(unit, target);

  if (spectatorMode) {
    if (data.kind === 'outOfArc') {
      addLog(unit.team, `${unit.pilot}→${target.pilot}: ${selectedWeapon} 射界外`);
    } else if (data.kind === 'invalid') {
      addLog('system', `${unit.pilot}→${target.pilot}: 射撃不可（射程・武器等）`);
    } else if (data.kind === 'miss') {
      addLog(unit.team, `${unit.pilot}→${target.pilot}: ${selectedWeapon} 外れ`);
      if (typeof DunbainQL !== 'undefined') DunbainQL.registerMiss(unit);
    } else {
      applyDamage(target, data.hitPart, data.dmgResult);
      if (typeof DunbainQL !== 'undefined') DunbainQL.registerCombatOutcome(unit, target, data.dmgResult);
      addLog('hit', `${unit.pilot}→${target.pilot}: ${selectedWeapon} 命中 ${data.hitPart}に${data.dmgResult === 'n' ? '効果なし' : data.dmgResult === 'e' ? '壊滅' : data.dmgResult + 'ダメージ'}`);
    }
    drawMap();
    syncRightPanelUnitStats();
    if (checkVictory()) return;
    finishUnitTurn();
    return;
  }

  const overlay = document.getElementById('popupOverlay');
  const okBtn = document.getElementById('popupOkBtn');
  const pop = document.getElementById('combatPopup');
  const titleEl = document.getElementById('popupTitle');
  const contentEl = document.getElementById('popupContent');

  if (!titleEl || !contentEl) {
    addLog('system', '[内部] 射撃ポップアップDOM欠落 — スキップして次へ進みます');
    finishUnitTurn();
    return;
  }

  if (overlay) overlay.style.pointerEvents = 'none';
  if (okBtn) okBtn.style.display = 'none';
  if (pop) pop.style.display = 'block';
  if (overlay) overlay.style.display = 'block';

  titleEl.textContent = `${unit.pilot}の射撃 → ${target.pilot}`;

  async function rangedPopupDone() {
    if (autoMs > 0) {
      await combatSequenceWait(autoMs);
      closePopup();
    } else {
      if (overlay) overlay.style.pointerEvents = 'auto';
      if (okBtn) okBtn.style.display = 'block';
    }
  }

  function setRangedOutcome(html) {
    const el = document.getElementById('rangedOutcomeSlot');
    if (el) el.innerHTML = html;
  }

  if (data.kind === 'outOfArc') {
    addLog(unit.team, `${unit.pilot}→${target.pilot}: ${selectedWeapon} 射界外`);
    contentEl.innerHTML = buildRangedSummaryHtml(data);
    drawMap();
    syncRightPanelUnitStats();
    await rangedPopupDone();
    return;
  }
  if (data.kind === 'invalid') {
    contentEl.innerHTML = buildRangedSummaryHtml(data);
    drawMap();
    syncRightPanelUnitStats();
    await rangedPopupDone();
    return;
  }

  contentEl.innerHTML =
    '<div class="popup-line ranged-seq-weaponline">武器: <b>' + escapeHtml(data.weaponLabel) + '</b> ／ 射程 <b>' + data.range + '</b></div>' +
    '<div id="rangedSeqSlot"></div>';
  setRangedSeqPhaseSlot('① 命中判定（2d6）');

  await combatSequenceWait(420);
  await animateCombatDicePair(document.getElementById('rangedDiceSlot'), data.hitD1, data.hitD2, 820);

  const modStr = `${data.mod >= 0 ? '+' : ''}${data.mod}`;
  setRangedOutcome(
    `<div class="popup-line">出目 <b>${data.hitD1}+${data.hitD2}=${data.hitRoll}</b> ／ 表${data.baseHit}${modStr}=必要≤<b>${data.finalHit}</b></div>` +
    `<div class="popup-line">${data.kind === 'miss' ? '<span class="popup-miss">外れ</span>' : '<span class="popup-hit">命中</span>'}</div>`
  );

  if (data.kind === 'miss') {
    addLog(unit.team, `${unit.pilot}→${target.pilot}: ${selectedWeapon} 外れ`);
    if (typeof DunbainQL !== 'undefined') DunbainQL.registerMiss(unit);
    await combatSequenceWait(520);
    drawMap();
    syncRightPanelUnitStats();
    await rangedPopupDone();
    return;
  }

  await combatSequenceWait(880);
  setRangedSeqPhaseSlot('② 命中箇所（2d6）');
  await combatSequenceWait(380);
  await animateCombatDicePair(document.getElementById('rangedDiceSlot'), data.locD1, data.locD2, 820);
  setRangedOutcome(
    `<div class="popup-line">攻撃方向 <b>${data.direction}</b> ／ 2d6=<b>${data.locRoll}</b>（${data.locD1}+${data.locD2}）→ 命中箇所 <b>${data.hitPart}</b>${appendHitPartLimbRemapHtml(data.hitPart, data.hitPartRaw)}</div>`
  );

  await combatSequenceWait(880);
  setRangedSeqPhaseSlot('③ 被害判定（1d6）');
  await combatSequenceWait(380);
  await animateCombatDieSingle(document.getElementById('rangedDiceSlot'), data.dmgRoll, 700);
  setRangedOutcome(
    `<div class="popup-line">${formatRangedDmgHtml(data.dmgRoll, data.dmgResult)}</div>` +
    `<div class="popup-line">威力 ${data.basePower}+${data.powerMod}=<b>${data.weaponPower}</b> 装甲 ${data.armor} 差 ${data.diff}</div>`
  );

  applyDamage(target, data.hitPart, data.dmgResult);
  if (typeof DunbainQL !== 'undefined') DunbainQL.registerCombatOutcome(unit, target, data.dmgResult);
  addLog('hit', `${unit.pilot}→${target.pilot}: ${selectedWeapon} 命中 ${data.hitPart}に${data.dmgResult === 'n' ? '効果なし' : data.dmgResult === 'e' ? '壊滅' : data.dmgResult + 'ダメージ'}`);

  await combatSequenceWait(520);

  drawMap();
  syncRightPanelUnitStats();
  await rangedPopupDone();
}

/** 格闘：射撃と同様に同一ポップアップで①命中→②受け→③箇所→④被害を段階表示 */
async function runMeleeCombatDiceSequence(unit, target, opts) {
  opts = opts || {};
  const autoMs = opts.autoCloseMs > 0 ? opts.autoCloseMs : 0;
  const data = computeMeleeResolutionVsAI(unit, target);

  if (spectatorMode) {
    if (data.kind === 'miss') {
      addLog(unit.team, `${unit.pilot}→${target.pilot}: ${data.method} 外れ`);
      if (typeof DunbainQL !== 'undefined') DunbainQL.registerMiss(unit);
    } else {
      applyMeleeResolutionData(unit, target, data);
    }
    drawMap();
    syncRightPanelUnitStats();
    if (checkVictory()) return;
    finishUnitTurn();
    return;
  }

  const overlay = document.getElementById('popupOverlay');
  const okBtn = document.getElementById('popupOkBtn');
  const pop = document.getElementById('combatPopup');
  const titleEl = document.getElementById('popupTitle');
  const contentEl = document.getElementById('popupContent');

  if (!titleEl || !contentEl) {
    addLog('system', '[内部] 格闘ポップアップDOM欠落 — スキップして次へ進みます');
    finishUnitTurn();
    return;
  }

  if (overlay) overlay.style.pointerEvents = 'none';
  if (okBtn) okBtn.style.display = 'none';
  if (pop) pop.style.display = 'block';
  if (overlay) overlay.style.display = 'block';

  titleEl.textContent = `${unit.pilot}の格闘 → ${target.pilot}`;

  function setMeleeOutcome(html) {
    const el = document.getElementById('rangedOutcomeSlot');
    if (el) el.innerHTML = html;
  }

  async function meleePopupDone() {
    if (autoMs > 0) {
      await combatSequenceWait(autoMs);
      closePopup();
    } else {
      if (overlay) overlay.style.pointerEvents = 'auto';
      if (okBtn) okBtn.style.display = 'block';
    }
  }

  const head =
    `<div class="popup-line ranged-seq-weaponline"><b>${MELEE_TIER_LABELS[data.atkTier]}</b>・${escapeHtml(data.method)}${escapeHtml(data.swExtra || '')} 狙い <b>${escapeHtml(data.atkPartDeclared || '—')}</b></div>` +
    '<div id="rangedSeqSlot"></div>';
  contentEl.innerHTML = head;

  setRangedSeqPhaseSlot('① 命中判定（2d6）');
  await combatSequenceWait(420);
  await animateCombatDicePair(document.getElementById('rangedDiceSlot'), data.hitD1, data.hitD2, 820);
  const modStr = `${data.mod >= 0 ? '+' : ''}${data.mod}`;
  setMeleeOutcome(
    `<div class="popup-line">出目 <b>${data.hitD1}+${data.hitD2}=${data.hitRoll}</b> ／ 表${data.baseHit}${modStr}=必要≤<b>${data.finalHit}</b></div>` +
    `<div class="popup-line">${data.kind === 'miss' ? '<span class="popup-miss">外れ</span>' : '<span class="popup-hit">命中</span>'}</div>`
  );

  if (data.kind === 'miss') {
    addLog(unit.team, `${unit.pilot}→${target.pilot}: ${data.method} 外れ`);
    if (typeof DunbainQL !== 'undefined') DunbainQL.registerMiss(unit);
    await combatSequenceWait(520);
    drawMap();
    syncRightPanelUnitStats();
    await meleePopupDone();
    return;
  }

  await combatSequenceWait(880);
  setRangedSeqPhaseSlot('② 受け判定（2d6）');
  await combatSequenceWait(380);
  await animateCombatDicePair(document.getElementById('rangedDiceSlot'), data.defD1, data.defD2, 820);
  const defPosLabel = data.defenseTier === 'ws' ? '武器・盾' : `${MELEE_TIER_LABELS[data.defenseTier]}・${data.defensePart}`;
  setMeleeOutcome(
    `<div class="popup-line">守り <b>${defPosLabel}</b>（${data.rowKey}） 表<b>${data.defBaseRate}</b>${data.defParryAdj ? ` 態勢${data.defParryAdj > 0 ? '+' : ''}${data.defParryAdj}` : ''} 必要≤<b>${data.defRate}</b></div>` +
    `<div class="popup-line">2d6=<b>${data.defRoll}</b>（${data.defD1}+${data.defD2}）→ ${data.kind === 'defended' ? '<span class="popup-defend">受け成功</span>' : '受け失敗 → 被害へ'}</div>`
  );

  if (data.kind === 'defended') {
    applyMeleeResolutionData(unit, target, data);
    const slot = document.getElementById('rangedOutcomeSlot');
    if (slot && data.parryStress) slot.innerHTML += formatParryEquipmentStressHtml(data.parryStress);
    await combatSequenceWait(620);
    drawMap();
    syncRightPanelUnitStats();
    await meleePopupDone();
    return;
  }

  await combatSequenceWait(880);
  if (data.locAimRoll <= 4) {
    setRangedSeqPhaseSlot('③ 命中箇所（狙い判定1d6）');
    await combatSequenceWait(380);
    await animateCombatDieSingle(document.getElementById('rangedDiceSlot'), data.locAimRoll, 700);
    setMeleeOutcome(
      `<div class="popup-line">狙い判定 1d6=<b>${data.locAimRoll}</b>（≤4）→ 狙い通り <b>${data.hitPart}</b></div>`
    );
  } else {
    setRangedSeqPhaseSlot('③ 命中箇所（狙い外れ→判定表2d6）');
    await combatSequenceWait(380);
    await animateCombatDicePair(document.getElementById('rangedDiceSlot'), data.locD1, data.locD2, 820);
    setMeleeOutcome(
      `<div class="popup-line">狙い判定 1d6=<b>${data.locAimRoll}</b>（≥5）→ 命中箇所判定表</div>` +
      `<div class="popup-line">攻撃方向 <b>${data.direction}</b> ／ 2d6=<b>${data.locRoll}</b>（${data.locD1}+${data.locD2}）→ <b>${data.hitPart}</b>${appendHitPartLimbRemapHtml(data.hitPart, data.hitPartRaw)}</div>`
    );
  }

  await combatSequenceWait(880);
  setRangedSeqPhaseSlot('④ 被害判定（1d6）');
  await combatSequenceWait(380);
  await animateCombatDieSingle(document.getElementById('rangedDiceSlot'), data.dmgRoll, 700);
  let powLine = `威力 ${data.basePower}+${data.powerMod}`;
  if (data.locPowMod) powLine += `${data.locPowMod > 0 ? '+' : ''}${data.locPowMod}(箇所)`;
  powLine += `=<b>${data.totalPower}</b> 装甲 ${data.armor} 差 ${data.diff}`;
  setMeleeOutcome(
    `<div class="popup-line">1d6=<b>${data.dmgRoll}</b></div>` +
    `<div class="popup-line">${powLine}</div>` +
    formatMeleeDmgExplain(data.dmgResult)
  );

  applyMeleeResolutionData(unit, target, data);

  await combatSequenceWait(520);
  drawMap();
  syncRightPanelUnitStats();
  await meleePopupDone();
}

function playProjectileShotAnimation(shooter, target, onDone) {
  const fx = document.getElementById('fxSvg');
  const mapSvg = document.getElementById('mapSvg');
  if (!fx || !mapSvg || typeof onDone !== 'function') {
    if (typeof onDone === 'function') onDone();
    return;
  }
  const vb = mapSvg.getAttribute('viewBox');
  if (vb) fx.setAttribute('viewBox', vb);

  const c0 = hexCenter(shooter.x, shooter.y);
  const c1 = hexCenter(target.x, target.y);
  let dx = c1.x - c0.x;
  let dy = c1.y - c0.y;
  let len = Math.hypot(dx, dy);
  if (len < 0.5) len = 0.5;
  dx /= len;
  dy /= len;
  const pad0 = hexSize * 0.42;
  const pad1 = hexSize * 0.38;
  const x0 = c0.x + dx * pad0;
  const y0 = c0.y + dy * pad0;
  const x1 = c1.x - dx * pad1;
  const y1 = c1.y - dy * pad1;

  const NS = 'http://www.w3.org/2000/svg';
  fx.innerHTML = '';
  const defs = document.createElementNS(NS, 'defs');
  const fil = document.createElementNS(NS, 'filter');
  fil.setAttribute('id', 'projShotGlow');
  fil.setAttribute('x', '-80%');
  fil.setAttribute('y', '-80%');
  fil.setAttribute('width', '260%');
  fil.setAttribute('height', '260%');
  const blur = document.createElementNS(NS, 'feGaussianBlur');
  blur.setAttribute('stdDeviation', '2.2');
  blur.setAttribute('result', 'blur');
  const merge = document.createElementNS(NS, 'feMerge');
  const mn1 = document.createElementNS(NS, 'feMergeNode');
  mn1.setAttribute('in', 'blur');
  const mn2 = document.createElementNS(NS, 'feMergeNode');
  mn2.setAttribute('in', 'SourceGraphic');
  merge.appendChild(mn1);
  merge.appendChild(mn2);
  fil.appendChild(blur);
  fil.appendChild(merge);
  defs.appendChild(fil);
  fx.appendChild(defs);

  const trail = document.createElementNS(NS, 'line');
  trail.setAttribute('stroke', 'rgba(255, 210, 100, 0.55)');
  trail.setAttribute('stroke-width', '5');
  trail.setAttribute('stroke-linecap', 'round');
  const bullet = document.createElementNS(NS, 'circle');
  bullet.setAttribute('r', '7');
  bullet.setAttribute('fill', '#ffe566');
  bullet.setAttribute('stroke', '#cc5500');
  bullet.setAttribute('stroke-width', '1.5');
  bullet.setAttribute('filter', 'url(#projShotGlow)');
  fx.appendChild(trail);
  fx.appendChild(bullet);

  const dur = 520;
  const t0 = performance.now();
  function easeOutQuad(t) {
    return 1 - (1 - t) * (1 - t);
  }
  function tick(now) {
    const vbNow = mapSvg.getAttribute('viewBox');
    if (vbNow) fx.setAttribute('viewBox', vbNow);
    const t = Math.min(1, (now - t0) / dur);
    const u = easeOutQuad(t);
    const x = x0 + (x1 - x0) * u;
    const y = y0 + (y1 - y0) * u;
    bullet.setAttribute('cx', x);
    bullet.setAttribute('cy', y);
    trail.setAttribute('x1', x0);
    trail.setAttribute('y1', y0);
    trail.setAttribute('x2', x);
    trail.setAttribute('y2', y);
    if (t < 1) requestAnimationFrame(tick);
    else {
      fx.innerHTML = '';
      onDone();
    }
  }
  requestAnimationFrame(tick);
}

/** 格闘発生の簡易演出：攻撃者→標的のライン＋標的上の短いクロス（モーダルなし） */
function playMeleeClashAnimation(attacker, target, onDone) {
  const fx = document.getElementById('fxSvg');
  const mapSvg = document.getElementById('mapSvg');
  if (!fx || !mapSvg || typeof onDone !== 'function') {
    if (typeof onDone === 'function') onDone();
    return;
  }
  const vb = mapSvg.getAttribute('viewBox');
  if (vb) fx.setAttribute('viewBox', vb);

  const cA = hexCenter(attacker.x, attacker.y);
  const cT = hexCenter(target.x, target.y);
  const NS = 'http://www.w3.org/2000/svg';
  fx.innerHTML = '';

  const link = document.createElementNS(NS, 'line');
  link.setAttribute('x1', String(cA.x));
  link.setAttribute('y1', String(cA.y));
  link.setAttribute('x2', String(cT.x));
  link.setAttribute('y2', String(cT.y));
  link.setAttribute('stroke', 'rgba(255, 200, 120, 0.9)');
  link.setAttribute('stroke-width', '5');
  link.setAttribute('stroke-linecap', 'round');
  fx.appendChild(link);

  const sz = hexSize * 0.52;
  const xSlash1 = document.createElementNS(NS, 'line');
  xSlash1.setAttribute('x1', String(cT.x - sz));
  xSlash1.setAttribute('y1', String(cT.y - sz * 0.85));
  xSlash1.setAttribute('x2', String(cT.x + sz));
  xSlash1.setAttribute('y2', String(cT.y + sz * 0.85));
  xSlash1.setAttribute('stroke', '#fff8e6');
  xSlash1.setAttribute('stroke-width', '3.2');
  xSlash1.setAttribute('stroke-linecap', 'round');
  const xSlash2 = document.createElementNS(NS, 'line');
  xSlash2.setAttribute('x1', String(cT.x - sz));
  xSlash2.setAttribute('y1', String(cT.y + sz * 0.85));
  xSlash2.setAttribute('x2', String(cT.x + sz));
  xSlash2.setAttribute('y2', String(cT.y - sz * 0.85));
  xSlash2.setAttribute('stroke', 'rgba(255, 140, 50, 0.95)');
  xSlash2.setAttribute('stroke-width', '3.2');
  xSlash2.setAttribute('stroke-linecap', 'round');
  fx.appendChild(xSlash1);
  fx.appendChild(xSlash2);

  const dur = 400;
  const t0 = performance.now();
  function tick(now) {
    const vbNow = mapSvg.getAttribute('viewBox');
    if (vbNow) fx.setAttribute('viewBox', vbNow);
    const t = Math.min(1, (now - t0) / dur);
    const op = 1 - t;
    link.setAttribute('opacity', String(op));
    link.setAttribute('stroke-width', String(5 * (1 - t * 0.55)));
    xSlash1.setAttribute('opacity', String(op));
    xSlash2.setAttribute('opacity', String(op));
    if (t < 1) requestAnimationFrame(tick);
    else {
      fx.innerHTML = '';
      onDone();
    }
  }
  requestAnimationFrame(tick);
}

function fireAt(targetId) {
  const unit = getActiveUnit();
  const target = units.find(u => u.id === targetId);
  if (!unit || !target) return;
  if (rangedShotInProgress) return;
  rangedShotInProgress = true;

  document.getElementById('combatPanel').style.display = 'none';
  hideMapHud();

  playProjectileShotAnimation(unit, target, () => {
    const u = getActiveUnit();
    const t = units.find(x => x.id === targetId);
    if (!u || !t || u.status !== 'alive') {
      drawMap();
      showPopup('射撃', '<div class="popup-line">攻撃者または対象が無効のため処理をスキップしました。</div>');
      return;
    }
    (async () => {
      await runRangedCombatDiceSequence(u, t);
    })();
  });
}

function skipRanged() {
  document.getElementById('combatPanel').style.display = 'none';
  hideMapHud();
  addLog('system', `${getActiveUnit().pilot}: 射撃なし`);
  finishUnitTurn();
}

// ===== 格闘: 段→攻撃方法→目標（受けは DEFENSE_TABLE）=====
const MELEE_TIER_LABELS = { high: '上段', mid: '中段', low: '下段' };
const MELEE_TIER_PARTS = {
  high: ['頭', '手', '胴'],
  mid: ['胴', 'コクピット', '手'],
  low: ['胴', '手', '足'],
};

function getDefenseTableRowKey(attackTier, attackPart, defenseTier, defensePart) {
  const sameTier = attackTier === defenseTier;
  const noAtkPart = attackPart == null || attackPart === '';
  if (noAtkPart) {
    return sameTier ? '同位置異箇所' : '異位置異箇所';
  }
  const samePart = attackPart === defensePart;
  if (sameTier && samePart) return '同位置同箇所';
  if (sameTier && !samePart) return '同位置異箇所';
  if (!sameTier && samePart) return '異位置同箇所';
  return '異位置異箇所';
}

/** 格闘で攻撃せず受け専念した場合の受け判定ボーナス／攻撃も行った場合のペナルティ */
const MELEE_PARRY_DEFENSE_ONLY_BONUS = 3;
const MELEE_PARRY_ATTACKING_PENALTY = -2;

function meleeParryStanceMod(defender) {
  const s = defender && defender.meleeParryStance;
  if (s === 'defense_only') return MELEE_PARRY_DEFENSE_ONLY_BONUS;
  if (s === 'attacked') return MELEE_PARRY_ATTACKING_PENALTY;
  return 0;
}

function defenseRateForRow(defender, rowKey) {
  const row = DEFENSE_TABLE[rowKey];
  if (!row) return 6;
  const k = String(defender.effectivePower || 'g').toLowerCase();
  return row[k] != null ? row[k] : 6;
}

/** 2d6≦必要値。表値＋態勢修正（受け専念+3／攻撃選択-2）、2〜12に丸め */
function effectiveMeleeDefenseNeed(defender, rowKey) {
  const base = defenseRateForRow(defender, rowKey);
  const adj = meleeParryStanceMod(defender);
  return Math.max(2, Math.min(12, base + adj));
}

function attemptDefenseRollWithRow(defender, rowKey) {
  const baseRate = defenseRateForRow(defender, rowKey);
  const stanceMod = meleeParryStanceMod(defender);
  const need = effectiveMeleeDefenseNeed(defender, rowKey);
  const roll = roll2d6();
  const success = roll <= need;
  let modNote = '';
  if (stanceMod !== 0) {
    modNote = ` 態勢${stanceMod > 0 ? '+' : ''}${stanceMod}`;
  }
  const html = `<div class="popup-line">受け率表「${rowKey}」 表${baseRate}${modNote}→必要≤${need}｜2d6=${roll}｜${success ? '<span class="popup-defend">受け成功</span>' : '受け失敗'}</div>`;
  return { success, html, defRate: need, baseRate, stanceMod, roll };
}

/**
 * 「武器・盾」受け成功時：剣または盾への負担は被害表を参照（威力・装甲は表示用）。
 * 剣・盾は威力−装甲を常に0として被害判定行を選ぶ。
 * 剣に数値ダメージが出た後、追加1d6で1なら剣落下（swordDisarmed。再装備はルールで別途実装するまで維持）。
 */
function parryAbsorbingEquipmentPart(defender) {
  if (!defender) return null;
  if (unitHasMeleeSwordWeapon(defender)) return '剣';
  if (unitHasOperationalShield(defender)) return '盾';
  return null;
}

function rollParryEquipmentStress(attacker, defender, method) {
  const part = parryAbsorbingEquipmentPart(defender);
  if (!part || !defender.durability || defender.durability[part] === undefined) return null;
  const basePower = MELEE_POWER[method] ? MELEE_POWER[method][attacker.effectivePower] : 0;
  const powerMod = POWER_DAMAGE_MOD[attacker.effectivePower] || 0;
  const locPowMod = getMeleeLocationPowerMod(method, part);
  const totalPower = basePower + powerMod + locPowMod;
  const armor = getArmor(defender.machine, part);
  const rawDiff = totalPower - armor;
  const diff = 0;
  const dmgRoll = roll1d6();
  const dmgKey = getDamageKey(diff);
  const dmgResult = DAMAGE_TABLE[dmgKey] ? DAMAGE_TABLE[dmgKey][dmgRoll - 1] : 'n';
  let dropRoll = null;
  if (part === '剣' && dmgResult !== 'n' && dmgResult !== 'e') {
    const nd = parseInt(dmgResult, 10);
    if (!isNaN(nd) && nd > 0) dropRoll = roll1d6();
  }
  const dropped = part === '剣' && dropRoll === 1;
  return {
    part, basePower, powerMod, locPowMod, totalPower, armor, diff, rawDiff,
    dmgRoll, dmgResult, dropRoll, dropped,
  };
}

function applyParryEquipmentDamageResult(target, part, result) {
  if (!target || !part || result === 'n') return;
  if (target.durability[part] === undefined) return;
  if (result === 'e') {
    target.durability[part] = 0;
    target.destroyed[part] = true;
    addLog('damage', `${target.pilot}: ${part}が受けで大損（使用不能）`);
    refreshInspectPanelIfOpen();
    return;
  }
  const dmg = parseInt(result, 10) || 0;
  if (dmg <= 0) return;
  target.pilotCumulativeDamage = (target.pilotCumulativeDamage || 0) + dmg;
  target.durability[part] = Math.max(0, target.durability[part] - dmg);
  if (target.durability[part] <= 0) {
    target.destroyed[part] = true;
    addLog('damage', `${target.pilot}: ${part}破壊（受け）!`);
  }
  refreshInspectPanelIfOpen();
}

function applyParryEquipmentStressAfterRoll(defender, stress) {
  if (!stress || !defender) return;
  applyParryEquipmentDamageResult(defender, stress.part, stress.dmgResult);
  if (stress.dropped) {
    defender.swordDisarmed = true;
    addLog('system', `${defender.pilot}: 剣を落とした（落下判定1d6=${stress.dropRoll}）`);
  }
}

function formatParryEquipmentStressHtml(stress) {
  if (!stress) return '';
  let h = `<div class="popup-line">受け装備（<b>${stress.part}</b>）負担: 威力 ${stress.basePower}+${stress.powerMod}`;
  if (stress.locPowMod) h += `${stress.locPowMod > 0 ? '+' : ''}${stress.locPowMod}(箇所)`;
  h += `=<b>${stress.totalPower}</b> 装甲<b>${stress.armor}</b>（実差${stress.rawDiff}） 被害表は<b>差0</b>扱い ／ 被害1d6=<b>${stress.dmgRoll}</b>→<b>${stress.dmgResult}</b></div>`;
  if (stress.part === '剣' && stress.dropRoll != null) {
    h += `<div class="popup-line">剣落下追加1d6=<b>${stress.dropRoll}</b>${stress.dropped ? ' → <span class="popup-damage">剣を落とす</span>' : '（保持）'}</div>`;
  }
  return h;
}

// ===== 格闘フェイズ =====
function startMeleePhase(unit) {
  currentPhase = 'MELEE';
  updateTopBar();
  document.getElementById('combatPanel').style.display = 'none';

  if (!hasAnyMeleeTarget(unit)) {
    addLog('system', `${unit.pilot}: 格闘可能な敵がいない`);
    hideMapHud();
    finishUnitTurn();
    return;
  }

  selectedMeleeTier = null;
  selectedMeleeMethod = null;
  selectedMeleeAttackPart = null;
  selectedSwordSide = null;
  unit.meleeParryStance = null;

  const panel = document.getElementById('mapHudPanel');
  panel.classList.remove('map-hud-ranged-phase');
  showMapHud();
  panel.innerHTML = `
    <div class="combat-title">${meleeUsesSwordArc(unit) ? '格闘（剣：斬り・突き・左／右届き）' : '格闘攻撃（体術・柄打ち）'}</div>
    <div id="meleeWizardHint" style="color:#888;font-size:11px;margin-bottom:6px;line-height:1.4;"></div>
    <div id="meleeStepTiers" style="margin-bottom:6px;"></div>
    <div id="meleeStepParts" style="margin-bottom:6px;"></div>
    <div id="meleeStepMethods" style="margin-bottom:6px;"></div>
    <div id="meleeTargetList" style="margin-top:8px;"></div>
    <button class="action-btn" style="margin-top:8px;" onclick="skipMelee()">格闘しない</button>
  `;
  if (meleeUsesSwordArc(unit)) {
    meleeRenderSwordSideStep(unit);
  } else {
    meleeRenderTierStep(unit);
  }
  queueMapHudReposition();
}

function meleeRenderSwordSideStep(unit) {
  document.getElementById('meleeWizardHint').innerHTML = '<b>1.</b> <b>剣 左／右</b>（届くヘクスが異なる）';
  const html = `
    <button type="button" class="weapon-btn" onclick="meleeSelectSwordSide('left')">左</button>
    <button type="button" class="weapon-btn" onclick="meleeSelectSwordSide('right')">右</button>
    <div style="width:100%;margin-top:8px;">
      <button type="button" class="action-btn" style="width:100%;" onclick="meleeCommitParryOnly()">受け専念（攻撃しない・受け判定+${MELEE_PARRY_DEFENSE_ONLY_BONUS}）</button>
    </div>
  `;
  document.getElementById('meleeStepTiers').innerHTML = html;
  document.getElementById('meleeStepParts').innerHTML = '';
  document.getElementById('meleeStepMethods').innerHTML = '';
  document.getElementById('meleeTargetList').innerHTML = '';
  queueMapHudReposition();
}

function meleeSelectSwordSide(side) {
  selectedSwordSide = side;
  meleeRenderTierStep(getActiveUnit());
}

function meleeRenderTierStep(unit) {
  const n = unit && meleeUsesSwordArc(unit) ? '2.' : '1.';
  document.getElementById('meleeWizardHint').innerHTML = `<b>${n}</b> <b>段</b>（上段・中段・下段）`;
  let html = '';
  ['high', 'mid', 'low'].forEach(key => {
    html += `<button type="button" class="weapon-btn" onclick="meleeSelectTier('${key}')">${MELEE_TIER_LABELS[key]}</button>`;
  });
  if (!meleeUsesSwordArc(unit)) {
    html += `<div style="width:100%;margin-top:8px;"><button type="button" class="action-btn" style="width:100%;" onclick="meleeCommitParryOnly()">受け専念（攻撃しない・受け判定+${MELEE_PARRY_DEFENSE_ONLY_BONUS}）</button></div>`;
  }
  document.getElementById('meleeStepTiers').innerHTML = html;
  document.getElementById('meleeStepParts').innerHTML = '';
  document.getElementById('meleeStepMethods').innerHTML = '';
  document.getElementById('meleeTargetList').innerHTML = '';
  queueMapHudReposition();
}

/** 剣届きあり＝斬・突・柄打ち・蹴り中心。非剣武装は体術・柄打ちのみ（斬・突は不可） */
function meleeMethodsForUnit(unit) {
  if (meleeUsesSwordArc(unit)) return ['斬る', '突く', '武器で殴る', '蹴る'];
  return ['殴る', '蹴る', '武器で殴る'];
}

function meleeSelectTier(tierKey) {
  const unit = getActiveUnit();
  if (!unit) return;
  selectedMeleeTier = tierKey;
  selectedMeleeAttackPart = null;
  selectedMeleeMethod = null;
  meleeRenderAttackPartStep(unit);
}

function meleeRenderAttackPartStep(unit) {
  const sn = meleeUsesSwordArc(unit) ? '3.' : '2.';
  document.getElementById('meleeWizardHint').innerHTML =
    `<b>${sn}</b> <b>攻撃箇所</b>（${MELEE_TIER_LABELS[selectedMeleeTier]}で狙う1部位・受け率表の同異に使用）`;
  const parts = MELEE_TIER_PARTS[selectedMeleeTier] || [];
  let html = '';
  parts.forEach(p => {
    html += `<button type="button" class="weapon-btn" onclick="meleeSelectAttackPart('${p}')">${p}</button>`;
  });
  document.getElementById('meleeStepParts').innerHTML = html;
  document.getElementById('meleeStepMethods').innerHTML = '';
  document.getElementById('meleeTargetList').innerHTML = '';
  queueMapHudReposition();
}

function meleeSelectAttackPart(partKey) {
  selectedMeleeAttackPart = partKey;
  meleeRenderMethodStep(getActiveUnit());
}

function meleeRenderMethodStep(unit) {
  if (!unit) return;
  const mn = meleeUsesSwordArc(unit) ? '4.' : '3.';
  document.getElementById('meleeWizardHint').innerHTML =
    `<b>${mn}</b> <b>攻撃方法</b>（${MELEE_TIER_LABELS[selectedMeleeTier]}・狙い<b>${selectedMeleeAttackPart}</b>）<br><span style="color:#888;">攻撃を選ぶとこのターンは受け判定に${MELEE_PARRY_ATTACKING_PENALTY}（命中後も2d6で失敗しうる）</span>`;
  const methods = meleeMethodsForUnit(unit);
  let html = '';
  methods.forEach(m => {
    html += `<button type="button" class="weapon-btn" onclick="meleeSelectMethod('${m}',event)">${m}</button>`;
  });
  document.getElementById('meleeStepMethods').innerHTML = html;
  document.getElementById('meleeTargetList').innerHTML = '';
  queueMapHudReposition();
}

function meleeCommitParryOnly() {
  const unit = getActiveUnit();
  if (!unit || currentPhase !== 'MELEE') return;
  if (!hasAnyMeleeTarget(unit)) return;
  unit.meleeParryStance = 'defense_only';
  addLog(unit.team, `${unit.pilot}: 格闘は攻撃せず受け専念（受け判定+${MELEE_PARRY_DEFENSE_ONLY_BONUS}）`);
  hideMapHud();
  finishUnitTurn();
}

function meleeSelectMethod(method, ev) {
  selectedMeleeMethod = method;
  const unit = getActiveUnit();
  if (!unit || !selectedMeleeTier || !selectedMeleeAttackPart) return;
  const n = meleeUsesSwordArc(unit) ? '5.' : '4.';
  document.getElementById('meleeWizardHint').innerHTML =
    `<b>${n}</b> <b>目標</b>（${MELEE_TIER_LABELS[selectedMeleeTier]}・狙い${selectedMeleeAttackPart}・${method}）`;
  const inMeleeReach = u => {
    if (!meleeUsesSwordArc(unit)) return hexDistance(unit.x, unit.y, u.x, u.y) === 1;
    return selectedSwordSide && isInSwordRange(unit, u, selectedSwordSide);
  };
  const adjacentEnemies = units.filter(u => u.team !== unit.team && u.status === 'alive' && inMeleeReach(u));
  const tgtLabel = meleeUsesSwordArc(unit) ? '剣の届くヘクス内:' : '隣接敵:';
  let html = `<div style="color:#888;font-size:11px;margin-bottom:4px;">${tgtLabel}</div>`;
  adjacentEnemies.forEach(e => {
    html += `<button class="target-btn" onclick="meleeAttack(${e.id})">${e.pilot}(${e.machine})</button>`;
  });
  if (!adjacentEnemies.length) {
    html += `<div style="color:#888;padding:4px 0;">${meleeUsesSwordArc(unit) ? '剣の届くヘクス内に敵なし' : '隣接敵なし'}</div>`;
  }
  document.getElementById('meleeTargetList').innerHTML = html;
  document.querySelectorAll('#meleeStepMethods .weapon-btn').forEach(b => b.classList.remove('selected'));
  const t = ev && ev.target;
  if (t) t.classList.add('selected');
  queueMapHudReposition();
}

function meleeAttack(targetId) {
  const unit = getActiveUnit();
  const target = units.find(u => u.id === targetId);
  if (!unit || !target || !selectedMeleeMethod || !selectedMeleeTier || !selectedMeleeAttackPart) return;
  if (meleeUsesSwordArc(unit)) {
    if (!selectedSwordSide || !isInSwordRange(unit, target, selectedSwordSide)) return;
  }
  unit.meleeParryStance = 'attacked';
  hideMapHud();
  if (spectatorMode || (isPlayerUnit(unit) && !isPlayerUnit(target))) {
    void (async () => {
      await new Promise(r => playMeleeClashAnimation(unit, target, r));
      await runMeleeCombatDiceSequence(unit, target, { autoCloseMs: 0 });
    })();
    return;
  }
  meleeResolveVsTarget(unit, target, {});
}

function meleeResolveVsTarget(unit, target, meleeOpts) {
  meleeOpts = meleeOpts || {};
  const ac = meleeOpts.autoCloseMs > 0 ? meleeOpts.autoCloseMs : 0;
  const isAIAttacker = !isPlayerUnit(unit);
  const missAutoMs = isAIAttacker ? (ac || 2800) : 0;

  const method = selectedMeleeMethod;
  const atkTier = selectedMeleeTier;
  const atkPart = selectedMeleeAttackPart || '';
  const pw = String(unit.effectivePower || 'g').toLowerCase();
  const tw = String(target.effectivePower || 'g').toLowerCase();
  const baseHit = MELEE_HIT[method] ? MELEE_HIT[method][pw] : 0;
  const { mod, posMod, shooterMod, evadeMod, actionMod } = computeMeleeHitMods(unit, target);
  const finalHit = baseHit + mod;
  const roll = roll2d6();
  const hit = roll <= finalHit;

  let popupHtml = '';
  const sw = meleeUsesSwordArc(unit) && selectedSwordSide ? (selectedSwordSide === 'left' ? '・左' : '・右') : '';
  popupHtml += `<div class="popup-line">${MELEE_TIER_LABELS[atkTier]}・${method}${sw} 狙い<b>${atkPart}</b></div>`;
  popupHtml += `<div class="popup-line">命中: 表${baseHit} ＋修正(射手${shooterMod >= 0 ? '+' : ''}${shooterMod} 回避${evadeMod >= 0 ? '+' : ''}${evadeMod} 行動${actionMod >= 0 ? '+' : ''}${actionMod}${posMod ? ` 位置${posMod >= 0 ? '+' : ''}${posMod}` : ''})=<b>必要≤${finalHit}</b></div>`;
  popupHtml += `<div class="popup-line">2d6=${roll}｜${hit ? '<span class="popup-hit">命中</span>' : '<span class="popup-miss">外れ</span>'}</div>`;

  if (!hit) {
    addLog(unit.team, `${unit.pilot}→${target.pilot}: ${method} 外れ`);
    showPopup(`${unit.pilot}の格闘`, popupHtml, missAutoMs);
    hideMapHud();
    return;
  }

  // 非相互格闘 or 先攻攻撃時は受けUIなし → 直接ダメージ判定
  if (unit._noDefenseMelee || target._noDefenseMelee) {
    popupHtml += resolveMeleeDamage(unit, target, method, atkTier, atkPart);
    showPopup(`${unit.pilot}の格闘`, popupHtml, isAIAttacker ? (ac || 2800) : 0);
    hideMapHud();
    return;
  }

  pendingDefense = {
    attacker: unit,
    target,
    method,
    popupHtml,
    attackTier: atkTier,
    attackPart: atkPart,
    defensePhase: 'tier',
    defenseTier: null,
    defensePart: null,
  };
  showDefenseChoice(target, unit);
}

/** 格闘受け「武器・盾」表：剣系が使えるか、または盾耐久を持つ機体で盾が有効なとき */
function defenderCanWeaponParry(u) {
  if (!u) return false;
  if (unitHasMeleeSwordWeapon(u)) return true;
  return unitHasOperationalShield(u);
}

function unitHasOperationalShield(u) {
  if (!u || !u.maxDurability || u.maxDurability['盾'] == null) return false;
  if (u.destroyed && u.destroyed['盾']) return false;
  return (u.durability && u.durability['盾'] || 0) > 0;
}

function defensePickWeaponShield() {
  if (!pendingDefense) return;
  pendingDefense.defensePhase = 'confirm_ws';
  defenseRenderDynamic();
}

function defenseRenderDynamic() {
  const el = document.getElementById('defenseDynamic');
  const p = pendingDefense;
  if (!el || !p) return;
  if (p.defensePhase === 'confirm_ws') {
    const baseWs = defenseRateForRow(p.target, '武器・盾');
    const adjWs = meleeParryStanceMod(p.target);
    const needWs = effectiveMeleeDefenseNeed(p.target, '武器・盾');
    const adjWsNote = adjWs !== 0 ? ` 態勢<b>${adjWs > 0 ? '+' : ''}${adjWs}</b>` : '';
    el.innerHTML = `
      <div style="margin-bottom:8px;line-height:1.45;">
        ${p.target.pilot}: <b>武器・盾</b>で受ける（剣・盾での受け）<br>
        <span style="color:#8cf;">受け率表「武器・盾」表<b>${baseWs}</b>${adjWsNote} → 必要≤<b>${needWs}</b>（2d6で照合）</span>
      </div>
      <div class="defense-btns">
        <button type="button" style="background:#48c;color:#fff;flex:1;padding:10px;border:none;border-radius:4px;cursor:pointer;" onclick="defenseExecuteRoll()">受けを試みる</button>
        <button type="button" style="background:#555;color:#eee;flex:1;padding:10px;border:none;border-radius:4px;cursor:pointer;" onclick="skipDefense()">受けない</button>
      </div>
      <button type="button" class="action-btn" style="margin-top:10px;" onclick="defenseBackToTier()">段選択に戻る</button>
    `;
    return;
  }
  if (p.defensePhase === 'tier') {
    const ws = defenderCanWeaponParry(p.target)
      ? `<button type="button" class="weapon-btn" style="margin-top:10px;width:100%;" onclick="defensePickWeaponShield()">武器・盾で受ける（剣／盾・表「武器・盾」）</button>`
      : '';
    el.innerHTML = `
      <div style="color:#aaa;margin-bottom:8px;">${p.target.pilot}: 受け — 守る<b>段</b>を選ぶ（受け率表は攻撃の段と、守る段・部位の組み合わせ）</div>
      <div style="display:flex;flex-wrap:wrap;gap:4px;">
        <button type="button" class="weapon-btn" onclick="defensePickTier('high')">上段</button>
        <button type="button" class="weapon-btn" onclick="defensePickTier('mid')">中段</button>
        <button type="button" class="weapon-btn" onclick="defensePickTier('low')">下段</button>
      </div>
      ${ws}
      <button type="button" class="action-btn" style="margin-top:10px;" onclick="skipDefense()">受けない（ダメージへ）</button>
    `;
    return;
  }
  if (p.defensePhase === 'part') {
    const parts = MELEE_TIER_PARTS[p.defenseTier] || [];
    let btns = '';
    parts.forEach(part => {
      btns += `<button type="button" class="weapon-btn" onclick="defensePickPart('${part}')">${part}</button>`;
    });
    el.innerHTML = `
      <div style="color:#aaa;margin-bottom:8px;">守り: <b>${MELEE_TIER_LABELS[p.defenseTier]}</b> — <b>部位</b>を選ぶ</div>
      <div style="display:flex;flex-wrap:wrap;gap:4px;">${btns}</div>
      <button type="button" class="action-btn" style="margin-top:8px;" onclick="defenseBackToTier()">段に戻る</button>
    `;
    return;
  }
  if (p.defensePhase === 'confirm') {
    const rowKey = getDefenseTableRowKey(p.attackTier, p.attackPart, p.defenseTier, p.defensePart);
    const baseR = defenseRateForRow(p.target, rowKey);
    const adjR = meleeParryStanceMod(p.target);
    const needR = effectiveMeleeDefenseNeed(p.target, rowKey);
    const adjRNote = adjR !== 0 ? ` 態勢<b>${adjR > 0 ? '+' : ''}${adjR}</b>` : '';
    el.innerHTML = `
      <div style="margin-bottom:8px;line-height:1.45;">
        攻撃: ${MELEE_TIER_LABELS[p.attackTier]}・狙い<b>${p.attackPart || '—'}</b><br>
        守り: ${MELEE_TIER_LABELS[p.defenseTier]}・${p.defensePart}<br>
        <span style="color:#8cf;">受け率表「${rowKey}」表<b>${baseR}</b>${adjRNote} → 必要≤<b>${needR}</b>（2d6で照合）</span>
      </div>
      <div class="defense-btns">
        <button type="button" style="background:#48c;color:#fff;flex:1;padding:10px;border:none;border-radius:4px;cursor:pointer;" onclick="defenseExecuteRoll()">受けを試みる</button>
        <button type="button" style="background:#555;color:#eee;flex:1;padding:10px;border:none;border-radius:4px;cursor:pointer;" onclick="skipDefense()">受けない</button>
      </div>
    `;
  }
}

function defenseBackToTier() {
  if (!pendingDefense) return;
  pendingDefense.defensePhase = 'tier';
  pendingDefense.defenseTier = null;
  pendingDefense.defensePart = null;
  defenseRenderDynamic();
}

function defensePickTier(tierKey) {
  if (!pendingDefense) return;
  pendingDefense.defenseTier = tierKey;
  pendingDefense.defensePart = null;
  pendingDefense.defensePhase = 'part';
  defenseRenderDynamic();
}

function defensePickPart(part) {
  if (!pendingDefense) return;
  pendingDefense.defensePart = part;
  pendingDefense.defensePhase = 'confirm';
  defenseRenderDynamic();
}

function showDefenseChoice(defender, attacker) {
  hideMapHud();
  document.getElementById('defensePanel').style.display = 'block';
  defenseRenderDynamic();
}

function defenseExecuteRoll() {
  document.getElementById('defensePanel').style.display = 'none';
  if (!pendingDefense) return;
  if (pendingDefense.defensePhase === 'confirm_ws') {
    const { attacker, target, method, popupHtml } = pendingDefense;
    const defResult = attemptDefenseRollWithRow(target, '武器・盾');
    let fullHtml = popupHtml + defResult.html;
    if (!defResult.success) {
      fullHtml += resolveMeleeDamage(attacker, target, method, pendingDefense.attackTier, pendingDefense.attackPart);
    } else {
      const stress = rollParryEquipmentStress(attacker, target, method);
      fullHtml += formatParryEquipmentStressHtml(stress);
      if (stress) applyParryEquipmentStressAfterRoll(target, stress);
      addLog('defend', `${target.pilot}: 受け成功（武器・盾）`);
    }
    showPopup(`${attacker.pilot}の格闘`, fullHtml);
    pendingDefense = null;
    return;
  }
  if (pendingDefense.defensePhase !== 'confirm' || !pendingDefense.defensePart) return;
  const { attacker, target, method, popupHtml } = pendingDefense;
  const rowKey = getDefenseTableRowKey(
    pendingDefense.attackTier,
    pendingDefense.attackPart,
    pendingDefense.defenseTier,
    pendingDefense.defensePart
  );
  const defResult = attemptDefenseRollWithRow(target, rowKey);
  let fullHtml = popupHtml + defResult.html;
  if (!defResult.success) {
    fullHtml += resolveMeleeDamage(attacker, target, method, pendingDefense.attackTier, pendingDefense.attackPart);
  } else {
    addLog('defend', `${target.pilot}: 受け成功!`);
  }
  showPopup(`${attacker.pilot}の格闘`, fullHtml);
  pendingDefense = null;
}

function skipDefense() {
  document.getElementById('defensePanel').style.display = 'none';
  if (!pendingDefense) return;
  const { attacker, target, method, popupHtml } = pendingDefense;
  let fullHtml = popupHtml;
  fullHtml += '<div class="popup-line">受け: なし</div>';
  fullHtml += resolveMeleeDamage(attacker, target, method, pendingDefense.attackTier, pendingDefense.attackPart);
  showPopup(`${attacker.pilot}の格闘`, fullHtml);
  pendingDefense = null;
}

function resolveMeleeDamage(attacker, target, method, aimTier, aimPart) {
  let html = '';
  const direction = getAttackDirection(attacker, target);
  html += `<div class="popup-line">${MELEE_TIER_LABELS[aimTier]}・${method}／命中箇所判定</div>`;
  // 1d6で1-4→狙い通り、5-6→命中箇所判定表で決定
  const locAimRoll = roll1d6();
  let rawLocPart;
  let locInfo = '';
  if (locAimRoll <= 4) {
    rawLocPart = aimPart || '胴';
    locInfo = `<div class="popup-line">狙い判定 1d6=${locAimRoll}（≤4）→ 狙い通り <b>${rawLocPart}</b></div>`;
  } else {
    const locRoll = roll2d6();
    const locTable = HIT_LOCATION_AB[direction];
    rawLocPart = locTable ? locTable[locRoll - 2] : '胴';
    let ab2Info = '';
    if (rawLocPart === '胴' && (direction === '後面' || direction === '右側面' || direction === '左側面')) {
      const ab2Roll = roll1d6();
      const ab2Key = direction === '後面' ? '後面' : '側面';
      rawLocPart = HIT_LOCATION_AB2[ab2Key][ab2Roll - 1];
      ab2Info = ` → 再判定(1d6=${ab2Roll})→${rawLocPart}`;
    }
    locInfo = `<div class="popup-line">狙い判定 1d6=${locAimRoll}（≥5）→ 命中箇所判定表 攻撃方向:${direction} 2d6=${locRoll}${ab2Info} → <b>${rawLocPart}</b></div>`;
  }
  const hitPart = remapHitPartForLimbDestruction(target, rawLocPart);
  html += locInfo;
  if (hitPart !== rawLocPart) html += `<div class="popup-line">${appendHitPartLimbRemapHtml(hitPart, rawLocPart)}</div>`;

  const basePower = MELEE_POWER[method] ? MELEE_POWER[method][attacker.effectivePower] : 0;
  const powerMod = POWER_DAMAGE_MOD[attacker.effectivePower] || 0;
  const locPowMod = getMeleeLocationPowerMod(method, hitPart);
  const totalPower = basePower + powerMod + locPowMod;
  const armor = getArmor(target.machine, hitPart);
  const diff = totalPower - armor;
  let powLine = `威力: ${basePower}+${powerMod}`;
  if (locPowMod) powLine += `${locPowMod > 0 ? '+' : ''}${locPowMod}(箇所補正)`;
  powLine += `=${totalPower} 装甲: ${armor} 差: ${diff}`;
  html += `<div class="popup-line">${powLine}</div>`;

  const dmgRoll = roll1d6();
  const dmgKey = getDamageKey(diff);
  const dmgResult = DAMAGE_TABLE[dmgKey] ? DAMAGE_TABLE[dmgKey][dmgRoll - 1] : 'n';
  html += `<div class="popup-line">被害判定(1d6=${dmgRoll})</div>`;
  html += formatMeleeDmgExplain(dmgResult);

  applyDamage(target, hitPart, dmgResult);
  if (typeof DunbainQL !== 'undefined') DunbainQL.registerCombatOutcome(attacker, target, dmgResult);
  addLog('damage', `${attacker.pilot}→${target.pilot}: ${method} ${hitPart}に${dmgResult === 'n' ? '効果なし' : dmgResult === 'e' ? '壊滅' : dmgResult + 'ダメージ'}`);
  return html;
}

function skipMelee() {
  hideMapHud();
  const u = getActiveUnit();
  if (u) u.meleeParryStance = null;
  const lab = '格闘なし';
  addLog('system', `${u.pilot}: ${lab}`);
  finishUnitTurn();
}

// ===== ダメージ処理 =====
function applyDamage(target, part, result) {
  if (result === 'n') return;
  if (result === 'e') {
    target.status = 'destroyed';
    // 被害表の「壊滅」は部位HPを0にしていなかったため、撃墜なのにバーが残る不整合が出る。全部位0＋破壊扱いに揃える。
    if (target.durability && target.destroyed) {
      for (const pk of Object.keys(target.durability)) {
        target.durability[pk] = 0;
        target.destroyed[pk] = true;
      }
    }
    addLog('damage', `${target.pilot}(${target.machine}): 壊滅!`);
    refreshInspectPanelIfOpen();
    return;
  }
  const dmg = parseInt(result) || 0;
  if (dmg <= 0) return;
  target.pilotCumulativeDamage = (target.pilotCumulativeDamage || 0) + dmg;

  const key = part;
  if (target.durability[key] === undefined) return;

  target.durability[key] = Math.max(0, target.durability[key] - dmg);
  if (target.durability[key] <= 0) {
    target.destroyed[key] = true;
    addLog('damage', `${target.pilot}: ${key}破壊!`);
    if (key === '胴' || key === 'コクピット' || key === 'オーラコンバーター') {
      target.status = 'destroyed';
      addLog('damage', `${target.pilot}(${target.machine}): 壊滅!`);
    }
  }
  refreshInspectPanelIfOpen();
}

// ===== ユニットターン終了 =====
function finishUnitTurn() {
  hideMapHud();
  rangedShotInProgress = false;
  const unit = getActiveUnit();
  if (unit) {
    unit.hasActed = true;
    delete unit._noDefenseMelee;
  }
  updateOrderBar();

  if (checkVictory()) {
    // 相互格闘中のPromiseも解決しておく
    if (pendingMutualMeleeResolve) {
      const r = pendingMutualMeleeResolve;
      pendingMutualMeleeResolve = null;
      r();
    }
    return;
  }

  // 相互格闘中はPromiseを解決して戻る（runNextResolutionはresolveMutualMeleeが管理）
  if (pendingMutualMeleeResolve) {
    const r = pendingMutualMeleeResolve;
    pendingMutualMeleeResolve = null;
    r();
    return;
  }

  // planning 中は移動・行動入力の誤進行を防ぐ。射撃/格闘UI中は turnSubPhase が不整合でも進める。
  if (turnSubPhase === 'planning' && currentPhase !== 'RANGED' && currentPhase !== 'MELEE') return;

  resolutionIndex++;
  runNextResolution();
}

function checkVictory() {
  const givenAlive = units.filter(u => u.team === 'given' && u.status === 'alive').length;
  const drakeAlive = units.filter(u => u.team === 'drake' && u.status === 'alive').length;
  if (givenAlive === 0) {
    if (typeof DunbainQL !== 'undefined') DunbainQL.terminalUpdates('drake');
    showVictory('ドレイク軍の勝利', 'ギブン軍全滅');
    return true;
  }
  if (drakeAlive === 0) {
    if (typeof DunbainQL !== 'undefined') DunbainQL.terminalUpdates('given');
    showVictory('ギブン軍の勝利', 'ドレイク軍全滅');
    return true;
  }
  return false;
}

function isCampaignScenario() {
  return !!(scenario && scenario.id && String(scenario.id).startsWith('campaign'));
}

function gauntletPlayerWonVictory(result) {
  if (!result || result.includes('引き分け')) return false;
  if (playerSide === 'given') return result.includes('ギブン軍の勝利');
  return result.includes('ドレイク軍の勝利');
}

function clearGauntletSession() {
  sessionStorage.removeItem('campaignGauntletActive');
  sessionStorage.removeItem('campaignGauntletRound');
}

const MUSOU_BEST_STREAK_KEY = 'dunbain_musou_best_streak';

function getMusouBestStreak() {
  const v = parseInt(localStorage.getItem(MUSOU_BEST_STREAK_KEY) || '0', 10);
  return Number.isFinite(v) && v >= 0 ? v : 0;
}

function updateMusouBestStreak(clearedWaves) {
  if (!Number.isFinite(clearedWaves) || clearedWaves < 1) return;
  const cur = getMusouBestStreak();
  if (clearedWaves > cur) localStorage.setItem(MUSOU_BEST_STREAK_KEY, String(clearedWaves));
}

function musouGivenVictory(result) {
  return !!(result && result.includes('ギブン軍の勝利'));
}

function resetMusouRunSession() {
  sessionStorage.setItem('musouRunWins', '0');
}

function finalizeMusouRunOnFailure() {
  const w = parseInt(sessionStorage.getItem('musouRunWins') || '0', 10) || 0;
  updateMusouBestStreak(w);
  resetMusouRunSession();
}

function applyMusouWaveWin() {
  const w = parseInt(sessionStorage.getItem('musouRunWins') || '0', 10) || 0;
  const next = w + 1;
  sessionStorage.setItem('musouRunWins', String(next));
  updateMusouBestStreak(next);
  return next;
}

function scheduleVictoryReturnToCampaign() {
  if (!isCampaignScenario()) return;
  if (scenario && scenario.id === 'campaign_musou' && !spectatorMode) return;
  if (victoryRedirectTimer) {
    clearTimeout(victoryRedirectTimer);
    victoryRedirectTimer = null;
  }
  victoryRedirectTimer = setTimeout(() => {

    window.location.href = 'campaign.html';
