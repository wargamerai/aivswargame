<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>聖戦士ダンバイン - オーラバトラー</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#1a1a2e; color:#eee; font-family:'Hiragino Sans','Meiryo',sans-serif; display:flex; flex-direction:column; height:100vh; overflow:hidden; }

/* 上部バー */
#topBar { display:flex; align-items:center; gap:12px; padding:6px 12px; background:#111; border-bottom:1px solid #333; font-size:13px; min-height:36px; flex-wrap:wrap; }
#topBar .label { color:#888; }
#topBar .val { color:#c8a020; font-weight:bold; }
.debug-log-btn {
  margin-left:4px; padding:4px 8px; font-size:10px; cursor:pointer;
  background:#2a2a38; color:#9ab; border:1px solid #444; border-radius:4px;
}
.debug-log-btn:hover { background:#333348; color:#ccc; }
#topBar .phase { color:#4c8; }
#topBar .unit-name { color:#eee; font-size:14px; }

/* ユニット順序バー */
#orderBar { display:flex; align-items:center; gap:4px; padding:4px 12px; background:#181828; border-bottom:1px solid #222; font-size:11px; overflow-x:auto; }
.order-chip { padding:2px 8px; border-radius:3px; border:1px solid #444; color:#aaa; white-space:nowrap; }
.order-chip.active { border-color:#c8a020; color:#fff; background:#333; }
.order-chip.done { opacity:0.4; }
.order-chip.given { border-left:3px solid #4488cc; }
.order-chip.drake { border-left:3px solid #cc4444; }

/* メインレイアウト */
#main { display:flex; flex:1; overflow:hidden; }
#mapWrap { flex:1; display:flex; flex-direction:column; overflow:hidden; position:relative; }
#mapArea { flex:1; position:relative; overflow:hidden; background:#87ceeb; border:2px solid #555; border-radius:5px; }
#mapArea svg { width:100%; height:100%; }
#mapArea #fxSvg { position:absolute; left:0; top:0; width:100%; height:100%; pointer-events:none; z-index:8; overflow:visible; }

/* マップ上フロートUI（行動・移動・射撃・格闘） */
.map-hud { position:absolute; inset:0; z-index:12; pointer-events:none; }
.map-hud-panel {
  position:absolute; min-width:220px; max-width:min(320px, 92vw);
  max-height:min(70vh, 420px); overflow-y:auto;
  padding:10px 12px; background:rgba(22,24,38,0.96); border:1px solid #555; border-radius:8px;
  box-shadow:0 8px 28px rgba(0,0,0,0.55); pointer-events:auto;
}
.map-hud-title { color:#c8a020; font-size:12px; font-weight:bold; margin-bottom:8px; }
.map-hud-actions { display:flex; flex-wrap:wrap; gap:4px; }
.map-hud-actions.map-hud-actions-vertical {
  flex-direction:column; align-items:stretch; gap:6px; max-width:100%;
}
.map-hud-actions.map-hud-actions-vertical .action-btn {
  width:100%; text-align:center; box-sizing:border-box;
}
.map-hud-panel .action-btn { font-size:11px; padding:5px 8px; }
.map-hud-panel.ranged-pick-target { outline:1px solid #48c; }
/* 射撃フェイズ：パネルで機体が完全に隠れないよう背景を薄く（下のマップが透ける） */
.map-hud-panel.map-hud-ranged-phase {
  background: rgba(18, 20, 34, 0.52);
  -webkit-backdrop-filter: blur(10px);
  backdrop-filter: blur(10px);
}
.map-hud-panel.map-hud-ranged-phase.ranged-pick-target {
  background: rgba(16, 22, 42, 0.48);
}

/* マップ内に戦闘結果を載せる（マップ列＋ズームバー内） */
.map-combat-anchored {
  position:absolute; left:0; right:0; top:0; bottom:24px;
  pointer-events:none; z-index:14;
}
.map-combat-anchored #popupOverlay {
  display:none; position:absolute; inset:0; width:100%; height:100%;
  background:rgba(0,0,0,0.5); pointer-events:auto; z-index:1;
}
.map-combat-anchored #combatPopup {
  display:none; position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
  background:#222; border:2px solid #c8a020; border-radius:8px; padding:14px 16px 16px;
  z-index:2; min-width:280px; max-width:min(480px, 94vw); max-height:min(72vh, 420px); overflow-y:auto;
  box-shadow:0 0 30px rgba(0,0,0,0.8); pointer-events:auto;
}

/* ズームバー */
.zoom-bar { display:flex; align-items:center; justify-content:center; height:24px; background:#222; border-top:1px solid #333; gap:4px; }
.zoom-bar button { width:30px; height:20px; background:#444; border:none; color:#eee; cursor:pointer; font-size:14px; border-radius:3px; }
.zoom-bar button:hover { background:#666; }
.zoom-bar span { color:#888; font-size:11px; width:40px; text-align:center; }

/* 右パネル */
#rightPanel { width:320px; min-width:320px; display:flex; flex-direction:column; background:#181828; border-left:1px solid #333; overflow:hidden; }

/* ユニット情報 */
#unitInfo { padding:10px; border-bottom:1px solid #333; font-size:12px; }
.info-row { display:flex; justify-content:space-between; margin:2px 0; }
.info-label { color:#888; }
.info-val { color:#eee; }
.info-val.given { color:#4488cc; }
.info-val.drake { color:#cc4444; }

/* 耐久力表示（部位ごと：名前＋バー＋数値を1行） */
#durabilityPanel { padding:8px 10px; border-bottom:1px solid #333; font-size:11px; }
#inspectPanel .durability-line { margin:5px 0; }
.durability-line {
  display:flex; align-items:center; gap:8px; margin:3px 0; font-size:11px;
  min-height:14px;
}
.durability-line .part-name {
  flex:0 0 7.2em; max-width:7.2em; color:#aaa; text-align:left; font-size:10px; line-height:1.2;
  white-space:normal; word-break:break-all;
}
.durability-line .part-bar {
  flex:1; min-width:40px; height:10px; background:#333; border-radius:2px; overflow:hidden;
}
.durability-line .part-hp {
  flex:0 0 auto; color:#aaa; font-size:10px; text-align:right; white-space:nowrap;
}
.part-fill { height:100%; background:#4c8; border-radius:2px; transition:width 0.3s; }
.part-fill.damaged { background:#c84; }
.part-fill.critical { background:#c44; }
.part-fill.destroyed { background:#666; }

/* アクションパネル */
#actionPanel { padding:10px; border-bottom:1px solid #333; min-height:80px; }
#actionPanel .section-title { color:#c8a020; font-size:12px; font-weight:bold; margin-bottom:6px; }
.action-btns { display:flex; flex-wrap:wrap; gap:4px; }
.action-btn { padding:6px 10px; background:#333; border:1px solid #555; border-radius:4px; color:#eee; cursor:pointer; font-size:12px; }
.action-btn:hover { background:#444; border-color:#888; }
.action-btn.selected { background:#3a3a2a; border-color:#c8a020; color:#c8a020; }
.action-btn:disabled { opacity:0.3; cursor:not-allowed; }

/* 移動入力 */
#movePanel { padding:10px; border-bottom:1px solid #333; display:none; }
#moveInput { width:100%; padding:8px; background:#222; border:1px solid #555; border-radius:4px; color:#0f0; font-family:monospace; font-size:16px; text-transform:uppercase; }
#moveInput.preview { border-color:#4c8; }
#moveInfo { color:#888; font-size:11px; margin-top:4px; }
.move-btns { display:flex; gap:6px; margin-top:6px; }
.move-btns button { flex:1; padding:6px; border:none; border-radius:4px; cursor:pointer; font-size:12px; }
#moveConfirm { background:#4c8; color:#000; }
#moveCancel { background:#555; color:#eee; }
#moveSkip { background:#664; color:#eee; }

/* 移動十字パッド */
.move-cross-wrap { margin:10px 0 6px; user-select:none; }
.move-cross-hint { color:#888; font-size:10px; margin-bottom:6px; text-align:center; line-height:1.3; }
.move-cross-grid {
  display:grid;
  grid-template-columns: 1fr 1fr 1fr;
  grid-template-rows: 46px 46px 46px;
  gap:6px;
  max-width:186px;
  margin:0 auto;
}
.move-pad-btn {
  width:100%; height:100%; min-height:44px;
  padding:4px 2px;
  background:#2a3d48; border:1px solid #5a7a88; border-radius:8px;
  color:#dff8ff; font-size:12px; font-weight:bold; cursor:pointer;
  line-height:1.2;
}
.move-pad-btn:hover:not(:disabled) { background:#3a5565; border-color:#7ec8e0; color:#fff; }
.move-pad-btn:disabled { opacity:0.32; cursor:not-allowed; }
.move-pad-btn small { display:block; font-size:9px; font-weight:normal; opacity:0.8; margin-top:2px; }
.move-pad-f { grid-column:2; grid-row:1; }
.move-pad-l { grid-column:1; grid-row:2; }
.move-pad-r { grid-column:3; grid-row:2; }
.move-pad-b { grid-column:2; grid-row:3; }

/* 戦闘パネル */
#combatPanel { padding:10px; border-bottom:1px solid #333; display:none; max-height:250px; overflow-y:auto; }
.combat-title { color:#c8a020; font-size:12px; font-weight:bold; margin-bottom:6px; }
.target-btn { display:block; width:100%; padding:8px; margin:4px 0; background:#2a2a3e; border:1px solid #555; border-radius:4px; color:#eee; cursor:pointer; font-size:12px; text-align:left; }
.target-btn:hover { background:#3a3a4e; border-color:#888; }
.weapon-btn { display:inline-block; padding:4px 10px; margin:2px; background:#333; border:1px solid #555; border-radius:3px; color:#eee; cursor:pointer; font-size:11px; }
.weapon-btn:hover { background:#444; }
.weapon-btn.selected { border-color:#c8a020; color:#c8a020; }
.melee-zone-btn { padding:6px 12px; margin:2px; background:#333; border:1px solid #555; border-radius:4px; color:#eee; cursor:pointer; font-size:12px; }
.melee-zone-btn:hover { background:#444; }

/* 戦闘結果ポップアップ（実体は .map-combat-anchored 内。ここはタイポグラフィのみ） */
#combatPopup .popup-title { color:#c8a020; font-size:14px; font-weight:bold; margin-bottom:10px; }
.popup-line { margin:4px 0; font-size:12px; }
.popup-hit { color:#4c8; }
.popup-miss { color:#888; }
.popup-damage { color:#c44; }
.popup-defend { color:#48c; }
#combatPopup button { margin-top:12px; padding:8px 20px; background:#c8a020; color:#000; border:none; border-radius:4px; cursor:pointer; font-weight:bold; }
#popupOkBtn { display:block; }

/* 射撃ポップアップ：段階ダイス演出（1スロット入れ替え・縦占有を抑える） */
#rangedSeqSlot { min-height:108px; }
.ranged-seq-phase { margin:8px 0; padding:10px 8px; background:rgba(0,0,0,0.25); border-radius:6px; border:1px solid #333; }
.ranged-seq-label { color:#8cf; font-size:11px; font-weight:bold; margin-bottom:8px; letter-spacing:0.02em; }
.ranged-seq-outcome { margin-top:10px; min-height:1.2em; }
/* 結果テキストをダイスより大きく */
.ranged-seq-outcome .popup-line {
  font-size:17px; line-height:1.5; margin:8px 0;
}
.ranged-seq-outcome .popup-line b {
  font-size:19px; font-weight:800;
}
.ranged-seq-outcome .popup-hit { font-size:26px; font-weight:bold; letter-spacing:0.04em; }
.ranged-seq-outcome .popup-miss { font-size:26px; font-weight:bold; letter-spacing:0.04em; }
.ranged-seq-outcome .popup-damage { font-size:22px; font-weight:bold; }
.ranged-seq-weaponline { font-size:14px !important; margin-bottom:10px !important; color:#ccc; }
.combat-dice-pair, .combat-dice-single { display:flex; align-items:center; justify-content:center; gap:8px; flex-wrap:wrap; min-height:44px; }
.combat-die {
  display:inline-flex; align-items:center; justify-content:center; width:34px; height:34px;
  background:linear-gradient(145deg,#2a2a38,#1a1a24); border:2px solid #555; border-radius:7px;
  font-size:17px; font-weight:bold; color:#ddd; box-shadow:0 2px 6px rgba(0,0,0,0.4);
  transition:transform 0.12s ease, border-color 0.2s;
}
.combat-die-lg { width:40px; height:40px; font-size:21px; }
.combat-die-settled { border-color:#c8a020; color:#ffd76a; transform:scale(1.05); box-shadow:0 0 12px rgba(200,160,32,0.3); }
.combat-dice-plus, .combat-dice-eq { color:#666; font-size:14px; font-weight:bold; }
.combat-dice-sum { font-size:16px; font-weight:bold; color:#b96; min-width:2ch; }
.ranged-seq-summary { margin-top:14px; padding-top:10px; border-top:1px solid #444; font-size:13px; color:#bbb; line-height:1.55; }
.ranged-seq-summary b { font-size:15px; color:#eee; }
.ranged-seq-summary .popup-line { font-size:16px; line-height:1.5; margin:6px 0; color:#ccc; }
.ranged-seq-summary .popup-line b { font-size:17px; }
.ranged-seq-summary .popup-hit { font-size:20px; }
.ranged-seq-summary .popup-miss { font-size:20px; }
.ranged-seq-summary .popup-damage { font-size:18px; }

/* 受け選択 */
#defensePanel { display:none; position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); background:#222; border:2px solid #48c; border-radius:8px; padding:20px; z-index:1001; min-width:300px; }
.defense-btns { display:flex; gap:10px; margin-top:12px; }
.defense-btns button { flex:1; padding:10px; border:none; border-radius:4px; cursor:pointer; font-size:13px; }

/* 戦闘ログ */
#inspectPanel {
  flex:1; min-height:100px; overflow-y:auto; padding:10px 10px 14px;
  border-top:1px solid #333; background:#141420; font-size:12px;
}
.inspect-placeholder { color:#666; font-size:11px; line-height:1.5; }
.inspect-title { color:#e88; font-weight:bold; font-size:12px; margin-bottom:8px; }
.inspect-sub { color:#888; font-size:10px; margin:10px 0 4px; }
.inspect-dmg-note { color:#c99; font-size:10px; margin-top:8px; line-height:1.4; }

/* 勝敗オーバーレイ */
#victoryOverlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:25000; justify-content:center; align-items:center; flex-direction:column; }
#victoryOverlay.show { display:flex; }
#victoryOverlay .result { font-size:3em; font-weight:bold; color:#c8a020; text-shadow:0 0 20px rgba(200,160,32,0.5); }
#victoryOverlay .detail { color:#aaa; font-size:1.2em; margin-top:10px; }
#victoryOverlay button { margin-top:30px; padding:12px 30px; background:#c8a020; color:#000; border:none; border-radius:6px; font-size:1.1em; cursor:pointer; }

/* オーラ力フェイズ表示（要約用・通常は非表示） */
#auraPhasePanel { display:none; position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); background:#222; border:2px solid #c8a020; border-radius:8px; padding:20px; z-index:1000; min-width:400px; }
.aura-result { margin:6px 0; font-size:13px; }

/* ターン開始: オーラ判定テーブル（123.html イメージ） */
#turnStartDiceOverlay {
  display:none; position:fixed; inset:0; z-index:1500;
  align-items:center; justify-content:center; flex-direction:column;
  background:rgba(0,0,0,0.82);
}
#turnStartDiceOverlay.show { display:flex; }
.tsd-panel {
  width:min(880px,98vw); max-height:92vh; overflow:auto;
  background:#222;
  border:2px solid #c8a020; border-radius:10px; padding:20px 22px;
  box-shadow:0 0 36px rgba(0,0,0,0.55);
  text-align:center;
}
.tsd-title {
  font-size:17px; color:#c8a020; font-weight:bold; margin-bottom:8px;
  border-bottom:1px solid #444; padding-bottom:10px;
}
.tsd-phase-hint {
  color:#4c8; font-size:13px; font-weight:bold; min-height:20px; margin-bottom:10px;
}
.tsd-actions { display:flex; gap:10px; justify-content:center; flex-wrap:wrap; margin-top:16px; }
.tsd-actions button {
  padding:10px 22px; border:none; border-radius:6px; cursor:pointer; font-size:13px; font-weight:bold;
}
#tsdNext { background:#c8a020; color:#000; }
#tsdSkip { background:#444; color:#ccc; }
.aura-table { width:100%; border-collapse:collapse; margin-top:4px; color:#eee; font-size:12px; }
.aura-row { border-bottom:1px solid #333; }
.aura-cell { padding:8px 4px; vertical-align:middle; border-bottom:1px solid #2a2a38; }
.aura-name { width:118px; font-weight:bold; color:#aaa; text-align:left; border-right:1px solid #333; line-height:1.35; }
.aura-name small { font-weight:normal; }
.aura-step { text-align:center; font-size:11px; color:#888; transition:color 0.25s; line-height:1.35; min-width:72px; }
.aura-result-label { width:28px; text-align:center; color:#555; font-size:11px; }
.aura-final { width:108px; text-align:center; font-size:12px; font-weight:700; line-height:1.2; }
.aura-final .aura-final-num { font-size:24px; font-weight:900; line-height:1.1; }
.tsd-mini-flicker {
  display:inline-block; font-size:26px; font-weight:900; color:#f5e6a8; min-height:32px;
  animation:tsdMiniShake 0.09s infinite;
}
.tsd-mini-settled { display:inline-block; font-size:26px; font-weight:900; color:#fff8dc; }
@keyframes tsdMiniShake {
  0%,100% { transform:rotate(-5deg); }
  50% { transform:rotate(5deg); }
}
.tsd-cell-out { display:flex; flex-direction:column; align-items:center; gap:4px; padding:4px 0; }
.tsd-pop-num { font-size:32px; font-weight:900; color:#ffd700; line-height:1; animation:tsdPopIn 0.4s ease-out; text-shadow:0 0 14px rgba(255,215,0,0.45); }
.tsd-pop-num-sm { font-size:26px; }
.tsd-pop-label { font-size:12px; font-weight:bold; color:#ccc; }
.tsd-lbl-keep { color:#8ac; }
.tsd-lbl-go { color:#ca8; }
.tsd-aura-big { font-size:22px; color:#ffd700; }
.tsd-cell-note { color:#666; font-size:10px; display:block; }
.tsd-cell-muted { color:#555; font-size:20px; }
@keyframes tsdPopIn {
  from { transform:scale(0.35); opacity:0.35; }
  to { transform:scale(1); opacity:1; }
}
.tsd-final-up { color:#6d8 !important; text-shadow:0 0 12px rgba(100,220,130,0.45); }
.tsd-final-down { color:#e77 !important; text-shadow:0 0 12px rgba(255,100,100,0.35); }
.tsd-final-flat { color:#ffd700 !important; text-shadow:0 0 10px rgba(255,215,0,0.35); }
.tsd-aura-delta { font-size:13px; font-weight:bold; margin-top:4px; }
.tsd-delta-up { color:#8e8; }
.tsd-delta-down { color:#e88; }
.tsd-delta-zero { color:#888; }
.tsd-aura-prev { color:#666; margin-top:2px; }
.tsd-pow-line { color:#777; display:block; margin-top:4px; }
.tsd-rank-badge { font-weight:900; padding:2px 8px; border-radius:4px; font-size:12px; letter-spacing:0.04em; }
.tsd-rank-a { background:rgba(148,0,211,0.45); color:#f0d8ff; border:1px solid #a020f0; }
.tsd-rank-b { background:rgba(30,60,220,0.45); color:#d0dcff; border:1px solid #5555ff; }
.tsd-rank-c { background:rgba(0,160,220,0.45); color:#dff8ff; border:1px solid #00bfff; }
.tsd-rank-d { background:rgba(0,170,90,0.45); color:#e0ffe8; border:1px solid #22cc66; }
.tsd-rank-e { background:rgba(200,170,0,0.45); color:#fff8c8; border:1px solid #ddc000; }
.tsd-rank-f { background:rgba(220,100,0,0.45); color:#ffe8d0; border:1px solid #ff8c00; }
.tsd-rank-g { background:rgba(200,40,40,0.45); color:#ffe0e0; border:1px solid #ff4444; }
/* 搭乗オーラ解放成功：確定列・パワー表示を強調 */
.tsd-row-liberation .aura-name { box-shadow: inset 0 0 0 1px rgba(94, 233, 212, 0.35); background: rgba(30, 55, 58, 0.5); }
.tsd-final-block { text-align: center; }
.tsd-final-block--liberation {
  padding: 8px 6px 6px;
  margin: -4px -6px;
  border-radius: 8px;
  background: linear-gradient(165deg, rgba(20, 80, 90, 0.55) 0%, rgba(40, 30, 70, 0.45) 100%);
  box-shadow: 0 0 20px rgba(94, 233, 212, 0.25), inset 0 0 0 1px rgba(120, 240, 220, 0.35);
}
.tsd-liberation-ribbon {
  font-size: 10px;
  font-weight: 800;
  letter-spacing: 0.06em;
  color: #7fffd4;
  text-shadow: 0 0 10px rgba(127, 255, 212, 0.7);
  margin-bottom: 6px;
  line-height: 1.3;
}
.tsd-final-block--liberation .aura-final-num {
  color: #9ff !important;
  text-shadow: 0 0 16px rgba(100, 255, 255, 0.55), 0 0 28px rgba(94, 233, 212, 0.35) !important;
}
.tsd-final-block--liberation .tsd-aura-delta { color: #8dd !important; }
.tsd-final-block--liberation .tsd-aura-prev small { color: #7aa !important; }
.tsd-rank-badge--liberation {
  box-shadow: 0 0 12px rgba(180, 140, 255, 0.45);
  border-color: #a8e8ff !important;
}
.success-text { color:#44ff88; font-weight:bold; }
.fail-text { color:#ff6666; font-weight:bold; }
.highlight-val { color:#fff; font-size:15px; font-weight:bold; }
.aura-table thead th {
  padding:8px 6px; font-size:11px; color:#777; text-transform:uppercase;
  border-bottom:1px solid #444; font-weight:normal;
}
</style>
</head>
<body>

<div id="topBar">
  <span class="label">ターン</span><span class="val" id="turnNum">1</span>
  <span class="label">フェイズ</span><span class="phase" id="phaseName">-</span>
  <span class="label">ユニット</span><span class="unit-name" id="activeUnitName">-</span>
  <span style="flex:1"></span>

<script src="data.js"></script>

<script src="qlearning.js"></script>
<script>
// ===== ゲーム状態 =====
let units = [];
let gameTurn = 1;
let turnOrder = [];
let currentOrderIndex = 0;
let currentPhase = 'INIT'; // AURA_POWER, ACTION_SELECT, MOVE, RANGED, MELEE, PLAN_READY …
let turnSubPhase = 'planning'; // planning | resolving（移動は全員入力後に同時解決→射撃・格闘を順に）
let resolutionIndex = 0;
let planSnapshot = null;
/** 同時移動解決直後に描く全員分の経路 [{ unitId, team, hexes, canceled }] */
let moveRevealPaths = null;
let playerSide = 'given';
let scenario = null;
let gameOver = false;
/** true のとき両軍とも AI。オーラ表・戦闘・勝利のモーダルは出さずログとマップのみ */
let spectatorMode = false;
/** 観戦: 計画完了後、移動解決までの間隔（オーバーレイは出さない） */
const SPECTATOR_EXECUTE_DELAY_MS = 800;
let spectatorExecuteDelayMs = SPECTATOR_EXECUTE_DELAY_MS;
let spectatorAutoExecuteTimer = null;
/** URL ?trainEpisodes=1000 など：観戦で連続対戦（Q学習は ql=1 と併用） */
let qlTrainEpisodesTarget = 0;
let qlTrainEpisodesDone = 0;
let qlTrainStats = { given: 0, drake: 0, draw: 0 };

// マップ状態（F16と同じ方式）
const hexSize = 25;
const hStep = 1.5 * hexSize;
const vStep = Math.sqrt(3) * hexSize;
let cameraX = 0, cameraY = 0;
let zoomLevel = 1;
let isDragging = false;
let dragStartX = 0, dragStartY = 0;
let mapCols = 18, mapRows = 18;

// 移動プレビュー
let previewPath = [];
let previewStepStates = []; // [{x,y,dir}] コマンド各段階後（地図の矢印用）
let moveCost = 0;
let reachableHexes = []; // { x, y, dir, cost, path } 全到達状態（同マスで複数向きあり）
let selectedMoveTarget = null; // クリック選択された移動先
let dirChoices = []; // 移動先での向き候補

// 戦闘状態
let selectedWeapon = null;
let rangedAwaitingTarget = false; // 射撃：武器選択後、敵ユニットクリックで発射
let rangedShotInProgress = false; // 射撃：1ターン1発・連打防止
let selectedTarget = null;
let selectedMeleeMethod = null;
let selectedMeleeTier = null; // 'high'|'mid'|'low' ＝ 上中下段
let selectedMeleeAttackPart = null; // 段内の攻撃箇所（頭・手・胴…）受け率表の同異判定に使用
let selectedSwordSide = null; // 'left'|'right' 格闘＋剣系武装時のみ
let pendingDefense = null;
let popupAutoCloseTimer = null;
/** キャンペーン終了後の自動戻り */
let victoryRedirectTimer = null;
/** 参照パネルに表示中のユニット id（耐久・状態を戦闘後すぐ再描画） */
let inspectTargetUnitId = null;

/** デバッグ用：後から追える行動ログ（addLog がすべて蓄積） */
const DEBUG_LOG_MAX = 10000;
let debugLogBuffer = [];

// ターン開始オーバーレイ（全員テーブル・段階表示／123.html イメージ）
let turnStartTableRows = null;
let turnStartTableAbort = false;

// 方向定義（flat-top hex, F16と同じ）
// 0=上(N), 1=右上(NE), 2=右下(SE), 3=下(S), 4=左下(SW), 5=左上(NW)
const DIR_DX = [0, 1, 1, 0, -1, -1];
const DIR_DY_EVEN = [-1, -1, 0, 1, 0, -1]; // 偶数列(c%2==0)
const DIR_DY_ODD = [-1, 0, 1, 1, 1, 0];   // 奇数列(c%2==1)

// ===== 初期化 =====
function initGame() {
  if (victoryRedirectTimer) {
    clearTimeout(victoryRedirectTimer);
    victoryRedirectTimer = null;
  }
  if (spectatorAutoExecuteTimer) {
    clearTimeout(spectatorAutoExecuteTimer);
    spectatorAutoExecuteTimer = null;
  }
  const cfg = JSON.parse(sessionStorage.getItem('dunbineConfig') || '{}');
  playerSide = cfg.playerSide || 'given';
  spectatorMode = !!cfg.spectatorMode;
  try {
    const sp = new URLSearchParams(window.location.search || '');
    if (sp.get('spectator') === '1' || sp.get('watch') === '1') spectatorMode = true;
    if (sp.get('ql') === '1') localStorage.setItem('dunbain_ql', '1');
    if (sp.get('ql') === '0') localStorage.setItem('dunbain_ql', '0');
    const sid = sp.get('scenarioId');
    if (sid && typeof SCENARIOS !== 'undefined' && SCENARIOS[sid]) cfg.scenarioId = sid;
    const mc = sp.get('musouEnemyCount');
    if (mc != null && mc !== '') cfg.musouEnemyCount = parseInt(mc, 10) || cfg.musouEnemyCount || 20;
    const teRaw = sp.get('trainEpisodes') || sp.get('qlTrain');
    const te = teRaw != null && teRaw !== '' ? parseInt(teRaw, 10) : 0;
    if (spectatorMode && te > 0) {
      spectatorExecuteDelayMs = 0;
      if (sp.get('ql') !== '0') localStorage.setItem('dunbain_ql', '1');
      if (qlTrainEpisodesTarget === 0) {
        qlTrainEpisodesTarget = Math.min(50000, Math.max(1, te));
        qlTrainEpisodesDone = 0;
        qlTrainStats = { given: 0, drake: 0, draw: 0 };
      }
    } else {
      spectatorExecuteDelayMs = SPECTATOR_EXECUTE_DELAY_MS;
      if (!spectatorMode) {
        qlTrainEpisodesTarget = 0;
        qlTrainEpisodesDone = 0;
      }
    }
  } catch (e) { /* ignore */ }
  scenario = getScenario(cfg.scenarioId || 'practice');
  if (typeof window !== 'undefined') window.scenario = scenario;
  if (!scenario.gauntlet && sessionStorage.getItem('campaignGauntletActive') === '1') {
    clearGauntletSession();
  }
  if (!scenario.musou && sessionStorage.getItem('musouRunWins') != null) {
    sessionStorage.removeItem('musouRunWins');
  }
  mapCols = scenario.mapCols;
  mapRows = scenario.mapRows;

  units = [];
  let id = 0;
  let givenDefs = scenario.given ? scenario.given.slice() : [];
  let drakeDefs = scenario.drake ? scenario.drake.slice() : [];
  if (scenario.gauntlet && scenario.gauntletBosses && scenario.gauntletBosses.length) {
    if (sessionStorage.getItem('campaignGauntletActive') !== '1') {
      sessionStorage.setItem('campaignGauntletActive', '1');
      sessionStorage.setItem('campaignGauntletRound', '0');
    }
    const maxI = scenario.gauntletBosses.length - 1;
    const ri = Math.max(0, Math.min(maxI, parseInt(sessionStorage.getItem('campaignGauntletRound') || '0', 10)));
    const boss = scenario.gauntletBosses[ri];
    const sho = {
      pilot: 'ショウ・ザマ', machine: 'ダンバイン A', weapons: ['オーラソード', 'オーラショット'],
      x: Math.floor(mapCols / 2), y: mapRows - 3, dir: 0,
    };
    const ex = Math.floor(mapCols / 2);
    const ey = 2;
    givenDefs = [{ ...sho }];
    drakeDefs = [{ pilot: boss.pilot, machine: boss.machine, weapons: boss.weapons.slice(), x: ex, y: ey, dir: 3 }];
  }
  givenDefs.forEach(u => {
    units.push(createUnit(id++, u, 'given'));
  });
  if (scenario.musou && typeof buildMusouDrakeDefinitions === 'function') {
    let n = 1;
    try {
      const sp = new URLSearchParams(window.location.search || '');
      const urlMc = sp.get('musouEnemyCount');
      if (urlMc != null && urlMc !== '') {
        n = Math.max(1, Math.min(100, parseInt(urlMc, 10) || 1));
      } else {
        let runWins = parseInt(sessionStorage.getItem('musouRunWins') || '0', 10);
        if (!Number.isFinite(runWins) || runWins < 0) runWins = 0;
        n = Math.min(100, runWins + 1);
      }
    } catch (e) {
      n = 1;
    }
    const py = scenario.given && scenario.given[0] ? scenario.given[0].y : null;
    drakeDefs = buildMusouDrakeDefinitions(n, scenario.mapCols, scenario.mapRows, py);
  }
  drakeDefs.forEach(u => {
    units.push(createUnit(id++, u, 'drake'));
  });

  if (typeof DunbainQL !== 'undefined') units.forEach(u => DunbainQL.resetUnitLearningScratch(u));

  gameTurn = 1;
  gameOver = false;
  currentPhase = 'INIT';
  turnSubPhase = 'planning';
  buildTurnOrder();
  currentOrderIndex = 0;

  debugLogBuffer.length = 0;
  addLog('debug', `[SESSION_START] scenario="${scenario.name}" id=${cfg.scenarioId || 'practice'} spectator=${spectatorMode} side=${playerSide} units=${units.length}`);

  clearInspectPanel();
  initMap();
  syncRightPanelUnitStats();
  if (scenario.gauntlet && scenario.gauntletBosses && sessionStorage.getItem('campaignGauntletActive') === '1') {
    const ri = Math.max(0, Math.min(scenario.gauntletBosses.length - 1, parseInt(sessionStorage.getItem('campaignGauntletRound') || '0', 10)));
    const boss = scenario.gauntletBosses[ri];
    addLog('system', `[ガントレット] 第 ${ri + 1} / ${scenario.gauntletBosses.length} 戦 — 対 ${boss.pilot}（${boss.machine}）`);
  }
  if (scenario.musou && units.filter(u => u.team === 'drake').length) {
    const ec = units.filter(u => u.team === 'drake').length;
    const rw = parseInt(sessionStorage.getItem('musouRunWins') || '0', 10) || 0;
    addLog('system', `[無双] 敵 ${ec}機（連続${rw}波までクリア済み・ベスト記録 ${getMusouBestStreak()}波）`);
  }
  if (spectatorMode) addLog('system', `[観戦] ${scenario.name}（両軍AI）`);
  startAuraPhase();
}

function createUnit(id, def, team) {
  const pilot = PILOTS[def.pilot] || { aura: 3, auraMax: 3 };
  const resolvedMachine = typeof resolveMachineVariant === 'function'
    ? resolveMachineVariant(def.machine, def.pilot) : def.machine;
  def = Object.assign({}, def, { machine: resolvedMachine });
  const machine = AURA_BATTLERS[def.machine] || WING_CALIBERS[def.machine] || { power: 'e', type: 'AB' };
  const baseName = getBaseMachineName(def.machine);
  const typeKey = machine.type || 'AB';
  const dur = JSON.parse(JSON.stringify(DURABILITY[typeKey] || DURABILITY['AB']));
  if (typeKey === 'AB' && typeof machineBaseHasShield === 'function' && !machineBaseHasShield(baseName)) {
    delete dur['盾'];
  }
  const startAura = pilot.auraBoarding != null ? pilot.auraBoarding : pilot.aura;

  return {
    id, pilot: def.pilot, machine: def.machine, team,
    x: def.x, y: def.y, dir: def.dir || 0,
    currentAura: startAura,
    maxAura: pilot.auraMax,
    pilotCumulativeDamage: 0,
    temporaryPowerAura: null,
    auraLiberated: false,
    basePower: machine.power,
    effectivePower: getEffectivePower(def.machine, startAura),
    weapons: def.weapons || [],
    selectedAction: null,
    previousDeclaredAction: null, // 直前に完了したターンで選んだ行動（射撃の連続選択制限用）
    movementRemaining: 0,
    hasActed: false,
    durability: dur,
    maxDurability: JSON.parse(JSON.stringify(dur)),
    destroyed: {},
    status: 'alive',
    type: typeKey,
    weaponHands: def.weaponHands ? { ...def.weaponHands } : undefined,
    collisionSkipMoveForGameTurn: null,
    collisionSkipShootMeleeThisTurn: false,
  };
}

function canOperateWeapon(unit, weaponName) {
  if (!unit || !weaponName) return false;
  return typeof canOperateWeaponWithHands === 'function'
    ? canOperateWeaponWithHands(unit.destroyed, weaponName, unit.weaponHands)
    : true;
}

function buildUnitCompactEffects(unit) {
  if (!unit || unit.status !== 'alive') return '';
  const bits = [];
  if (unit.destroyed['頭']) bits.push('頭→狭射界');
  if (unit.destroyed['翼']) bits.push('翼→旋回×2');
  if (unit.destroyed['右手']) bits.push('右腕武器不可');
  if (unit.destroyed['左手']) bits.push('左腕武器不可');
  return bits.join(' · ');
}

// ===== ターン管理 =====
function buildTurnOrder() {
  const alive = units.filter(u => u.status === 'alive');
  // 交互: given→drake→given→drake...
  const givenUnits = alive.filter(u => u.team === 'given');
  const drakeUnits = alive.filter(u => u.team === 'drake');
  turnOrder = [];
  const maxLen = Math.max(givenUnits.length, drakeUnits.length);
  for (let i = 0; i < maxLen; i++) {
    if (i < givenUnits.length) turnOrder.push(givenUnits[i]);
    if (i < drakeUnits.length) turnOrder.push(drakeUnits[i]);
  }
  updateOrderBar();
}

function getActiveUnit() {
  if (currentOrderIndex >= turnOrder.length) return null;
  return turnOrder[currentOrderIndex];
}

function isPlayerUnit(unit) {
  if (spectatorMode) return false;
  return unit && unit.team === playerSide;
}

/** 右パネル・トップバー「ユニット」用：自機操作中はその機体、敵処理中は自陣の先頭生存機（観戦・無双でダンバイン耐久が見えるようにする） */
function getRightPanelUnit() {
  const active = getActiveUnit();
  if (active && isPlayerUnit(active)) return active;
  const team = playerSide === 'drake' ? 'drake' : 'given';
  const firstAlive = units.find(u => u.team === team && u.status === 'alive');
  return firstAlive || active || null;
}

function syncRightPanelUnitStats() {
  const u = getRightPanelUnit();
  if (u) {
    updateUnitInfo(u);
    updateDurability(u);
  }
  refreshInspectPanelIfOpen();
}

function refreshInspectPanelIfOpen() {
  if (inspectTargetUnitId == null) return;
  const u = units.find(ux => ux.id === inspectTargetUnitId);
  if (u) showInspectPanelForUnit(u);
  else {
    inspectTargetUnitId = null;
    clearInspectPanel();
  }
}

function getAuraForPower(unit) {
  if (unit.temporaryPowerAura != null) return unit.temporaryPowerAura;
  return unit.currentAura;
}

function refreshEffectivePower(unit) {
  unit.effectivePower = getEffectivePower(unit.machine, getAuraForPower(unit));
}

function clampUnitAuraValue(u, pilot, rawAura) {
  const m = AURA_BATTLERS[u.machine] || WING_CALIBERS[u.machine] || {};
  const lim = m.limitAura === Infinity ? 99 : (m.limitAura != null ? m.limitAura : 10);
  return Math.max(2, Math.min(rawAura, lim));
}

function simulateTurnStartRows() {
  const alive = units.filter(u => u.status === 'alive');
  const rows = [];
  for (const u of alive) {
    const p = PILOTS[u.pilot] || {};
    let colA = '';
    let tempAura = null;
    let logBracket = '';
    if (p.auraBoarding != null) {
      if (u.auraLiberated) {
        colA = `<span class="success-text">解放済</span><br><small>表オーラ${p.aura}</small>`;
        logBracket = `${u.pilot}: 搭乗オーラ解放 — 解放済（以後${p.aura}）`;
      } else {
        const eff = getEffectivePower(u.machine, u.currentAura);
        if (!isEffectiveRankAtLeastB(eff)) {
          colA = `<span class="fail-text">対象外</span><br><small>パワー${eff.toUpperCase()}（B未満）</small>`;
          logBracket = `${u.pilot}: 搭乗オーラ解放 — 対象外（パワー${eff.toUpperCase()}）`;
        } else {
          const roll = roll1d6();
          const cd = u.pilotCumulativeDamage || 0;
          const ok = roll <= cd;
          colA = ok
            ? `<span class="success-text">成功</span><br><small>1d6:${roll}≦累積${cd}</small>`
            : `<span class="fail-text">失敗</span><br><small>1d6:${roll}</small>`;
          if (ok) tempAura = p.aura;
          logBracket = `${u.pilot}: 搭乗オーラ解放 1d6=${roll} 累積${cd} → ${ok ? '成功' : '失敗'}`;
        }
      }
    } else {
      colA = `<span style="color:#555">—</span>`;
      logBracket = '';
    }
    rows.push({ unit: u, colA, tempAura, logBracket });
  }
  for (const r of rows) {
    const u = r.unit;
    const p = PILOTS[u.pilot] || {};
    const chartAura = (u.auraLiberated && p.aura != null)
      ? p.aura
      : (p.auraBoarding != null ? p.auraBoarding : (p.aura != null ? p.aura : 5));
    const oldA = u.currentAura;
    let newA = oldA;
    let dResolve = null;
    let dFluct = null;
    let skipAuraDiceRolls = false;
    if (u.auraLiberated) {
      skipAuraDiceRolls = true;
      newA = clampUnitAuraValue(u, p, p.aura);
      r.logAura = `${u.pilot}: オーラ力 ${newA}（搭乗オーラ解放済）`;
      r.finalHtmlB1 =
        `<div class="tsd-cell-out"><div class="tsd-pop-num tsd-pop-num-sm">—</div>` +
        `<div class="tsd-pop-label tsd-lbl-keep">解放済</div>` +
        `<span class="tsd-cell-note">以後オーラ力${newA}・変動なし</span></div>`;
      r.finalHtmlB2 = `<div class="tsd-cell-muted">—</div><span class="tsd-cell-note">表判定なし</span>`;
    } else if (r.tempAura != null) {
      skipAuraDiceRolls = true;
      newA = clampUnitAuraValue(u, p, p.aura);
      r.logAura = `${u.pilot}: 搭乗オーラ解放成功 オーラ力 ${oldA}→${newA}`;
      r.finalHtmlB1 =
        `<div class="tsd-cell-out"><div class="tsd-pop-num tsd-pop-num-sm">—</div>` +
        `<div class="tsd-pop-label tsd-lbl-go">解放成功</div>` +
        `<span class="tsd-cell-note">以後表オーラ${p.aura}で固定</span></div>`;
      r.finalHtmlB2 =
        `<div class="tsd-cell-out"><div class="tsd-pop-num tsd-pop-num-sm">${newA}</div>` +
        `<div class="tsd-pop-label">確定オーラ <span class="tsd-aura-big">${newA}</span></div>` +
        `<span class="tsd-cell-note">変動・再判定スキップ</span></div>`;
    } else {
      dFluct = roll1d6();
      if (dFluct >= 3) {
        r.logAura = `${u.pilot}: オーラ力継続 ${newA}（変動1d6=${dFluct}）`;
        r.finalHtmlB1 =
          `<div class="tsd-cell-out"><div class="tsd-pop-num tsd-pop-num-sm">${dFluct}</div>` +
          `<div class="tsd-pop-label tsd-lbl-keep">継続</div>` +
          `<span class="tsd-cell-note">3–6：前ターンのオーラ力を維持</span></div>`;
        r.finalHtmlB2 = `<div class="tsd-cell-muted">—</div><span class="tsd-cell-note">判定なし</span>`;
      } else {
        dResolve = roll1d6();
        const raw = resolveAuraFromPilotRollTable(chartAura, dResolve);
        newA = clampUnitAuraValue(u, p, raw);
        r.logAura =
          `${u.pilot}: オーラ力 ${oldA}→${newA}（変動${dFluct}・判定${dResolve}・基本オーラ${chartAura}）`;
        r.finalHtmlB1 =
          `<div class="tsd-cell-out"><div class="tsd-pop-num tsd-pop-num-sm">${dFluct}</div>` +
          `<div class="tsd-pop-label tsd-lbl-go">変化 → 判定へ</div>` +
          `<span class="tsd-cell-note">1–2：パイロット表 × 1d6 で新オーラ力</span></div>`;
        r.finalHtmlB2 =
          `<div class="tsd-cell-out"><div class="tsd-pop-num tsd-pop-num-sm">${dResolve}</div>` +
          `<div class="tsd-pop-label">新オーラ <span class="tsd-aura-big">${newA}</span></div>` +
          `<span class="tsd-cell-note">オーラ力変動表（基本オーラ${chartAura}×出目${dResolve}）→ クランプ</span></div>`;
      }
    }
    const pow = getEffectivePower(u.machine, newA);
    r.skipAuraDiceRolls = skipAuraDiceRolls;
    r.dFluct = dFluct;
    r.dResolve = dResolve;
    r.oldAura = oldA;
    r.finalAura = newA;
    r.finalTemp = r.tempAura;
    r.finalPower = pow;
    r.logAura += ` パワー${pow.toUpperCase()}`;
    const d = newA - oldA;
    let numCls = 'tsd-final-flat';
    let dCls = 'tsd-delta-zero';
    let dTxt = '±0';
    if (d > 0) { numCls = 'tsd-final-up'; dCls = 'tsd-delta-up'; dTxt = `↑ +${d}`; }
    else if (d < 0) { numCls = 'tsd-final-down'; dCls = 'tsd-delta-down'; dTxt = `↓ ${d}`; }
    const pk = String(pow).toLowerCase();
    const libOk = p.auraBoarding != null && (r.tempAura != null || u.auraLiberated);
    r.liberationSuccess = libOk;
    const blockCls = libOk ? 'tsd-final-block tsd-final-block--liberation' : 'tsd-final-block';
    const ribbon = libOk
      ? (r.tempAura != null
        ? `<div class="tsd-liberation-ribbon">表オーラ解放 — オーラ力 <b>${newA}</b> に固定</div>`
        : `<div class="tsd-liberation-ribbon">搭乗オーラ解放済 — オーラ力 <b>${newA}</b></div>`)
      : '';
    const badgeX = libOk ? ' tsd-rank-badge--liberation' : '';
    r.finalHtmlC =
      `<div class="${blockCls}">${ribbon}` +
      `<div class="aura-final-num ${numCls}">${newA}</div>` +
      `<div class="tsd-aura-delta ${dCls}">${dTxt}</div>` +
      `<div class="tsd-aura-prev"><small>前 ${oldA}</small></div>` +
      `<div class="tsd-pow-line">パワー <span class="tsd-rank-badge tsd-rank-${pk}${badgeX}">${pow.toUpperCase()}</span></div></div>`;
  }
  return rows;
}

function mountTurnStartTable(rows) {
  const wrap = document.getElementById('tsdTableWrap');
  if (!rows.length) {
    wrap.innerHTML = '<p style="color:#888;padding:16px;">生存ユニットなし</p>';
    return;
  }
  let html = '<table class="aura-table"><thead><tr>';
  html += '<th class="aura-cell aura-name">機体 / パイロット</th>';
  html += '<th class="aura-cell aura-step">搭乗オーラ解放</th>';
  html += '<th class="aura-cell aura-step">変動<br><small>1d6</small></th>';
  html += '<th class="aura-cell aura-step">オーラ力判定<br><small>表・1d6</small></th>';
  html += '<th class="aura-cell aura-result-label"></th>';
  html += '<th class="aura-cell aura-final">確定</th></tr></thead><tbody>';
  rows.forEach((r, i) => {
    const u = r.unit;
    const rowCls = r.liberationSuccess ? 'aura-row tsd-row-liberation' : 'aura-row';
    html += `<tr class="${rowCls}">
      <td class="aura-cell aura-name">${u.machine}<br><small>${u.pilot}</small></td>
      <td class="aura-cell aura-step" id="tsd-a-${i}"></td>
      <td class="aura-cell aura-step" id="tsd-b1-${i}"></td>
      <td class="aura-cell aura-step" id="tsd-b2-${i}"></td>
      <td class="aura-cell aura-result-label" id="tsd-l-${i}"></td>
      <td class="aura-cell aura-final" id="tsd-c-${i}"></td>
    </tr>`;
  });
  html += '</tbody></table>';
  wrap.innerHTML = html;
}

function applyTurnStartRowState(r) {
  const u = r.unit;
  if (r.finalTemp != null) u.auraLiberated = true;
  u.temporaryPowerAura = null;
  u.currentAura = r.finalAura;
  refreshEffectivePower(u);
}

function fillTurnStartTableAll(rows) {
  rows.forEach((r, i) => {
    document.getElementById(`tsd-a-${i}`).innerHTML = r.colA;
    document.getElementById(`tsd-b1-${i}`).innerHTML = r.finalHtmlB1;
    document.getElementById(`tsd-b2-${i}`).innerHTML = r.finalHtmlB2;
    applyTurnStartRowState(r);
    document.getElementById(`tsd-l-${i}`).textContent = '▶';
    document.getElementById(`tsd-c-${i}`).innerHTML = r.finalHtmlC;
  });
}

function turnStartAnimateMiniDice(container, finalValue, duration) {
  duration = duration == null ? 520 : duration;
  return new Promise(resolve => {
    if (!container) {
      resolve();
      return;
    }
    container.innerHTML = '<span class="tsd-mini-flicker"> </span>';
    const span = container.querySelector('.tsd-mini-flicker');
    if (!span) {
      resolve();
      return;
    }
    const t0 = performance.now();
    function tick(now) {
      if (turnStartTableAbort) {
        span.textContent = String(finalValue);
        span.className = 'tsd-mini-settled';
        resolve();
        return;
      }
      if (now - t0 < duration) {
        span.textContent = String(Math.floor(Math.random() * 6) + 1);
        requestAnimationFrame(tick);
      } else {
        span.textContent = String(finalValue);
        span.className = 'tsd-mini-settled';
        resolve();
      }
    }
    requestAnimationFrame(tick);
  });
}

function showTurnStartTableCompleteUI() {
  document.getElementById('tsdPhaseHint').textContent = '完了 — OKで手番へ';
  document.getElementById('tsdSkip').style.display = 'none';
  document.getElementById('tsdSkip').disabled = false;
  document.getElementById('tsdNext').style.display = 'inline-block';
}

function turnStartConfirmFinish() {
  document.getElementById('tsdSkip').style.display = 'inline-block';
  finishTurnStartOverlay();
}

function turnStartWait(ms) {
  return new Promise(res => setTimeout(res, ms));
}

async function runTurnStartTableAnimation(rows) {
  const wait = turnStartWait;
  if (!rows.length) return;

  document.getElementById('tsdPhaseHint').textContent = '段階1: 搭乗オーラ解放（全員同時）';
  await wait(600);
  if (turnStartTableAbort) return;
  rows.forEach((r, i) => {
    document.getElementById(`tsd-a-${i}`).innerHTML = r.colA;
    if (r.logBracket) addLog('system', r.logBracket);
  });
  await wait(450);
  if (turnStartTableAbort) return;

  document.getElementById('tsdPhaseHint').textContent = '段階2: 変動1d6（全員同時）';
  await wait(650);
  await Promise.all(rows.map((r, i) => {
    const el = document.getElementById(`tsd-b1-${i}`);
    if (r.skipAuraDiceRolls) {
      el.innerHTML = r.finalHtmlB1;
      return Promise.resolve();
    }
    return turnStartAnimateMiniDice(el, r.dFluct);
  }));
  if (turnStartTableAbort) return;
  await wait(180);
  rows.forEach((r, i) => { document.getElementById(`tsd-b1-${i}`).innerHTML = r.finalHtmlB1; });
  await wait(380);
  if (turnStartTableAbort) return;

  document.getElementById('tsdPhaseHint').textContent = '段階3: オーラ力判定（全員同時）';
  await wait(650);
  await Promise.all(rows.map((r, i) => {
    const el = document.getElementById(`tsd-b2-${i}`);
    if (r.skipAuraDiceRolls) {
      el.innerHTML = r.finalHtmlB2;
      return Promise.resolve();
    }
    if (r.dResolve == null) {
      el.innerHTML = r.finalHtmlB2;
      return Promise.resolve();
    }
    return turnStartAnimateMiniDice(el, r.dResolve);
  }));
  if (turnStartTableAbort) return;
  await wait(180);
  rows.forEach((r, i) => { document.getElementById(`tsd-b2-${i}`).innerHTML = r.finalHtmlB2; });
  rows.forEach(r => addLog('system', r.logAura));
  await wait(380);
  if (turnStartTableAbort) return;

  document.getElementById('tsdPhaseHint').textContent = '段階4: 確定（全員同時）';
  await wait(650);
  if (turnStartTableAbort) return;
  rows.forEach((r, i) => {
    applyTurnStartRowState(r);
    document.getElementById(`tsd-l-${i}`).textContent = '▶';
    document.getElementById(`tsd-c-${i}`).innerHTML = r.finalHtmlC;
  });
  drawMap();
  await wait(450);
}

function turnStartSkipAll() {
  turnStartTableAbort = true;
  const rows = turnStartTableRows;
  if (rows && rows.length) {
    fillTurnStartTableAll(rows);
    rows.forEach(r => {
      if (r.logBracket) addLog('system', r.logBracket);
      addLog('system', r.logAura);
    });
    drawMap();
  }
  document.getElementById('tsdPhaseHint').textContent = '演出スキップで確定しました';
  showTurnStartTableCompleteUI();
}

function finishTurnStartOverlay() {
  document.getElementById('turnStartDiceOverlay').classList.remove('show');
  document.getElementById('tsdSkip').disabled = false;
  endAuraPhase();
}

// ===== オーラ力フェイズ =====
function startAuraPhase() {
  currentPhase = 'AURA_POWER';
  updateTopBar();
  units.forEach(u => { u.temporaryPowerAura = null; });
  units.filter(u => u.status === 'alive').forEach(refreshEffectivePower);

  turnStartTableRows = simulateTurnStartRows();
  turnStartTableAbort = false;

  document.getElementById('auraPhasePanel').style.display = 'none';

  if (spectatorMode) {
    if (turnStartTableRows.length) {
      turnStartTableRows.forEach(r => {
        if (r.logBracket) addLog('system', r.logBracket);
        applyTurnStartRowState(r);
        addLog('system', r.logAura);
      });
    }
    drawMap();
    document.getElementById('turnStartDiceOverlay').classList.remove('show');
    addLog('system', '[観戦] オーラ力判定を即時適用');
    syncRightPanelUnitStats();
    beginTurnPlanning();
    return;
  }

  document.getElementById('tsdTitle').textContent = `ターン ${gameTurn} — オーラ力判定：各段階の推移`;
  document.getElementById('tsdPhaseHint').textContent = '';
  mountTurnStartTable(turnStartTableRows);
  document.getElementById('tsdNext').style.display = 'none';
  document.getElementById('tsdSkip').style.display = 'inline-block';
  document.getElementById('tsdSkip').disabled = false;
  document.getElementById('turnStartDiceOverlay').classList.add('show');

  if (!turnStartTableRows.length) {
    showTurnStartTableCompleteUI();
    return;
  }
  runTurnStartTableAnimation(turnStartTableRows).finally(() => {
    if (!turnStartTableAbort) showTurnStartTableCompleteUI();
  });
}

function endAuraPhase() {
  document.getElementById('auraPhasePanel').style.display = 'none';
  document.getElementById('turnStartDiceOverlay').classList.remove('show');
  beginTurnPlanning();
}

// ===== 同時計画ターン（移動プラン→一括実行→射撃・格闘を順解決）=====
function beginTurnPlanning() {
  moveRevealPaths = null;
  buildTurnOrder();
  if (!turnOrder.length) {
    endTurnFromEmptyOrder();
    return;
  }
  addLog('system', spectatorMode
    ? '[観戦] 両軍AIが行動・移動を計画し、自動で進みます。'
    : '同時計画：操作側ユニットは全員「行動→移動」を入力し、準備ができたら「同時実行」で移動を一括解決します。');
  planSnapshot = {};
  turnSubPhase = 'planning';
  resolutionIndex = 0;
  currentOrderIndex = 0;
  turnOrder.forEach(u => {
    if (u.status !== 'alive') return;
    planSnapshot[u.id] = { x: u.x, y: u.y, dir: u.dir };
    if (isPlayerUnit(u)) {
      u.planComplete = false;
    } else {
      aiCreatePlan(u);
    }
  });
  if (typeof DunbainQL !== 'undefined' && scenario && scenario.qlLearnPlayerSide && DunbainQL.isEnabled()) {
    turnOrder.forEach(u => {
      if (u.status !== 'alive' || !isPlayerUnit(u)) return;
      const rb = u.previousDeclaredAction === '射撃';
      const legal = ['射撃', '回避', '格闘', '通常移動', '高速移動', '突撃'].filter(a => !(a === '射撃' && rb));
      DunbainQL.onAiPlanStart(u, legal);
    });
  }
  advanceToNextHumanPlan();
}

function advanceToNextHumanPlan() {
  hideMapHud();
  for (let i = 0; i < turnOrder.length; i++) {
    const u = turnOrder[i];
    if (u.status !== 'alive') continue;
    if (!isPlayerUnit(u)) continue;
    if (u.planComplete) continue;
    currentOrderIndex = i;
    u.hasActed = false;
    updateOrderBar();
    updateTopBar();
    syncRightPanelUnitStats();
    centerMapOnUnit(u);
    showActionSelect(u);
    return;
  }
  showPlanReadyUI();
}

/** 現在のカメラ中心に最も近い味方（命令完了HUDを画面中央付近に留める用） */
function unitNearestFriendlyToCamera() {
  let best = null, bestD = Infinity;
  for (let i = 0; i < units.length; i++) {
    const u = units[i];
    if (u.status !== 'alive' || !isPlayerUnit(u)) continue;
    const c = hexCenter(u.x, u.y);
    const d = (c.x - cameraX) ** 2 + (c.y - cameraY) ** 2;
    if (d < bestD) {
      bestD = d;
      best = u;
    }
  }
  return best;
}

function showPlanReadyUI() {
  currentPhase = 'PLAN_READY';
  currentOrderIndex = 0;
  updateTopBar();
  updateOrderBar();
  syncRightPanelUnitStats();

  if (typeof DunbainQL !== 'undefined' && scenario && scenario.qlLearnPlayerSide && DunbainQL.isEnabled() && !spectatorMode && planSnapshot) {
    turnOrder.forEach(u => {
      if (u.status !== 'alive' || !isPlayerUnit(u) || !u.planComplete || !u.selectedAction) return;
      const s = planSnapshot[u.id];
      if (!s) return;
      const ghost = Object.assign({}, u, { x: s.x, y: s.y, dir: s.dir });
      let nearest = null;
      let bestD = Infinity;
      for (let i = 0; i < units.length; i++) {
        const e = units[i];
        if (!e || e.team === u.team || e.status !== 'alive') continue;
        const d = hexDistance(ghost.x, ghost.y, e.x, e.y);
        if (d < bestD) {
          bestD = d;
          nearest = e;
        }
      }
      const sk = DunbainQL.encodeState(ghost, nearest);
      DunbainQL.setPending(u, sk, u.selectedAction);
    });
  }

  if (spectatorMode) {
    hideMapHud();
    if (spectatorAutoExecuteTimer) {
      clearTimeout(spectatorAutoExecuteTimer);
      spectatorAutoExecuteTimer = null;
    }
    spectatorAutoExecuteTimer = setTimeout(() => {
      spectatorAutoExecuteTimer = null;
      if (gameOver || currentPhase !== 'PLAN_READY') return;
      executeSimultaneousTurn();
    }, spectatorExecuteDelayMs);
    drawMap();
    return;
  }

  const mapHudPanel = document.getElementById('mapHudPanel');
  mapHudPanel.classList.remove('map-hud-ranged-phase');
  mapHudPanel.innerHTML = `
    <div class="map-hud-title">全員の命令入力済み</div>
    <div style="color:#aaa;font-size:11px;line-height:1.45;margin-bottom:10px;">移動はまだ反映されていません。「同時実行」で全機の移動を一度に解決し、その後ターン順に射撃・格闘を処理します。<br>同じ到達マスを複数機が選んだ場合、ターン順で<strong>後手</strong>の移動はキャンセルされます。<br>敵のマスへ入る場合は<strong>衝突</strong>（受け側退避・衝突判定表・w/d）を適用します。</div>
    <button type="button" class="action-btn" id="executeSimultaneousBtn" style="width:100%;">同時実行</button>
  `;
  showMapHud();
  document.getElementById('executeSimultaneousBtn').addEventListener('click', ev => {
    ev.stopPropagation();
    executeSimultaneousTurn();
  });
  drawMap();
  const anchor = unitNearestFriendlyToCamera();
  if (anchor) {
    requestAnimationFrame(() => {
      positionMapHudAtUnit(anchor);
      requestAnimationFrame(() => positionMapHudAtUnit(anchor));
    });
  } else {
    mapHudPanel.style.left = '12px';
    mapHudPanel.style.top = '12px';
  }
}

/** 味方ユニットのマスのみ進入不可。敵マスは衝突ルールで進入可 */
function isMoveStepBlockedByAlly(unit, nx, ny) {
  return units.some(o =>
    o.status === 'alive' && o.id !== unit.id && o.x === nx && o.y === ny && o.team === unit.team);
}

function findCollisionDisplacementHex(defender, destX, destY, invader) {
  const scored = [];
  for (let d = 0; d < 6; d++) {
    const nx = destX + DIR_DX[d];
    const ny = destY + (destX % 2 === 0 ? DIR_DY_EVEN[d] : DIR_DY_ODD[d]);
    if (nx < 0 || nx >= mapCols || ny < 0 || ny >= mapRows) continue;
    if (units.some(u =>
      u.status === 'alive' && u.x === nx && u.y === ny && u.id !== defender.id && u.id !== invader.id)) continue;
    const fromIx = invader.x;
    const fromIy = invader.y;
    const distBack = hexDistance(nx, ny, fromIx, fromIy);
    scored.push({ x: nx, y: ny, distBack });
  }
  scored.sort((a, b) => b.distBack - a.distBack);
  return scored.length ? { x: scored[0].x, y: scored[0].y } : null;
}

function collisionMaybeDropWeapon(unit) {
  if (!unit || !unit.weapons || !unit.weapons.length) return;
  const r = roll1d6();
  if (r > 3) return;
  const usable = unit.weapons.filter(w => canOperateWeapon(unit, w));
  if (!usable.length) return;
  const w = usable[Math.floor(Math.random() * usable.length)];
  const ix = unit.weapons.indexOf(w);
  if (ix >= 0) unit.weapons.splice(ix, 1);
  addLog(unit.team, `${unit.pilot}: 衝突—武器落下判定 1d6=${r}（≤3）→ ${w} を喪失`);
}

function resolveCollisionTableOutcome(invader, defender) {
  if (typeof COLLISION_TABLE === 'undefined' || typeof powerRankToCollisionNum !== 'function') return null;
  const invN = powerRankToCollisionNum(invader.effectivePower);
  const defN = powerRankToCollisionNum(defender.effectivePower);
  const diff = invN - defN;
  const col = collisionTableColumnIndex(diff);
  const row = roll1d6();
  const outcome = COLLISION_TABLE[row - 1][col];
  addLog('system', `衝突判定 ${invader.pilot}→${defender.pilot} パワー差${diff} 列${col} 1d6=${row} → ${outcome || '効果なし'}`);
  return outcome;
}

function applyCollisionOutcomeForInvader(invader, outcome) {
  if (!outcome) return;
  if (outcome === 'w') {
    collisionMaybeDropWeapon(invader);
    return;
  }
  if (outcome === 'd') {
    invader.collisionSkipShootMeleeThisTurn = true;
    invader.collisionSkipMoveForGameTurn = gameTurn + 1;
    collisionMaybeDropWeapon(invader);
    addLog(invader.team, `${invader.pilot}: 衝突d — 本ターンは射撃・格闘・突撃不可、次ターンは移動不可`);
  }
}

function aiFinalizeMovementPlanWithCollisionLock(unit) {
  if (unit.collisionSkipMoveForGameTurn === gameTurn) {
    unit.collisionSkipMoveForGameTurn = null;
    unit.planEndState = { x: unit.x, y: unit.y, dir: unit.dir };
    unit.planPathHexes = [{ x: unit.x, y: unit.y }];
    unit.planMoveCmd = '';
    addLog(unit.team, `${unit.pilot}: 衝突後遺—このターンは移動不可 (AI)`);
  }
  unit.planComplete = true;
}

function executePlannedMovesWithConflicts() {
  const claimed = new Set();
  for (let i = 0; i < turnOrder.length; i++) {
    const u = turnOrder[i];
    if (u.status !== 'alive') continue;
    const dest = u.planEndState || { x: u.x, y: u.y, dir: u.dir };
    const key = `${dest.x},${dest.y}`;

    const occupant = units.find(o => o.status === 'alive' && o.id !== u.id && o.x === dest.x && o.y === dest.y);

    if (occupant) {
      if (occupant.team === u.team) {
        addLog('system', `${u.pilot}: 移動キャンセル（味方のマス）`);
        continue;
      }
      const inv = u;
      const def = occupant;
      const push = findCollisionDisplacementHex(def, dest.x, dest.y, inv);
      if (!push) {
        addLog('system', `${inv.pilot}: 衝突—空きヘックスなしのため進入不可`);
        continue;
      }
      const outcome = resolveCollisionTableOutcome(inv, def);
      applyCollisionOutcomeForInvader(inv, outcome);
      def.x = push.x;
      def.y = push.y;
      claimed.add(key);
      inv.x = dest.x;
      inv.y = dest.y;
      inv.dir = dest.dir;
      addLog(inv.team, `${inv.pilot}: 移動＋衝突 (${dest.x},${dest.y})／${def.pilot} は (${push.x},${push.y}) へ退避`);
      continue;
    }

    if (claimed.has(key)) {
      addLog('system', `${u.pilot}: 移動キャンセル（同一到達マスは先に予約済み）`);
      continue;
    }
    claimed.add(key);
    u.x = dest.x;
    u.y = dest.y;
    u.dir = dest.dir;
    addLog(u.team, `${u.pilot}: 移動 → (${u.x},${u.y}) 向き${u.dir}`);
  }
}

function executeSimultaneousTurn() {
  if (spectatorAutoExecuteTimer) {
    clearTimeout(spectatorAutoExecuteTimer);
    spectatorAutoExecuteTimer = null;
  }
  hideMapHud();
  addLog('system', spectatorMode ? '--- 移動を解決 ---' : '--- 移動を同時解決 ---');
  moveRevealPaths = [];
  if (planSnapshot) {
    for (let i = 0; i < turnOrder.length; i++) {
      const u = turnOrder[i];
      if (u.status !== 'alive' || !planSnapshot[u.id]) continue;
      const hexes = u.planPathHexes;
      if (!hexes || hexes.length < 2) continue;
      moveRevealPaths.push({ unitId: u.id, team: u.team, hexes: hexes.slice() });
    }
  }
  executePlannedMovesWithConflicts();
  if (moveRevealPaths.length) {
    for (let j = 0; j < moveRevealPaths.length; j++) {
      const row = moveRevealPaths[j];
      const u = units.find(ux => ux.id === row.unitId);
      const dest = u && u.planEndState;
      row.canceled = !!(u && dest && (u.x !== dest.x || u.y !== dest.y));
    }
  }
  drawMap();
  if (checkVictory()) return;
  turnSubPhase = 'resolving';
  resolutionIndex = 0;
  runNextResolution();
}

/** AI 射撃：プレイヤーと同じ武器・目標の優先で1回だけ選ぶ（無ければ null） */
function aiPickRangedWeaponAndTarget(unit) {
  const enemies = units.filter(ux => ux.team !== unit.team && ux.status === 'alive');
  const rangedWeapons = unit.weapons.filter(w => {
    if (!canOperateWeapon(unit, w)) return false;
    const k = w === 'オーラソード' ? 'ソード' : w;
    return WEAPON_HIT[k] && k !== 'ソード';
  });
  if (rangedWeapons.length === 0 || enemies.length === 0) return { pick: null, reason: 'none' };
  const sorted = enemies.slice().sort((a, b) => hexDistance(unit.x, unit.y, a.x, a.y) - hexDistance(unit.x, unit.y, b.x, b.y));
  for (let wi = 0; wi < rangedWeapons.length; wi++) {
    const w = rangedWeapons[wi];
    const wKey = w === 'オーラソード' ? 'ソード' : w;
    for (let i = 0; i < sorted.length; i++) {
      const e = sorted[i];
      const range = hexDistance(unit.x, unit.y, e.x, e.y);
      if (range < 1 || range > 8 || WEAPON_HIT[wKey][range - 1] == null) continue;
      if (!isInEffectiveRangedArc(unit, e)) continue;
      return { pick: { weapon: w, target: e }, reason: 'ok' };
    }
  }
  return { pick: null, reason: 'noLine' };
}

/** AI 射撃：弾道＋ダイス演出は人間と同じ。終了後 autoCloseMs 経過でターン進行 */
async function aiPresentRangedResolution(unit) {
  try {
    const { pick, reason } = aiPickRangedWeaponAndTarget(unit);
    if (!pick) {
      if (reason === 'none') addLog('system', `${unit.pilot}: 射撃なし(AI)`);
      else addLog('system', `${unit.pilot}: 射撃できず(AI)`);
      if (typeof DunbainQL !== 'undefined') DunbainQL.registerNoShot(unit);
      finishUnitTurn();
      return;
    }
    selectedWeapon = pick.weapon;
    rangedShotInProgress = true;
    hideMapHud();
    centerMapOnUnit(unit);
    drawMap();

    const targetId = pick.target.id;
    await new Promise(resolve => {
      playProjectileShotAnimation(unit, pick.target, resolve);
    });

    const u = units.find(x => x.id === unit.id);
    const t = units.find(x => x.id === targetId);
    if (!u || !t || u.status !== 'alive') {
      drawMap();
      if (spectatorMode) {
        addLog('system', `${unit.pilot}: 射撃スキップ（攻撃者／標的が無効）`);
        finishUnitTurn();
        return;
      }
      showPopup(
        '射撃',
        '<div class="popup-line">攻撃者または対象が無効のため処理をスキップしました。</div>',
        2200
      );
      return;
    }

    await runRangedCombatDiceSequence(u, t, { autoCloseMs: spectatorMode ? 0 : 2200 });
  } catch (e) {
    try { console.error('aiPresentRangedResolution', e); } catch (_) { /* ignore */ }
    addLog('system', `${unit.pilot}: 射撃処理で内部エラー — 次へ進みます`);
    hideMapHud();
    rangedShotInProgress = false;
    finishUnitTurn();
  }
}

async function aiResolveSimpleMelee(unit) {
  try {
    if (!hasAnyMeleeTarget(unit)) {
      addLog('system', `${unit.pilot}: 格闘なし(AI)`);
      finishUnitTurn();
      return;
    }
    unit.meleeParryStance = 'attacked';
    selectedSwordSide = null;
    if (meleeUsesSwordArc(unit)) {
      const sides = ['left', 'right'].filter(s =>
        units.some(e => e.team !== unit.team && e.status === 'alive' && isInSwordRange(unit, e, s)));
      selectedSwordSide = sides.length ? sides[Math.floor(Math.random() * sides.length)] : 'right';
    }
    selectedMeleeTier = ['high', 'mid', 'low'][Math.floor(Math.random() * 3)];
    const _ptp = MELEE_TIER_PARTS[selectedMeleeTier];
    selectedMeleeAttackPart = _ptp[Math.floor(Math.random() * _ptp.length)];
    if (meleeUsesSwordArc(unit) && unitHasMeleeSwordWeapon(unit)) {
      selectedMeleeMethod = Math.random() < 0.7 ? '斬る' : (Math.random() < 0.55 ? '突く' : '武器で殴る');
    } else {
      selectedMeleeMethod = ['殴る', '蹴る', '武器で殴る'][Math.floor(Math.random() * 3)];
    }
    const inReach = tgt => {
      if (!meleeUsesSwordArc(unit)) return hexDistance(unit.x, unit.y, tgt.x, tgt.y) === 1;
      return selectedSwordSide && isInSwordRange(unit, tgt, selectedSwordSide);
    };
    const targets = units.filter(t => t.team !== unit.team && t.status === 'alive' && inReach(t));
    if (!targets.length) {
      addLog('system', `${unit.pilot}: 格闘目標なし(AI)`);
      finishUnitTurn();
      return;
    }
    targets.sort((a, b) => hexDistance(unit.x, unit.y, a.x, a.y) - hexDistance(unit.x, unit.y, b.x, b.y));
    const t0 = targets[0];
    hideMapHud();
    centerMapOnUnit(unit);
    drawMap();
    if (isPlayerUnit(t0)) {
      meleeResolveVsTarget(unit, t0, { autoCloseMs: 2800 });
      return;
    }
    await new Promise(res => playMeleeClashAnimation(unit, t0, res));
    await runMeleeCombatDiceSequence(unit, t0, { autoCloseMs: spectatorMode ? 0 : 2800 });
  } catch (e) {
    try { console.error('aiResolveSimpleMelee', e); } catch (_) { /* ignore */ }
    addLog('system', `${unit.pilot}: 格闘処理で内部エラー — 次へ進みます`);
    hideMapHud();
    finishUnitTurn();
  }
}

// ===== 相互格闘（両者が格闘を選んだ場合の先攻/後攻ルール）=====

/** 隣接する敵で格闘を選んでいて未行動のユニットを探す */
function findMutualMeleeOpponent(unit) {
  for (let i = 0; i < turnOrder.length; i++) {
    const e = turnOrder[i];
    if (e.team === unit.team || e.status !== 'alive' || e.hasActed) continue;
    if (e.selectedAction !== '格闘') continue;
    if (e.id === unit.id) continue;
    const d = hexDistance(unit.x, unit.y, e.x, e.y);
    if (d <= 1) return e;
    if (d === 2 && (meleeUsesSwordArc(unit) || meleeUsesSwordArc(e))) {
      if (meleeUsesSwordArc(unit) && (isInSwordRange(unit, e, 'left') || isInSwordRange(unit, e, 'right'))) return e;
      if (meleeUsesSwordArc(e) && (isInSwordRange(e, unit, 'left') || isInSwordRange(e, unit, 'right'))) return e;
    }
  }
  return null;
}

/** 先攻/後攻ダイス（1d6同士、同値は振り直し） */
function rollMeleeInitiative(unitA, unitB) {
  let a, b;
  let tries = 0;
  do {
    a = roll1d6();
    b = roll1d6();
    tries++;
  } while (a === b && tries < 20);
  if (a === b) a = a + 1; // 安全弁
  return { aRoll: a, bRoll: b, aFirst: a > b };
}

/** 相互格闘のメイン処理（AI同士・プレイヤー関与両対応） */
async function resolveMutualMelee(unitA, unitB) {
  const init = rollMeleeInitiative(unitA, unitB);
  const first = init.aFirst ? unitA : unitB;
  const second = init.aFirst ? unitB : unitA;
  addLog('system', `相互格闘: ${unitA.pilot}(${init.aRoll}) vs ${unitB.pilot}(${init.bRoll}) → 先攻:${first.pilot} 後攻:${second.pilot}`);

  // 先攻のAI攻撃パラメータを設定
  aiSetupMeleeParams(first, second);

  // 後攻の選択: プレイヤーなら選択UI、AIならランダム
  let secondChoosesDefense;
  if (isPlayerUnit(second)) {
    secondChoosesDefense = await showMutualMeleeSecondChoiceUI(first, second, init);
  } else {
    // AIは50%で受けを選ぶ
    secondChoosesDefense = Math.random() < 0.5;
    addLog(second.team, `${second.pilot}: ${secondChoosesDefense ? '受けを選択' : '攻撃を選択'}(AI)`);
  }

  if (secondChoosesDefense) {
    second.meleeParryStance = 'defense_only';
  } else {
    second.meleeParryStance = 'attacked';
  }
  first.meleeParryStance = 'attacked';

  // 先攻の攻撃実行
  centerMapOnUnit(first);
  if (isPlayerUnit(first)) {
    // プレイヤーが先攻: 攻撃UIを出して待つ
    await new Promise(resolve => {
      pendingMutualMeleeResolve = resolve;
      pendingMutualMeleeSecond = second;
      pendingMutualMeleeSecondDefends = secondChoosesDefense;
      startMeleePhaseNoDefense(first);
    });
  } else {
    // AI先攻
    await aiExecuteMeleeAttack(first, second, secondChoosesDefense);
  }

  // 先攻の攻撃で相手が撃墜されていたら後攻はスキップ
  if (second.status !== 'alive') {
    second.hasActed = true;
    first.hasActed = true;
    if (checkVictory()) return;
    resolutionIndex++;
    runNextResolution();
    return;
  }

  // 後攻の処理
  if (secondChoosesDefense) {
    // 受けを選んだ → 攻撃しない
    addLog(second.team, `${second.pilot}: 受けを選んだため攻撃なし`);
    second.hasActed = true;
    first.hasActed = true;
    if (checkVictory()) return;
    resolutionIndex++;
    runNextResolution();
  } else {
    // 攻撃を選んだ → 受けなしで攻撃
    centerMapOnUnit(second);
    aiSetupMeleeParams(second, first);
    if (isPlayerUnit(second)) {
      await new Promise(resolve => {
        pendingMutualMeleeResolve = resolve;
        pendingMutualMeleeSecond = null;
        pendingMutualMeleeSecondDefends = false;
        startMeleePhaseNoDefense(second);
      });
    } else {
      await aiExecuteMeleeAttack(second, first, false);
    }
    second.hasActed = true;
    first.hasActed = true;
    if (checkVictory()) return;
    resolutionIndex++;
    runNextResolution();
  }
}

/** AI格闘パラメータ自動セット */
function aiSetupMeleeParams(attacker, target) {
  selectedSwordSide = null;
  if (meleeUsesSwordArc(attacker) && target) {
    const sides = ['left', 'right'].filter(s =>
      isInSwordRange(attacker, target, s));
    selectedSwordSide = sides.length ? sides[Math.floor(Math.random() * sides.length)] : 'right';
  } else if (meleeUsesSwordArc(attacker)) {
    selectedSwordSide = Math.random() < 0.5 ? 'left' : 'right';
  }
  selectedMeleeTier = ['high', 'mid', 'low'][Math.floor(Math.random() * 3)];
  const ptp = MELEE_TIER_PARTS[selectedMeleeTier];
  selectedMeleeAttackPart = ptp[Math.floor(Math.random() * ptp.length)];
  if (meleeUsesSwordArc(attacker) && unitHasMeleeSwordWeapon(attacker)) {
    selectedMeleeMethod = Math.random() < 0.7 ? '斬る' : (Math.random() < 0.55 ? '突く' : '武器で殴る');
  } else {
    selectedMeleeMethod = ['殴る', '蹴る', '武器で殴る'][Math.floor(Math.random() * 3)];
  }
}

/** AI格闘攻撃実行（受けなし） */
async function aiExecuteMeleeAttack(attacker, target, targetDefends) {
  if (!hasAnyMeleeTarget(attacker)) {
    addLog('system', `${attacker.pilot}: 格闘目標なし(AI)`);
    return;
  }
  hideMapHud();
  drawMap();

  if (spectatorMode) {
    // 観戦: 即時解決
    const data = computeMeleeResolutionVsAI(attacker, target);
    if (data.kind === 'miss') {
      addLog(attacker.team, `${attacker.pilot}→${target.pilot}: ${data.method} 外れ`);
    } else if (data.kind === 'defended') {
      // AI同士受けスキップ中だが念のため
      addLog(attacker.team, `${attacker.pilot}→${target.pilot}: ${data.method} 受け成功`);
      applyMeleeResolutionData(attacker, target, data);
    } else {
      applyMeleeResolutionData(attacker, target, data);
    }
    drawMap();
    syncRightPanelUnitStats();
    return;
  }

  await new Promise(res => playMeleeClashAnimation(attacker, target, res));
  await runMeleeCombatDiceSequence(attacker, target, { autoCloseMs: 2800 });
}

let pendingMutualMeleeResolve = null;
let pendingMutualMeleeSecond = null;
let pendingMutualMeleeSecondDefends = false;

/** 後攻プレイヤーの選択UI */
function showMutualMeleeSecondChoiceUI(first, second, init) {
