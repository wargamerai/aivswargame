// ===== ヘックスユーティリティ =====
function hexDistance(x1, y1, x2, y2) {
  // offset座標→cube座標に変換して距離計算
  const c1 = offsetToCube(x1, y1);
  const c2 = offsetToCube(x2, y2);
  return Math.max(Math.abs(c1.q - c2.q), Math.abs(c1.r - c2.r), Math.abs(c1.s - c2.s));
}

function offsetToCube(col, row) {
  const q = col;
  const r = row - Math.floor(col / 2);
  const s = -q - r;
  return { q, r, s };
}

function hexCenter(col, row) {
  // F16と同じ: pointy-top hex
  const x = col * hStep;
  const y = row * vStep + (col % 2) * (vStep / 2);
  return { x, y };
}

function hexPoints(cx, cy) {
  // F16と同じ: 角度0度スタート（pointy-top）
  const pts = [];
  for (let i = 0; i < 6; i++) {
    const angle = Math.PI / 180 * (60 * i);
    pts.push(`${cx + hexSize * Math.cos(angle)},${cy + hexSize * Math.sin(angle)}`);
  }
  return pts.join(' ');
}

// マップ上の機体向きと同じ（drawMap の dirAngles と一致）
const HEX_VIEW_DIR_DEG = { 0: -90, 1: -30, 2: 30, 3: 90, 4: 150, 5: -150 };

function drawMovePreviewSegmentArrow(svg, x0, y0, x1, y1, color) {
  const NS = 'http://www.w3.org/2000/svg';
  const dx = x1 - x0, dy = y1 - y0;
  const len = Math.hypot(dx, dy) || 1;
  const ux = dx / len, uy = dy / len;
  const pad0 = hexSize * 0.38, pad1 = hexSize * 0.34;
  const sx = x0 + ux * pad0, sy = y0 + uy * pad0;
  const ex = x1 - ux * pad1, ey = y1 - uy * pad1;
  const line = document.createElementNS(NS, 'line');
  line.setAttribute('x1', sx);
  line.setAttribute('y1', sy);
  line.setAttribute('x2', ex);
  line.setAttribute('y2', ey);
  line.setAttribute('stroke', color);
  line.setAttribute('stroke-width', '3.2');
  line.setAttribute('stroke-linecap', 'round');
  line.setAttribute('pointer-events', 'none');
  svg.appendChild(line);
  const ah = hexSize * 0.26;
  const bx = ex - ux * ah, by = ey - uy * ah;
  const px = -uy, py = ux;
  const tri = document.createElementNS(NS, 'polygon');
  tri.setAttribute('points', `${ex},${ey} ${bx + px * (ah * 0.5)},${by + py * (ah * 0.5)} ${bx - px * (ah * 0.5)},${by - py * (ah * 0.5)}`);
  tri.setAttribute('fill', color);
  tri.setAttribute('stroke', color);
  tri.setAttribute('pointer-events', 'none');
  svg.appendChild(tri);
}

function appendPreviewFacingArrow(svg, cx, cy, dir, color, scale) {
  const NS = 'http://www.w3.org/2000/svg';
  scale = scale == null ? 1 : scale;
  const rot = (HEX_VIEW_DIR_DEG[dir] || 0) + 90;
  const g = document.createElementNS(NS, 'g');
  g.setAttribute('transform', `translate(${cx},${cy}) rotate(${rot}) scale(${scale})`);
  g.setAttribute('pointer-events', 'none');
  const line = document.createElementNS(NS, 'line');
  line.setAttribute('x1', '0');
  line.setAttribute('y1', '6');
  line.setAttribute('x2', '0');
  line.setAttribute('y2', '-13');
  line.setAttribute('stroke', color);
  line.setAttribute('stroke-width', '2.8');
  line.setAttribute('stroke-linecap', 'round');
  g.appendChild(line);
  const tri = document.createElementNS(NS, 'polygon');
  tri.setAttribute('points', '0,-15 -4.5,-9 4.5,-9');
  tri.setAttribute('fill', color);
  g.appendChild(tri);
  svg.appendChild(g);
}

function drawPreviewMoveTrajectory(svg, stepStates, viewX, viewY, viewW, viewH) {
  if (!stepStates || stepStates.length < 2) return;
  const margin = hexSize * 2.5;
  function inView(x, y) {
    return x >= viewX - margin && x <= viewX + viewW + margin && y >= viewY - margin && y <= viewY + viewH + margin;
  }
  const colMain = '#5ee9d4';
  const colEnd = '#c6fff5';
  for (let i = 0; i < stepStates.length - 1; i++) {
    const s0 = stepStates[i], s1 = stepStates[i + 1];
    const c0 = hexCenter(s0.x, s0.y);
    const c1 = hexCenter(s1.x, s1.y);
    if (!inView(c0.x, c0.y) && !inView(c1.x, c1.y)) continue;
    const moved = s0.x !== s1.x || s0.y !== s1.y;
    if (moved) {
      drawMovePreviewSegmentArrow(svg, c0.x, c0.y, c1.x, c1.y, colMain);
    } else {
      appendPreviewFacingArrow(svg, c1.x, c1.y, s1.dir, colMain, 0.9);
    }
  }
  const last = stepStates[stepStates.length - 1];
  const prev = stepStates[stepStates.length - 2];
  if (prev.x !== last.x || prev.y !== last.y) {
    const lc = hexCenter(last.x, last.y);
    if (inView(lc.x, lc.y)) appendPreviewFacingArrow(svg, lc.x, lc.y, last.dir, colEnd, 1.05);
  }
}

function rankRainbowStyle(rank) {

function getAttackDirection(attacker, target) {
  // 防御側（target）の向きを基準に、攻撃者がどの方向から攻撃しているかを判定
  const dx = attacker.x - target.x;
  const dy = attacker.y - target.y;
  const angle = Math.atan2(dy, dx) * 180 / Math.PI;
  const relAngle = ((angle - (target.dir * 60 - 90)) % 360 + 360) % 360;
  if (relAngle < 45 || relAngle >= 315) return '正面';
  if (relAngle < 135) return '右側面';
  if (relAngle < 225) return '後面';
  return '左側面';
}

function hexNeighbor(col, row, dir) {
  return {
    x: col + DIR_DX[dir],
    y: row + (col % 2 === 0 ? DIR_DY_EVEN[dir] : DIR_DY_ODD[dir]),
  };
}

/** 隣接1マスのとき、目標が攻撃者のどの辺方向にあるか（0〜5＝絶対ヘクス方向） */
function adjacentNeighborDir(ax, ay, tx, ty) {
  for (let nd = 0; nd < 6; nd++) {
    const n = hexNeighbor(ax, ay, nd);
    if (n.x === tx && n.y === ty) return nd;
  }
  return null;
}

/** 剣左・剣右: 攻撃者の正面を0°とした目標の方位角（度） */
function swordRelAngleDeg(attacker, target) {
  const O = hexCenter(attacker.x, attacker.y);
  const F = hexNeighbor(attacker.x, attacker.y, attacker.dir);
  const Of = hexCenter(F.x, F.y);
  const T = hexCenter(target.x, target.y);
  const fa = Math.atan2(Of.y - O.y, Of.x - O.x);
  let a = Math.atan2(T.y - O.y, T.x - O.x) - fa;
  while (a <= -Math.PI) a += 2 * Math.PI;
  while (a > Math.PI) a -= 2 * Math.PI;
  return a * 180 / Math.PI;
}

/**
 * 剣左・剣右の攻撃範囲図（ルールブック）：左右に振り分けた角度帯のほか、正面付近のヘクスが囲みに含まれる。
 * 殴り・蹴りは別図で距離2正面は範囲外だが、当ゲームでは非剣は hexDistance===1 のみなのでここは剣専用。
 */
function isSwordFrontSectorByDiagram(d, rel) {
  if (d === 1) return rel >= -40 && rel <= 40;
  if (d === 2) return rel > -65 && rel < 65;
  return false;
}

/** 武装一覧表ルール: 剣左／剣右で届くヘクスが異なる（距離1〜2） */
function isInSwordRange(attacker, target, side) {
  const d = hexDistance(attacker.x, attacker.y, target.x, target.y);
  if (d < 1 || d > 2) return false;
  const rel = swordRelAngleDeg(attacker, target);
  const back = Math.abs(rel) >= 179;
  if (side === 'right') {
    if (d === 1) return isSwordFrontSectorByDiagram(1, rel) || (rel > 40 && rel <= 180) || back;
    if (d === 2) return isSwordFrontSectorByDiagram(2, rel) || (rel >= 65 && rel <= 180);
    return false;
  }
  if (side === 'left') {
    if (d === 1) return isSwordFrontSectorByDiagram(1, rel) || (rel < -40 && rel >= -180) || back;
    if (d === 2) return isSwordFrontSectorByDiagram(2, rel) || (rel <= -65 && rel >= -180) || rel >= 179;
    return false;
  }
  return false;
}

/**
 * 目標位置修正値図（ルールブック・スキャン図に合わせる）
 * 剣(左): 距離1は正面(0)・左前(5)=0、他=-1。距離2は正面±65°内=0、右翼(rel≥65°)=-1、左翼は0寄り。
 * 剣(右): 距離1は正面(0)・右前(1)=0、他=-1。距離2は正面±65°内=0、左翼(rel≤-65°)=-1、右翼は0寄り。
 */
function getSwordHexHitMod(attacker, target, side) {
  if (!isInSwordRange(attacker, target, side)) return 0;
  const d = hexDistance(attacker.x, attacker.y, target.x, target.y);
  const nd = adjacentNeighborDir(attacker.x, attacker.y, target.x, target.y);
  if (d === 1 && nd != null) {
    const ri = (nd - attacker.dir + 6) % 6;
    if (side === 'left') return ri === 0 || ri === 5 ? 0 : -1;
    if (side === 'right') return ri === 0 || ri === 1 ? 0 : -1;
  }
  if (d === 2) {
    const rel = swordRelAngleDeg(attacker, target);
    if (isSwordFrontSectorByDiagram(2, rel)) return 0;
    if (side === 'left' && rel >= 65) return -1;
    if (side === 'right' && rel <= -65) return -1;
    return 0;
  }
  return 0;
}

/**
 * 殴る・蹴る 目標位置修正値図: 隣接のみ。
 * ri = 向き基準（0正面,1右前,2右後,3後,4左後,5左前）。右図は左図の左右鏡。
 */
const PUNCH_KICK_LEFT_POSITION_MOD = [0, -1, -2, -1, -1, 0];
const PUNCH_KICK_RIGHT_POSITION_MOD = [0, 0, -1, -1, -2, -1];

function getPunchKickHexHitMod(attacker, target, handSide) {
  const d = hexDistance(attacker.x, attacker.y, target.x, target.y);
  if (d !== 1) return 0;
  const nd = adjacentNeighborDir(attacker.x, attacker.y, target.x, target.y);
  if (nd == null) return 0;
  const ri = (nd - attacker.dir + 6) % 6;
  const tbl = handSide === 'left' ? PUNCH_KICK_LEFT_POSITION_MOD : PUNCH_KICK_RIGHT_POSITION_MOD;
  return tbl[ri];
}

const SWORD_MELEE_WEAPON_NAMES = ['オーラソード', 'ソード', 'ガッシュ', '鉤爪'];
function unitHasMeleeSwordWeapon(unit) {
  return !!(unit && !unit.swordDisarmed && unit.weapons && unit.weapons.some(w =>
    SWORD_MELEE_WEAPON_NAMES.indexOf(w) >= 0 && canOperateWeapon(unit, w)));
}
/** 行動「格闘」かつ剣系武装あり → 左／右・距離2の剣ルール */
function meleeUsesSwordArc(unit) {
  return !!(unit && unit.selectedAction === '格闘' && unitHasMeleeSwordWeapon(unit));
}
function hasAnyMeleeTarget(unit) {
  const foes = units.filter(u => u.team !== unit.team && u.status === 'alive');
  if (!meleeUsesSwordArc(unit)) {
    return foes.some(t => hexDistance(unit.x, unit.y, t.x, t.y) === 1);
  }
  return foes.some(t => {
    const d = hexDistance(unit.x, unit.y, t.x, t.y);
    if (d === 1) return true;
    if (d === 2) return isInSwordRange(unit, t, 'left') || isInSwordRange(unit, t, 'right');
    return false;
  });
}

/** 射撃: 正面に隣接する3ヘクス（向き・その左右隣方向）へ伸びる範囲のみ。後方は不可 */
function isInRangedFiringArc(attacker, target) {
  if (target.x === attacker.x && target.y === attacker.y) return false;
  const d = attacker.dir;
  const c0 = hexCenter(attacker.x, attacker.y);
  const nL = hexNeighbor(attacker.x, attacker.y, (d + 5) % 6);
  const nF = hexNeighbor(attacker.x, attacker.y, d);
  const nR = hexNeighbor(attacker.x, attacker.y, (d + 1) % 6);
  const cL = hexCenter(nL.x, nL.y);
  const cF = hexCenter(nF.x, nF.y);
  const cR = hexCenter(nR.x, nR.y);
  const cT = hexCenter(target.x, target.y);
  function ang(px, py) {
    return Math.atan2(py - c0.y, px - c0.x);
  }
  const aF = ang(cF.x, cF.y);
  const aL = ang(cL.x, cL.y);
  const aR = ang(cR.x, cR.y);
  const aT = ang(cT.x, cT.y);
  function norm(a) {
    let t = a - aF;
    while (t <= -Math.PI) t += 2 * Math.PI;
    while (t > Math.PI) t -= 2 * Math.PI;
    return t;
  }
  const rL = norm(aL);
  const rR = norm(aR);
  const rT = norm(aT);
  const lo = Math.min(rL, rR);
  const hi = Math.max(rL, rR);
  if (hi - lo <= Math.PI) return rT >= lo && rT <= hi;
  return rT <= lo || rT >= hi;
}

function isHeadSensorDestroyed(attacker) {
  return !!(attacker && attacker.destroyed && attacker.destroyed['頭']);
}

/** 頭破壊時は正面へ連なるヘックスのみ射撃可（左右隣は不可） */
function isForwardOnlyRangedLine(attacker, target) {
  if (!attacker || !target || (target.x === attacker.x && target.y === attacker.y)) return false;
  let x = attacker.x;
  let y = attacker.y;
  const d = attacker.dir;
  for (let step = 0; step < 8; step++) {
    const n = hexNeighbor(x, y, d);
    x = n.x;
    y = n.y;
    if (x < 0 || x >= mapCols || y < 0 || y >= mapRows) break;
    if (x === target.x && y === target.y) return true;
  }
  return false;
}

function isInEffectiveRangedArc(attacker, target) {
  if (!attacker || !target) return false;
  if (isHeadSensorDestroyed(attacker)) return isForwardOnlyRangedLine(attacker, target);
  return isInRangedFiringArc(attacker, target);
}

function getRangedHitPreviewVsEnemy(shooter, enemy, weaponLabel) {
  const wKey = weaponLabel === 'オーラソード' ? 'ソード' : weaponLabel;
  const tbl = WEAPON_HIT[wKey];
  if (!tbl) return null;
  if (!canOperateWeapon(shooter, weaponLabel)) return null;
  if (!isInEffectiveRangedArc(shooter, enemy)) return null;
  const range = hexDistance(shooter.x, shooter.y, enemy.x, enemy.y);
  if (range < 1 || range > 8) return null;
  const baseHit = tbl[range - 1];
  if (baseHit === null || baseHit === undefined) return null;
  const mod = SHOOTER_POWER_MOD[shooter.effectivePower] + TARGET_EVADE_MOD[enemy.effectivePower] +
    (TARGET_ACTION_MOD[enemy.selectedAction] || 0);
  const finalHit = baseHit + mod;
  return {
    range,
    baseHit,
    mod,
    finalHit,
  };
}

function drawRangedProbabilityBubbles(svg, shooter, viewX, viewY, viewW, viewH) {
  const NS = 'http://www.w3.org/2000/svg';
  const wl = selectedWeapon;
  if (!wl || !shooter) return;

  const margin = hexSize * 4;
  for (let i = 0; i < units.length; i++) {
    const enemy = units[i];
    if (enemy.status !== 'alive' || enemy.team === shooter.team) continue;
    const info = getRangedHitPreviewVsEnemy(shooter, enemy, wl);
    if (!info) continue;

    const c = hexCenter(enemy.x, enemy.y);
    const bx = c.x + hexSize * 1.12;
    const by = c.y - hexSize * 0.2;
    if (bx < viewX - margin || bx > viewX + viewW + margin || by < viewY - margin || by > viewY + viewH + margin) continue;

    const g = document.createElementNS(NS, 'g');
    g.setAttribute('transform', `translate(${bx},${by})`);
    g.setAttribute('pointer-events', 'none');

    const rw = 52;
    const rh = 30;
    const rect = document.createElementNS(NS, 'rect');
    rect.setAttribute('x', String(-rw / 2 + 6));
    rect.setAttribute('y', String(-rh / 2));
    rect.setAttribute('width', String(rw - 6));
    rect.setAttribute('height', String(rh));
    rect.setAttribute('rx', '8');
    rect.setAttribute('fill', 'rgba(18,16,28,0.95)');
    rect.setAttribute('stroke', 'rgba(255,200,140,0.92)');
    rect.setAttribute('stroke-width', '1.25');

    const tail = document.createElementNS(NS, 'path');
    tail.setAttribute('d', `M ${-rw / 2 + 6} ${-5} L ${-rw / 2 - 5} 0 L ${-rw / 2 + 6} ${5} Z`);
    tail.setAttribute('fill', 'rgba(18,16,28,0.95)');
    tail.setAttribute('stroke', 'rgba(255,200,140,0.92)');
    tail.setAttribute('stroke-width', '1');
    tail.setAttribute('stroke-linejoin', 'round');

    g.appendChild(rect);
    g.appendChild(tail);

    const tPct = document.createElementNS(NS, 'text');
    tPct.setAttribute('x', String(5));
    tPct.setAttribute('y', String(-4));
    tPct.setAttribute('text-anchor', 'middle');
    tPct.setAttribute('fill', '#ffe8cc');
    tPct.setAttribute('font-size', '12');
    tPct.setAttribute('font-weight', 'bold');
    tPct.setAttribute('font-family', 'system-ui,sans-serif');
    const needBelow = Math.round(Number(info.finalHit));
    tPct.textContent = `${needBelow}以下`;

    const tSub = document.createElementNS(NS, 'text');
    tSub.setAttribute('x', String(5));
    tSub.setAttribute('y', String(10));
    tSub.setAttribute('text-anchor', 'middle');
    tSub.setAttribute('fill', '#8ab');
    tSub.setAttribute('font-size', '7');
    tSub.setAttribute('font-family', 'system-ui,sans-serif');
    tSub.textContent = `距${info.range}`;

    g.appendChild(tPct);
    g.appendChild(tSub);
    svg.appendChild(g);
  }
}

// ===== マップ描画 =====
function initMap() {
  cameraX = Math.floor(mapCols / 2) * hStep;
  cameraY = Math.floor(mapRows / 2) * vStep;
  zoomLevel = 1;

  const area = document.getElementById('mapArea');
  let clickStartX = 0, clickStartY = 0;
  area.addEventListener('mousedown', e => {
    isDragging = true;
    dragStartX = e.clientX;
    dragStartY = e.clientY;
    clickStartX = e.clientX;
    clickStartY = e.clientY;
    area.style.cursor = 'grabbing';
    e.preventDefault();
  });
  window.addEventListener('mousemove', e => {
    if (!isDragging) return;
    cameraX -= (e.clientX - dragStartX) / zoomLevel;
    cameraY -= (e.clientY - dragStartY) / zoomLevel;
    dragStartX = e.clientX;
    dragStartY = e.clientY;
    drawMap();
  });
  window.addEventListener('mouseup', e => {
    if (isDragging) {
      const moved = Math.abs(e.clientX - clickStartX) + Math.abs(e.clientY - clickStartY);
      isDragging = false;
      document.getElementById('mapArea').style.cursor = 'grab';
      if (moved < 5) handleMapPointerClick(e);
    }
  });

  drawMap();
}

function zoomMap(dir) {
  if (dir > 0) zoomLevel = Math.min(zoomLevel * 1.2, 4);
  else zoomLevel = Math.max(zoomLevel / 1.2, 0.3);
  document.getElementById('zoomLabel').textContent = Math.round(zoomLevel * 100) + '%';
  drawMap();
}

function clampCamera() {
  const maxX = mapCols * hStep;
  const maxY = mapRows * vStep;
  cameraX = Math.max(0, Math.min(maxX, cameraX));
  cameraY = Math.max(0, Math.min(maxY, cameraY));
}


function drawMap() {
  const svg = document.getElementById('mapSvg');
  const svgRect = svg.getBoundingClientRect();
  const svgW = svgRect.width || 800;
  const svgH = svgRect.height || 600;
  const viewW = svgW / zoomLevel;
  const viewH = svgH / zoomLevel;
  const viewX = cameraX - viewW / 2;
  const viewY = cameraY - viewH / 2;
  svg.setAttribute('viewBox', `${viewX} ${viewY} ${viewW} ${viewH}`);
  svg.innerHTML = '';

  // ヘックスグリッド（F16と同じ: fill:none, stroke:白半透明）
  for (let c = 0; c < mapCols; c++) {
    for (let r = 0; r < mapRows; r++) {
      const absX = c * hStep;
      const absY = r * vStep + (c % 2) * (vStep / 2);
      if (absX < viewX - hexSize*2 || absX > viewX + viewW + hexSize*2 ||
          absY < viewY - hexSize*2 || absY > viewY + viewH + hexSize*2) continue;
      const polygon = document.createElementNS('http://www.w3.org/2000/svg', 'polygon');
      polygon.setAttribute('points', hexPoints(absX, absY));
      const isReachable = reachableHexes.some(rh => rh.x === c && rh.y === r);
      const isSelected = selectedMoveTarget && selectedMoveTarget.x === c && selectedMoveTarget.y === r;
      const occupant = units.find(un => un.status === 'alive' && un.x === c && un.y === r);
      const wreckHere = units.some(un => un.status === 'destroyed' && un.x === c && un.y === r);
      if (isSelected) {
        polygon.setAttribute('fill', 'rgba(50,205,50,0.5)');
        polygon.setAttribute('stroke', 'rgba(255,255,255,0.5)');
        polygon.setAttribute('stroke-width', '0.5');
      } else if (isReachable) {
        polygon.setAttribute('fill', 'rgba(50,205,50,0.32)');
        polygon.setAttribute('stroke', 'rgba(180,255,190,0.65)');
        polygon.setAttribute('stroke-width', '0.85');
      } else if (occupant) {
        const st = rankRainbowStyle(occupant.effectivePower);
        polygon.setAttribute('fill', st.fill);
        polygon.setAttribute('stroke', st.stroke);
        polygon.setAttribute('stroke-width', String(st.sw));
      } else if (wreckHere) {
        polygon.setAttribute('fill', 'rgba(40,40,48,0.55)');
        polygon.setAttribute('stroke', 'rgba(180,140,80,0.55)');
        polygon.setAttribute('stroke-width', '0.6');
      } else {
        polygon.setAttribute('fill', 'none');
        polygon.setAttribute('stroke', 'rgba(255,255,255,0.4)');
        polygon.setAttribute('stroke-width', '0.5');
      }
      svg.appendChild(polygon);
    }
  }

  // 同時移動公開：全員の経路をヘクス中心の折れ線で表示
  if (moveRevealPaths && moveRevealPaths.length) {
    for (let ri = 0; ri < moveRevealPaths.length; ri++) {
      const row = moveRevealPaths[ri];
      if (!row.hexes || row.hexes.length < 2) continue;
      const polyline = document.createElementNS('http://www.w3.org/2000/svg', 'polyline');
      const pts = row.hexes.map(h => {
        const c = hexCenter(h.x, h.y);
        return `${c.x},${c.y}`;
      }).join(' ');
      polyline.setAttribute('points', pts);
      polyline.setAttribute('fill', 'none');
      const baseStroke = row.team === 'given' ? 'rgba(120,190,255,0.92)' : 'rgba(255,140,150,0.92)';
      polyline.setAttribute('stroke', baseStroke);
      polyline.setAttribute('stroke-width', '3.2');
      polyline.setAttribute('stroke-linejoin', 'round');
      polyline.setAttribute('stroke-linecap', 'round');
      if (row.canceled) {
        polyline.setAttribute('stroke-dasharray', '10,7');
        polyline.setAttribute('opacity', '0.45');
      }
      polyline.setAttribute('pointer-events', 'none');
      svg.appendChild(polyline);
    }
  }

  // テキスト／十字パッドの進路プレビュー（水色矢印）
  if (currentPhase === 'MOVE' && previewStepStates && previewStepStates.length > 1) {
    drawPreviewMoveTrajectory(svg, previewStepStates, viewX, viewY, viewW, viewH);
  } else if (previewPath.length > 1) {
    const polyline = document.createElementNS('http://www.w3.org/2000/svg', 'polyline');
    const pts = previewPath.map(p => {
      const c = hexCenter(p.x, p.y);
      return `${c.x},${c.y}`;
    }).join(' ');
    polyline.setAttribute('points', pts);
    polyline.setAttribute('stroke', '#32cd32');
    polyline.setAttribute('stroke-width', '4');
    polyline.setAttribute('stroke-dasharray', '6,4');
    polyline.setAttribute('fill', 'none');
    svg.appendChild(polyline);
  }

  // ユニット描画（F16と同じパターン）
  const unitShape = "0,-15 8,2 3,4 5,12 2,12 -2,12 -5,12 -3,4 -8,2";
  const NSU = 'http://www.w3.org/2000/svg';
  units.forEach(u => {
    if (u.status !== 'alive') return;
    const absX = u.x * hStep;
    const absY = u.y * vStep + (u.x % 2) * (vStep / 2);
    const color = u.team === 'given' ? '#4169e1' : '#dc143c';
    const angle = (HEX_VIEW_DIR_DEG[u.dir] || 0) + 90;

    const g = document.createElementNS(NSU, 'g');
    g.setAttribute('transform', `translate(${absX},${absY}) rotate(${angle})`);
    const poly = document.createElementNS(NSU, 'polygon');
    poly.setAttribute('points', unitShape);
    poly.setAttribute('fill', color);
    poly.setAttribute('stroke', '#fff');
    poly.setAttribute('stroke-width', '1');
    poly.setAttribute('opacity', '0.85');
    g.appendChild(poly);
    svg.appendChild(g);

    const text = document.createElementNS(NSU, 'text');
    text.setAttribute('x', absX);
    text.setAttribute('y', absY - 18);
    text.setAttribute('text-anchor', 'middle');
    text.setAttribute('fill', color);
    text.setAttribute('font-size', '8');
    text.setAttribute('font-weight', 'bold');
    text.setAttribute('pointer-events', 'none');
    text.textContent = u.pilot.substring(0, 4);
    svg.appendChild(text);
  });

  // 撃墜：マップ上は 💥 のみ（文言は出さない）
  units.forEach(u => {
    if (u.status !== 'destroyed') return;
    const absX = u.x * hStep;
    const absY = u.y * vStep + (u.x % 2) * (vStep / 2);
    const boom = document.createElementNS(NSU, 'text');
    boom.setAttribute('x', absX);
    boom.setAttribute('y', absY + 6);
    boom.setAttribute('text-anchor', 'middle');
    boom.setAttribute('font-size', '26px');
    boom.setAttribute('pointer-events', 'none');
    boom.textContent = '\u{1F4A5}';
    svg.appendChild(boom);
  });

  if (currentPhase === 'RANGED' && rangedAwaitingTarget && selectedWeapon) {
    const ru = getActiveUnit();
    if (ru && ru.status === 'alive' && isPlayerUnit(ru)) {
      drawRangedProbabilityBubbles(svg, ru, viewX, viewY, viewW, viewH);
    }
  }
}

function centerMapOnUnit(unit) {
  cameraX = unit.x * hStep;
  cameraY = unit.y * vStep + (unit.x % 2) * (vStep / 2);
  drawMap();
}

/** 移動フェイズ用：到達可能 (x,y,dir) を列挙。実際の描画は drawMap が reachableHexes を参照して行う */
function highlightReachable(unit) {
  if (!unit || unit.movementRemaining <= 0) {
    reachableHexes = [];
    return;
  }
  reachableHexes = calcReachable(unit);
}

  const phaseBase = phaseNames[currentPhase] || currentPhase;

}

function updateOrderBar() {
  const bar = document.getElementById('orderBar');
  bar.innerHTML = turnOrder.map((u, i) => {
    let cls = `order-chip ${u.team}`;

    <div class="info-row"><span class="info-label">武器</span><span class="info-val">${unit.weapons.join(', ')}</span></div>
    ${fx ? `<div class="info-row"><span class="info-label">部位</span><span class="info-val" style="font-size:10px;line-height:1.35;">${fx}</span></div>` : ''}
    <div class="info-row"><span class="info-label">位置</span><span class="info-val">(${unit.x}, ${unit.y}) 向き${unit.dir}</span></div>
  `;
}

function updateDurability(unit) {
  if (!unit) return;
  const panel = document.getElementById('durabilityPanel');
  panel.innerHTML = '<div style="color:#888;font-size:10px;margin-bottom:4px;">耐久力</div>' + buildDurabilityRowsHtml(unit);
}

// ===== ポップアップ =====
function showPopup(title, content, autoCloseMs) {
  if (spectatorMode) {
    addLog('system', `[観戦] ${title}`);
    const ms = Number(autoCloseMs) || 0;
    if (popupAutoCloseTimer) {
      clearTimeout(popupAutoCloseTimer);
      popupAutoCloseTimer = null;
    }
    if (ms > 0 && !gameOver) {
      popupAutoCloseTimer = setTimeout(() => {
        popupAutoCloseTimer = null;
        if (!gameOver) {
          if (checkVictory()) return;
          finishUnitTurn();
        }
      }, ms);
    }
    return;
  }
  if (popupAutoCloseTimer) {
    clearTimeout(popupAutoCloseTimer);
    popupAutoCloseTimer = null;
  }
  const popOv = document.getElementById('popupOverlay');
  const okBtn = document.getElementById('popupOkBtn');
  if (popOv) popOv.style.pointerEvents = 'auto';
  if (okBtn) okBtn.style.display = 'block';
  document.getElementById('popupTitle').textContent = title;
  document.getElementById('popupContent').innerHTML = content;
  document.getElementById('combatPopup').style.display = 'block';
  document.getElementById('popupOverlay').style.display = 'block';
  const ms = Number(autoCloseMs) || 0;
  if (ms > 0) {
    popupAutoCloseTimer = setTimeout(() => {
      popupAutoCloseTimer = null;
      const pop = document.getElementById('combatPopup');
      if (pop && pop.style.display === 'block') closePopup();
    }, ms);
  }
}

function closePopup() {
  if (popupAutoCloseTimer) {
    clearTimeout(popupAutoCloseTimer);
    popupAutoCloseTimer = null;
  }
  document.getElementById('combatPopup').style.display = 'none';
  document.getElementById('popupOverlay').style.display = 'none';
  // ポップアップ後にターン進行
  if (!gameOver) {
    if (checkVictory()) return;
    finishUnitTurn();
  }
}

// ===== ログ（コンソール＋デバッグ用バッファ。後から「ログ保存」でJSON出力） =====
function addLog(type, text) {
  const line = `[T${gameTurn}][${currentPhase}][${type}] ${text}`;
  if (typeof console !== 'undefined' && console.debug) console.debug(line);
  try {
    const u = typeof getActiveUnit === 'function' ? getActiveUnit() : null;
    debugLogBuffer.push({
      t: Date.now(),
      iso: new Date().toISOString(),
      turn: gameTurn,
      phase: currentPhase,
      turnSub: turnSubPhase,
      orderIdx: currentOrderIndex,
      type: String(type),
      text: String(text),
      activePilot: u && u.pilot ? u.pilot : null,
    });
    if (debugLogBuffer.length > DEBUG_LOG_MAX) {
      debugLogBuffer.splice(0, debugLogBuffer.length - DEBUG_LOG_MAX);
    }
  } catch (e) { /* ignore */ }
}

function clearDebugLogBuffer() {
  debugLogBuffer.length = 0;
  addLog('debug', '[LOG_CLEARED]');
}

function exportDebugLogDownload() {
  const payload = {
    exportedAt: new Date().toISOString(),
    gameTurn,
    currentPhase,
    turnSubPhase,
    entries: debugLogBuffer,
  };
  const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json;charset=utf-8' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `dunbain-debug-${new Date().toISOString().replace(/[:.]/g, '-').slice(0, 19)}.json`;
  a.click();
  URL.revokeObjectURL(a.href);
  addLog('debug', `[LOG_EXPORT] entries=${debugLogBuffer.length}`);
}

// ===== ゲーム開始 =====
window.onload = () => {
  clearInspectPanel();
  const saveBtn = document.getElementById('debugLogSaveBtn');
  const clearBtn = document.getElementById('debugLogClearBtn');
  if (saveBtn) saveBtn.addEventListener('click', () => exportDebugLogDownload());
  if (clearBtn) clearBtn.addEventListener('click', () => clearDebugLogBuffer());
  initGame();
};

window.getDunbainDebugLog = () => debugLogBuffer.slice();
window.addEventListener('resize', () => drawMap());
</script>
