/** 非相互格闘用: 受けなしの格闘（プレイヤー用） */
function startMeleePhaseNoDefense(unit) {
  // 既存のstartMeleePhaseを呼ぶが、受けフラグを立てておく
  unit._noDefenseMelee = true;
  startMeleePhase(unit);
}

/** 非相互格闘用: 受けなしのAI格闘 */
async function aiResolveSimpleMeleeNoDefense(unit) {
  try {
    if (!hasAnyMeleeTarget(unit)) {
      addLog('system', `${unit.pilot}: 格闘なし(AI)`);
      finishUnitTurn();
      return;
    }
    unit.meleeParryStance = 'attacked';
    aiSetupMeleeParams(unit, null);
    const inReach = tgt => {
      if (!meleeUsesSwordArc(unit)) return hexDistance(unit.x, unit.y, tgt.x, tgt.y) === 1;
      return selectedSwordSide && isInSwordRange(unit, tgt, selectedSwordSide);
    };
    const targets = units.filter(t => t.team !== unit.team && t.status === 'alive' && inReach(t));
    if (!targets.length) {
      addLog('system', `${unit.pilot}: 格闘目標なし(AI)`);
      finishUnitTurn();
      return;
    }
    targets.sort((a, b) => hexDistance(unit.x, unit.y, a.x, a.y) - hexDistance(unit.x, unit.y, b.x, b.y));
    const t0 = targets[0];
    hideMapHud();
    centerMapOnUnit(unit);
    drawMap();

    if (spectatorMode) {
      const data = computeMeleeResolutionVsAI(unit, t0);
      if (data.kind === 'miss') {
        addLog(unit.team, `${unit.pilot}→${t0.pilot}: ${data.method} 外れ`);
      } else if (data.kind !== 'defended') {
        applyMeleeResolutionData(unit, t0, data);
      }
      drawMap();
      syncRightPanelUnitStats();
      if (checkVictory()) return;
      finishUnitTurn();
      return;
    }

    await new Promise(res => playMeleeClashAnimation(unit, t0, res));
    await runMeleeCombatDiceSequence(unit, t0, { autoCloseMs: spectatorMode ? 0 : 2800 });
  } catch (e) {
    try { console.error('aiResolveSimpleMeleeNoDefense', e); } catch (_) { /* ignore */ }
    addLog('system', `${unit.pilot}: 格闘処理で内部エラー — 次へ進みます`);
    hideMapHud();
    finishUnitTurn();
  }
}

function runNextResolution() {
  if (resolutionIndex >= turnOrder.length) {
    finishWholeTurnAfterBatch();
    return;
  }
  const u = turnOrder[resolutionIndex];
  if (u.status !== 'alive') {
    resolutionIndex++;
    runNextResolution();
    return;
  }
  const combatActsCollisionSkip = ['射撃', '格闘', '突撃'];
  if (u.collisionSkipShootMeleeThisTurn && combatActsCollisionSkip.includes(u.selectedAction)) {
    addLog(u.team, `${u.pilot}: 衝突のため${u.selectedAction}をスキップ`);
    u.collisionSkipShootMeleeThisTurn = false;
    u.hasActed = true;
    resolutionIndex++;
    runNextResolution();
    return;
  }
  // 相互格闘で既に処理済み（受けを選んだ等）のユニットはスキップ
  if (u.hasActed) {
    resolutionIndex++;
    runNextResolution();
    return;
  }
  currentOrderIndex = resolutionIndex;
  u.hasActed = false;
  updateOrderBar();
  updateTopBar();
  syncRightPanelUnitStats();
  centerMapOnUnit(u);
  if (u.selectedAction === '射撃') {
    if (isPlayerUnit(u)) {
      startRangedPhase(u);
      return;
    }
    void aiPresentRangedResolution(u);
    return;
  }
  if (u.selectedAction === '格闘') {
    // 相互格闘検出: 隣接する敵が格闘を選んでいてまだ未行動なら相互格闘
    const mutualFoe = findMutualMeleeOpponent(u);
    if (mutualFoe) {
      void (async () => {
        await resolveMutualMelee(u, mutualFoe);
      })();
      return;
    }
    // 片方だけ格闘 — 受けなし、そのまま攻撃
    if (isPlayerUnit(u)) {
      startMeleePhaseNoDefense(u);
      return;
    }
    void (async () => {
      await aiResolveSimpleMeleeNoDefense(u);
    })();
    return;
  }
  u.hasActed = true;
  resolutionIndex++;
  runNextResolution();
}

function finishWholeTurnAfterBatch() {
  turnSubPhase = 'planning';
  planSnapshot = null;
  units.forEach(u => {
    if (u.status === 'alive') u.previousDeclaredAction = u.selectedAction;
    u.collisionSkipShootMeleeThisTurn = false;
    delete u.planComplete;
    delete u.planEndState;
    delete u.planMoveCmd;
    delete u.planPathHexes;
    delete u.meleeParryStance;
    delete u._noDefenseMelee;
  });
  if (checkVictory()) return;
  gameTurn++;
  if (gameTurn > scenario.maxTurn) {
    if (typeof DunbainQL !== 'undefined') DunbainQL.terminalUpdates(null);
    showVictory('引き分け', `${scenario.maxTurn}ターン経過`);
    return;
  }
  addLog('system', `===== ターン${gameTurn} =====`);
  buildTurnOrder();
  currentOrderIndex = 0;
  resolutionIndex = 0;
  startAuraPhase();
}

function endTurnFromEmptyOrder() {
  gameTurn++;
  if (gameTurn > scenario.maxTurn) {
    if (typeof DunbainQL !== 'undefined') DunbainQL.terminalUpdates(null);
    showVictory('引き分け', `${scenario.maxTurn}ターン経過`);
    return;
  }
  addLog('system', `===== ターン${gameTurn} =====`);
  buildTurnOrder();
  startAuraPhase();
}

function findBestDirectionAt(x, y, dir, target) {
  let bestDir = null, bestDist = Infinity;
  for (let d = 0; d < 6; d++) {
    const nx = x + DIR_DX[d];
    const ny = y + (x % 2 === 0 ? DIR_DY_EVEN[d] : DIR_DY_ODD[d]);
    if (nx < 0 || nx >= mapCols || ny < 0 || ny >= mapRows) continue;
    const dist = hexDistance(nx, ny, target.x, target.y);
    if (dist < bestDist) { bestDist = dist; bestDir = d; }
  }
  return bestDir;
}

function bestFaceDirToward(col, row, tcol, trow) {
  const c0 = hexCenter(col, row);
  const cT = hexCenter(tcol, trow);
  const wantA = Math.atan2(cT.y - c0.y, cT.x - c0.x);
  let bestD = 0, bestDiff = Infinity;
  for (let d = 0; d < 6; d++) {
    const n = getForwardHex(col, row, d);
    const c1 = hexCenter(n.x, n.y);
    const da = Math.atan2(c1.y - c0.y, c1.x - c0.x);
    let diff = wantA - da;
    while (diff > Math.PI) diff -= 2 * Math.PI;
    while (diff <= -Math.PI) diff += 2 * Math.PI;
    const ad = Math.abs(diff);
    if (ad < bestDiff) { bestDiff = ad; bestD = d; }
  }
  return bestD;
}

function aiSpendMpRotatingToward(x, y, dir, remMp, tcol, trow) {
  let d = dir;
  let r = remMp;
  const targetFace = bestFaceDirToward(x, y, tcol, trow);
  while (r > 0 && d !== targetFace) {
    const cw = (targetFace - d + 6) % 6;
    const ccw = (d - targetFace + 6) % 6;
    if (cw <= ccw) d = (d + 1) % 6;
    else d = (d + 5) % 6;
    r--;
  }
  return { dir: d, remaining: r };
}

function aiGhostUnit(unit, x, y, dir) {
  return Object.assign({}, unit, { x, y, dir });
}

function aiCanRangedHitFrom(att, enemy) {
  if (!enemy) return false;
  const range = hexDistance(att.x, att.y, enemy.x, enemy.y);
  if (range < 1 || range > 8) return false;
  const weapons = att.weapons || [];
  for (let wi = 0; wi < weapons.length; wi++) {
    const w = weapons[wi];
    if (w === 'ソード' || w === 'オーラソード' || w === 'ガッシュ') continue;
    const wKey = w === 'オーラソード' ? 'ソード' : w;
    const hitTable = WEAPON_HIT[wKey];
    if (!hitTable) continue;
    if (hitTable[range - 1] == null) continue;
    if (isInEffectiveRangedArc(att, enemy)) return true;
  }
  return false;
}

function aiCanMeleeFromPosition(att, enemy) {
  if (!enemy) return false;
  const d = hexDistance(att.x, att.y, enemy.x, enemy.y);
  if (d === 1) return true;
  if (unitHasMeleeSwordWeapon(att) && d === 2) {
    return isInSwordRange(att, enemy, 'left') || isInSwordRange(att, enemy, 'right');
  }
  return false;
}

/** ドレイク側AI用：自機の向きから見て敵が真正面（後方）におり、その敵から射撃または格闘が届く */
function aiEnemyThreatensFromRear(unit, enemy) {
  if (!unit || !enemy || enemy.status !== 'alive' || enemy.team === unit.team) return false;
  if (enemy.dir == null || typeof enemy.dir !== 'number') return false;
  if (getAttackDirection(unit, enemy) !== '後面') return false;
  const eg = aiGhostUnit(enemy, enemy.x, enemy.y, enemy.dir);
  if (aiCanRangedHitFrom(eg, unit)) return true;
  if (aiCanMeleeFromPosition(eg, unit)) return true;
  return false;
}

function aiAnyEnemyThreatensFromRear(unit) {
  for (let i = 0; i < units.length; i++) {
    const e = units[i];
    if (e.team === unit.team || e.status !== 'alive') continue;
    if (aiEnemyThreatensFromRear(unit, e)) return true;
  }
  return false;
}

/** 回避行動用：移動力の範囲で連続 B（後退）を最大まで積む */
function aiSimulateRetreatBackward(unit, mp) {
  const ghost = Object.assign({}, unit, { movementRemaining: mp });
  let cmd = '';
  for (let step = 0; step < mp; step++) {
    const next = cmd + 'B';
    const r = simulateMove(ghost, next);
    if (!r.valid) break;
    // 到達位置が前回と同じ（敵マス踏み込みで即stopなど）なら打ち切り
    if (cmd.length > 0 && r.cost === simulateMove(ghost, cmd).cost) break;
    cmd = next;
  }
  if (!cmd) {
    return {
      endX: unit.x,
      endY: unit.y,
      endDir: unit.dir,
      path: [{ x: unit.x, y: unit.y }],
      cmd: '',
    };
  }
  const fin = simulateMove(ghost, cmd);
  return {
    endX: fin.endX,
    endY: fin.endY,
    endDir: fin.endDir,
    path: fin.path,
    cmd,
  };
}

/** 敵の今ターン取り得る移動力の目安（行動未確定のため複数行の最大）— 低いほど後方取りを狙う余裕が大きい */
function aiEnemyLikelyMaxMovePoints(enemy) {
  if (!enemy || enemy.effectivePower == null) return 99;
  const p = enemy.effectivePower;
  return Math.max(
    getMovement('通常移動', p) || 0,
    getMovement('射撃', p) || 0,
    getMovement('剣', p) || 0,
    getMovement('突撃', p) || 0
  );
}

/** 射線が通っているが、鈍い敵に対してまだ正面気味なら、射線を保った接近を続ける */
function aiDeferRangedStopWhileFlanking(unit, nearest, x, y, dir) {
  if (!nearest) return false;
  if (aiEnemyLikelyMaxMovePoints(nearest) > 2) return false;
  if (aiFlankPositionScore(nearest, x, y) >= 3) return false;
  const d0 = aiPickApproachStepDirection(x, y, unit, nearest);
  if (d0 == null) return false;
  const nx0 = x + DIR_DX[d0];
  const ny0 = y + (x % 2 === 0 ? DIR_DY_EVEN[d0] : DIR_DY_ODD[d0]);
  if (nx0 < 0 || nx0 >= mapCols || ny0 < 0 || ny0 >= mapRows) return false;
  if (isMoveStepBlockedByAlly(unit, nx0, ny0)) return false;
  const ghost2 = aiGhostUnit(unit, nx0, ny0, dir);
  return aiCanRangedHitFrom(ghost2, nearest);
}

/** 隣接済みだが鈍い敵の正面にいるとき、隣接を保ったまま側面・背面へ回り込めるなら早期終了しない */
function aiDeferAdjacentMeleeStopWhileFlanking(unit, nearest, x, y) {
  if (!nearest) return false;
  if (aiEnemyLikelyMaxMovePoints(nearest) > 2) return false;
  if (aiFlankPositionScore(nearest, x, y) >= 3) return false;
  const d0 = aiPickApproachStepDirection(x, y, unit, nearest);
  if (d0 == null) return false;
  const nx0 = x + DIR_DX[d0];
  const ny0 = y + (x % 2 === 0 ? DIR_DY_EVEN[d0] : DIR_DY_ODD[d0]);
  if (nx0 < 0 || nx0 >= mapCols || ny0 < 0 || ny0 >= mapRows) return false;
  if (isMoveStepBlockedByAlly(unit, nx0, ny0)) return false;
  return hexDistance(nx0, ny0, nearest.x, nearest.y) <= 1;
}

/** 敵機の向きから見た自位置（getAttackDirection(敵,自)）。背面・側面ほど高得点 */
function aiFlankPositionScore(enemy, ax, ay) {
  if (!enemy || enemy.dir == null || typeof enemy.dir !== 'number') return 0;
  const posOnly = { x: ax, y: ay, dir: 0 };
  const lab = getAttackDirection(enemy, posOnly);
  if (lab === '後面') return 4;
  if (lab === '右側面' || lab === '左側面') return 3;
  return 0;
}

/** 距離を同等に縮められる隣接マスが複数あるとき、敵の背後・側面に寄る方向を優先 */
function aiPickApproachStepDirection(x, y, unit, nearest) {
  if (!nearest) return null;
  let bestDist = Infinity;
  const candidates = [];
  for (let d = 0; d < 6; d++) {
    const nx = x + DIR_DX[d];
    const ny = y + (x % 2 === 0 ? DIR_DY_EVEN[d] : DIR_DY_ODD[d]);
    if (nx < 0 || nx >= mapCols || ny < 0 || ny >= mapRows) continue;
    if (isMoveStepBlockedByAlly(unit, nx, ny)) continue;
    const nd = hexDistance(nx, ny, nearest.x, nearest.y);
    if (nd < bestDist) {
      bestDist = nd;
      candidates.length = 0;
      candidates.push(d);
    } else if (nd === bestDist) {
      candidates.push(d);
    }
  }
  if (!candidates.length) return null;
  if (candidates.length === 1) return candidates[0];
  let bestD = candidates[0];
  let bestSc = -1;
  for (let i = 0; i < candidates.length; i++) {
    const d = candidates[i];
    const nx = x + DIR_DX[d];
    const ny = y + (x % 2 === 0 ? DIR_DY_EVEN[d] : DIR_DY_ODD[d]);
    const sc = aiFlankPositionScore(nearest, nx, ny);
    if (sc > bestSc) {
      bestSc = sc;
      bestD = d;
    } else if (sc === bestSc && Math.random() < 0.5) {
      bestD = d;
    }
  }
  return bestD;
}

/**
 * 射撃可能・格闘届きを保ったまま、敵から見て背面/側面スコアが上がる隣接マスがあれば1マス分返す
 */
function aiFlankOrbitStep(unit, x, y, nearest, actionName) {
  if (!nearest || nearest.dir == null || typeof nearest.dir !== 'number') return null;
  const curSc = aiFlankPositionScore(nearest, x, y);
  let best = null;
  let bestSc = curSc;
  for (let d = 0; d < 6; d++) {
    const nx = x + DIR_DX[d];
    const ny = y + (x % 2 === 0 ? DIR_DY_EVEN[d] : DIR_DY_ODD[d]);
    if (nx < 0 || nx >= mapCols || ny < 0 || ny >= mapRows) continue;
    if (units.some(uu => uu.status === 'alive' && uu.id !== unit.id && uu.x === nx && uu.y === ny)) continue;
    const faceToward = bestFaceDirToward(nx, ny, nearest.x, nearest.y);
    const g = aiGhostUnit(unit, nx, ny, faceToward);
    if (actionName === '射撃') {
      if (!aiCanRangedHitFrom(g, nearest)) continue;
    } else if (actionName === '格闘' || actionName === '突撃') {
      const dist = hexDistance(nx, ny, nearest.x, nearest.y);
      if (dist <= 1) {
        /* 隣接格闘 */
      } else if (dist === 2 && unitHasMeleeSwordWeapon(unit) &&
        (isInSwordRange(g, nearest, 'left') || isInSwordRange(g, nearest, 'right'))) {
        /* 剣距離2 */
      } else continue;
    } else continue;
    const sc = aiFlankPositionScore(nearest, nx, ny);
    if (sc > bestSc) {
      bestSc = sc;
      best = { x: nx, y: ny };
    }
  }
  return bestSc > curSc ? best : null;
}

function aiSimulateApproachAndFace(unit, actionName, focusEnemy) {
  const mp = getMovement(movementTableKeyForSelectedAction(actionName), unit.effectivePower);
  let x = unit.x, y = unit.y, dir = unit.dir;
  let used = 0;
  const nearest = focusEnemy;
  const pathHexes = [{ x: unit.x, y: unit.y }];
  for (; used < mp; used++) {
    const ghost = aiGhostUnit(unit, x, y, dir);
    if (actionName === '射撃' && nearest && aiCanRangedHitFrom(ghost, nearest)) {
      if (!aiDeferRangedStopWhileFlanking(unit, nearest, x, y, dir)) break;
    }
    if ((actionName === '格闘' || actionName === '突撃') && nearest && hexDistance(x, y, nearest.x, nearest.y) <= 1) {
      if (!aiDeferAdjacentMeleeStopWhileFlanking(unit, nearest, x, y)) break;
    }
    if (actionName === '格闘' && nearest && unitHasMeleeSwordWeapon(unit) && hexDistance(x, y, nearest.x, nearest.y) === 2) {
      const g2 = aiGhostUnit(unit, x, y, dir);
      if (isInSwordRange(g2, nearest, 'left') || isInSwordRange(g2, nearest, 'right')) break;
    }
    if (!nearest) break;
    const bestStepDir = aiPickApproachStepDirection(x, y, unit, nearest);
    if (bestStepDir === null) break;
    dir = bestStepDir;
    const nx = x + DIR_DX[bestStepDir];
    const ny = y + (x % 2 === 0 ? DIR_DY_EVEN[bestStepDir] : DIR_DY_ODD[bestStepDir]);
    if (nx < 0 || nx >= mapCols || ny < 0 || ny >= mapRows) break;
    if (isMoveStepBlockedByAlly(unit, nx, ny)) break;
    x = nx;
    y = ny;
    pathHexes.push({ x, y });
    const steppedOnEnemy = units.some(u =>
      u.status === 'alive' && u.id !== unit.id && u.x === nx && u.y === ny && u.team !== unit.team);
    if (steppedOnEnemy) break;
  }
  let orbitIters = 0;
  const orbitCap = Math.max(8, (mp || 0) + 4);
  while (
    used < mp &&
    nearest &&
    nearest.dir != null &&
    typeof nearest.dir === 'number' &&
    (actionName === '射撃' || actionName === '格闘' || actionName === '突撃')
  ) {
    if (++orbitIters > orbitCap) break;
    const orb = aiFlankOrbitStep(unit, x, y, nearest, actionName);
    if (!orb) break;
    x = orb.x;
    y = orb.y;
    used++;
    pathHexes.push({ x, y });
  }
  const rem = mp - used;
  const rot = nearest ? aiSpendMpRotatingToward(x, y, dir, rem, nearest.x, nearest.y) : { dir, remaining: rem };
  return { x, y, dir: rot.dir, pathHexes };
}

/** 2d6 の出目合計が T 以下となる確率（36分のカウント） */
function aiProbability2d6Leq(T) {
  const t = Math.round(Number(T));
  if (!Number.isFinite(t)) return 0;
  let c = 0;
  for (let d1 = 1; d1 <= 6; d1++) {
    for (let d2 = 1; d2 <= 6; d2++) {
      if (d1 + d2 <= t) c++;
    }
  }
  return c / 36;
}

function aiCalcReachableForActionTemplate(unit, actionName) {
  const mp = getMovement(movementTableKeyForSelectedAction(actionName), unit.effectivePower);
  const vu = Object.assign({}, unit, {
    movementRemaining: mp,
    x: unit.x,
    y: unit.y,
    dir: unit.dir,
  });
  return calcReachable(vu);
}

function aiBestRangedHitProbForPosition(unit, x, y, dir, enemies) {
  const ghost = aiGhostUnit(unit, x, y, dir);
  let best = 0;
  const weapons = unit.weapons || [];
  for (let ei = 0; ei < enemies.length; ei++) {
    const e = enemies[ei];
    for (let wi = 0; wi < weapons.length; wi++) {
      const w = weapons[wi];
      if (w === 'ソード' || w === 'オーラソード' || w === 'ガッシュ') continue;
      const info = getRangedHitPreviewVsEnemy(ghost, e, w);
      if (!info) continue;
      const p = aiProbability2d6Leq(info.finalHit);
      if (p > best) best = p;
    }
  }
  return best;
}

function aiMeleeHitModEval(attGhost, enemy, method, swordSide) {
  const pw = String(attGhost.effectivePower || 'g').toLowerCase();
  const tw = String(enemy.effectivePower || 'g').toLowerCase();
  const actionMod = TARGET_ACTION_MOD[enemy.selectedAction] || 0;
  const dist = hexDistance(attGhost.x, attGhost.y, enemy.x, enemy.y);
  let posMod = 0;
  if (swordSide && isInSwordRange(attGhost, enemy, swordSide)) {
    posMod = getSwordHexHitMod(attGhost, enemy, swordSide);
  } else if (dist === 1) {
    posMod = getPunchKickHexHitMod(attGhost, enemy, 'right');
  }
  const shooterMod = SHOOTER_POWER_MOD[pw] || 0;
  const evadeMod = TARGET_EVADE_MOD[tw] || 0;
  return shooterMod + evadeMod + actionMod + posMod;
}

function aiBestMeleeFirstRollProb(unit, x, y, dir, enemies) {
  const ghost = aiGhostUnit(unit, x, y, dir);
  ghost.selectedAction = '格闘';
  const pw = String(ghost.effectivePower || 'g').toLowerCase();
  let best = 0;
  for (let ei = 0; ei < enemies.length; ei++) {
    const e = enemies[ei];
    if (!aiCanMeleeFromPosition(ghost, e)) continue;
    const dist = hexDistance(ghost.x, ghost.y, e.x, e.y);
    const tryOne = (method, swordSide) => {
      const row = MELEE_HIT[method];
      if (!row || row[pw] == null) return;
      const mod = aiMeleeHitModEval(ghost, e, method, swordSide);
      const fh = row[pw] + mod;
      const p = aiProbability2d6Leq(fh);
      if (p > best) best = p;
    };
    if (dist === 1) {
      tryOne('殴る', null);
      tryOne('蹴る', null);
      tryOne('武器で殴る', null);
    }
    if (unitHasMeleeSwordWeapon(ghost)) {
      for (let si = 0; si < 2; si++) {
        const side = si === 0 ? 'left' : 'right';
        if (!isInSwordRange(ghost, e, side)) continue;
        tryOne('斬る', side);
        tryOne('突く', side);
        tryOne('武器で殴る', side);
      }
    }
  }
  return best;
}

function aiPlanStateTieBreak(a, b) {
  if (!b) return -1;
  if (!a) return 1;
  if (a.cost !== b.cost) return a.cost - b.cost;
  if (a.x !== b.x) return a.x - b.x;
  if (a.y !== b.y) return a.y - b.y;
  return a.dir - b.dir;
}

function aiMinHexDistanceToEnemies(x, y, enemies) {
  let d = Infinity;
  for (let i = 0; i < enemies.length; i++) {
    const h = hexDistance(x, y, enemies[i].x, enemies[i].y);
    if (h < d) d = h;
  }
  return d === Infinity ? 0 : d;
}

/**
 * 行動ごとの移動力で到達可能な (マス,向き) を総当たりし、射撃・格闘の理論命中確率（2d6 1回目）が高い位置を選ぶ。
 * 射程・射界・格闘届きが取れないときは、最寄り敵へのヘクス距離を縮める（接近）を優先する。
 */
function aiScoreReachableState(unit, actionName, st, enemies) {
  const hubX = Math.floor(mapCols / 2);
  const hubY = Math.floor(mapRows / 2);
  if (!enemies.length) {
    return -hexDistance(st.x, st.y, hubX, hubY) - st.cost * 1e-4;
  }
  const pr = aiBestRangedHitProbForPosition(unit, st.x, st.y, st.dir, enemies);
  const pm = aiBestMeleeFirstRollProb(unit, st.x, st.y, st.dir, enemies);
  let wr = 1;
  let wm = 1;
  if (actionName === '射撃') {
    wr = 2.5;
    wm = 0.35;
  } else if (actionName === '格闘') {
    wr = 0.35;
    wm = 2.5;
  } else if (actionName === '突撃') {
    wr = 0.95;
    wm = 1.05;
  }
  const core = wr * pr + wm * pm;
  const tie = Math.max(pr, pm) * 1e-3 + (pr + pm) * 1e-4;
  let score = core + tie - st.cost * 1e-6;
  const minD = aiMinHexDistanceToEnemies(st.x, st.y, enemies);
  const noStrikeWindow = Math.max(pr, pm) < 1e-6;
  if (noStrikeWindow) {
    score -= minD * 0.28;
  }
  return score;
}

function aiCreatePlan(unit) {
  if (unit.team === 'given') {
    aiCreatePlanGivenBrute(unit);
  } else {
    aiCreatePlanDrakeLegacy(unit);
  }
}

/** ギブン軍（ダンバイン側）AI：全行動×到達マスを総当たりし理論命中率と接近を評価 */
function aiCreatePlanGivenBrute(unit) {
  const enemies = units.filter(ux => ux.team !== unit.team && ux.status === 'alive');
  const actionSet = ['射撃', '回避', '格闘', '通常移動', '高速移動', '突撃'].filter(a =>
    !(a === '射撃' && unit.previousDeclaredAction === '射撃'));

  const nearest = enemies.length
    ? enemies.reduce((a, b) =>
      hexDistance(unit.x, unit.y, a.x, a.y) < hexDistance(unit.x, unit.y, b.x, b.y) ? a : b)
    : null;

  const bestByAction = {};
  let globalBest = null;

  for (let ai = 0; ai < actionSet.length; ai++) {
    const actionName = actionSet[ai];
    const flat = aiCalcReachableForActionTemplate(unit, actionName);
    bestByAction[actionName] = { score: -Infinity, st: null };
    for (let fi = 0; fi < flat.length; fi++) {
      const st = flat[fi];
      const sc = aiScoreReachableState(unit, actionName, st, enemies);
      const curA = bestByAction[actionName];
      if (sc > curA.score || (sc === curA.score && aiPlanStateTieBreak(st, curA.st) < 0)) {
        bestByAction[actionName] = { score: sc, st };
      }
      if (!globalBest || sc > globalBest.score ||
        (sc === globalBest.score && aiPlanStateTieBreak(st, globalBest.st) < 0)) {
        globalBest = { score: sc, action: actionName, st };
      }
    }
  }

  if (!globalBest || !globalBest.st) {
    unit.selectedAction = '通常移動';
    unit.movementRemaining = getMovement('通常移動', unit.effectivePower);
    unit.planEndState = { x: unit.x, y: unit.y, dir: unit.dir };
    unit.planMoveCmd = null;
    unit.planPathHexes = [{ x: unit.x, y: unit.y }];
    aiFinalizeMovementPlanWithCollisionLock(unit);
    addLog(unit.team, `${unit.pilot}: 行動「通常移動」プラン（フォールバック）(AI)`);
    return;
  }

  const candidates = actionSet.map(actionName => {
    const b = bestByAction[actionName];
    const st = b && b.st;
    const pathHexes = st && st.path && st.path.length
      ? st.path.map(h => ({ x: h.x, y: h.y }))
      : [{ x: unit.x, y: unit.y }];
    return {
      action: actionName,
      end: st
        ? { x: st.x, y: st.y, dir: st.dir, pathHexes }
        : { x: unit.x, y: unit.y, dir: unit.dir, pathHexes },
    };
  });

  const legalNames = candidates.map(c => c.action);
  if (typeof DunbainQL !== 'undefined') DunbainQL.onAiPlanStart(unit, legalNames);

  let chosen = globalBest.action;
  let end = candidates.find(c => c.action === chosen).end;

  if (typeof DunbainQL !== 'undefined' && !isPlayerUnit(unit) && nearest) {
    const sk = DunbainQL.encodeState(unit, nearest);
    let policyChoice = chosen;
    if (DunbainQL.isBlendEnabled()) {
      const eps = DunbainQL.isEnabled() ? DunbainQL.getEpsilon() : DunbainQL.getPlayEpsilon();
      policyChoice = DunbainQL.pickActionBlended(sk, legalNames, chosen, eps);
    } else if (DunbainQL.isEnabled()) {
      policyChoice = DunbainQL.pickAction(sk, legalNames, DunbainQL.getEpsilon());
    }
    const found = candidates.find(c => c.action === policyChoice);
    if (found) {
      chosen = found.action;
      end = found.end;
    }
    if (DunbainQL.isEnabled()) DunbainQL.setPending(unit, sk, chosen);
  }

  unit.selectedAction = chosen;
  unit.movementRemaining = getMovement(movementTableKeyForSelectedAction(chosen), unit.effectivePower);
  unit.planEndState = { x: end.x, y: end.y, dir: end.dir };
  unit.planMoveCmd = null;
  unit.planPathHexes = end.pathHexes ? end.pathHexes.slice() : [{ x: unit.x, y: unit.y }];
  aiFinalizeMovementPlanWithCollisionLock(unit);
  const pr = enemies.length ? aiBestRangedHitProbForPosition(unit, end.x, end.y, end.dir, enemies) : 0;
  const pm = enemies.length ? aiBestMeleeFirstRollProb(unit, end.x, end.y, end.dir, enemies) : 0;
  addLog(unit.team, `${unit.pilot}: 行動「${chosen}」プラン 総当たり (移動力${unit.movementRemaining}) 射撃理論命中~${(pr * 100).toFixed(1)}% 格闘1段理論命中~${(pm * 100).toFixed(1)}% (AI)`);
}

/** ドレイク側AI：従来の接近ヒューリスティック＋後方脅威時は後退 */
function aiCreatePlanDrakeLegacy(unit) {
  const enemies = units.filter(ux => ux.team !== unit.team && ux.status === 'alive');
  if (!enemies.length) {
    unit.selectedAction = '通常移動';
    unit.movementRemaining = getMovement('通常移動', unit.effectivePower);
    const hub = { x: Math.floor(mapCols / 2), y: Math.floor(mapRows / 2) };
    const end = aiSimulateApproachAndFace(unit, '通常移動', hub);
    unit.planEndState = { x: end.x, y: end.y, dir: end.dir };
    unit.planMoveCmd = null;
    unit.planPathHexes = end.pathHexes ? end.pathHexes.slice() : [{ x: unit.x, y: unit.y }];
    aiFinalizeMovementPlanWithCollisionLock(unit);
    addLog(unit.team, `${unit.pilot}: 行動「通常移動」プラン（敵なし）(AI)`);
    return;
  }

  if (aiAnyEnemyThreatensFromRear(unit)) {
    const mp = getMovement('回避', unit.effectivePower);
    const retreat = aiSimulateRetreatBackward(unit, mp);
    unit.selectedAction = '回避';
    unit.movementRemaining = mp;
    unit.planEndState = { x: retreat.endX, y: retreat.endY, dir: retreat.endDir };
    unit.planMoveCmd = retreat.cmd ? retreat.cmd : null;
    unit.planPathHexes = retreat.path.map(h => ({ x: h.x, y: h.y }));
    aiFinalizeMovementPlanWithCollisionLock(unit);
    addLog(unit.team, `${unit.pilot}: 行動「回避」— 後方からの射撃／格闘が届くため後退プラン (移動力${mp})(AI)`);
    return;
  }

  const nearest = enemies.reduce((a, b) =>
    hexDistance(unit.x, unit.y, a.x, a.y) < hexDistance(unit.x, unit.y, b.x, b.y) ? a : b);

  let meleeFocus = nearest;
  let posMelee = aiSimulateApproachAndFace(unit, '格闘', nearest);
  let ghostMelee = aiGhostUnit(unit, posMelee.x, posMelee.y, posMelee.dir);
  let bestMFlank = meleeFocus.dir != null && typeof meleeFocus.dir === 'number'
    ? aiFlankPositionScore(meleeFocus, posMelee.x, posMelee.y)
    : 0;
  let bestMGeo = hexDistance(unit.x, unit.y, nearest.x, nearest.y);
  for (let mi = 0; mi < enemies.length; mi++) {
    const e = enemies[mi];
    if (e.dir == null || typeof e.dir !== 'number') continue;
    const p = aiSimulateApproachAndFace(unit, '格闘', e);
    const g = aiGhostUnit(unit, p.x, p.y, p.dir);
    if (!aiCanMeleeFromPosition(g, e)) continue;
    const fs = aiFlankPositionScore(e, p.x, p.y);
    const geo = hexDistance(unit.x, unit.y, e.x, e.y);
    if (fs > bestMFlank || (fs === bestMFlank && geo < bestMGeo) || (fs === bestMFlank && geo === bestMGeo && Math.random() < 0.5)) {
      bestMFlank = fs;
      bestMGeo = geo;
      meleeFocus = e;
      posMelee = p;
      ghostMelee = g;
    }
  }

  let shotEnemy = null;
  let posShot = null;
  let ghostShot = null;
  let bestFlank = -1;
  let bestGeo = Infinity;
  for (let i = 0; i < enemies.length; i++) {
    const e = enemies[i];
    if (e.dir == null || typeof e.dir !== 'number') continue;
    const p = aiSimulateApproachAndFace(unit, '射撃', e);
    const g = aiGhostUnit(unit, p.x, p.y, p.dir);
    if (!aiCanRangedHitFrom(g, e)) continue;
    const fs = aiFlankPositionScore(e, p.x, p.y);
    const geo = hexDistance(unit.x, unit.y, e.x, e.y);
    if (fs > bestFlank || (fs === bestFlank && geo < bestGeo) || (fs === bestFlank && geo === bestGeo && Math.random() < 0.5)) {
      bestFlank = fs;
      bestGeo = geo;
      shotEnemy = e;
      posShot = p;
      ghostShot = g;
    }
  }

  const endCharge = aiSimulateApproachAndFace(unit, '突撃', nearest);
  const candidates = [];
  if (aiCanMeleeFromPosition(ghostMelee, meleeFocus)) {
    candidates.push({ action: '格闘', end: posMelee });
  }
  if (shotEnemy && posShot && ghostShot && aiCanRangedHitFrom(ghostShot, shotEnemy) && unit.previousDeclaredAction !== '射撃') {
    candidates.push({ action: '射撃', end: posShot });
  }
  candidates.push({ action: '突撃', end: endCharge });

  const legalNames = candidates.map(c => c.action);
  if (typeof DunbainQL !== 'undefined') DunbainQL.onAiPlanStart(unit, legalNames);

  let chosen = '突撃';
  let end = endCharge;
  if (aiCanMeleeFromPosition(ghostMelee, meleeFocus)) {
    chosen = '格闘';
    end = posMelee;
  } else if (shotEnemy && posShot && ghostShot && aiCanRangedHitFrom(ghostShot, shotEnemy)) {
    chosen = '射撃';
    end = posShot;
  }
  if (chosen === '射撃' && unit.previousDeclaredAction === '射撃') {
    chosen = '突撃';
    end = endCharge;
  }

  if (typeof DunbainQL !== 'undefined' && !isPlayerUnit(unit)) {
    const sk = DunbainQL.encodeState(unit, nearest);
    let policyChoice = chosen;
    if (DunbainQL.isBlendEnabled()) {
      const eps = DunbainQL.isEnabled() ? DunbainQL.getEpsilon() : DunbainQL.getPlayEpsilon();
      policyChoice = DunbainQL.pickActionBlended(sk, legalNames, chosen, eps);
    } else if (DunbainQL.isEnabled()) {
      policyChoice = DunbainQL.pickAction(sk, legalNames, DunbainQL.getEpsilon());
    }
    const found = candidates.find(c => c.action === policyChoice);
    if (found) {
      chosen = found.action;
      end = found.end;
    }
    if (DunbainQL.isEnabled()) DunbainQL.setPending(unit, sk, chosen);
  }

  unit.selectedAction = chosen;
  unit.movementRemaining = getMovement(movementTableKeyForSelectedAction(chosen), unit.effectivePower);
  unit.planEndState = { x: end.x, y: end.y, dir: end.dir };
  unit.planMoveCmd = null;
  unit.planPathHexes = end.pathHexes ? end.pathHexes.slice() : [{ x: unit.x, y: unit.y }];
  aiFinalizeMovementPlanWithCollisionLock(unit);
  addLog(unit.team, `${unit.pilot}: 行動「${chosen}」プラン (移動力${unit.movementRemaining})(AI)`);
}

/** 行動名「格闘」の移動力は移動力表の「剣」行を参照する */
function movementTableKeyForSelectedAction(action) {
  return action === '格闘' ? '剣' : action;
}

function showActionSelect(unit) {

  }

function selectAction(action) {
  const unit = getActiveUnit();
  if (!unit) return;
  if (action === '射撃' && unit.previousDeclaredAction === '射撃') {
    addLog('system', `${unit.pilot}: 前ターンに射撃を選んでいるため、射撃は選べません`);
    return;
  }
  unit.selectedAction = action;
  unit.movementRemaining = getMovement(movementTableKeyForSelectedAction(action), unit.effectivePower);
  addLog(unit.team, `${unit.pilot}: 行動「${action}」選択 (移動力${unit.movementRemaining})`);

  document.getElementById('actionPanel').style.display = 'none';
  hideMapHud();
  startMovePhase(unit);
}

// ===== 移動フェイズ =====

  moveCost = 0;
  selectedMoveTarget = null;
  dirChoices = [];

    addLog('system', `${unit.pilot}: 移動力0のため移動スキップ`);
    endMovePhase(unit);
    return;
  }

  if (turnSubPhase === 'planning' && unit.collisionSkipMoveForGameTurn === gameTurn) {

    unit.planEndState = { x: unit.x, y: unit.y, dir: unit.dir };

    : '';
  panel.innerHTML = `
    <div class="section-title" style="color:#c8a020;font-size:12px;font-weight:bold;margin-bottom:6px;">移動（移動力 ${unit.movementRemaining}）</div>
    <div style="color:#888;font-size:11px;margin-bottom:8px;line-height:1.35;">緑＝到達可。<b style="color:#5ee9d4;">水色矢印</b>＝十字／テキストの進路プレビュー。マスクリックでも確定可。</div>
    ${wingHint}
    <div style="margin-bottom:8px;">
      <input type="text" id="moveInput" placeholder="例: FFR または BLL" autocomplete="off" spellcheck="false"

    <div class="move-cross-wrap">
      <div class="move-cross-hint">十字をクリックしてコマンドに追加（地図に水色で進路表示）${rotC > 1 ? ` ※L/Rは各<b>${rotC}MP</b>` : ''}</div>
      <div class="move-cross-grid">
        <button type="button" class="move-pad-btn move-pad-f" id="movePadF" onclick="moveAppendStep('F')">前<small>F</small></button>

        <button type="button" class="move-pad-btn move-pad-r" id="movePadR" onclick="moveAppendStep('R')">右<small>R${rotC > 1 ? '×' + rotC : ''}</small></button>
        <button type="button" class="move-pad-btn move-pad-b" id="movePadB" onclick="moveAppendStep('B')">後<small>B</small></button>
      </div>
    </div>
    <div id="moveInfo" style="color:#888;font-size:11px;margin-bottom:6px;">コマンド適用後の残りMP: <span id="moveRemain">${unit.movementRemaining}</span> / ${unit.movementRemaining}</div>
    <div class="move-btns" style="display:flex;gap:6px;flex-wrap:wrap;">
      <button id="moveConfirm" onclick="confirmMove()" style="flex:1;min-width:88px;padding:6px;border:none;border-radius:4px;cursor:pointer;font-size:12px;background:#4c8;color:#000;">確定</button>
      <button type="button" onclick="cancelMove()" style="flex:1;min-width:88px;padding:6px;border:none;border-radius:4px;cursor:pointer;font-size:12px;background:#555;color:#eee;">クリア</button>

function moveAppendStep(ch) {
  const unit = getActiveUnit();
  if (!unit || currentPhase !== 'MOVE') return;
  const input = document.getElementById('moveInput');
  if (!input) return;
  const cur = input.value.toUpperCase().replace(/[^FBLR]/g, '');
  const next = cur + ch;
  const result = simulateMove(unit, next);
  if (!result.valid) return;
  input.value = next;
  previewMove(unit);
}

function updateMovePadButtons(unit) {
  if (!unit || currentPhase !== 'MOVE') return;
  const input = document.getElementById('moveInput');
  const cur = input ? input.value.toUpperCase().replace(/[^FBLR]/g, '') : '';
  for (const ch of ['F', 'B', 'L', 'R']) {
    const btn = document.getElementById('movePad' + ch);
    if (!btn) continue;
    btn.disabled = !simulateMove(unit, cur + ch).valid;
  }
}

function moveStateKey(x, y, dir) {
  return `${x},${y},${dir}`;
}

function meleeRotateMoveCost(unit) {
  if (!unit || !unit.destroyed) return 1;
  return unit.destroyed['翼'] ? 2 : 1;
}

// 到達可能な全 (マス,向き) を列挙（BFS）。前進=1MP、60°旋回=1MP（翼破壊時は2MP）
function calcReachable(unit) {
  const mp = unit.movementRemaining;
  const rotCost = meleeRotateMoveCost(unit);
  const best = new Map(); // key → { cost, pathIdx }
  // パスをリンクリストで管理（配列コピーを避ける）
  const pathNodes = [{ x: unit.x, y: unit.y, prev: -1 }]; // idx 0 = start
  function addPathNode(x, y, prevIdx) {
    const idx = pathNodes.length;
    pathNodes.push({ x, y, prev: prevIdx });
    return idx;
  }
  function buildPath(pidx) {
    const segs = [];
    let i = pidx;
    while (i >= 0) { segs.push({ x: pathNodes[i].x, y: pathNodes[i].y }); i = pathNodes[i].prev; }
    segs.reverse();
    return segs;
  }
  best.set(moveStateKey(unit.x, unit.y, unit.dir), { cost: 0, pathIdx: 0 });
  // リングバッファ方式のキュー（shift() の O(n) を回避）
  let queue = [{ x: unit.x, y: unit.y, dir: unit.dir, cost: 0, pathIdx: 0 }];
  let qHead = 0;

  // 敵位置をSetに事前計算（units.some ループを回避）
  const enemyPosSet = new Set();
  for (let ei = 0; ei < units.length; ei++) {
    const eu = units[ei];
    if (eu.status === 'alive' && eu.id !== unit.id && eu.team !== unit.team) {
      enemyPosSet.add(eu.x + ',' + eu.y);
    }
  }
  const allyPosSet = new Set();
  for (let ai = 0; ai < units.length; ai++) {
    const au = units[ai];
    if (au.status === 'alive' && au.id !== unit.id && au.team === unit.team) {
      allyPosSet.add(au.x + ',' + au.y);
    }
  }

  while (qHead < queue.length) {
    const cur = queue[qHead++];
    // キューの半分以上消費されたらコンパクション
    if (qHead > 1024 && qHead > (queue.length >>> 1)) {
      queue = queue.slice(qHead);
      qHead = 0;
    }
    if (cur.cost >= mp) continue;

    const fwd = getForwardHex(cur.x, cur.y, cur.dir);
    if (fwd && fwd.x >= 0 && fwd.x < mapCols && fwd.y >= 0 && fwd.y < mapRows) {
      const fk = fwd.x + ',' + fwd.y;
      if (!allyPosSet.has(fk)) {
        const nc = cur.cost + 1;
        const sk = moveStateKey(fwd.x, fwd.y, cur.dir);
        const existing = best.get(sk);
        if (!existing || existing.cost > nc) {
          const npIdx = addPathNode(fwd.x, fwd.y, cur.pathIdx);
          best.set(sk, { cost: nc, pathIdx: npIdx });
          if (!enemyPosSet.has(fk)) {
            queue.push({ x: fwd.x, y: fwd.y, dir: cur.dir, cost: nc, pathIdx: npIdx });
          }
        }
      }
    }
    const backDir = (cur.dir + 3) % 6;
    const bwd = getForwardHex(cur.x, cur.y, backDir);
    if (bwd && bwd.x >= 0 && bwd.x < mapCols && bwd.y >= 0 && bwd.y < mapRows) {
      const bk = bwd.x + ',' + bwd.y;
      if (!allyPosSet.has(bk)) {
        const nc = cur.cost + 1;
        const sk = moveStateKey(bwd.x, bwd.y, cur.dir);
        const existing = best.get(sk);
        if (!existing || existing.cost > nc) {
          const npIdx = addPathNode(bwd.x, bwd.y, cur.pathIdx);
          best.set(sk, { cost: nc, pathIdx: npIdx });
          if (!enemyPosSet.has(bk)) {
            queue.push({ x: bwd.x, y: bwd.y, dir: cur.dir, cost: nc, pathIdx: npIdx });
          }
        }
      }
    }
    const ld = (cur.dir + 5) % 6;
    const lk = moveStateKey(cur.x, cur.y, ld);
    const lc = cur.cost + rotCost;
    const lexisting = best.get(lk);
    if (!lexisting || lexisting.cost > lc) {
      best.set(lk, { cost: lc, pathIdx: cur.pathIdx });
      queue.push({ x: cur.x, y: cur.y, dir: ld, cost: lc, pathIdx: cur.pathIdx });
    }
    const rd = (cur.dir + 1) % 6;
    const rk = moveStateKey(cur.x, cur.y, rd);
    const rc = cur.cost + rotCost;
    const rexisting = best.get(rk);
    if (!rexisting || rexisting.cost > rc) {
      best.set(rk, { cost: rc, pathIdx: cur.pathIdx });
      queue.push({ x: cur.x, y: cur.y, dir: rd, cost: rc, pathIdx: cur.pathIdx });
    }
  }

  const flat = [];
  for (const [k, v] of best) {
    if (v.cost > mp) continue;
    const parts = k.split(',');
    const x = +parts[0], y = +parts[1], dir = +parts[2];
    flat.push({ x, y, dir, cost: v.cost, path: buildPath(v.pathIdx) });
  }
  return flat;
}

function getForwardHex(x, y, dir) {
  const dx = DIR_DX[dir];
  const dy = x % 2 === 0 ? DIR_DY_EVEN[dir] : DIR_DY_ODD[dir];
  return { x: x + dx, y: y + dy };
}

// ヘクス中心から「dir の正面」（隣接マス方向）への角度（ラジアン）
function angleRadTowardFacingDir(col, row, dir) {
  const n = getForwardHex(col, row, dir);
  const c0 = hexCenter(col, row);
  const c1 = hexCenter(n.x, n.y);
  return Math.atan2(c1.y - c0.y, c1.x - c0.x);
}

// クリックがヘクスの辺付近（正面＝その向きの隣マス側）なら、その向きを返す
function pickFacingDirFromHexSideClick(col, row, mx, my, allowedDirs) {
  if (!allowedDirs || !allowedDirs.length) return null;
  const c = hexCenter(col, row);
  const dist = Math.hypot(mx - c.x, my - c.y);
  if (dist < hexSize * 0.2) return null;
  const clickA = Math.atan2(my - c.y, mx - c.x);
  let bestD = null;
  let bestDiff = Infinity;
  for (const d of allowedDirs) {
    const dirA = angleRadTowardFacingDir(col, row, d);
    let diff = clickA - dirA;
    while (diff > Math.PI) diff -= 2 * Math.PI;
    while (diff < -Math.PI) diff += 2 * Math.PI;
    const ad = Math.abs(diff);
    if (ad < bestDiff) {
      bestDiff = ad;
      bestD = d;
    }
  }
  if (bestD == null || bestDiff > Math.PI / 6 + 0.12) return null;
  return bestD;
}

// ===== マップ上フロートHUD =====
function clientToMapSvgXY(e) {
  const svg = document.getElementById('mapSvg');
  const svgRect = svg.getBoundingClientRect();
  const viewW = svgRect.width / zoomLevel;
  const viewH = svgRect.height / zoomLevel;
  const viewX = cameraX - viewW / 2;
  const viewY = cameraY - viewH / 2;
  const mx = viewX + (e.clientX - svgRect.left) / zoomLevel;
  const my = viewY + (e.clientY - svgRect.top) / zoomLevel;
  return { mx, my };
}

function hideMapHud() {
  rangedAwaitingTarget = false;
  const hud = document.getElementById('mapHud');
  const panel = document.getElementById('mapHudPanel');
  if (panel) {
    panel.innerHTML = '';
    panel.classList.remove('ranged-pick-target', 'map-hud-ranged-phase');
  }
  if (hud) hud.style.display = 'none';
}

function showMapHud() {
  const hud = document.getElementById('mapHud');
  if (hud) hud.style.display = 'block';
}

function hudCircleRectOverlap(cx, cy, r, left, top, w, h) {
  const nx = Math.max(left, Math.min(cx, left + w));
  const ny = Math.max(top, Math.min(cy, top + h));
  const dx = cx - nx, dy = cy - ny;
  return dx * dx + dy * dy < r * r;
}

function positionMapHudAtUnit(unit, opts) {
  opts = opts || {};
  const c = hexCenter(unit.x, unit.y);
  const svg = document.getElementById('mapSvg');
  const rect = svg.getBoundingClientRect();
  const vb = svg.getAttribute('viewBox');
  if (!vb || !unit) return;
  const parts = vb.split(/\s+/).map(Number);
  const vx = parts[0], vy = parts[1], vw = parts[2], vh = parts[3];
  const toClient = (gx, gy) => ({
    x: rect.left + ((gx - vx) / vw) * rect.width,
    y: rect.top + ((gy - vy) / vh) * rect.height,
  });
  const p0 = toClient(c.x, c.y);
  const area = document.getElementById('mapArea');
  const ar = area.getBoundingClientRect();
  const panel = document.getElementById('mapHudPanel');
  const w = Math.max(panel.offsetWidth || 260, 200);
  const h = Math.max(panel.offsetHeight || 120, 80);
  const pad = 8;
  const sx = rect.width / vw;
  const sy = rect.height / vh;
  const rUnit = hexSize * Math.max(sx, sy) * 1.38;

  const activeCx = p0.x - ar.left;
  const activeCy = p0.y - ar.top;
  const unitCentersPx = units.filter(u => u.status === 'alive').map(u => {
    const hc = hexCenter(u.x, u.y);
    const p = toClient(hc.x, hc.y);
    return { x: p.x - ar.left, y: p.y - ar.top };
  });

  function overlapsAnyUnit(left, top) {
    for (let i = 0; i < unitCentersPx.length; i++) {
      const q = unitCentersPx[i];
      if (hudCircleRectOverlap(q.x, q.y, rUnit, left, top, w, h)) return true;
    }
    return false;
  }

  function clampHud(left, top) {
    return {
      left: Math.max(pad, Math.min(left, ar.width - w - pad)),
      top: Math.max(pad, Math.min(top, ar.height - h - pad)),
    };
  }

  const tried = new Set();
  function tryHudPlace(left, top) {
    const cpos = clampHud(left, top);
    const key = Math.round(cpos.left) + ',' + Math.round(cpos.top);
    if (tried.has(key)) return false;
    tried.add(key);
    if (overlapsAnyUnit(cpos.left, cpos.top)) return false;
    panel.style.left = cpos.left + 'px';
    panel.style.top = cpos.top + 'px';
    return true;
  }

  if (opts.offsetX != null && opts.offsetY != null) {
    if (tryHudPlace(activeCx + opts.offsetX, activeCy + opts.offsetY)) return;
  }

  for (let dist = 36; dist <= 440; dist += 18) {
    for (let deg = 0; deg < 360; deg += 15) {
      const rad = (deg * Math.PI) / 180;
      const cx = activeCx + Math.cos(rad) * dist;
      const cy = activeCy + Math.sin(rad) * dist;
      if (tryHudPlace(cx - w / 2, cy - h / 2)) return;
    }
  }

  const docks = [
    [(ar.width - w) / 2, pad],
    [ar.width - w - pad, pad],
    [pad, pad],
    [ar.width - w - pad, (ar.height - h) / 2],
    [pad, (ar.height - h) / 2],
    [(ar.width - w) / 2, ar.height - h - pad],
    [pad, ar.height - h - pad],
    [ar.width - w - pad, ar.height - h - pad],
  ];
  for (let i = 0; i < docks.length; i++) {
    if (tryHudPlace(docks[i][0], docks[i][1])) return;
  }

  for (let ty = pad; ty <= ar.height - h - pad; ty += 22) {
    for (let tx = pad; tx <= ar.width - w - pad; tx += 22) {
      if (tryHudPlace(tx, ty)) return;
    }
  }

  function overlapCountAt(left, top) {
    const cpos = clampHud(left, top);
    let n = 0;
    let minDist = Infinity;
    const pcx = cpos.left + w / 2;
    const pcy = cpos.top + h / 2;
    for (let i = 0; i < unitCentersPx.length; i++) {
      const q = unitCentersPx[i];
      const d = Math.hypot(q.x - pcx, q.y - pcy);
      if (d < minDist) minDist = d;
      if (hudCircleRectOverlap(q.x, q.y, rUnit, cpos.left, cpos.top, w, h)) n++;
    }
    return { n, minDist, left: cpos.left, top: cpos.top };
  }

  let best = null;
  for (let ty = pad; ty <= ar.height - h - pad; ty += 12) {
    for (let tx = pad; tx <= ar.width - w - pad; tx += 12) {
      const o = overlapCountAt(tx, ty);
      if (!best || o.n < best.n || (o.n === best.n && o.minDist > best.minDist)) {
        best = o;
      }
    }
  }
  if (best) {
    panel.style.left = best.left + 'px';
    panel.style.top = best.top + 'px';
  }
}

function queueMapHudReposition() {
  const u = getActiveUnit();
  if (u) requestAnimationFrame(() => positionMapHudAtUnit(u));
}

function pickUnitAtMapPointer(e) {
  const { mx, my } = clientToMapSvgXY(e);
  let best = null;
  let bestScore = Infinity;
  for (const u of units) {
    if (u.status !== 'alive' && u.status !== 'destroyed') continue;
    const c = hexCenter(u.x, u.y);
    const d = Math.hypot(mx - c.x, my - c.y);
    if (d >= hexSize * 0.88) continue;
    const score = d + (u.status === 'alive' ? 0 : 0.15);
    if (score < bestScore) {
      bestScore = score;
      best = u;
    }
  }
  return best;
}

function clearInspectPanel() {
  inspectTargetUnitId = null;
  const el = document.getElementById('inspectPanel');
  if (!el) return;
  el.innerHTML = '<div class="inspect-placeholder"><strong style="color:#8ac">味方</strong>・<strong style="color:#c88">敵</strong>どちらの機体でも、マップ上のコマをクリックするとパイロット・武装・<strong style="color:#daa">各部の耐久と損傷</strong>を表示します（操作中の自機をクリックしたときは通常の操作が優先されます）。</div>';
}

function buildDurabilityRowsHtml(unit) {
  if (!unit || !unit.maxDurability) return '<div style="color:#666;font-size:11px;">耐久データなし</div>';
  const order = (typeof DURABILITY_DISPLAY_ORDER !== 'undefined' && DURABILITY_DISPLAY_ORDER[unit.type])
    ? DURABILITY_DISPLAY_ORDER[unit.type].slice()
    : Object.keys(unit.maxDurability);
  const seen = new Set();
  const keys = [];
  for (let i = 0; i < order.length; i++) {
    const k = order[i];
    if (seen.has(k)) continue;
    if (unit.maxDurability[k] == null || unit.maxDurability[k] === undefined) continue;
    seen.add(k);
    keys.push(k);
  }
  for (const k of Object.keys(unit.maxDurability)) {
    if (seen.has(k)) continue;
    if (unit.maxDurability[k] == null || unit.maxDurability[k] === undefined) continue;
    keys.push(k);
    seen.add(k);
  }
  let html = '';
  for (let i = 0; i < keys.length; i++) {
    const part = keys[i];
    const maxHp = unit.maxDurability[part];
    const hp = unit.durability[part] || 0;
    const pct = maxHp > 0 ? (hp / maxHp * 100) : 0;
    const lost = Math.max(0, maxHp - hp);
    let fillClass = 'part-fill';
    if (hp <= 0) fillClass += ' destroyed';
    else if (pct <= 30) fillClass += ' critical';
    else if (pct <= 60) fillClass += ' damaged';
    const lostTag = lost > 0 ? `<span style="color:#e88"> △${lost}</span>` : '';
    html += `<div class="durability-line"><span class="part-name">${part}</span><div class="part-bar"><div class="${fillClass}" style="width:${pct}%"></div></div><span class="part-hp">${hp}/${maxHp}${lostTag}</span></div>`;
  }
  return html;
}

function buildPartEffectsNoteHtml(unit) {
  if (!unit) return '';
  if (unit.status === 'destroyed') return '';
  const d = unit.destroyed || {};
  const lines = [];
  if (d['頭']) lines.push('頭破壊: 射界は正面1ラインのみ');
  if (d['翼']) lines.push('翼破壊: 旋回(L/R)が移動力2／60°');
  if (d['右手']) lines.push('右手破壊: 右装備の武器は使用不可');
  if (d['左手']) lines.push('左手破壊: 左装備の武器は使用不可');
  if (!lines.length) return '';
  return '<div class="inspect-sub" style="margin-top:10px;color:#aa8;">部位効果</div>' +
    lines.map(l => `<div style="color:#bbb;font-size:11px;margin:2px 0;">・${escapeHtml(l)}</div>`).join('');
}

function showInspectPanelForUnit(unit) {

    <div class="info-row"><span class="info-label">状態</span><span class="info-val">${unit.status === 'destroyed' ? '撃墜' : '稼働'}</span></div>
    <div class="info-row"><span class="info-label">オーラ</span><span class="info-val">${unit.currentAura}${unit.auraLiberated ? ' <span style="color:#8a8">(解放済)</span>' : ` <span style="color:#888">(基本${(PILOTS[unit.pilot] || {}).auraBoarding || unit.currentAura})</span>`}</span></div>
    <div class="info-row"><span class="info-label">パワー</span><span class="info-val">${String(unit.effectivePower).toUpperCase()}</span></div>

    ${buildDurabilityRowsHtml(unit)}
    <div class="inspect-dmg-note">※ バーが短い部位ほどダメージを受けています。0になった部位は行動に影響することがあります。</div>
  `;
